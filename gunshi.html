<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<!-- 全画面キオスク用ラッパー: ホーム画面に追加して起動するとブラウザ枠が消える -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IEYAS軍師">
<meta name="theme-color" content="#0a0e17">
<title>IEYAS軍師（全画面）</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#0a0e17;overflow:hidden;-webkit-text-size-adjust:100%;}
  /* 軍師iframe: セーフエリア（ノッチ/ステータスバー/ホームインジケータ）を避けて最大化 */
  #frame{position:fixed;top:env(safe-area-inset-top);left:env(safe-area-inset-left);
    right:env(safe-area-inset-right);bottom:env(safe-area-inset-bottom);width:auto;height:auto;border:0;display:block;background:#0a0e17;}
  #setup{color:#c0d4f0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:520px;margin:0 auto;padding:48px 24px;line-height:1.7;}
  #setup h1{font-size:22px;margin-bottom:6px;}
  #setup p{font-size:14px;color:#9ab4d8;}
  #setup code{background:#16233c;color:#8fc6ff;padding:2px 7px;border-radius:6px;font-size:13px;}
  #setup .step{background:#111b2e;border:1px solid #1e3050;border-radius:12px;padding:14px 16px;margin:12px 0;}
  #setup .n{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;background:#2a5a9a;border-radius:50%;color:#fff;font-weight:800;font-size:12px;margin-right:8px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  // 本番デプロイ(ポータルbackend＋軍師 兼用)の /exec
  var BASE='https://script.google.com/macros/s/AKfycbxG4IdWtMdU-81wfQUvTg6nYqKboK9wWB-XcfFYI8w0KRUrSpZmwJyb9jBYuMUP5K1q4g/exec';
  var q=new URLSearchParams(location.search);
  var term=(q.get('term')||'').toLowerCase();
  var key=q.get('key')||'';
  var app=document.getElementById('app');
  if(!key){
    app.innerHTML='<div id="setup"><h1>🛡 IEYAS軍師・全画面</h1>'
      +'<p>このページを開くときは、末尾に <code>?term=5f&key=（軍師のキー）</code> を付けてください。フロアは <code>5f</code> か <code>2f</code>。</p>'
      +'<div class="step"><span class="n">1</span>例：<code>…/gunshi.html?term=5f&key=XXXXXXXX</code> をSafariで開く</div>'
      +'<div class="step"><span class="n">2</span>共有ボタン（□↑）→「<b>ホーム画面に追加</b>」</div>'
      +'<div class="step"><span class="n">3</span>以後はホーム画面のアイコンから起動 → <b>ブラウザ枠なしの全画面</b>で軍師が開きます</div>'
      +'<p style="margin-top:18px;color:#6a8ab0">5F端末・2F端末それぞれのiPadで、対応する <code>term</code> を付けたURLで一度ずつ追加してください。</p></div>';
    return;
  }
  var src=BASE+'?page=kiosk2&term='+encodeURIComponent(term||'5f')+'&key='+encodeURIComponent(key);
  var f=document.createElement('iframe');
  f.id='frame'; f.src=src;
  f.setAttribute('allow','fullscreen; clipboard-read; clipboard-write');
  f.setAttribute('allowfullscreen','');
  app.appendChild(f);
})();
</script>
</body>
</html>
