/* ============ 見取り図（席マップ）============
 * 席コード→店内の実位置。2026-07-15にボスがドラッグで確定した実配置そのもの。
 * キャンバスは 640x370（左上原点）。描画時に%へ変換するので端末幅に自動追従する。
 * ⚠️座標をここ(gunshi.html)に置く理由：マップは純粋な表示で、GASの`ALL_SEATS`に入れると
 *   微調整のたびにGASの版を1つ消費する（200上限は再発する恒久制約）。gunshiはPages配信＝push即反映。
 * ⚠️席の識別は`ALL_SEATS`の配列index。並べ替えると結合(KCOMBINE_)が全部ズレる＝絶対に触らない。
 *   ここはcodeで引くだけなので順序に非依存。座標を持たない席(待機W/黒服K=物理席でない)はマップ下の帯に出す。
 */
/* 店内の見取り図＝**デフォルメ配置**（ボス指示 2026-07-16「レイアウトはデフォルメしていいので表示範囲を増やす」）。
 * ⚠️これは実測の間取りではない＝**位置関係だけを保った模式図**。実配置どおりに置いていた頃は、
 *   席が使うのはキャンバスの35〜38%だけで残り6割が死んだ余白だった（2Fは左半分・5Fは左列が丸ごと空き）。
 *   縦はすでに満杯（461px中461px）＝**伸ばせるのは横だけ**。そこで席を左右いっぱいに引き伸ばし、
 *   余白を席へ配り直した（実測：表示面積 2F=2.7倍 / 5F=2.4倍・充填率91%）。
 * ⚠️**実配置に「戻す」な**＝空白が復活して文字が潰れる。デフォルメは事故ではなく意図。
 * ここで保存している位置関係（＝崩すと現場が席を取り違える）:
 *   ・カウンターは上から番号順の縦並び／5Fカウ6はカウ5の右隣（角）
 *   ・ボックスは下段／2Fは B1が上、その下に B3(左)・B2(右)／5Fは B2が左・B1が右
 *     （5Fの左右は2026-07-15にボスが実店舗と照合して確定。入れ替えるな）
 * ⚠️座標の単位＝iPad横(1180px)での実px相当。キャンバス368x470をそのまま座標系に使っている
 *   （＝ここの数字を1つ変えると縮尺が動き、2Fと5Fの両方に効く）。
 * ⚠️h>=60でボックス扱い（3段）になる＝カウンターの56を60以上にするなら mapFloorHtml の tall も見直す。 */
var SEAT_POS={
  /* 2F: カウ1〜4（幅いっぱいの帯）→ B1（幅いっぱい）→ 下段に B3(左)・B2(右) */
  '2F-C1':{x:0,y:0,  w:368,h:56}, '2F-C2':{x:0,y:64, w:368,h:56},
  '2F-C3':{x:0,y:128,w:368,h:56}, '2F-C4':{x:0,y:192,w:368,h:56},
  '2F-B1':{x:0,y:256,w:368,h:100},
  '2F-B3':{x:0,y:364,w:140,h:106}, '2F-B2':{x:148,y:364,w:220,h:106},
  /* 5F: カウ1〜4（幅いっぱいの帯）→ カウ5＋角のカウ6 → 下段に B2(左)・B1(右) */
  '5F-C1':{x:0,y:0,  w:368,h:56}, '5F-C2':{x:0,y:64, w:368,h:56},
  '5F-C3':{x:0,y:128,w:368,h:56}, '5F-C4':{x:0,y:192,w:368,h:56},
  '5F-C5':{x:0,y:256,w:250,h:56}, '5F-C6':{x:258,y:256,w:110,h:56},
  '5F-B2':{x:0,y:320,w:180,h:150},'5F-B1':{x:188,y:320,w:180,h:150}
};
/* ---- 描画キャンバス＝各フロアで席が実際に占めている範囲（bbox）だけを映す ----
 * デフォルメ後は2F・5Fとも席が0,0〜368,470を埋める＝bboxはキャンバスと一致し、中央寄せは実質ゼロになる。
 * 仕組みは残す＝席を動かした時に切り抜きが勝手に追従する（手で維持する表を持たないため）。
 * ⚠️bboxはSEAT_POSから自動算出。⚠️MAP_W/MAP_Hは全フロアの最大値＝2Fと5Fを同じ縮尺で映すため。
 * ⚠️縦の予算は実測で決まっている＝この縦横比(368/470)は**画面に入る上限**。MAP_Hを増やすと下がはみ出す
 *   （実測 2026-07-16：iPad横1180で描画高471px/余地491px・1024で405px/余地431px）。 */
var MAP_VIEW=(function(){
  var v={};
  Object.keys(SEAT_POS).forEach(function(code){
    var fl=code.slice(0,2), p=SEAT_POS[code], o=v[fl];
    if(!o){ v[fl]={x0:p.x, y0:p.y, x1:p.x+p.w, y1:p.y+p.h}; return; }
    o.x0=Math.min(o.x0,p.x); o.y0=Math.min(o.y0,p.y);
    o.x1=Math.max(o.x1,p.x+p.w); o.y1=Math.max(o.y1,p.y+p.h);
  });
  Object.keys(v).forEach(function(fl){ var o=v[fl]; o.w=o.x1-o.x0; o.h=o.y1-o.y0; });
  return v;
})();
var MAP_W=Math.max.apply(null,Object.keys(MAP_VIEW).map(function(fl){return MAP_VIEW[fl].w;}));
var MAP_H=Math.max.apply(null,Object.keys(MAP_VIEW).map(function(fl){return MAP_VIEW[fl].h;}));
/* 目印（入口・バー）はボス指示で廃止＝席だけを出す。
 * フロアのbboxがMAP_W×MAP_Hより小さい場合は中央寄せ（＝余りを左右/上下に等分）。 */
function mapBox_(p,fl){
  var v=MAP_VIEW[fl], ox=v.x0-(MAP_W-v.w)/2, oy=v.y0-(MAP_H-v.h)/2;
  return 'left:'+((p.x-ox)/MAP_W*100).toFixed(3)+'%;top:'+((p.y-oy)/MAP_H*100).toFixed(3)+'%;'
       + 'width:'+(p.w/MAP_W*100).toFixed(3)+'%;height:'+(p.h/MAP_H*100).toFixed(3)+'%;';
}
/* 客に付くフラグ（リクエスト/NG/誕生日/VIP/ボトル）。マップでは席名の右に短く出す。
 * ⚠️一覧のTAGLABELは「🍶ボトル」等の語つき＝マップの122px幅では3個で3行に折り返し、
 *   タグだけで42px（＝キャストの居場所）を食う。マップは記号だけにして1行に収める。
 * ⚠️客名と同じ行に置かない。122pxに「客名＋フラグ3個」は入らず、削れるのは必ず客名の側だった
 *   （実測2026-07-15：「鈴木 様」→「鈴..」）。客名は黒服が一番読む情報＝絶対に削らせない。
 * ⚠️順は「今すぐ効く順」。枠に入らない時はCSSで後ろから欠ける＝呼び出しとNGが最後まで残る。 */
/* ⚠️語や数字を足さない＝1個30pxになり、2個で客名の行まで押し出す。記号1文字で約20px。
 *   未対応/対応済みは色で出す（f-req.un＝橙で点滅）＝文字で持つ必要がない。件数はタップで見る。 */
var MAP_TAG={ng:'⚠',bday:'🎂',vip:'👑',bottle:'🍶'};
function mapFlags_(s,idx){
  var f='';
  if(s.nextRsv) f+='<span class="mflag f-next" title="次席予約 '+esc(rsvArrT(s.nextRsv))+' '+esc(s.nextRsv.cust)+'様">🔜'+esc(rsvArrT(s.nextRsv))+'</span>';
  var rq=reqsForCust(s.cust);
  if(rq&&rq.length){
    var un=rq.filter(function(r){return !r.handled;}).length;
    f+='<span class="mflag f-req'+(un?' un':'')+'" title="リクエスト'+(un?' 未対応'+un+'件':' 対応済み')
      +'" onclick="openReqForSeat('+idx+',event)">📣</span>';
  }
  Object.keys(MAP_TAG).forEach(function(k){
    if((s.tags||[]).indexOf(k)<0) return;
    f+='<span class="mflag f-'+k+'" title="'+esc(TAGLABEL[k]||k)+'">'+MAP_TAG[k]+'</span>';
  });
  return f?'<span class="mflags">'+f+'</span>':'';
}
/* ---- マップのセル専用の圧縮描画（カウンター=2段／ボックス=3段） ----
 * 一覧のseatHtmlは幅330px・高さ可変の一覧向けで、マップの枠には構造的に入らない。
 *   実測(2026-07-15)：2F-BOX1は枠100pxに対し146px必要＝46pxぶんキャストが黙って切れていた。
 * 枠に合わせて作る。段の構成：
 *   1段目 席名 ＋ 右肩（カウンター=残り時間／ボックス=人数。超過は赤・まもなくは橙・予約は来店時刻）
 *   2段目 客名 ＋ フラグ（カウンターはキャストのアバターも。フラグは客に付く情報なので客名の隣）
 *   3段目 ボックスのみ＝キャストのチップ（chipHtmlを流用＝名前と残り時間が1人ずつ読める）
 * ⚠️クリック契約(onSeatClick/tapCast)と状態クラス(movetarget等)はseatHtmlと同一＝付け回し/結合はそのまま効く。
 * ⚠️段を足す/文字を上げる時は必ず実測で追う。枠(カウンター約56px・ボックス80〜102px)を超えると黙って切れる。 */
function mapSeatCell_(s,tall,wide){
  var st=seatStatus(s), idx=seatIdx(s), nm=shortNm(s.name);
  var oc='onclick="onSeatClick('+idx+')"', size=tall?' box':' mini';
  if(s.mergedTo!=null){
    return '<div class="seat mergedcell'+size+'" '+oc+'><div class="mini-r1"><b>'+esc(nm)+'</b></div>'
      +'<div class="mini-r2"><span class="mini-c">🔗 '+esc(shortNm(SEATS[s.mergedTo].name))+'へ</span></div></div>';
  }
  var isPrimary=s.mergeWith&&s.mergeWith.length;
  var dispNm=isPrimary?nm+'＋'+s.mergeWith.length:nm;
  var mt=(moveMode||tableMoveMode)?' movetarget':'';
  var self=(moveMode&&selCast&&selCast.si===idx)?' moveself':'';
  var ct=(combineMode&&idx!==combinePrimary)?' combinetarget':'';
  var cprim=(combineMode&&idx===combinePrimary)?' combineprimary':'';
  var grp=isPrimary?' grouped':'';
  var coSeat=(s.occupants&&s.occupants.length>1);   // 相席（同一卓に複数予約）
  var paxDisp=coSeat?s.occupants.reduce(function(a,o){return a+(Number(o.pax)||0);},0):s.pax;
  var r1='<b>'+esc(dispNm)+'</b>'+(coSeat?'<span class="mini-p">👥'+s.occupants.length+'</span>':'')
        +(st==='empty'?'':mapFlags_(s,idx));
  var r2='', r3='', cls='';
  if(st==='empty'){
    if(s.rsv){
      cls='reserved';
      r1+='<span class="mini-t rsv">'+esc(rsvArrT(s.rsv))+'</span>';
      r2='<span class="mini-c rsv">'+esc(s.rsv.cust)+'様</span>';
      // 担当はボックス(3段)なら3段目へ。デフォルメで幅が広がったカウンターは2段目の余りに置ける
      if(tall&&s.rsv.tantou) r3='<span class="mini-sub">担当 '+esc(s.rsv.tantou)+'</span>';
      else if(wide&&s.rsv.tantou) r2+='<span class="mini-sub">担当 '+esc(s.rsv.tantou)+'</span>';
    } else {
      r2='<span class="mini-e">空席</span>';
    }
  } else if(st==='nocast'){
    cls='nocast';
    r1+='<span class="mini-t warn">⚠不在</span>';
    r2='<span class="mini-c">'+esc(s.cust||'')+'</span>';
    if(tall&&s.tantou) r3=chipHtml(s.tantou,-1,idx,{away:true,awayMin:s.awayMin});
    // 幅が広がったカウンターは「誰が何分抜けているか」も2段目に入る（従来は⚠不在だけで担当が読めなかった）
    else if(wide&&s.tantou) r2+='<span class="mini-cc">'+chipHtml(s.tantou,-1,idx,{away:true,awayMin:s.awayMin})+'</span>';
  } else {
    cls=st;
    var cs=s.casts||[];
    if(tall){
      r1+='<span class="mini-p">'+paxDisp+'名</span>';
      r2='<span class="mini-c">'+esc(s.cust||'')+'</span>';
      // ボックスは背が高い＝キャストは名前と残り時間を1人1行で出す（切れる時はCSSで下から隠れる）
      r3=cs.map(function(c,ci){ return chipHtml(c.n,ci,idx,{mins:c.mins,status:c.status,tantou:c.n===s.tantou}); }).join('');
    } else {
      // カウンターは2段しかない＝先頭キャストの残り時間は右肩へ（席を縦に読む時に数字が同じ位置に揃う）
      var c=cs[0]||null;
      if(c){
        var tm=c.unlimited?'∞':(c.mins<0?'超'+(-c.mins)+'分':'残'+c.mins+'分');
        r1+='<span class="mini-t '+(c.status==='over'?'over':c.status==='warn'?'warn':'')+'">'+tm+'</span>';
      }
      // デフォルメで帯になったカウンター(368px)は客名の隣にキャスト名を出す＝122px時代は色アバター1文字しか
      // 置けず「誰が付いているか」がマップから読めなかった。2人目以降も「+1」ではなく名前で出る。
      // ⚠️残り時間はチップに入れない(notime)＝右肩と二重になる。狭い席(5Fカウ6)は入らないので従来の色アバター。
      if(!wide&&c) r2='<i class="mini-av" style="background:'+castColor(c.n)+'">'+esc(c.n.charAt(0))+'</i>';
      r2+='<span class="mini-c">'+esc(s.cust||'')+'</span>';
      if(wide&&cs.length){
        r2+='<span class="mini-cc">'+cs.map(function(c2,ci){
          return chipHtml(c2.n,ci,idx,{notime:true,status:c2.status,tantou:c2.n===s.tantou});
        }).join('')+'</span>';
      } else if(cs.length>1) r2+='<span class="mini-p">+'+(cs.length-1)+'</span>';
    }
  }
  return '<div class="seat'+size+' '+cls+mt+self+ct+cprim+grp+'" '+oc+'>'
    +'<div class="mini-r1">'+r1+'</div><div class="mini-r2">'+r2+'</div>'
    +(r3?'<div class="mini-r3">'+r3+'</div>':'')+'</div>';
}
/* 3段目に入り切らなかったキャストを「+N」で明示する。
 * ⚠️切れた事実を黙って捨てない＝黒服が「ついているはずのキャストが居ない」と誤読する。
 *   キャストが多いボックス（背の低い5Fボックスに3人など）でだけ出る。
 * 枠の高さは描画後にしか分からない（画面幅→縮尺→セル高の順に決まる）ので、描画後に実測して印を足す。
 * ⚠️必ず先に消してから足す（＝冪等）。setHtmlは前回と同じHTMLなら書き換えを省くので、
 *   消さずに足すとポーリングのたびにDOMへ+Nが積み上がる。画面回転で枠が変わった時もこれで測り直る。 */
function markMapOverflow_(){
  document.querySelectorAll('.hall-map .mini-more').forEach(function(b){ b.remove(); });
  document.querySelectorAll('.hall-map .mini-r3').forEach(function(r3){
    var chips=r3.querySelectorAll('.castchip');
    if(!chips.length) return;
    // ⚠️offsetTopは使わない＝基準が.mini-r3ではなく位置指定された祖先(.seatpos)になり、全部隠れている判定になる
    var lim=r3.getBoundingClientRect().top+r3.clientHeight, shown=0;
    for(var i=0;i<chips.length;i++){ if(chips[i].getBoundingClientRect().bottom<=lim+1) shown++; }
    var hid=chips.length-shown;
    if(!hid) return;
    var r1=r3.parentNode.querySelector('.mini-r1');
    if(r1) r1.insertAdjacentHTML('beforeend','<span class="mini-p mini-more">+'+hid+'</span>');
  });
}

function mapHtml(){ return '<div class="floors">'+mapFloorHtml('2F')+mapFloorHtml('5F')+'</div>'; }
function mapFloorHtml(fl){
  var seats=SEATS.filter(function(s){return s.floor===fl;});
  var placed=seats.filter(function(s){return SEAT_POS[s.code];});
  var rest=seats.filter(function(s){return !SEAT_POS[s.code];});   // 待機・黒服＝物理席でないので帯に
  var cb=seats.filter(function(s){return s.type==='C'||s.type==='B';});
  var occ=cb.filter(function(s){return s.casts&&s.casts.length;}).length;
  // 背の低いセル(カウンター)は2段、背の高いボックスは3段（キャストを1人1行で出せる）
  // nw=幅いっぱいの帯にできなかった狭い席（5Fカウ6＝角／2Fボックス3）。同じ文字だと客名が削れるので少しだけ落とす
  // ⚠️しきい値150はSEAT_POSの単位=px相当が前提（帯は368・狭い席は110〜140）。座標系を変えたらここも動く
  var cells=placed.map(function(s){
    var p=SEAT_POS[s.code], tall=p.h>=60;
    return '<div class="seatpos'+(tall?'':' sm')+(p.w<150?' nw':'')+'" style="'+mapBox_(p,fl)+'">'+mapSeatCell_(s,tall,p.w>=150)+'</div>';
  }).join('');
  return '<div class="floor">'
       + '<div class="floor-hd"><span class="fl">'+fl+'</span><span class="meta">稼働 '+occ+'/'+cb.length+'</span></div>'
       // 縦横比はMAP_W/MAP_Hから直接引く＝CSSに数字を焼くと切り抜きを変えた時に黙ってズレる
       + '<div class="hall-map" style="aspect-ratio:'+MAP_W+'/'+MAP_H+'">'+cells+'</div>'
       + (rest.length?'<div class="map-side">'+rest.map(seatHtml).join('')+'</div>':'')
       + '</div>';
}

var selCast=null, moveMode=false, combineMode=false, combinePrimary=null;
var tableMoveMode=false, tableMoveFrom=null;
var CAST_PALETTE=['#7ab0f0','#66cc88','#e6b23a','#e08ad0','#8fb0ff','#6fd0c0','#f0a060','#b090f0','#f08a8a','#9d90ee','#7cd0a0','#d0b060'];
function castColor(n){var s=0;for(var i=0;i<n.length;i++)s+=n.charCodeAt(i);return CAST_PALETTE[s%CAST_PALETTE.length];}
function castHere(s,name){return name&&(s.casts||[]).some(function(c){return c.n===name;});}
function chipHtml(name,ci,si,opts){
  opts=opts||{};
  var col=castColor(name);
  var sel=(selCast&&selCast.si===si&&selCast.ci===ci)?' sel':'';
  var role=opts.tantou?'<span class="role">担当</span>':'';
  /* notime＝残り時間を出さない。マップのカウンター用＝時間は席の右肩(mini-t)に出ているので重複させない */
  var tm=(opts.away||opts.notime)?'':'<span class="tm">'+(opts.wait?(opts.mins+'分待機'):(opts.mins<0?'超'+(-opts.mins)+'分':'残'+opts.mins+'分'))+'</span>';
  var cls=(opts.away?'castchip awaychip':'castchip '+(opts.status==='over'?'s-over':opts.status==='warn'?'s-warn':'s-ok'))+(opts.tantou?' tantou':'')+sel;
  var onclick=opts.away?'onclick="tapAway(event)"':'onclick="tapCast('+si+','+ci+',event)"';
  var av=opts.away?'#8a7038':col;
  var awayLbl=opts.away?'<span class="role">担当</span><span class="awaytm">抜けて'+(opts.awayMin!=null?opts.awayMin:0)+'分</span>':'';
  return '<span class="'+cls+'" '+onclick+'><span class="ava" style="background:'+av+'">'+esc(name.charAt(0))+'</span><span class="cn">'+esc(name)+'</span>'+castBadge(name)+role+awayLbl+tm+'</span>';
}
function seatInfoLine(s){
  var p=[];
  if(s.bottle) p.push('🍶'+esc(s.bottle)+(s.bottlePos?'<span class="bp">'+esc(s.bottlePos)+'</span>':''));
  if(s.member) p.push('会員'+esc(s.member));
  if(s.bday) p.push('🎂'+esc(s.bday));
  return p.length?'<div class="seat-info">'+p.join('<span class="dot">・</span>')+'</div>':'';
}
/* 席の客名の横に出す「予約キャスト・担当キャスト」コンテキスト（実際の在席とは別） */
function seatCustKey_(x){ return String(x||'').replace(/様/g,'').replace(/\s/g,''); }
function seatRsvFor(s){ if(!s.cust)return null; var k=seatCustKey_(s.cust); return (RSV||[]).find(function(r){return r.cust&&seatCustKey_(r.cust)===k;})||null; }
function seatCastCtx(s){
  var parts=[], r=seatRsvFor(s);
  var yoyaku=r&&r.yoyaku?r.yoyaku:'';
  if(yoyaku){
    var yhere=castHere(s,yoyaku), away='';
    if(!yhere){ var m=(s.recentLeft&&s.recentLeft[yoyaku]); away=(m!=null)?'<span class="sctx-away"> 抜'+m+'分</span>':'<span class="sctx-away"> 離席中</span>'; }
    parts.push('<span class="sctx y">予約 '+esc(yoyaku)+away+'</span>');
  }
  if(s.tantou) parts.push('<span class="sctx t">担当 '+esc(s.tantou)+'</span>');
  return parts.length?'<div class="sctx-row">'+parts.join('')+'</div>':'';
}
function seatHtml(s){
  var st=seatStatus(s), idx=seatIdx(s), nm=shortNm(s.name);
  var oc='onclick="onSeatClick('+idx+')"';
  // 結合の子（他席へ結合済み）
  if(s.mergedTo!=null){
    var pn=shortNm(SEATS[s.mergedTo].name);
    return '<div class="seat mergedcell" '+oc+'><div style="text-align:center"><div class="grp-badge">🔗 結合中</div><div style="font-size:11px;margin-top:6px;color:#9ad0d0;font-weight:700">'+esc(nm)+' → '+esc(pn)+'</div></div></div>';
  }
  var isPrimary=s.mergeWith&&s.mergeWith.length;
  var dispNm=isPrimary?nm+'＋'+s.mergeWith.map(function(mi){return shortNm(SEATS[mi].name);}).join('＋'):nm;
  var grpBadge=isPrimary?'<span class="grp-badge">🔗'+(s.mergeWith.length+1)+'席</span>':'';
  var coSeat=(s.occupants&&s.occupants.length>1); // 相席（同一卓に複数予約）
  var coBadge=coSeat?'<span class="grp-badge" style="background:#3a2a12;color:#ffc98a">👥'+s.occupants.length+'組</span>':'';
  var paxDisp=coSeat?s.occupants.reduce(function(a,o){return a+(Number(o.pax)||0);},0):s.pax;
  var mt=(moveMode||tableMoveMode)?' movetarget':'';
  var self=(moveMode&&selCast&&selCast.si===idx)?' moveself':'';
  var ct=(combineMode&&idx!==combinePrimary)?' combinetarget':'';
  var cprim=(combineMode&&idx===combinePrimary)?' combineprimary':'';
  var grp=isPrimary?' grouped':'';
  // 待機席 / 黒服席（旧軍師ポータルの席タイプ）
  if(st==='waiting'||st==='kurofuku'){
    var wlbl=st==='waiting'?'🪑 待機':'🖤 黒服';
    var wchips=(s.casts||[]).map(function(c,ci){return chipHtml(c.n,ci,idx,{mins:c.mins,status:'ok',wait:true});}).join('')||'<div class="empty">'+(st==='waiting'?'待機なし':'黒服なし')+'</div>';
    return '<div class="seat '+st+mt+ct+'" '+oc+'><div class="st"><span class="snm">'+wlbl+'</span><span class="pax">'+(s.casts?s.casts.length:0)+'名</span></div><div style="margin-top:2px">'+wchips+'</div></div>';
  }
  // 空席 / 予約
  if(st==='empty'){
    if(s.rsv){
      var rrqb=reqBadgeHtml(idx,s.rsv.cust);
      return '<div class="seat reserved'+mt+ct+grp+'" '+oc+'><div class="st"><span class="snm">'+esc(dispNm)+grpBadge+'</span><span class="rsv-tag">予約</span></div>'
        +'<div class="cust" style="color:#bcd8ff">'+esc(s.rsv.cust)+'様</div>'
        +'<div class="rsv-meta"><span class="rt">📅 '+esc(rsvArrT(s.rsv))+'〜</span>'+(s.rsv.tantou?'　担当 '+esc(s.rsv.tantou):'')+'</div>'
        +(rrqb?'<div class="tags" style="margin-top:4px">'+rrqb+'</div>':'')+'</div>';
    }
    var planB=(s.planList&&s.planList.length)?'<div class="rsv-meta" style="color:#c8a8f0;margin-top:3px">📋 予定 '+s.planList.map(esc).join('、')+'</div>':'';
    return '<div class="seat'+mt+ct+grp+'" '+oc+'><div class="st"><span class="snm">'+esc(dispNm)+grpBadge+'</span></div><div class="empty">空席</div>'+planB+'</div>';
  }
  var tags=(s.tags||[]).map(function(t){return '<span class="tg '+(TAGLABEL[t]?t:'')+'">'+(TAGLABEL[t]||esc(t))+'</span>';}).join('');
  var tantou=s.tantou;
  // 担当不在（接客者ゼロ）
  if(st==='nocast'){
    return '<div class="seat nocast'+mt+self+ct+cprim+grp+'" '+oc+'><div class="cnr">⚠ 担当不在</div>'
      +'<div class="st"><span class="snm">'+esc(dispNm)+grpBadge+coBadge+'</span><span class="pax">'+paxDisp+'名</span></div>'
      +((tags||reqBadgeHtml(idx,s.cust))?'<div class="tags">'+tags+reqBadgeHtml(idx,s.cust)+'</div>':'')
      +occupantsHtml(s)+seatInfoLine(s)+nextRsvLine_(s)
      +(tantou?'<div style="margin-top:3px">'+chipHtml(tantou,-1,idx,{away:true,awayMin:s.awayMin})+'</div>':'')+'</div>';
  }
  // 接客中
  var cnr=st==='over'?'🔴 超過':st==='warn'?'⏰ まもなく':'';
  var rqb=reqBadgeHtml(idx,s.cust);
  var chips='';
  // 下段は「実際についているキャスト」だけ（担当が抜けている場合は上の担当ラベルで表示）
  s.casts.forEach(function(c,ci){ chips+=chipHtml(c.n,ci,idx,{mins:c.mins,status:c.status,tantou:c.n===tantou}); });
  return '<div class="seat '+st+mt+self+ct+cprim+grp+'" '+oc+'>'+(cnr?'<div class="cnr">'+cnr+'</div>':'')
    +'<div class="st"><span class="snm">'+esc(dispNm)+grpBadge+coBadge+'</span><span class="pax">'+paxDisp+'名</span></div>'
    +((tags||rqb)?'<div class="tags">'+tags+rqb+'</div>':'')
    +occupantsHtml(s)+seatCastCtx(s)+seatInfoLine(s)+nextRsvLine_(s)+'<div style="margin-top:2px">'+chips+'</div></div>';
}
// 席カードの客名表示（相席=複数組なら各組を縦積み、単一なら従来通り）
function occupantsHtml(s){
  var occ=s.occupants||[];
  if(occ.length<=1) return '<div class="cust">'+esc(s.cust)+'</div>';
  return '<div class="cust" style="line-height:1.45">'+occ.map(function(o){
    return '<div>'+esc(o.cust)+'様 <span style="font-size:10px;color:#8aa8c8">'+(o.pax||1)+'名'+(o.tantou?'・'+esc(o.tantou):'')+'</span></div>';
  }).join('')+'</div>';
}
// 来店中の席に「次席予約(=後半に入った別の確定予約)」があれば予告する1行。席一覧の接客中/担当不在で共用（マップはmapFlags_の🔜）。
function nextRsvLine_(s){
  if(!s||!s.nextRsv) return '';
  return '<div class="rsv-meta" style="color:#ffc98a;margin-top:3px">🔜 次席予約 '+esc(rsvArrT(s.nextRsv))+'〜 '+esc(s.nextRsv.cust)+'様'+(s.nextRsv.tantou?'<span style="color:#8aa8c8;font-weight:600">・担当 '+esc(s.nextRsv.tantou)+'</span>':'')+'</div>';
}
/* ---- 席・キャストのタップ操作（付け回し / 移動） ---- */
function onSeatClick(idx){
  if(moveMode){ placeCast(idx); return; }
  if(combineMode){ mergeSeat(idx); return; }
  if(tableMoveMode){ doTableMove(idx); return; }
  var s=SEATS[idx]; if(s.mergedTo!=null){ openSeat(s.mergedTo); return; }
  openSeat(idx);
}
/* ---- テーブルチェンジ（客ごと別テーブルへ移動） ---- */
function startTableMove(idx){ closeSheet(); tableMoveMode=true; tableMoveFrom=idx; renderHall(); showTableMoveBar(); }
function showTableMoveBar(){
  var p=SEATS[tableMoveFrom]; var b=document.getElementById('combinebar');
  b.className='castbar movemode show';
  b.innerHTML='<div class="cb-info">🔀 '+esc(p.floor+' '+shortNm(p.name))+(p.cust?'（'+esc(p.cust)+'）':'')+' の<b>移動先の空席</b>をタップ</div><div class="cb-btns"><button class="cb x" onclick="cancelTableMove()">キャンセル</button></div>';
}
function cancelTableMove(){ tableMoveMode=false; tableMoveFrom=null; hideCombineBar(); renderHall(); }
function doTableMove(destIdx){
  if(destIdx===tableMoveFrom){ return; }
  var from=SEATS[tableMoveFrom], to=SEATS[destIdx];
  if(to.type==='W'||to.type==='K'){ toast('待機/黒服席へは移動できません'); return; }
  var occupied=to.occupied||to.cust||(to.casts&&to.casts.length)||to.mergedTo!=null||(to.mergeWith&&to.mergeWith.length)||to.rsv;
  if(occupied){ toast('移動先は空席を選んでください'); return; }
  if(!confirm(from.floor+' '+shortNm(from.name)+(from.cust?'（'+from.cust+'）':'')+' を\n'+to.floor+' '+shortNm(to.name)+' へ移動します。よろしいですか？')) return;
  var fromCode=from.code, toCode=to.code;
  tableMoveMode=false; tableMoveFrom=null; hideCombineBar();
  toast('🔀 テーブルを移動しました');
  if(IS_GAS) gsr('kioskChangeTable',fromCode,toCode).then(function(r){ if(r&&r.ok===false){ toast('移動失敗: '+(r.error||'')); } loadAll(); }).catch(function(){ toast('移動に失敗'); loadAll(); });
  else renderAll();
}
/* ---- 席の結合 / 分割 ---- */
function startCombine(idx){ closeSheet(); combineMode=true; combinePrimary=idx; renderHall(); showCombineBar(); }
function showCombineBar(){ var p=SEATS[combinePrimary]; var b=document.getElementById('combinebar'); b.className='castbar movemode show'; b.innerHTML='<div class="cb-info">🔗 '+esc(p.floor+' '+shortNm(p.name))+' に結合する席をタップ</div><div class="cb-btns"><button class="cb cmb" onclick="finishCombine()">完了</button><button class="cb x" onclick="cancelCombine()">キャンセル</button></div>'; }
function hideCombineBar(){ document.getElementById('combinebar').className='castbar'; }
function mergeSeat(target){
  if(target===combinePrimary) return;
  var t=SEATS[target]; if(t.mergedTo!=null) return;
  var p=SEATS[combinePrimary]; p.mergeWith=p.mergeWith||[];
  if(p.mergeWith.indexOf(target)>=0) return;
  p.mergeWith.push(target); t.mergedTo=combinePrimary;
  if(t.cust){ p.pax=(p.pax||0)+(t.pax||0); if(t.casts&&t.casts.length) p.casts=(p.casts||[]).concat(t.casts); t.casts=[]; }
  else { t.casts=[]; }
  t.rsv=null;
  renderHall(); showCombineBar();
}
function finishCombine(){ var p=SEATS[combinePrimary]; var did=p.mergeWith&&p.mergeWith.length; var pc=p.code, others=(p.mergeWith||[]).map(function(mi){return SEATS[mi].code;}); combineMode=false; combinePrimary=null; hideCombineBar(); if(did) toast('🔗 席を結合しました'); renderAll(); if(IS_GAS&&did)gsr('kioskCombineSeats',pc,others).then(loadAll).catch(function(){loadAll();}); }
function cancelCombine(){ combineMode=false; combinePrimary=null; hideCombineBar(); renderHall(); }
function splitSeat(idx){
  var p=SEATS[idx]; if(!p.mergeWith||!p.mergeWith.length) return;
  p.mergeWith.forEach(function(mi){ SEATS[mi].mergedTo=null; });
  var pc=p.code;
  p.mergeWith=[]; closeSheet(); toast('✂️ 結合を解除しました'); renderAll();
  if(IS_GAS)gsr('kioskSplitSeat',pc).then(loadAll).catch(function(){loadAll();});
}
function tapCast(si,ci,ev){ if(ev)ev.stopPropagation(); if(moveMode){ placeCast(si); return; } selCast={si:si,ci:ci}; renderHall(); showCastBar(); }
function tapAway(ev){ if(ev)ev.stopPropagation(); toast('その担当は他卓で接客中です（つけまわしで管理）'); }
function closeBar(){ selCast=null; moveMode=false; document.getElementById('castbar').className='castbar'; }
function hideCastBar(){ closeBar(); renderHall(); }
function showCastBar(){
  var bar=document.getElementById('castbar');
  if(!selCast){ bar.className='castbar'; bar.innerHTML=''; return; }
  var s=SEATS[selCast.si], c=s.casts[selCast.ci], col=castColor(c.n);
  var av='<span class="ava" style="background:'+col+'">'+esc(c.n.charAt(0))+'</span>';
  if(moveMode){
    bar.className='castbar movemode show';
    bar.innerHTML='<div class="cb-info">'+av+'🔄 '+esc(c.n)+' を移動 <small>移動先の席をタップ</small></div><div class="cb-btns"><button class="cb x" onclick="cancelMove()">キャンセル</button></div>';
  }else{
    bar.className='castbar show';
    bar.innerHTML='<div class="cb-info">'+av+esc(c.n)+' <small>'+esc(s.floor+' '+s.name)+' ・ '+(c.mins<0?'超過'+(-c.mins)+'分':c.mins+'分')+'</small></div>'
      +'<div class="cb-btns"><button class="cb mv" onclick="startMove()">🔄 別の席へ移動</button><button class="cb x" onclick="hideCastBar()">✕</button></div>';
  }
}
function startMove(){ moveMode=true; renderHall(); showCastBar(); }
function cancelMove(){ hideCastBar(); }
function placeCast(targetSi){
  if(!selCast){ return; }
  if(targetSi===selCast.si){ hideCastBar(); return; }
  var src=SEATS[selCast.si];
  var castName=src.casts[selCast.ci]?src.casts[selCast.ci].n:''; var fromCode=src.code, toCode=SEATS[targetSi].code, toLabel=shortNm(SEATS[targetSi].name);
  var c=src.casts.splice(selCast.ci,1)[0]; if(!c){ closeBar(); renderAll(); return; }
  if(src.tantou===c.n) src.awayMin=0; // 担当が抜けた席は経過0からカウント
  c.mins=20; c.status='ok';
  var tgt=SEATS[targetSi]; if(!tgt.casts) tgt.casts=[]; tgt.casts.push(c);
  toast('🔄 '+c.n+' を '+tgt.floor+' '+shortNm(tgt.name)+' へ移動');
  closeBar(); renderAll();
  if(IS_GAS&&toCode)gsr('kioskRotateCast',castName,fromCode,toCode,toLabel).then(loadAll).catch(function(e){toast('保存エラー');loadAll();});
}

/* ---- つけまわしボード ---- */
function worstWait(c){var w=c.tables.filter(function(t){return !t.cur;});if(!w.length)return null;return w.slice().sort(function(a,b){return (b.wait||0)-(a.wait||0);})[0];}
function isMulti(c){return c.tables.length>=2;}
function rotInterval(c){return c.interval||15;}
function needsAction(c){
  var cur=c.tables.find(function(t){return t.cur;});
  if(cur&&cur.over)return true;
  if(!isMulti(c))return false;
  var iv=rotInterval(c);
  return c.tables.some(function(t){return !t.cur&&(t.alert||(t.wait||0)>=iv);});
}
function renderRotation(){
  var list=ROT.slice().sort(function(a,b){var d=(needsAction(b)?1:0)-(needsAction(a)?1:0);return d||(b.tables.length-a.tables.length);});
  var multi=ROT.filter(isMulti);
  var loadmap=multi.length?'<div class="loadmap">'+multi.slice().sort(function(a,b){return b.tables.length-a.tables.length;}).map(function(c){
      return '<div class="lm l'+(c.tables.length>=3?'3':'2')+'" onclick="scrollToCast(\''+esc(c.cast)+'\')">'+esc(c.cast)+' <span class="n">'+c.tables.length+'卓 / '+rotInterval(c)+'分</span></div>';
    }).join('')+'</div>':'';
  var html='<div class="rot-sum">🔄 担当キャストの巡回状況　掛け持ち <b style="color:#ffcf6a">'+multi.length+'名</b>　要付け回し <b>'+ROT.filter(needsAction).length+'件</b></div>'
    + loadmap + list.map(rcastHtml).join('');
  setHtml('rsvArea',html);
}
function scrollToCast(name){var el=document.getElementById('rcast-'+name);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});}
function rcastHtml(c){
  var ci=ROT.indexOf(c);
  var cur=c.tables.find(function(t){return t.cur;});
  var others=c.tables.filter(function(t){return !t.cur;});
  var multi=isMulti(c), iv=rotInterval(c), act=needsAction(c);
  var load=multi
    ? '<span class="rload l'+(c.tables.length>=3?'3':'2')+'">掛け持ち '+c.tables.length+'卓<span class="pip">'+Array(c.tables.length+1).join('●')+'</span></span>'
    : '<span class="rload l1">専任</span>';
  var rows='';
  if(cur){
    var left=iv-cur.min;
    var rt=cur.over?'超過 '+cur.min+'分'
         :multi?(left<=0?'交代時期・'+cur.min+'分':'接客中 '+cur.min+'分<span style="color:#8a9ac0"> / あと'+left+'分</span>')
         :'接客中 '+cur.min+'分';
    var cc=((multi&&left<=0)||cur.over)?'overw':'cur';
    rows+='<div class="rtab '+cc+'"><span class="tl">🎤 '+esc(cur.key)+' '+esc(cur.cust)+'</span><span class="tr">'+rt+'</span></div>';
  }
  others.forEach(function(t){
    var w=t.wait||0;
    var wc=(t.alert||w>=iv)?'overw':(w>=iv*0.6?'warnw':'wait');
    rows+='<div class="rtab '+wc+'"><span class="tl">⏳ '+esc(t.key)+' '+esc(t.cust)+'</span><span class="tr">抜けて'+w+'分'+(t.alert?'・'+esc(t.alert):(w>=iv?'・交代を':''))+'</span></div>';
  });
  var intctl=multi?'<div class="rint">⏱ 何分で回す<div class="ichips">'+[10,15,20,25].map(function(m){return '<div class="ic'+(iv===m?' sel':'')+'" onclick="setCastInterval('+ci+','+m+')">'+m+'</div>';}).join('')+'</div></div>':'';
  var actions='';
  if(others.length){
    var tgt=worstWait(c);
    var urg=(tgt.alert||(tgt.wait||0)>=iv)?' urg':'';
    actions='<div class="rcast-act"><div class="rbtn mv'+urg+'" onclick="rotateCast('+ci+',\''+esc(tgt.key)+'\')">→ '+esc(tgt.key)+' へ回す</div></div>';
  }
  var tag=act?' <span class="rcast-tag a">要付け回し</span>':'';
  return '<div class="rcast'+(act?' act':'')+'" id="rcast-'+esc(c.cast)+'"><div class="rcast-hd"><span class="rcast-nm">'+(act?'🔴 ':'🟢 ')+esc(c.cast)+tag+'</span>'+load+'</div>'+rows+intctl+actions+'</div>';
}
function setCastInterval(ci,m){ROT[ci].interval=m;renderAll();if(IS_GAS)gsr('kioskSetInterval',ROT[ci].cast,m).catch(function(){});}
function toast(msg){var t=document.getElementById('rotToast');t.textContent=msg;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(function(){t.classList.remove('show');},2200);}
function rotateCast(ci,key){var c=ROT[ci];var cur=c.tables.find(function(t){return t.cur;});var tgt=c.tables.find(function(t){return t.key===key;});var fromCode=cur?cur.code:'',toCode=tgt?tgt.code:'';if(cur){cur.cur=false;cur.wait=0;cur.over=false;}if(tgt){tgt.cur=true;tgt.min=0;tgt.wait=0;tgt.over=false;tgt.alert=null;}toast('🔄 '+c.cast+' を '+key+' へ付け回しました');renderAll();if(IS_GAS&&toCode)gsr('kioskRotateCast',c.cast,fromCode,toCode,key).then(loadAll).catch(function(e){toast('保存エラー');loadAll();});}

var UNDO_WINDOW_MS=10*60*1000; /* 来店から10分以内のみ来店前に戻せる */
function canUndoCheckin(r){ return !r.checkInAt || (Date.now()-r.checkInAt)<UNDO_WINDOW_MS; }
function statusBtns(r){
  var h;
  if(r.status==='来店済み'){
    var undo=canUndoCheckin(r)?'<button class="stundo" title="来店前に戻す（来店から10分以内）" onclick="setStatus('+r.id+',\'確定\')">↩</button>':'';
    h='<span class="stpill arr">🟢 来店中</span><button class="stact left" onclick="setStatus('+r.id+',\'退店済み\')">🚪 退店</button>'+undo;
  }else if(r.status==='退店済み'){
    h='<span class="stpill left">🚪 退店済</span><button class="stundo wide" onclick="setStatus('+r.id+',\'来店済み\')">↩ 来店中に戻す</button>';
  }else{
    h='<span class="stpill wait">⏳ 来店前</span><button class="stact arr" onclick="setStatus('+r.id+',\'来店済み\')">✅ 来店</button>';
  }
  return '<div class="stbtns" onclick="event.stopPropagation()">'+h+'</div>';
}
function setStatus(id,s){
  var r=RSV.find(function(x){return x.id===id;}); if(!r)return;
  if(s==='確定'&&!canUndoCheckin(r)){ toast('来店から10分以上経過したため戻せません'); return; }
  // 来店(チェックイン)時、割り当て席に既に別の組が着席中なら「相席」になる旨を確認＝無言マージ防止（2026-07-21）。
  // 先客が後で退店する「次席予約(時間差)」なら、いまは来店にせず先客の退店後に来店させる運用へ誘導する。
  // 席設定側(submitSeatSession)の相席ガードと対称。相席を意図するなら従来どおりOKで通せる。
  if(s==='来店済み'){
    var _occ=[];
    rsvSeatCodes(r).forEach(function(code){
      var seat=SEATS.find(function(x){return x.code===code;}); if(!seat)return;
      (seat.occupants||[]).forEach(function(o){ if(o.rowIdx&&String(o.rowIdx)!==String(r.rowIdx||r.id)&&o.cust) _occ.push(o.cust); });
    });
    if(_occ.length){
      var _nm=_occ.filter(function(v,i,a){return a.indexOf(v)===i;}).map(function(n){return n+'様';}).join('、');
      if(!confirm('この予約席には既に '+_nm+' が着席中です。\n\nこのまま来店にすると、入れ替えではなく【相席】（同じ卓に2組）になります。\n\n先客が後で退店する「次席予約（時間差）」なら、いまは来店にせず、先客の退店後に来店させてください。\n\n相席として今すぐ来店にしますか？')) return;
    }
  }
  r.status=s;
  if(s==='来店済み') r.checkInAt=Date.now();          // 楽観的に来店時刻を記録（10分カウント開始）
  else if(s==='確定') r.checkInAt=null;               // 来店前に戻す＝時刻クリア
  applyRsvToHall(r,s); renderAll();
  if(IS_GAS) gsr('setKioskReservationStatus',r.rowIdx,s).then(function(res){
    if(res&&res.ok===false){ toast(res.error||'保存できません'); }
    loadAll();
  }).catch(function(e){ toast('保存エラー'); loadAll(); });
}
/* 予約テーブル文字列 → 席コード（バックエンド tableNameToSeatCode_ と同じ規則） */
function tblToCode(t){var m=String(t||'').match(/^(2F|5F)\s*(カウンター|ボックス)(\d+)$/);return m?(m[1]+'-'+(m[2]==='カウンター'?'C':'B')+m[3]):null;}
function rsvSeatCodes(r){return String(r.table||'').split(/[、,]/).map(function(t){return tblToCode(t.trim());}).filter(Boolean);}
/* 来店/退店をホールにローカル即反映（サーバ確定を待たない・ローカル優先）。loadAll で後追い上書き。 */
function applyRsvToHall(r,status){
  if(!r.table||r.table==='未定')return;
  rsvSeatCodes(r).forEach(function(code){
    var seat=SEATS.find(function(x){return x.code===code;});if(!seat)return;
    if(status==='来店済み'){
      if(!seat.casts||!seat.casts.length){ seat.cust=r.cust?r.cust+' 様':'ご来店'; if(r.pax)seat.pax=r.pax; seat.tantou=r.tantou||seat.tantou||''; }
      else if(!seat.cust){ seat.cust=r.cust?r.cust+' 様':'ご来店'; }
    }else if(status==='退店済み'){
      seat.cust=''; seat.tantou=''; seat.casts=[]; seat.mergeWith=[];
    }else{ /* 確定=来店前へ戻す */
      if(!seat.casts||!seat.casts.length){ seat.cust=''; seat.tantou=''; }
    }
  });
}

      +'<div style="font-size:11px;color:#8a9ac0;margin:14px 0 4px;font-weight:700">担当キャストと残り時間 <span style="color:#6a7a9a;font-weight:600">（タップで延長・抜く）</span></div>'
      +s.casts.map(function(c){var col=c.status==='over'?'#ee5a5a':c.status==='warn'?'#e6b23a':'#4dcc84';return '<div class="detcast" onclick="castAction('+idx+',\''+jsStr(c.n)+'\')" style="cursor:pointer"><span style="font-weight:700">'+esc(c.n)+'</span><span><span style="color:'+col+';font-weight:800">'+(c.mins<0?'超過 '+(-c.mins)+'分':'残り '+c.mins+'分')+'</span><span style="color:#5a6a8a;font-size:15px;margin-left:8px">›</span></span></div>';}).join('')

// 席詳細の「🚪退店」ボタン（単一組のみ。相席=複数組は coSeatDetailHtml が組別に出す）。
// 予約行(rowIdx)が特定できない席では出さない＝誤って別の客を退店させる事故を防ぐ。
function seatCheckoutBtnHtml(s){
  var occ=s.occupants||[];
  if(occ.length!==1) return '';           // 0組(空席)や相席(>1)はここでは出さない
  var o=occ[0]; if(!o||!o.rowIdx) return '';

// 席詳細: 相席（複数組）の一覧＋組ごとの退店ボタン（単一組なら何も出さない）
function coSeatDetailHtml(s){

function seatGroupCheckout(rowIdx,cust){

}
/* ============ 👥 他の席と合わせる（相席・別伝票のまま同卓）============
 * 席詳細 → 合わせる相手（🟢来店中の組 / ⏳未来店の予約）を選ぶ → 合流先の席を選ぶ → 相席。
 * ・未来店の予約 = setupTableSession（checkInReservation_ が占有席でも upsert＝相席／バックエンド既存）
 * ・来店中の組  = kioskChangeTable(..,allowMerge=true)（占有席への移動＝相席／allowMerge新設）
 * 売上・伝票・来店回数は組ごとに別のまま（＝「分ける」運用。まとめる=1伝票化は非対応） */
var coSeatSel=null;
function coSeatCands(){
  var out=[]; SEATS.forEach(function(s,i){ if(!coSeatSel||i===coSeatSel.aIdx)return; if(s.type==='W'||s.type==='K')return; if(s.mergedTo!=null)return;
    var occ=(s.occupants&&s.occupants.length)||s.cust||(s.casts&&s.casts.length); if(occ)out.push({i:i,s:s}); }); return out;
}
function startCoSeat(idx){
  var s=SEATS[idx];
  coSeatSel={aIdx:idx,aCode:s.code,aLabel:s.floor+' '+shortNm(s.name),partner:null,pending:[]};
  renderCoSeatPick();
  if(IS_GAS){ gsr('getTodayPendingReservations').then(function(list){ if(coSeatSel){coSeatSel.pending=list||[];renderCoSeatPick();} }).catch(function(){ if(coSeatSel){coSeatSel.pending=[];renderCoSeatPick();} }); }
  else { coSeatSel.pending=RSV.filter(function(r){return r.status==='確定';}).map(function(r){return {rowIdx:r.id,customer:r.cust,memberId:r.mem,pax:r.pax,tantouCast:r.tantou,time:r.time,table:r.table};}); renderCoSeatPick(); }
}
function coSeatCancel(idx){ coSeatSel=null; openSeat(idx); }
function renderCoSeatPick(){
  if(!coSeatSel)return; var cs=coSeatSel; var occ=coSeatCands();
  var h='<div class="kv"><span class="k">ベース席</span><span class="v">🪑 '+esc(cs.aLabel)+'</span></div>'
    +'<div style="font-size:11px;color:#8a9ac0;margin:6px 0 12px">別々の伝票のまま、同じ卓に相席させます。まず<b>合わせる相手</b>を選んでください。</div>';
  h+='<div class="flabel">🟢 来店中の組と合わせる</div>';
  h+= occ.length? occ.map(function(o){return '<div class="af-res" onclick="coSeatPickSeat('+o.i+')"><div class="af-res-top"><span class="cc-nm">'+esc(o.s.cust||'来店中')+'</span> <span class="rb">'+esc(o.s.floor+' '+shortNm(o.s.name))+'</span>'+(o.s.pax?' <span class="rb">'+o.s.pax+'名</span>':'')+'</div></div>';}).join('') : '<div class="empty-msg" style="padding:10px;font-size:12px">他に来店中の席はありません</div>';
  h+='<div class="flabel" style="margin-top:14px">⏳ 未来店の予約と合わせる</div>';
  h+= cs.pending.length? cs.pending.map(function(r){return '<div class="af-res" onclick="coSeatPickRsv('+r.rowIdx+')"><div class="af-res-top"><span class="cc-nm">'+esc(r.customer)+' 様</span> <span class="rb">'+esc(rsvArrT(r))+'</span> <span class="rb">'+(r.pax||1)+'名</span>'+(r.tantouCast?' <span class="rb t">担当 '+esc(r.tantouCast)+'</span>':'')+'</div></div>';}).join('') : '<div class="empty-msg" style="padding:10px;font-size:12px">未来店の予約はありません</div>';
  h+='<div class="actions" style="margin-top:16px"><div class="act" onclick="coSeatCancel('+cs.aIdx+')">← 席の詳細へ戻る</div></div>';
  showSheet('👥 '+cs.aLabel+' に合わせる',h,false);
}
function coSeatPickSeat(bIdx){ var b=SEATS[bIdx]; coSeatSel.partner={type:'seat',idx:bIdx,code:b.code,label:b.floor+' '+shortNm(b.name),cust:b.cust||'来店中'}; renderCoSeatDest(); }
function coSeatPickRsv(rowIdx){ var r=coSeatSel.pending.filter(function(x){return x.rowIdx===rowIdx;})[0]; if(!r)return; coSeatSel.partner={type:'rsv',rowIdx:rowIdx,customer:r.customer,memberId:r.memberId,pax:r.pax,tantouCast:r.tantouCast,label:(r.customer||'')+'様'}; renderCoSeatDest(); }
function renderCoSeatDest(){
  var cs=coSeatSel,p=cs&&cs.partner; if(!p)return;
  var h='<div class="kv"><span class="k">ベース席</span><span class="v">🪑 '+esc(cs.aLabel)+'</span></div>'
    +'<div class="kv"><span class="k">合わせる相手</span><span class="v">'+(p.type==='rsv'?'⏳ ':'🟢 ')+esc(p.label)+'</span></div>'

function coSeatExec(destCode){
  var cs=coSeatSel,p=cs&&cs.partner; if(!p)return;
  var dest=SEATS.filter(function(s){return s.code===destCode;})[0];
  var destLabel=dest?(dest.floor+' '+shortNm(dest.name)):destCode;
  var destTbl=codeToTbl(destCode);
  if(!confirm(p.label+' を '+destLabel+' に相席させます。\n売上・伝票は別々のままです。よろしいですか？')) return;
  if(!IS_GAS){ toast('（ローカル）'+destLabel+' に相席にしました'); coSeatSel=null; closeSheet(); return; }
  var tasks=[];
  if(p.type==='rsv'){
    tasks.push(gsr('setupTableSession',{rowIdx:p.rowIdx,customer:String(p.customer||'').replace(/\s*様\s*$/,''),memberId:p.memberId||'',pax:parseInt(p.pax)||1,tables:[destTbl].filter(Boolean),tantouCast:String(p.tantouCast||'').split('、').filter(Boolean),dohanCast:[],yoyakuCast:''}));
  } else {
    var loserIdx=(destCode===cs.aCode)?p.idx:cs.aIdx; var loser=SEATS[loserIdx];
    (loser.occupants||[]).forEach(function(o){ if(o.rowIdx) tasks.push(gsr('kioskChangeTable',loser.code,destCode,o.rowIdx,true)); });
    if(!tasks.length){ toast('相手の組を特定できませんでした（相席は予約行のある組のみ）'); return; }
  }
  coSeatSel=null; closeSheet(); toast('👥 相席にしています…');
  Promise.all(tasks).then(function(rs){ var bad=(rs||[]).filter(function(r){return r&&r.ok===false;})[0]; if(bad){ toast('相席に失敗: '+(bad.error||'')); } else { toast('✅ '+destLabel+' に相席にしました'); } loadAll(); }).catch(function(){ toast('相席に失敗しました'); loadAll(); });
}
/* 席詳細でキャストをタップ → 延長 / 抜く を選択 */
function castAction(idx,castName){
  var s=SEATS[idx]; if(!s)return;
  var c=(s.casts||[]).find(function(x){return x.n===castName;});
  var remain=c?(c.mins<0?'超過 '+(-c.mins)+'分':'残り '+c.mins+'分'):'';
  var body='<div style="text-align:center;margin:2px 0 4px"><div style="font-size:20px;font-weight:800;color:var(--txt)">'+esc(castName)+'</div><div style="color:var(--sub);font-size:13px;margin-top:4px">'+esc(shortNm(s.name))+(remain?'　/　'+remain:'')+'</div></div>'
    +'<div style="font-size:12px;color:#8a9ac0;margin:18px 0 6px;font-weight:700">⏳ 延長する（現状に加算）</div>'
    +'<div class="chips">'+[15,30].map(function(m){return '<div class="chip" style="border-color:#2a6a44;color:#8fe0b0" onclick="extendCast('+idx+',\''+jsStr(castName)+'\','+m+')">＋'+m+'分</div>';}).join('')+'</div>'
    +'<div class="actions" style="margin-top:20px"><div class="act dng" onclick="removeCast('+idx+',\''+jsStr(castName)+'\')">🚪 この席から抜く</div><div class="act" onclick="openSeat('+idx+')">← 戻る</div></div>';
  showSheet('キャスト操作',body,false);
}
function extendCast(idx,castName,mins){
  var s=SEATS[idx]; if(!s)return;
  var c=(s.casts||[]).find(function(x){return x.n===castName;});
  if(c){ c.mins=(c.mins||0)+mins; c.status=(c.mins<0?'over':c.mins<=5?'warn':'ok'); }
  renderAll();
  toast('⏳ '+castName+' を +'+mins+'分 延長しました'+(c?'（残り '+c.mins+'分）':''));
  openSeat(idx); // 席詳細に戻す（延長後の残り時間が見える）
  if(IS_GAS) gsr('kioskExtendAtendouAtSeat',s.code,castName,mins).then(function(res){ if(res&&res.ok===false){toast('延長できませんでした: '+(res.error||'')); } loadAll(); }).catch(function(e){toast('延長エラー: '+((e&&e.message)||e));loadAll();});
}
function removeCast(idx,castName){
  if(!confirm(castName+' さんをこの席から抜きますか？'))return;
  var s=SEATS[idx]; if(!s)return;
  s.casts=(s.casts||[]).filter(function(x){return x.n!==castName;});
  renderAll();
  if(IS_GAS) gsr('kioskEndAtendouAtSeat',s.code,castName).then(function(res){ if(res&&res.ok===false)toast('抜けませんでした: '+(res.error||'対象が見つかりません')); else toast('🚪 '+castName+' を抜きました'); loadAll(); openSeat(idx); }).catch(function(e){toast('抜くエラー: '+((e&&e.message)||e));loadAll();});
  else { toast('🚪 '+castName+' を抜きました'); openSeat(idx); }
}

/* ============ 🪑 席設定（テーブル設定：予約から / 飛び込み新規） ============ */
var seatSel=null;
function codeToTbl(code){var m=String(code||'').match(/^(2F|5F)-([CB])(\d+)$/);return m?(m[1]+' '+(m[2]==='C'?'カウンター':'ボックス')+m[3]):null;}
/* 表示中の予約(RSV)から「来店中」の組を席設定の候補として作る。
 * ⚠️getTodayPendingReservations は status==='確定'（未来店）しか返さない＝既に来店している組は選べない。
 *   客名を失った席（「ご来店」表示）を正しいお客様へ付け直すには来店中の組が要るので、
 *   サーバを増やさずクライアントのRSVから作る。同伴・予約キャストも持ち回して消さない。 */
function rsvSeatedList_(){
  return (RSV||[]).filter(function(r){return r.status==='来店済み'&&(r.rowIdx||r.id);}).map(function(r){
    return {rowIdx:r.rowIdx||r.id,customer:r.cust,memberId:r.mem,pax:r.pax,tantouCast:r.tantou,
            dohanCast:r.dohan,yoyakuCast:r.yoyaku,time:r.time,table:r.table,seated:true};
  });
}
function openSeatSession(idx, initMode){
  var s=SEATS[idx];
  var tbl=codeToTbl(s.code);
  var occupied=!!(s.cust||(s.casts&&s.casts.length));
  seatSel={seatIdx:idx,seatCode:s.code,seatLabel:s.floor+' '+shortNm(s.name),tblName:tbl,
    mode:initMode||null,rowIdx:0,customer:'',member:'',newCust:false,pax:2,tantou:[],dohan:[],yoyaku:'',
    pending:[],seated:rsvSeatedList_(),_busy:false};
  showSheet('🪑 '+seatSel.seatLabel+(occupied?' のお客様を設定・変更':' の席設定'),'<div class="empty-msg">読み込み中...</div>',false);
  if(IS_GAS){
    gsr('getTodayPendingReservations').then(function(list){ seatSel.pending=(list||[]); renderSeatSession(); }).catch(function(){ seatSel.pending=[]; renderSeatSession(); });
  }else{
    seatSel.pending=RSV.filter(function(r){return r.status==='確定';}).map(function(r){return {rowIdx:r.id,customer:r.cust,memberId:r.mem,pax:r.pax,tantouCast:r.tantou,dohanCast:r.dohan,yoyakuCast:r.yoyaku,time:r.time,table:r.table};});

function renderSeatSession(){

    h+='<div class="flabel">担当キャスト（任意）</div><div class="chips">'+CASTS.map(function(c){return '<div class="chip cast'+(ss.tantou.indexOf(c)>=0?' sel':'')+'" onclick="ssTantou(this,\''+jsStr(c)+'\')">'+esc(c)+'</div>';}).join('')+'</div>';

function ssSyncName(){ var n=document.getElementById('ss-name'); if(n)seatSel.customer=n.value; }
function ssMode(m){ ssSyncName(); seatSel.mode=m; renderSeatSession(); if(m==='search'){setTimeout(function(){var i=document.getElementById('ss-q');if(i)i.focus();},30);} }
function ssReset(){ seatSel.mode=null; seatSel.rowIdx=0; seatSel.customer=''; seatSel.member=''; seatSel.newCust=false; seatSel.seatedPick=false; seatSel.dohan=[]; seatSel.yoyaku=''; renderSeatSession(); }
function ssPickRsv(rowIdx){

  seatSel.dohan=r.dohanCast?String(r.dohanCast).split('、').filter(Boolean):[];

function submitSeatSession(){
  var ss=seatSel; ssSyncName();
  var name=(ss.customer||'').replace(/\s*様\s*$/,'').trim();
  if(ss.mode==='new'){ ss.newCust=true; if(!name)name='フリー'; }
  if(!name){ alert('お客様を選ぶか、新規のお名前を入力してください'); return; }
  // 既に別の組が着席している席へ別のお客様を設定すると「入れ替え」ではなく相席（同卓2組）になる。
  // バックエンド(checkInReservation_)がrowIdx単位のupsert＝上書きしない仕様なので、ここで必ず断る。
  var curSeat=SEATS[ss.seatIdx];
  var others=((curSeat&&curSeat.occupants)||[]).filter(function(o){return o.rowIdx&&String(o.rowIdx)!==String(ss.rowIdx||0);});
  if(others.length){
    var on=others.map(function(o){return (o.cust||'')+'様';}).join('、');

  }
  var payload={rowIdx:ss.rowIdx||0,customer:name,memberId:ss.member||'',pax:parseInt(ss.pax)||1,tables:[ss.tblName].filter(Boolean),tantouCast:ss.tantou.slice(),dohanCast:(ss.dohan||[]).slice(),yoyakuCast:ss.yoyaku||''};

    if(res&&res.ok===false){ ss._busy=false; alert('エラー: '+(res.error||'')); loadAll(); return; }
    toast('✅ '+name+'様の席を設定しました'); closeSheet(); loadAll();
  }).catch(function(){ ss._busy=false; toast('保存エラー'); loadAll(); });
}

/* ============ 🔄 付け回し（席詳細からワンタップで付ける／動かす） ============ */
/* キャストが今どの席にいるか（表示用ラベル） */
function castSeatLabel(name){ for(var i=0;i<SEATS.length;i++){ if((SEATS[i].casts||[]).some(function(c){return c.n===name;})) return shortNm(SEATS[i].name); } return ''; }

function rotPickerHtml(idx){

/* ワンタップ付け回し: castName を toIdx の席へ（他席にいれば移動、いなければ新規配置）。ローカル優先。 */
function quickRotate(toIdx,castName){
  var to=SEATS[toIdx];
  var fromIdx=-1,fromCi=-1;
  SEATS.forEach(function(s,i){ (s.casts||[]).forEach(function(c,ci){ if(c.n===castName){fromIdx=i;fromCi=ci;} }); });
  var fromCode=(fromIdx>=0)?(SEATS[fromIdx].code||''):'';
  var moved=(fromIdx>=0)?SEATS[fromIdx].casts.splice(fromCi,1)[0]:{n:castName};
  moved.mins=moved.unlimited?0:30; moved.status='ok';
  to.casts=to.casts||[]; to.casts.push(moved);
  renderAll(); openSeat(toIdx); // 詳細を最新状態で再描画
  if(IS_GAS) gsr('kioskRotateCast',castName,fromCode,to.code,shortNm(to.name)).then(loadAll).catch(function(){toast('保存エラー');loadAll();});
  else toast('🔄 '+castName+' を付けました');
}

function openSchedule(){

  var hdr='<div class="g-hd"><div class="g-corner">卓</div>';

    rows+='<div class="g-flr">'+fl+'</div>';
    (fl==='2F'?TABLES_2F:TABLES_5F).forEach(function(tn){
      var full=fl+' '+tn,blk='';
      RSV.forEach(function(r){
        if(r.table!==full)return;
        var p=rsvArrT(r).split(':'),hh=parseInt(p[0]);if(hh<6)hh+=24;var mm=hh*60+(parseInt(p[1])||0);
        var l=((mm-SH*60)/((EH-SH)*60))*100,w=(120/((EH-SH)*60))*100;if(l<0){w+=l;l=0;}
        var col=r.status==='退店済み'?'background:#181828;border:1px solid #2a2a44':r.status==='来店済み'?'background:#0d2618;border:1px solid #2a6a44':'background:#12233f;border:1px solid #2a5590';
        blk+='<div class="g-blk" style="left:'+l+'%;width:'+w+'%;'+col+'" onclick="editRsv('+r.id+')"><span class="bn">'+esc(r.cust)+'様</span><span class="bp">'+r.pax+'名 '+esc(rsvArrT(r))+'</span></div>';
      });
      var cells='';for(var c=0;c<(EH-SH);c++)cells+='<div class="g-cell"></div>';
      rows+='<div class="g-row"><div class="g-lbl">'+esc(tn.replace('カウンター','カウ'))+'</div><div class="g-track">'+cells+blk+'</div></div>';
    });
  });
  showSheet('🗓 本日のスケジュール',' <div class="gantt"><div class="g-inner">'+hdr+rows+'</div></div>',true);
}

function renewStatus(fd){
  if(!fd) return 'none';
  var p=String(fd).split(/[\/\-\.]/); if(p.length<2)return 'none';
  var fy=parseInt(p[0]), fm=parseInt(p[1]); if(!(fy>1900&&fm>=1))return 'none';
  var n=new Date();
  var ms=(n.getFullYear()*12+(n.getMonth()+1))-(fy*12+fm); // 前回更新からの経過月数
  if(ms>=13) return 'expired';   // 13か月以上 → 会員更新切れ
  if(ms>=12) return 'thismonth'; // 12か月ちょうど（更新月） → 今月更新
  return 'ok';
}
// 会員情報の算出（月単位）: ◯年目 / 会員期限(前回更新+1年) / ステータス
//  前回更新からの経過月数で判定: 12か月ちょうど(＝更新月)=🟡今月更新 / 13か月以上=🔴会員更新切れ / それ未満=🟢有効
function membershipInfo(joined, feeDate){
  var info={yearLabel:'', renewalStr:'', status:'none', monthsSince:null, statusLabel:'', shortLabel:''};
  if(joined){ var jy=parseInt(String(joined).split(/[\/\-\.]/)[0]); if(jy>1900){ var y=(new Date()).getFullYear()-jy+1; if(y>=1) info.yearLabel=y+'年目'; } }
  if(feeDate){
    var p=String(feeDate).split(/[\/\-\.]/);
    if(p.length>=2){
      var ry=parseInt(p[0]), rm=parseInt(p[1]);
      if(ry>1900&&rm>=1){
        var today=new Date();
        var ms=(today.getFullYear()*12+(today.getMonth()+1))-(ry*12+rm); // 経過月数
        info.monthsSince=ms;
        info.renewalStr=(ry+1)+'/'+rm; // 更新期限（前回更新+1年）
        if(ms>=13){ info.status='expired'; info.statusLabel='🔴 会員更新切れ'; info.shortLabel='更新切れ'; }
        else if(ms>=12){ info.status='thismonth'; info.statusLabel='🟡 今月更新'; info.shortLabel='今月更新'; }
        else { info.status='ok'; info.statusLabel='🟢 有効会員'; info.shortLabel='有効会員'; }
      }
    }
  }
  if(info.status==='none'){ info.statusLabel='⚪ 未会員'; info.shortLabel='未会員'; } // 会費・登録日なし＝未会員
  return info;
}

function rcptBuildXmlLandscape_(o){
  // 横向き領収証（ePOSページモード・90度回転）。★実機の試し刷りで下の TUNE を微調整（dir/AW/AH/top/left/base/gap）。
  var TUNE={ dir:'right', AW:512, AH:980, top:14, left:14, base:22, gap:8 };
  var esc2=function(s){ return esc(String(s)); };
  var rows=[];
  var add=function(size,em,text){ rows.push({s:size,em:em,t:text}); };
  add(3,true,'領 収 証');
  add(1,false,'No. '+rcptNo_(o.iso)+'     '+rcptJp_(o.iso));
  add(2,true,(o.atena||'')+'　');
  add(4,true,'￥ '+(o.amount||0).toLocaleString('ja-JP')+' 也');
  add(1,false,'但し  '+(o.tada||'')+'  上記正に領収いたしました');
  if(!RCPT_CASH) add(1,false,'※クレジットカード利用のため収入印紙不要');
  else if(o.inshi===0) add(1,false,'※税抜5万円未満につき収入印紙不要（非課税）');
  else add(1,false,'収入印紙 '+rcptYen_(o.inshi)+' 貼付');
  add(1,false,'税抜 '+rcptYen_(o.taxExcl)+'   消費税(10%) '+rcptYen_(o.tax));
  add(1,false,RCPT_ISSUER.name+'   '+(RCPT_ISSUER.addr||''));
  add(1,false,'登録番号 '+RCPT_ISSUER.invoiceNo);
  var L=[];
  L.push('<epos-print xmlns="http://www.epson-pos.com/schemas/2011/03/epos-print">');
  L.push('<text lang="ja"/>');
  L.push('<page>');
  L.push('<area x="0" y="0" width="'+TUNE.AW+'" height="'+TUNE.AH+'"/>');
  L.push('<direction dir="'+TUNE.dir+'"/>');
  var x=TUNE.top;
  rows.forEach(function(r){
    L.push('<position x="'+x+'" y="'+TUNE.left+'"/>');
    L.push('<text width="'+r.s+'" height="'+r.s+'"'+(r.em?' em="true"':'')+'>'+esc2(r.t)+'</text>');
    x += TUNE.base*r.s + TUNE.gap;
  });
  L.push('</page>');
  L.push('<feed unit="24"/>');
  L.push('<cut type="feed"/>');
  L.push('</epos-print>');
  return L.join('');
}

/* ===== 横向き領収書＝画像印字（プリンターが回転命令を無視するため、横長に組んだ画像を刷る） ===== */
function rcptLandscapeCanvas_(o){
  var W=1000, H=340;                     // 横幅1.5倍・余白詰め。H=紙幅方向→回転後の印字幅(≤512)。URLは約60KB
  var c=document.createElement('canvas'); c.width=W; c.height=H;
  var g=c.getContext('2d');
  g.fillStyle='#fff'; g.fillRect(0,0,W,H);
  g.fillStyle='#000'; g.strokeStyle='#000'; g.lineWidth=1.5; g.textBaseline='alphabetic';
  var yen=function(n){ return '¥'+(Number(n)||0).toLocaleString('ja-JP'); };
  g.font='bold 42px "Hiragino Mincho ProN","YuMincho",serif'; g.fillText('領 収 証', 30, 62);
  g.font='26px sans-serif'; g.fillText(String(o.atena||''), 280, 56);
  g.beginPath(); g.moveTo(275,64); g.lineTo(760,64); g.stroke();
  g.font='14px sans-serif'; g.textAlign='right'; g.fillText('No. '+rcptNo_(o.iso), 988, 28); g.fillText(rcptJp_(o.iso), 988, 48); g.textAlign='left';
  g.font='bold 44px sans-serif'; g.fillText('￥ '+(Number(o.amount)||0).toLocaleString('ja-JP')+' -', 56, 140);
  g.font='14px sans-serif'; g.fillText('税抜額   '+yen(o.taxExcl), 770, 118); g.fillText('消費税等 '+yen(o.tax), 770, 142);
  g.font='17px sans-serif'; g.fillText('但  '+String(o.tada||''), 30, 196);
  g.fillText(rcptJp_(o.iso)+'　上記正に領収いたしました', 30, 228);
  g.strokeRect(850, 102, 122, 58); g.textAlign='center'; g.font='13px sans-serif';
  if(RCPT_CASH && Number(o.inshi)>0){ g.fillText('収入印紙', 911, 128); g.fillText(yen(o.inshi), 911, 148); } else { g.fillText('印紙不要', 911, 136); }
  g.textAlign='left';
  g.strokeRect(30, 258, 580, 72);
  g.font='bold 20px "Hiragino Mincho ProN",serif'; g.fillText(String(RCPT_ISSUER.name||''), 46, 288);
  g.font='14px sans-serif'; g.fillText(String(RCPT_ISSUER.addr||''), 46, 310); g.fillText('登録番号 '+String(RCPT_ISSUER.invoiceNo||''), 46, 330);
  g.strokeRect(880, 258, 68, 68); g.textAlign='center'; g.font='12px sans-serif'; g.fillText('印', 914, 298); g.textAlign='left';
  return c;
}
function rcptCanvasToEposXml_(c){
  var w=c.width, h=c.height, d=c.getContext('2d').getImageData(0,0,w,h).data;
  var bpr=Math.ceil(w/8), R=new Uint8Array(bpr*h);
  for(var y=0;y<h;y++){ for(var x=0;x<w;x++){ var i=(y*w+x)*4; if(d[i+3]>128 && (d[i]+d[i+1]+d[i+2])/3<128) R[y*bpr+(x>>3)] |= (0x80>>(x&7)); } }
  var s=''; for(var k=0;k<R.length;k++) s+=String.fromCharCode(R[k]);
  return '<epos-print xmlns="http://www.epson-pos.com/schemas/2011/03/epos-print">'
    +'<image width="'+w+'" height="'+h+'" color="color_1" mode="mono" align="center">'+btoa(s)+'</image>'
    +'<feed unit="24"/><cut type="feed"/></epos-print>';
}
function rcptLandscapePrintXml_(o){
  var c=rcptLandscapeCanvas_(o);
  var r=document.createElement('canvas'); r.width=c.height; r.height=c.width;   // 90度回転
  var rg=r.getContext('2d'); rg.fillStyle='#fff'; rg.fillRect(0,0,r.width,r.height);
  rg.translate(r.width,0); rg.rotate(Math.PI/2); rg.drawImage(c,0,0);
  return rcptCanvasToEposXml_(r);
}

  var hint=document.getElementById('rcpt-hint'); if(hint)hint.textContent='TM Print Assistant を起動します…（横向きは画像印字のため数秒かかることがあります）';

var GFR_DATA=null, GFR_SEL=null, GFR_Q='', GFR_MODE='due'; // 'due'=会費の期限の人(未更新) / 'done'=すでに更新済み
function openFeeRenew(){

  document.getElementById('menuOverlay').classList.add('show'); renderMenu();
  if(!IS_GAS){ var d=new Date(); GFR_DATA={ok:true,todayYm:d.getFullYear()*12+d.getMonth()+1,members:[]}; GFR_SEL=GFR_DATA.todayYm; renderMenu(); return; }
  gsr('getMemberRenewals').then(function(r){
    GFR_DATA=(r&&r.ok!==false)?r:{ok:true,todayYm:0,members:[]};

  }).catch(function(){ var el=document.getElementById('menu-body'); if(el)el.innerHTML='<span class="menu-back" onclick="menuView=\'grid\';renderMenu()">← メニューに戻る</span><div class="empty-msg" style="padding:24px">読み込みエラー</div>'; });
}
function gfrYmLabel_(ym){ var y=Math.floor((ym-1)/12), m=((ym-1)%12)+1; return y+'年'+m+'月'; }
function gfrStChip_(s){
  if(s==='expired')   return '<span style="background:#3a1518;color:#ff9aa0;border-radius:999px;padding:1px 8px;font-size:11px;font-weight:800">🔴更新切れ</span>';
  if(s==='thismonth') return '<span style="background:#3a2f10;color:#e6c14a;border-radius:999px;padding:1px 8px;font-size:11px;font-weight:800">🟡今月更新</span>';
  return '<span style="background:#12301f;color:#7fdca0;border-radius:999px;padding:1px 8px;font-size:11px;font-weight:800">🟢有効</span>';
}
function gfrShown_(){
  var r=GFR_DATA||{}, today=r.todayYm||0, members=r.members||[];
  var q=(GFR_Q||'').replace(/\s/g,''), shown;
  if(q){ shown=members.filter(function(x){return (x.name&&x.name.replace(/\s/g,'').indexOf(q)>=0)||(x.no&&String(x.no).indexOf(q)>=0);}); }
  else if(GFR_SEL==='overdue'){ shown=members.filter(function(x){return x.dueYm<today;}); }
  else if(GFR_MODE==='done'){ shown=members.filter(function(x){return x.feeYm===GFR_SEL;}); }  // その月に更新済み
  else { shown=members.filter(function(x){return x.dueYm===GFR_SEL;}); }                          // その月が期限＝未更新
  shown.sort(function(a,b){ return (a.dueYm-b.dueYm)||String(a.name).localeCompare(String(b.name)); });
  return shown;
}
function gfrRows_(){
  var shown=gfrShown_();
  var head=(GFR_Q?('検索「'+esc(GFR_Q)+'」'):(GFR_SEL==='overdue'?'🔴 更新切れ':gfrYmLabel_(GFR_SEL)+'に更新期限'))+'：'+shown.length+'名';
  var rows=shown.map(function(c){
    var no=c.no?(' <span style="color:#8aa8c8;font-size:12px">#'+esc(c.no)+'</span>'):'';
    var tantou=c.tantou?('担当 '+esc(c.tantou)):'担当なし';
    return '<div style="padding:10px 12px;border:1px solid #23324a;border-radius:10px;margin-bottom:6px;background:#0e1626">'
      +'<div style="font-weight:800">'+esc(c.name)+no+' '+gfrStChip_(c.status)+'</div>'
      +'<div style="font-size:12px;color:#8aa8c8;margin-top:2px">前回更新 '+esc(c.feeDate||'—')+' ・ 次回期限 '+esc(c.exp||'—')+' ・ '+esc(tantou)+'</div></div>';
  }).join('')||'<div class="empty-msg" style="padding:20px">該当する会員はいません</div>';
  return '<div style="font-size:12px;color:#9fb2c8;font-weight:700;margin:2px 2px 8px">'+head+'</div>'+rows;
}
function gfrHtml_(){
  var r=GFR_DATA||{}, today=r.todayYm||0, members=r.members||[];
  var overdue=members.filter(function(x){return x.dueYm<today;}).length;
  var chips='<span class="cfil'+(GFR_SEL==='overdue'?' on':'')+'" onclick="gfrSel(\'overdue\')">🔴 更新切れ '+overdue+'</span>';
  for(var i=0;i<12;i++){ var ym=today+i; var cnt=members.filter(function(x){return x.dueYm===ym;}).length;

    chips+='<span class="cfil'+(GFR_SEL===ym?' on':'')+'" onclick="gfrSel('+ym+')">'+lbl+' '+cnt+'</span>'; }
  var subchips='';
  if(GFR_SEL!=='overdue'){ // 月選択時：期限の人（未更新）／すでに更新済み
    var dueN=members.filter(function(x){return x.dueYm===GFR_SEL;}).length;
    var doneN=members.filter(function(x){return x.feeYm===GFR_SEL;}).length;
    subchips='<div class="cust-filters" style="flex-wrap:wrap;margin-top:4px">'
      +'<span class="cfil'+(GFR_MODE!=='done'?' on':'')+'" onclick="gfrMode(\'due\')">🟡 期限の人（未更新）'+dueN+'</span>'
      +'<span class="cfil'+(GFR_MODE==='done'?' on':'')+'" onclick="gfrMode(\'done\')">🟢 すでに更新済み '+doneN+'</span></div>';
  }
  return '<span class="menu-back" onclick="menuView=\'grid\';renderMenu()">← メニューに戻る</span>'
    +'<input id="gfr-q" class="cust-q" placeholder="会員名・会員番号で検索" oninput="gfrSearch()">'
    +'<div class="cust-filters" style="flex-wrap:wrap">'+chips+'</div>'+subchips
    +'<div id="gfr-results" class="cust-results">'+gfrRows_()+'</div>';
}
function gfrSel(v){ GFR_SEL=v; GFR_Q=''; GFR_MODE='due'; renderMenu(); } // 月を変えたら「期限の人」に戻す
function gfrMode(m){ GFR_MODE=m; renderMenu(); }
function gfrSearch(){ var el=document.getElementById('gfr-q'); GFR_Q=el?el.value:''; var res=document.getElementById('gfr-results'); if(res)res.innerHTML=gfrRows_(); }

      +'<div class="cust-browse">'

    +'<button class="savebtn" style="margin-top:16px" onclick="saveNewCustomer()">💾 この内容で登録</button>';
}
function saveNewCustomer(){
  var g=function(id){ return ((document.getElementById('nc-'+id)||{}).value||'').trim(); };
  var name=g('name'), card=g('card');
  if(!name && !card){ alert('氏名またはカード記載名を入力してください'); return; }
  var payload={ name:name, yomigana:g('yomigana'), card:card, tantou:g('tantou'), bottle:g('bottle'), pos:g('pos'), bday:g('bday'), company:g('company'), drink:g('drink'), tabaco:g('tabaco'), neck:g('neck'), ng:g('ng'), ngStaff:g('ngStaff'), note:g('note') };
  var btn=document.querySelector('#menu-body .savebtn'); if(btn){btn.disabled=true;btn.textContent='登録中...';}
  // 同名の登録があったとき：別人なら続けて登録、同じ人なら既存を確認へ戻す
  // （ボス報告2026-07-16: 別の同姓同名のお客様を登録したいのに完全ブロックで弾かれた→確認方式に変更）
  function showDup(m){
    m=m||{}; var who=(m.name||m.card||name||card);
    var info=(m.no?'（'+m.no+(m.tantou?'・担当 '+m.tantou:'')+'）':'');
    if(btn){btn.disabled=false;btn.textContent='💾 この内容で登録';} // 確認を出す前にボタンを戻す（「登録中…」の残留を防ぐ）
    var goRegister=confirm('「'+who+'」様は同名の登録があります'+info+'。\n\n【別人】を新しく登録するなら「OK」\n【同じ方】なら「キャンセル」して既存をご確認ください');
    if(!goRegister){ custLastQ=who; menuCustomer(); return; } // 同じ方＝既存の検索へ
    if(!IS_GAS){ toast('（ローカル）別人として登録: '+who); custLastQ=who; menuCustomer(); return; }
    payload.force=true; // 重複チェックを飛ばして別人として登録
    if(btn){btn.disabled=true;btn.textContent='登録中...';}
    gsr('addCustomer',payload).then(function(res){
      if(res&&res.ok){ toast('✅ 別人として登録しました'); custLastQ=who; menuCustomer(); }
      else { alert('登録エラー: '+((res&&res.error)||'')); if(btn){btn.disabled=false;btn.textContent='💾 この内容で登録';} }
    }).catch(function(e){ alert('登録エラー: '+((e&&e.message)||e)); if(btn){btn.disabled=false;btn.textContent='💾 この内容で登録';} });
  }
  if(!IS_GAS){
    // ローカル検証用：モックCUSTOMERSに同名がいれば本番同様にブロックUIを出す（card列は無いのでname照合）
    var nk=function(s){return String(s||'').replace(/\s/g,'');};
    var dup=CUSTOMERS.filter(function(c){return (name&&nk(c.name)===nk(name))||(card&&nk(c.name)===nk(card));})[0];
    if(dup){ showDup({no:dup.member,name:dup.name,tantou:dup.tantou}); return; }
    toast('（ローカル）登録: '+(name||card)); custLastQ=name||card; menuCustomer(); return;
  }
  gsr('addCustomer',payload).then(function(res){
    if(res&&res.ok){ toast('✅ お客様を登録しました'); custLastQ=name||card; menuCustomer(); }
    else if(res&&res.duplicate){ showDup(res.match); }
    else { alert('登録エラー: '+((res&&res.error)||'')); if(btn){btn.disabled=false;btn.textContent='💾 この内容で登録';} }
  }).catch(function(e){ alert('登録エラー: '+((e&&e.message)||e)); if(btn){btn.disabled=false;btn.textContent='💾 この内容で登録';} });
}
function custFilterFn(c){
  if(custF.expired && membershipInfo(c.joined,c.feeDate).status!=='expired') return false;
  if(custF.noline && !isNoLine(c)) return false;
  if(custF.bottle && !hasBottle_(c)) return false;
  if(custF.pos && bottlePosArea_(c)!==custF.pos) return false;
  return true;
}
/* ブラウズ中（検索窓が空＋会員切れ/LINE未登録/担当選択のいずれか）か */
function custIsBrowsing_(q){ return !q && custAnyFilter_(); }
/* ロースターからブラウズ条件で抽出（判定はフロントの membershipInfo に一元化＝既存カードと一致） */
function custBrowseList_(){
  return (CUST_ROSTER||[]).filter(function(c){
    if(custTantou && String(c.tantou||'').split('、').map(function(s){return s.trim();}).indexOf(custTantou)<0) return false;
    return custFilterFn(c);
  });
}
function renderCustResults(){
  var q=((document.getElementById('cust-q')||{}).value||'').trim();
  var el=document.getElementById('cust-results'); if(!el)return;
  // ── ブラウズ（会員切れ一覧／担当ごと一覧） ──
  if(custIsBrowsing_(q)){
    custLastQ='';
    if(IS_GAS && !CUST_ROSTER){ el.innerHTML='<div class="empty-msg">読み込み中...</div>'; loadCustRoster(function(){ if(menuView==='customer'&&custIsBrowsing_(((document.getElementById('cust-q')||{}).value||'').trim())) renderCustResults(); }); return; }
    var blist=custSortForBrowse_(custBrowseList_());
    el.innerHTML=custBrowseHeader_(blist.length)+(blist.length?custResultsHtml(blist):'<div class="empty-msg">該当のお客様はいません</div>');
    return;
  }
  // ── 検索 ──
  custLastQ=q;
  if(!q){ el.innerHTML='<div class="empty-msg" style="padding:16px;font-size:13px;line-height:1.8">お客様名・会員番号・担当名で検索、<br>または上のボタンで<b>会員切れ</b>／<b>担当ごと</b>の一覧を表示できます。</div>'; return; }
  if(IS_GAS){
    el.innerHTML='<div class="empty-msg">検索中...</div>';
    gsr('searchKioskCustomersV2', q, LOGIN, {withTantou:true}).then(function(list){
      var a=(list||[]).map(adaptCustomer).filter(custFilterFn);
      var cur=document.getElementById('cust-results'); if(cur) cur.innerHTML=custResultsHtml(a);
    }).catch(function(){ var cur=document.getElementById('cust-results'); if(cur) cur.innerHTML='<div class="empty-msg">検索エラー</div>'; });
    return;
  }
  // 本番(searchCustomersForYoyaku_)と同じ挙動：担当欄と完全一致した客が居れば「担当名検索」とみなし
  // 担当の客だけ、居なければ客名・会員番号で検索（担当名の部分一致で他の客に混ざらないようにする）
  var nk=function(s){return String(s||'').replace(/\s/g,'');};
  var tHits=q?CUSTOMERS.filter(function(c){return nk(c.tantou).split('、').indexOf(nk(q))>=0;}):[];
  var list=tHits.length ? tHits.filter(custFilterFn)
    : CUSTOMERS.filter(function(c){ if(q && !(c.name.indexOf(q)>=0||(c.member&&c.member.toLowerCase().indexOf(q.toLowerCase())>=0))) return false; return custFilterFn(c); });
  el.innerHTML=custResultsHtml(list);
}

      +(rs==='expired'?'<span class="cbd exp">🔴 会員更新切れ</span>':rs==='thismonth'?'<span class="cbd soon">🟡 今月更新</span>':rs==='ok'?'<span class="cbd okr">🟢 有効会員</span>':'<span class="cbd unmember">未会員</span>');

    if(c.ng) b+='<span class="cbd ng">🚫NG '+esc(c.ng)+'</span>';
    return '<div class="cust-card'+(rs==='expired'?' exp':'')+'" onclick="openCustDetail('+ci+')" style="cursor:pointer"><div class="cc-top"><span class="cc-nm">'+esc(c.name)+' 様</span><span class="cc-mem">'+esc(c.member||'—')+'</span>'+rb+'</div>'

// 顧客詳細（カードをタップ → お客様管理シートの全列を表示）
function openCustDetail(i){
  var c=custDetailList[i]; if(!c)return;

  var memBox=(c.joined||c.feeDate)?('<div style="background:var(--panel2);border:1px solid '+mbBorder+';border-radius:12px;padding:12px 14px;margin:4px 0 14px">'

    +(c.joined?'<div style="font-size:14px;margin-bottom:3px">入会日　<b>'+esc(c.joined)+'</b>'+(mi.yearLabel?' <span style="color:var(--accent)">（'+mi.yearLabel+'）</span>':'')+'</div>':'')
    +(c.feeDate?'<div style="font-size:14px;margin-bottom:3px">会費受領　<b>'+esc(c.feeDate)+'</b></div>':'')

// 来店日 'yyyy-MM-dd' → 'M/d' 表示（今年以外は yyyy/M/d）
function fmtVisitDate(d){
  var m=String(d||'').match(/^(\d{4})-(\d{2})-(\d{2})$/); if(!m)return String(d||'');
  var y=+m[1], mo=+m[2], da=+m[3];
  return (y===(new Date()).getFullYear())?(mo+'/'+da):(y+'/'+mo+'/'+da);
}

  {label:'カード記載名',key:'card'},{label:'氏名',key:'name'},{label:'よみがな',key:'yomigana'},
  {label:'会員番号',key:'no'},{label:'担当',key:'tantou'},{label:'ボトル種類',key:'bottle'},

// 年月のみ("2026/07")も年月日("2026-07-01")も date入力用 yyyy-MM-dd に正規化（日が無ければ1日）
function toDateInput(v){ var m=String(v||'').match(/(\d{4})[-\/.](\d{1,2})(?:[-\/.](\d{1,2}))?/); return m?(m[1]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+(m[3]||'1')).slice(-2)):''; }
function custValByLabel(label){
  var n=function(s){return String(s||'').replace(/\s/g,'');};
  var hit=(custDetailFields||[]).filter(function(f){return n(f.k).indexOf(n(label))>=0;})[0];
  return hit?hit.v:'';
}
function cvDateVal(v){ var m=String(v||'').match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/); return m?(m[1]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[3]).slice(-2)):''; }
function startCustEdit(){
  var el=document.getElementById('cust-detail-body'); if(!el)return;
  var h=CUST_EDIT_FIELDS.map(function(f){
    var v=custValByLabel(f.label), input;
    // 会員日付は詳細ヘッダー（解決済み）の値を優先してプレフィル
    if(f.key==='feeDate') v=(custDetailCur&&custDetailCur.feeDate)||v;
    else if(f.key==='memberSince') v=(custDetailCur&&custDetailCur.joined)||v;
    if(f.type==='area') input='<textarea id="ce-'+f.key+'" class="finput" rows="3" style="resize:none;width:100%;box-sizing:border-box">'+esc(v)+'</textarea>';
    else if(f.type==='date') input='<input id="ce-'+f.key+'" class="finput" type="date" style="width:100%;box-sizing:border-box" value="'+esc(toDateInput(v))+'">';
    else input='<input id="ce-'+f.key+'" class="finput" style="width:100%;box-sizing:border-box" value="'+esc(v)+'">';
    return '<div style="margin:9px 0"><div style="color:var(--dim);font-size:12px;margin-bottom:3px">'+esc(f.label)+'</div>'+input+'</div>';
  }).join('');
  el.innerHTML='<div style="padding:2px 0"><div style="font-size:13px;color:var(--accent);font-weight:800;margin-bottom:8px">✏️ 顧客情報の編集</div>'+h
    +'<div style="display:flex;gap:8px;margin-top:14px"><button class="nmemo-save" style="flex:1" onclick="saveCustEdit()">💾 保存</button>'
    +'<button class="menu-btn" style="flex:1" onclick="renderCustDetailFields(custDetailFields)">キャンセル</button></div></div>';
}
function saveCustEdit(){
  if(!custDetailRowIdx){alert('対象の顧客が特定できません');return;}
  var payload={};
  CUST_EDIT_FIELDS.forEach(function(f){ var e=document.getElementById('ce-'+f.key); if(e)payload[f.key]=e.value; });
  // 会員日付は空欄なら送らない（既存の入会日・年会費更新を誤って消さないため）
  if(!payload.feeDate) delete payload.feeDate;
  if(!payload.memberSince) delete payload.memberSince;
  var btn=document.querySelector('#cust-detail-body .nmemo-save'); if(btn){btn.disabled=true;btn.textContent='保存中...';}
  if(IS_GAS){
    gsr('kioskUpdateCustomer',custDetailRowIdx,payload).then(function(res){
      if(res&&res.ok){
        toast('✅ 顧客情報を更新しました');
        // 手元の表示も更新して再描画（ヘッダーと詳細を最新に）
        var c=custDetailCur; if(c){ c.name=payload.name||c.name; c.card=payload.card||c.card; c.member=payload.no||c.member; c.tantou=payload.tantou; c.bottle=payload.bottle; c.bottlePos=payload.pos; c.nomikata=payload.drink; c.tabako=payload.tabaco; c.ng=payload.ng; c.note=payload.note; if(payload.memberSince)c.joined=payload.memberSince; if(payload.feeDate)c.feeDate=payload.feeDate; }
        openCustDetail(custDetailIdx);
      } else { alert('更新エラー: '+((res&&res.error)||'')); if(btn){btn.disabled=false;btn.textContent='💾 保存';} }
    }).catch(function(e){ alert('更新エラー: '+((e&&e.message)||e)); if(btn){btn.disabled=false;btn.textContent='💾 保存';} });
  }else{ toast('✅ 更新（ローカル）'); renderCustDetailFields(custDetailFields); }
}

    +'<button id="bc-send" onclick="bcSend()" style="width:100%;padding:14px;border-radius:12px;border:1px solid #2a6a44;background:#0f2a1a;color:#7fe0a3;font-weight:800;font-size:16px;cursor:pointer">📢 送信する</button>'
    +'<div id="bc-result" style="font-size:13px;margin-top:12px;line-height:1.6"></div>';
  showSheet('📢 お知らせ配信',body,false);

  gsr('gunshiGetCastList').then(function(r){

    var un=(r.unregisteredNames||[]);
    el.innerHTML='送信先: <b>'+r.registered+'名</b>（LINE登録済みキャスト）'
      +(un.length?'<br><span style="color:#e0a060;font-size:12px">⚠️ LINE未登録で送れない '+un.length+'名: '+un.map(esc).join('、')+'</span>':'');
  }).catch(function(){ var el=document.getElementById('bc-to'); if(el)el.textContent='送信先の取得に失敗しました'; });
