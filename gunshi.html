var selCast=null, moveMode=false, combineMode=false, combinePrimary=null;
var tableMoveMode=false, tableMoveFrom=null;
var CAST_PALETTE=['#7ab0f0','#66cc88','#e6b23a','#e08ad0','#8fb0ff','#6fd0c0','#f0a060','#b090f0','#f08a8a','#9d90ee','#7cd0a0','#d0b060'];
function castColor(n){var s=0;for(var i=0;i<n.length;i++)s+=n.charCodeAt(i);return CAST_PALETTE[s%CAST_PALETTE.length];}
function castHere(s,name){return name&&(s.casts||[]).some(function(c){return c.n===name;});}
function chipHtml(name,ci,si,opts){
  opts=opts||{};
  var col=castColor(name);
  var sel=(selCast&&selCast.si===si&&selCast.ci===ci)?' sel':'';
  var role=opts.tantou?'<span class="role">担当</span>':'';
  var tm=opts.away?'':'<span class="tm">'+(opts.wait?(opts.mins+'分待機'):(opts.mins<0?'超'+(-opts.mins)+'分':'残'+opts.mins+'分'))+'</span>';
  var cls=(opts.away?'castchip awaychip':'castchip '+(opts.status==='over'?'s-over':opts.status==='warn'?'s-warn':'s-ok'))+(opts.tantou?' tantou':'')+sel;
  var onclick=opts.away?'onclick="tapAway(event)"':'onclick="tapCast('+si+','+ci+',event)"';
  var av=opts.away?'#8a7038':col;
  var awayLbl=opts.away?'<span class="role">担当</span><span class="awaytm">抜けて'+(opts.awayMin!=null?opts.awayMin:0)+'分</span>':'';
  return '<span class="'+cls+'" '+onclick+'><span class="ava" style="background:'+av+'">'+esc(name.charAt(0))+'</span><span class="cn">'+esc(name)+'</span>'+castBadge(name)+role+awayLbl+tm+'</span>';
}
function seatInfoLine(s){
  var p=[];
  if(s.bottle) p.push('🍶'+esc(s.bottle)+(s.bottlePos?'<span class="bp">'+esc(s.bottlePos)+'</span>':''));
  if(s.member) p.push('会員'+esc(s.member));
  if(s.bday) p.push('🎂'+esc(s.bday));
  return p.length?'<div class="seat-info">'+p.join('<span class="dot">・</span>')+'</div>':'';
}
/* 席の客名の横に出す「予約キャスト・担当キャスト」コンテキスト（実際の在席とは別） */
function seatCustKey_(x){ return String(x||'').replace(/様/g,'').replace(/\s/g,''); }
function seatRsvFor(s){ if(!s.cust)return null; var k=seatCustKey_(s.cust); return (RSV||[]).find(function(r){return r.cust&&seatCustKey_(r.cust)===k;})||null; }
function seatCastCtx(s){
  var parts=[], r=seatRsvFor(s);
  var yoyaku=r&&r.yoyaku?r.yoyaku:'';
  if(yoyaku){
    var yhere=castHere(s,yoyaku), away='';
    if(!yhere){ var m=(s.recentLeft&&s.recentLeft[yoyaku]); away=(m!=null)?'<span class="sctx-away"> 抜'+m+'分</span>':'<span class="sctx-away"> 離席中</span>'; }
    parts.push('<span class="sctx y">予約 '+esc(yoyaku)+away+'</span>');
  }
  if(s.tantou) parts.push('<span class="sctx t">担当 '+esc(s.tantou)+'</span>');
  return parts.length?'<div class="sctx-row">'+parts.join('')+'</div>':'';
}
function seatHtml(s){
  var st=seatStatus(s), idx=seatIdx(s), nm=shortNm(s.name);
  var oc='onclick="onSeatClick('+idx+')"';
  // 結合の子（他席へ結合済み）
  if(s.mergedTo!=null){
    var pn=shortNm(SEATS[s.mergedTo].name);
    return '<div class="seat mergedcell" '+oc+'><div style="text-align:center"><div class="grp-badge">🔗 結合中</div><div style="font-size:11px;margin-top:6px;color:#9ad0d0;font-weight:700">'+esc(nm)+' → '+esc(pn)+'</div></div></div>';
  }
  var isPrimary=s.mergeWith&&s.mergeWith.length;
  var dispNm=isPrimary?nm+'＋'+s.mergeWith.map(function(mi){return shortNm(SEATS[mi].name);}).join('＋'):nm;
  var grpBadge=isPrimary?'<span class="grp-badge">🔗'+(s.mergeWith.length+1)+'席</span>':'';
  var coSeat=(s.occupants&&s.occupants.length>1); // 相席（同一卓に複数予約）
  var coBadge=coSeat?'<span class="grp-badge" style="background:#3a2a12;color:#ffc98a">👥'+s.occupants.length+'組</span>':'';
  var paxDisp=coSeat?s.occupants.reduce(function(a,o){return a+(Number(o.pax)||0);},0):s.pax;
  var mt=(moveMode||tableMoveMode)?' movetarget':'';
  var self=(moveMode&&selCast&&selCast.si===idx)?' moveself':'';
  var ct=(combineMode&&idx!==combinePrimary)?' combinetarget':'';
  var cprim=(combineMode&&idx===combinePrimary)?' combineprimary':'';
  var grp=isPrimary?' grouped':'';
  // 待機席 / 黒服席（旧軍師ポータルの席タイプ）
  if(st==='waiting'||st==='kurofuku'){
    var wlbl=st==='waiting'?'🪑 待機':'🖤 黒服';
    var wchips=(s.casts||[]).map(function(c,ci){return chipHtml(c.n,ci,idx,{mins:c.mins,status:'ok',wait:true});}).join('')||'<div class="empty">'+(st==='waiting'?'待機なし':'黒服なし')+'</div>';
    return '<div class="seat '+st+mt+ct+'" '+oc+'><div class="st"><span class="snm">'+wlbl+'</span><span class="pax">'+(s.casts?s.casts.length:0)+'名</span></div><div style="margin-top:2px">'+wchips+'</div></div>';
  }
  // 空席 / 予約
  if(st==='empty'){
    if(s.rsv){
      var rrqb=reqBadgeHtml(idx,s.rsv.cust);
      return '<div class="seat reserved'+mt+ct+grp+'" '+oc+'><div class="st"><span class="snm">'+esc(dispNm)+grpBadge+'</span><span class="rsv-tag">予約</span></div>'
        +'<div class="cust" style="color:#bcd8ff">'+esc(s.rsv.cust)+'様</div>'
        +'<div class="rsv-meta"><span class="rt">📅 '+esc(rsvArrT(s.rsv))+'〜</span>'+(s.rsv.tantou?'　担当 '+esc(s.rsv.tantou):'')+'</div>'
        +(rrqb?'<div class="tags" style="margin-top:4px">'+rrqb+'</div>':'')+'</div>';
    }
    var planB=(s.planList&&s.planList.length)?'<div class="rsv-meta" style="color:#c8a8f0;margin-top:3px">📋 予定 '+s.planList.map(esc).join('、')+'</div>':'';
    return '<div class="seat'+mt+ct+grp+'" '+oc+'><div class="st"><span class="snm">'+esc(dispNm)+grpBadge+'</span></div><div class="empty">空席</div>'+planB+'</div>';
  }
  var tags=(s.tags||[]).map(function(t){return '<span class="tg '+(TAGLABEL[t]?t:'')+'">'+(TAGLABEL[t]||esc(t))+'</span>';}).join('');
  var tantou=s.tantou;
  // 担当不在（接客者ゼロ）
  if(st==='nocast'){
    return '<div class="seat nocast'+mt+self+ct+cprim+grp+'" '+oc+'><div class="cnr">⚠ 担当不在</div>'
      +'<div class="st"><span class="snm">'+esc(dispNm)+grpBadge+coBadge+'</span><span class="pax">'+paxDisp+'名</span></div>'
      +((tags||reqBadgeHtml(idx,s.cust))?'<div class="tags">'+tags+reqBadgeHtml(idx,s.cust)+'</div>':'')
      +occupantsHtml(s)+seatInfoLine(s)
      +(tantou?'<div style="margin-top:3px">'+chipHtml(tantou,-1,idx,{away:true,awayMin:s.awayMin})+'</div>':'')+'</div>';
  }
  // 接客中
  var cnr=st==='over'?'🔴 超過':st==='warn'?'⏰ まもなく':'';
  var rqb=reqBadgeHtml(idx,s.cust);
  var chips='';
  // 下段は「実際についているキャスト」だけ（担当が抜けている場合は上の担当ラベルで表示）
  s.casts.forEach(function(c,ci){ chips+=chipHtml(c.n,ci,idx,{mins:c.mins,status:c.status,tantou:c.n===tantou}); });
  return '<div class="seat '+st+mt+self+ct+cprim+grp+'" '+oc+'>'+(cnr?'<div class="cnr">'+cnr+'</div>':'')
    +'<div class="st"><span class="snm">'+esc(dispNm)+grpBadge+coBadge+'</span><span class="pax">'+paxDisp+'名</span></div>'
    +((tags||rqb)?'<div class="tags">'+tags+rqb+'</div>':'')
    +occupantsHtml(s)+seatCastCtx(s)+seatInfoLine(s)+'<div style="margin-top:2px">'+chips+'</div></div>';
}
// 席カードの客名表示（相席=複数組なら各組を縦積み、単一なら従来通り）
function occupantsHtml(s){
  var occ=s.occupants||[];
  if(occ.length<=1) return '<div class="cust">'+esc(s.cust)+'</div>';
  return '<div class="cust" style="line-height:1.45">'+occ.map(function(o){
    return '<div>'+esc(o.cust)+'様 <span style="font-size:10px;color:#8aa8c8">'+(o.pax||1)+'名'+(o.tantou?'・'+esc(o.tantou):'')+'</span></div>';
  }).join('')+'</div>';
}
/* ---- 席・キャストのタップ操作（付け回し / 移動） ---- */
function onSeatClick(idx){
  if(moveMode){ placeCast(idx); return; }
  if(combineMode){ mergeSeat(idx); return; }
  if(tableMoveMode){ doTableMove(idx); return; }
  var s=SEATS[idx]; if(s.mergedTo!=null){ openSeat(s.mergedTo); return; }
  openSeat(idx);
}
/* ---- テーブルチェンジ（客ごと別テーブルへ移動） ---- */
function startTableMove(idx){ closeSheet(); tableMoveMode=true; tableMoveFrom=idx; renderHall(); showTableMoveBar(); }
function showTableMoveBar(){
  var p=SEATS[tableMoveFrom]; var b=document.getElementById('combinebar');
  b.className='castbar movemode show';
  b.innerHTML='<div class="cb-info">🔀 '+esc(p.floor+' '+shortNm(p.name))+(p.cust?'（'+esc(p.cust)+'）':'')+' の<b>移動先の空席</b>をタップ</div><div class="cb-btns"><button class="cb x" onclick="cancelTableMove()">キャンセル</button></div>';
}
function cancelTableMove(){ tableMoveMode=false; tableMoveFrom=null; hideCombineBar(); renderHall(); }
function doTableMove(destIdx){
  if(destIdx===tableMoveFrom){ return; }
  var from=SEATS[tableMoveFrom], to=SEATS[destIdx];
  if(to.type==='W'||to.type==='K'){ toast('待機/黒服席へは移動できません'); return; }
  var occupied=to.occupied||to.cust||(to.casts&&to.casts.length)||to.mergedTo!=null||(to.mergeWith&&to.mergeWith.length)||to.rsv;
  if(occupied){ toast('移動先は空席を選んでください'); return; }
  if(!confirm(from.floor+' '+shortNm(from.name)+(from.cust?'（'+from.cust+'）':'')+' を\n'+to.floor+' '+shortNm(to.name)+' へ移動します。よろしいですか？')) return;
  var fromCode=from.code, toCode=to.code;
  tableMoveMode=false; tableMoveFrom=null; hideCombineBar();
  toast('🔀 テーブルを移動しました');
  if(IS_GAS) gsr('kioskChangeTable',fromCode,toCode).then(function(r){ if(r&&r.ok===false){ toast('移動失敗: '+(r.error||'')); } loadAll(); }).catch(function(){ toast('移動に失敗'); loadAll(); });
  else renderAll();
}
/* ---- 席の結合 / 分割 ---- */
function startCombine(idx){ closeSheet(); combineMode=true; combinePrimary=idx; renderHall(); showCombineBar(); }
function showCombineBar(){ var p=SEATS[combinePrimary]; var b=document.getElementById('combinebar'); b.className='castbar movemode show'; b.innerHTML='<div class="cb-info">🔗 '+esc(p.floor+' '+shortNm(p.name))+' に結合する席をタップ</div><div class="cb-btns"><button class="cb cmb" onclick="finishCombine()">完了</button><button class="cb x" onclick="cancelCombine()">キャンセル</button></div>'; }
function hideCombineBar(){ document.getElementById('combinebar').className='castbar'; }
function mergeSeat(target){
  if(target===combinePrimary) return;
  var t=SEATS[target]; if(t.mergedTo!=null) return;
  var p=SEATS[combinePrimary]; p.mergeWith=p.mergeWith||[];
  if(p.mergeWith.indexOf(target)>=0) return;
  p.mergeWith.push(target); t.mergedTo=combinePrimary;
  if(t.cust){ p.pax=(p.pax||0)+(t.pax||0); if(t.casts&&t.casts.length) p.casts=(p.casts||[]).concat(t.casts); t.casts=[]; }
  else { t.casts=[]; }
  t.rsv=null;
  renderHall(); showCombineBar();
}
function finishCombine(){ var p=SEATS[combinePrimary]; var did=p.mergeWith&&p.mergeWith.length; var pc=p.code, others=(p.mergeWith||[]).map(function(mi){return SEATS[mi].code;}); combineMode=false; combinePrimary=null; hideCombineBar(); if(did) toast('🔗 席を結合しました'); renderAll(); if(IS_GAS&&did)gsr('kioskCombineSeats',pc,others).then(loadAll).catch(function(){loadAll();}); }
function cancelCombine(){ combineMode=false; combinePrimary=null; hideCombineBar(); renderHall(); }
function splitSeat(idx){
  var p=SEATS[idx]; if(!p.mergeWith||!p.mergeWith.length) return;
  p.mergeWith.forEach(function(mi){ SEATS[mi].mergedTo=null; });
  var pc=p.code;
  p.mergeWith=[]; closeSheet(); toast('✂️ 結合を解除しました'); renderAll();
  if(IS_GAS)gsr('kioskSplitSeat',pc).then(loadAll).catch(function(){loadAll();});
}
function tapCast(si,ci,ev){ if(ev)ev.stopPropagation(); if(moveMode){ placeCast(si); return; } selCast={si:si,ci:ci}; renderHall(); showCastBar(); }
function tapAway(ev){ if(ev)ev.stopPropagation(); toast('その担当は他卓で接客中です（つけまわしで管理）'); }
function closeBar(){ selCast=null; moveMode=false; document.getElementById('castbar').className='castbar'; }
function hideCastBar(){ closeBar(); renderHall(); }
function showCastBar(){
  var bar=document.getElementById('castbar');
  if(!selCast){ bar.className='castbar'; bar.innerHTML=''; return; }
  var s=SEATS[selCast.si], c=s.casts[selCast.ci], col=castColor(c.n);
  var av='<span class="ava" style="background:'+col+'">'+esc(c.n.charAt(0))+'</span>';
  if(moveMode){
    bar.className='castbar movemode show';
    bar.innerHTML='<div class="cb-info">'+av+'🔄 '+esc(c.n)+' を移動 <small>移動先の席をタップ</small></div><div class="cb-btns"><button class="cb x" onclick="cancelMove()">キャンセル</button></div>';
  }else{
    bar.className='castbar show';
    bar.innerHTML='<div class="cb-info">'+av+esc(c.n)+' <small>'+esc(s.floor+' '+s.name)+' ・ '+(c.mins<0?'超過'+(-c.mins)+'分':c.mins+'分')+'</small></div>'
      +'<div class="cb-btns"><button class="cb mv" onclick="startMove()">🔄 別の席へ移動</button><button class="cb x" onclick="hideCastBar()">✕</button></div>';
  }
}
function startMove(){ moveMode=true; renderHall(); showCastBar(); }
function cancelMove(){ hideCastBar(); }
function placeCast(targetSi){
  if(!selCast){ return; }
  if(targetSi===selCast.si){ hideCastBar(); return; }
  var src=SEATS[selCast.si];
  var castName=src.casts[selCast.ci]?src.casts[selCast.ci].n:''; var fromCode=src.code, toCode=SEATS[targetSi].code, toLabel=shortNm(SEATS[targetSi].name);
  var c=src.casts.splice(selCast.ci,1)[0]; if(!c){ closeBar(); renderAll(); return; }

  c.mins=20; c.status='ok';
  var tgt=SEATS[targetSi]; if(!tgt.casts) tgt.casts=[]; tgt.casts.push(c);
  toast('🔄 '+c.n+' を '+tgt.floor+' '+shortNm(tgt.name)+' へ移動');
  closeBar(); renderAll();

}

/* ============ RIGHT COLUMN: 予約 / つけまわし ============ */
var rightView='rsv';
function switchRight(v){rightView=v;renderRight();}
function renderRight(){
  var act=ROT.filter(needsAction).length;
  var haya=SHIFT.filter(function(s){return s.hayaagari;}).length;
  var tabs=[{k:'rsv',ic:'📋',t:'予約'},{k:'rot',ic:'🔄',t:'付け回し',b:act},{k:'shift',ic:'🗒',t:'シフト',b:haya}];
  var hd='<div class="rtoggle">'+tabs.map(function(t){
    return '<button class="rtg'+(rightView===t.k?' active':'')+'" onclick="switchRight(\''+t.k+'\')">'+t.ic+' '+t.t+(t.b?'<span class="b">'+t.b+'</span>':'')+'</button>';
  }).join('')+'</div>';
  setHtml('rsvHd',hd);
  if(rightView==='rsv') renderRsv(); else if(rightView==='rot') renderRotation(); else renderShift();
}

/* ---- つけまわしボード ---- */
function worstWait(c){var w=c.tables.filter(function(t){return !t.cur;});if(!w.length)return null;return w.slice().sort(function(a,b){return (b.wait||0)-(a.wait||0);})[0];}
function isMulti(c){return c.tables.length>=2;}
function rotInterval(c){return c.interval||15;}
function needsAction(c){
  var cur=c.tables.find(function(t){return t.cur;});
  if(cur&&cur.over)return true;
  if(!isMulti(c))return false;
  var iv=rotInterval(c);
  return c.tables.some(function(t){return !t.cur&&(t.alert||(t.wait||0)>=iv);});
}
function renderRotation(){
  var list=ROT.slice().sort(function(a,b){var d=(needsAction(b)?1:0)-(needsAction(a)?1:0);return d||(b.tables.length-a.tables.length);});
  var multi=ROT.filter(isMulti);
  var loadmap=multi.length?'<div class="loadmap">'+multi.slice().sort(function(a,b){return b.tables.length-a.tables.length;}).map(function(c){
      return '<div class="lm l'+(c.tables.length>=3?'3':'2')+'" onclick="scrollToCast(\''+esc(c.cast)+'\')">'+esc(c.cast)+' <span class="n">'+c.tables.length+'卓 / '+rotInterval(c)+'分</span></div>';
    }).join('')+'</div>':'';

var UNDO_WINDOW_MS=10*60*1000; /* 来店から10分以内のみ来店前に戻せる */
function canUndoCheckin(r){ return !r.checkInAt || (Date.now()-r.checkInAt)<UNDO_WINDOW_MS; }
function statusBtns(r){
  var h;
  if(r.status==='来店済み'){
    var undo=canUndoCheckin(r)?'<button class="stundo" title="来店前に戻す（来店から10分以内）" onclick="setStatus('+r.id+',\'確定\')">↩</button>':'';
    h='<span class="stpill arr">🟢 来店中</span><button class="stact left" onclick="setStatus('+r.id+',\'退店済み\')">🚪 退店</button>'+undo;
  }else if(r.status==='退店済み'){
    h='<span class="stpill left">🚪 退店済</span><button class="stundo wide" onclick="setStatus('+r.id+',\'来店済み\')">↩ 来店中に戻す</button>';
  }else{
    h='<span class="stpill wait">⏳ 来店前</span><button class="stact arr" onclick="setStatus('+r.id+',\'来店済み\')">✅ 来店</button>';
  }
  return '<div class="stbtns" onclick="event.stopPropagation()">'+h+'</div>';
}
function setStatus(id,s){
  var r=RSV.find(function(x){return x.id===id;}); if(!r)return;
  if(s==='確定'&&!canUndoCheckin(r)){ toast('来店から10分以上経過したため戻せません'); return; }
  r.status=s;
  if(s==='来店済み') r.checkInAt=Date.now();          // 楽観的に来店時刻を記録（10分カウント開始）
  else if(s==='確定') r.checkInAt=null;               // 来店前に戻す＝時刻クリア
  applyRsvToHall(r,s); renderAll();
  if(IS_GAS) gsr('setKioskReservationStatus',r.rowIdx,s).then(function(res){
    if(res&&res.ok===false){ toast(res.error||'保存できません'); }
    loadAll();
  }).catch(function(e){ toast('保存エラー'); loadAll(); });
}
/* 予約テーブル文字列 → 席コード（バックエンド tableNameToSeatCode_ と同じ規則） */
function tblToCode(t){var m=String(t||'').match(/^(2F|5F)\s*(カウンター|ボックス)(\d+)$/);return m?(m[1]+'-'+(m[2]==='カウンター'?'C':'B')+m[3]):null;}
function rsvSeatCodes(r){return String(r.table||'').split(/[、,]/).map(function(t){return tblToCode(t.trim());}).filter(Boolean);}
/* 来店/退店をホールにローカル即反映（サーバ確定を待たない・ローカル優先）。loadAll で後追い上書き。 */
function applyRsvToHall(r,status){
  if(!r.table||r.table==='未定')return;
  rsvSeatCodes(r).forEach(function(code){
    var seat=SEATS.find(function(x){return x.code===code;});if(!seat)return;
    if(status==='来店済み'){
      if(!seat.casts||!seat.casts.length){ seat.cust=r.cust?r.cust+' 様':'ご来店'; if(r.pax)seat.pax=r.pax; seat.tantou=r.tantou||seat.tantou||''; }
      else if(!seat.cust){ seat.cust=r.cust?r.cust+' 様':'ご来店'; }
    }else if(status==='退店済み'){
      seat.cust=''; seat.tantou=''; seat.casts=[]; seat.mergeWith=[];
    }else{ /* 確定=来店前へ戻す */
      if(!seat.casts||!seat.casts.length){ seat.cust=''; seat.tantou=''; }
    }
  });
}

function castSeatLabel(name){ for(var i=0;i<SEATS.length;i++){ if((SEATS[i].casts||[]).some(function(c){return c.n===name;})) return shortNm(SEATS[i].name); } return ''; }
/* 席詳細内の付け回しピッカー（この席に付いていないキャストをチップ表示） */
function rotPickerHtml(idx){
  var s=SEATS[idx];
  var here=(s.casts||[]).map(function(c){return c.n;});
  var pool=(WORKCASTS!=null&&WORKCASTS.length)?WORKCASTS:CASTS; /* 本日出勤＋当日派遣のみ（未取得時は全キャスト） */
  var avail=pool.filter(function(c){return here.indexOf(c)<0;});
  if(!avail.length) return '<div class="flabel">🔄 付け回し</div><div class="empty-msg" style="padding:10px 0;font-size:12px">出勤中の付けられるキャストがいません</div>';
  return '<div class="flabel">🔄 付け回し（タップでこの席に付ける／動かす）</div><div class="chips rotpick">'+avail.map(function(c){var loc=castSeatLabel(c);return '<div class="chip cast" onclick="quickRotate('+idx+',\''+jsStr(c)+'\')">'+esc(c)+castBadge(c)+(loc?'<span class="rploc">'+esc(loc)+'</span>':'<span class="rploc free">待機</span>')+'</div>';}).join('')+'</div>';

/* ワンタップ付け回し: castName を toIdx の席へ（他席にいれば移動、いなければ新規配置）。ローカル優先。 */
function quickRotate(toIdx,castName){
  var to=SEATS[toIdx];
  var fromIdx=-1,fromCi=-1;
  SEATS.forEach(function(s,i){ (s.casts||[]).forEach(function(c,ci){ if(c.n===castName){fromIdx=i;fromCi=ci;} }); });
  var fromCode=(fromIdx>=0)?(SEATS[fromIdx].code||''):'';
  var moved=(fromIdx>=0)?SEATS[fromIdx].casts.splice(fromCi,1)[0]:{n:castName};
  moved.mins=moved.unlimited?0:30; moved.status='ok';
  to.casts=to.casts||[]; to.casts.push(moved);
  renderAll(); openSeat(toIdx); // 詳細を最新状態で再描画
  if(IS_GAS) gsr('kioskRotateCast',castName,fromCode,to.code,shortNm(to.name)).then(loadAll).catch(function(){toast('保存エラー');loadAll();});
  else toast('🔄 '+castName+' を付けました');
}

function renewStatus(fd){
  if(!fd) return 'none';
  var p=String(fd).split(/[\/\-\.]/); if(p.length<2)return 'none';
  var fy=parseInt(p[0]), fm=parseInt(p[1]); if(!(fy>1900&&fm>=1))return 'none';
  var n=new Date();
  var ms=(n.getFullYear()*12+(n.getMonth()+1))-(fy*12+fm); // 前回更新からの経過月数
  if(ms>=13) return 'expired';   // 13か月以上 → 会員更新切れ
  if(ms>=12) return 'thismonth'; // 12か月ちょうど（更新月） → 今月更新
  return 'ok';
}
// 会員情報の算出（月単位）: ◯年目 / 会員期限(前回更新+1年) / ステータス
//  前回更新からの経過月数で判定: 12か月ちょうど(＝更新月)=🟡今月更新 / 13か月以上=🔴会員更新切れ / それ未満=🟢有効
function membershipInfo(joined, feeDate){
  var info={yearLabel:'', renewalStr:'', status:'none', monthsSince:null, statusLabel:'', shortLabel:''};
  if(joined){ var jy=parseInt(String(joined).split(/[\/\-\.]/)[0]); if(jy>1900){ var y=(new Date()).getFullYear()-jy+1; if(y>=1) info.yearLabel=y+'年目'; } }
  if(feeDate){
    var p=String(feeDate).split(/[\/\-\.]/);
    if(p.length>=2){
      var ry=parseInt(p[0]), rm=parseInt(p[1]);
      if(ry>1900&&rm>=1){
        var today=new Date();
        var ms=(today.getFullYear()*12+(today.getMonth()+1))-(ry*12+rm); // 経過月数
        info.monthsSince=ms;
        info.renewalStr=(ry+1)+'/'+rm; // 更新期限（前回更新+1年）
        if(ms>=13){ info.status='expired'; info.statusLabel='🔴 会員更新切れ'; info.shortLabel='更新切れ'; }
        else if(ms>=12){ info.status='thismonth'; info.statusLabel='🟡 今月更新'; info.shortLabel='今月更新'; }
        else { info.status='ok'; info.statusLabel='🟢 有効会員'; info.shortLabel='有効会員'; }
      }

// 編集可能な項目（ラベル＝マスタ見出し / key＝updateCustomerのペイロード）
var CUST_EDIT_FIELDS=[
  {label:'カード記載名',key:'card'},{label:'氏名',key:'name'},{label:'よみがな',key:'yomigana'},
  {label:'会員番号',key:'no'},{label:'担当',key:'tantou'},{label:'ボトル種類',key:'bottle'},
  {label:'ボトル位置',key:'pos'},{label:'会社名',key:'company'},{label:'誕生日',key:'bday',type:'date'},
  {label:'入会日',key:'memberSince',type:'date'},{label:'年会費更新（会員期限の起点）',key:'feeDate',type:'date'},
  {label:'飲み方',key:'drink'},{label:'タバコ',key:'tabaco'},{label:'ネック名',key:'neck'},
  {label:'NG行為',key:'ng'},{label:'NGスタッフ',key:'ngStaff'},{label:'参考情報',key:'note',type:'area'}
];
// 年月のみ("2026/07")も年月日("2026-07-01")も date入力用 yyyy-MM-dd に正規化（日が無ければ1日）
function toDateInput(v){ var m=String(v||'').match(/(\d{4})[-\/.](\d{1,2})(?:[-\/.](\d{1,2}))?/); return m?(m[1]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+(m[3]||'1')).slice(-2)):''; }
function custValByLabel(label){
  var n=function(s){return String(s||'').replace(/\s/g,'');};
  var hit=(custDetailFields||[]).filter(function(f){return n(f.k).indexOf(n(label))>=0;})[0];
  return hit?hit.v:'';
}
function cvDateVal(v){ var m=String(v||'').match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/); return m?(m[1]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[3]).slice(-2)):''; }
function startCustEdit(){
  var el=document.getElementById('cust-detail-body'); if(!el)return;
  var h=CUST_EDIT_FIELDS.map(function(f){
    var v=custValByLabel(f.label), input;
    // 会員日付は詳細ヘッダー（解決済み）の値を優先してプレフィル
    if(f.key==='feeDate') v=(custDetailCur&&custDetailCur.feeDate)||v;
    else if(f.key==='memberSince') v=(custDetailCur&&custDetailCur.joined)||v;
    if(f.type==='area') input='<textarea id="ce-'+f.key+'" class="finput" rows="3" style="resize:none;width:100%;box-sizing:border-box">'+esc(v)+'</textarea>';
    else if(f.type==='date') input='<input id="ce-'+f.key+'" class="finput" type="date" style="width:100%;box-sizing:border-box" value="'+esc(toDateInput(v))+'">';
    else input='<input id="ce-'+f.key+'" class="finput" style="width:100%;box-sizing:border-box" value="'+esc(v)+'">';
    return '<div style="margin:9px 0"><div style="color:var(--dim);font-size:12px;margin-bottom:3px">'+esc(f.label)+'</div>'+input+'</div>';
  }).join('');
  el.innerHTML='<div style="padding:2px 0"><div style="font-size:13px;color:var(--accent);font-weight:800;margin-bottom:8px">✏️ 顧客情報の編集</div>'+h
    +'<div style="display:flex;gap:8px;margin-top:14px"><button class="nmemo-save" style="flex:1" onclick="saveCustEdit()">💾 保存</button>'
    +'<button class="menu-btn" style="flex:1" onclick="renderCustDetailFields(custDetailFields)">キャンセル</button></div></div>';
}
function saveCustEdit(){
  if(!custDetailRowIdx){alert('対象の顧客が特定できません');return;}
  var payload={};
  CUST_EDIT_FIELDS.forEach(function(f){ var e=document.getElementById('ce-'+f.key); if(e)payload[f.key]=e.value; });
  // 会員日付は空欄なら送らない（既存の入会日・年会費更新を誤って消さないため）
  if(!payload.feeDate) delete payload.feeDate;
  if(!payload.memberSince) delete payload.memberSince;
  var btn=document.querySelector('#cust-detail-body .nmemo-save'); if(btn){btn.disabled=true;btn.textContent='保存中...';}
  if(IS_GAS){
    gsr('kioskUpdateCustomer',custDetailRowIdx,payload).then(function(res){
      if(res&&res.ok){
        toast('✅ 顧客情報を更新しました');
        // 手元の表示も更新して再描画（ヘッダーと詳細を最新に）
        var c=custDetailCur; if(c){ c.name=payload.name||c.name; c.card=payload.card||c.card; c.member=payload.no||c.member; c.tantou=payload.tantou; c.bottle=payload.bottle; c.bottlePos=payload.pos; c.nomikata=payload.drink; c.tabako=payload.tabaco; c.ng=payload.ng; c.note=payload.note; if(payload.memberSince)c.joined=payload.memberSince; if(payload.feeDate)c.feeDate=payload.feeDate; }
        openCustDetail(custDetailIdx);
      } else { alert('更新エラー: '+((res&&res.error)||'')); if(btn){btn.disabled=false;btn.textContent='💾 保存';} }
    }).catch(function(e){ alert('更新エラー: '+((e&&e.message)||e)); if(btn){btn.disabled=false;btn.textContent='💾 保存';} });
  }else{ toast('✅ 更新（ローカル）'); renderCustDetailFields(custDetailFields); }
}

function bcCount(){ var t=((document.getElementById('bc-msg')||{}).value)||''; var c=document.getElementById('bc-count'); if(c)c.textContent=t.length+' 文字'; }
function bcSend(){
  var msg=(((document.getElementById('bc-msg')||{}).value)||'').trim();
  if(!msg){ toast('メッセージを入力してください'); return; }
  if(!IS_GAS){ toast('（ローカル）送信は本番のみ'); return; }
  if(!confirm('全キャストにこのお知らせを個別送信します。よろしいですか？\n\n'+msg.slice(0,140)+(msg.length>140?'…':''))) return;
  var btn=document.getElementById('bc-send'); if(btn){btn.disabled=true;btn.textContent='送信中…';}

    var out='✅ <b>'+r.sent+'名</b>に送信しました';
    if(r.failed)  out+='<br><span style="color:#e88">送信失敗 '+r.failed+'名: '+(r.failedNames||[]).map(esc).join('、')+'</span>';

    toast('✅ '+r.sent+'名に送信しました');
    var ta=document.getElementById('bc-msg'); if(ta){ta.value='';bcCount();}
    if(btn){btn.disabled=false;btn.textContent='📢 送信する';}
  }).catch(function(){
    var el=document.getElementById('bc-result'); if(el)el.innerHTML='<span style="color:#e88">通信エラー</span>';
    if(btn){btn.disabled=false;btn.textContent='📢 送信する';}
  });
}

/* ============ 現金管理：🌅 開店チェック ============ */
var CASH_DENOMS=[{k:'m10000',label:'万',v:10000},{k:'m5000',label:'五千',v:5000},{k:'m1000',label:'千',v:1000}];
var OPEN_BAGS=[{k:'f5',label:'5Fレジ'},{k:'f2',label:'2Fレジ'},{k:'keihi',label:'経費袋'},{k:'safe',label:'金庫'}];
var openState=null;
function openOpeningCheck(){
  closeMenu(); showSheet('🌅 開店チェック','<div class="empty-msg">読み込み中...</div>',false);
  if(!IS_GAS){ document.getElementById('sheetBody').innerHTML='<div class="empty-msg">（ローカル）開店チェックは本番のみ</div>'; return; }
  gsr('getOpeningCheckInit').then(renderOpening).catch(function(){ var b=document.getElementById('sheetBody'); if(b)b.innerHTML='<div class="empty-msg">読み込みエラー</div>'; });
}
function ckBagBlock(bagKey,label,prevYen){
  var pv=(prevYen!=null)?'<span style="color:#8a9ac0;font-size:11px;margin-left:6px">前日 ¥'+Number(prevYen).toLocaleString()+'</span>':'';
  return '<div class="ck-row"><div class="ck-flabel">'+label+pv+'</div>'+CASH_DENOMS.map(function(d){return '<label class="ck-denom"><span>'+d.label+'</span><input type="number" min="0" inputmode="numeric" data-bag="'+bagKey+'" data-d="'+d.k+'" oninput="opInput(this)"></label>';}).join('')+'</div>';
}
function renderOpening(init){
  var b=document.getElementById('sheetBody'); if(!b)return;
  var prev=init.prevClose||null;
  if(init.locked){
    var h='<div class="ck-note">対象日 '+esc(init.dateKey)+'</div>';
    h+='<div class="ck-banner ok">✅ 提出済み（修正不可）／報告者 '+esc(init.reporterName)+'</div>';
    OPEN_BAGS.forEach(function(bg){
      var cur=Number((init.bags||{})[bg.k])||0;
      var pr=prev?(Number((prev.bags||{})[bg.k])||0):null;
      var prLabel=(pr!=null)?' <span style="color:#8a9ac0;font-size:11px">前日¥'+pr.toLocaleString()+'</span>':'';
      var extra='';
      if(bg.k==='safe' && Number(init.safeAdjust)){ var sa=Number(init.safeAdjust); extra='<div style="font-size:11px;color:'+(sa>0?'#e6c060':'#ff9a9a')+';text-align:right">'+(sa>0?'+':'')+sa.toLocaleString()+'円　運営者が金庫を出し入れ?</div>'; }
      h+='<div class="kv"><span class="k">'+bg.label+prLabel+'</span><span class="v">¥'+cur.toLocaleString()+'</span></div>'+extra;
    });
    h+='<div class="ck-total">スタート合計 ¥'+Number(init.total||0).toLocaleString()+'</div>';
    if(init.safeUnchecked) h+='<div class="safe-auto-note" style="margin-top:10px">🔒 金庫は未確認（前日の残額を自動入力しました）</div>';
    h+='<div class="savebtn" style="background:#1a2030" onclick="closeSheet()">閉じる</div>';
    b.innerHTML=h; return;
  }
  openState={reporterName:'',safeMode:'manual',prevSafe:(prev&&prev.bags?(Number(prev.bags.safe)||0):null),bags:{f5:{m10000:0,m5000:0,m1000:0},f2:{m10000:0,m5000:0,m1000:0},keihi:{m10000:0,m5000:0,m1000:0},safe:{m10000:0,m5000:0,m1000:0}}};
  gsr('getKioskStaffList').then(function(names){
    var b2=document.getElementById('sheetBody'); if(!b2)return;
    var h='<div class="ck-note">対象日 '+esc(init.dateKey)+'</div><div class="flabel">報告者（黒服）</div><div class="chips" id="op-rep">'+(names||[]).map(function(n){return '<div class="chip" onclick="opRep(this,\''+esc(String(n).replace(/'/g,"\\'"))+'\')">'+esc(n)+'</div>';}).join('')+'</div>';
    h+='<div class="flabel">各袋の現金（お札の枚数）</div>';
    OPEN_BAGS.forEach(function(bg){ var pr=prev?(Number((prev.bags||{})[bg.k])||0):null; h+=(bg.k==='safe')?opSafeBlock(openState.prevSafe):ckBagBlock(bg.k,bg.label,pr); });
    h+='<div style="font-size:11px;color:#e0a060;margin-top:10px">⚠️ 送信後は修正できません。内容を確認してから送信してください。</div>';
    h+='<div id="op-status" style="font-size:12px;color:#8a9ac0;text-align:center;margin-top:8px"></div>';

  });

function opRep(el,n){ el.parentElement.querySelectorAll('.chip').forEach(function(c){c.classList.remove('sel');}); el.classList.add('sel'); openState.reporterName=n; }
function opInput(inp){ var v=Number(inp.value)||0; openState.bags[inp.dataset.bag][inp.dataset.d]=v; }
/* 金額(円)→紙幣枚数の正準分解（金庫は札のみ＝1000円単位なので端数なく復元できる） */
function safeDecompose(yen){ yen=Number(yen)||0; var m10=Math.floor(yen/10000); var r=yen-m10*10000; var m5=Math.floor(r/5000); r-=m5*5000; var m1=Math.floor(r/1000); return {m10000:m10,m5000:m5,m1000:m1}; }
/* 開店の金庫ブロック：確認する（数える）／確認しない（前日残額を自動入力） */
function opSafeBlock(prevSafe){
  var hasPrev=prevSafe!=null, auto=openState.safeMode==='auto';
  var pv=hasPrev?'<span style="color:#8a9ac0;font-size:11px;margin-left:6px">前日 ¥'+Number(prevSafe).toLocaleString()+'</span>':'';
  var seg=hasPrev?('<div class="safe-seg"><button class="'+(!auto?'on':'')+'" onclick="opSafeMode(\'manual\')">数える</button>'
    +'<button class="'+(auto?'on':'')+'" onclick="opSafeMode(\'auto\')">確認しない（前日 ¥'+Number(prevSafe).toLocaleString()+'）</button></div>')
    :'<div style="font-size:11px;color:#8a9ac0;margin:2px 0 6px">前日の締めデータが無いため手動で数えてください</div>';
  var inner;
  if(auto&&hasPrev){
    inner='<div class="safe-auto-note">🔒 金庫を開けられないため <b>前日の残額 ¥'+Number(prevSafe).toLocaleString()+'</b> をそのまま使用します（金庫は未確認）</div>';
  }else{
    inner='<div class="ck-row" style="margin:0">'+CASH_DENOMS.map(function(d){return '<label class="ck-denom"><span>'+d.label+'</span><input type="number" min="0" inputmode="numeric" data-bag="safe" data-d="'+d.k+'" value="'+(openState.bags.safe[d.k]||'')+'" oninput="opInput(this)"></label>';}).join('')+'</div>';
  }
  return '<div id="op-safe-block" style="margin-bottom:8px"><div class="ck-flabel" style="width:auto;margin-bottom:6px">🟣 金庫'+pv+'</div>'+seg+inner+'</div>';
}
function opSafeMode(m){
  openState.safeMode=m;
  openState.bags.safe=(m==='auto')?safeDecompose(openState.prevSafe):{m10000:0,m5000:0,m1000:0};
  var el=document.getElementById('op-safe-block'); if(el) el.outerHTML=opSafeBlock(openState.prevSafe);
}
function submitOpening(){
  if(!openState.reporterName){ alert('報告者を選択してください'); return; }
  if(!confirm('開店チェックを送信します。送信後は修正できません。よろしいですか？'))return;
  var s=document.getElementById('op-status'); if(s)s.textContent='送信中…';
  gsr('submitOpeningCheck',{reporterName:openState.reporterName,bags:openState.bags,safeUnchecked:openState.safeMode==='auto'}).then(function(res){
    if(!res||!res.ok){ if(s)s.textContent='⚠️ '+((res&&res.error)||'エラー'); return; }
    gsr('getOpeningCheckInit').then(renderOpening);
  }).catch(function(){ if(s)s.textContent='⚠️ 通信エラー'; });
}

/* ============ 🚚 納品→在庫反映（フロア振り分け＋候補マッチ） ============ */
var deliveryState=null, drItems={};
var DR_FLOORS=['5F','2F'];
function openDeliveryReflect(){
  showSheet('🚚 納品を在庫に反映','<div class="empty-msg">読み込み中...</div>','full');
  if(!IS_GAS){ document.getElementById('sheetBody').innerHTML='<div class="empty-msg">（ローカル）本番のみ</div>'; return; }
  gsr('kioskGetPendingDeliveries').then(function(r){ deliveryState=r||{slips:[],stock:[]}; drItems={}; renderDeliveryReflect(); })
    .catch(function(){ var b=document.getElementById('sheetBody'); if(b)b.innerHTML='<div class="empty-msg">読み込みエラー</div>'; });
}
/* 品名の類似マッチ（フロア指定。共通品も候補に含める） */
function drNorm(s){return String(s||'').normalize('NFKC').toLowerCase().replace(/[\s　・,、。()（）「」【】\-ー_/／\\]/g,'');}
function drBigrams(s){var a=[];if(s.length<=1){if(s)a.push(s);return a;}for(var i=0;i<s.length-1;i++)a.push(s.substr(i,2));return a;}
function drSim(a,b){a=drNorm(a);b=drNorm(b);if(!a||!b)return 0;if(a===b)return 1;if(a.indexOf(b)>=0||b.indexOf(a)>=0)return 0.92;var ga=drBigrams(a),gb=drBigrams(b),mb={},hit=0;gb.forEach(function(g){mb[g]=(mb[g]||0)+1;});ga.forEach(function(g){if(mb[g]>0){mb[g]--;hit++;}});return (ga.length+gb.length)?2*hit/(ga.length+gb.length):0;}
function drPool(floor){var st=(deliveryState&&deliveryState.stock)||[];return st.filter(function(i){return i.floor===floor;});}
function drBestMatch(name,floor){var best=null,bs=0;drPool(floor).forEach(function(it){var s=drSim(name,it.name);if(s>bs){bs=s;best=it;}});return{item:bs>=0.34?best:null,score:Math.round(bs*100)};}
function drGuessFloor(name){ // 全フロアで最も近い候補のフロアを初期値に。無ければ5F
  var st=(deliveryState&&deliveryState.stock)||[],best=null,bs=0;
  st.forEach(function(it){var s=drSim(name,it.name);if(s>bs){bs=s;best=it;}});
  return (best&&bs>=0.34&&(best.floor==='5F'||best.floor==='2F'))?best.floor:'5F';
}
function drOptions(floor,sel){
  var o='<option value="0"'+(sel===0?' selected':'')+'>― 反映しない ―</option><option value="-1"'+(sel===-1?' selected':'')+'>➕ 新規マスタ登録（'+floor+'）</option>';
  o+=drPool(floor).map(function(it){return '<option value="'+it.rowIdx+'"'+(it.rowIdx===sel?' selected':'')+'>'+esc(it.name)+' ['+esc(it.floor)+'] 在庫'+it.qty+'</option>';}).join('');
  return o;
}
function drRight(id){
  var it=drItems[id];
  var m=drBestMatch(it.name,it.floor); it.matchRowIdx=m.item?m.item.rowIdx:0;
  var conf=it.matchRowIdx?('<span class="dr-score '+(m.score>=70?'hi':(m.score>=45?'mid':'lo'))+'">候補一致 '+m.score+'%</span>'):'<span class="dr-score lo">候補なし・要選択</span>';
  var toggle='<div class="dr-floor">'+DR_FLOORS.map(function(f){return '<button class="dr-fbtn'+(f===it.floor?' sel':'')+'" onclick="drSetFloor('+id+',\''+f+'\')">'+f+'</button>';}).join('')+'</div>';
  var sel='<select class="finput dr-sel" id="dr-sel-'+id+'" onchange="drSelChange('+id+')">'+drOptions(it.floor,it.matchRowIdx)+'</select>';
  var newbox='<div class="dr-newbox" id="dr-new-'+id+'"></div>';
  var qty='<label class="dr-qtyl">加算 <input class="finput dr-qty" id="dr-qty-'+id+'" type="number" value="'+it.qty+'" min="0"></label>';
  return '<div class="dr-floorlbl">振り分け先フロア</div>'+toggle+conf+sel+newbox+qty;
}
function renderDeliveryReflect(){
  var st=deliveryState,b=document.getElementById('sheetBody'); if(!b)return;
  if(!st.slips||!st.slips.length){ b.innerHTML='<div class="empty-msg" style="padding:40px 0">未反映の納品はありません 🎉<br><span style="font-size:12px;color:var(--dim)">黒服グループに納品書を送ると、ここに一覧が出ます</span></div>'; return; }
  var h='<div class="dr-wrap">';
  st.slips.forEach(function(sl){
    var slipIds=sl.items.map(function(it){return it.deliveryRowIdx;}).join(',');
    h+='<div class="dr-slip"><div class="dr-slip-h"><span class="dr-slip-t">🚚 '+esc(sl.supplier||'仕入先不明')+' <span class="dr-slip-meta">伝票 '+esc(sl.slipNo)+(sl.date?' / '+esc(sl.date):'')+' / '+sl.items.length+'品目</span></span><button class="dr-delslip" onclick="drDeleteSlip(\''+slipIds+'\','+sl.items.length+')">🗑 伝票ごと削除</button></div>';
    sl.items.forEach(function(it){
      var id=it.deliveryRowIdx;
      if(!drItems[id]) drItems[id]={name:it.name,qty:it.qty,volume:it.volume,floor:drGuessFloor(it.name)};
      h+='<div class="dr-item"><div class="dr-item-l"><div class="dr-nm">'+esc(it.name)+(it.volume?' <span class="dr-vol">'+esc(it.volume)+'</span>':'')+'</div><div class="dr-sub">納品 '+it.qty+'本<button class="dr-delitem" onclick="drDeleteItem('+id+')">🗑 削除</button></div></div>'
        +'<div class="dr-item-r" id="dr-r-'+id+'">'+drRight(id)+'</div></div>';
    });
    h+='</div>';
  });
  h+='<div class="dr-actions"><button class="savebtn dr-apply" onclick="applyDeliveryReflect()">✅ 選択した内容で在庫に反映</button></div></div>';
  b.innerHTML=h;
}
function drSetFloor(id,floor){ if(!drItems[id])return; drItems[id].floor=floor; var el=document.getElementById('dr-r-'+id); if(el)el.innerHTML=drRight(id); }
function drSelChange(id){
  var sel=document.getElementById('dr-sel-'+id), box=document.getElementById('dr-new-'+id); if(!sel||!box)return;
  if(sel.value==='-1') box.innerHTML='<div class="dr-new"><span class="dr-newlbl">新規登録（'+drItems[id].floor+'）カテゴリ:</span><select class="finput" id="dr-nc-'+id+'">'+STOCK_CATS.map(function(c){return '<option'+(c==='ボトル'?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div>';
  else box.innerHTML='';
}
function applyDeliveryReflect(){
  var rows=[];
  Object.keys(drItems).forEach(function(id){
    var sel=document.getElementById('dr-sel-'+id); if(!sel)return;
    var mv=Number(sel.value); if(mv===0)return;
    var qty=Number((document.getElementById('dr-qty-'+id)||{}).value)||0; if(qty<=0)return;
    var row={deliveryRowIdx:Number(id),masterRowIdx:mv,qty:qty};
    if(mv===-1){ row.newCategory=(document.getElementById('dr-nc-'+id)||{}).value||'ボトル'; row.newFloor=drItems[id].floor||'2F'; }
    rows.push(row);
  });
  if(!rows.length){alert('反映する品目を1つ以上選んでください');return;}
  if(!confirm(rows.length+'品目を在庫に反映します。よろしいですか？'))return;
  var btn=document.querySelector('.dr-apply'); if(btn){btn.disabled=true;btn.textContent='反映中...';}
  gsr('kioskApplyDelivery',{rows:rows}).then(function(res){
    if(res&&res.ok){ alert('✅ '+res.applied+'品目を在庫に反映しました'+(res.created?'（新規登録 '+res.created+'件）':'')); openDeliveryReflect(); }
    else { alert('エラー: '+((res&&res.error)||'')); if(btn){btn.disabled=false;btn.textContent='✅ 選択した内容で在庫に反映';} }
  }).catch(function(){ alert('反映に失敗しました'); if(btn){btn.disabled=false;btn.textContent='✅ 選択した内容で在庫に反映';} });
}
/* 誤読・不要な納品明細を削除（在庫は変えず、納品記録から消すだけ） */
function drDeleteItem(id){
  if(!IS_GAS){ alert('（ローカル）削除は本番のみ'); return; }
  if(!confirm('この品目を納品記録から削除しますか？（在庫は変わりません／元に戻せません）'))return;
  gsr('kioskDeleteDelivery',[Number(id)]).then(function(res){
    if(res&&res.ok){ toast('🗑 削除しました'); openDeliveryReflect(); }
    else { alert('削除エラー: '+((res&&res.error)||'')); }
  }).catch(function(e){ alert('削除エラー: '+((e&&e.message)||e)); });
}
function drDeleteSlip(idsStr,n){
  if(!IS_GAS){ alert('（ローカル）削除は本番のみ'); return; }
  var ids=String(idsStr).split(',').map(Number).filter(function(x){return x>=2;});
  if(!ids.length)return;
  if(!confirm('この伝票の'+n+'品目をまとめて削除しますか？（在庫は変わりません／元に戻せません）'))return;
  gsr('kioskDeleteDelivery',ids).then(function(res){
    if(res&&res.ok){ toast('🗑 '+((res&&res.deleted)||ids.length)+'品目を削除しました'); openDeliveryReflect(); }
    else { alert('削除エラー: '+((res&&res.error)||'')); }
  }).catch(function(e){ alert('削除エラー: '+((e&&e.message)||e)); });
}

/* ============ 🧾 伝票管理（一覧・修正・削除） ============ */
var denpyoState=null;
var DP_SHEET={daily:'日払い記録',receipt:'領収書記録',delivery:'納品記録'};
var DP_FIELDS={
  daily:[['受取人','text'],['伝票金額','num'],['現金合計','num'],['但し書き','text'],['伝票日付','text']],
  receipt:[['発行元','text'],['金額','num'],['但し書き','text'],['伝票日付','text']],
  delivery:[['商品名','text'],['容量','text'],['本数','num'],['単価','num'],['金額','num']]
};
function openDenpyoManager(dateStr){
  closeMenu();
  var d=dateStr||(denpyoState&&denpyoState.date)||TODAY;
  showSheet('🧾 伝票管理','<div class="empty-msg">読み込み中...</div>','full');
  if(!IS_GAS){ document.getElementById('sheetBody').innerHTML='<div class="empty-msg">（ローカル）本番のみ</div>'; return; }
  gsr('kioskGetDenpyoDay',d).then(function(r){
    denpyoState=r||{date:d}; denpyoState.date=d;
    try { renderDenpyo(); } catch(err){ var b=document.getElementById('sheetBody'); if(b)b.innerHTML='<div class="empty-msg">描画エラー: '+esc((err&&err.message)||err)+'</div>'; }
  }).catch(function(e){ var b=document.getElementById('sheetBody'); if(b)b.innerHTML='<div class="empty-msg">通信エラー: '+esc((e&&e.message)||e)+'</div>'; });
}
function dpNav(n){ var dt=parseKey(denpyoState.date); dt.setDate(dt.getDate()+n); openDenpyoManager(fmtKey(dt)); }
function dpV(sec,cells,name){ var i=sec.headers.indexOf(name); return i>=0?(cells[i]==null?'':cells[i]):''; }
function dpImg(url){ return url?'<a href="'+esc(String(url))+'" target="_blank" class="dp-img">📷 画像</a>':''; }
function renderDenpyo(){
  var st=denpyoState,b=document.getElementById('sheetBody'); if(!b)return;
  var nav='<div class="dp-nav"><button class="dp-navbtn" onclick="dpNav(-1)">◀ 前日</button>'
    +'<div class="dp-date">'+esc(st.date)+(st.date===TODAY?' <span style="color:#7ac6ff;font-size:11px">(今日)</span>':'')+'</div>'
    +'<button class="dp-navbtn" onclick="dpNav(1)">翌日 ▶</button><button class="dp-navbtn today" onclick="openDenpyoManager(TODAY)">今日</button></div>';
  var h='<div class="dp-wrap">'+nav;
  h+=dpSectionDaily(st.daily||{headers:[],rows:[],total:0});
  h+=dpSectionReceipt(st.receipt||{headers:[],rows:[],total:0});
  h+=dpSectionDelivery(st.delivery||{headers:[],rows:[],total:0});
  h+='</div>';
  b.innerHTML=h;
}
function dpHead(icon,title,count,total){
  return '<div class="dp-sec-h"><span>'+icon+' '+title+' <span class="dp-cnt">'+count+'件</span></span>'+(total?'<span class="dp-total">計 ¥'+fmtYen(total)+'</span>':'')+'</div>';
}
function fmtYen(n){ return String(Math.round(Number(n)||0)).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function dpRowActions(type,rowIdx){ return '<div class="dp-acts"><button class="dp-edit" onclick="editDenpyo(\''+type+'\','+rowIdx+')">✏️ 修正</button><button class="dp-del" onclick="delDenpyo(\''+type+'\','+rowIdx+')">🗑</button></div>'; }
function dpSectionDaily(sec){
  var body=sec.rows.length?sec.rows.map(function(r){
    var c=r.cells, match=dpV(sec,c,'照合');
    var mcol=match==='一致'?'#7fe0a3':match==='不一致'?'#ff9a9a':'#8a9ac0';
    return '<div class="dp-card"><div class="dp-card-top"><span class="dp-nm">'+esc(dpV(sec,c,'受取人')||'（受取人不明）')+' 様</span><span class="dp-amt">¥'+fmtYen(dpV(sec,c,'伝票金額'))+'</span></div>'
      +'<div class="dp-meta">現金 ¥'+fmtYen(dpV(sec,c,'現金合計'))+(match?' <span style="color:'+mcol+';font-weight:800">'+esc(match)+'</span>':'')
      +(dpV(sec,c,'但し書き')?' ・ '+esc(dpV(sec,c,'但し書き')):'')+(dpV(sec,c,'伝票日付')?' ・ '+esc(dpV(sec,c,'伝票日付')):'')+'</div>'
      +'<div class="dp-card-b">'+dpImg(dpV(sec,c,'画像リンク'))+dpRowActions('daily',r.rowIdx)+'</div></div>';
  }).join(''):'<div class="dp-empty">この日の日払いはありません</div>';
  return '<div class="dp-sec">'+dpHead('💴','日払い',sec.rows.length,sec.total)+body+'</div>';
}
function dpSectionReceipt(sec){
  var body=sec.rows.length?sec.rows.map(function(r){
    var c=r.cells;
    return '<div class="dp-card"><div class="dp-card-top"><span class="dp-nm">'+esc(dpV(sec,c,'発行元')||'（発行元不明）')+'</span><span class="dp-amt">¥'+fmtYen(dpV(sec,c,'金額'))+'</span></div>'
      +'<div class="dp-meta">'+(dpV(sec,c,'但し書き')?esc(dpV(sec,c,'但し書き')):'')+(dpV(sec,c,'伝票日付')?' ・ '+esc(dpV(sec,c,'伝票日付')):'')+'</div>'
      +'<div class="dp-card-b">'+dpImg(dpV(sec,c,'画像リンク'))+dpRowActions('receipt',r.rowIdx)+'</div></div>';
  }).join(''):'<div class="dp-empty">この日の領収書はありません</div>';
  return '<div class="dp-sec">'+dpHead('🧾','領収書',sec.rows.length,sec.total)+body+'</div>';
}
function dpSectionDelivery(sec){
  // 伝票No＋仕入先でグループ化
  var groups={},order=[];
  sec.rows.forEach(function(r){ var c=r.cells; var key=(dpV(sec,c,'仕入先'))+'|'+(dpV(sec,c,'伝票No')); if(!groups[key]){groups[key]={supplier:dpV(sec,c,'仕入先'),slip:dpV(sec,c,'伝票No'),date:dpV(sec,c,'伝票日付'),img:dpV(sec,c,'画像リンク'),rows:[]};order.push(key);} groups[key].rows.push(r); });
  var body=order.length?order.map(function(k){ var g=groups[k];
    var lines=g.rows.map(function(r){ var c=r.cells; var refl=dpV(sec,c,'在庫反映');
      return '<div class="dp-dline"><div class="dp-dline-l"><span class="dp-dnm">'+esc(dpV(sec,c,'商品名'))+'</span> <span class="dp-dqty">×'+esc(dpV(sec,c,'本数'))+'</span>'+(refl?'<span class="dp-refl">✓在庫反映済</span>':'')+'</div><span class="dp-damt">¥'+fmtYen(dpV(sec,c,'金額'))+'</span>'+dpRowActions('delivery',r.rowIdx)+'</div>';
    }).join('');
    return '<div class="dp-dgroup"><div class="dp-dhead">🚚 '+esc(g.supplier||'仕入先不明')+' <span class="dp-dsub">伝票'+esc(g.slip)+(g.date?' / '+esc(g.date):'')+'</span>'+dpImg(g.img)+'</div>'+lines+'</div>';
  }).join(''):'<div class="dp-empty">この日の納品はありません</div>';
  return '<div class="dp-sec">'+dpHead('📦','納品',sec.rows.length,sec.total)+body+'</div>';
}
var dpEdit=null;
function editDenpyo(type,rowIdx){
  var sec=denpyoState[type]; if(!sec)return;
  var row=sec.rows.find(function(r){return r.rowIdx===rowIdx;}); if(!row)return;
  dpEdit={type:type,rowIdx:rowIdx};
  var fields=DP_FIELDS[type]||[];
  var form=fields.map(function(f){ var name=f[0],kind=f[1]; var v=dpV(sec,row.cells,name);
    return '<div class="dp-flabel">'+esc(name)+'</div><input id="dpf-'+name+'" class="finput" type="'+(kind==='num'?'number':'text')+'" value="'+esc(String(v))+'">';
  }).join('');
  var body='<div class="dp-editform">'+form+'<div class="actions" style="margin-top:16px"><div class="act pri" onclick="saveDenpyoEdit()">💾 保存</div><div class="act" onclick="openDenpyoManager()">← 戻る</div></div></div>';
  showSheet('✏️ 伝票を修正',body,false);
}
function saveDenpyoEdit(){
  if(!dpEdit)return;
  var fields=DP_FIELDS[dpEdit.type]||[]; var patch={};
  fields.forEach(function(f){ var el=document.getElementById('dpf-'+f[0]); if(el)patch[f[0]]=el.value; });
  var btn=document.querySelector('.dp-editform .act.pri'); if(btn){btn.style.pointerEvents='none';btn.textContent='保存中...';}
  gsr('kioskUpdateDenpyo',DP_SHEET[dpEdit.type],dpEdit.rowIdx,patch).then(function(res){
    if(res&&res.ok){ toast('✅ 修正しました'); openDenpyoManager(); }
    else { alert('保存エラー: '+((res&&res.error)||'')); if(btn){btn.style.pointerEvents='';btn.textContent='💾 保存';} }
  }).catch(function(e){ alert('保存エラー: '+((e&&e.message)||e)); if(btn){btn.style.pointerEvents='';btn.textContent='💾 保存';} });
}
function delDenpyo(type,rowIdx){
  if(!confirm('この伝票行を削除しますか？（元に戻せません）'))return;
  gsr('kioskDeleteDenpyo',DP_SHEET[type],rowIdx).then(function(res){
    if(res&&res.ok){ toast('🗑 削除しました'); openDenpyoManager(); }
    else { alert('削除エラー: '+((res&&res.error)||'')); }
  }).catch(function(e){ alert('削除エラー: '+((e&&e.message)||e)); });
}

/* ============ 🚗 送り管理 ============ */
var okuriState=null;
var OK_DEST_QUICK=['東海市','大治','助光','黒川','名古屋駅'];
function openOkuriManager(){
  closeMenu(); showSheet('🚗 送り管理','<div class="empty-msg">読み込み中...</div>','full');
  if(!IS_GAS){ document.getElementById('sheetBody').innerHTML='<div class="empty-msg">（ローカル）送り管理は本番のみ</div>'; return; }
  gsr('kioskGetOkuriBoard').then(function(r){
    var pf=okuriState?okuriState.filter:'all';
    okuriState={list:(r&&r.list)||[],casts:(r&&r.casts)||[],mode:(r&&r.mode)||'driver',fare:(r&&r.fare)||{yen:0,note:''},edit:null,filter:pf,binSel:{}};
    renderOkuri();
  }).catch(function(){ var b=document.getElementById('sheetBody'); if(b)b.innerHTML='<div class="empty-msg">読み込みエラー</div>'; });
}
function okEntry(name){ return okuriState.list.filter(function(o){return o.name===name;}); }
function renderOkuri(){
  var st=okuriState,b=document.getElementById('sheetBody'); if(!b)return;
  var n=st.list.length, drv=st.mode!=='jisha';
  // 上部: モード + サマリ
  var top='<div class="ok-top"><div class="ok-mode"><button class="ok-mode-btn driver'+(drv?' sel':'')+'" onclick="okMode(\'driver\')">🚗 ドライバー手配</button><button class="ok-mode-btn jisha'+(!drv?' sel':'')+'" onclick="okMode(\'jisha\')">🏠 自社送り</button></div>';
  top+='<div class="ok-summary">🚗 送り '+n+'名'+(drv&&n?'<span class="fare">料金目安 ¥'+Number(st.fare.yen||0).toLocaleString()+'</span>'+(st.fare.note?'<span class="sub">'+esc(st.fare.note)+'</span>':''):'')+(drv?'':'<span class="sub">自社送りモード：ドライバー通知なし</span>')+'</div></div>';
  // 確定リスト帯
  var chips=st.list.length?st.list.slice().sort(function(a,b){return (a.bin||1)-(b.bin||1);}).map(function(o){return '<div class="ok-chip"><span class="bin">'+(o.bin||1)+'便</span>'+esc(o.name)+' → '+esc(o.dest||'（未入力）')+'</div>';}).join(''):'<span class="empty-msg" style="padding:0;font-size:12px">まだ送りはありません</span>';
  var bar='<div class="ok-list-bar"><span class="lbl">✅ 本日の送り確定リスト</span>'+chips+'</div>';
  // ツールバー: 検索 + フィルタ
  var tool='<div class="ok-toolbar"><input id="ok-search" class="finput" placeholder="🔍 スタッフ名で検索" oninput="renderOkuriGrid()"><div class="ok-filter"><button class="ok-fbtn'+(st.filter==='all'?' sel':'')+'" onclick="okFilter(\'all\')">全員</button><button class="ok-fbtn'+(st.filter==='on'?' sel':'')+'" onclick="okFilter(\'on\')">送りありのみ</button></div><span id="ok-count" style="font-size:12px;color:var(--dim);font-weight:700"></span></div>';
  b.innerHTML='<div class="ok-wrap">'+top+bar+tool+'<div class="ok-scroll"><div id="ok-grid"></div></div></div>';
  renderOkuriGrid();
}
function renderOkuriGrid(){
  var st=okuriState,q=((document.getElementById('ok-search')||{}).value||'').trim();
  var names=st.casts.slice();
  // listにいるがcastsに無い名前も拾う
  st.list.forEach(function(o){ if(names.indexOf(o.name)<0) names.push(o.name); });
  var rows=names.filter(function(nm){ if(q&&nm.indexOf(q)<0)return false; if(st.filter==='on'&&!okEntry(nm).length)return false; return true; });
  var el=document.getElementById('ok-grid');
  if(el) el.innerHTML=rows.length?('<div class="ok-grid">'+rows.map(okCard).join('')+'</div>'):'<div class="empty-msg" style="padding:24px 0;font-size:13px">該当スタッフなし</div>';
  var cnt=document.getElementById('ok-count'); if(cnt)cnt.textContent=rows.length+'名';
}
function okCard(name){
  var st=okuriState, ents=okEntry(name), on=ents.length>0, editing=st.edit===name;
  var stLine=on?ents.map(function(o){return '🚗 '+esc(o.dest||'（行き先未入力）')+' ('+(o.bin||1)+'便)';}).join('<br>'):'⚪ 自便（送りなし）';
  var h='<div class="ok-card'+(on?' on':'')+'"><div class="ok-card-nm">'+esc(name)+'</div><div class="ok-card-st '+(on?'on':'off')+'">'+stLine+'</div>';
  if(editing){
    var cur=ents[0]||{dest:'',bin:1}; var bin=st.binSel[name]||cur.bin||1;
    h+='<div class="ok-form"><input id="ok-dest-'+cssId(name)+'" class="finput" placeholder="行き先" value="'+esc(cur.dest||'')+'">';
    h+='<div class="ok-dest-quick">'+OK_DEST_QUICK.map(function(d){return '<button class="ok-dq" onclick="okQuickDest(\''+jsStr(name)+'\',\''+jsStr(d)+'\')">'+esc(d)+'</button>';}).join('')+'</div>';
    h+='<div class="ok-bin-row">'+[1,2].map(function(bn){return '<button class="ok-bin'+(bin===bn?' sel':'')+'" onclick="okBin(\''+jsStr(name)+'\','+bn+')">'+bn+'便</button>';}).join('')+'</div>';
    h+='<div class="ok-form-btns"><button class="ok-btn add" onclick="okSave(\''+jsStr(name)+'\')">保存</button><button class="ok-btn edit" onclick="okuriState.edit=null;renderOkuriGrid()">閉じる</button></div></div>';
  } else if(on){
    h+='<div class="ok-form-btns"><button class="ok-btn edit" onclick="okOpenEdit(\''+jsStr(name)+'\')">変更</button><button class="ok-btn cancel" onclick="okCancel(\''+jsStr(name)+'\')">キャンセル</button></div>';
  } else {
    h+='<button class="ok-btn add" onclick="okOpenEdit(\''+jsStr(name)+'\')">🚗 送りを追加</button>';
  }

/* google.script.run 代替: GAS の fetch API を叩き {__ok,data} を展開（成功で data / 失敗で reject） */
function gsr(fn){
  var a=Array.prototype.slice.call(arguments,1);
  return fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'gunshi',key:KIOSK_KEY,fn:fn,args:a})})
    .then(function(r){return r.json();})
    .then(function(j){ if(j&&j.__ok===false) throw new Error(j.error||'server error'); return j?j.data:j; });
}

function adaptHall(data){
  data=data||{}; var raw=data.seats||[];
  var arr=raw.map(function(s){
    var isWK=(s.type==='W'||s.type==='K');
    var src=(s.occupied||isWK)?(s.casts||[]):[];
    var casts=src.map(function(c){
      var rem=c.setMins?(c.setMins-c.elapsed):0;
      return {n:c.name, mins:isWK?(c.elapsed||0):(c.setMins?rem:0), status:c.status||'ok', unlimited:!isWK&&!c.setMins, nextSeat:c.nextSeat||''};
    });
    var o={code:s.code, floor:s.floor, type:s.type, name:s.short||s.label||s.code,
      pax:(s.rsrv&&s.rsrv.pax)||casts.length||1,
      tantou:(s.rsrv&&s.rsrv.tantouCast)||'',
      casts:casts, tags:(s.tags||[]), ngList:s.ngCast||[], planList:s.planCast||[], recentLeft:s.recentLeft||{}};
    // 同居する複数組（rsrvList）。先頭組は上のcust/pax/tantouに反映済み（旧描画と非破壊）
    o.occupants=(s.rsrvList||[]).map(function(e){return {cust:e.customer||'', pax:Number(e.pax)||1, tantou:e.tantouCast||'', mem:e.memberId||'', rowIdx:e.rowIdx||0};});
    if(!isWK){
      if(s.occupied) o.cust=(s.rsrv&&s.rsrv.customer)?(s.rsrv.customer+' 様'):'ご来店';
      else if(s.rsrv&&s.rsrv.customer) o.cust=s.rsrv.customer+' 様';   // 来店済みだがキャスト未着＝担当不在で表示
      else if(s.yrsrv) o.rsv={time:s.yrsrv.time,cust:s.yrsrv.customer,tantou:s.yrsrv.tantouCast||''};
    }
    return o;
  });
  var byCode={}; arr.forEach(function(o,i){byCode[o.code]=i;});
  var comb=data.combines||{};
  Object.keys(comb).forEach(function(pc){var pi=byCode[pc]; if(pi==null)return; (comb[pc]||[]).forEach(function(oc){var oi=byCode[oc]; if(oi==null)return; (arr[pi].mergeWith=arr[pi].mergeWith||[]).push(oi); arr[oi].mergedTo=pi;});});
  return arr;
}
function adaptRsv(list){return (list||[]).map(function(r){return {id:r.rowIdx, rowIdx:r.rowIdx, time:r.time, cust:r.customer, mem:r.memberId, pax:r.pax, table:r.table||'未定', tantou:r.tantouCast, dohan:r.dohanCast, yoyaku:r.yoyakuCast, status:r.status, note:r.youbou||'', checkInAt:r.checkInAt||null, joined:r.memberSince||'', feeDate:r.annualFeeDate||'', nextMemo:r.nextMemo||'', subCustomers:r.subCustomers||[]};});}
// 同じお客様の予約が複数テーブルに跨る場合、その席同士を1組(結合表示)にまとめる。
// 手動結合が既にある席は尊重してスキップ。キャンセル/退店済み・未定は対象外。
function applyRsvGrouping(){
  if(!SEATS||!RSV) return;
  var byCode={}; SEATS.forEach(function(o,i){byCode[o.code]=i;});
  RSV.forEach(function(r){
    if(r.status==='キャンセル'||r.status==='退店済み'||!r.table||r.table==='未定') return;
    var idxs=String(r.table).split('、').map(function(t){return byCode[tblToCode(t)];}).filter(function(x){return x!=null;});
    if(idxs.length<2) return;
    if(idxs.some(function(i){return SEATS[i].mergedTo!=null||(SEATS[i].mergeWith&&SEATS[i].mergeWith.length);})) return; // 既存結合を尊重
    var pi=idxs[0];
    idxs.slice(1).forEach(function(oi){ (SEATS[pi].mergeWith=SEATS[pi].mergeWith||[]).push(oi); SEATS[oi].mergedTo=pi; });
  });
}
function adaptRot(list){return (list||[]).map(function(c){return {cast:c.cast, interval:c.interval||15, tables:(c.tables||[]).map(function(t){return {key:t.label, code:t.code, cust:(t.cust||'')+(t.cust?'様':''), cur:!!t.current, min:0, wait:t.awayMin||0};})};});}
function adaptShift(list){return (list||[]).map(function(s){return {name:s.name, origName:s.origName||s.name, renamed:!!s.renamed, in:s.in, out:s.out, hayaagari:s.hayaagari, okuri:!!s.okuri, okuriMode:s.okuriMode||'ドライバー', shusen:s.shusen||''};});}
function adaptReq(list){return (list||[]).map(function(r){var store=/店全体|全体/.test(r.target||'');return {id:r.rowIdx, time:r.time, cast:r.name, type:r.type, targetStore:store, targetCust:store?'':custKey(r.target), comment:r.comment||'', handled:!!r.handled};});}

/* ===== 端末時刻ズレ検知（iPadの日付戻し忘れ対策・1分ごと） =====
 * 領収書発行で端末の日付を過去に戻したまま戻し忘れると翌営業の伝票日付がズレる。
 * サーバー時刻(getServerTime)と端末時刻を毎分突合し、閾値超過で：①最上部に赤バナー②reportClockDriftで黒服LINE＋要対応チケット。解消でclearClockDrift。 */
var CLOCK_DRIFT_SEC=43200;   // この秒数以上ズレたら警告。領収書の日付戻しは「日」単位なので12時間閾値に設定＝数分〜数時間の些細なズレは無視し、日付戻し忘れ（≒1日以上前）だけ確実に捕捉
var _clockDrifted=false;
function showDriftBanner(html){
  var b=document.getElementById('clockDriftBanner');
  if(!b){ b=document.createElement('div'); b.id='clockDriftBanner';
    b.style.cssText='position:fixed;top:0;left:0;right:0;z-index:600;background:#b3132a;color:#fff;font-weight:800;font-size:15px;text-align:center;padding:10px 14px;box-shadow:0 2px 12px rgba(0,0,0,.45);font-family:-apple-system,sans-serif;line-height:1.55';
    document.body.appendChild(b); }
  b.innerHTML=html; b.style.display='block';
}
function hideDriftBanner(){ var b=document.getElementById('clockDriftBanner'); if(b)b.style.display='none'; }
function checkClockDrift(){
  if(!IS_GAS||!LOGIN)return;
  var t0=Date.now();
  gsr('getServerTime').then(function(st){
    if(!st||!st.epoch)return;
    var t1=Date.now();
    var offsetSec=Math.round(((t0+t1)/2 - st.epoch)/1000); // 端末 - サーバー（往復遅延を相殺）
    if(Math.abs(offsetSec)>=CLOCK_DRIFT_SEC){
      var behind=offsetSec<0;
      showDriftBanner('🚨 この端末の日付/時刻が'+(behind?'過去に戻っています':'進んでずれています')+'。<br>領収書の日付戻しのあとは【設定 ＞ 一般 ＞ 日付と時刻 ＞ 自動設定】をONに戻してください。');
      gsr('reportClockDrift',offsetSec,new Date().toString()).catch(function(){});
      _clockDrifted=true;
    } else {
      hideDriftBanner();
      if(_clockDrifted){ gsr('clearClockDrift').catch(function(){}); _clockDrifted=false; }
    }
  }).catch(function(){});
}
