<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="IEYASи»Қеё«">
<meta name="theme-color" content="#0b0b12">
<title>IEYASи»Қеё«</title>
<style>
:root{
  --bg:#0b0b12; --panel:#12121f; --panel2:#161626; --line:#22223c; --line2:#2c2c48;
  --txt:#e8f0ff; --sub:#8a9ac0; --dim:#5a6a90; --accent:#7ab0f0; --accent-bg:#0f2040; --accent-line:#1a50a0;
  --ok:#4dcc84; --ok-bg:#0a2016; --ok-line:#1f6040;
  --warn:#e6b23a; --warn-bg:#1c1400; --warn-line:#6a5000;
  --over:#ee5a5a; --over-bg:#1e0808; --over-line:#7a2020;
  --green:#66cc88; --gold:#e6b23a; --pink:#e08ad0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;}
body{display:flex;flex-direction:column;height:100vh;}

/* ---------- Header ---------- */
/* iPad/iPhoneгҒ®PWAе…Ёз”»йқўгҒ§гҒҜгӮ№гғҶгғјгӮҝгӮ№гғҗгғј(жҷӮиЁҲзӯү)гҒҢгғҳгғғгғҖгғјгҒ«йҮҚгҒӘгӮӢгҒҹгӮҒгҖҒгӮ»гғјгғ•гӮЁгғӘгӮўеҲҶгҒ гҒ‘дёҠйғЁгӮ’дёӢгҒ’гҒҰгғңгӮҝгғігҒ®еҪ“гҒҹгӮҠеҲӨе®ҡгӮ’зўәдҝқ */
.hdr{display:flex;align-items:center;gap:12px;padding:calc(9px + env(safe-area-inset-top)) calc(15px + env(safe-area-inset-right)) 9px calc(15px + env(safe-area-inset-left));background:linear-gradient(180deg,#16162a,#101020);border-bottom:1px solid var(--line);flex-shrink:0;}
.brand{font-size:15px;font-weight:800;letter-spacing:.5px;white-space:nowrap;}
.brand .z{color:var(--accent);}
.term-badge{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-bg);border:1px solid var(--accent-line);padding:3px 9px;border-radius:20px;white-space:nowrap;}
.datenav{display:flex;align-items:center;gap:6px;margin-left:2px;}
.dbtn{width:30px;height:30px;border-radius:9px;border:1px solid var(--line2);background:var(--panel2);color:var(--accent);font-size:16px;cursor:pointer;line-height:1;}
.dtoday{padding:5px 11px;border-radius:9px;border:1px solid var(--accent-line);background:var(--accent-bg);color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;}
.dlabel{font-size:14px;font-weight:800;min-width:110px;text-align:center;}
.spacer{flex:1;}
.clock{font-size:11px;color:var(--sub);text-align:right;line-height:1.3;white-space:nowrap;}
.clock b{color:#fff;font-size:15px;}
.who{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line2);border-radius:22px;padding:5px 6px 5px 12px;cursor:pointer;white-space:nowrap;}
.who .nm{font-size:13px;font-weight:700;}
.who .lo{font-size:10px;color:#ee7a63;background:#2a1010;border:1px solid #5a2020;border-radius:14px;padding:3px 9px;}

/* ---------- Alert bar ---------- */
.alertbar{display:flex;align-items:stretch;gap:10px;padding:9px 15px;background:linear-gradient(180deg,#14101c,#0d0b14);border-bottom:1px solid var(--line);flex-shrink:0;min-height:64px;}
.alert-lead{display:flex;flex-direction:column;justify-content:center;padding-right:12px;border-right:1px solid var(--line2);flex-shrink:0;min-width:96px;}
.alert-lead .big{font-size:24px;font-weight:900;line-height:1;}
.alert-lead .cap{font-size:10px;color:var(--sub);font-weight:700;margin-top:3px;letter-spacing:.5px;}
.alert-lead.calm .big{color:var(--ok);}
.alert-lead.busy .big{color:var(--over);}
.alert-scroll{display:flex;gap:9px;overflow-x:auto;flex:1;padding-bottom:2px;align-items:center;}
.alert-scroll::-webkit-scrollbar{height:5px;}
.alert-scroll::-webkit-scrollbar-thumb{background:#2a2a48;border-radius:3px;}
.achip{flex-shrink:0;display:flex;align-items:center;gap:9px;padding:8px 13px;border-radius:11px;cursor:pointer;border:1px solid;min-width:190px;max-width:280px;}
.achip .aic{font-size:19px;line-height:1;}
.achip .atx{display:flex;flex-direction:column;gap:2px;overflow:hidden;}
.achip .amain{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.achip .asub{font-size:10px;font-weight:700;opacity:.85;white-space:nowrap;}
.achip.lv1{background:linear-gradient(180deg,#2a0d0d,#1e0808);border-color:#7a2424;animation:apulse 1.5s ease-in-out infinite;}
.achip.lv1 .amain{color:#ffb3b3;} .achip.lv1 .asub{color:#ee8080;}
.achip.lv2{background:#201800;border-color:#6a5000;}
.achip.lv2 .amain{color:#ffd980;} .achip.lv2 .asub{color:#d0a848;}
.achip.lv3{background:#0c1c34;border-color:#245086;}
.achip.lv3 .amain{color:#9dc8ff;} .achip.lv3 .asub{color:#6a9cd8;}
.achip.lv4{background:#0d2018;border-color:#245a3c;}
.achip.lv4 .amain{color:#8fe0b0;} .achip.lv4 .asub{color:#5cc088;}
@keyframes apulse{0%,100%{box-shadow:0 0 0 0 rgba(238,90,90,0);}50%{box-shadow:0 0 0 3px rgba(238,90,90,.25);}}
.alert-none{display:flex;align-items:center;gap:8px;color:var(--ok);font-size:14px;font-weight:700;padding-left:4px;}
/* гӮҝгӮ№гӮҜгғҒгӮұгғғгғҲгғ»гӮҝгӮӨгғ гғ©гӮӨгғі */
.tl-scroll{display:flex;gap:8px;overflow-x:auto;flex:1;align-items:stretch;padding-bottom:2px;}
.tl-scroll::-webkit-scrollbar{height:5px;} .tl-scroll::-webkit-scrollbar-thumb{background:#2a2a48;border-radius:3px;}
.ticket{flex-shrink:0;min-width:168px;max-width:230px;border-radius:10px;border:1px solid var(--line2);background:var(--panel2);overflow:hidden;cursor:pointer;display:flex;flex-direction:column;}
.ticket:active{transform:scale(.98);}
.tk-time{font-size:10px;font-weight:800;padding:3px 9px;letter-spacing:.5px;}
.tk-body{display:flex;gap:8px;padding:6px 9px 8px;align-items:flex-start;}
.tk-ic{font-size:16px;line-height:1.15;flex-shrink:0;}
.tk-tx{display:flex;flex-direction:column;overflow:hidden;}
.tk-title{font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tk-sub{font-size:10px;font-weight:700;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--sub);}
.ticket.k-now-crit{border-color:#7a2424;animation:apulse 1.5s ease-in-out infinite;}
.ticket.k-now-crit .tk-time{background:#3a1212;color:#ff9a9a;} .ticket.k-now-crit .tk-title{color:#ffb3b3;}
.ticket.tk-blink{animation:tkblink 1s steps(1,end) infinite;}
@keyframes tkblink{0%,49%{background:#3a1010;border-color:#ff5a5a;box-shadow:0 0 0 2px rgba(255,70,70,.55);}50%,100%{background:var(--panel2);border-color:#7a2424;box-shadow:none;}}
.ticket.k-now-rot{border-color:#7a5010;} .ticket.k-now-rot .tk-time{background:#2a1e00;color:#ffcf6a;} .ticket.k-now-rot .tk-title{color:#ffd980;}
.ticket.k-soon{border-color:#5a4200;} .ticket.k-soon .tk-time{background:#201800;color:#e6c060;} .ticket.k-soon .tk-title{color:#e6c060;}
.ticket.k-todo{border-color:#7a4a1a;border-style:dashed;} .ticket.k-todo .tk-time{background:#241400;color:#ffb070;} .ticket.k-todo .tk-title{color:#ffb070;}
.ticket.k-preview{border-style:dashed;} .ticket.k-preview .tk-time{background:#0c1c34;color:#9dc8ff;} .ticket.k-preview .tk-title{color:#bcd8ff;}
.ticket.k-preview-cast{border-style:dashed;} .ticket.k-preview-cast .tk-time{background:#241428;color:#e0a0d0;} .ticket.k-preview-cast .tk-title{color:#e6b0d6;}
.ticket.k-preview-task{border-style:dashed;} .ticket.k-preview-task .tk-time{background:#102a26;color:#8fe0c0;} .ticket.k-preview-task .tk-title{color:#8fe0c0;}
/* иҰҒеҜҫеҝңгӮӯгғҘгғјпјҲжҷӮй–“гӮҝгӮ№гӮҜгғ»е‘јгҒіеҮәгҒ—пјү: жҠјгҒ—гҒҰе®ҢдәҶ */
.ticket.k-task{border-color:#2a6a9a;} .ticket.k-task .tk-time{background:#12283a;color:#7ac6ff;} .ticket.k-task .tk-title{color:#cfe4ff;}
.ticket.k-task .tk-done{font-size:10px;font-weight:800;text-align:center;padding:3px;background:#12283a;color:#7ac6ff;border-top:1px solid #24405a;}
.ticket.k-task:active{filter:brightness(1.25);}
.ticket.k-admin{border-color:#6a4a2a;} .ticket.k-admin .tk-time{background:#2a1f10;color:#ffbf6a;} .ticket.k-admin .tk-title{color:#ffd9a0;} .ticket.k-admin .tk-done{background:#2a1f10;color:#ffbf6a;border-top-color:#4a3520;}
/* гӮҝгӮ№гӮҜи©ізҙ°гғқгғғгғ—гӮўгғғгғ— */
.tdetail{padding:6px 2px 4px;}
.td-title{font-size:18px;font-weight:800;line-height:1.5;color:var(--txt);margin-bottom:12px;word-break:break-word;white-space:pre-wrap;}
.td-memo{font-size:14px;line-height:1.65;color:var(--sub);background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:12px;word-break:break-word;}
.td-meta{font-size:12px;color:var(--dim);font-weight:700;margin-bottom:18px;}
.td-actions{display:flex;gap:10px;}
.td-done{flex:1;padding:13px;border-radius:11px;border:1px solid #2f7a4a;background:#12331f;color:#7ee0a0;font-weight:800;font-size:15px;cursor:pointer;}
.td-close{padding:13px 20px;border-radius:11px;border:1px solid var(--line2);background:var(--panel2);color:var(--sub);font-weight:700;font-size:15px;cursor:pointer;}

/* ---------- Dashboard split ---------- */
.dash{flex:1;display:flex;gap:12px;padding:12px 15px;min-height:0;}
.col{background:var(--panel);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;min-height:0;}
.col-hall{flex:1.65;}
.col-rsv{flex:1;min-width:330px;}
.col-hd{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);flex-shrink:0;}
.col-hd .ttl{font-size:14px;font-weight:800;}
.col-hd .cnt{font-size:11px;color:var(--sub);font-weight:700;}
.col-hd .mini-btn{font-size:12px;font-weight:700;padding:6px 11px;border-radius:9px;border:1px solid var(--line2);background:var(--panel2);color:var(--accent);cursor:pointer;}
.col-hd .mini-btn.add{background:#0d2016;border-color:#25603e;color:var(--ok);}
.col-scroll{flex:1;overflow-y:auto;padding:12px 13px 16px;min-height:0;}

/* ---------- Hall (seats) ---------- */
.floors{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.floor .floor-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 2px;}
.floor .fl{font-size:14px;font-weight:800;letter-spacing:1px;}
.floor .meta{font-size:10px;color:var(--sub);}
.grp-lbl{font-size:10px;color:var(--dim);font-weight:700;letter-spacing:.5px;margin:8px 2px 5px;}
.seatgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.seatgrid.box{grid-template-columns:1fr;}
.seat{border-radius:10px;border:1px solid var(--line2);background:var(--panel2);padding:8px 9px;min-height:70px;cursor:pointer;position:relative;overflow:hidden;transition:.1s;}
.seat:active{transform:scale(.985);}
.seat .st{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.seat .snm{font-size:11px;font-weight:800;color:#c8d4ee;}
.seat .pax{font-size:10px;color:var(--dim);}
.seat .cust{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.seat .seat-info{font-size:10px;color:#9ab0d0;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
/* е®ўеҗҚгҒ®дёӢгҒ®гҖҢдәҲзҙ„гӮӯгғЈгӮ№гғҲгғ»жӢ…еҪ“гӮӯгғЈгӮ№гғҲгҖҚгғ©гғҷгғ«пјҲеңЁеёӯгҒЁгҒҜеҲҘгҒ®жғ…е ұпјү */
.seat .sctx-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
.seat .sctx{font-size:9px;font-weight:800;padding:1px 6px;border-radius:7px;white-space:nowrap;}
.seat .sctx.y{background:#0a1e2e;border:1px solid #2a5a7a;color:#7ab0f0;}
.seat .sctx.t{background:#1e1030;border:1px solid #5a3a8a;color:#c69ae0;}
.seat .sctx-away{color:#e0a860;font-weight:700;}
.seat .seat-info .bp{color:#8fd06a;margin-left:3px;}
.seat .seat-info .dot{color:#44506a;margin:0 3px;}
.seat.waiting{background:#0e1220;border-color:#243a5a;}
.seat.waiting .snm{color:#99aacc;}
.seat.kurofuku{background:#131313;border-color:#2e2e2e;}
.seat.kurofuku .snm{color:#bbb;}
.seat .casts{margin-top:3px;display:flex;flex-direction:column;gap:2px;}
.seat .crow{display:flex;align-items:center;justify-content:space-between;font-size:11px;}
.seat .cnm{color:#cfe0ff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.seat .cmin{font-variant-numeric:tabular-nums;font-weight:800;font-size:11px;padding:0 6px;border-radius:6px;margin-left:6px;white-space:nowrap;}
.seat .empty{font-size:13px;color:var(--dim);display:flex;align-items:center;height:42px;}
.seat .tags{display:flex;flex-wrap:wrap;gap:3px;margin:1px 0;}
.tg{font-size:9px;font-weight:800;padding:1px 6px;border-radius:5px;}
.tg.vip{background:#2a1030;color:#e79ad6;border:1px solid #6a2a70;}
.tg.bottle{background:#12240f;color:#8fd06a;border:1px solid #356020;}
.tg.bday{background:#151046;color:#9d90ee;border:1px solid #4436a8;}
.tg.ng{background:#2a0e0e;color:#f08080;border:1px solid #7a2828;}
.seat .rsvline{margin-top:4px;font-size:10px;color:#ffcc55;background:#1a1400;border:1px solid #4a3800;border-radius:6px;padding:2px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.req-badge{font-size:9px;font-weight:800;padding:1px 6px;border-radius:5px;background:#20203a;color:#9aa8c8;border:1px solid var(--line2);cursor:pointer;}
.req-badge.un{background:#2a1600;color:#ffb060;border-color:#7a4a10;animation:apulse 1.6s ease-in-out infinite;}
.req-card{background:var(--panel2);border:1px solid #5a3a20;border-radius:11px;padding:11px 13px;margin-bottom:9px;}
.req-card.done{opacity:.55;border-color:var(--line2);}
.rq-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.rq-time{font-size:11px;color:var(--sub);font-weight:700;}
.rq-cast{font-size:14px;font-weight:800;}
.rq-type{font-size:12px;font-weight:800;padding:2px 8px;border-radius:6px;}
.rq-type.ng{background:#2a0e0e;color:#f08080;border:1px solid #7a2828;}
.rq-type.want{background:#0d2618;color:#79e0a8;border:1px solid #2a6a44;}
.rq-done{margin-left:auto;font-size:11px;color:var(--sub);display:flex;align-items:center;gap:4px;cursor:pointer;}
.rq-target{font-size:13px;font-weight:700;margin-top:7px;color:#cfe0ff;}
.rq-comment{font-size:12px;color:var(--sub);margin-top:5px;background:#0f0f1c;border-radius:7px;padding:6px 9px;border:1px solid var(--line);}
/* жӢ…еҪ“ / дәҲзҙ„еёӯгҒ®жҳҺзӨә */
.seat.reserved{background:#0c1626;border:1px dashed #2f5a90;}
.seat .rsv-tag{font-size:9px;font-weight:800;color:#9dc8ff;background:#12233f;border:1px solid #2a5590;border-radius:5px;padding:1px 6px;}
.seat .rsv-meta{font-size:11px;color:#7ab0f0;margin-top:3px;font-weight:600;}
.seat .rsv-meta .rt{color:#9dc8ff;font-weight:800;}
.crow.istantou .cnm{color:#7be0a8;font-weight:800;}
.crow.tantou-away .cnm{color:#ffbf6a;font-weight:800;}
.tmini{font-size:8px;font-weight:800;padding:0 4px;border-radius:4px;margin-left:3px;vertical-align:middle;}
.crow.istantou .tmini{background:#123020;color:#7be0a8;}
.crow.tantou-away .tmini{background:#2a1e00;color:#ffbf6a;}
.crow.tantou-away .cmin{color:#ffbf6a !important;background:#241800 !important;border-color:#5a4010 !important;}
.seat.ok{background:var(--ok-bg);border-color:var(--ok-line);}
.seat.ok .cmin{color:var(--ok);background:#071410;border:1px solid #143a26;}
.seat.warn{background:var(--warn-bg);border-color:var(--warn-line);}
.seat.warn .cmin{color:var(--warn);background:#160f00;border:1px solid #4a3800;}
.seat.over{background:var(--over-bg);border-color:var(--over-line);animation:blink 1.6s ease-in-out infinite;}
.seat.over .cmin{color:var(--over);background:#140505;border:1px solid #5a1a1a;}
.seat.over .cust{color:#ffbdbd;}
@keyframes blink{0%,100%{box-shadow:0 0 0 0 rgba(238,90,90,0);}50%{box-shadow:0 0 0 2px rgba(238,90,90,.35);}}
.seat .cnr{position:absolute;top:0;right:0;font-size:9px;padding:2px 6px;border-bottom-left-radius:8px;font-weight:800;}
.seat.ok .cnr{background:#123a26;color:#7be0a8;}
.seat.warn .cnr{background:#3a2c00;color:#ffcf6a;}
.seat.over .cnr{background:#4a1212;color:#ff9a9a;}

/* ---------- Reservation list ---------- */
.rlist{display:flex;flex-direction:column;gap:4px;}
.rcard{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:5px 10px;cursor:pointer;}
.rcard.done{opacity:.5;}
.rcard.next{border-color:#245086;box-shadow:0 0 0 1px #1a3a66 inset;}
.rtop{display:flex;align-items:center;gap:7px;}
.rtime{font-size:14px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;white-space:nowrap;}
.rname{font-size:12px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rname .mem{font-size:10px;color:var(--sub);font-weight:600;margin-left:4px;}
.rmemchip{font-size:10px;font-weight:800;padding:2px 7px;border-radius:9px;white-space:nowrap;flex-shrink:0;border:1px solid;}
.rmemchip.exp{background:#2a0e0e;color:#ff9a9a;border-color:#7a2828;}
.rmemchip.soon{background:#241a00;color:#ffcf6a;border-color:#6a5000;}
.rmemchip.ok{background:#0d2216;color:#7fe0a3;border-color:#2a6a44;}
.rmemchip.none{background:#20242e;color:#aab4c4;border-color:#3a4150;}
.stbtns{display:flex;gap:5px;flex-shrink:0;align-items:center;}
.stbtns .stact,.stbtns .stundo,.stbtns .stpill{flex-shrink:0;}
.stpill{font-size:10px;font-weight:800;padding:3px 8px;border-radius:7px;white-space:nowrap;}
.stpill.wait{background:#12233f;border:1px solid #2a5590;color:#8fc0ff;}
.stpill.arr{background:#0d2618;border:1px solid #2a6a44;color:#79e0a8;}
.stpill.left{background:#241024;border:1px solid #66346a;color:#e79ad6;}
.stact{padding:4px 11px;font-size:11px;font-weight:800;border-radius:8px;border:1px solid;cursor:pointer;white-space:nowrap;}
.stact.arr{background:#0d2618;border-color:#2a6a44;color:#8ff0b0;}
.stact.left{background:#241800;border-color:#7a5010;color:#ffbf5a;}
.stundo{padding:4px 8px;font-size:11px;border-radius:8px;border:1px solid var(--line2);background:var(--panel);color:var(--sub);cursor:pointer;white-space:nowrap;}
.stundo.wide{padding:6px 12px;}
.rbadges{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
.rb{font-size:9px;padding:1px 6px;border-radius:6px;background:#191930;color:#a9bce0;border:1px solid var(--line2);}
.rb.t{color:#8fd06a;border-color:#2f5020;background:#101d0c;}
.rb.d{color:#ffbf6a;border-color:#5a4010;background:#1c1300;}
.rb.undef{color:#ff9a6a;border-color:#7a3a1a;background:#241000;}

/* ---------- Sheet (seat detail / add / schedule) ---------- */
.scrim{position:fixed;inset:0;background:rgba(4,4,10,.55);opacity:0;pointer-events:none;transition:.2s;z-index:40;}
.scrim.show{opacity:1;pointer-events:auto;}
.sheet{position:fixed;top:0;right:0;bottom:0;width:min(460px,92vw);background:var(--panel);border-left:1px solid var(--line2);transform:translateX(100%);transition:.24s cubic-bezier(.2,.7,.2,1);z-index:41;display:flex;flex-direction:column;}
.sheet.wide{width:min(860px,96vw);}
.sheet.full{width:100vw;border-left:none;}
.sheet.full .sheet-bd{padding:0;}
.sheet.show{transform:translateX(0);}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--line);flex-shrink:0;}
.sheet-hd .t{font-size:17px;font-weight:800;}
.sheet-hd .x{font-size:13px;color:var(--sub);background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:7px 12px;cursor:pointer;}
.sheet-bd{flex:1;overflow-y:auto;padding:16px 18px;}
.sheet-bd .kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;}

.act.warn{background:#241800;border-color:#7a5010;color:#ffbf5a;}
.act.dng{background:#240e0e;border-color:#7a2828;color:#f08080;}

/* ============ HELPERS ============ */
function tmin(hhmm){var p=String(hhmm).split(':');var h=parseInt(p[0]);if(h<6)h+=24;return h*60+(parseInt(p[1])||0);}
function fmtTime(hhmm){var p=String(hhmm).split(':');var h=parseInt(p[0]);return h>=24?('зҝҢ'+(h-24)+':'+p[1]):hhmm;}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
var TAGLABEL={vip:'VIP',bottle:'рҹҚ¶гғңгғҲгғ«',bday:'рҹҺӮиӘ•з”ҹж—Ҙ',ng:'вҡ NG'};
function parseKey(s){var p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
function dateLabel(s){var d=parseKey(s);var w=['ж—Ҙ','жңҲ','зҒ«','ж°ҙ','жңЁ','йҮ‘','еңҹ'][d.getDay()];return (d.getMonth()+1)+'/'+d.getDate()+'пјҲ'+w+'пјү';}
function shortNm(n){return n.replace('гӮ«гӮҰгғігӮҝгғј','гӮ«гӮҰ').replace('гғңгғғгӮҜгӮ№','BOX');}
function seatIdx(s){return SEATS.indexOf(s);}
function seatStatus(s){if(s.type==='W')return 'waiting';if(s.type==='K')return 'kurofuku';if(!s.casts||!s.casts.length)return s.cust?'nocast':'empty';if(s.casts.some(function(c){return c.status==='over';}))return 'over';if(s.casts.some(function(c){return c.status==='warn';}))return 'warn';return 'ok';}
function overMins(s){return -Math.min.apply(null,s.casts.map(function(c){return c.mins;}));}
function warnMin(s){return Math.min.apply(null,s.casts.filter(function(c){return c.status==='warn';}).map(function(c){return c.mins;}));}

/* ============ CLOCK / DATE ============ */
function tickClock(){var d=new Date();var hh=('0'+d.getHours()).slice(-2),mm=('0'+d.getMinutes()).slice(-2);document.getElementById('clock').innerHTML='<b>'+hh+':'+mm+'</b><br>жӣҙж–° '+hh+':'+mm;}
function shiftDay(n){var d=parseKey(curDate);d.setDate(d.getDate()+n);curDate=fmtKey(d);renderAll();}
function goToday(){curDate=TODAY;renderAll();}

/* ============ ALERT BAR ============ */
function nowBizMin(){var n=new Date();var h=n.getHours();if(h<6)h+=24;return h*60+n.getMinutes();}
// еҗҢдјҙдәҲзҙ„гҒҜ20:30жқҘеә—гҒЁгҒ—гҒҰжүұгҒҶпјҲйЎ§е®ўеҗҚгҒ«гҖҢеҗҢдјҙгҖҚгӮ’еҗ«гӮҖдәҲзҙ„гҒҢеҜҫиұЎпјү
function rsvArrT(r){return /еҗҢдјҙ/.test((r.cust||r.customer||'')+' '+(r.time||''))?'20:30':(r.time||'');}
function rsvLateMin(r){return nowBizMin()-tmin(rsvArrT(r));}
function buildTimeline(){
  var t=[];
  // д»ҠпјҡжқҘеә—дәҲе®ҡгӮ’15еҲҶи¶…йҒҺпјҲзўәе®ҡгғ»жңӘжқҘеә—пјүвҶ’ жӢ…еҪ“гҒ«жқҘеә—зўәиӘҚпјҲиөӨзӮ№ж»…пјү
  RSV.forEach(function(r){ if(r.status!=='зўәе®ҡ')return; var late=rsvLateMin(r); if(late>=15) t.push({g:0,kind:'now-crit',blink:true,ic:'рҹ•ҳ',time:'д»Ҡ',min:-1000-late,title:r.cust+'ж§ҳ жқҘеә—'+late+'еҲҶи¶…йҒҺ',sub:(r.tantou?'жӢ…еҪ“ '+r.tantou+' гҒ«жқҘеә—зўәиӘҚ':'жӢ…еҪ“гҒ«жқҘеә—зўәиӘҚ')+'пјҲ'+rsvArrT(r)+'дәҲзҙ„пјү',act:'editRsv('+r.id+')'}); });
  // д»Ҡпјҡи¶…йҒҺ
  SEATS.forEach(function(s,idx){
    var st=seatStatus(s);
    if(st==='over') t.push({g:0,kind:'now-crit',ic:'рҹ”ҙ',time:'д»Ҡ',min:-overMins(s),title:s.floor+' '+shortNm(s.name)+' '+s.cust,sub:overMins(s)+'еҲҶи¶…йҒҺ',act:'openSeat('+idx+')'});
  });
  // д»Ҡпјҡд»ҳгҒ‘еӣһгҒ—иҰҒ
  ROT.forEach(function(c){if(!isMulti(c))return;var w=worstWait(c),iv=rotInterval(c);if(w&&(w.alert||(w.wait||0)>=iv))t.push({g:1,kind:'now-rot',ic:'рҹ”„',time:'д»Ҡ',min:-(w.wait||0),title:c.cast+' вҶ’ '+w.key+' '+w.cust,sub:'жҠңгҒ‘гҒҰ'+(w.wait||0)+'еҲҶгғ»д»ҳгҒ‘еӣһгҒ—',act:'switchRight(\'rot\')'});});

function startCombine(idx){ closeSheet(); combineMode=true; combinePrimary=idx; renderHall(); showCombineBar(); }
function showCombineBar(){ var p=SEATS[combinePrimary]; var b=document.getElementById('combinebar'); b.className='castbar movemode show'; b.innerHTML='<div class="cb-info">рҹ”— '+esc(p.floor+' '+shortNm(p.name))+' гҒ«зөҗеҗҲгҒҷгӮӢеёӯгӮ’гӮҝгғғгғ—</div><div class="cb-btns"><button class="cb cmb" onclick="finishCombine()">е®ҢдәҶ</button><button class="cb x" onclick="cancelCombine()">гӮӯгғЈгғігӮ»гғ«</button></div>'; }
function hideCombineBar(){ document.getElementById('combinebar').className='castbar'; }
function mergeSeat(target){
  if(target===combinePrimary) return;

  else { t.casts=[]; }

}

/* ---- гҒӨгҒ‘гҒҫгӮҸгҒ—гғңгғјгғү ---- */
function worstWait(c){var w=c.tables.filter(function(t){return !t.cur;});if(!w.length)return null;return w.slice().sort(function(a,b){return (b.wait||0)-(a.wait||0);})[0];}
function isMulti(c){return c.tables.length>=2;}
function rotInterval(c){return c.interval||15;}
function needsAction(c){
  var cur=c.tables.find(function(t){return t.cur;});
  if(cur&&cur.over)return true;
  if(!isMulti(c))return false;
  var iv=rotInterval(c);
  return c.tables.some(function(t){return !t.cur&&(t.alert||(t.wait||0)>=iv);});
}
function renderRotation(){
  var list=ROT.slice().sort(function(a,b){var d=(needsAction(b)?1:0)-(needsAction(a)?1:0);return d||(b.tables.length-a.tables.length);});
  var multi=ROT.filter(isMulti);
  var loadmap=multi.length?'<div class="loadmap">'+multi.slice().sort(function(a,b){return b.tables.length-a.tables.length;}).map(function(c){
      return '<div class="lm l'+(c.tables.length>=3?'3':'2')+'" onclick="scrollToCast(\''+esc(c.cast)+'\')">'+esc(c.cast)+' <span class="n">'+c.tables.length+'еҚ“ / '+rotInterval(c)+'еҲҶ</span></div>';
    }).join('')+'</div>':'';
  var html='<div class="rot-sum">рҹ”„ жӢ…еҪ“гӮӯгғЈгӮ№гғҲгҒ®е·ЎеӣһзҠ¶жіҒгҖҖжҺӣгҒ‘жҢҒгҒЎ <b style="color:#ffcf6a">'+multi.length+'еҗҚ</b>гҖҖиҰҒд»ҳгҒ‘еӣһгҒ— <b>'+ROT.filter(needsAction).length+'д»¶</b></div>'
    + loadmap + list.map(rcastHtml).join('');
  setHtml('rsvArea',html);
}
function scrollToCast(name){var el=document.getElementById('rcast-'+name);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});}
function rcastHtml(c){

  var others=c.tables.filter(function(t){return !t.cur;});
  var multi=isMulti(c), iv=rotInterval(c), act=needsAction(c);

    : '<span class="rload l1">е°Ӯд»»</span>';

  if(cur){
    var left=iv-cur.min;
    var rt=cur.over?'и¶…йҒҺ '+cur.min+'еҲҶ'
         :multi?(left<=0?'дәӨд»ЈжҷӮжңҹгғ»'+cur.min+'еҲҶ':'жҺҘе®ўдёӯ '+cur.min+'еҲҶ<span style="color:#8a9ac0"> / гҒӮгҒЁ'+left+'еҲҶ</span>')
         :'жҺҘе®ўдёӯ '+cur.min+'еҲҶ';
    var cc=((multi&&left<=0)||cur.over)?'overw':'cur';
    rows+='<div class="rtab '+cc+'"><span class="tl">рҹҺӨ '+esc(cur.key)+' '+esc(cur.cust)+'</span><span class="tr">'+rt+'</span></div>';
  }

    var w=t.wait||0;
    var wc=(t.alert||w>=iv)?'overw':(w>=iv*0.6?'warnw':'wait');
    rows+='<div class="rtab '+wc+'"><span class="tl">вҸі '+esc(t.key)+' '+esc(t.cust)+'</span><span class="tr">жҠңгҒ‘гҒҰ'+w+'еҲҶ'+(t.alert?'гғ»'+esc(t.alert):(w>=iv?'гғ»дәӨд»ЈгӮ’':''))+'</span></div>';
  });

  var nm='<span class="sr-nm" onclick="setGenji('+i+')" title="жәҗж°ҸеҗҚгӮ’дҝ®жӯЈпјҲеҪ“ж—Ҙпјү">'+esc(s.name)+(s.renamed?'<span class="rnm">ж”№</span>':'')+'<span class="pen">вңҺ</span></span>'+castBadge(s.name);

/* еҪ“ж—ҘгҒ®жәҗж°ҸеҗҚгӮ’дҝ®жӯЈпјҲдҪ“йЁ“гҒ®еӯҗгҒӘгҒ©пјүгҖӮз©әж¬„гҒ§е…ғеҗҚгҒ«жҲ»гҒҷгҖӮkeyгҒҜе…ғгҒ®гӮ·гғјгғҲеҗҚгҖӮ */
function setGenji(i){
  var s=SHIFT[i]; var orig=s.origName||s.name;
  var t=prompt('гҖҢ'+orig+'гҖҚгҒ®еҪ“ж—ҘгҒ®жәҗж°ҸеҗҚпјҲдҪ“йЁ“гҒ®еӯҗгҒӘгҒ©гғ»з©әж¬„гҒ§е…ғгҒ«жҲ»гҒҷпјү', s.renamed?s.name:orig);
  if(t===null)return; t=String(t).trim();
  s.name=(t&&t!==orig)?t:orig; s.renamed=(s.name!==orig); /* жҘҪиҰізҡ„еҸҚжҳ  */
  renderShift(); renderAlerts();
  if(IS_GAS)gsr('kioskSetGenji',orig,t).then(function(){loadAll();}).catch(function(){toast('дҝқеӯҳгӮЁгғ©гғј');loadAll();});
}
/* еҪ“ж—ҘгҒ®зөӮйӣ»жғ…е ұпјҲжҷӮеҲ»пјӢиҮӘз”ұгғЎгғўпјүгҖӮз©әж¬„гҒ§и§ЈйҷӨгҖӮ */
function setShusen(i){
  var s=SHIFT[i];
  var t=prompt(s.name+' гҒ®зөӮйӣ»жғ…е ұпјҲдҫӢ 24:35 / 24:10 дә¬зҺӢз·ҡгғ»з©әж¬„гҒ§и§ЈйҷӨпјү', s.shusen||'');
  if(t===null)return; t=String(t).trim();
  s.shusen=t; renderShift();
  if(IS_GAS)gsr('kioskSetShusen',s.name,t).catch(function(){toast('дҝқеӯҳгӮЁгғ©гғј');loadAll();});
}

var UNDO_WINDOW_MS=10*60*1000; /* жқҘеә—гҒӢгӮү10еҲҶд»ҘеҶ…гҒ®гҒҝжқҘеә—еүҚгҒ«жҲ»гҒӣгӮӢ */
function canUndoCheckin(r){ return !r.checkInAt || (Date.now()-r.checkInAt)<UNDO_WINDOW_MS; }
function statusBtns(r){
  var h;
  if(r.status==='жқҘеә—жёҲгҒҝ'){
    var undo=canUndoCheckin(r)?'<button class="stundo" title="жқҘеә—еүҚгҒ«жҲ»гҒҷпјҲжқҘеә—гҒӢгӮү10еҲҶд»ҘеҶ…пјү" onclick="setStatus('+r.id+',\'зўәе®ҡ\')">вҶ©</button>':'';
    h='<span class="stpill arr">рҹҹў жқҘеә—дёӯ</span><button class="stact left" onclick="setStatus('+r.id+',\'йҖҖеә—жёҲгҒҝ\')">рҹҡӘ йҖҖеә—</button>'+undo;
  }else if(r.status==='йҖҖеә—жёҲгҒҝ'){
    h='<span class="stpill left">рҹҡӘ йҖҖеә—жёҲ</span><button class="stundo wide" onclick="setStatus('+r.id+',\'жқҘеә—жёҲгҒҝ\')">вҶ© жқҘеә—дёӯгҒ«жҲ»гҒҷ</button>';
  }else{
    h='<span class="stpill wait">вҸі жқҘеә—еүҚ</span><button class="stact arr" onclick="setStatus('+r.id+',\'жқҘеә—жёҲгҒҝ\')">вң… жқҘеә—</button>';
  }
  return '<div class="stbtns" onclick="event.stopPropagation()">'+h+'</div>';
}
function setStatus(id,s){
  var r=RSV.find(function(x){return x.id===id;}); if(!r)return;
  if(s==='зўәе®ҡ'&&!canUndoCheckin(r)){ toast('жқҘеә—гҒӢгӮү10еҲҶд»ҘдёҠзөҢйҒҺгҒ—гҒҹгҒҹгӮҒжҲ»гҒӣгҒҫгҒӣгӮ“'); return; }
  r.status=s;
  if(s==='жқҘеә—жёҲгҒҝ') r.checkInAt=Date.now();          // жҘҪиҰізҡ„гҒ«жқҘеә—жҷӮеҲ»гӮ’иЁҳйҢІпјҲ10еҲҶгӮ«гӮҰгғігғҲй–Ӣе§Ӣпјү
  else if(s==='зўәе®ҡ') r.checkInAt=null;               // жқҘеә—еүҚгҒ«жҲ»гҒҷпјқжҷӮеҲ»гӮҜгғӘгӮў
  applyRsvToHall(r,s); renderAll();
  if(IS_GAS) gsr('setKioskReservationStatus',r.rowIdx,s).then(function(res){
    if(res&&res.ok===false){ toast(res.error||'дҝқеӯҳгҒ§гҒҚгҒҫгҒӣгӮ“'); }
    loadAll();
  }).catch(function(e){ toast('дҝқеӯҳгӮЁгғ©гғј'); loadAll(); });
}
/* дәҲзҙ„гғҶгғјгғ–гғ«ж–Үеӯ—еҲ— вҶ’ еёӯгӮігғјгғүпјҲгғҗгғғгӮҜгӮЁгғігғү tableNameToSeatCode_ гҒЁеҗҢгҒҳиҰҸеүҮпјү */
function tblToCode(t){var m=String(t||'').match(/^(2F|5F)\s*(гӮ«гӮҰгғігӮҝгғј|гғңгғғгӮҜгӮ№)(\d+)$/);return m?(m[1]+'-'+(m[2]==='гӮ«гӮҰгғігӮҝгғј'?'C':'B')+m[3]):null;}
function rsvSeatCodes(r){return String(r.table||'').split(/[гҖҒ,]/).map(function(t){return tblToCode(t.trim());}).filter(Boolean);}
/* жқҘеә—/йҖҖеә—гӮ’гғӣгғјгғ«гҒ«гғӯгғјгӮ«гғ«еҚіеҸҚжҳ пјҲгӮөгғјгғҗзўәе®ҡгӮ’еҫ…гҒҹгҒӘгҒ„гғ»гғӯгғјгӮ«гғ«е„Әе…ҲпјүгҖӮloadAll гҒ§еҫҢиҝҪгҒ„дёҠжӣёгҒҚгҖӮ */
function applyRsvToHall(r,status){
  if(!r.table||r.table==='жңӘе®ҡ')return;
  rsvSeatCodes(r).forEach(function(code){
    var seat=SEATS.find(function(x){return x.code===code;});if(!seat)return;
    if(status==='жқҘеә—жёҲгҒҝ'){
      if(!seat.casts||!seat.casts.length){ seat.cust=r.cust?r.cust+' ж§ҳ':'гҒ”жқҘеә—'; if(r.pax)seat.pax=r.pax; seat.tantou=r.tantou||seat.tantou||''; }
      else if(!seat.cust){ seat.cust=r.cust?r.cust+' ж§ҳ':'гҒ”жқҘеә—'; }
    }else if(status==='йҖҖеә—жёҲгҒҝ'){
      seat.cust=''; seat.tantou=''; seat.casts=[]; seat.mergeWith=[];
    }else{ /* зўәе®ҡ=жқҘеә—еүҚгҒёжҲ»гҒҷ */
      if(!seat.casts||!seat.casts.length){ seat.cust=''; seat.tantou=''; }
    }
  });
}

function showSheet(title,html,wide){

  sh.classList.toggle('wide',wide===true||wide==='wide');

  sh.classList.add('show');
}

      +rotPickerHtml(idx)

/* еёӯи©ізҙ°гҒ§гӮӯгғЈгӮ№гғҲгӮ’гӮҝгғғгғ— вҶ’ е»¶й•· / жҠңгҒҸ гӮ’йҒёжҠһ */
function castAction(idx,castName){
  var s=SEATS[idx]; if(!s)return;
  var c=(s.casts||[]).find(function(x){return x.n===castName;});
  var remain=c?(c.mins<0?'и¶…йҒҺ '+(-c.mins)+'еҲҶ':'ж®ӢгӮҠ '+c.mins+'еҲҶ'):'';
  var body='<div style="text-align:center;margin:2px 0 4px"><div style="font-size:20px;font-weight:800;color:var(--txt)">'+esc(castName)+'</div><div style="color:var(--sub);font-size:13px;margin-top:4px">'+esc(shortNm(s.name))+(remain?'гҖҖ/гҖҖ'+remain:'')+'</div></div>'
    +'<div style="font-size:12px;color:#8a9ac0;margin:18px 0 6px;font-weight:700">вҸі е»¶й•·гҒҷгӮӢпјҲзҸҫзҠ¶гҒ«еҠ з®—пјү</div>'
    +'<div class="chips">'+[15,30].map(function(m){return '<div class="chip" style="border-color:#2a6a44;color:#8fe0b0" onclick="extendCast('+idx+',\''+jsStr(castName)+'\','+m+')">пјӢ'+m+'еҲҶ</div>';}).join('')+'</div>'
    +'<div class="actions" style="margin-top:20px"><div class="act dng" onclick="removeCast('+idx+',\''+jsStr(castName)+'\')">рҹҡӘ гҒ“гҒ®еёӯгҒӢгӮүжҠңгҒҸ</div><div class="act" onclick="openSeat('+idx+')">вҶҗ жҲ»гӮӢ</div></div>';
  showSheet('гӮӯгғЈгӮ№гғҲж“ҚдҪң',body,false);
}
function extendCast(idx,castName,mins){
  var s=SEATS[idx]; if(!s)return;
  var c=(s.casts||[]).find(function(x){return x.n===castName;});
  if(c){ c.mins=(c.mins||0)+mins; c.status=(c.mins<0?'over':c.mins<=5?'warn':'ok'); }
  renderAll();
  toast('вҸі '+castName+' гӮ’ +'+mins+'еҲҶ е»¶й•·гҒ—гҒҫгҒ—гҒҹ'+(c?'пјҲж®ӢгӮҠ '+c.mins+'еҲҶпјү':''));
  openSeat(idx); // еёӯи©ізҙ°гҒ«жҲ»гҒҷпјҲе»¶й•·еҫҢгҒ®ж®ӢгӮҠжҷӮй–“гҒҢиҰӢгҒҲгӮӢпјү
  if(IS_GAS) gsr('kioskExtendAtendouAtSeat',s.code,castName,mins).then(function(res){ if(res&&res.ok===false){toast('е»¶й•·гҒ§гҒҚгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹ: '+(res.error||'')); } loadAll(); }).catch(function(e){toast('е»¶й•·гӮЁгғ©гғј: '+((e&&e.message)||e));loadAll();});
}
function removeCast(idx,castName){
  if(!confirm(castName+' гҒ•гӮ“гӮ’гҒ“гҒ®еёӯгҒӢгӮүжҠңгҒҚгҒҫгҒҷгҒӢпјҹ'))return;
  var s=SEATS[idx]; if(!s)return;
  s.casts=(s.casts||[]).filter(function(x){return x.n!==castName;});
  renderAll();
  if(IS_GAS) gsr('kioskEndAtendouAtSeat',s.code,castName).then(function(res){ if(res&&res.ok===false)toast('жҠңгҒ‘гҒҫгҒӣгӮ“гҒ§гҒ—гҒҹ: '+(res.error||'еҜҫиұЎгҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“')); else toast('рҹҡӘ '+castName+' гӮ’жҠңгҒҚгҒҫгҒ—гҒҹ'); loadAll(); openSeat(idx); }).catch(function(e){toast('жҠңгҒҸгӮЁгғ©гғј: '+((e&&e.message)||e));loadAll();});
  else { toast('рҹҡӘ '+castName+' гӮ’жҠңгҒҚгҒҫгҒ—гҒҹ'); openSeat(idx); }
}

/* ============ рҹ“Ӣ дәҲе®ҡгӮӯгғЈгӮ№гғҲпјҲй–Ӣеә—еүҚгҒ®д»ҳгҒ‘еӣһгҒ—дәҲе®ҡпјү ============ */
var planSel=null;

function togglePlanCast(n){ var i=planSel.sel.indexOf(n); if(i>=0)planSel.sel.splice(i,1); else planSel.sel.push(n); renderPlanCast(); }
function savePlanCast(){
  var code=planSel.code, sel=planSel.sel.slice(), s=SEATS[planSel.idx];

/* ============ рҹӘ‘ еёӯиЁӯе®ҡпјҲгғҶгғјгғ–гғ«иЁӯе®ҡпјҡдәҲзҙ„гҒӢгӮү / йЈӣгҒіиҫјгҒҝж–°иҰҸпјү ============ */
var seatSel=null;
function codeToTbl(code){var m=String(code||'').match(/^(2F|5F)-([CB])(\d+)$/);return m?(m[1]+' '+(m[2]==='C'?'гӮ«гӮҰгғігӮҝгғј':'гғңгғғгӮҜгӮ№')+m[3]):null;}
function openSeatSession(idx){
  var s=SEATS[idx];
  var tbl=codeToTbl(s.code);
  seatSel={seatIdx:idx,seatCode:s.code,seatLabel:s.floor+' '+shortNm(s.name),tblName:tbl,
    mode:null,rowIdx:0,customer:'',member:'',newCust:false,pax:2,tantou:[],pending:[],_busy:false};
  showSheet('рҹӘ‘ '+seatSel.seatLabel+' гҒ®еёӯиЁӯе®ҡ','<div class="empty-msg">иӘӯгҒҝиҫјгҒҝдёӯ...</div>',false);
  if(IS_GAS){
    gsr('getTodayPendingReservations').then(function(list){ seatSel.pending=(list||[]); renderSeatSession(); }).catch(function(){ seatSel.pending=[]; renderSeatSession(); });
  }else{
    seatSel.pending=RSV.filter(function(r){return r.status==='зўәе®ҡ';}).map(function(r){return {rowIdx:r.id,customer:r.cust,memberId:r.mem,pax:r.pax,tantouCast:r.tantou,time:r.time,table:r.table};});

function renderSeatSession(){

    h+='<div class="flabel">дәәж•°</div><div class="chips">'+[1,2,3,4,5,'6+'].map(function(n){return '<div class="chip'+(String(ss.pax)===String(n)?' sel':'')+'" onclick="ssPax(\''+n+'\')">'+n+'еҗҚ</div>';}).join('')+'</div>';
    h+='<div class="flabel">жӢ…еҪ“гӮӯгғЈгӮ№гғҲпјҲд»»ж„Ҹпјү</div><div class="chips">'+CASTS.map(function(c){return '<div class="chip cast'+(ss.tantou.indexOf(c)>=0?' sel':'')+'" onclick="ssTantou(this,\''+jsStr(c)+'\')">'+esc(c)+'</div>';}).join('')+'</div>';
    h+='<div class="savebtn" onclick="submitSeatSession()">гҒ“гҒ®еёӯгҒ«иЁӯе®ҡгҒҷгӮӢ</div>';

    return '<div class="flabel">жң¬ж—ҘгҒ®дәҲзҙ„гҒӢгӮүйҒёгҒ¶</div><div class="af-results">'+rows+'</div><div class="af-switch"><button class="af-ms" onclick="ssMode(\'new\')">вңЁ дәҲзҙ„гҒӘгҒ— вҶ’ йЈӣгҒіиҫјгҒҝгғ»ж–°иҰҸгҒ§еёӯиЁӯе®ҡ</button></div>';
  }
  if(ss.mode==='search'){

  }
  if(ss.mode==='new'){
    return '<div class="flabel">ж–°иҰҸгғ»йЈӣгҒіиҫјгҒҝгҒ®гҒҠе®ўж§ҳ</div><input id="ss-name" class="finput" value="'+esc(ss.customer||'')+'" placeholder="гҒҠеҗҚеүҚгӮ’е…ҘеҠӣпјҲжңӘе…ҘеҠӣгҒӘгӮүгҖҢгғ•гғӘгғјж§ҳгҖҚпјү"><div class="af-switch"><button class="af-ms" onclick="ssMode(\'search\')">рҹ”Қ ж—ўеӯҳгҒ®гҒҠе®ўж§ҳгӮ’жӨңзҙў</button><button class="af-ms" onclick="ssMode(\'rsv\')">рҹ“Ӣ жң¬ж—ҘгҒ®дәҲзҙ„гҒӢгӮүйҒёгҒ¶</button></div>';
  }
  // еҲқжңҹ: йҒёгҒ¶
  return '<div class="flabel">гҒҠе®ўж§ҳ</div><div class="af-choose"><button class="af-choose-btn" onclick="ssMode(\'rsv\')"><span class="ic">рҹ“Ӣ</span><span class="tx"><span class="t">дәҲзҙ„гҒӢгӮүеёӯиЁӯе®ҡ</span><span class="s">жң¬ж—ҘгҒ®дәҲзҙ„е®ўгӮ’йҒёгҒ¶</span></span></button><button class="af-choose-btn new" onclick="ssMode(\'new\')"><span class="ic">вңЁ</span><span class="tx"><span class="t">йЈӣгҒіиҫјгҒҝгғ»ж–°иҰҸ</span><span class="s">гҒқгҒ®е ҙгҒ§еҸ—д»ҳгҒ—гҒҰеёӯиЁӯе®ҡ</span></span></button></div>';
}
function ssSyncName(){ var n=document.getElementById('ss-name'); if(n)seatSel.customer=n.value; }
function ssMode(m){ ssSyncName(); seatSel.mode=m; renderSeatSession(); if(m==='search'){setTimeout(function(){var i=document.getElementById('ss-q');if(i)i.focus();},30);} }
function ssReset(){ seatSel.mode=null; seatSel.rowIdx=0; seatSel.customer=''; seatSel.member=''; seatSel.newCust=false; renderSeatSession(); }

function ssSearch(){

function ssResultsHtml(list){

  }).join('');
}
function ssPickCust(name,member,tantou){
  seatSel.customer=name; seatSel.member=member||''; seatSel.newCust=false; seatSel.rowIdx=0; seatSel.mode='picked';

function ssPax(n){ seatSel.pax=n; renderSeatSession(); }
function ssTantou(el,name){ el.classList.toggle('sel'); var i=seatSel.tantou.indexOf(name); if(i>=0)seatSel.tantou.splice(i,1); else seatSel.tantou.push(name); }
function submitSeatSession(){
  var ss=seatSel; ssSyncName();

  var payload={rowIdx:ss.rowIdx||0,customer:name,memberId:ss.member||'',pax:parseInt(ss.pax)||1,tables:[ss.tblName].filter(Boolean),tantouCast:ss.tantou.slice(),dohanCast:[],yoyakuCast:''};
  // гғӯгғјгӮ«гғ«е„Әе…Ҳ: гғӣгғјгғ«гҒ®и©ІеҪ“еёӯгҒёеҚіеёӯиЁӯе®ҡпјҲжӢ…еҪ“дёҚеңЁпјү
  var seat=SEATS[ss.seatIdx]; if(seat){ seat.cust=name+' ж§ҳ'; seat.pax=parseInt(ss.pax)||1; seat.tantou=ss.tantou.join('гҖҒ'); seat.casts=seat.casts||[]; }

/* ============ рҹ”„ д»ҳгҒ‘еӣһгҒ—пјҲеёӯи©ізҙ°гҒӢгӮүгғҜгғігӮҝгғғгғ—гҒ§д»ҳгҒ‘гӮӢпјҸеӢ•гҒӢгҒҷпјү ============ */
/* гӮӯгғЈгӮ№гғҲгҒҢд»ҠгҒ©гҒ®еёӯгҒ«гҒ„гӮӢгҒӢпјҲиЎЁзӨәз”Ёгғ©гғҷгғ«пјү */
function castSeatLabel(name){ for(var i=0;i<SEATS.length;i++){ if((SEATS[i].casts||[]).some(function(c){return c.n===name;})) return shortNm(SEATS[i].name); } return ''; }
/* еёӯи©ізҙ°еҶ…гҒ®д»ҳгҒ‘еӣһгҒ—гғ”гғғгӮ«гғјпјҲгҒ“гҒ®еёӯгҒ«д»ҳгҒ„гҒҰгҒ„гҒӘгҒ„гӮӯгғЈгӮ№гғҲгӮ’гғҒгғғгғ—иЎЁзӨәпјү */
function rotPickerHtml(idx){
  var s=SEATS[idx];
  var here=(s.casts||[]).map(function(c){return c.n;});
  var pool=(WORKCASTS!=null&&WORKCASTS.length)?WORKCASTS:CASTS; /* жң¬ж—ҘеҮәеӢӨпјӢеҪ“ж—ҘжҙҫйҒЈгҒ®гҒҝпјҲжңӘеҸ–еҫ—жҷӮгҒҜе…ЁгӮӯгғЈгӮ№гғҲпјү */
  var avail=pool.filter(function(c){return here.indexOf(c)<0;});

/* гғҜгғігӮҝгғғгғ—д»ҳгҒ‘еӣһгҒ—: castName гӮ’ toIdx гҒ®еёӯгҒёпјҲд»–еёӯгҒ«гҒ„гӮҢгҒ°з§»еӢ•гҖҒгҒ„гҒӘгҒ‘гӮҢгҒ°ж–°иҰҸй…ҚзҪ®пјүгҖӮгғӯгғјгӮ«гғ«е„Әе…ҲгҖӮ */
function quickRotate(toIdx,castName){
  var to=SEATS[toIdx];
  var fromIdx=-1,fromCi=-1;
  SEATS.forEach(function(s,i){ (s.casts||[]).forEach(function(c,ci){ if(c.n===castName){fromIdx=i;fromCi=ci;} }); });
  var fromCode=(fromIdx>=0)?(SEATS[fromIdx].code||''):'';
  var moved=(fromIdx>=0)?SEATS[fromIdx].casts.splice(fromCi,1)[0]:{n:castName};
  moved.mins=moved.unlimited?0:30; moved.status='ok';
  to.casts=to.casts||[]; to.casts.push(moved);
  renderAll(); openSeat(toIdx); // и©ізҙ°гӮ’жңҖж–°зҠ¶ж…ӢгҒ§еҶҚжҸҸз”»
  if(IS_GAS) gsr('kioskRotateCast',castName,fromCode,to.code,shortNm(to.name)).then(loadAll).catch(function(){toast('дҝқеӯҳгӮЁгғ©гғј');loadAll();});
  else toast('рҹ”„ '+castName+' гӮ’д»ҳгҒ‘гҒҫгҒ—гҒҹ');
}

function openSchedule(){
  var SH=19,EH=26;
  var hdr='<div class="g-hd"><div class="g-corner">еҚ“</div>';
  for(var h=SH;h<EH;h++) hdr+='<div class="g-hr">'+(h<24?h:h-24)+':00</div>';
  hdr+='</div>';
  var rows='';
  ['2F','5F'].forEach(function(fl){
    rows+='<div class="g-flr">'+fl+'</div>';
    (fl==='2F'?TABLES_2F:TABLES_5F).forEach(function(tn){
      var full=fl+' '+tn,blk='';
      RSV.forEach(function(r){
        if(r.table!==full)return;
        var p=rsvArrT(r).split(':'),hh=parseInt(p[0]);if(hh<6)hh+=24;var mm=hh*60+(parseInt(p[1])||0);
        var l=((mm-SH*60)/((EH-SH)*60))*100,w=(120/((EH-SH)*60))*100;if(l<0){w+=l;l=0;}
        var col=r.status==='йҖҖеә—жёҲгҒҝ'?'background:#181828;border:1px solid #2a2a44':r.status==='жқҘеә—жёҲгҒҝ'?'background:#0d2618;border:1px solid #2a6a44':'background:#12233f;border:1px solid #2a5590';
        blk+='<div class="g-blk" style="left:'+l+'%;width:'+w+'%;'+col+'" onclick="editRsv('+r.id+')"><span class="bn">'+esc(r.cust)+'ж§ҳ</span><span class="bp">'+r.pax+'еҗҚ '+esc(rsvArrT(r))+'</span></div>';
      });
      var cells='';for(var c=0;c<(EH-SH);c++)cells+='<div class="g-cell"></div>';
      rows+='<div class="g-row"><div class="g-lbl">'+esc(tn.replace('гӮ«гӮҰгғігӮҝгғј','гӮ«гӮҰ'))+'</div><div class="g-track">'+cells+blk+'</div></div>';
    });
  });

function renewStatus(fd){
  if(!fd) return 'none';
  var p=String(fd).split(/[\/\-\.]/); if(p.length<2)return 'none';
  var fy=parseInt(p[0]), fm=parseInt(p[1]); if(!(fy>1900&&fm>=1))return 'none';
  var n=new Date();
  var ms=(n.getFullYear()*12+(n.getMonth()+1))-(fy*12+fm); // еүҚеӣһжӣҙж–°гҒӢгӮүгҒ®зөҢйҒҺжңҲж•°
  if(ms>=13) return 'expired';   // 13гҒӢжңҲд»ҘдёҠ вҶ’ дјҡе“Ўжӣҙж–°еҲҮгӮҢ
  if(ms>=12) return 'thismonth'; // 12гҒӢжңҲгҒЎгӮҮгҒҶгҒ©пјҲжӣҙж–°жңҲпјү вҶ’ д»ҠжңҲжӣҙж–°
  return 'ok';
}
// дјҡе“Ўжғ…е ұгҒ®з®—еҮәпјҲжңҲеҚҳдҪҚпјү: в—Ҝе№ҙзӣ® / дјҡе“Ўжңҹйҷҗ(еүҚеӣһжӣҙж–°+1е№ҙ) / гӮ№гғҶгғјгӮҝгӮ№
//  еүҚеӣһжӣҙж–°гҒӢгӮүгҒ®зөҢйҒҺжңҲж•°гҒ§еҲӨе®ҡ: 12гҒӢжңҲгҒЎгӮҮгҒҶгҒ©(пјқжӣҙж–°жңҲ)=рҹҹЎд»ҠжңҲжӣҙж–° / 13гҒӢжңҲд»ҘдёҠ=рҹ”ҙдјҡе“Ўжӣҙж–°еҲҮгӮҢ / гҒқгӮҢжңӘжәҖ=рҹҹўжңүеҠ№
function membershipInfo(joined, feeDate){
  var info={yearLabel:'', renewalStr:'', status:'none', monthsSince:null, statusLabel:'', shortLabel:''};
  if(joined){ var jy=parseInt(String(joined).split(/[\/\-\.]/)[0]); if(jy>1900){ var y=(new Date()).getFullYear()-jy+1; if(y>=1) info.yearLabel=y+'е№ҙзӣ®'; } }
  if(feeDate){
    var p=String(feeDate).split(/[\/\-\.]/);
    if(p.length>=2){
      var ry=parseInt(p[0]), rm=parseInt(p[1]);
      if(ry>1900&&rm>=1){
        var today=new Date();
        var ms=(today.getFullYear()*12+(today.getMonth()+1))-(ry*12+rm); // зөҢйҒҺжңҲж•°
        info.monthsSince=ms;
        info.renewalStr=(ry+1)+'/'+rm; // жӣҙж–°жңҹйҷҗпјҲеүҚеӣһжӣҙж–°+1е№ҙпјү
        if(ms>=13){ info.status='expired'; info.statusLabel='рҹ”ҙ дјҡе“Ўжӣҙж–°еҲҮгӮҢ'; info.shortLabel='жӣҙж–°еҲҮгӮҢ'; }
        else if(ms>=12){ info.status='thismonth'; info.statusLabel='рҹҹЎ д»ҠжңҲжӣҙж–°'; info.shortLabel='д»ҠжңҲжӣҙж–°'; }
        else { info.status='ok'; info.statusLabel='рҹҹў жңүеҠ№дјҡе“Ў'; info.shortLabel='жңүеҠ№дјҡе“Ў'; }
      }
    }
  }
  if(info.status==='none'){ info.statusLabel='вҡӘ жңӘдјҡе“Ў'; info.shortLabel='жңӘдјҡе“Ў'; } // дјҡиІ»гғ»зҷ»йҢІж—ҘгҒӘгҒ—пјқжңӘдјҡе“Ў
  return info;
}

// жқҘеә—ж—Ҙ 'yyyy-MM-dd' вҶ’ 'M/d' иЎЁзӨәпјҲд»Ҡе№ҙд»ҘеӨ–гҒҜ yyyy/M/dпјү
function fmtVisitDate(d){
  var m=String(d||'').match(/^(\d{4})-(\d{2})-(\d{2})$/); if(!m)return String(d||'');
  var y=+m[1], mo=+m[2], da=+m[3];
  return (y===(new Date()).getFullYear())?(mo+'/'+da):(y+'/'+mo+'/'+da);
}

// жӨңзҙўзөҗжһңгӮӘгғ–гӮёгӮ§гӮҜгғҲгҒӢгӮүгҒ®еҹәжң¬гғ•гӮЈгғјгғ«гғүпјҲгғӯгғјгӮ«гғ«/гғ•гӮ©гғјгғ«гғҗгғғгӮҜз”Ёпјү

// е№ҙжңҲгҒ®гҒҝ("2026/07")гӮӮе№ҙжңҲж—Ҙ("2026-07-01")гӮӮ dateе…ҘеҠӣз”Ё yyyy-MM-dd гҒ«жӯЈиҰҸеҢ–пјҲж—ҘгҒҢз„ЎгҒ‘гӮҢгҒ°1ж—Ҙпјү
function toDateInput(v){ var m=String(v||'').match(/(\d{4})[-\/.](\d{1,2})(?:[-\/.](\d{1,2}))?/); return m?(m[1]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+(m[3]||'1')).slice(-2)):''; }
function custValByLabel(label){
  var n=function(s){return String(s||'').replace(/\s/g,'');};
  var hit=(custDetailFields||[]).filter(function(f){return n(f.k).indexOf(n(label))>=0;})[0];
  return hit?hit.v:'';
}
function cvDateVal(v){ var m=String(v||'').match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/); return m?(m[1]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[3]).slice(-2)):''; }

function opRep(el,n){ el.parentElement.querySelectorAll('.chip').forEach(function(c){c.classList.remove('sel');}); el.classList.add('sel'); openState.reporterName=n; }

/* йҮ‘йЎҚ(еҶҶ)вҶ’зҙҷе№Јжһҡж•°гҒ®жӯЈжә–еҲҶи§ЈпјҲйҮ‘еә«гҒҜжңӯгҒ®гҒҝпјқ1000еҶҶеҚҳдҪҚгҒӘгҒ®гҒ§з«Ҝж•°гҒӘгҒҸеҫ©е…ғгҒ§гҒҚгӮӢпјү */
function safeDecompose(yen){ yen=Number(yen)||0; var m10=Math.floor(yen/10000); var r=yen-m10*10000; var m5=Math.floor(r/5000); r-=m5*5000; var m1=Math.floor(r/1000); return {m10000:m10,m5000:m5,m1000:m1}; }
/* й–Ӣеә—гҒ®йҮ‘еә«гғ–гғӯгғғгӮҜпјҡзўәиӘҚгҒҷгӮӢпјҲж•°гҒҲгӮӢпјүпјҸзўәиӘҚгҒ—гҒӘгҒ„пјҲеүҚж—Ҙж®ӢйЎҚгӮ’иҮӘеӢ•е…ҘеҠӣпјү */
function opSafeBlock(prevSafe){
  var hasPrev=prevSafe!=null, auto=openState.safeMode==='auto';
  var pv=hasPrev?'<span style="color:#8a9ac0;font-size:11px;margin-left:6px">еүҚж—Ҙ ВҘ'+Number(prevSafe).toLocaleString()+'</span>':'';
  var seg=hasPrev?('<div class="safe-seg"><button class="'+(!auto?'on':'')+'" onclick="opSafeMode(\'manual\')">ж•°гҒҲгӮӢ</button>'
    +'<button class="'+(auto?'on':'')+'" onclick="opSafeMode(\'auto\')">зўәиӘҚгҒ—гҒӘгҒ„пјҲеүҚж—Ҙ ВҘ'+Number(prevSafe).toLocaleString()+'пјү</button></div>')
    :'<div style="font-size:11px;color:#8a9ac0;margin:2px 0 6px">еүҚж—ҘгҒ®з· гӮҒгғҮгғјгӮҝгҒҢз„ЎгҒ„гҒҹгӮҒжүӢеӢ•гҒ§ж•°гҒҲгҒҰгҒҸгҒ гҒ•гҒ„</div>';

/* --- й–үеә—гғҒгӮ§гғғгӮҜе…ұйҖҡгғҳгғ«гғ‘пјҲ4иўӢгғўгғҮгғ«гғ»Kiosk2гҒЁеҗҢдёҖеҘ‘зҙ„пјү --- */
var CASH_BAGS=[{k:'f5',label:'5Fгғ¬гӮё',color:'#8fb8ff'},{k:'f2',label:'2Fгғ¬гӮё',color:'#6fd6b0'},{k:'keihi',label:'зөҢиІ»иўӢ',color:'#e0a060'},{k:'safe',label:'йҮ‘еә«',color:'#bb99ee'}];
var CASH_TOLERANCE=1000; // жңӯгҒ гҒ‘ж•°гҒҲгӮӢгҒҹгӮҒе°ҸйҠӯгҒ¶гӮ“гҒ®гӮәгғ¬гҒҜВұгҒ“гҒ®йЎҚгҒҫгҒ§гҖҢеҗҲгҒЈгҒҰгӮӢгҖҚжүұгҒ„
var SLIP_CATS=['иІ·еҮәгҒ—гғ»зөҢиІ»','д»Јеј•гҒҚ','й…’еұӢ зҸҫйҮ‘д»•е…ҘгӮҢ','жҙҫйҒЈ ж—Ҙжү•гҒ„','еңЁзұҚ ж—Ҙжү•гҒ„','зөҰдёҺ дёҖйғЁжү•гҒ„','еҮәеүҚ','гғүгғ©гӮӨгғҗгғјж”Ҝжү•гҒ„','йҖҡдҝЎе…үзҶұиІ»ж”Ҝжү•гҒ„','гҒқгҒ®д»–'];
function newBag(){ return {m10000:0,m5000:0,m1000:0}; }
function newBags(){ var o={}; CASH_BAGS.forEach(function(b){ o[b.k]=newBag(); }); return o; }
function bagYen(o){ o=o||{}; return (o.m10000||0)*10000+(o.m5000||0)*5000+(o.m1000||0)*1000; }
function bagsYen(bags){ return CASH_BAGS.reduce(function(s,b){ return s+bagYen(bags[b.k]); },0); }
function chipsHtml(names,fn){ return (names||[]).map(function(n){ return '<div class="chip" onclick="'+fn+'(this,\''+esc(String(n).replace(/'/g,"\\'"))+'\')">'+esc(n)+'</div>'; }).join(''); }
function bagDenomInputs(bagKey,state,oninput){ var o=state[bagKey]||{}; return '<div class="ck-row" style="border:0;padding:0">'+CASH_DENOMS.map(function(d){ return '<label class="ck-denom"><span>'+d.label+'</span><input type="number" min="0" inputmode="numeric" data-b="'+bagKey+'" data-d="'+d.k+'" value="'+(o[d.k]||'')+'" oninput="'+oninput+'(this)"></label>'; }).join('')+'</div>'; }
function readSlipsFromDenpyo(dp){
  if(!dp) return [];
  var out=[];
  function pull(sec,payeeHdr,amtHdr,defCat){
    if(!sec||!sec.rows)return; var hs=sec.headers||[];
    var iP=hs.indexOf(payeeHdr), iA=hs.indexOf(amtHdr), iImg=-1;
    hs.forEach(function(hd,idx){ if(/з”»еғҸ|еҶҷзңҹ|URL|гғӘгғігӮҜ|гғүгғ©гӮӨгғ–/.test(String(hd))) iImg=idx; });
    sec.rows.forEach(function(r){ var c=r.cells||[]; var amt=Number(c[iA])||0; if(!amt)return;
      out.push({source:'read',category:defCat,payee:iP>=0?String(c[iP]||''):'',amount:amt,imageUrl:iImg>=0?String(c[iImg]||''):'',include:true}); });
  }
  pull(dp.daily,'еҸ—еҸ–дәә','дјқзҘЁйҮ‘йЎҚ','еңЁзұҚ ж—Ҙжү•гҒ„');
  pull(dp.receipt,'зҷәиЎҢе…ғ','йҮ‘йЎҚ','иІ·еҮәгҒ—гғ»зөҢиІ»');
  return out;
}

function ccCalc(){
  var st=cashState, init=st.init;
  var slipTotal=st.slips.reduce(function(s,x){ return s+((x.include!==false&&x.amount>0)?Number(x.amount):0); },0);
  var start=Number(init.openingTotal||0), sales=Number(st.cashSalesInput||0);
  var expected=start+sales-slipTotal, actual=bagsYen(st.bags), diff=expected-actual;
  return {start:start,sales:sales,slipTotal:slipTotal,expected:expected,actual:actual,diff:diff,within:Math.abs(diff)<=CASH_TOLERANCE,openingSubmitted:!!init.openingSubmitted};
}

/* ============ рҹҡҡ зҙҚе“ҒвҶ’еңЁеә«еҸҚжҳ пјҲгғ•гғӯгӮўжҢҜгӮҠеҲҶгҒ‘пјӢеҖҷиЈңгғһгғғгғҒпјү ============ */
var deliveryState=null, drItems={};
var DR_FLOORS=['5F','2F','е…ұйҖҡ'];
function openDeliveryReflect(){
  showSheet('рҹҡҡ зҙҚе“ҒгӮ’еңЁеә«гҒ«еҸҚжҳ ','<div class="empty-msg">иӘӯгҒҝиҫјгҒҝдёӯ...</div>','full');
  if(!IS_GAS){ document.getElementById('sheetBody').innerHTML='<div class="empty-msg">пјҲгғӯгғјгӮ«гғ«пјүжң¬з•ӘгҒ®гҒҝ</div>'; return; }
  gsr('kioskGetPendingDeliveries').then(function(r){ deliveryState=r||{slips:[],stock:[]}; drItems={}; renderDeliveryReflect(); })
    .catch(function(){ var b=document.getElementById('sheetBody'); if(b)b.innerHTML='<div class="empty-msg">иӘӯгҒҝиҫјгҒҝгӮЁгғ©гғј</div>'; });

/* е“ҒеҗҚгҒ®йЎһдјјгғһгғғгғҒпјҲгғ•гғӯгӮўжҢҮе®ҡгҖӮе…ұйҖҡе“ҒгӮӮеҖҷиЈңгҒ«еҗ«гӮҒгӮӢпјү */
function drNorm(s){return String(s||'').normalize('NFKC').toLowerCase().replace(/[\sгҖҖгғ»,гҖҒгҖӮ()пјҲпјүгҖҢгҖҚгҖҗгҖ‘\-гғј_/пјҸ\\]/g,'');}
function drBigrams(s){var a=[];if(s.length<=1){if(s)a.push(s);return a;}for(var i=0;i<s.length-1;i++)a.push(s.substr(i,2));return a;}
function drSim(a,b){a=drNorm(a);b=drNorm(b);if(!a||!b)return 0;if(a===b)return 1;if(a.indexOf(b)>=0||b.indexOf(a)>=0)return 0.92;var ga=drBigrams(a),gb=drBigrams(b),mb={},hit=0;gb.forEach(function(g){mb[g]=(mb[g]||0)+1;});ga.forEach(function(g){if(mb[g]>0){mb[g]--;hit++;}});return (ga.length+gb.length)?2*hit/(ga.length+gb.length):0;}
function drPool(floor){var st=(deliveryState&&deliveryState.stock)||[];return st.filter(function(i){return i.floor===floor||i.floor==='е…ұйҖҡ';});}
function drBestMatch(name,floor){var best=null,bs=0;drPool(floor).forEach(function(it){var s=drSim(name,it.name);if(s>bs){bs=s;best=it;}});return{item:bs>=0.34?best:null,score:Math.round(bs*100)};}
function drGuessFloor(name){ // е…Ёгғ•гғӯгӮўгҒ§жңҖгӮӮиҝ‘гҒ„еҖҷиЈңгҒ®гғ•гғӯгӮўгӮ’еҲқжңҹеҖӨгҒ«гҖӮз„ЎгҒ‘гӮҢгҒ°5F
  var st=(deliveryState&&deliveryState.stock)||[],best=null,bs=0;
  st.forEach(function(it){var s=drSim(name,it.name);if(s>bs){bs=s;best=it;}});
  return (best&&bs>=0.34&&(best.floor==='5F'||best.floor==='2F'))?best.floor:'5F';
}
function drOptions(floor,sel){
  var o='<option value="0"'+(sel===0?' selected':'')+'>вҖ• еҸҚжҳ гҒ—гҒӘгҒ„ вҖ•</option><option value="-1"'+(sel===-1?' selected':'')+'>вһ• ж–°иҰҸгғһгӮ№гӮҝзҷ»йҢІпјҲ'+floor+'пјү</option>';
  o+=drPool(floor).map(function(it){return '<option value="'+it.rowIdx+'"'+(it.rowIdx===sel?' selected':'')+'>'+esc(it.name)+' ['+esc(it.floor)+'] еңЁеә«'+it.qty+'</option>';}).join('');
  return o;
}
function drRight(id){
  var it=drItems[id];
  var m=drBestMatch(it.name,it.floor); it.matchRowIdx=m.item?m.item.rowIdx:0;
  var conf=it.matchRowIdx?('<span class="dr-score '+(m.score>=70?'hi':(m.score>=45?'mid':'lo'))+'">еҖҷиЈңдёҖиҮҙ '+m.score+'%</span>'):'<span class="dr-score lo">еҖҷиЈңгҒӘгҒ—гғ»иҰҒйҒёжҠһ</span>';
  var toggle='<div class="dr-floor">'+DR_FLOORS.map(function(f){return '<button class="dr-fbtn'+(f===it.floor?' sel':'')+'" onclick="drSetFloor('+id+',\''+f+'\')">'+f+'</button>';}).join('')+'</div>';
  var sel='<select class="finput dr-sel" id="dr-sel-'+id+'" onchange="drSelChange('+id+')">'+drOptions(it.floor,it.matchRowIdx)+'</select>';
  var newbox='<div class="dr-newbox" id="dr-new-'+id+'"></div>';
  var qty='<label class="dr-qtyl">еҠ з®— <input class="finput dr-qty" id="dr-qty-'+id+'" type="number" value="'+it.qty+'" min="0"></label>';
  return '<div class="dr-floorlbl">жҢҜгӮҠеҲҶгҒ‘е…Ҳгғ•гғӯгӮў</div>'+toggle+conf+sel+newbox+qty;
}
function renderDeliveryReflect(){
  var st=deliveryState,b=document.getElementById('sheetBody'); if(!b)return;
  if(!st.slips||!st.slips.length){ b.innerHTML='<div class="empty-msg" style="padding:40px 0">жңӘеҸҚжҳ гҒ®зҙҚе“ҒгҒҜгҒӮгӮҠгҒҫгҒӣгӮ“ рҹҺү<br><span style="font-size:12px;color:var(--dim)">й»’жңҚгӮ°гғ«гғјгғ—гҒ«зҙҚе“ҒжӣёгӮ’йҖҒгӮӢгҒЁгҖҒгҒ“гҒ“гҒ«дёҖиҰ§гҒҢеҮәгҒҫгҒҷ</span></div>'; return; }
  var h='<div class="dr-wrap">';
  st.slips.forEach(function(sl){
    var slipIds=sl.items.map(function(it){return it.deliveryRowIdx;}).join(',');
    h+='<div class="dr-slip"><div class="dr-slip-h"><span class="dr-slip-t">рҹҡҡ '+esc(sl.supplier||'д»•е…Ҙе…ҲдёҚжҳҺ')+' <span class="dr-slip-meta">дјқзҘЁ '+esc(sl.slipNo)+(sl.date?' / '+esc(sl.date):'')+' / '+sl.items.length+'е“Ғзӣ®</span></span><button class="dr-delslip" onclick="drDeleteSlip(\''+slipIds+'\','+sl.items.length+')">рҹ—‘ дјқзҘЁгҒ”гҒЁеүҠйҷӨ</button></div>';
    sl.items.forEach(function(it){
      var id=it.deliveryRowIdx;
      if(!drItems[id]) drItems[id]={name:it.name,qty:it.qty,volume:it.volume,floor:drGuessFloor(it.name)};
      h+='<div class="dr-item"><div class="dr-item-l"><div class="dr-nm">'+esc(it.name)+(it.volume?' <span class="dr-vol">'+esc(it.volume)+'</span>':'')+'</div><div class="dr-sub">зҙҚе“Ғ '+it.qty+'жң¬<button class="dr-delitem" onclick="drDeleteItem('+id+')">рҹ—‘ еүҠйҷӨ</button></div></div>'
        +'<div class="dr-item-r" id="dr-r-'+id+'">'+drRight(id)+'</div></div>';
    });
    h+='</div>';
  });
  h+='<div class="dr-actions"><button class="savebtn dr-apply" onclick="applyDeliveryReflect()">вң… йҒёжҠһгҒ—гҒҹеҶ…е®№гҒ§еңЁеә«гҒ«еҸҚжҳ </button></div></div>';
  b.innerHTML=h;
}
function drSetFloor(id,floor){ if(!drItems[id])return; drItems[id].floor=floor; var el=document.getElementById('dr-r-'+id); if(el)el.innerHTML=drRight(id); }
function drSelChange(id){
  var sel=document.getElementById('dr-sel-'+id), box=document.getElementById('dr-new-'+id); if(!sel||!box)return;
  if(sel.value==='-1') box.innerHTML='<div class="dr-new"><span class="dr-newlbl">ж–°иҰҸзҷ»йҢІпјҲ'+drItems[id].floor+'пјүгӮ«гғҶгӮҙгғӘ:</span><select class="finput" id="dr-nc-'+id+'">'+STOCK_CATS.map(function(c){return '<option'+(c==='гғңгғҲгғ«'?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div>';
  else box.innerHTML='';

function applyDeliveryReflect(){
  var rows=[];
  Object.keys(drItems).forEach(function(id){

    if(mv===-1){ row.newCategory=(document.getElementById('dr-nc-'+id)||{}).value||'гғңгғҲгғ«'; row.newFloor=drItems[id].floor||'е…ұйҖҡ'; }

  if(!confirm(rows.length+'е“Ғзӣ®гӮ’еңЁеә«гҒ«еҸҚжҳ гҒ—гҒҫгҒҷгҖӮгӮҲгӮҚгҒ—гҒ„гҒ§гҒҷгҒӢпјҹ'))return;

  gsr('kioskApplyDelivery',{rows:rows}).then(function(res){
    if(res&&res.ok){ alert('вң… '+res.applied+'е“Ғзӣ®гӮ’еңЁеә«гҒ«еҸҚжҳ гҒ—гҒҫгҒ—гҒҹ'+(res.created?'пјҲж–°иҰҸзҷ»йҢІ '+res.created+'д»¶пјү':'')); openDeliveryReflect(); }
    else { alert('гӮЁгғ©гғј: '+((res&&res.error)||'')); if(btn){btn.disabled=false;btn.textContent='вң… йҒёжҠһгҒ—гҒҹеҶ…е®№гҒ§еңЁеә«гҒ«еҸҚжҳ ';} }
  }).catch(function(){ alert('еҸҚжҳ гҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ'); if(btn){btn.disabled=false;btn.textContent='вң… йҒёжҠһгҒ—гҒҹеҶ…е®№гҒ§еңЁеә«гҒ«еҸҚжҳ ';} });
}
/* иӘӨиӘӯгғ»дёҚиҰҒгҒӘзҙҚе“ҒжҳҺзҙ°гӮ’еүҠйҷӨпјҲеңЁеә«гҒҜеӨүгҒҲгҒҡгҖҒзҙҚе“ҒиЁҳйҢІгҒӢгӮүж¶ҲгҒҷгҒ гҒ‘пјү */
function drDeleteItem(id){
  if(!IS_GAS){ alert('пјҲгғӯгғјгӮ«гғ«пјүеүҠйҷӨгҒҜжң¬з•ӘгҒ®гҒҝ'); return; }
  if(!confirm('гҒ“гҒ®е“Ғзӣ®гӮ’зҙҚе“ҒиЁҳйҢІгҒӢгӮүеүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹпјҲеңЁеә«гҒҜеӨүгӮҸгӮҠгҒҫгҒӣгӮ“пјҸе…ғгҒ«жҲ»гҒӣгҒҫгҒӣгӮ“пјү'))return;
  gsr('kioskDeleteDelivery',[Number(id)]).then(function(res){
    if(res&&res.ok){ toast('рҹ—‘ еүҠйҷӨгҒ—гҒҫгҒ—гҒҹ'); openDeliveryReflect(); }
    else { alert('еүҠйҷӨгӮЁгғ©гғј: '+((res&&res.error)||'')); }
  }).catch(function(e){ alert('еүҠйҷӨгӮЁгғ©гғј: '+((e&&e.message)||e)); });
}
function drDeleteSlip(idsStr,n){
  if(!IS_GAS){ alert('пјҲгғӯгғјгӮ«гғ«пјүеүҠйҷӨгҒҜжң¬з•ӘгҒ®гҒҝ'); return; }
  var ids=String(idsStr).split(',').map(Number).filter(function(x){return x>=2;});
  if(!ids.length)return;

function okCard(name){

function okMode(mode){

  var msg=mode==='jisha'?'иҮӘзӨҫйҖҒгӮҠгғўгғјгғүгҒ«еҲҮжӣҝгҒҲгҒҫгҒҷпјҲгғүгғ©гӮӨгғҗгғјгҒёгҒ®йҖҡзҹҘгӮ’жӯўгӮҒгҒҫгҒҷпјүгҖӮгӮҲгӮҚгҒ—гҒ„гҒ§гҒҷгҒӢпјҹ':'гғүгғ©гӮӨгғҗгғјжүӢй…ҚгғўгғјгғүгҒ«еҲҮжӣҝгҒҲгҒҫгҒҷгҖӮгӮҲгӮҚгҒ—гҒ„гҒ§гҒҷгҒӢпјҹ';
  if(!confirm(msg))return;
  okuriState.mode=mode; renderOkuri();
  gsr('kioskSetGlobalOkuriMode',mode).then(function(r){ if(r&&r.mode){okuriState.mode=r.mode;renderOkuri();} }).catch(function(){alert('гғўгғјгғүеҲҮжӣҝгҒ«еӨұж•—');});
}

  var bin=okuriState.binSel[name]||(okEntry(name)[0]||{}).bin||1;
  gsr('kioskSaveOkuriEntry',name,dest,bin).then(function(res){

    else alert('гӮЁгғ©гғј: '+((res&&res.error)||''));

    if(res&&res.ok) openOkuriManager(); else alert('гӮЁгғ©гғј: '+((res&&res.error)||''));
  }).catch(function(){alert('еҸ–ж¶ҲгҒ«еӨұж•—');});
}

/* ============ е®ҹгғҮгғјгӮҝжҺҘз¶ҡеұӨпјҲGASжң¬з•Әпјү ============ */
/* google.script.run д»Јжӣҝ: GAS гҒ® fetch API гӮ’еҸ©гҒҚ {__ok,data} гӮ’еұ•й–ӢпјҲжҲҗеҠҹгҒ§ data / еӨұж•—гҒ§ rejectпјү */
function gsr(fn){
  var a=Array.prototype.slice.call(arguments,1);
  return fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'gunshi',key:KIOSK_KEY,fn:fn,args:a})})
    .then(function(r){return r.json();})
    .then(function(j){ if(j&&j.__ok===false) throw new Error(j.error||'server error'); return j?j.data:j; });
}

function adaptHall(data){
  data=data||{}; var raw=data.seats||[];
  var arr=raw.map(function(s){
    var isWK=(s.type==='W'||s.type==='K');
    var src=(s.occupied||isWK)?(s.casts||[]):[];
    var casts=src.map(function(c){
      var rem=c.setMins?(c.setMins-c.elapsed):0;
      return {n:c.name, mins:isWK?(c.elapsed||0):(c.setMins?rem:0), status:c.status||'ok', unlimited:!isWK&&!c.setMins, nextSeat:c.nextSeat||''};
    });
    var o={code:s.code, floor:s.floor, type:s.type, name:s.short||s.label||s.code,
      pax:(s.rsrv&&s.rsrv.pax)||casts.length||1,
      tantou:(s.rsrv&&s.rsrv.tantouCast)||'',
      casts:casts, tags:(s.tags||[]), ngList:s.ngCast||[], planList:s.planCast||[], recentLeft:s.recentLeft||{}};
    if(!isWK){
      if(s.occupied) o.cust=(s.rsrv&&s.rsrv.customer)?(s.rsrv.customer+' ж§ҳ'):'гҒ”жқҘеә—';
      else if(s.rsrv&&s.rsrv.customer) o.cust=s.rsrv.customer+' ж§ҳ';   // жқҘеә—жёҲгҒҝгҒ гҒҢгӮӯгғЈгӮ№гғҲжңӘзқҖпјқжӢ…еҪ“дёҚеңЁгҒ§иЎЁзӨә
      else if(s.yrsrv) o.rsv={time:s.yrsrv.time,cust:s.yrsrv.customer,tantou:s.yrsrv.tantouCast||''};
    }
    return o;
  });
  var byCode={}; arr.forEach(function(o,i){byCode[o.code]=i;});
  var comb=data.combines||{};
  Object.keys(comb).forEach(function(pc){var pi=byCode[pc]; if(pi==null)return; (comb[pc]||[]).forEach(function(oc){var oi=byCode[oc]; if(oi==null)return; (arr[pi].mergeWith=arr[pi].mergeWith||[]).push(oi); arr[oi].mergedTo=pi;});});
  return arr;
}
function adaptRsv(list){return (list||[]).map(function(r){return {id:r.rowIdx, rowIdx:r.rowIdx, time:r.time, cust:r.customer, mem:r.memberId, pax:r.pax, table:r.table||'жңӘе®ҡ', tantou:r.tantouCast, dohan:r.dohanCast, yoyaku:r.yoyakuCast, status:r.status, note:r.youbou||'', checkInAt:r.checkInAt||null, joined:r.memberSince||'', feeDate:r.annualFeeDate||'', nextMemo:r.nextMemo||''};});}
// еҗҢгҒҳгҒҠе®ўж§ҳгҒ®дәҲзҙ„гҒҢиӨҮж•°гғҶгғјгғ–гғ«гҒ«и·ЁгӮӢе ҙеҗҲгҖҒгҒқгҒ®еёӯеҗҢеЈ«гӮ’1зө„(зөҗеҗҲиЎЁзӨә)гҒ«гҒҫгҒЁгӮҒгӮӢгҖӮ
// жүӢеӢ•зөҗеҗҲгҒҢж—ўгҒ«гҒӮгӮӢеёӯгҒҜе°ҠйҮҚгҒ—гҒҰгӮ№гӮӯгғғгғ—гҖӮгӮӯгғЈгғігӮ»гғ«/йҖҖеә—жёҲгҒҝгғ»жңӘе®ҡгҒҜеҜҫиұЎеӨ–гҖӮ
function applyRsvGrouping(){
  if(!SEATS||!RSV) return;
  var byCode={}; SEATS.forEach(function(o,i){byCode[o.code]=i;});
  RSV.forEach(function(r){
    if(r.status==='гӮӯгғЈгғігӮ»гғ«'||r.status==='йҖҖеә—жёҲгҒҝ'||!r.table||r.table==='жңӘе®ҡ') return;
    var idxs=String(r.table).split('гҖҒ').map(function(t){return byCode[tblToCode(t)];}).filter(function(x){return x!=null;});
    if(idxs.length<2) return;
    if(idxs.some(function(i){return SEATS[i].mergedTo!=null||(SEATS[i].mergeWith&&SEATS[i].mergeWith.length);})) return; // ж—ўеӯҳзөҗеҗҲгӮ’е°ҠйҮҚ
    var pi=idxs[0];
    idxs.slice(1).forEach(function(oi){ (SEATS[pi].mergeWith=SEATS[pi].mergeWith||[]).push(oi); SEATS[oi].mergedTo=pi; });
  });
}
function adaptRot(list){return (list||[]).map(function(c){return {cast:c.cast, interval:c.interval||15, tables:(c.tables||[]).map(function(t){return {key:t.label, code:t.code, cust:(t.cust||'')+(t.cust?'ж§ҳ':''), cur:!!t.current, min:0, wait:t.awayMin||0};})};});}
function adaptShift(list){return (list||[]).map(function(s){return {name:s.name, origName:s.origName||s.name, renamed:!!s.renamed, in:s.in, out:s.out, hayaagari:s.hayaagari, okuri:!!s.okuri, okuriMode:s.okuriMode||'гғүгғ©гӮӨгғҗгғј', shusen:s.shusen||''};});}
function adaptReq(list){return (list||[]).map(function(r){var store=/еә—е…ЁдҪ“|е…ЁдҪ“/.test(r.target||'');return {id:r.rowIdx, time:r.time, cast:r.name, type:r.type, targetStore:store, targetCust:store?'':custKey(r.target), comment:r.comment||'', handled:!!r.handled};});}

function loadAll(){
  if(!IS_GAS) return;
  Promise.all([
    gsr('getKioskHall2'),
    gsr('getKioskReservations',curDate),
    gsr('getKioskTsukemawashi'),
    gsr('getKioskShiftBoard'),
    gsr('getCastRequestsToday'),
    gsr('getKioskCastNames'),
    gsr('getKioskWorkingCasts').catch(function(){return null;}),
    gsr('getKioskTasks').catch(function(){return null;}),
    gsr('getKioskCastKubun').catch(function(){return null;})
  ]).then(function(r){
    SEATS=adaptHall(r[0]); RSV=adaptRsv(r[1]); ROT=adaptRot(r[2]); SHIFT=adaptShift(r[3]); REQUESTS=adaptReq(r[4]); CASTS=r[5]||CASTS; WORKCASTS=(r[6]!=null?r[6]:WORKCASTS); TASKS=(r[7]&&r[7].tasks)||[]; CASTKUBUN=(r[8]&&typeof r[8]==='object')?r[8]:CASTKUBUN;
    applyRsvGrouping(); // еҗҢгҒҳдәҲзҙ„гҒҢиӨҮж•°гғҶгғјгғ–гғ« вҶ’ 1зө„гҒЁгҒ—гҒҰзөҗеҗҲиЎЁзӨә
    BOOTED=true; renderAll();
    if(viewMode==='home'){var ph=curPhase();if(ph==='pre'||ph==='post')loadHomeStatus();if(ph==='pre')loadOpeningPrep();if(ph==='post')loadChecklistConfig();}
  }).catch(function(e){ if(typeof toast==='function') toast('иӘӯиҫјгӮЁгғ©гғј: '+(e&&e.message||e)); });
}

/* ============ гғӯгӮ°гӮӨгғіпјҲGASжң¬з•ӘгҒ®гҒҝпјү ============ */
var loginName='', loginPin='';
var _authToken=null,_authTimer=null;
function stopAuthPoll(){ if(_authTimer){clearInterval(_authTimer);_authTimer=null;} }
function startLogin(){ startQrLogin(); }   // ж—ўе®ҡпјқQRгғӯгӮ°гӮӨгғі
function startQrLogin(){
  stopAuthPoll();
  document.getElementById('klTerm').textContent=TERM+' з«Ҝжң«';
  document.getElementById('loginOverlay').style.display='flex';
  document.getElementById('loginContent').innerHTML='<div class="kl-qrwrap"><div class="kl-qrtitle">рҹ“ұ LINEгҒ§QRгӮ’иӘӯгҒҝеҸ–гҒЈгҒҰгғӯгӮ°гӮӨгғі</div><div class="kl-qrbox" id="klQr"><div class="kl-qrload">QRгӮ’з”ҹжҲҗдёӯвҖҰ</div></div><div class="kl-qrhint">гӮ№гғһгғӣгҒ®LINEгҒ§гӮ№гӮӯгғЈгғі вҶ’ жң¬дәәзўәиӘҚ вҶ’ иҮӘеӢ•гҒ§гғӯгӮ°гӮӨгғігҒ—гҒҫгҒҷ</div><div class="kl-pinlink" onclick="startPinLogin()">гӮ№гғһгғӣгҒҢгҒӘгҒ„е ҙеҗҲгҒҜ PINгҒ§гғӯгӮ°гӮӨгғі вҶ’</div></div>';
  if(!IS_GAS){ document.getElementById('klQr').innerHTML='<div class="kl-qrload">пјҲгғӯгғјгӮ«гғ«пјүQRгғӯгӮ°гӮӨгғігҒҜжң¬з•ӘгҒ®гҒҝ</div>'; return; }
  gsr('kioskAuthStart').then(function(r){
    if(!r||!r.ok){ var e=document.getElementById('klQr'); if(e)e.innerHTML='<div class="kl-err">QRз”ҹжҲҗгӮЁгғ©гғј</div>'; return; }
    _authToken=r.token;
    var q='https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=8&data='+encodeURIComponent(r.url);
    var box=document.getElementById('klQr'); if(box)box.innerHTML='<img src="'+q+'" width="240" height="240" alt="QR">';
    pollAuth(r.token);
  }).catch(function(){ var e=document.getElementById('klQr'); if(e)e.innerHTML='<div class="kl-err">йҖҡдҝЎгӮЁгғ©гғј</div>'; });
}
function pollAuth(token){
  stopAuthPoll();
  _authTimer=setInterval(function(){
    if(_authToken!==token){ stopAuthPoll(); return; }
    gsr('kioskAuthStatus',token).then(function(r){
      if(!r)return;
      if(r.status==='ok'){ stopAuthPoll(); LOGIN=r.name; saveKioskSession(r.name); document.getElementById('loginOverlay').style.display='none'; afterLogin(); }
      else if(r.status==='expired'){ stopAuthPoll(); startQrLogin(); }
    }).catch(function(){});
  },2500);
}
function startPinLogin(){
  stopAuthPoll();
  document.getElementById('loginContent').innerHTML='<div class="kl-back" onclick="startQrLogin()">вҶҗ QRгғӯгӮ°гӮӨгғігҒ«жҲ»гӮӢ</div><div class="kl-pintitle">PINгҒ§гғӯгӮ°гӮӨгғі</div><div id="klNames"><div class="kl-qrload">иӘӯгҒҝиҫјгҒҝдёӯвҖҰ</div></div>';
  gsr('getKioskStaffList').then(function(names){
    var el=document.getElementById('klNames'); if(el)el.innerHTML='<div class="kl-grid">'+(names||[]).map(function(n){return '<div class="kl-name" onclick="pickName(\''+String(n).replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')">'+esc(n)+'</div>';}).join('')+'</div>';
  }).catch(function(){var el=document.getElementById('klNames'); if(el)el.innerHTML='<div class="kl-err">иӘӯгҒҝиҫјгҒҝгӮЁгғ©гғј</div>';});
}
function pickName(n){loginName=n;loginPin='';renderPin();}
function renderPin(){
  var dots=[0,1,2,3].map(function(i){return '<div class="kl-dot'+(i<loginPin.length?' on':'')+'"></div>';}).join('');
  var keys=[1,2,3,4,5,6,7,8,9].map(function(k){return '<div class="kl-key" onclick="pinIn(\''+k+'\')">'+k+'</div>';}).join('');
  document.getElementById('loginContent').innerHTML='<div class="kl-pinwrap"><div class="kl-back" onclick="startPinLogin()">вҶҗ жҲ»гӮӢ</div><div class="kl-selname">'+esc(loginName)+'</div><div class="kl-dots">'+dots+'</div><div class="kl-pad">'+keys+'<div class="kl-key clr" onclick="pinClr()">C</div><div class="kl-key" onclick="pinIn(\'0\')">0</div><div class="kl-key ok" onclick="submitPin()">OK</div></div><div class="kl-err" id="klErr"></div></div>';
}
function pinIn(d){if(loginPin.length>=4)return;loginPin+=d;renderPin();if(loginPin.length===4)setTimeout(submitPin,150);}
function pinClr(){loginPin=loginPin.slice(0,-1);renderPin();}
function submitPin(){
  if(!loginPin)return;
  gsr('kioskVerifyPin',loginName,loginPin).then(function(r){
    if(r&&r.ok){ LOGIN=loginName; saveKioskSession(loginName); document.getElementById('loginOverlay').style.display='none'; afterLogin(); }
    else { loginPin=''; renderPin(); var e=document.getElementById('klErr'); if(e)e.textContent=(r&&r.error)||'PINгҒҢйҒ•гҒ„гҒҫгҒҷ'; }
  }).catch(function(){ loginPin=''; renderPin(); var e=document.getElementById('klErr'); if(e)e.textContent='йҖҡдҝЎгӮЁгғ©гғј'; });
}
function afterLogin(){ window._k2loginAt=Date.now(); renderAll(); loadAll(); if(!window._k2i) window._k2i=setInterval(loadAll,30000); if(!window._k2sw) window._k2sw=setInterval(checkForceLogout,30000); checkClockDrift(); if(!window._k2clk) window._k2clk=setInterval(checkClockDrift,60000); }
/* ===== з«Ҝжң«жҷӮеҲ»гӮәгғ¬жӨңзҹҘпјҲiPadгҒ®ж—Ҙд»ҳжҲ»гҒ—еҝҳгӮҢеҜҫзӯ–гғ»1еҲҶгҒ”гҒЁпјү =====
 * й ҳеҸҺжӣёзҷәиЎҢгҒ§з«Ҝжң«гҒ®ж—Ҙд»ҳгӮ’йҒҺеҺ»гҒ«жҲ»гҒ—гҒҹгҒҫгҒҫжҲ»гҒ—еҝҳгӮҢгӮӢгҒЁзҝҢе–¶жҘӯгҒ®дјқзҘЁж—Ҙд»ҳгҒҢгӮәгғ¬гӮӢгҖӮ
 * гӮөгғјгғҗгғјжҷӮеҲ»(getServerTime)гҒЁз«Ҝжң«жҷӮеҲ»гӮ’жҜҺеҲҶзӘҒеҗҲгҒ—гҖҒй–ҫеҖӨи¶…йҒҺгҒ§пјҡв‘ жңҖдёҠйғЁгҒ«иөӨгғҗгғҠгғјв‘ЎreportClockDriftгҒ§й»’жңҚLINEпјӢиҰҒеҜҫеҝңгғҒгӮұгғғгғҲгҖӮи§Јж¶ҲгҒ§clearClockDriftгҖӮ */
var CLOCK_DRIFT_SEC=43200;   // гҒ“гҒ®з§’ж•°д»ҘдёҠгӮәгғ¬гҒҹгӮүиӯҰе‘ҠгҖӮй ҳеҸҺжӣёгҒ®ж—Ҙд»ҳжҲ»гҒ—гҒҜгҖҢж—ҘгҖҚеҚҳдҪҚгҒӘгҒ®гҒ§12жҷӮй–“й–ҫеҖӨгҒ«иЁӯе®ҡпјқж•°еҲҶгҖңж•°жҷӮй–“гҒ®дәӣзҙ°гҒӘгӮәгғ¬гҒҜз„ЎиҰ–гҒ—гҖҒж—Ҙд»ҳжҲ»гҒ—еҝҳгӮҢпјҲвү’1ж—Ҙд»ҘдёҠеүҚпјүгҒ гҒ‘зўәе®ҹгҒ«жҚ•жҚү
var _clockDrifted=false;
function showDriftBanner(html){
  var b=document.getElementById('clockDriftBanner');
  if(!b){ b=document.createElement('div'); b.id='clockDriftBanner';
    b.style.cssText='position:fixed;top:0;left:0;right:0;z-index:600;background:#b3132a;color:#fff;font-weight:800;font-size:15px;text-align:center;padding:10px 14px;box-shadow:0 2px 12px rgba(0,0,0,.45);font-family:-apple-system,sans-serif;line-height:1.55';
    document.body.appendChild(b); }
  b.innerHTML=html; b.style.display='block';
}
function hideDriftBanner(){ var b=document.getElementById('clockDriftBanner'); if(b)b.style.display='none'; }
function checkClockDrift(){
  if(!IS_GAS||!LOGIN)return;
  var t0=Date.now();
  gsr('getServerTime').then(function(st){
    if(!st||!st.epoch)return;
    var t1=Date.now();
    var offsetSec=Math.round(((t0+t1)/2 - st.epoch)/1000); // з«Ҝжң« - гӮөгғјгғҗгғјпјҲеҫҖеҫ©йҒ…е»¶гӮ’зӣёж®әпјү
    if(Math.abs(offsetSec)>=CLOCK_DRIFT_SEC){
      var behind=offsetSec<0;
      showDriftBanner('рҹҡЁ гҒ“гҒ®з«Ҝжң«гҒ®ж—Ҙд»ҳ/жҷӮеҲ»гҒҢ'+(behind?'йҒҺеҺ»гҒ«жҲ»гҒЈгҒҰгҒ„гҒҫгҒҷ':'йҖІгӮ“гҒ§гҒҡгӮҢгҒҰгҒ„гҒҫгҒҷ')+'гҖӮ<br>й ҳеҸҺжӣёгҒ®ж—Ҙд»ҳжҲ»гҒ—гҒ®гҒӮгҒЁгҒҜгҖҗиЁӯе®ҡ пјһ дёҖиҲ¬ пјһ ж—Ҙд»ҳгҒЁжҷӮеҲ» пјһ иҮӘеӢ•иЁӯе®ҡгҖ‘гӮ’ONгҒ«жҲ»гҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ');
      gsr('reportClockDrift',offsetSec,new Date().toString()).catch(function(){});
      _clockDrifted=true;
    } else {
      hideDriftBanner();
      if(_clockDrifted){ gsr('clearClockDrift').catch(function(){}); _clockDrifted=false; }
    }
  }).catch(function(){});
}
function forceLogoutReload(){ try{localStorage.removeItem(kSessKey());}catch(_){} LOGIN=''; stopAuthPoll(); location.reload(); }
/* еј·еҲ¶гғӯгӮ°гӮўгӮҰгғҲзӣЈиҰ–: в‘ зҝҢ3жҷӮеӨұеҠ№ в‘ЎзҸҫйҮ‘жүҝиӘҚгҒ®10еҲҶеҫҢ or з®ЎзҗҶиҖ…ж“ҚдҪңпјҲе…Ёз«Ҝжң«пјү */
function checkForceLogout(){
  if(!IS_GAS||!LOGIN)return;
  if(!loadKioskSession()){ forceLogoutReload(); return; } // зҝҢ3жҷӮпјҲе–¶жҘӯж—Ҙеўғз•Ңпјү
  gsr('kioskLogoutTs').then(function(r){ if(r&&r.ts&&window._k2loginAt&&r.ts>window._k2loginAt) forceLogoutReload(); }).catch(function(){});
}
/* гӮ»гғғгӮ·гғ§гғіпјҲзҝҢ3жҷӮгҒҫгҒ§жңүеҠ№пјү */
function kSessKey(){return 'k2sess_'+TERM;}
function loadKioskSession(){try{var r=localStorage.getItem(kSessKey());if(!r)return null;var s=JSON.parse(r);if(s&&s.exp&&Date.now()<s.exp)return s;localStorage.removeItem(kSessKey());return null;}catch(e){return null;}}
function saveKioskSession(name){var n=new Date();var e=new Date(n);if(n.getHours()>=3)e.setDate(e.getDate()+1);e.setHours(3,0,0,0);try{localStorage.setItem(kSessKey(),JSON.stringify({name:name,exp:e.getTime()}));}catch(_){}}
function doLogout(){ if(!IS_GAS){ alert('пјҲгғӯгғјгӮ«гғ«пјүгғӯгӮ°гӮўгӮҰгғҲ'); return; } if(!confirm((LOGIN||'')+' гҒ•гӮ“гӮ’гғӯгӮ°гӮўгӮҰгғҲгҒ—гҒҫгҒҷгҒӢпјҹ'))return; try{localStorage.removeItem(kSessKey());}catch(_){} location.reload(); }

/* ============ BOOT ============ */
function renderAll(){
  document.getElementById('termBadge').textContent=TERM+' з«Ҝжң«';
  document.getElementById('whoName').textContent=LOGIN||'вҖ”';
  document.getElementById('dlabel').textContent=dateLabel(curDate);
  renderAlerts();renderHall();renderRight();renderHome();
}
/* иЎЁзӨәгҒҢгҒҠгҒӢгҒ—гҒ„жҷӮгҒ®гғҸгғјгғүеҶҚиӘӯгҒҝиҫјгҒҝпјҲгӮӯгғЈгғғгӮ·гғҘеӣһйҒҝгғ»зҸҫеңЁгҒ®гғ‘гғ©гғЎгғјгӮҝгҒҜз¶ӯжҢҒпјү */
function hardReload(){ try{ var u=new URL(location.href); u.searchParams.set('cb',Date.now()); location.replace(u.toString()); }catch(e){ location.reload(); } }
tickClock();setInterval(tickClock,10000);
/* гғӯгӮ°гӮӨгғіеҫҢгҒ®жң¬дҪ“иө·еӢ• */
function bootGunshi(){
  SEATS=[];RSV=[];ROT=[];SHIFT=[];REQUESTS=[];
  var mf=document.getElementById('modeFlag'); if(mf){mf.textContent='рҹҹў жң¬з•ӘгғҮгғјгӮҝ'; mf.style.color='#7be0a8'; mf.style.borderColor='#2a6a44'; mf.style.background='#0d2618';}
  var sess=loadKioskSession();
  if(sess){ LOGIN=sess.name; var lo=document.getElementById('loginOverlay'); if(lo)lo.style.display='none'; afterLogin(); }
  else { startLogin(); }
}
/* гӮӯгғјиЁӯе®ҡз”»йқўпјҲеҲқеӣһ or иӘӨгӮҠжҷӮпјү */
function showKeySetup(msg){
  var lo=document.getElementById('loginOverlay'); if(lo)lo.style.display='none';
  var t=TERM==='2f'||TERM==='2F'?'2f':'5f'; window._gsTerm=t;
  document.body.insertAdjacentHTML('beforeend','<div id="gsSetup" style="position:fixed;inset:0;z-index:400;background:#0b0b12;display:flex;align-items:center;justify-content:center;padding:24px">'
    +'<div style="max-width:420px;width:100%;color:#dbe7fb;font-family:-apple-system,sans-serif">'
    +'<div style="font-size:22px;font-weight:800;margin-bottom:4px">рҹӣЎ и»Қеё« гӮ»гғғгғҲгӮўгғғгғ—</div>'
    +'<div style="font-size:13px;color:#9ab4d8;margin-bottom:18px">гҒ“гҒ®з«Ҝжң«гҒ®гғ•гғӯгӮўгҒЁи»Қеё«гӮӯгғјгӮ’иЁӯе®ҡгҒ—гҒҫгҒҷпјҲ1еӣһгҒ гҒ‘гҖӮж¬ЎеӣһгҒӢгӮүгӮўгӮӨгӮігғіиө·еӢ•гҒ§е…Ёз”»йқўпјүгҖӮ'+(msg?'<br><span style="color:#ff9a9a">'+msg+'</span>':'')+'</div>'
    +'<div style="font-size:12px;color:#8fb0d8;font-weight:700;margin-bottom:7px">гғ•гғӯгӮў</div>'
    +'<div style="display:flex;gap:10px"><button id="gf5" onclick="window._gsSetF(\'5f\')" style="flex:1;padding:14px;border-radius:12px;border:1px solid #21406e;background:'+(t==='5f'?'#14335c':'#101d33')+';color:#cfe4ff;font-size:17px;font-weight:800">5F з«Ҝжң«</button>'
    +'<button id="gf2" onclick="window._gsSetF(\'2f\')" style="flex:1;padding:14px;border-radius:12px;border:1px solid #21406e;background:'+(t==='2f'?'#14335c':'#101d33')+';color:#cfe4ff;font-size:17px;font-weight:800">2F з«Ҝжң«</button></div>'
    +'<div style="font-size:12px;color:#8fb0d8;font-weight:700;margin:16px 0 7px">и»Қеё«гӮӯгғј</div>'
    +'<input id="gkey" type="text" autocapitalize="off" autocorrect="off" spellcheck="false" value="'+(KIOSK_KEY?String(KIOSK_KEY).replace(/"/g,"&quot;"):'')+'" placeholder="д»ҠгҒ®и»Қеё«URLгҒ® key= гҒ®еҫҢгӮҚ" style="width:100%;box-sizing:border-box;padding:13px;border-radius:12px;border:1px solid #21406e;background:#101d33;color:#dbe7fb;font-size:16px">'
    +'<button onclick="window._gsSave()" style="width:100%;margin-top:20px;padding:15px;border-radius:12px;border:0;background:#2a63aa;color:#fff;font-size:16px;font-weight:800">дҝқеӯҳгҒ—гҒҰй–ӢгҒҸ</button>'
    +'<div style="font-size:12px;color:#6a8ab0;margin-top:14px">гӮӯгғјгҒҜгҒ“гҒ®з«Ҝжң«еҶ…гҒ«гҒ®гҒҝдҝқеӯҳгҒ•гӮҢгҒҫгҒҷгҖӮ</div></div></div>');
}
window._gsSetF=function(t){window._gsTerm=t;var a=document.getElementById('gf5'),b=document.getElementById('gf2');if(a)a.style.background=t==='5f'?'#14335c':'#101d33';if(b)b.style.background=t==='2f'?'#14335c':'#101d33';};
window._gsSave=function(){var k=(document.getElementById('gkey').value||'').trim();if(!k){alert('и»Қеё«гӮӯгғјгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');return;}try{localStorage.setItem('gunshi_key',k);localStorage.setItem('gunshi_term',window._gsTerm||'5f');}catch(e){}location.href=location.pathname;};
/* еҲқжңҹеҢ–: гӮӯгғјзўәиӘҚ вҶ’ bootstrap вҶ’ иө·еӢ• */
(function initGunshi(){
  var q=new URLSearchParams(location.search);
  KIOSK_KEY=q.get('key')||(function(){try{return localStorage.getItem('gunshi_key')||'';}catch(e){return '';}})();
  var term=(q.get('term')||(function(){try{return localStorage.getItem('gunshi_term');}catch(e){return '';}})()||'5f').toLowerCase();
  TERM = term==='2f'?'2F':'5F';
  try{ if(q.get('key'))localStorage.setItem('gunshi_key',KIOSK_KEY); localStorage.setItem('gunshi_term',term); }catch(e){}
  if(!KIOSK_KEY || q.get('setup')==='1'){ showKeySetup(); return; }
  fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'gunshi',key:KIOSK_KEY,fn:'getKioskBootstrap',args:[]})})
    .then(function(r){return r.json();})
    .then(function(j){
      if(j&&j.__ok===false){ showKeySetup('гӮӯгғјгҒҢжӯЈгҒ—гҒҸгҒӘгҒ„еҸҜиғҪжҖ§гҒҢгҒӮгӮҠгҒҫгҒҷ'); return; }
      var d=(j&&j.data)||{}; KIOSK_USER_ID=d.kioskUserId||''; if(d.today){TODAY=d.today;curDate=d.today;}
      bootGunshi();
    })
    .catch(function(){ bootGunshi(); }); /* йҖҡдҝЎдёҚеҸҜгҒ§гӮӮгғӯгӮ°гӮӨгғіз”»йқўгҒҫгҒ§гҒҜеҮәгҒҷ */
})();
</script>
