function bcCount(){ var t=((document.getElementById('bc-msg')||{}).value)||''; var c=document.getElementById('bc-count'); if(c)c.textContent=t.length+' 文字'; }
function bcSend(){
  var msg=(((document.getElementById('bc-msg')||{}).value)||'').trim();
  if(!msg){ toast('メッセージを入力してください'); return; }
  if(!IS_GAS){ toast('（ローカル）送信は本番のみ'); return; }
  if(!confirm('全キャストにこのお知らせを個別送信します。よろしいですか？\n\n'+msg.slice(0,140)+(msg.length>140?'…':''))) return;
  var btn=document.getElementById('bc-send'); if(btn){btn.disabled=true;btn.textContent='送信中…';}
  gsr('gunshiBroadcastCast',msg).then(function(r){
    var el=document.getElementById('bc-result');
    if(r&&r.ok===false){ if(el)el.innerHTML='<span style="color:#e88">送信失敗: '+esc(r.error||'')+'</span>'; if(btn){btn.disabled=false;btn.textContent='📢 送信する';} return; }
    var out='✅ <b>'+r.sent+'名</b>に送信しました';
    if(r.failed)  out+='<br><span style="color:#e88">送信失敗 '+r.failed+'名: '+(r.failedNames||[]).map(esc).join('、')+'</span>';
    if(r.skipped) out+='<br><span style="color:#e0a060;font-size:12px">LINE未登録でスキップ '+r.skipped+'名</span>';
    if(el)el.innerHTML=out;
    toast('✅ '+r.sent+'名に送信しました');
    var ta=document.getElementById('bc-msg'); if(ta){ta.value='';bcCount();}
    if(btn){btn.disabled=false;btn.textContent='📢 送信する';}
  }).catch(function(){
    var el=document.getElementById('bc-result'); if(el)el.innerHTML='<span style="color:#e88">通信エラー</span>';
    if(btn){btn.disabled=false;btn.textContent='📢 送信する';}
  });
}

/* ============ 現金管理：🌅 開店チェック ============ */
var CASH_DENOMS=[{k:'m10000',label:'万',v:10000},{k:'m5000',label:'五千',v:5000},{k:'m1000',label:'千',v:1000}];
var OPEN_BAGS=[{k:'f5',label:'5Fレジ'},{k:'f2',label:'2Fレジ'},{k:'keihi',label:'経費袋'},{k:'safe',label:'金庫'}];
var openState=null;
function openOpeningCheck(){
  closeMenu(); showSheet('🌅 開店チェック','<div class="empty-msg">読み込み中...</div>',false);
  if(!IS_GAS){ document.getElementById('sheetBody').innerHTML='<div class="empty-msg">（ローカル）開店チェックは本番のみ</div>'; return; }
  gsr('getOpeningCheckInit').then(renderOpening).catch(function(){ var b=document.getElementById('sheetBody'); if(b)b.innerHTML='<div class="empty-msg">読み込みエラー</div>'; });
}
function ckBagBlock(bagKey,label,prevYen){
  var pv=(prevYen!=null)?'<span style="color:#8a9ac0;font-size:11px;margin-left:6px">前日 ¥'+Number(prevYen).toLocaleString()+'</span>':'';
  return '<div class="ck-row"><div class="ck-flabel">'+label+pv+'</div>'+CASH_DENOMS.map(function(d){return '<label class="ck-denom"><span>'+d.label+'</span><input type="number" min="0" inputmode="numeric" data-bag="'+bagKey+'" data-d="'+d.k+'" oninput="opInput(this)"></label>';}).join('')+'</div>';
}
function renderOpening(init){
  var b=document.getElementById('sheetBody'); if(!b)return;
  var prev=init.prevClose||null;
  if(init.locked){
    var h='<div class="ck-note">対象日 '+esc(init.dateKey)+'</div>';
    h+='<div class="ck-banner ok">✅ 提出済み（修正不可）／報告者 '+esc(init.reporterName)+'</div>';
    OPEN_BAGS.forEach(function(bg){
      var cur=Number((init.bags||{})[bg.k])||0;
      var pr=prev?(Number((prev.bags||{})[bg.k])||0):null;
      var prLabel=(pr!=null)?' <span style="color:#8a9ac0;font-size:11px">前日¥'+pr.toLocaleString()+'</span>':'';
      var extra='';
      if(bg.k==='safe' && Number(init.safeAdjust)){ var sa=Number(init.safeAdjust); extra='<div style="font-size:11px;color:'+(sa>0?'#e6c060':'#ff9a9a')+';text-align:right">'+(sa>0?'+':'')+sa.toLocaleString()+'円　運営者が金庫を出し入れ?</div>'; }
      h+='<div class="kv"><span class="k">'+bg.label+prLabel+'</span><span class="v">¥'+cur.toLocaleString()+'</span></div>'+extra;
    });
    h+='<div class="ck-total">スタート合計 ¥'+Number(init.total||0).toLocaleString()+'</div>';
    if(init.safeUnchecked) h+='<div class="safe-auto-note" style="margin-top:10px">🔒 金庫は未確認（前日の残額を自動入力しました）</div>';
    h+='<div class="savebtn" style="background:#1a2030" onclick="closeSheet()">閉じる</div>';
    b.innerHTML=h; return;
  }
  openState={reporterName:'',safeMode:'manual',prevSafe:(prev&&prev.bags?(Number(prev.bags.safe)||0):null),bags:{f5:{m10000:0,m5000:0,m1000:0},f2:{m10000:0,m5000:0,m1000:0},keihi:{m10000:0,m5000:0,m1000:0},safe:{m10000:0,m5000:0,m1000:0}}};
  gsr('getKioskStaffList').then(function(names){
    var b2=document.getElementById('sheetBody'); if(!b2)return;
    var h='<div class="ck-note">対象日 '+esc(init.dateKey)+'</div><div class="flabel">報告者（黒服）</div><div class="chips" id="op-rep">'+(names||[]).map(function(n){return '<div class="chip" onclick="opRep(this,\''+esc(String(n).replace(/'/g,"\\'"))+'\')">'+esc(n)+'</div>';}).join('')+'</div>';
    h+='<div class="flabel">各袋の現金（お札の枚数）</div>';
    OPEN_BAGS.forEach(function(bg){ var pr=prev?(Number((prev.bags||{})[bg.k])||0):null; h+=(bg.k==='safe')?opSafeBlock(openState.prevSafe):ckBagBlock(bg.k,bg.label,pr); });
    h+='<div style="font-size:11px;color:#e0a060;margin-top:10px">⚠️ 送信後は修正できません。内容を確認してから送信してください。</div>';
    h+='<div id="op-status" style="font-size:12px;color:#8a9ac0;text-align:center;margin-top:8px"></div>';
    h+='<div class="savebtn" onclick="submitOpening()">開店チェックを送信</div>';
    b2.innerHTML=h;
  });
}
function opRep(el,n){ el.parentElement.querySelectorAll('.chip').forEach(function(c){c.classList.remove('sel');}); el.classList.add('sel'); openState.reporterName=n; }
function opInput(inp){ var v=Number(inp.value)||0; openState.bags[inp.dataset.bag][inp.dataset.d]=v; }
/* 金額(円)→紙幣枚数の正準分解（金庫は札のみ＝1000円単位なので端数なく復元できる） */
function safeDecompose(yen){ yen=Number(yen)||0; var m10=Math.floor(yen/10000); var r=yen-m10*10000; var m5=Math.floor(r/5000); r-=m5*5000; var m1=Math.floor(r/1000); return {m10000:m10,m5000:m5,m1000:m1}; }
/* 開店の金庫ブロック：確認する（数える）／確認しない（前日残額を自動入力） */
function opSafeBlock(prevSafe){
  var hasPrev=prevSafe!=null, auto=openState.safeMode==='auto';
  var pv=hasPrev?'<span style="color:#8a9ac0;font-size:11px;margin-left:6px">前日 ¥'+Number(prevSafe).toLocaleString()+'</span>':'';
  var seg=hasPrev?('<div class="safe-seg"><button class="'+(!auto?'on':'')+'" onclick="opSafeMode(\'manual\')">数える</button>'
    +'<button class="'+(auto?'on':'')+'" onclick="opSafeMode(\'auto\')">確認しない（前日 ¥'+Number(prevSafe).toLocaleString()+'）</button></div>')
    :'<div style="font-size:11px;color:#8a9ac0;margin:2px 0 6px">前日の締めデータが無いため手動で数えてください</div>';
  var inner;
  if(auto&&hasPrev){
    inner='<div class="safe-auto-note">🔒 金庫を開けられないため <b>前日の残額 ¥'+Number(prevSafe).toLocaleString()+'</b> をそのまま使用します（金庫は未確認）</div>';
  }else{
    inner='<div class="ck-row" style="margin:0">'+CASH_DENOMS.map(function(d){return '<label class="ck-denom"><span>'+d.label+'</span><input type="number" min="0" inputmode="numeric" data-bag="safe" data-d="'+d.k+'" value="'+(openState.bags.safe[d.k]||'')+'" oninput="opInput(this)"></label>';}).join('')+'</div>';
  }
  return '<div id="op-safe-block" style="margin-bottom:8px"><div class="ck-flabel" style="width:auto;margin-bottom:6px">🟣 金庫'+pv+'</div>'+seg+inner+'</div>';
}
function opSafeMode(m){
  openState.safeMode=m;
  openState.bags.safe=(m==='auto')?safeDecompose(openState.prevSafe):{m10000:0,m5000:0,m1000:0};
  var el=document.getElementById('op-safe-block'); if(el) el.outerHTML=opSafeBlock(openState.prevSafe);
}
function submitOpening(){
  if(!openState.reporterName){ alert('報告者を選択してください'); return; }
  if(!confirm('開店チェックを送信します。送信後は修正できません。よろしいですか？'))return;
  var s=document.getElementById('op-status'); if(s)s.textContent='送信中…';
  gsr('submitOpeningCheck',{reporterName:openState.reporterName,bags:openState.bags,safeUnchecked:openState.safeMode==='auto'}).then(function(res){
    if(!res||!res.ok){ if(s)s.textContent='⚠️ '+((res&&res.error)||'エラー'); return; }
    gsr('getOpeningCheckInit').then(renderOpening);
  }).catch(function(){ if(s)s.textContent='⚠️ 通信エラー'; });
}

/* ============ 現金管理：🔓 金庫出金 ============ */
var swState=null;
function openSafeWithdrawal(){ closeMenu(); renderSafeWithdrawal(); }
function swDenom(key){ return '<div class="ck-row"><div class="ck-flabel"></div>'+CASH_DENOMS.map(function(d){return '<label class="ck-denom"><span>'+d.label+'</span><input type="number" min="0" inputmode="numeric" data-k="'+key+'" data-d="'+d.k+'" oninput="swInput(this)"></label>';}).join('')+'</div>'; }
function renderSafeWithdrawal(){
  swState={reporterName:'',floor:'f5',out:{m10000:0,m5000:0,m1000:0},remain:{m10000:0,m5000:0,m1000:0}};
  showSheet('🔓 金庫出金','<div class="empty-msg">読み込み中...</div>',false);
  if(!IS_GAS){ document.getElementById('sheetBody').innerHTML='<div class="empty-msg">（ローカル）金庫出金は本番のみ</div>'; return; }
  gsr('getKioskStaffList').then(function(names){
    var b=document.getElementById('sheetBody'); if(!b)return;
    var h='<div class="flabel">報告者（黒服）</div><div class="chips">'+(names||[]).map(function(n){return '<div class="chip" onclick="swRep(this,\''+esc(String(n).replace(/'/g,"\\'"))+'\')">'+esc(n)+'</div>';}).join('')+'</div>';
    h+='<div class="flabel">対象フロア</div><div class="chips"><div class="chip sel" onclick="swFloor(this,\'f5\')">5F</div><div class="chip" onclick="swFloor(this,\'f2\')">2F</div></div>';
    h+='<div class="flabel">出金する枚数</div>'+swDenom('out');
    h+='<div class="flabel">出金後の金庫内残り枚数</div>'+swDenom('remain');
    h+='<div id="sw-status" style="font-size:12px;color:#8a9ac0;text-align:center;margin-top:8px"></div>';
    h+='<div class="savebtn" style="background:linear-gradient(180deg,#3a2a5a,#221a2a);border-color:#553a88;color:#bb99ee" onclick="submitSW()">金庫出金を記録</div>';
    b.innerHTML=h;
  }).catch(function(){ var b=document.getElementById('sheetBody'); if(b)b.innerHTML='<div class="empty-msg">読み込みエラー</div>'; });
}
function swRep(el,n){ el.parentElement.querySelectorAll('.chip').forEach(function(c){c.classList.remove('sel');}); el.classList.add('sel'); swState.reporterName=n; }
function swFloor(el,f){ el.parentElement.querySelectorAll('.chip').forEach(function(c){c.classList.remove('sel');}); el.classList.add('sel'); swState.floor=f; }
function swInput(inp){ swState[inp.dataset.k][inp.dataset.d]=Number(inp.value)||0; }
function submitSW(){
  if(!swState.reporterName){ alert('報告者を選択してください'); return; }
  var s=document.getElementById('sw-status'); if(s)s.textContent='送信中…';
  gsr('submitSafeWithdrawal',{reporterName:swState.reporterName,floor:swState.floor,out:swState.out,remain:swState.remain}).then(function(res){
    if(!res||!res.ok){ if(s)s.textContent='⚠️ '+((res&&res.error)||'エラー'); return; }
    if(s)s.textContent='✅ 記録しました（¥'+Number(res.outYen||0).toLocaleString()+'）';
    setTimeout(renderSafeWithdrawal,900);
  }).catch(function(){ if(s)s.textContent='⚠️ 通信エラー'; });
}

/* ============ 現金管理：🌙 閉店チェック ============ */
/* --- 閉店チェック共通ヘルパ（4袋モデル・Kiosk2と同一契約） --- */
var CASH_BAGS=[{k:'f5',label:'5Fレジ',color:'#8fb8ff'},{k:'f2',label:'2Fレジ',color:'#6fd6b0'},{k:'keihi',label:'経費袋',color:'#e0a060'},{k:'safe',label:'金庫',color:'#bb99ee'}];
var CASH_TOLERANCE=1000; // 札だけ数えるため小銭ぶんのズレは±この額まで「合ってる」扱い
var SLIP_CATS=['買出し・経費','代引き','酒屋 現金仕入れ','派遣 日払い','在籍 日払い','給与 一部払い','出前','ドライバー支払い','通信光熱費支払い','立替 精算','その他'];
function newBag(){ return {m10000:0,m5000:0,m1000:0}; }
function newBags(){ var o={}; CASH_BAGS.forEach(function(b){ o[b.k]=newBag(); }); return o; }
function bagYen(o){ o=o||{}; return (o.m10000||0)*10000+(o.m5000||0)*5000+(o.m1000||0)*1000; }
function bagsYen(bags){ return CASH_BAGS.reduce(function(s,b){ return s+bagYen(bags[b.k]); },0); }
function chipsHtml(names,fn){ return (names||[]).map(function(n){ return '<div class="chip" onclick="'+fn+'(this,\''+esc(String(n).replace(/'/g,"\\'"))+'\')">'+esc(n)+'</div>'; }).join(''); }
function bagDenomInputs(bagKey,state,oninput){ var o=state[bagKey]||{}; return '<div class="ck-row" style="border:0;padding:0">'+CASH_DENOMS.map(function(d){ return '<label class="ck-denom"><span>'+d.label+'</span><input type="number" min="0" inputmode="numeric" data-b="'+bagKey+'" data-d="'+d.k+'" value="'+(o[d.k]||'')+'" oninput="'+oninput+'(this)"></label>'; }).join('')+'</div>'; }
function readSlipsFromDenpyo(dp){
  if(!dp) return [];
  var out=[];
  function pull(sec,payeeHdr,amtHdr,defCat){
    if(!sec||!sec.rows)return; var hs=sec.headers||[];
    var iP=hs.indexOf(payeeHdr), iA=hs.indexOf(amtHdr), iImg=-1;
    hs.forEach(function(hd,idx){ if(/画像|写真|URL|リンク|ドライブ/.test(String(hd))) iImg=idx; });
    sec.rows.forEach(function(r){ var c=r.cells||[]; var amt=Number(c[iA])||0; if(!amt)return;
      out.push({source:'read',category:defCat,payee:iP>=0?String(c[iP]||''):'',amount:amt,imageUrl:iImg>=0?String(c[iImg]||''):'',include:true}); });
  }
  pull(dp.daily,'受取人','伝票金額','在籍 日払い');
  pull(dp.receipt,'発行元','金額','買出し・経費');
  return out;
}
var cashState=null;
function openCashCheck(){
  closeMenu(); showSheet('🌙 閉店の現金','<div class="empty-msg">読み込み中...</div>',false);
  if(!IS_GAS){ document.getElementById('sheetBody').innerHTML='<div class="empty-msg">（ローカル）閉店チェックは本番のみ</div>'; return; }
  Promise.all([gsr('getCashCheckInit'),Promise.resolve([]),gsr('getKioskStaffList').catch(function(){return[];}),gsr('kioskGetDenpyoDay').catch(function(){return null;}),gsr('getOpeningCheckInit').catch(function(){return null;}),gsr('getKeihiStaffNames').catch(function(){return[];})]).then(function(r){
    initCashCheck(r[0],r[1]||[],r[2]||[],readSlipsFromDenpyo(r[3]),r[4],r[5]||[]);
  }).catch(function(){ var b=document.getElementById('sheetBody'); if(b)b.innerHTML='<div class="empty-msg">読み込みエラー</div>'; });
}
function initCashCheck(init,approvers,staff,readSlips,openingInit,keihiStaff){
  var openingSafe=(openingInit&&openingInit.locked&&openingInit.bags)?(Number(openingInit.bags.safe)||0):null;
  cashState={dateKey:init.dateKey,init:init,staff:staff||[],reporterName:'',cashSalesInput:0,bags:newBags(),slips:(readSlips||[]).slice(),approverName:'',approverNames:approvers||[],formMode:!init.reportSubmitted,safeMode:'manual',openingSafe:openingSafe,keihiStaff:keihiStaff||[]};
  renderCashCheck();
}
function souvenirAlert(init){ var s=init.souvenirStock||{}; var low=['2F','5F'].filter(function(f){return s[f]!==undefined&&s[f]<=50;}); if(!low.length)return ''; return '<div class="ck-banner warn">🎁 おみやげ発注アラーム　'+low.map(function(f){return f+' 残り'+s[f]+'個';}).join(' / ')+' → 発注してください</div>'; }
function ccRep(el,n){ el.parentElement.querySelectorAll('.chip').forEach(function(c){c.classList.remove('sel');}); el.classList.add('sel'); cashState.reporterName=n; }
function ccBagCard(bag){
  var o=cashState.bags[bag.k];
  var head='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="width:11px;height:11px;border-radius:3px;background:'+bag.color+'"></span><span style="font-weight:700;color:var(--txt)">'+bag.label+'</span><span id="cc-sub-'+bag.k+'" style="margin-left:auto;font-weight:700;color:var(--txt)">¥'+bagYen(o).toLocaleString()+'</span></div>';
  var body;
  if(bag.k==='safe'){
    var os=cashState.openingSafe, hasOpen=os!=null, auto=cashState.safeMode==='auto';
    var seg=hasOpen?('<div class="safe-seg"><button class="'+(!auto?'on':'')+'" onclick="ccSafeMode(\'manual\')">数える</button>'
      +'<button class="'+(auto?'on':'')+'" onclick="ccSafeMode(\'auto\')">確認しない（開店の ¥'+Number(os).toLocaleString()+'）</button></div>'):'';
    if(auto&&hasOpen){ body=seg+'<div class="safe-auto-note">🔒 金庫を開けられないため <b>開店時の ¥'+Number(os).toLocaleString()+'</b> をそのまま使用します（金庫は未確認）</div>'; }
    else { body=seg+bagDenomInputs(bag.k,cashState.bags,'ccBagInput'); }
  }else{
    body=bagDenomInputs(bag.k,cashState.bags,'ccBagInput');
  }
  return '<div style="border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:10px">'+head+body+'</div>';
}
function ccBagInput(inp){ cashState.bags[inp.dataset.b][inp.dataset.d]=Number(inp.value)||0; ccRefresh(); }
function ccSafeMode(m){
  cashState.safeMode=m;
  cashState.bags.safe=(m==='auto')?safeDecompose(cashState.openingSafe):newBag();
  var w=document.getElementById('cc-bags'); if(w) w.innerHTML=CASH_BAGS.map(ccBagCard).join('');
  ccRefresh();
}
function ccCalc(){
  var st=cashState, init=st.init;
  var slipTotal=st.slips.reduce(function(s,x){ return s+((x.include!==false&&x.amount>0)?Number(x.amount):0); },0);
  var start=Number(init.openingTotal||0), sales=Number(st.cashSalesInput||0);
  var expected=start+sales-slipTotal, actual=bagsYen(st.bags), diff=expected-actual;
  return {start:start,sales:sales,slipTotal:slipTotal,expected:expected,actual:actual,diff:diff,within:Math.abs(diff)<=CASH_TOLERANCE,openingSubmitted:!!init.openingSubmitted};
}
function ccDiagHtml(){
  return '<div style="background:rgba(224,80,80,.12);border-radius:10px;padding:10px 12px;margin-top:8px">'
    +'<div style="font-size:12px;color:#ff9a9a;margin-bottom:6px">よくある原因、確認して👇</div>'
    +['運転手さんの日払い、入れた?','キャストの日払い、全員分ある?','経費レシート、撮り忘れてない?','もう一度数えてみる'].map(function(t){return '<label style="display:flex;gap:7px;align-items:center;font-size:13px;color:var(--txt);padding:3px 0"><input type="checkbox"> '+esc(t)+'</label>';}).join('')
    +'</div>';
}
function ccFlowRow(l,v,c){ return '<div class="cc-flow-row"><span style="color:#889">'+l+'</span><span style="color:'+(c||'#ccc')+'">'+v+'</span></div>'; }
function ccFlowHtml(v,withDiag){
  var h='<div class="cc-flow">';
  h+=ccFlowRow('🌅 今夜のスタート','¥'+v.start.toLocaleString(),'#cfe0ff');
  if(v.sales>0) h+=ccFlowRow('＋ 現金売上','¥'+v.sales.toLocaleString(),'#7be0a8');
  if(v.slipTotal>0) h+=ccFlowRow('－ 伝票 出金','¥'+v.slipTotal.toLocaleString(),'#e0a060');
  h+='<div class="cc-flow-row total"><span>＝ 残るはず</span><span>¥'+v.expected.toLocaleString()+'</span></div>';
  h+=ccFlowRow('実際に数えた（4袋）','¥'+v.actual.toLocaleString(),'#ccc');
  h+='</div>';
  if(!v.openingSubmitted) return h+'<div class="ck-banner warn">🔶 開店の現金が未提出（残るはずが出せません）</div>';
  var ok=v.within, msg=ok?'✅ 合ってます（差額 ¥'+Math.abs(v.diff).toLocaleString()+'・許容内）':(v.diff>0?'⚠️ ¥'+Math.abs(v.diff).toLocaleString()+' 足りません':'⚠️ ¥'+Math.abs(v.diff).toLocaleString()+' 多いです');
  h+='<div class="ck-banner '+(ok?'ok':'ng')+'">'+msg+'</div>';
  if(!ok&&withDiag) h+=ccDiagHtml();
  return h;
}
function ccRefresh(){
  CASH_BAGS.forEach(function(bg){ var el=document.getElementById('cc-sub-'+bg.k); if(el) el.textContent='¥'+bagYen(cashState.bags[bg.k]).toLocaleString(); });
  var r=document.getElementById('cc-recon'); if(r) r.innerHTML=ccFlowHtml(ccCalc(),true);
}
function renderCashCheck(){
  var b=document.getElementById('sheetBody'); if(!b)return; var st=cashState, init=st.init;
  if(!st.formMode && init.reportSubmitted){ b.innerHTML=cashResultHtml(init); return; }
  var h=souvenirAlert(init)+'<div class="ck-note">対象日 '+esc(init.dateKey)+'</div>';
  if(!init.openingSubmitted) h+='<div class="ck-banner warn">🔶 開店の現金が未提出です（残るはずが計算できません）</div>';
  else h+='<div class="cc-info"><div>🌅 今夜のスタート　¥'+Number(init.openingTotal||0).toLocaleString()+'</div></div>';
  h+='<div class="flabel">報告者（黒服）</div><div class="chips">'+chipsHtml(st.staff,'ccRep')+'</div>';
  h+='<div class="flabel">現金売上（数字ひとつ）</div><input class="finput" type="number" inputmode="numeric" min="0" placeholder="0" style="text-align:right" value="'+(st.cashSalesInput||'')+'" oninput="cashState.cashSalesInput=Number(this.value)||0;ccRefresh()">';
  h+='<div id="cc-slips"></div>';
  h+='<div class="flabel">閉店時の現金を数える（4袋・紙幣の枚数）</div><div id="cc-bags">'+CASH_BAGS.map(ccBagCard).join('')+'</div>';
  h+='<div class="flabel">現金の流れ（自動照合）</div><div id="cc-recon"></div>';
  h+='<div id="cc-status" style="font-size:12px;color:#8a9ac0;text-align:center;margin-top:8px"></div><div class="savebtn" onclick="submitCash()">閉店チェックを送信</div>';
  b.innerHTML=h; ccRenderSlips(); ccRefresh();
}
function slipCatSelect(i){ var s=cashState.slips[i]; return '<select onchange="cashState.slips['+i+'].category=this.value;ccRenderSlips();ccRefresh()">'+SLIP_CATS.map(function(c){return '<option'+(s.category===c?' selected':'')+'>'+esc(c)+'</option>';}).join('')+'</select>'; }
function ccAddSlip(){ cashState.slips.push({source:'manual',category:'買出し・経費',payee:'',amount:0,include:true,photoBase64:'',mime:'',previewUrl:''}); ccRenderSlips(); ccRefresh(); }
function ccRenderSlips(){
  var w=document.getElementById('cc-slips'); if(!w)return;

function ccPhoto(idx,file){
  var canvas=document.createElement('canvas'),ctx=canvas.getContext('2d'),img=new Image(),reader=new FileReader();
  reader.onload=function(e){ img.onload=function(){ var MAX=1000,w=img.width,h=img.height; if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} } canvas.width=w;canvas.height=h;ctx.drawImage(img,0,0,w,h); var du=canvas.toDataURL('image/jpeg',0.75); var s=cashState.slips[idx]; if(!s)return; s.photoBase64=du.split(',')[1]; s.mime='image/jpeg'; s.previewUrl=du; ccRenderSlips(); }; img.src=e.target.result; };
  reader.readAsDataURL(file);
}

function svDelta_(n){ n=Number(n)||0; return (n>0?'+'+n:''+n); }
function souvenirLogHtml(d){
  if(!d.hasData){
    return '<div class="empty-msg">まだ推移データがありません。<br><span style="font-size:12px;color:var(--sub)">この機能を入れた日から、退店の自動減算・補充・実数セットが記録され、ここに貯まっていきます。</span></div>';
  }
  var daily=d.daily||[], entries=d.entries||[];
  var head='<div style="font-size:12px;color:var(--sub);margin-bottom:10px;font-weight:700">直近'+(d.days||30)+'日・日別サマリ（減った数／補充数／その日の最終残数）</div>';
  var rows=daily.map(function(day){
    function fcell(f){ var c=day.f[f]||{consumed:0,added:0,last:null};
      var last=(c.last==null)?'—':c.last+'個';
      var low=(c.last!=null&&c.last<=50);
      return '<div class="svl-fl"><span class="svl-flname">'+f+'</span>'
        +'<span class="svl-consumed">−'+c.consumed+'</span>'
        +(c.added?'<span class="svl-added">+'+c.added+'</span>':'')
        +'<span class="svl-last'+(low?' low':'')+'">残'+last+'</span></div>';
    }
    return '<div class="svl-day"><div class="svl-date">'+esc(day.date)+'</div><div class="svl-flrow">'+fcell('2F')+fcell('5F')+'</div></div>';
  }).join('');
  var detail='<div style="font-size:12px;color:var(--sub);margin:16px 0 8px;font-weight:700">明細（新しい順）</div>'
    +entries.slice(0,60).map(function(e){
      var sign=e.delta<0?'minus':(e.delta>0?'plus':'zero');
      return '<div class="svl-ent"><span class="svl-ent-ts">'+esc(e.ts)+'</span>'
        +'<span class="svl-ent-fl">'+esc(e.floor)+'</span>'
        +'<span class="svl-ent-kind">'+esc(e.kind)+'</span>'
        +'<span class="svl-ent-d '+sign+'">'+svDelta_(e.delta)+'</span>'
        +'<span class="svl-ent-after">→'+e.after+'個</span></div>';
    }).join('');
  return head+'<div class="svl-days">'+rows+'</div>'+detail;
}

  if(!items.length) return '<span class="empty-msg" style="padding:0;font-size:12px">なし</span>';
  return items.map(function(it){
    return '<div class="stk-undel-row"><span><span class="stk-floor">['+esc(it.floor)+']</span> '+esc(it.name)+(it.qty?' ×'+esc(it.qty):'')+'</span><button class="stk-deliver" onclick="stkDelivered('+it.rowIdx+')">納品✓</button></div>';
  }).join('');
}
function stkCat(c){stockState.category=c;renderStock();}
function stkFloor(f){stockState.floor=f;renderStock();}
function stkListView(){
  var st=stockState,q=((document.getElementById('stk-search')||{}).value||'').trim();
  var combined=(st.floor==='合算');
  var items;
  if(q) items=st.list.filter(function(i){return i.name.indexOf(q)>=0;});
  else if(combined) items=st.list.filter(function(i){return i.category===st.category;});
  else items=st.list.filter(function(i){return i.category===st.category&&i.floor===st.floor;});
  // 名刺は実数ではなく感覚3段階なので専用描画（+/-の数値カードは使わない）。
  // 判定が2F+5Fの合計なのでフロア絞り込み中でも必ず両フロアを見せる＝itemsを取り直す
  var meishi=(st.category==='名刺'&&!q);
  if(meishi) items=st.list.filter(function(i){return i.category==='名刺';});
  // ボトルは店舗メニューの分類（WHISKEY/焼酎/CHAMPAGNE/WINE…）で仕分ける
  var bottle=(st.category===STK_MENU_CAT&&!q&&!meishi);
  var el=document.getElementById('stk-list');
  if(el)el.innerHTML=meishi?stkRowsMeishi(items):(bottle?stkRowsBottle(items,combined):(combined?stkRowsCombined(items):stkRows(items,!!q)));
  var cnt=document.getElementById('stk-count');
  if(cnt){ if(combined){ var nm={}; items.forEach(function(i){nm[i.name]=1;}); cnt.textContent=Object.keys(nm).length+'品（合算）'; } else cnt.textContent=items.length+'品'+(q?'（検索）':''); }
}
/* ===== ボトル＝店舗メニューの分類で仕分ける =====
   ⚠️これは在庫のカテゴリ(STOCK_CATS)とは別物。在庫側のカテゴリは「ボトル」のまま＝左ナビは触らない。
      在庫のカテゴリを分類で置き換えると、在庫画面のタブが壊れる（名簿の休職中と同じ地雷）。
   ⚠️メニュー落ちの**切替は出さない**（ボス指示＝コンソールのみ）。バッジは出す＝現場が理由を知れる。
      黒服が触れるのは紐づけだけ。落とす判断は管理者、現物と品名を知っているのは黒服、という分担。 */
var STK_MENU_CAT='ボトル', STK_OFFMENU='メニュー外';
function stkMenuOf(name){ return ((stockState.menu||{}).byStock||{})[name]||null; }
/* メニュー紐づけのプルダウン。⚠️品名をonclick属性に埋めない（gunshiにjstrが無い＝クォート入りの品名で壊れる）。
   行番号だけ渡して品名はstockStateから引く。 */
function stkMenuSel(rowIdx,name){
  var ml=stockState.menu||{menu:[]}, cur=stkMenuOf(name);
  var opts='<option value="0">（メニュー未紐づけ）</option>'+(ml.menu||[]).map(function(m){
    var taken=m.stockName&&m.stockName!==name;   // 他の在庫が既に押さえている＝選ぶと付け替えになる
    var lbl=(m.category?'['+m.category+'] ':'')+m.name+(m.status===STK_SUPPLY_STOP?' ⏸メニュー落ち':'')+(taken?'（今: '+m.stockName+'）':'');
    return '<option value="'+m.rowIdx+'"'+(cur&&cur.rowIdx===m.rowIdx?' selected':'')+'>'+esc(lbl)+'</option>';
  }).join('');
  return '<div class="stk-mrow"><span class="stk-mlbl">メニュー</span><select class="stk-msel" onchange="stkLinkMenu('+rowIdx+',this.value)">'+opts+'</select></div>';
}
function stkRowsBottle(items,combined){
  if(!items.length) return '<div class="empty-msg" style="padding:24px 0;font-size:13px">品目がありません</div>';
  var ml=stockState.menu||{catOrder:[]};
  var g={},order=[];
  (ml.catOrder||[]).forEach(function(c){ g[c]=[]; order.push(c); });   // 紙のメニューの並び順を保つ（50音順にすると探せない）
  items.forEach(function(it){
    var m=stkMenuOf(it.name), c=(m&&m.category)?m.category:STK_OFFMENU;
    if(!g[c]){g[c]=[];order.push(c);}
    g[c].push(it);
  });
  order.push(order.splice(order.indexOf(STK_OFFMENU),1)[0]); // メニュー外は最後
  return order.filter(function(c){return g[c]&&g[c].length;}).map(function(c){
    var list=g[c], names={};
    list.forEach(function(i){names[i.name]=1;});
    var n=combined?Object.keys(names).length:list.length;
    var stop=list.filter(function(i){return i.supplyStatus===STK_SUPPLY_STOP;}).length;
    return '<details class="stk-mcat" open><summary>'+esc(c)+'<span class="stk-mcnt">'+n+'品</span>'
      +(stop?'<span class="stk-mcnt off">メニュー落ち '+(combined?Object.keys(list.filter(function(i){return i.supplyStatus===STK_SUPPLY_STOP;}).reduce(function(a,i){a[i.name]=1;return a;},{})).length:stop)+'</span>':'')
      +(c===STK_OFFMENU?'<span class="stk-mwarn">メニューに無い＝紐づけてください</span>':'')
      +'</summary>'+(combined?stkRowsCombined(list):stkRows(list,false))+'</details>';
  }).join('');
}
function stkLinkMenu(rowIdx,menuRowIdx){
  var it=stockState.list.filter(function(i){return i.rowIdx===Number(rowIdx);})[0]; if(!it)return;
  var mi=(((stockState.menu||{}).menu)||[]).filter(function(m){return m.rowIdx===Number(menuRowIdx);})[0];
  // ⚠️確認は必ず1回にまとめる。2連発にすると読まずに押されて警告が死ぬ（席の定員で学んだ）
  var w=[];
  if(mi&&mi.stockName&&mi.stockName!==it.name) w.push('・「'+mi.name+'」は今「'+mi.stockName+'」に紐づいています。付け替えると '+mi.stockName+' は未紐づけに戻ります');
  if(mi&&mi.status===STK_SUPPLY_STOP) w.push('・「'+mi.name+'」はメニュー落ちです。紐づけると「'+it.name+'」も今後は仕入れなくなります（在庫は残ります）');
  if(w.length&&!confirm('「'+it.name+'」を「'+mi.name+'」に紐づけます。\n\n'+w.join('\n')+'\n\nよろしいですか？')){ openStockManager(); return; }
  gsr('gunshiSetMenuLink',it.name,Number(menuRowIdx)).then(function(r){
    if(!r||!r.ok){ alert('エラー: '+((r&&r.error)||'不明')); openStockManager(); return; }
    var msg=Number(menuRowIdx)?('「'+it.name+'」→ '+r.menuName+' に紐づけました'):('「'+it.name+'」の紐づけを外しました');
    if(r.freed&&r.freed.length)msg+='（'+r.freed.join('、')+' は未紐づけに戻しました）';
    toast(msg);
    openStockManager();
  }).catch(function(e){ alert('紐づけに失敗\n'+(e&&e.message||e)); }); // 原因を握り潰さない（GUNSHI_API_FNS漏れ等はここに出る）
}
/* 名刺ビュー: キャストごとに 2F/5F を感覚3段階で選ぶ。判定は2F+5Fの箱換算合計が1に達しているか。
   在庫数の列に入る値は箱換算（1箱以上=1 / 半分以上=0.5 / 半分以下=0.25、0=未入力）。バックエンドと一致させること。 */
var MEISHI_LV=[{v:1,t:'1箱以上'},{v:0.5,t:'半分以上'},{v:0.25,t:'半分以下'}];
function stkRowsMeishi(items){
  if(!items.length) return '<div class="empty-msg" style="padding:24px 0;font-size:13px">名刺の登録がありません。上の「👥 名簿と同期」で作成してください。</div>';
  var g={},order=[];
  items.forEach(function(it){ if(!g[it.name]){g[it.name]={};order.push(it.name);} g[it.name][it.floor]=it; });
  order.sort(function(a,b){return a.localeCompare(b,'ja');});
  return '<div class="stk-grid">'+order.map(function(nm){
    var grp=g[nm], f2=grp['2F'], f5=grp['5F'];
    var q2=f2?Number(f2.qty)||0:0, q5=f5?Number(f5.qty)||0:0;
    var done=(q2>0&&q5>0);                    // 両フロア入力済みで初めて判定できる
    var ok=done&&(q2+q5>=1);
    var badge=!done?'<span style="color:var(--dim);font-size:11px;font-weight:800">未入力</span>'
      :(ok?'<span style="color:#7be0a8;font-size:11px;font-weight:800">✅ 足りてる</span>'
          :'<span style="color:#ff8a8a;font-size:11px;font-weight:800">⚠️ 1箱に足りない</span>');
    var rows=['2F','5F'].map(function(f){
      var it=grp[f]; if(!it) return '<div class="stk-flc empty">'+f+' <span class="stk-flc-q">未登録</span></div>';
      var cur=Number(it.qty)||0;
      var btns=MEISHI_LV.map(function(l){
        var on=(cur===l.v);
        return '<button class="stk-qbtn xs" style="flex:1;padding:5px 0;font-size:11px;font-weight:800;'+(on?'background:#2a4a6a;border-color:#4a7aaa;color:#cfe8ff':'opacity:.55')+'" onclick="stkSetMeishi('+it.rowIdx+','+l.v+')">'+l.t+'</button>';
      }).join('');
      return '<div style="display:flex;align-items:center;gap:5px;margin-top:4px"><span class="stk-flc-f" style="width:22px;flex:none">'+f+'</span><div style="display:flex;gap:3px;flex:1">'+btns+'</div></div>';
    }).join('');
    return '<div class="stk-card sum'+(done&&!ok?' zero':'')+'"><div class="stk-card-top"><div class="stk-card-nm">'+esc(nm)+'</div>'+badge+'</div>'+rows+'</div>';
  }).join('')+'</div>';
}
function stkSetMeishi(rowIdx,v){
  var it=stockState.list.find(function(i){return i.rowIdx===rowIdx;});
  if(it){it.qty=v;stkListView();} // 楽観更新（サーバ確定値で上書きする）
  gsr('setMeishiLevel',rowIdx,v).then(function(res){
    if(!res||!res.ok){alert('保存に失敗\n'+((res&&res.error)||'不明'));openStockManager();return;}
    if(it){it.qty=res.qty;stkListView();}
  }).catch(function(e){alert('保存に失敗\n'+(e&&e.message||e));openStockManager();});
}
// 合算ビュー: 品名でまとめて 2F/5F/共通 の在庫と合計を表示（同じボトルが両店舗でどれだけあるか一目で分かる）
function stkRowsCombined(items){
  if(!items.length) return '<div class="empty-msg" style="padding:24px 0;font-size:13px">品目がありません</div>';
  var g={},order=[];
  items.forEach(function(it){ if(!g[it.name]){g[it.name]={floors:{},total:0,stopped:false,cat:it.category,row:it.rowIdx};order.push(it.name);} g[it.name].floors[it.floor]=it; g[it.name].total+=it.qty; if(it.supplyStatus===STK_SUPPLY_STOP)g[it.name].stopped=true; });
  order.sort(function(a,b){return a.localeCompare(b,'ja');});
  return '<div class="stk-grid">'+order.map(function(nm){
    var grp=g[nm];
    var cells=['2F','5F'].map(function(f){
      var it=grp.floors[f];
      if(!it) return '<div class="stk-flc empty">'+f+' <span class="stk-flc-q">—</span></div>';
      return '<div class="stk-flc"><span class="stk-flc-f">'+f+'</span><button class="stk-qbtn xs" onclick="stkQty('+it.rowIdx+',-1)">−</button><span class="stk-flc-q'+(it.qty===0?' z':'')+'">'+it.qty+'</span><button class="stk-qbtn xs" onclick="stkQty('+it.rowIdx+',1)">＋</button></div>';
    }).join('');
    var msel=(grp.cat===STK_MENU_CAT)?stkMenuSel(grp.row,nm):'';
    return '<div class="stk-card sum'+(grp.total===0?' zero':'')+'"><div class="stk-card-top"><div class="stk-card-nm">'+esc(nm)+stkSupplyBadge(grp.stopped)+'</div><span class="stk-sumtot">合計 <b>'+grp.total+'</b></span></div><div class="stk-flrow">'+cells+'</div>'+msel+'</div>';
  }).join('')+'</div>';
}
function stkRows(items,showMeta){
  if(!items.length) return '<div class="empty-msg" style="padding:24px 0;font-size:13px">品目がありません</div>';
  return '<div class="stk-grid">'+items.map(function(it){
    var zero=it.qty===0;
    var meta=showMeta?'<span class="stk-floor">['+esc(it.category)+'・'+esc(it.floor)+'] </span>':'';
    var drop=stkSupplyBadge(it.supplyStatus===STK_SUPPLY_STOP);
    var exp=it.expiryManaged?'<div class="stk-exp">🗓 賞味期限管理</div>':'';
    var purchase=it.expiryManaged?'<button class="stk-mini" onclick="stkPurchaseForm('+it.rowIdx+')">購入登録</button>':'';
    return '<div class="stk-card'+(zero?' zero':'')+'" id="stk-row-'+it.rowIdx+'"><div class="stk-card-top"><div class="stk-card-nm">'+meta+esc(it.name)+drop+exp+(it.category===STK_MENU_CAT?stkMenuSel(it.rowIdx,it.name):'')+'</div><button class="stk-del" onclick="stkDelete('+it.rowIdx+')">×</button></div><div class="stk-card-qty"><button class="stk-qbtn" onclick="stkQty('+it.rowIdx+',-1)">−</button><span class="stk-qtynum'+(zero?' z':'')+'">'+it.qty+'</span><button class="stk-qbtn" onclick="stkQty('+it.rowIdx+',1)">＋</button></div>'+purchase+'<div id="stk-pf-'+it.rowIdx+'"></div><div class="stk-order"><input id="stk-oq-'+it.rowIdx+'" class="finput" placeholder="発注数"><button class="stk-order-btn" onclick="stkOrder('+it.rowIdx+')">発注依頼</button></div></div>';
  }).join('')+'</div>';
}
function stkQty(rowIdx,delta){
  var it=stockState.list.find(function(i){return i.rowIdx===rowIdx;});
  if(it){it.qty=Math.max(0,it.qty+delta);stkListView();}
  gsr('changeStockQty',rowIdx,delta).then(function(res){ if(it&&res&&res.ok){it.qty=res.qty;stkListView();} }).catch(function(){});
}
function stkOrder(rowIdx){
  var it=stockState.list.find(function(i){return i.rowIdx===rowIdx;}); if(!it)return;
  var el=document.getElementById('stk-oq-'+rowIdx); var qty=el?el.value.trim():'';
  if(!qty){alert('数量を入力してください');return;}
  if(!confirm(stkSupplyWarn(it.name,it.floor)+it.name+' ×'+qty+' を発注依頼します。よろしいですか？'))return;
  gsr('addOrderDraftItem',{userId:KIOSK_USER_ID,name:it.name,floor:it.floor,qty:qty,memo:''}).then(function(res){ if(res&&res.ok){alert('発注依頼を送信しました');if(el)el.value='';}else alert('エラー: '+((res&&res.error)||'')); }).catch(function(){alert('発注依頼に失敗');});
}
/* 名刺: 名簿(SSOT)と行を同期する。新入りを追加し、名簿にいない子（退職者）の行は削除する。
   削除は不可逆（入力済みのレベルが消える）ので、何が起きるかを明記して確認を取る。 */
function stkGenMeishi(){
  if(!confirm('名刺の行を名簿と同期します。\n\n・名簿にいて未登録の子 → 2F/5Fの行を追加（未入力で作成）\n・名簿にいない子（退職者など）→ 名刺の行を削除\n・既に登録済みの子はそのまま（入力したレベルは保持）\n\n⚠️削除は取り消せません。実行しますか？'))return;
  gsr('syncMeishiRowsWithRoster').then(function(res){
    if(!res||!res.ok){alert('エラー: '+((res&&res.error)||'不明'));return;}
    var del=res.deleted||[];
    var msg=[];
    if(res.created)msg.push('追加 '+res.created+'行');
    if(del.length)msg.push('削除 '+del.length+'名（'+del.join('、')+'）');
    // 削除は黙って済ませない＝誰が消えたかは必ず見せる
    if(del.length)alert('名簿と同期しました（在籍'+res.casts+'名）\n\n'+msg.join('\n')+'\n\n削除された子は名簿で退職になっています。');
    else toast(msg.length?('名簿と同期：'+msg.join(' / ')):'変更なし（名簿と一致）');
    openStockManager();
  }).catch(function(e){alert('同期に失敗\n'+(e&&e.message||e));}); // 原因を握り潰さない（GUNSHI_API_FNS漏れ等はここに出る）
}
function stkAddNew(){
  var name=((document.getElementById('stk-new-name')||{}).value||'').trim(); if(!name){alert('品名を入力してください');return;}
  var min=((document.getElementById('stk-new-min')||{}).value||'').trim(); var exp=(document.getElementById('stk-new-exp')||{}).checked;
  var floor=((document.getElementById('stk-new-floor')||{}).value)||(stockState.floor==='合算'?'2F':stockState.floor);
  gsr('addStockItem',{name:name,category:stockState.category,floor:floor,minStock:min,expiryManaged:exp,qty:0}).then(function(res){ if(res&&res.ok)openStockManager(); else alert('エラー: '+((res&&res.error)||'')); }).catch(function(){alert('追加に失敗');});
}
function stkFreeOrder(){
  var name=((document.getElementById('stk-free-name')||{}).value||'').trim(); var qty=((document.getElementById('stk-free-qty')||{}).value||'').trim();
  if(!name){alert('品名を入力してください');return;} if(!qty){alert('数量を入力してください');return;}

  gsr('addOrderDraftItem',{userId:KIOSK_USER_ID,name:name,floor:foFloor,qty:qty,memo:''}).then(function(res){ if(res&&res.ok)openStockManager(); else alert('エラー: '+((res&&res.error)||'')); }).catch(function(){alert('発注依頼に失敗');});
}
function stkDelete(rowIdx){
  if(!confirm('この品目をマスタから削除しますか？'))return;
  stockState.list=stockState.list.filter(function(i){return i.rowIdx!==rowIdx;}); stkListView();
  gsr('deleteStockItem',rowIdx).catch(function(){});
}
function stkDelivered(rowIdx){
  if(!confirm('この発注を納品確認済みにしますか？'))return;
  stockState.undelivered=stockState.undelivered.filter(function(i){return i.rowIdx!==rowIdx;});
  var el=document.getElementById('stk-undel'); if(el)el.innerHTML=undelHtml(stockState.undelivered);
  gsr('confirmOrderDelivered',{userId:KIOSK_USER_ID,rowIdx:rowIdx}).catch(function(){});
}
function stkPurchaseForm(rowIdx){
  var el=document.getElementById('stk-pf-'+rowIdx); if(!el)return; if(el.innerHTML){el.innerHTML='';return;}
  var t=new Date(),td=t.getFullYear()+'-'+('0'+(t.getMonth()+1)).slice(-2)+'-'+('0'+t.getDate()).slice(-2);
  el.innerHTML='<div class="stk-order" style="margin-top:6px"><input type="date" id="stk-pd-'+rowIdx+'" value="'+td+'" class="finput" style="width:auto;padding:6px"><input id="stk-pq-'+rowIdx+'" class="finput" style="width:80px;padding:6px" placeholder="購入数量"><button class="stk-order-btn" style="background:#1a2a10;border-color:#447722;color:#aadd66" onclick="stkSubmitPurchase('+rowIdx+')">登録</button></div>';
}
function stkSubmitPurchase(rowIdx){
  var qty=Number((document.getElementById('stk-pq-'+rowIdx)||{}).value); var pd=(document.getElementById('stk-pd-'+rowIdx)||{}).value;
  if(!qty||qty<=0){alert('数量を入力してください');return;} if(!pd){alert('購入日を入力してください');return;}
  gsr('registerStockPurchase',{userId:KIOSK_USER_ID,rowIdx:rowIdx,qty:qty,purchaseDate:pd}).then(function(res){ if(res&&res.ok)openStockManager(); else alert('エラー: '+((res&&res.error)||'')); }).catch(function(){alert('購入登録に失敗');});
}
/* ============ 📦 棚卸し（実数登録→差異記録→在庫を実数に更新） ============ */
var stkState=null;
function openStocktake(){
  showSheet('📦 棚卸し','<div class="empty-msg">読み込み中...</div>','full');
  if(!IS_GAS){ document.getElementById('sheetBody').innerHTML='<div class="empty-msg">（ローカル）本番のみ</div>'; return; }
  gsr('getStocktakeTargets').then(function(list){
    stkState=(list||[]).map(function(it){var q=Number(it.qty)||0;return {rowIdx:it.rowIdx,name:it.name,floor:it.floor||'2F',category:it.category||'',recorded:q,actual:q};});
    renderStocktake();
  }).catch(function(){ var b=document.getElementById('sheetBody'); if(b)b.innerHTML='<div class="empty-msg">読み込みエラー</div>'; });
}
/* 棚卸しの名刺行: 実数入力の代わりに感覚3段階（値は箱換算でバックエンドと一致させること） */
function meishiLvLabel(v){ var h=MEISHI_LV.filter(function(l){return l.v===Number(v);})[0]; return h?h.t:'未入力'; }
function meishiLvBtns(id,cur){
  return MEISHI_LV.map(function(l){
    var on=(Number(cur)===l.v);
    // white-space:nowrap＝「1箱以上」が2行に折れて潰れるのを防ぐ（iPadでタップできる大きさを確保）
    return '<button class="stk-qbtn xs" style="flex:1;padding:7px 0;font-size:12px;font-weight:800;white-space:nowrap;'+(on?'background:#2a4a6a;border-color:#4a7aaa;color:#cfe8ff':'opacity:.55')+'" onclick="stkTakeMeishi('+id+','+l.v+')">'+l.t+'</button>';
  }).join('');
}
function stkTakeMeishi(id,v){
  stkState[id].actual=v;
  var box=document.getElementById('stk-lv-'+id); if(box)box.innerHTML=meishiLvBtns(id,v);
}
function stkOnInput(id,el){
  var v=Number(el.value); if(isNaN(v)||v<0){v=0;}
  stkState[id].actual=v;
  var badge=document.getElementById('stk-d-'+id); if(!badge)return;
  var d=v-stkState[id].recorded;
  badge.textContent=(d===0?'±0':(d>0?'+'+d:''+d));
  badge.className='stk-diff '+(d===0?'zero':(d>0?'plus':'minus'));
}
function renderStocktake(){
  var b=document.getElementById('sheetBody'); if(!b)return;
  if(!stkState.length){ b.innerHTML='<div class="empty-msg" style="padding:40px 0">棚卸し対象の品目がありません<br><span style="font-size:12px;color:var(--dim)">対象＝消耗品カテゴリ、名刺、または賞味期限管理品</span></div>'; return; }
  var order={'5F':0,'2F':1}, byFloor={};
  stkState.forEach(function(it,i){ it._id=i; (byFloor[it.floor]=byFloor[it.floor]||[]).push(it); });
  var floors=Object.keys(byFloor).sort(function(a,b){return (order[a]==null?9:order[a])-(order[b]==null?9:order[b]);});
  var h='<div class="dr-wrap"><div class="stk-help">各品目の<b>実数</b>を数えて入力してください（初期値＝記録在庫）。差異は棚卸しログに記録され、在庫が実数に更新されます。<br>名刺だけは実数ではなく<b>感覚の3段階</b>で選んでください。</div>';
  floors.forEach(function(f){
    h+='<div class="stk-fgroup"><div class="stk-fhead">'+esc(f)+'（'+byFloor[f].length+'品）</div>';
    byFloor[f].forEach(function(it){
      var id=it._id;
      var ctl;
      if(it.category==='名刺'){ // 実数ではなく3段階。記録値も数値ではなくラベルで見せる（0.5と出しても読めない）
        // 親(.stk-ctl)がflex-shrink:0で幅の基準が無く内容幅まで潰れるため、ここで実寸を与える
        ctl='<span class="stk-rec">記録 '+meishiLvLabel(it.recorded)+'</span><div id="stk-lv-'+id+'" style="display:flex;gap:4px;width:290px;flex:none">'+meishiLvBtns(id,it.actual)+'</div>';
      }else{
        ctl='<span class="stk-rec">記録 '+it.recorded+'</span>'
          +'<input class="finput stk-in" id="stk-in-'+id+'" type="number" min="0" inputmode="numeric" value="'+it.recorded+'" oninput="stkOnInput('+id+',this)">'
          +'<span class="stk-diff zero" id="stk-d-'+id+'">±0</span>';
      }
      h+='<div class="stk-row"><div class="stk-nm">'+esc(it.name)+(it.category?' <span class="stk-cat">'+esc(it.category)+'</span>':'')+'</div>'
        +'<div class="stk-ctl">'+ctl+'</div></div>';
    });
    h+='</div>';
  });
  h+='<div class="dr-actions"><button class="savebtn stk-apply" onclick="submitStocktakeUI()">✅ 棚卸しを確定（在庫を実数に更新）</button></div></div>';
  b.innerHTML=h;
}
function submitStocktakeUI(){
  if(!stkState||!stkState.length)return;
  var items=stkState.map(function(it){return {rowIdx:it.rowIdx,actualQty:it.actual};});
  var diffN=stkState.filter(function(it){return it.actual!==it.recorded;}).length;
  if(!confirm('棚卸しを確定します（対象 '+items.length+'品／差異 '+diffN+'品）。\n在庫が実数に更新され、黒服グループに通知されます。よろしいですか？'))return;
  var btn=document.querySelector('.stk-apply'); if(btn){btn.disabled=true;btn.textContent='送信中...';}
  gsr('submitStocktake',{userId:KIOSK_USER_ID,items:items}).then(function(res){
    if(res&&res.ok){ alert('📦 棚卸し完了：'+res.count+'件'+(res.diffCount?'（差異 '+res.diffCount+'件）':'（差異なし）')); closeSheet(); }
    else { alert('エラー: '+((res&&res.error)||'')); if(btn){btn.disabled=false;btn.textContent='✅ 棚卸しを確定（在庫を実数に更新）';} }
  }).catch(function(e){ alert('送信に失敗しました: '+((e&&e.message)||e)); if(btn){btn.disabled=false;btn.textContent='✅ 棚卸しを確定（在庫を実数に更新）';} });
}

/* ============ 🚚 納品→在庫反映（フロア振り分け＋候補マッチ） ============ */
var deliveryState=null, drItems={};
var DR_FLOORS=['5F','2F'];
function openDeliveryReflect(){
  showSheet('🚚 納品を在庫に反映','<div class="empty-msg">読み込み中...</div>','full');
  if(!IS_GAS){ document.getElementById('sheetBody').innerHTML='<div class="empty-msg">（ローカル）本番のみ</div>'; return; }
  gsr('kioskGetPendingDeliveries').then(function(r){ deliveryState=r||{slips:[],stock:[]}; drItems={}; renderDeliveryReflect(); })
    .catch(function(){ var b=document.getElementById('sheetBody'); if(b)b.innerHTML='<div class="empty-msg">読み込みエラー</div>'; });
}
/* 品名の類似マッチ（フロア指定。共通品も候補に含める） */
function drNorm(s){return String(s||'').normalize('NFKC').toLowerCase().replace(/[\s　・,、。()（）「」【】\-ー_/／\\]/g,'');}
function drBigrams(s){var a=[];if(s.length<=1){if(s)a.push(s);return a;}for(var i=0;i<s.length-1;i++)a.push(s.substr(i,2));return a;}
function drSim(a,b){a=drNorm(a);b=drNorm(b);if(!a||!b)return 0;if(a===b)return 1;if(a.indexOf(b)>=0||b.indexOf(a)>=0)return 0.92;var ga=drBigrams(a),gb=drBigrams(b),mb={},hit=0;gb.forEach(function(g){mb[g]=(mb[g]||0)+1;});ga.forEach(function(g){if(mb[g]>0){mb[g]--;hit++;}});return (ga.length+gb.length)?2*hit/(ga.length+gb.length):0;}
function drPool(floor){var st=(deliveryState&&deliveryState.stock)||[];return st.filter(function(i){return i.floor===floor;});}
function drBestMatch(name,floor){var best=null,bs=0;drPool(floor).forEach(function(it){var s=drSim(name,it.name);if(s>bs){bs=s;best=it;}});return{item:bs>=0.34?best:null,score:Math.round(bs*100)};}
function drGuessFloor(name){ // 全フロアで最も近い候補のフロアを初期値に。無ければ5F
  var st=(deliveryState&&deliveryState.stock)||[],best=null,bs=0;
  st.forEach(function(it){var s=drSim(name,it.name);if(s>bs){bs=s;best=it;}});
  return (best&&bs>=0.34&&(best.floor==='5F'||best.floor==='2F'))?best.floor:'5F';
}
function drOptions(floor,sel){
  var o='<option value="0"'+(sel===0?' selected':'')+'>― 反映しない ―</option><option value="-1"'+(sel===-1?' selected':'')+'>➕ 新規マスタ登録（'+floor+'）</option>';
  o+=drPool(floor).map(function(it){return '<option value="'+it.rowIdx+'"'+(it.rowIdx===sel?' selected':'')+'>'+esc(it.name)+' ['+esc(it.floor)+'] 在庫'+it.qty+'</option>';}).join('');
  return o;
}
function drRight(id){
  var it=drItems[id];
  var m=drBestMatch(it.name,it.floor); it.matchRowIdx=m.item?m.item.rowIdx:0;
  var conf=it.matchRowIdx?('<span class="dr-score '+(m.score>=70?'hi':(m.score>=45?'mid':'lo'))+'">候補一致 '+m.score+'%</span>'):'<span class="dr-score lo">候補なし・要選択</span>';
  var toggle='<div class="dr-floor">'+DR_FLOORS.map(function(f){return '<button class="dr-fbtn'+(f===it.floor?' sel':'')+'" onclick="drSetFloor('+id+',\''+f+'\')">'+f+'</button>';}).join('')+'</div>';
  var sel='<select class="finput dr-sel" id="dr-sel-'+id+'" onchange="drSelChange('+id+')">'+drOptions(it.floor,it.matchRowIdx)+'</select>';
  var newbox='<div class="dr-newbox" id="dr-new-'+id+'"></div>';
  var qty='<label class="dr-qtyl">加算 <input class="finput dr-qty" id="dr-qty-'+id+'" type="number" value="'+it.qty+'" min="0"></label>';
  return '<div class="dr-floorlbl">振り分け先フロア</div>'+toggle+conf+sel+newbox+qty;
}
function renderDeliveryReflect(){
  var st=deliveryState,b=document.getElementById('sheetBody'); if(!b)return;
  if(!st.slips||!st.slips.length){ b.innerHTML='<div class="empty-msg" style="padding:40px 0">未反映の納品はありません 🎉<br><span style="font-size:12px;color:var(--dim)">黒服グループに納品書を送ると、ここに一覧が出ます</span></div>'; return; }
  var h='<div class="dr-wrap">';
  st.slips.forEach(function(sl){
    var slipIds=sl.items.map(function(it){return it.deliveryRowIdx;}).join(',');
    h+='<div class="dr-slip"><div class="dr-slip-h"><span class="dr-slip-t">🚚 '+esc(sl.supplier||'仕入先不明')+' <span class="dr-slip-meta">伝票 '+esc(sl.slipNo)+(sl.date?' / '+esc(sl.date):'')+' / '+sl.items.length+'品目</span></span><button class="dr-delslip" onclick="drDeleteSlip(\''+slipIds+'\','+sl.items.length+')">🗑 伝票ごと削除</button></div>';
    sl.items.forEach(function(it){
      var id=it.deliveryRowIdx;
      if(!drItems[id]) drItems[id]={name:it.name,qty:it.qty,volume:it.volume,floor:drGuessFloor(it.name)};
      h+='<div class="dr-item"><div class="dr-item-l"><div class="dr-nm">'+esc(it.name)+(it.volume?' <span class="dr-vol">'+esc(it.volume)+'</span>':'')+'</div><div class="dr-sub">納品 '+it.qty+'本<button class="dr-delitem" onclick="drDeleteItem('+id+')">🗑 削除</button></div></div>'
        +'<div class="dr-item-r" id="dr-r-'+id+'">'+drRight(id)+'</div></div>';
    });
    h+='</div>';
  });
  h+='<div class="dr-actions"><button class="savebtn dr-apply" onclick="applyDeliveryReflect()">✅ 選択した内容で在庫に反映</button></div></div>';
  b.innerHTML=h;
}
function drSetFloor(id,floor){ if(!drItems[id])return; drItems[id].floor=floor; var el=document.getElementById('dr-r-'+id); if(el)el.innerHTML=drRight(id); }
function drSelChange(id){
  var sel=document.getElementById('dr-sel-'+id), box=document.getElementById('dr-new-'+id); if(!sel||!box)return;
  if(sel.value==='-1') box.innerHTML='<div class="dr-new"><span class="dr-newlbl">新規登録（'+drItems[id].floor+'）カテゴリ:</span><select class="finput" id="dr-nc-'+id+'">'+STOCK_CATS.map(function(c){return '<option'+(c==='ボトル'?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div>';
  else box.innerHTML='';
}
function applyDeliveryReflect(){
  var rows=[];
  Object.keys(drItems).forEach(function(id){
    var sel=document.getElementById('dr-sel-'+id); if(!sel)return;
    var mv=Number(sel.value); if(mv===0)return;
    var qty=Number((document.getElementById('dr-qty-'+id)||{}).value)||0; if(qty<=0)return;
    var row={deliveryRowIdx:Number(id),masterRowIdx:mv,qty:qty};
    if(mv===-1){ row.newCategory=(document.getElementById('dr-nc-'+id)||{}).value||'ボトル'; row.newFloor=drItems[id].floor||'2F'; }
    rows.push(row);
  });
  if(!rows.length){alert('反映する品目を1つ以上選んでください');return;}
  if(!confirm(rows.length+'品目を在庫に反映します。よろしいですか？'))return;
  var btn=document.querySelector('.dr-apply'); if(btn){btn.disabled=true;btn.textContent='反映中...';}
  gsr('kioskApplyDelivery',{rows:rows}).then(function(res){
    if(res&&res.ok){ alert('✅ '+res.applied+'品目を在庫に反映しました'+(res.created?'（新規登録 '+res.created+'件）':'')); openDeliveryReflect(); }
    else { alert('エラー: '+((res&&res.error)||'')); if(btn){btn.disabled=false;btn.textContent='✅ 選択した内容で在庫に反映';} }
  }).catch(function(){ alert('反映に失敗しました'); if(btn){btn.disabled=false;btn.textContent='✅ 選択した内容で在庫に反映';} });
}
/* 誤読・不要な納品明細を削除（在庫は変えず、納品記録から消すだけ） */
function drDeleteItem(id){
  if(!IS_GAS){ alert('（ローカル）削除は本番のみ'); return; }
  if(!confirm('この品目を納品記録から削除しますか？（在庫は変わりません／元に戻せません）'))return;
  gsr('kioskDeleteDelivery',[Number(id)]).then(function(res){
    if(res&&res.ok){ toast('🗑 削除しました'); openDeliveryReflect(); }
    else { alert('削除エラー: '+((res&&res.error)||'')); }
  }).catch(function(e){ alert('削除エラー: '+((e&&e.message)||e)); });
}
function drDeleteSlip(idsStr,n){
  if(!IS_GAS){ alert('（ローカル）削除は本番のみ'); return; }
  var ids=String(idsStr).split(',').map(Number).filter(function(x){return x>=2;});
  if(!ids.length)return;
  if(!confirm('この伝票の'+n+'品目をまとめて削除しますか？（在庫は変わりません／元に戻せません）'))return;
  gsr('kioskDeleteDelivery',ids).then(function(res){
    if(res&&res.ok){ toast('🗑 '+((res&&res.deleted)||ids.length)+'品目を削除しました'); openDeliveryReflect(); }
    else { alert('削除エラー: '+((res&&res.error)||'')); }
  }).catch(function(e){ alert('削除エラー: '+((e&&e.message)||e)); });
}

/* ============ 🧾 伝票管理（一覧・修正・削除） ============ */
var denpyoState=null;
var DP_SHEET={daily:'日払い記録',receipt:'領収書記録',delivery:'納品記録'};
var DP_FIELDS={
  daily:[['受取人','text'],['伝票金額','num'],['現金合計','num'],['但し書き','text'],['伝票日付','text']],
  receipt:[['発行元','text'],['金額','num'],['但し書き','text'],['伝票日付','text']],
  delivery:[['商品名','text'],['容量','text'],['本数','num'],['単価','num'],['金額','num']]
};
function openDenpyoManager(dateStr){
  closeMenu();
  var d=dateStr||(denpyoState&&denpyoState.date)||TODAY;
  showSheet('🧾 伝票管理','<div class="empty-msg">読み込み中...</div>','full');
  if(!IS_GAS){ document.getElementById('sheetBody').innerHTML='<div class="empty-msg">（ローカル）本番のみ</div>'; return; }
  gsr('kioskGetDenpyoDay',d).then(function(r){
    denpyoState=r||{date:d}; denpyoState.date=d;
    try { renderDenpyo(); } catch(err){ var b=document.getElementById('sheetBody'); if(b)b.innerHTML='<div class="empty-msg">描画エラー: '+esc((err&&err.message)||err)+'</div>'; }
  }).catch(function(e){ var b=document.getElementById('sheetBody'); if(b)b.innerHTML='<div class="empty-msg">通信エラー: '+esc((e&&e.message)||e)+'</div>'; });
}
function dpNav(n){ var dt=parseKey(denpyoState.date); dt.setDate(dt.getDate()+n); openDenpyoManager(fmtKey(dt)); }
function dpV(sec,cells,name){ var i=sec.headers.indexOf(name); return i>=0?(cells[i]==null?'':cells[i]):''; }
function dpImg(url){ return url?'<a href="'+esc(String(url))+'" target="_blank" class="dp-img">📷 画像</a>':''; }
function renderDenpyo(){
  var st=denpyoState,b=document.getElementById('sheetBody'); if(!b)return;
  var nav='<div class="dp-nav"><button class="dp-navbtn" onclick="dpNav(-1)">◀ 前日</button>'
    +'<div class="dp-date">'+esc(st.date)+(st.date===TODAY?' <span style="color:#7ac6ff;font-size:11px">(今日)</span>':'')+'</div>'
    +'<button class="dp-navbtn" onclick="dpNav(1)">翌日 ▶</button><button class="dp-navbtn today" onclick="openDenpyoManager(TODAY)">今日</button></div>';
  var h='<div class="dp-wrap">'+nav;
  h+=dpSectionDaily(st.daily||{headers:[],rows:[],total:0});
  h+=dpSectionReceipt(st.receipt||{headers:[],rows:[],total:0});
  h+=dpSectionDelivery(st.delivery||{headers:[],rows:[],total:0});
  h+='</div>';
  b.innerHTML=h;
}
function dpHead(icon,title,count,total){
  return '<div class="dp-sec-h"><span>'+icon+' '+title+' <span class="dp-cnt">'+count+'件</span></span>'+(total?'<span class="dp-total">計 ¥'+fmtYen(total)+'</span>':'')+'</div>';
}
function fmtYen(n){ return String(Math.round(Number(n)||0)).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function dpRowActions(type,rowIdx){ return '<div class="dp-acts"><button class="dp-edit" onclick="editDenpyo(\''+type+'\','+rowIdx+')">✏️ 修正</button><button class="dp-del" onclick="delDenpyo(\''+type+'\','+rowIdx+')">🗑</button></div>'; }
function dpSectionDaily(sec){
  var body=sec.rows.length?sec.rows.map(function(r){
    var c=r.cells, match=dpV(sec,c,'照合');
    var mcol=match==='一致'?'#7fe0a3':match==='不一致'?'#ff9a9a':'#8a9ac0';
    return '<div class="dp-card"><div class="dp-card-top"><span class="dp-nm">'+esc(dpV(sec,c,'受取人')||'（受取人不明）')+' 様</span><span class="dp-amt">¥'+fmtYen(dpV(sec,c,'伝票金額'))+'</span></div>'
      +'<div class="dp-meta">現金 ¥'+fmtYen(dpV(sec,c,'現金合計'))+(match?' <span style="color:'+mcol+';font-weight:800">'+esc(match)+'</span>':'')
      +(dpV(sec,c,'但し書き')?' ・ '+esc(dpV(sec,c,'但し書き')):'')+(dpV(sec,c,'伝票日付')?' ・ '+esc(dpV(sec,c,'伝票日付')):'')+'</div>'
      +'<div class="dp-card-b">'+dpImg(dpV(sec,c,'画像リンク'))+dpRowActions('daily',r.rowIdx)+'</div></div>';
  }).join(''):'<div class="dp-empty">この日の日払いはありません</div>';
  return '<div class="dp-sec">'+dpHead('💴','日払い',sec.rows.length,sec.total)+body+'</div>';
}
function dpSectionReceipt(sec){
  var body=sec.rows.length?sec.rows.map(function(r){
    var c=r.cells;
    return '<div class="dp-card"><div class="dp-card-top"><span class="dp-nm">'+esc(dpV(sec,c,'発行元')||'（発行元不明）')+'</span><span class="dp-amt">¥'+fmtYen(dpV(sec,c,'金額'))+'</span></div>'
      +'<div class="dp-meta">'+(dpV(sec,c,'但し書き')?esc(dpV(sec,c,'但し書き')):'')+(dpV(sec,c,'伝票日付')?' ・ '+esc(dpV(sec,c,'伝票日付')):'')+'</div>'
      +'<div class="dp-card-b">'+dpImg(dpV(sec,c,'画像リンク'))+dpRowActions('receipt',r.rowIdx)+'</div></div>';
  }).join(''):'<div class="dp-empty">この日の領収書はありません</div>';
  return '<div class="dp-sec">'+dpHead('🧾','領収書',sec.rows.length,sec.total)+body+'</div>';
}
function dpSectionDelivery(sec){
  // 伝票No＋仕入先でグループ化
  var groups={},order=[];
  sec.rows.forEach(function(r){ var c=r.cells; var key=(dpV(sec,c,'仕入先'))+'|'+(dpV(sec,c,'伝票No')); if(!groups[key]){groups[key]={supplier:dpV(sec,c,'仕入先'),slip:dpV(sec,c,'伝票No'),date:dpV(sec,c,'伝票日付'),img:dpV(sec,c,'画像リンク'),rows:[]};order.push(key);} groups[key].rows.push(r); });
  var body=order.length?order.map(function(k){ var g=groups[k];
    var lines=g.rows.map(function(r){ var c=r.cells; var refl=dpV(sec,c,'在庫反映');
      return '<div class="dp-dline"><div class="dp-dline-l"><span class="dp-dnm">'+esc(dpV(sec,c,'商品名'))+'</span> <span class="dp-dqty">×'+esc(dpV(sec,c,'本数'))+'</span>'+(refl?'<span class="dp-refl">✓在庫反映済</span>':'')+'</div><span class="dp-damt">¥'+fmtYen(dpV(sec,c,'金額'))+'</span>'+dpRowActions('delivery',r.rowIdx)+'</div>';
    }).join('');
    return '<div class="dp-dgroup"><div class="dp-dhead">🚚 '+esc(g.supplier||'仕入先不明')+' <span class="dp-dsub">伝票'+esc(g.slip)+(g.date?' / '+esc(g.date):'')+'</span>'+dpImg(g.img)+'</div>'+lines+'</div>';
  }).join(''):'<div class="dp-empty">この日の納品はありません</div>';
  return '<div class="dp-sec">'+dpHead('📦','納品',sec.rows.length,sec.total)+body+'</div>';
}
var dpEdit=null;
function editDenpyo(type,rowIdx){
  var sec=denpyoState[type]; if(!sec)return;
  var row=sec.rows.find(function(r){return r.rowIdx===rowIdx;}); if(!row)return;
  dpEdit={type:type,rowIdx:rowIdx};
  var fields=DP_FIELDS[type]||[];
  var form=fields.map(function(f){ var name=f[0],kind=f[1]; var v=dpV(sec,row.cells,name);
    return '<div class="dp-flabel">'+esc(name)+'</div><input id="dpf-'+name+'" class="finput" type="'+(kind==='num'?'number':'text')+'" value="'+esc(String(v))+'">';
  }).join('');
  var body='<div class="dp-editform">'+form+'<div class="actions" style="margin-top:16px"><div class="act pri" onclick="saveDenpyoEdit()">💾 保存</div><div class="act" onclick="openDenpyoManager()">← 戻る</div></div></div>';
  showSheet('✏️ 伝票を修正',body,false);
}
function saveDenpyoEdit(){
  if(!dpEdit)return;
  var fields=DP_FIELDS[dpEdit.type]||[]; var patch={};
  fields.forEach(function(f){ var el=document.getElementById('dpf-'+f[0]); if(el)patch[f[0]]=el.value; });
  var btn=document.querySelector('.dp-editform .act.pri'); if(btn){btn.style.pointerEvents='none';btn.textContent='保存中...';}
  gsr('kioskUpdateDenpyo',DP_SHEET[dpEdit.type],dpEdit.rowIdx,patch).then(function(res){

var OK_DEST_QUICK=['東海市','大治','助光','黒川','名古屋駅'];
function openOkuriManager(){

function okEntry(name){ return okuriState.list.filter(function(o){return o.name===name;}); }
function renderOkuri(){
  var st=okuriState,b=document.getElementById('sheetBody'); if(!b)return;

  // 上部: モード + サマリ

  top+='<div class="ok-summary">🚗 送り '+n+'名'+(drv&&n?'<span class="fare">料金目安 ¥'+Number(st.fare.yen||0).toLocaleString()+'</span>'+(st.fare.note?'<span class="sub">'+esc(st.fare.note)+'</span>':''):'')+(drv?'':'<span class="sub">自社送りモード：ドライバー通知なし</span>')+'</div></div>';
  // 確定リスト帯

  var bar='<div class="ok-list-bar"><span class="lbl">✅ 本日の送り確定リスト</span>'+chips+'</div>';
  // ツールバー: 検索 + フィルタ
  var tool='<div class="ok-toolbar"><input id="ok-search" class="finput" placeholder="🔍 スタッフ名で検索" oninput="renderOkuriGrid()"><div class="ok-filter"><button class="ok-fbtn'+(st.filter==='all'?' sel':'')+'" onclick="okFilter(\'all\')">全員</button><button class="ok-fbtn'+(st.filter==='on'?' sel':'')+'" onclick="okFilter(\'on\')">送りありのみ</button></div><span id="ok-count" style="font-size:12px;color:var(--dim);font-weight:700"></span></div>';
  b.innerHTML='<div class="ok-wrap">'+top+bar+tool+'<div class="ok-scroll"><div id="ok-grid"></div></div></div>';
  renderOkuriGrid();
}
function renderOkuriGrid(){
  var st=okuriState,q=((document.getElementById('ok-search')||{}).value||'').trim();
  var names=st.casts.slice();
  // listにいるがcastsに無い名前も拾う
  st.list.forEach(function(o){ if(names.indexOf(o.name)<0) names.push(o.name); });
  var rows=names.filter(function(nm){ if(q&&nm.indexOf(q)<0)return false; if(st.filter==='on'&&!okEntry(nm).length)return false; return true; });
  var el=document.getElementById('ok-grid');
  if(el) el.innerHTML=rows.length?('<div class="ok-grid">'+rows.map(okCard).join('')+'</div>'):'<div class="empty-msg" style="padding:24px 0;font-size:13px">該当スタッフなし</div>';

function okCard(name){
  var st=okuriState, ents=okEntry(name), on=ents.length>0, editing=st.edit===name;
  var stLine=on?ents.map(function(o){return '🚗 '+esc(o.dest||'（行き先未入力）')+' ('+(o.bin||1)+'便)';}).join('<br>'):'⚪ 自便（送りなし）';
  var h='<div class="ok-card'+(on?' on':'')+'"><div class="ok-card-nm">'+esc(name)+'</div><div class="ok-card-st '+(on?'on':'off')+'">'+stLine+'</div>';
  if(editing){
    var cur=ents[0]||{dest:'',bin:1}; var bin=st.binSel[name]||cur.bin||1;
    h+='<div class="ok-form"><input id="ok-dest-'+cssId(name)+'" class="finput" placeholder="行き先" value="'+esc(cur.dest||'')+'">';
    h+='<div class="ok-dest-quick">'+OK_DEST_QUICK.map(function(d){return '<button class="ok-dq" onclick="okQuickDest(\''+jsStr(name)+'\',\''+jsStr(d)+'\')">'+esc(d)+'</button>';}).join('')+'</div>';
    h+='<div class="ok-bin-row">'+[1,2].map(function(bn){return '<button class="ok-bin'+(bin===bn?' sel':'')+'" onclick="okBin(\''+jsStr(name)+'\','+bn+')">'+bn+'便</button>';}).join('')+'</div>';
    h+='<div class="ok-form-btns"><button class="ok-btn add" onclick="okSave(\''+jsStr(name)+'\')">保存</button><button class="ok-btn edit" onclick="okuriState.edit=null;renderOkuriGrid()">閉じる</button></div></div>';
  } else if(on){
    h+='<div class="ok-form-btns"><button class="ok-btn edit" onclick="okOpenEdit(\''+jsStr(name)+'\')">変更</button><button class="ok-btn cancel" onclick="okCancel(\''+jsStr(name)+'\')">キャンセル</button></div>';
  } else {
    h+='<button class="ok-btn add" onclick="okOpenEdit(\''+jsStr(name)+'\')">🚗 送りを追加</button>';

function cssId(s){ return String(s).replace(/[^0-9A-Za-z]/g,function(c){return 'x'+c.charCodeAt(0);}); }
function jsStr(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function okMode(mode){
  if(okuriState.mode===mode)return;
  var msg=mode==='jisha'?'自社送りモードに切替えます（ドライバーへの通知を止めます）。よろしいですか？':'ドライバー手配モードに切替えます。よろしいですか？';
  if(!confirm(msg))return;
  okuriState.mode=mode; renderOkuri();

function okFilter(f){ okuriState.filter=f; renderOkuri(); }
function okOpenEdit(name){ okuriState.edit=name; renderOkuriGrid(); }
function okBin(name,bn){ okuriState.binSel[name]=bn; renderOkuriGrid(); }
function okQuickDest(name,d){ var el=document.getElementById('ok-dest-'+cssId(name)); if(el)el.value=d; }
function okSave(name){
  var el=document.getElementById('ok-dest-'+cssId(name)); var dest=el?el.value.trim():'';
  if(!dest){alert('行き先を入力してください');return;}
  var bin=okuriState.binSel[name]||(okEntry(name)[0]||{}).bin||1;
  gsr('kioskSaveOkuriEntry',name,dest,bin).then(function(res){
    if(res&&res.ok){ okuriState.edit=null; delete okuriState.binSel[name]; openOkuriManager(); }
    else alert('エラー: '+((res&&res.error)||''));
  }).catch(function(){alert('送りの保存に失敗');});
}
function okCancel(name){
  if(!confirm(name+' さんの送りをキャンセルします。よろしいですか？'))return;
  gsr('kioskCancelOkuriEntry',name,null).then(function(res){
    if(res&&res.ok) openOkuriManager(); else alert('エラー: '+((res&&res.error)||''));
  }).catch(function(){alert('取消に失敗');});
}

/* ============ 実データ接続層（GAS本番） ============ */
/* google.script.run 代替: GAS の fetch API を叩き {__ok,data} を展開（成功で data / 失敗で reject） */
function gsr(fn){
  var a=Array.prototype.slice.call(arguments,1);
  return fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'gunshi',key:KIOSK_KEY,fn:fn,args:a})})
    .then(function(r){return r.json();})
    .then(function(j){ if(j&&j.__ok===false) throw new Error(j.error||'server error'); return j?j.data:j; });
}

/* ===== 📋 面談表（黒服が内容を見ながら面談→補足→判定） ===== */
var MENDAN_LIST=[];
/* ===== 給与シミュ（面談表の応募者データから・黒服が面談で本人に見せる。率表は本番newBackCalc_と同一） ===== */
var SIM_GENSEN=0.1021, SIM_WEEKS=4.3;
var SIM_CFG={ wage:3000, nyuten:50000, firstMonth:true, stdBairitu:1.5, lowMult:0.5, highMult:1.5 };
function simRate_(b){ return b<2?10:(b<3?15:20); }
function simOne_(tanto,jikan,ny){ tanto=Math.max(0,tanto); var b=jikan>0?tanto/jikan:0, rp=simRate_(b), nb=Math.round(tanto*rp/100), kz=jikan+nb+(ny||0), gs=Math.floor(kz*SIM_GENSEN); return {tanto:tanto,ratePct:rp,newBack:nb,kazei:kz,gensen:gs,take:kz-gs}; }
function simHours_(range){ if(!range)return 6; var p=String(range).split('-'); if(p.length<2)return 6; var f=p[0].split(':'),t=p[1].split(':'); if(f.length<2||t.length<2)return 6; var h=(+t[0]+(+t[1])/60)-(+f[0]+(+f[1])/60); if(h<=0)h+=24; return Math.round(h*10)/10; }
function buildSimHtml_(m){
  var hasExp=(m.exp==='あり'||m.exp==='少し');
  var prevSales=Number(m.prevSales)||0, prevWage=Number(m.prevWage)||0;
  var hours=simHours_(m.timeRange);
  var days=Number(m.days)|| (m.weekdays? String(m.weekdays).split('・').filter(Boolean).length : 3) || 3;
  var dpm=days*SIM_WEEKS;
  var jikan=Math.round(SIM_CFG.wage*hours*dpm);
  var ny=SIM_CFG.firstMonth?SIM_CFG.nyuten:0;
  var base=(hasExp&&prevSales>0)?prevSales:Math.round(jikan*SIM_CFG.stdBairitu);
  var tiers=[['控えめ',SIM_CFG.lowMult],['標準',1],['頑張った時',SIM_CFG.highMult]].map(function(t){ var r=simOne_(Math.round(base*t[1]),jikan,ny); r.tag=t[0]; return r; });
  var mid=tiers[1];
  var compare=(hasExp&&prevWage>0)?{prev:Math.round(prevWage*hours*dpm),our:mid.take}:null;
  var yen=function(n){return '¥'+Math.round(n).toLocaleString('ja-JP');};
  var h='<div style="margin-top:16px;border:1px solid rgba(201,164,92,.3);border-radius:12px;padding:16px;background:linear-gradient(170deg,#1c1815,#0d0b0a)">'
    +'<div style="font-size:11px;color:#a29a8e;text-align:center;letter-spacing:.1em">💰 お給料の目安（面談で本人に見せる）</div>'
    +'<div style="font-family:\'Yu Mincho\',serif;font-size:34px;text-align:center;color:#e6d2a8;line-height:1.1;margin:4px 0">'+Math.round(mid.take).toLocaleString('ja-JP')+'<span style="font-size:14px;color:#a29a8e"> 円/月</span></div>'
    +'<div style="font-size:10.5px;color:#6f685e;text-align:center;margin-bottom:12px">時給'+SIM_CFG.wage.toLocaleString()+'円 × 1日'+hours+'時間 × 月'+(Math.round(dpm*10)/10)+'日 ＋ バック'+mid.ratePct+'%（初月は祝金込み）</div>'
    +'<div style="display:flex;gap:7px">'+tiers.map(function(t){ var on=(t.tag==='標準'); return '<div style="flex:1;text-align:center;border:1px solid '+(on?'#c9a45c':'rgba(255,255,255,.1)')+';border-radius:9px;padding:9px 3px;background:'+(on?'#1a1611':'transparent')+'"><div style="font-size:9.5px;color:#a29a8e">'+t.tag+'</div><div style="font-family:\'Yu Mincho\',serif;font-size:15px;color:#e6d2a8;margin-top:2px">'+Math.round(t.take).toLocaleString('ja-JP')+'</div><div style="font-size:9px;color:#6f685e;margin-top:2px">売上'+Math.round(t.tanto/10000)+'万/'+t.ratePct+'%</div></div>'; }).join('')+'</div>';
  if(compare){ h+='<div style="text-align:center;font-size:12px;color:#c9a45c;margin-top:10px">前のお店 '+yen(compare.prev)+' → いえやす <b>'+yen(compare.our)+'</b>（月 +'+Math.round(compare.our-compare.prev).toLocaleString('ja-JP')+'円）</div>'; }
  h+='<div style="font-size:9.5px;color:#6f685e;text-align:center;margin-top:8px">※担当売上の想定にもとづく試算。保証ではありません。</div></div>';
  return h;
}

function adaptHall(data){
  data=data||{}; var raw=data.seats||[];
  var arr=raw.map(function(s){
    var isWK=(s.type==='W'||s.type==='K');
    var src=(s.occupied||isWK)?(s.casts||[]):[];
    var casts=src.map(function(c){
      var rem=c.setMins?(c.setMins-c.elapsed):0;
      return {n:c.name, mins:isWK?(c.elapsed||0):(c.setMins?rem:0), status:c.status||'ok', unlimited:!isWK&&!c.setMins, nextSeat:c.nextSeat||''};
    });
    var o={code:s.code, floor:s.floor, type:s.type, name:s.short||s.label||s.code,
      pax:(s.rsrv&&s.rsrv.pax)||casts.length||1,
      tantou:(s.rsrv&&s.rsrv.tantouCast)||'',
      casts:casts, tags:(s.tags||[]), ngList:s.ngCast||[], planList:s.planCast||[], recentLeft:s.recentLeft||{}};
    // 同居する複数組（rsrvList）。先頭組は上のcust/pax/tantouに反映済み（旧描画と非破壊）
    o.occupants=(s.rsrvList||[]).map(function(e){return {cust:e.customer||'', pax:Number(e.pax)||1, tantou:e.tantouCast||'', mem:e.memberId||'', rowIdx:e.rowIdx||0};});
    if(!isWK){
      if(s.occupied) o.cust=(s.rsrv&&s.rsrv.customer)?(s.rsrv.customer+' 様'):'ご来店';
      else if(s.rsrv&&s.rsrv.customer) o.cust=s.rsrv.customer+' 様';   // 来店済みだがキャスト未着＝担当不在で表示
      else if(s.yrsrv) o.rsv={time:s.yrsrv.time,cust:s.yrsrv.customer,tantou:s.yrsrv.tantouCast||''};
      // 来店中(または担当不在で客が席に居る)状態で後半に別の確定予約があれば「次席予約」として予告する。
      // 空席の予約は上の o.rsv（＝「予約客をこの席へ」導線）で従来通り。占有席は別フィールド o.nextRsv＝表示専用で相席化しない。
      if((s.occupied||(s.rsrv&&s.rsrv.customer))&&s.yrsrv) o.nextRsv={time:s.yrsrv.time,cust:s.yrsrv.customer,tantou:s.yrsrv.tantouCast||''};
    }
    return o;
  });
  var byCode={}; arr.forEach(function(o,i){byCode[o.code]=i;});
  var comb=data.combines||{};
  Object.keys(comb).forEach(function(pc){var pi=byCode[pc]; if(pi==null)return; (comb[pc]||[]).forEach(function(oc){var oi=byCode[oc]; if(oi==null)return; (arr[pi].mergeWith=arr[pi].mergeWith||[]).push(oi); arr[oi].mergedTo=pi;});});
  return arr;
}
function adaptRsv(list){return (list||[]).map(function(r){return {id:r.rowIdx, rowIdx:r.rowIdx, time:r.time, cust:r.customer, mem:r.memberId, pax:r.pax, table:r.table||'未定', tantou:r.tantouCast, dohan:r.dohanCast, yoyaku:r.yoyakuCast, status:r.status, note:r.youbou||'', checkInAt:r.checkInAt||null, joined:r.memberSince||'', feeDate:r.annualFeeDate||'', nextMemo:r.nextMemo||'', bottle:r.bottle||'', bottlePos:r.bottlePos||'', subCustomers:r.subCustomers||[]};});}
// 同じお客様の予約が複数テーブルに跨る場合、その席同士を1組(結合表示)にまとめる。
// 手動結合が既にある席は尊重してスキップ。キャンセル/退店済み・未定は対象外。
function applyRsvGrouping(){
  if(!SEATS||!RSV) return;
  var byCode={}; SEATS.forEach(function(o,i){byCode[o.code]=i;});
  RSV.forEach(function(r){
    if(r.status==='キャンセル'||r.status==='退店済み'||!r.table||r.table==='未定') return;
    var idxs=String(r.table).split('、').map(function(t){return byCode[tblToCode(t)];}).filter(function(x){return x!=null;});
    if(idxs.length<2) return;
    if(idxs.some(function(i){return SEATS[i].mergedTo!=null||(SEATS[i].mergeWith&&SEATS[i].mergeWith.length);})) return; // 既存結合を尊重
    var pi=idxs[0];
    idxs.slice(1).forEach(function(oi){ (SEATS[pi].mergeWith=SEATS[pi].mergeWith||[]).push(oi); SEATS[oi].mergedTo=pi; });
  });
}

function adaptShift(list){return (list||[]).map(function(s){return {name:s.name, origName:s.origName||s.name, renamed:!!s.renamed, in:s.in, out:s.out, hayaagari:s.hayaagari, okuri:!!s.okuri, okuriMode:s.okuriMode||'ドライバー', shusen:s.shusen||''};});}

/* ===== 端末時刻ズレ検知（iPadの日付戻し忘れ対策・1分ごと） =====
 * 領収書発行で端末の日付を過去に戻したまま戻し忘れると翌営業の伝票日付がズレる。
 * サーバー時刻(getServerTime)と端末時刻を毎分突合し、閾値超過で：①最上部に赤バナー②reportClockDriftで黒服LINE＋要対応チケット。解消でclearClockDrift。 */
var CLOCK_DRIFT_SEC=43200;   // この秒数以上ズレたら警告。領収書の日付戻しは「日」単位なので12時間閾値に設定＝数分〜数時間の些細なズレは無視し、日付戻し忘れ（≒1日以上前）だけ確実に捕捉
var _clockDrifted=false;
function showDriftBanner(html){
  var b=document.getElementById('clockDriftBanner');
  if(!b){ b=document.createElement('div'); b.id='clockDriftBanner';
    b.style.cssText='position:fixed;top:0;left:0;right:0;z-index:600;background:#b3132a;color:#fff;font-weight:800;font-size:15px;text-align:center;padding:10px 14px;box-shadow:0 2px 12px rgba(0,0,0,.45);font-family:-apple-system,sans-serif;line-height:1.55';
    document.body.appendChild(b); }
  b.innerHTML=html; b.style.display='block';
}
function hideDriftBanner(){ var b=document.getElementById('clockDriftBanner'); if(b)b.style.display='none'; }
function checkClockDrift(){
  if(!IS_GAS||!LOGIN)return;
  var t0=Date.now();
  gsr('getServerTime').then(function(st){
    if(!st||!st.epoch)return;
    var t1=Date.now();
    var offsetSec=Math.round(((t0+t1)/2 - st.epoch)/1000); // 端末 - サーバー（往復遅延を相殺）
    if(Math.abs(offsetSec)>=CLOCK_DRIFT_SEC){
      var behind=offsetSec<0;
      showDriftBanner('🚨 この端末の日付/時刻が'+(behind?'過去に戻っています':'進んでずれています')+'。<br>領収書の日付戻しのあとは【設定 ＞ 一般 ＞ 日付と時刻 ＞ 自動設定】をONに戻してください。');
      gsr('reportClockDrift',offsetSec,new Date().toString()).catch(function(){});
      _clockDrifted=true;
    } else {
      hideDriftBanner();
      if(_clockDrifted){ gsr('clearClockDrift').catch(function(){}); _clockDrifted=false; }
    }
  }).catch(function(){});
}

/* ログイン後の本体起動 */
function bootGunshi(){
  SEATS=[];RSV=[];ROT=[];SHIFT=[];REQUESTS=[];
  var mf=document.getElementById('modeFlag'); if(mf){mf.textContent='🟢 本番データ'; mf.style.color='#7be0a8'; mf.style.borderColor='#2a6a44'; mf.style.background='#0d2618';}
  var sess=loadKioskSession();
  if(sess){ LOGIN=sess.name; var lo=document.getElementById('loginOverlay'); if(lo)lo.style.display='none'; afterLogin(); }
  else { startLogin(); }
}
/* キー設定画面（初回 or 誤り時） */
function showKeySetup(msg){
  var lo=document.getElementById('loginOverlay'); if(lo)lo.style.display='none';
  var t=TERM==='2f'||TERM==='2F'?'2f':'5f'; window._gsTerm=t;
  document.body.insertAdjacentHTML('beforeend','<div id="gsSetup" style="position:fixed;inset:0;z-index:400;background:#0b0b12;display:flex;align-items:center;justify-content:center;padding:24px">'
    +'<div style="max-width:420px;width:100%;color:#dbe7fb;font-family:-apple-system,sans-serif">'
    +'<div style="font-size:22px;font-weight:800;margin-bottom:4px">🛡 軍師 セットアップ</div>'
    +'<div style="font-size:13px;color:#9ab4d8;margin-bottom:18px">この端末のフロアと軍師キーを設定します（1回だけ。次回からアイコン起動で全画面）。'+(msg?'<br><span style="color:#ff9a9a">'+msg+'</span>':'')+'</div>'
    +'<div style="font-size:12px;color:#8fb0d8;font-weight:700;margin-bottom:7px">フロア</div>'
    +'<div style="display:flex;gap:10px"><button id="gf5" onclick="window._gsSetF(\'5f\')" style="flex:1;padding:14px;border-radius:12px;border:1px solid #21406e;background:'+(t==='5f'?'#14335c':'#101d33')+';color:#cfe4ff;font-size:17px;font-weight:800">5F 端末</button>'
    +'<button id="gf2" onclick="window._gsSetF(\'2f\')" style="flex:1;padding:14px;border-radius:12px;border:1px solid #21406e;background:'+(t==='2f'?'#14335c':'#101d33')+';color:#cfe4ff;font-size:17px;font-weight:800">2F 端末</button></div>'
    +'<div style="font-size:12px;color:#8fb0d8;font-weight:700;margin:16px 0 7px">軍師キー</div>'
    +'<input id="gkey" type="text" autocapitalize="off" autocorrect="off" spellcheck="false" value="'+(KIOSK_KEY?String(KIOSK_KEY).replace(/"/g,"&quot;"):'')+'" placeholder="今の軍師URLの key= の後ろ" style="width:100%;box-sizing:border-box;padding:13px;border-radius:12px;border:1px solid #21406e;background:#101d33;color:#dbe7fb;font-size:16px">'
    +'<button onclick="window._gsSave()" style="width:100%;margin-top:20px;padding:15px;border-radius:12px;border:0;background:#2a63aa;color:#fff;font-size:16px;font-weight:800">保存して開く</button>'
    +'<div style="font-size:12px;color:#6a8ab0;margin-top:14px">キーはこの端末内にのみ保存されます。</div></div></div>');
}
window._gsSetF=function(t){window._gsTerm=t;var a=document.getElementById('gf5'),b=document.getElementById('gf2');if(a)a.style.background=t==='5f'?'#14335c':'#101d33';if(b)b.style.background=t==='2f'?'#14335c':'#101d33';};
window._gsSave=function(){var k=(document.getElementById('gkey').value||'').trim();if(!k){alert('軍師キーを入力してください');return;}try{localStorage.setItem('gunshi_key',k);localStorage.setItem('gunshi_term',window._gsTerm||'5f');}catch(e){}location.href=location.pathname;};
/* 初期化: キー確認 → bootstrap → 起動 */
(function initGunshi(){
  var q=new URLSearchParams(location.search);
  KIOSK_KEY=q.get('key')||(function(){try{return localStorage.getItem('gunshi_key')||'';}catch(e){return '';}})();
  var term=(q.get('term')||(function(){try{return localStorage.getItem('gunshi_term');}catch(e){return '';}})()||'5f').toLowerCase();
  TERM = term==='2f'?'2F':'5F';
  try{ if(q.get('key'))localStorage.setItem('gunshi_key',KIOSK_KEY); localStorage.setItem('gunshi_term',term); }catch(e){}
  if(!KIOSK_KEY || q.get('setup')==='1'){ showKeySetup(); return; }
  fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'gunshi',key:KIOSK_KEY,fn:'getKioskBootstrap',args:[]})})
    .then(function(r){return r.json();})
    .then(function(j){
      if(j&&j.__ok===false){ showKeySetup('キーが正しくない可能性があります'); return; }
      var d=(j&&j.data)||{}; KIOSK_USER_ID=d.kioskUserId||''; if(d.today){TODAY=d.today;curDate=d.today;}
      bootGunshi();
    })
    .catch(function(){ bootGunshi(); }); /* 通信不可でもログイン画面までは出す */
})();
</script>
</body>
</html>
