<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="IEYAS軍師">
<meta name="theme-color" content="#0b0b12">
<title>IEYAS軍師</title>
<style>
:root{
  --bg:#0b0b12; --panel:#12121f; --panel2:#161626; --line:#22223c; --line2:#2c2c48;
  --txt:#e8f0ff; --sub:#8a9ac0; --dim:#5a6a90; --accent:#ff8a2b; --accent-bg:#2a1606; --accent-line:#7a3f10; /* NERVアンバー波及(案B)：情報アクセントを温色へ。意味色 ok/warn/over は不可侵。元は #7ab0f0/#0f2040/#1a50a0 */
  --ok:#4dcc84; --ok-bg:#0a2016; --ok-line:#1f6040;
  --warn:#e6b23a; --warn-bg:#1c1400; --warn-line:#6a5000;
  --over:#ee5a5a; --over-bg:#1e0808; --over-line:#7a2020;
  --green:#66cc88; --gold:#e6b23a; --pink:#e08ad0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;overscroll-behavior:none;}
body{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* ---------- Header ---------- */
/* iPad/iPhoneのPWA全画面ではステータスバー(時計等)がヘッダーに重なるため、セーフエリア分だけ上部を下げてボタンの当たり判定を確保 */
.hdr{display:flex;align-items:center;gap:12px;padding:calc(9px + env(safe-area-inset-top)) calc(15px + env(safe-area-inset-right)) 9px calc(15px + env(safe-area-inset-left));background:linear-gradient(180deg,#16162a,#101020);border-bottom:1px solid var(--line);flex-shrink:0;}
.brand{font-size:15px;font-weight:800;letter-spacing:.5px;white-space:nowrap;}
.brand .z{color:var(--accent);}
.term-badge{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-bg);border:1px solid var(--accent-line);padding:3px 9px;border-radius:20px;white-space:nowrap;}
.datenav{display:flex;align-items:center;gap:6px;margin-left:2px;}
.dbtn{width:30px;height:30px;border-radius:9px;border:1px solid var(--line2);background:var(--panel2);color:var(--accent);font-size:16px;cursor:pointer;line-height:1;}
.dtoday{padding:5px 11px;border-radius:9px;border:1px solid var(--accent-line);background:var(--accent-bg);color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;}
.dlabel{font-size:14px;font-weight:800;min-width:110px;text-align:center;}
.spacer{flex:1;}
.clock{font-size:11px;color:var(--sub);text-align:right;line-height:1.3;white-space:nowrap;}
.clock b{color:#fff;font-size:15px;}
.who{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line2);border-radius:22px;padding:5px 6px 5px 12px;cursor:pointer;white-space:nowrap;}
.who .nm{font-size:13px;font-weight:700;}
.who .lo{font-size:10px;color:#ee7a63;background:#2a1010;border:1px solid #5a2020;border-radius:14px;padding:3px 9px;}
/* NERVアンバー波及(案B)：ヘッダー直下のハザードストライプ＋ロゴのグロー */
.hdr{position:relative;}
.hdr::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:3px;pointer-events:none;background:repeating-linear-gradient(45deg,#ff7a1a 0 10px,#0a0d12 10px 20px);opacity:.8;}
.brand .z{text-shadow:0 0 14px rgba(255,122,26,.5);}

/* ---------- Alert bar ---------- */
.alertbar{display:flex;align-items:stretch;gap:10px;padding:9px 15px;background:linear-gradient(180deg,#14101c,#0d0b14);border-bottom:1px solid var(--line);flex-shrink:0;min-height:64px;}
.alert-lead{display:flex;flex-direction:column;justify-content:center;padding-right:12px;border-right:1px solid var(--line2);flex-shrink:0;min-width:96px;}
.alert-lead .big{font-size:24px;font-weight:900;line-height:1;}
.alert-lead .cap{font-size:10px;color:var(--sub);font-weight:700;margin-top:3px;letter-spacing:.5px;}
.alert-lead.calm .big{color:var(--ok);}
.alert-lead.busy .big{color:var(--over);}
.alert-scroll{display:flex;gap:9px;overflow-x:auto;flex:1;padding-bottom:2px;align-items:center;}
.alert-scroll::-webkit-scrollbar{height:5px;}
.alert-scroll::-webkit-scrollbar-thumb{background:#2a2a48;border-radius:3px;}
.achip{flex-shrink:0;display:flex;align-items:center;gap:9px;padding:8px 13px;border-radius:11px;cursor:pointer;border:1px solid;min-width:190px;max-width:280px;}
.achip .aic{font-size:19px;line-height:1;}
.achip .atx{display:flex;flex-direction:column;gap:2px;overflow:hidden;}
.achip .amain{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.achip .asub{font-size:10px;font-weight:700;opacity:.85;white-space:nowrap;}
.achip.lv1{background:linear-gradient(180deg,#3a0f0f,#220909);border-color:#c0342e;border-left:4px solid #ff3b30;animation:apulse 1.1s ease-in-out infinite;}
.achip.lv1 .amain{color:#ffc9c9;} .achip.lv1 .asub{color:#f08a86;}
.achip.lv1 .aic{animation:aicblink 1.1s steps(1,end) infinite;}
@keyframes aicblink{0%,55%{opacity:1}56%,100%{opacity:.35}}
.achip.lv2{background:#201800;border-color:#6a5000;}
.achip.lv2 .amain{color:#ffd980;} .achip.lv2 .asub{color:#d0a848;}
.achip.lv3{background:#0c1c34;border-color:#245086;}
.achip.lv3 .amain{color:#9dc8ff;} .achip.lv3 .asub{color:#6a9cd8;}
.achip.lv4{background:#0d2018;border-color:#245a3c;}
.achip.lv4 .amain{color:#8fe0b0;} .achip.lv4 .asub{color:#5cc088;}
@keyframes apulse{0%,100%{box-shadow:0 0 0 0 rgba(255,59,48,0),0 0 0 0 rgba(255,59,48,0);}50%{box-shadow:0 0 0 3px rgba(255,59,48,.38),0 0 22px rgba(255,59,48,.45);}}
.alert-none{display:flex;align-items:center;gap:8px;color:var(--ok);font-size:14px;font-weight:700;padding-left:4px;}
/* タスクチケット・タイムライン */
.tl-scroll{display:flex;gap:8px;overflow-x:auto;flex:1;align-items:stretch;padding-bottom:2px;}
.tl-scroll::-webkit-scrollbar{height:5px;} .tl-scroll::-webkit-scrollbar-thumb{background:#2a2a48;border-radius:3px;}
.ticket{flex-shrink:0;min-width:168px;max-width:230px;border-radius:10px;border:1px solid var(--line2);background:var(--panel2);overflow:hidden;cursor:pointer;display:flex;flex-direction:column;}
.ticket:active{transform:scale(.98);}
.tk-time{font-size:10px;font-weight:800;padding:3px 9px;letter-spacing:.5px;}
.tk-body{display:flex;gap:8px;padding:6px 9px 8px;align-items:flex-start;}
.tk-ic{font-size:16px;line-height:1.15;flex-shrink:0;}
.tk-tx{display:flex;flex-direction:column;overflow:hidden;}
.tk-title{font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tk-sub{font-size:10px;font-weight:700;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--sub);}
.ticket.k-now-crit{border-color:#7a2424;animation:apulse 1.5s ease-in-out infinite;}
.ticket.k-now-crit .tk-time{background:#3a1212;color:#ff9a9a;} .ticket.k-now-crit .tk-title{color:#ffb3b3;}
.ticket.tk-blink{animation:tkblink 1s steps(1,end) infinite;}
@keyframes tkblink{0%,49%{background:#3a1010;border-color:#ff5a5a;box-shadow:0 0 0 2px rgba(255,70,70,.55);}50%,100%{background:var(--panel2);border-color:#7a2424;box-shadow:none;}}
.ticket.k-now-rot{border-color:#7a5010;} .ticket.k-now-rot .tk-time{background:#2a1e00;color:#ffcf6a;} .ticket.k-now-rot .tk-title{color:#ffd980;}
.ticket.k-soon{border-color:#5a4200;} .ticket.k-soon .tk-time{background:#201800;color:#e6c060;} .ticket.k-soon .tk-title{color:#e6c060;}
.ticket.k-todo{border-color:#7a4a1a;border-style:dashed;} .ticket.k-todo .tk-time{background:#241400;color:#ffb070;} .ticket.k-todo .tk-title{color:#ffb070;}
.ticket.k-preview{border-style:dashed;} .ticket.k-preview .tk-time{background:#0c1c34;color:#9dc8ff;} .ticket.k-preview .tk-title{color:#bcd8ff;}
.ticket.k-preview-cast{border-style:dashed;} .ticket.k-preview-cast .tk-time{background:#241428;color:#e0a0d0;} .ticket.k-preview-cast .tk-title{color:#e6b0d6;}
.ticket.k-preview-task{border-style:dashed;} .ticket.k-preview-task .tk-time{background:#102a26;color:#8fe0c0;} .ticket.k-preview-task .tk-title{color:#8fe0c0;}
/* 要対応キュー（時間タスク・呼び出し）: 押して完了 */
.ticket.k-task{border-color:#2a6a9a;} .ticket.k-task .tk-time{background:#12283a;color:#7ac6ff;} .ticket.k-task .tk-title{color:#cfe4ff;}
.ticket.k-task .tk-done{font-size:10px;font-weight:800;text-align:center;padding:3px;background:#12283a;color:#7ac6ff;border-top:1px solid #24405a;}
.ticket.k-task:active{filter:brightness(1.25);}
.ticket.k-admin{border-color:#6a4a2a;} .ticket.k-admin .tk-time{background:#2a1f10;color:#ffbf6a;} .ticket.k-admin .tk-title{color:#ffd9a0;} .ticket.k-admin .tk-done{background:#2a1f10;color:#ffbf6a;border-top-color:#4a3520;}
/* タスク詳細ポップアップ */
.tdetail{padding:6px 2px 4px;}
.td-title{font-size:18px;font-weight:800;line-height:1.5;color:var(--txt);margin-bottom:12px;word-break:break-word;white-space:pre-wrap;}
.td-memo{font-size:14px;line-height:1.65;color:var(--sub);background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:12px;word-break:break-word;}
.td-meta{font-size:12px;color:var(--dim);font-weight:700;margin-bottom:18px;}
.td-actions{display:flex;gap:10px;}
.td-done{flex:1;padding:13px;border-radius:11px;border:1px solid #2f7a4a;background:#12331f;color:#7ee0a0;font-weight:800;font-size:15px;cursor:pointer;}
.td-close{padding:13px 20px;border-radius:11px;border:1px solid var(--line2);background:var(--panel2);color:var(--sub);font-weight:700;font-size:15px;cursor:pointer;}

/* ---------- Dashboard split ---------- */
.dash{flex:1;display:flex;gap:10px;padding:10px 12px;min-height:0;}
.col{background:var(--panel);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;min-height:0;}
/* ⚠️ホールを太らせたぶんだけ予約が痩せる。予約はmin-width:330で自分を守る＝狭い端末では
 *   ホール側が譲る（1024幅のiPadだとここが効いてホールは約650px）。数字を上げすぎない。 */
.col-hall{flex:2;}
.col-rsv{flex:1;min-width:330px;}
.col-hd{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);flex-shrink:0;}
.col-hd .ttl{font-size:14px;font-weight:800;}
.col-hd .cnt{font-size:11px;color:var(--sub);font-weight:700;}
.col-hd .mini-btn{font-size:12px;font-weight:700;padding:6px 11px;border-radius:9px;border:1px solid var(--line2);background:var(--panel2);color:var(--accent);cursor:pointer;}
.col-hd .mini-btn.add{background:#0d2016;border-color:#25603e;color:var(--ok);}
.col-scroll{flex:1;overflow-y:auto;padding:12px 13px 16px;min-height:0;}
/* 見取り図は面積がそのまま文字の大きさになる＝ホール側だけ外周を削る（予約カードは従来の余白のまま） */
.col-hall>.col-scroll{padding:8px 8px 10px;}

/* ---------- Hall (seats) ---------- */
.floors{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.floor .floor-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;padding:0 2px;}
.floor .fl{font-size:14px;font-weight:800;letter-spacing:1px;}
.floor .meta{font-size:10px;color:var(--sub);}
.grp-lbl{font-size:10px;color:var(--dim);font-weight:700;letter-spacing:.5px;margin:8px 2px 5px;}
.seatgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.seatgrid.box{grid-template-columns:1fr;}
/* ---------- 見取り図（マップ表示・2F/5Fを横並びで同時表示） ---------- */
/* ⚠️縦横比はJS側(MAP_W/MAP_H)がインラインで入れる＝ここに数字を焼かない（切り抜きを変えると黙ってズレる） */
.hall-map{position:relative;width:100%;background:var(--panel2);border:1px solid var(--line2);border-radius:10px;overflow:hidden;}
.hall-map .seatpos{position:absolute;}
/* マップのセルはmapSeatCell_が描く＝一覧のseatHtmlは入らない（クリック契約と状態クラスだけ共通）。
 * ボトル情報・会員番号・予約メタは出さない＝枠に入らない。詳細はタップで開く。 */
.hall-map .seatpos>.seat{width:100%;height:100%;min-height:0;border-radius:7px;}
/* キャストのチップは1行固定＝折り返して切れるのを防ぐ（残り時間は残す＝現場が一番見る数字）。
 * 切り抜きで枠が広がったぶんは文字に回す＝キャスト名と残り時間はマップの主役の一つ */
.hall-map .castchip{font-size:12px;padding:0 5px 0 1px;gap:4px;flex-wrap:nowrap;white-space:nowrap;max-width:100%;}
.hall-map .castchip .ava{width:17px;height:17px;font-size:10px;line-height:17px;flex:none;}
.hall-map .castchip .cn{overflow:hidden;text-overflow:ellipsis;}
.hall-map .castchip .tm{font-size:12px;flex:none;}
.hall-map .castchip .role{font-size:9px;padding:0 3px;flex:none;}
/* ---- マップのセル（カウンター=2段 / ボックス=3段） ----
   ⚠️文字を上げる時は必ず実測で追う＝段+gap+paddingが枠の高さ(カウンター約56px・ボックス100〜150px)を
     超えると黙って切れる。過去に一覧の部品を流用して46px溢れ、キャストが消えていた。 */
.hall-map .seat.mini{display:flex;flex-direction:column;justify-content:center;gap:3px;padding:3px 6px;}
.hall-map .seat.box{display:flex;flex-direction:column;justify-content:flex-start;gap:2px;padding:4px 6px;}
/* キャストのチップ置き場。入り切らないぶんは下から隠れる＝席名と客名は必ず残る（隠れた数は markMapOverflow_ が+Nで出す）。
 * デフォルメでボックスが横に広がった（2F-B1は368px）＝縦積みだと右がまるごと余る。横に並べて折り返す:
 * 広い席は1行に2〜3人・狭い席(5Fボックス180px/2F-B3 140px)はチップが入らず自動で1人1行に落ちる＝1本で両対応。
 * ⚠️チップは縮ませない(flex:0 0 auto)＝縮むと先に消えるのはキャスト名。入らないなら折り返させる。 */
.mini-r3{display:flex;flex-direction:row;flex-wrap:wrap;align-items:flex-start;align-content:flex-start;
  gap:2px 4px;flex:1;min-height:0;overflow:hidden;}
.mini-r3 .castchip{margin:0;flex:0 0 auto;}
.mini-sub{font-size:11px;font-weight:700;color:var(--sub);}
/* 客に付くフラグ＝席名の右（客名の行には置かない）。記号だけ＝1行に収める。
 * ⚠️shrinkを効かせて席名より先に欠けさせる＝枠が足りない時に削るのはフラグ、席名と客名は死守。
 *   欠けたフラグは「まだ何かある」の合図として読める＝タップで詳細に出る。 */
.mflags{display:inline-flex;align-items:center;gap:2px;flex:0 1 auto;min-width:0;overflow:hidden;margin-right:auto;}
.mflag{font-size:10px;font-weight:800;line-height:15px;padding:0 3px;border-radius:5px;cursor:default;flex:none;}
.mflag.f-vip{background:#2a1030;color:#e79ad6;border:1px solid #6a2a70;}
.mflag.f-bottle{background:#12240f;border:1px solid #356020;}
.mflag.f-bday{background:#151046;border:1px solid #4436a8;}
.mflag.f-ng{background:#2a0e0e;color:#f08080;border:1px solid #7a2828;}
.mflag.f-req{background:#20203a;color:#9aa8c8;border:1px solid var(--line2);cursor:pointer;}
.mflag.f-req.un{background:#2a1600;color:#ffb060;border-color:#7a4a10;animation:apulse 1.6s ease-in-out infinite;}
.mflag.f-next{background:#3a2a12;color:#ffc98a;border:1px solid #7a5a2a;}
.mini-r1{display:flex;align-items:center;justify-content:space-between;gap:4px;line-height:1.15;min-width:0;}
/* 席名は縮まない＝削っていいのはフラグだけ。極端に長い結合名（カウ1＋2＋3）だけ62%で省略する */
.mini-r1 b{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:none;max-width:62%;}
.mini-t{font-size:12px;font-weight:800;color:#4dcc84;flex:none;}
.mini-t.over{color:#ff8a8a;} .mini-t.warn{color:#e6b23a;} .mini-t.rsv{color:#9dc8ff;}
.mini-r2{display:flex;align-items:center;gap:4px;line-height:1.15;min-width:0;}
.mini-av{width:19px;height:19px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#0b0b12;font-style:normal;}
/* 客名＝黒服が一番遠くから読む行。席名より一段大きく、白寄りで抜く。
 * ⚠️この行に他の要素を足さない＝削れるのは必ず客名の側になる（デフォルメで幅は増えたが、
 *   狭い席=5Fカウ6の110pxが下限。ここが入る前提で足すかを決める） */
.mini-c{font-size:15px;font-weight:700;color:#eaf2ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-c.rsv{color:#bcd8ff;font-weight:600;}
.mini-e{font-size:13px;color:var(--dim);}
.mini-p{font-size:11px;font-weight:800;color:var(--sub);flex:none;}
/* 帯になったカウンターの2段目に置くキャストのチップ。⚠️客名より先にここを削る＝客名は死守 */
.hall-map .seat.mini .mini-cc{display:flex;align-items:center;gap:4px;flex:0 1 auto;min-width:0;overflow:hidden;}
/* 狭い席（5Fカウ6＝角）だけ一段落とす＝1024px幅のiPadで客名が削れるのを防ぐ */
.hall-map .seatpos.nw .mini-c{font-size:13px;}
.hall-map .seatpos.nw .mini-r1 b{font-size:13px;}
.hall-map .seatpos.nw .mini-av{width:17px;height:17px;font-size:10px;}
/* 待機・黒服の帯（座標を持たない＝物理席ではない）。1フロア約300pxなので1列で積む */
.map-side{display:grid;grid-template-columns:1fr;gap:6px;margin-top:8px;}
.hall-vtgl{display:inline-flex;gap:3px;margin-left:8px;}
.hall-vtgl b{padding:3px 9px;border-radius:7px;border:1px solid var(--line2);background:var(--panel2);color:var(--sub);font-size:11px;font-weight:700;cursor:pointer;}
.hall-vtgl b.on{background:#0f2040;border-color:#1a50a0;color:#7ab0f0;}
.seat{border-radius:10px;border:1px solid var(--line2);background:var(--panel2);padding:8px 9px;min-height:70px;cursor:pointer;position:relative;overflow:hidden;transition:.1s;}
.seat:active{transform:scale(.985);}
.seat .st{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.seat .snm{font-size:11px;font-weight:800;color:#c8d4ee;}
.seat .pax{font-size:10px;color:var(--dim);}
.seat .cust{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.seat .seat-info{font-size:10px;color:#9ab0d0;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
/* 客名の下の「予約キャスト・担当キャスト」ラベル（在席とは別の情報） */
.seat .sctx-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
.seat .sctx{font-size:9px;font-weight:800;padding:1px 6px;border-radius:7px;white-space:nowrap;}
.seat .sctx.y{background:#0a1e2e;border:1px solid #2a5a7a;color:#7ab0f0;}
.seat .sctx.t{background:#1e1030;border:1px solid #5a3a8a;color:#c69ae0;}
.seat .sctx-away{color:#e0a860;font-weight:700;}
.seat .seat-info .bp{color:#8fd06a;margin-left:3px;}
.seat .seat-info .dot{color:#44506a;margin:0 3px;}
.seat.waiting{background:#0e1220;border-color:#243a5a;}
.seat.waiting .snm{color:#99aacc;}
.seat.kurofuku{background:#131313;border-color:#2e2e2e;}
.seat.kurofuku .snm{color:#bbb;}
.seat .casts{margin-top:3px;display:flex;flex-direction:column;gap:2px;}
.seat .crow{display:flex;align-items:center;justify-content:space-between;font-size:11px;}
.seat .cnm{color:#cfe0ff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.seat .cmin{font-variant-numeric:tabular-nums;font-weight:800;font-size:11px;padding:0 6px;border-radius:6px;margin-left:6px;white-space:nowrap;}
.seat .empty{font-size:13px;color:var(--dim);display:flex;align-items:center;height:42px;}
.seat .tags{display:flex;flex-wrap:wrap;gap:3px;margin:1px 0;}
.tg{font-size:9px;font-weight:800;padding:1px 6px;border-radius:5px;}
.tg.vip{background:#2a1030;color:#e79ad6;border:1px solid #6a2a70;}
.tg.bottle{background:#12240f;color:#8fd06a;border:1px solid #356020;}
.tg.bday{background:#151046;color:#9d90ee;border:1px solid #4436a8;}
.tg.ng{background:#2a0e0e;color:#f08080;border:1px solid #7a2828;}
.seat .rsvline{margin-top:4px;font-size:10px;color:#ffcc55;background:#1a1400;border:1px solid #4a3800;border-radius:6px;padding:2px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.req-badge{font-size:9px;font-weight:800;padding:1px 6px;border-radius:5px;background:#20203a;color:#9aa8c8;border:1px solid var(--line2);cursor:pointer;}
.req-badge.un{background:#2a1600;color:#ffb060;border-color:#7a4a10;animation:apulse 1.6s ease-in-out infinite;}
.hall-reqsum{font-size:11px;font-weight:800;padding:3px 10px;border-radius:7px;background:#20203a;color:#9aa8c8;border:1px solid var(--line2);cursor:pointer;white-space:nowrap;margin-left:8px;}
.hall-reqsum.un{background:#2a1600;color:#ffb060;border-color:#7a4a10;animation:apulse 1.6s ease-in-out infinite;}
.req-card{background:var(--panel2);border:1px solid #5a3a20;border-radius:11px;padding:11px 13px;margin-bottom:9px;}
.req-card.done{opacity:.55;border-color:var(--line2);}
.rq-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.rq-time{font-size:11px;color:var(--sub);font-weight:700;}
.rq-cast{font-size:14px;font-weight:800;}
.rq-type{font-size:12px;font-weight:800;padding:2px 8px;border-radius:6px;}
.rq-type.ng{background:#2a0e0e;color:#f08080;border:1px solid #7a2828;}
.rq-type.want{background:#0d2618;color:#79e0a8;border:1px solid #2a6a44;}
.rq-done{margin-left:auto;font-size:11px;color:var(--sub);display:flex;align-items:center;gap:4px;cursor:pointer;}
.rq-target{font-size:13px;font-weight:700;margin-top:7px;color:#cfe0ff;}
.rq-comment{font-size:12px;color:var(--sub);margin-top:5px;background:#0f0f1c;border-radius:7px;padding:6px 9px;border:1px solid var(--line);}
/* 担当 / 予約席の明示 */
.seat.reserved{background:#0c1626;border:1px dashed #2f5a90;}
.seat .rsv-tag{font-size:9px;font-weight:800;color:#9dc8ff;background:#12233f;border:1px solid #2a5590;border-radius:5px;padding:1px 6px;}
.seat .rsv-meta{font-size:11px;color:#7ab0f0;margin-top:3px;font-weight:600;}
.seat .rsv-meta .rt{color:#9dc8ff;font-weight:800;}
.crow.istantou .cnm{color:#7be0a8;font-weight:800;}
.crow.tantou-away .cnm{color:#ffbf6a;font-weight:800;}
.tmini{font-size:8px;font-weight:800;padding:0 4px;border-radius:4px;margin-left:3px;vertical-align:middle;}
.crow.istantou .tmini{background:#123020;color:#7be0a8;}
.crow.tantou-away .tmini{background:#2a1e00;color:#ffbf6a;}
.crow.tantou-away .cmin{color:#ffbf6a !important;background:#241800 !important;border-color:#5a4010 !important;}
.seat.ok{background:var(--ok-bg);border-color:var(--ok-line);}
.seat.ok .cmin{color:var(--ok);background:#071410;border:1px solid #143a26;}
.seat.warn{background:var(--warn-bg);border-color:var(--warn-line);}
.seat.warn .cmin{color:var(--warn);background:#160f00;border:1px solid #4a3800;}
.seat.over{background:var(--over-bg);border-color:var(--over-line);animation:blink 1.6s ease-in-out infinite;}
.seat.over .cmin{color:var(--over);background:#140505;border:1px solid #5a1a1a;}
.seat.over .cust{color:#ffbdbd;}
@keyframes blink{0%,100%{box-shadow:0 0 0 0 rgba(238,90,90,0);}50%{box-shadow:0 0 0 2px rgba(238,90,90,.35);}}
.seat .cnr{position:absolute;top:0;right:0;font-size:9px;padding:2px 6px;border-bottom-left-radius:8px;font-weight:800;}
.seat.ok .cnr{background:#123a26;color:#7be0a8;}
.seat.warn .cnr{background:#3a2c00;color:#ffcf6a;}
.seat.over .cnr{background:#4a1212;color:#ff9a9a;}

/* ---------- Reservation list ---------- */
.rlist{display:flex;flex-direction:column;gap:4px;}
.rcard{position:relative;overflow:hidden;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:5px 10px 5px 13px;cursor:pointer;}
.rcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:transparent;}
/* 来店前（確定・未来店）＝沈めた"予定"の面・寒色の左バー＝ひと目で「まだ来ていない」 */
.rcard.waiting{background:#0d0d17;border-color:#20202f;}
.rcard.waiting::before{background:#46506a;}
.rcard.waiting .rtime{color:#8893ab;}
.rcard.waiting .rname{color:#aeb7c6;}
/* 来店中（来店済み）＝緑の面＋緑の左バー＋緑の時刻＝ひと目で「今ここに居る」 */
.rcard.arrived{background:linear-gradient(90deg,rgba(77,204,132,.14),rgba(22,22,38,0) 46%),var(--panel2);border-color:#2a6a44;}
.rcard.arrived::before{background:#4dcc84;}
.rcard.arrived .rtime{color:#7fe0a3;}
.rcard.done{opacity:.5;}
.rcard.done::before{background:#3a3a4a;}
.rcard.next{border-color:#245086;box-shadow:0 0 0 1px #1a3a66 inset;}
.rtop{display:flex;align-items:center;gap:7px;}
.rtime{font-size:14px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;white-space:nowrap;}
.rname{font-size:12px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rname .mem{font-size:10px;color:var(--sub);font-weight:600;margin-left:4px;}
.rmemchip{font-size:10px;font-weight:800;padding:2px 7px;border-radius:9px;white-space:nowrap;flex-shrink:0;border:1px solid;}
.rmemchip.exp{background:#2a0e0e;color:#ff9a9a;border-color:#7a2828;}
.rmemchip.soon{background:#241a00;color:#ffcf6a;border-color:#6a5000;}
.rmemchip.ok{background:#0d2216;color:#7fe0a3;border-color:#2a6a44;}
.rmemchip.none{background:#20242e;color:#aab4c4;border-color:#3a4150;}
.stbtns{display:flex;gap:5px;flex-shrink:0;align-items:center;}
.stbtns .stact,.stbtns .stundo,.stbtns .stpill{flex-shrink:0;}
.stpill{font-size:10px;font-weight:800;padding:3px 8px;border-radius:7px;white-space:nowrap;}
.stpill.wait{background:#12233f;border:1px solid #2a5590;color:#8fc0ff;}
.stpill.arr{background:#0d2618;border:1px solid #2a6a44;color:#79e0a8;}
.stpill.left{background:#241024;border:1px solid #66346a;color:#e79ad6;}
.stact{padding:4px 11px;font-size:11px;font-weight:800;border-radius:8px;border:1px solid;cursor:pointer;white-space:nowrap;}
.stact.arr{background:#0d2618;border-color:#2a6a44;color:#8ff0b0;}
.stact.left{background:#241800;border-color:#7a5010;color:#ffbf5a;}
.stundo{padding:4px 8px;font-size:11px;border-radius:8px;border:1px solid var(--line2);background:var(--panel);color:var(--sub);cursor:pointer;white-space:nowrap;}
.stundo.wide{padding:6px 12px;}
.rbadges{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
.rb{font-size:9px;padding:1px 6px;border-radius:6px;background:#191930;color:#a9bce0;border:1px solid var(--line2);}
.rb.t{color:#8fd06a;border-color:#2f5020;background:#101d0c;}
.rb.d{color:#ffbf6a;border-color:#5a4010;background:#1c1300;}
.rb.undef{color:#ff9a6a;border-color:#7a3a1a;background:#241000;}
.rnote{font-size:10px;color:var(--sub);margin-top:3px;background:#0f0f1c;border-radius:7px;padding:3px 7px;border:1px solid var(--line);}
/* 予約カードのボトル位置（黒服が来店前に準備できるよう銘柄＋位置を明示） */
.rbottle{font-size:11px;font-weight:700;color:#8fd06a;background:#12240f;border:1px solid #356020;border-radius:7px;padding:3px 8px;margin-top:4px;display:inline-block;}
.rbottle b{color:#c8f0a8;font-weight:800;}
.rbottle .rb-nopos{color:#c69a6a;font-weight:600;}
/* 🍶 本日の予約ボトル 一括リスト */
.bp-list{display:flex;flex-direction:column;gap:8px;}
.bp-item{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid #2f5020;border-left:4px solid #4dcc84;border-radius:10px;padding:9px 12px;cursor:pointer;}
.bp-item .bp-pos{font-size:14px;font-weight:900;color:#c8f0a8;min-width:96px;white-space:nowrap;}
.bp-item .bp-mid{flex:1;min-width:0;}
.bp-item .bp-btl{font-size:14px;font-weight:800;color:#e8f0ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bp-item .bp-cust{font-size:11px;color:var(--sub);font-weight:600;margin-top:1px;}
.bp-item .bp-mem{color:#8aa8c8;}
.bp-item .bp-right{text-align:right;font-size:12px;font-weight:800;color:var(--accent);white-space:nowrap;}
.bp-item .bp-tbl{font-size:10px;color:var(--sub);font-weight:600;margin-top:2px;}
.bp-st{font-size:9px;font-weight:800;padding:1px 6px;border-radius:10px;margin-left:5px;}
.bp-st.arr{background:#0d2618;border:1px solid #2a6a44;color:#79e0a8;}
.bp-st.wait{background:#12233f;border:1px solid #2a5590;color:#8fc0ff;}
.bp-st.done{background:#181828;border:1px solid #3a3a4a;color:#8a95a8;}
.rnextmemo{font-size:11px;color:#f0c66a;margin-top:4px;background:#2a2010;border-radius:7px;padding:5px 8px;border:1px solid #7a5a1a;font-weight:700;line-height:1.4;}
.nmemo-box{background:#2a2010;border:1px solid #7a5a1a;border-radius:12px;padding:12px 14px;margin:4px 0 14px;}
.nmemo-h{font-size:13px;color:#f0c66a;font-weight:800;margin-bottom:8px;}
.nmemo-sub{font-size:11px;color:#b09050;font-weight:600;}
.nmemo-save{margin-top:10px;width:100%;padding:11px;border-radius:9px;background:#3a2c12;border:1px solid #8a6a2a;color:#f0c66a;font-weight:800;font-size:14px;cursor:pointer;}

/* ---------- Sheet (seat detail / add / schedule) ---------- */
.scrim{position:fixed;inset:0;background:rgba(4,4,10,.55);opacity:0;pointer-events:none;transition:.2s;z-index:40;}
.scrim.show{opacity:1;pointer-events:auto;}
.sheet{position:fixed;top:0;right:0;bottom:0;width:min(460px,92vw);background:var(--panel);border-left:1px solid var(--line2);transform:translateX(100%);transition:.24s cubic-bezier(.2,.7,.2,1);z-index:41;display:flex;flex-direction:column;}
.sheet.wide{width:min(860px,96vw);}
.sheet.full{width:100vw;border-left:none;}
.sheet.full .sheet-bd{padding:0;}
.sheet.show{transform:translateX(0);}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--line);flex-shrink:0;}
.sheet-hd .t{font-size:17px;font-weight:800;}
.sheet-hd .x{font-size:13px;color:var(--sub);background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:7px 12px;cursor:pointer;}
.sheet-bd{flex:1;overflow-y:auto;padding:16px 18px;}
.sheet-bd .kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;}
.sheet-bd .kv .k{color:var(--sub);}
.sheet-bd .kv .v{font-weight:700;}
.detcast{background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:10px 12px;margin-top:8px;display:flex;align-items:center;justify-content:space-between;}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:16px;}
.act{padding:14px;border-radius:11px;font-size:14px;font-weight:800;text-align:center;cursor:pointer;border:1px solid var(--line2);background:var(--panel2);color:#cfe0ff;}
.act.pri{background:#0d2618;border-color:#2a6a44;color:#79e0a8;}
.act.warn{background:#241800;border-color:#7a5010;color:#ffbf5a;}
.act.dng{background:#240e0e;border-color:#7a2828;color:#f08080;}

/* form inside sheet */
.flabel{font-size:11px;color:var(--accent);font-weight:700;margin:14px 0 6px;letter-spacing:.3px;}
.flabel:first-child{margin-top:0;}
.finput{width:100%;background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:11px 13px;color:var(--txt);font-size:15px;outline:none;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:8px 12px;border-radius:9px;border:1px solid var(--line2);background:var(--panel2);color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;}
.chip.sel{background:var(--accent-bg);border-color:var(--accent-line);color:var(--accent);font-weight:800;}
.chip.cast.sel{background:#0d2618;border-color:#2a6a44;color:#79e0a8;}
.rotpick .chip.cast{display:inline-flex;align-items:center;gap:5px;}
.rploc{font-size:9px;font-weight:700;color:#8fb8f0;background:#12233f;border-radius:5px;padding:1px 5px;}
.rploc.free{color:#c0a0e0;background:#1e1430;}
.chip.dohan.sel{background:#241800;border-color:#7a5010;color:#ffbf5a;}
.chip.yoyaku.sel{background:#0a1e2e;border-color:#2a5aaa;color:#7ab0f0;}
.custpick{display:flex;gap:8px;margin-bottom:6px;}
.custpick>div{flex:1;text-align:center;padding:13px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;}
.cp-exist{background:#0a1428;border:1px solid #1e3a6a;color:var(--accent);}
.cp-new{background:#0d2010;border:1px solid #1a4a22;color:var(--green);}
.savebtn{width:100%;margin-top:18px;padding:15px;border-radius:12px;border:1px solid var(--accent-line);background:linear-gradient(180deg,#153a72,#0f2040);color:#dcecff;font-size:16px;font-weight:800;cursor:pointer;text-align:center;}
/* 予約: お客様選択 */
.af-choose{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.af-choose-btn{display:flex;align-items:center;gap:10px;padding:14px 12px;border-radius:11px;border:1px solid #1e3a6a;background:#0a1428;color:var(--accent);cursor:pointer;text-align:left;}
.af-choose-btn.new{border-color:#1a4a22;background:#0d2010;color:var(--green);}
.af-choose-btn .ic{font-size:22px;flex-shrink:0;}
.af-choose-btn .tx{display:flex;flex-direction:column;}
.af-choose-btn .t{font-size:14px;font-weight:800;}
.af-choose-btn .s{font-size:11px;opacity:.75;font-weight:600;margin-top:2px;}
.af-results{margin-top:8px;max-height:230px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.af-res{background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:9px 11px;cursor:pointer;}
.af-res:active{background:#12233f;}
.af-res-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.af-switch{margin-top:8px;}
.af-ms{width:100%;padding:10px;border-radius:9px;border:1px dashed var(--line2);background:transparent;color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;}
.af-picked{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#0e1a13;border:1px solid #2a6a44;border-radius:10px;padding:11px 13px;}
.af-picked-nm{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.af-change{background:var(--panel2);border:1px solid var(--line2);color:var(--sub);border-radius:8px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.af-tag{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;}
.af-tag.new{background:#241800;border:1px solid #7a5010;color:#ffbf5a;}
.af-tag.exist{background:#0d2618;border:1px solid #2a6a44;color:#7be0a8;}
/* 現金管理フォーム */
.ck-note{font-size:11px;color:var(--sub);margin-bottom:8px;}
.ck-banner{font-size:13px;font-weight:800;padding:10px 12px;border-radius:9px;margin-bottom:10px;}
.ck-banner.ok{background:var(--ok-bg);color:#7be0a8;border:1px solid var(--ok-line);}
.ck-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ck-flabel{width:44px;font-size:13px;font-weight:800;color:#bcd8ff;flex-shrink:0;}
.ck-denom{flex:1;display:flex;flex-direction:column;gap:3px;font-size:10px;color:var(--sub);font-weight:700;}
.ck-denom input{width:100%;box-sizing:border-box;background:var(--panel2);border:1px solid var(--line2);border-radius:8px;padding:9px 8px;color:var(--txt);font-size:15px;outline:none;text-align:right;font-variant-numeric:tabular-nums;}
.ck-denom input:focus{border-color:var(--accent-line);}
.ck-detail{font-size:13px;color:#cfe0ff;padding:4px 0;white-space:pre-wrap;}
.ck-total{font-size:13px;color:var(--sub);font-weight:700;}
.ck-banner.warn{background:#241a00;color:#ffcf6a;border:1px solid #6a5000;}
.ck-banner.ng{background:#2a0e0e;color:#ff9a9a;border:1px solid #7a2828;}
.cc-info{background:#0f0f1c;border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:8px;display:flex;flex-direction:column;gap:3px;}
.cc-addslip{text-align:center;padding:11px;border:1px dashed var(--line2);border-radius:10px;color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;}
.cc-slip{background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:10px;margin-bottom:8px;}
.cc-slip-top{display:flex;gap:6px;margin-bottom:6px;}
.cc-slip-top select{flex:1;background:var(--panel);border:1px solid var(--line2);color:#9dc8ff;padding:8px;border-radius:8px;font-size:13px;}
.cc-slip-top button{background:#241014;border:1px solid #5a2430;color:#e0a0b0;padding:6px 12px;border-radius:8px;cursor:pointer;}
.cc-photo{display:flex;align-items:center;gap:8px;font-size:12px;color:#8fb8f0;cursor:pointer;}
.cc-photo img{width:44px;height:44px;object-fit:cover;border-radius:6px;}
.cc-flow{background:#0f0f1c;border:1px solid var(--line);border-radius:10px;padding:10px 14px;}
.cc-flow-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;}
.cc-flow-row.total{border-top:1px solid var(--line2);margin-top:4px;padding-top:6px;font-weight:800;color:#e8f0ff;}

/* ===== stock manager (full-screen dashboard) ===== */
.stk-wrap{display:flex;flex-direction:column;height:100%;}
.stk-body{flex:1;display:flex;min-height:0;}
.stk-side{width:230px;flex-shrink:0;border-right:1px solid var(--line);display:flex;flex-direction:column;background:#0d0d18;overflow-y:auto;}
.stk-side-sec{padding:12px 12px 6px;font-size:10px;letter-spacing:.4px;color:var(--dim);font-weight:800;text-transform:uppercase;}
.stk-nav{display:flex;flex-direction:column;gap:4px;padding:0 10px 8px;}
.stk-nav-btn{display:flex;justify-content:space-between;align-items:center;padding:11px 12px;border-radius:9px;border:1px solid transparent;background:transparent;color:var(--sub);font-size:14px;font-weight:700;cursor:pointer;text-align:left;}
.stk-nav-btn.sel{background:var(--accent-bg);border-color:var(--accent-line);color:var(--accent);}
.stk-nav-btn .cnt{font-size:11px;color:var(--dim);font-weight:700;}
.stk-floor-row{display:flex;gap:5px;padding:0 12px 10px;}
.stk-floor-btn{flex:1;padding:9px 0;border-radius:8px;border:1px solid var(--line2);background:var(--panel2);color:var(--sub);font-size:13px;font-weight:700;cursor:pointer;text-align:center;}
.stk-floor-btn.sel{background:#0d2233;border-color:#2a6a9a;color:#7ac8ff;}
.stk-stocktake{margin:2px 12px 12px;text-align:center;padding:11px;border:1px dashed var(--line2);border-radius:10px;color:#b9a6ff;font-size:13px;font-weight:700;cursor:pointer;}
/* 棚卸し */
.stk-help{color:var(--sub);font-size:12.5px;line-height:1.6;padding:2px 2px 12px;}
.stk-fgroup{margin-bottom:16px;}
.stk-fhead{font-size:13px;font-weight:800;color:#7ac8ff;padding:8px 2px;border-bottom:1px solid var(--line);margin-bottom:4px;}

.dr-fbtn{flex:1;max-width:80px;padding:8px 0;border:1px solid var(--line2);border-radius:8px;background:var(--panel2);color:var(--dim);font-weight:800;font-size:14px;cursor:pointer;}

.dr-score{align-self:flex-end;}

/* 伝票管理 */
.dp-wrap{padding:12px 14px 90px;overflow-y:auto;height:100%;}
.dp-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}

.dp-date{font-size:16px;font-weight:800;color:var(--txt);}
.dp-sec{margin-bottom:18px;}
.dp-sec-h{display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:800;color:var(--txt);padding:8px 2px;border-bottom:2px solid var(--line2);margin-bottom:8px;}
.dp-cnt{font-size:11px;color:var(--dim);font-weight:600;margin-left:4px;}
.dp-total{font-size:14px;color:#f0c66a;font-weight:800;}
.dp-card{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.dp-card-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
.dp-nm{font-weight:800;font-size:15px;color:var(--txt);}
.dp-amt{font-weight:800;font-size:16px;color:#e8f0ff;white-space:nowrap;}
.dp-meta{font-size:12px;color:var(--sub);margin-top:4px;line-height:1.4;}
.dp-card-b{display:flex;align-items:center;gap:8px;margin-top:9px;}
.dp-img{font-size:12px;color:#7ac6ff;text-decoration:none;border:1px solid #2a5a7a;border-radius:7px;padding:4px 9px;background:#12202c;}
.dp-acts{margin-left:auto;display:flex;gap:6px;}
.dp-edit{font-size:12px;font-weight:700;padding:5px 11px;border-radius:7px;border:1px solid var(--line2);background:var(--panel);color:var(--sub);cursor:pointer;}
.dp-del{font-size:13px;padding:5px 9px;border-radius:7px;border:1px solid #5a2222;background:#2a1414;color:#e89090;cursor:pointer;}
.dp-empty{color:var(--dim);font-size:12px;padding:10px 2px;}
.dp-dgroup{border:1px solid var(--line2);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.dp-dhead{background:#12202c;color:#7ac6ff;font-weight:800;font-size:13px;padding:9px 11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.dp-dsub{font-size:11px;color:var(--dim);font-weight:600;}
.dp-dline{display:flex;align-items:center;gap:8px;padding:8px 11px;border-top:1px solid var(--line);}
.dp-dline-l{flex:1;min-width:0;}
.dp-dnm{font-weight:700;font-size:13px;}
.dp-dqty{font-size:12px;color:var(--sub);}
.dp-refl{font-size:10px;color:#7fe0a3;margin-left:6px;font-weight:700;}
.dp-damt{font-weight:800;font-size:14px;white-space:nowrap;}
.dp-flabel{font-size:12px;color:var(--sub);font-weight:700;margin:12px 0 5px;}
.dp-editform{padding:4px 2px;}
.stk-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.stk-toolbar{display:flex;gap:10px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);flex-shrink:0;flex-wrap:wrap;}
.stk-toolbar .finput{flex:1;min-width:200px;}
.stk-scroll{flex:1;overflow-y:auto;padding:14px 16px;}
.stk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;}
.stk-undel-bar{background:#181206;border-bottom:1px solid #4a3a12;padding:9px 16px;display:flex;gap:8px;align-items:center;overflow-x:auto;flex-shrink:0;}

/* おみやげ在庫カード */
.sv-card{background:#1c1526;border-bottom:1px solid #4a2f6a;padding:10px 16px;flex-shrink:0;}
.sv-h{font-size:12px;color:#d0a8ff;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sv-trend{margin-left:auto;padding:4px 12px;border-radius:8px;border:1px solid #4a3a6a;background:#221830;color:#d0a8ff;font-weight:800;font-size:12px;cursor:pointer;white-space:nowrap;}
.sv-trend:active{background:#2e2040;}
/* おみやげ推移シート */
.svl-days{display:flex;flex-direction:column;gap:7px;}
.svl-day{background:var(--panel2);border:1px solid var(--line2);border-radius:11px;padding:9px 12px;}
.svl-date{font-size:12px;font-weight:800;color:#cfe0ff;margin-bottom:6px;}
.svl-flrow{display:flex;gap:10px;flex-wrap:wrap;}
.svl-fl{display:inline-flex;align-items:center;gap:8px;background:#171022;border:1px solid #3a2a55;border-radius:9px;padding:5px 10px;}
.svl-flname{font-weight:800;color:#c9b3ff;font-size:13px;min-width:26px;}
.svl-consumed{color:#ff9a9a;font-weight:800;font-size:13px;}
.svl-added{color:#79e0a8;font-weight:800;font-size:13px;}
.svl-last{color:#e6e6f0;font-weight:700;font-size:12px;}
.svl-last.low{color:#ff8a8a;}
.svl-ent{display:flex;align-items:center;gap:8px;font-size:11px;padding:5px 8px;border-bottom:1px solid var(--line);white-space:nowrap;overflow:hidden;}
.svl-ent-ts{color:var(--sub);font-variant-numeric:tabular-nums;}
.svl-ent-fl{color:#c9b3ff;font-weight:800;min-width:24px;}
.svl-ent-kind{color:#9ab0d0;flex:1;overflow:hidden;text-overflow:ellipsis;}
.svl-ent-d{font-weight:800;font-variant-numeric:tabular-nums;}
.svl-ent-d.minus{color:#ff9a9a;} .svl-ent-d.plus{color:#79e0a8;} .svl-ent-d.zero{color:var(--sub);}
.svl-ent-after{color:#e6e6f0;font-weight:700;font-variant-numeric:tabular-nums;}
.sv-fl{display:inline-flex;align-items:center;gap:8px;margin:0 16px 6px 0;padding:6px 10px;border:1px solid #3a2a55;border-radius:10px;background:#171022;}
.sv-fl.low{border-color:#7a2a2a;background:#241016;}
.sv-flname{font-weight:800;color:#c9b3ff;font-size:14px;min-width:28px;}
.sv-qbtn{width:32px;height:32px;border-radius:8px;border:1px solid #4a3a6a;background:#221830;color:#d0a8ff;font-size:18px;font-weight:800;cursor:pointer;}
.sv-num{min-width:34px;text-align:center;font-size:18px;font-weight:800;color:#eee;}
.sv-num.low{color:#ff8a8a;}
.sv-set{width:70px;text-align:center;}
.sv-setbtn{padding:6px 10px;border-radius:8px;border:1px solid #6a4a2a;background:#2a1f14;color:#ffbf6a;font-weight:700;font-size:12px;cursor:pointer;}
.sv-low{color:#ff8a8a;font-weight:800;font-size:11px;}
.stk-undel-row{display:flex;align-items:center;gap:8px;background:#221a08;border:1px solid #4a3a12;border-radius:9px;padding:6px 9px;font-size:12px;white-space:nowrap;flex-shrink:0;}
.stk-deliver{background:#0d2618;border:1px solid #2a6a44;color:#79e0a8;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.stk-floor{color:#8fb8f0;font-size:11px;font-weight:700;}
.stk-card{background:var(--panel2);border:1px solid var(--line2);border-radius:11px;padding:11px 12px;display:flex;flex-direction:column;}
.stk-card.zero{border-color:#5a2430;background:#1a1013;}
.stk-card-top{display:flex;align-items:flex-start;gap:6px;}
.stk-card-nm{flex:1;font-size:14px;font-weight:700;color:#eee;line-height:1.35;}
.stk-del{background:transparent;border:none;color:#7a5560;width:22px;height:22px;font-size:16px;cursor:pointer;line-height:1;flex-shrink:0;}
.stk-card-qty{display:flex;align-items:center;justify-content:center;gap:12px;margin:8px 0;}
.stk-qtynum{min-width:40px;text-align:center;font-size:26px;font-weight:800;color:#dfe8ff;}
.stk-qtynum.z{color:#ff8a8a;}
.stk-qbtn{width:40px;height:40px;border-radius:10px;border:1px solid var(--line2);background:var(--panel);color:var(--txt);font-size:22px;font-weight:800;cursor:pointer;line-height:1;}
.stk-qbtn.xs{width:26px;height:26px;font-size:16px;border-radius:7px;}
/* 合算ビュー */
.stk-card.sum .stk-sumtot{font-size:13px;color:var(--sub);font-weight:700;white-space:nowrap;}
.stk-card.sum .stk-sumtot b{font-size:20px;color:#8fe0a0;margin-left:2px;}
.stk-flrow{display:flex;flex-direction:column;gap:6px;margin-top:9px;}
.stk-flc{display:flex;align-items:center;gap:8px;padding:5px 9px;background:var(--panel);border:1px solid var(--line);border-radius:8px;}
.stk-flc.empty{opacity:.4;color:var(--dim);font-size:12px;}
.stk-flc-f{width:34px;font-size:12px;font-weight:800;color:#8fb8f0;}
.stk-flc-q{flex:1;text-align:center;font-size:19px;font-weight:800;color:#dfe8ff;}
.stk-flc-q.z{color:#ff8a8a;}
.stk-mini{background:#1a2a10;border:1px solid #447722;color:#aadd66;padding:8px 10px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;width:100%;margin-bottom:6px;}
.stk-order{display:flex;gap:6px;margin-top:4px;}
.stk-order .finput{flex:1;padding:8px;font-size:14px;}
.stk-order-btn{background:#241800;border:1px solid #7a5010;color:#ffbf5a;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;padding:8px 12px;white-space:nowrap;}
.stk-exp{font-size:10px;color:#ffcf6a;font-weight:700;margin-top:2px;}
/* メニュー落ち。カードは消さず在庫数も出したまま＝現物は数え続けて売り切る。バッジは「もう仕入れない」の意味だけ */
.stk-drop{display:inline-block;margin-left:6px;padding:1px 6px;border-radius:8px;background:#4a3340;color:#ffb0c4;font-size:10px;font-weight:700;vertical-align:middle;white-space:nowrap;}
/* ボトルの仕分け＝店舗メニューの分類。在庫のカテゴリ(左ナビ)とは別物 */
.stk-mcat{margin-bottom:12px;}
.stk-mcat>summary{cursor:pointer;font-size:12px;font-weight:800;color:#8fb8f0;padding:7px 2px;display:flex;align-items:center;gap:8px;list-style:none;}
.stk-mcat>summary::-webkit-details-marker{display:none;}
.stk-mcat>summary::before{content:'▾';font-size:10px;color:#5a6688;}
.stk-mcat:not([open])>summary::before{content:'▸';}
.stk-mcnt{font-size:10px;font-weight:700;color:#5a6688;}
.stk-mcnt.off{color:#ffb0c4;}
.stk-mwarn{font-size:10px;font-weight:800;color:#ffcf6a;}
/* 紐づけのプルダウン。黒服が触れるのはここだけ＝メニュー落ちの切替は出さない（コンソールのみ） */
.stk-mrow{display:flex;align-items:center;gap:6px;margin-top:8px;}
.stk-mlbl{font-size:10px;font-weight:800;color:#5a6688;white-space:nowrap;}
.stk-msel{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line2);border-radius:7px;padding:6px 8px;color:var(--txt);font-size:12px;outline:none;}
.stk-forms{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
.stk-sec{background:#0f0f1c;border:1px solid var(--line);border-radius:11px;padding:13px;}
.stk-sec-t{font-size:13px;font-weight:800;margin-bottom:9px;}
.stk-check{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--sub);margin-top:9px;cursor:pointer;}
@media(max-width:760px){.stk-side{width:150px;}.stk-forms{grid-template-columns:1fr;}}

.ok-scroll{flex:1;overflow-y:auto;padding:14px 16px;}

.sr-nm{font-size:13px;font-weight:800;min-width:48px;}
.sr-time{font-size:12px;font-weight:700;color:#aac4e8;font-variant-numeric:tabular-nums;white-space:nowrap;}

.sb.haya.off{background:#161626;color:#5a6a80;border:1px solid var(--line2);}
.sb.okuri{background:#102a26;color:#8fe0c0;border:1px solid #2a6a5a;cursor:pointer;}
.sb.okuri.off{background:#161626;color:#5a6a80;border:1px solid var(--line2);}
.sb.mode{cursor:pointer;}
.sb.mode.drv{background:#0f2040;color:#9dc8ff;border:1px solid #2a5590;}
.sb.mode.jib{background:#1e1a0a;color:#e6c060;border:1px solid #5a4a1a;}
.sb.shusen{background:#0e1a22;color:#8fd0e0;border:1px solid #2a4a5a;cursor:pointer;}
.sb.shusen.off{background:#161626;color:#5a6a80;border:1px solid var(--line2);}
.sr-nm{cursor:pointer;}
.sr-nm .pen{color:#6a5a8a;font-size:11px;margin-left:3px;}
.sr-nm .rnm{color:#c9a0ff;font-size:11px;margin-left:3px;font-weight:800;}
.shift-row.rnm{border-color:#5a2a5a;}
.rtg.active{background:var(--accent-bg);border-color:var(--accent-line);color:var(--accent);}

.rot-sum{font-size:12px;color:var(--sub);margin-bottom:11px;font-weight:700;}

.rcast{background:var(--panel2);border:1px solid var(--line2);border-radius:12px;padding:11px 12px;margin-bottom:9px;}
.rcast.act{border-color:#7a2424;background:linear-gradient(180deg,#20100f,#150f14);}
.rcast-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.rcast-nm{font-size:15px;font-weight:800;}

.rcast-tag.a{background:#3a1212;color:#ff9a9a;}
.rcast-tag.o{background:#123020;color:#7be0a8;}
.rload{font-size:10px;font-weight:800;padding:3px 9px;border-radius:11px;white-space:nowrap;}
.rload.l1{background:#123020;color:#7be0a8;border:1px solid #25603e;}
.rload.l2{background:#2a1e00;color:#ffcf6a;border:1px solid #6a5000;}
.rload.l3{background:#3a1212;color:#ff9a9a;border:1px solid #7a2424;}
.rload .pip{letter-spacing:1px;margin-left:3px;}
.rint{display:flex;align-items:center;gap:8px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--line2);font-size:11px;color:var(--sub);font-weight:700;flex-wrap:wrap;}

/* 掛け持ちマップ（一目サマリー） */
.loadmap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px;}
.lm{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;border:1px solid;}

.rtab.cur{background:#0d2016;border-color:#25603e;}   .rtab.cur .tr{color:#7be0a8;}
.rtab.wait{background:#12121f;}                        .rtab.wait .tr{color:#8a9ac0;}
.rtab.warnw{background:#1c1400;border-color:#5a4200;}  .rtab.warnw .tr{color:#ffcf6a;}
.rtab.overw{background:#1e0808;border-color:#7a2020;animation:blink 1.6s ease-in-out infinite;} .rtab.overw .tr{color:#ff9a9a;}
.rcast-act{display:flex;gap:7px;margin-top:9px;}
.rbtn{flex:1;padding:12px 6px;border-radius:9px;font-size:13px;font-weight:800;text-align:center;cursor:pointer;border:1px solid;}

.rbtn.mv{background:linear-gradient(180deg,#153a72,#0f2040);border-color:#2a5590;color:#dcecff;}

.rot-toast{position:fixed;left:50%;bottom:82px;transform:translateX(-50%);background:#0d2618;border:1px solid #2a6a44;color:#9fe8c0;font-size:13px;font-weight:700;padding:11px 20px;border-radius:12px;z-index:70;opacity:0;transition:.25s;pointer-events:none;}
.rot-toast.show{opacity:1;}

/* ---------- キャストチップ（席上の担当を色で識別） ---------- */
.castchip{display:inline-flex;align-items:center;gap:5px;background:#0e0e1a;border:1px solid var(--line2);border-radius:16px;padding:2px 9px 2px 2px;margin:3px 4px 0 0;font-size:11px;font-weight:700;cursor:pointer;max-width:100%;transition:.1s;}
.castchip:active{transform:scale(.96);}

.castchip .cn{color:#eef2ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.castchip .tm{font-weight:800;margin-left:1px;font-variant-numeric:tabular-nums;}
.castchip.s-ok .tm{color:#4dcc84;} .castchip.s-warn .tm{color:#e6b23a;} .castchip.s-over .tm{color:#ee5a5a;}
.castchip.tantou{box-shadow:inset 0 0 0 1px #2a6a44;}
.castchip.sel{outline:2px solid #7ab0f0;outline-offset:1px;background:#0f2040;}
.castchip.awaychip{background:#1a1400;border-style:dashed;border-color:#5a4010;}
.castchip.awaychip .cn{color:#ffbf6a;}
.castchip .role{font-size:8px;font-weight:800;color:#8a9ac0;background:#20203a;border-radius:4px;padding:0 4px;}

/* 担当不在の席 */

.seat.nocast .cnr{background:#4a3400;color:#ffcf6a;}

.seat.movetarget::after{content:'→ ここへ';position:absolute;right:6px;bottom:5px;font-size:10px;font-weight:800;color:#9dc8ff;background:#12233f;border:1px solid #2a5590;border-radius:6px;padding:1px 6px;}
.seat.moveself{opacity:.45;}
/* 席の結合・分割 */
.seat.grouped{border-color:#2a8a8a !important;box-shadow:inset 0 0 0 1px #1a5a5a;}
.seat .grp-badge{font-size:8px;font-weight:800;color:#8fe0e0;background:#0f2a2a;border:1px solid #2a7a7a;border-radius:5px;padding:1px 5px;margin-left:4px;vertical-align:middle;}
.kubun-badge{font-size:8px;font-weight:800;padding:1px 5px;border-radius:5px;margin-left:4px;vertical-align:middle;border:1px solid;white-space:nowrap;}
.kubun-badge.haken{color:#8fbaff;background:#0f1c33;border-color:#2a4a7a;}
.kubun-badge.taiken{color:#ffcf6a;background:#2a1e00;border-color:#7a5a10;}
.seat.mergedcell{background:#0b1c1c;border:1px dashed #2a7a7a;display:flex;align-items:center;justify-content:center;min-height:70px;}
.seat.combinetarget{outline:2px dashed #2aa0a0;outline-offset:-2px;}
.seat.combinetarget::after{content:'🔗 追加';position:absolute;right:6px;bottom:5px;font-size:10px;font-weight:800;color:#8fe0e0;background:#0f2a2a;border:1px solid #2a7a7a;border-radius:6px;padding:1px 6px;}
.seat.combineprimary{outline:2px solid #2aa0a0;outline-offset:-2px;}
.cb.cmb{background:#0f2a2a;border-color:#2a7a7a;color:#8fe0e0;}
/* 下部フローティング操作バー */
.castbar{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(24px);background:#16162a;border:1px solid var(--line2);border-radius:16px;padding:9px 10px 9px 14px;display:flex;align-items:center;gap:14px;z-index:58;opacity:0;pointer-events:none;transition:.22s cubic-bezier(.2,.7,.2,1);box-shadow:0 10px 34px rgba(0,0,0,.55);max-width:94vw;}

.castbar.movemode{border-color:#2a5590;background:#0c1c34;}
.cb-info{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:800;white-space:nowrap;}
.cb-info .ava{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#0b0b12;}

.cb-btns{display:flex;gap:8px;}
.cb{padding:12px 17px;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer;border:1px solid var(--line2);background:var(--panel2);color:#cfe0ff;white-space:nowrap;}
.cb.ext{background:#141d30;border-color:#2a4068;color:#9dc8ff;}
.cb.mv{background:linear-gradient(180deg,#153a72,#0f2040);border-color:#2a5590;color:#dcecff;}
.cb.pay{background:#241800;border-color:#7a5010;color:#ffbf5a;}
.cb.x{background:#241014;border-color:#5a2430;color:#e0a0b0;padding:12px 14px;}

/* メニュー */
.menu-btn{background:var(--panel2);border:1px solid var(--line2);color:var(--accent);font-size:13px;font-weight:800;padding:8px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;}
.menu-btn:active{background:var(--accent-bg);}
.menu-btn.cust{background:#14213a;border-color:#2a4a7a;color:#8fb8f0;}
.menu-btn.reload{background:#1a1220;border-color:#4a2c5a;color:#c69ae0;}
.cust-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}

.cust-tsel{font-size:13px;font-weight:800;padding:8px 14px;border-radius:20px;border:1px solid var(--line2);background:var(--panel2);color:var(--txt);cursor:pointer;-webkit-appearance:none;appearance:none;}

.cfil.exp.on{background:#2a0e0e;border-color:#7a2828;color:#ff9a9a;}
.cfil.nol.on{background:#241800;border-color:#7a5010;color:#ffbf6a;}
.cbd.noline{background:#241800;color:#ffbf6a;border-color:#7a5010;}
.menu-overlay{position:fixed;inset:0;background:#0b0b12;z-index:80;display:none;flex-direction:column;}

.menu-hd{display:flex;align-items:center;justify-content:space-between;padding:calc(15px + env(safe-area-inset-top)) calc(22px + env(safe-area-inset-right)) 15px calc(22px + env(safe-area-inset-left));border-bottom:1px solid var(--line);flex-shrink:0;}

.menu-tile{background:var(--panel);border:1px solid var(--line2);border-radius:14px;padding:22px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:.1s;}

.mt-t{font-size:14px;font-weight:800;text-align:center;}
.menu-back{font-size:13px;color:var(--accent);cursor:pointer;display:inline-block;margin-bottom:14px;font-weight:700;}
.cust-q{width:100%;box-sizing:border-box;background:var(--panel2);border:1px solid var(--line2);border-radius:11px;padding:13px 16px;color:var(--txt);font-size:16px;outline:none;margin-bottom:14px;}

.cbd.exp{background:#2a0e0e;color:#ff9a9a;border-color:#7a2828;}
.cbd.soon{background:#241a00;color:#ffcf6a;border-color:#6a5000;}
.cbd.okr{background:#0d2618;color:#79e0a8;border-color:#2a6a44;}

.cbd.bday{background:#151046;color:#9d90ee;border-color:#4436a8;}

/* ===== ログイン画面（NERV/エヴァ風） ===== ロジックは不変。CSSと入口ヘッダーの見た目のみ。ローカル色トークンは --n-* に閉じる（本編の --accent とは独立） */
.login-overlay{--n-amber:#ff7a1a;--n-amber-dim:#b85a15;--n-amber-glow:rgba(255,122,26,.55);--n-green:#57e08a;--n-red:#ff3b30;--n-mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;}
.login-overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(24px + env(safe-area-inset-top)) 24px calc(24px + env(safe-area-inset-bottom));color:#e8ecf0;overflow:hidden;
  background:radial-gradient(120% 90% at 50% 8%,rgba(255,122,26,.10),transparent 55%),radial-gradient(140% 120% at 50% 120%,rgba(120,40,0,.10),transparent 60%),#05070a;}
.login-overlay::before{content:"";position:absolute;inset:-2px;pointer-events:none;z-index:0;
  background-image:linear-gradient(0deg,rgba(255,255,255,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px);background-size:44px 44px,44px 44px;
  -webkit-mask-image:radial-gradient(120% 100% at 50% 45%,#000 40%,transparent 78%);mask-image:radial-gradient(120% 100% at 50% 45%,#000 40%,transparent 78%);}
.login-overlay::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0px,rgba(0,0,0,.16) 1px,transparent 1px,transparent 3px);opacity:.5;animation:nScan 8s linear infinite;}
@keyframes nScan{0%{background-position:0 0}100%{background-position:0 6px}}
.nerv-panel{position:relative;z-index:2;width:100%;max-width:420px;padding:30px 26px 26px;display:flex;flex-direction:column;align-items:center;
  background:linear-gradient(180deg,rgba(9,12,18,.72),rgba(5,7,10,.72));border:1px solid rgba(255,122,26,.22);
  box-shadow:0 0 0 1px rgba(0,0,0,.6) inset,0 24px 80px rgba(0,0,0,.6);animation:nBoot .5s ease-out both;}
@keyframes nBoot{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.nerv-panel .nb{position:absolute;width:22px;height:22px;border:2px solid var(--n-amber);opacity:.85;filter:drop-shadow(0 0 6px var(--n-amber-glow));}
.nerv-panel .nb.tl{top:-1px;left:-1px;border-right:0;border-bottom:0;}
.nerv-panel .nb.tr{top:-1px;right:-1px;border-left:0;border-bottom:0;}
.nerv-panel .nb.bl{bottom:-1px;left:-1px;border-right:0;border-top:0;}
.nerv-panel .nb.br{bottom:-1px;right:-1px;border-left:0;border-top:0;}
.kl-statusline{font-family:var(--n-mono);font-size:10.5px;letter-spacing:.14em;font-weight:600;color:var(--n-green);text-transform:uppercase;display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;margin-bottom:14px;}
.kl-statusline .dot{width:7px;height:7px;border-radius:50%;background:var(--n-green);box-shadow:0 0 8px var(--n-green);animation:nBlink 1.4s steps(1,end) infinite;}
.kl-statusline .sep{color:var(--n-amber);opacity:.7;}
.kl-statusline .term{color:#9fb2c8;}
.kl-statusline .term b{color:var(--n-amber);font-weight:700;}
@keyframes nBlink{0%,60%{opacity:1}61%,100%{opacity:.15}}
.kl-title{font-size:30px;font-weight:900;line-height:1;letter-spacing:.16em;color:#f3f6fa;margin:2px 0 4px;text-align:center;text-shadow:0 0 18px rgba(255,122,26,.28);}
.kl-title .jp{color:var(--n-amber);letter-spacing:.06em;text-shadow:0 0 20px var(--n-amber-glow);}
.kl-titlecap{font-family:var(--n-mono);font-size:9.5px;letter-spacing:.42em;color:#6b7a8c;text-transform:uppercase;margin-bottom:14px;text-align:center;text-indent:.42em;}
.kl-hazard{width:100%;height:8px;margin:2px 0 14px;background:repeating-linear-gradient(45deg,#ff7a1a 0 12px,#0a0d12 12px 24px);opacity:.85;-webkit-mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);}
.kl-sub{font-family:var(--n-mono);font-size:12px;font-weight:700;letter-spacing:.2em;color:var(--n-amber);text-transform:uppercase;text-align:center;margin-bottom:22px;animation:nAuthBlink 1.8s ease-in-out infinite;}
@keyframes nAuthBlink{0%,100%{opacity:1}50%{opacity:.4}}
.kl-loading{color:#6b7a8c;font-size:13px;font-family:var(--n-mono);letter-spacing:.1em;}
#loginContent{width:100%;}  /* ⚠️これが無いとflex子要素として内容幅に縮み、PINグリッドが潰れて縦長になる */
.kl-pintitle{font-family:var(--n-mono);font-size:12px;font-weight:700;letter-spacing:.22em;color:#9fb2c8;text-transform:uppercase;margin-bottom:16px;text-align:center;}
#klNames{width:100%;}

/* ============ HELPERS ============ */
function tmin(hhmm){var p=String(hhmm).split(':');var h=parseInt(p[0]);if(h<6)h+=24;return h*60+(parseInt(p[1])||0);}
function fmtTime(hhmm){var p=String(hhmm).split(':');var h=parseInt(p[0]);return h>=24?('翌'+(h-24)+':'+p[1]):hhmm;}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

function parseKey(s){var p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
function dateLabel(s){var d=parseKey(s);var w=['日','月','火','水','木','金','土'][d.getDay()];return (d.getMonth()+1)+'/'+d.getDate()+'（'+w+'）';}
function shortNm(n){return n.replace('カウンター','カウ').replace('ボックス','BOX');}
function seatIdx(s){return SEATS.indexOf(s);}
function seatStatus(s){if(s.type==='W')return 'waiting';if(s.type==='K')return 'kurofuku';if(!s.casts||!s.casts.length)return s.cust?'nocast':'empty';if(s.casts.some(function(c){return c.status==='over';}))return 'over';if(s.casts.some(function(c){return c.status==='warn';}))return 'warn';return 'ok';}
function overMins(s){return -Math.min.apply(null,s.casts.map(function(c){return c.mins;}));}
function warnMin(s){return Math.min.apply(null,s.casts.filter(function(c){return c.status==='warn';}).map(function(c){return c.mins;}));}

/* ============ ALERT BAR ============ */
function nowBizMin(){var n=new Date();var h=n.getHours();if(h<6)h+=24;return h*60+n.getMinutes();}
// 同伴予約は20:30来店として扱う（顧客名に「同伴」を含む予約が対象）
function rsvArrT(r){return /同伴/.test((r.cust||r.customer||'')+' '+(r.time||''))?'20:30':(r.time||'');}
// 遅延分は「表示中の営業日(curDate)の予約時刻」からの実経過で測る。nowBizMin()だけで
// 測ると、深夜0〜6時に翌営業日を表示した際、未来の予約が「◯分超過」と誤検知される
// （例: 00:09に翌7/20を表示すると20:30予約が219分超過と出た）。0〜5時の予約は営業日の翌暦日。
function rsvLateMin(r){var hhmm=rsvArrT(r);var p=String(hhmm).split(':');var h=parseInt(p[0]);if(isNaN(h))return NaN;var mi=parseInt(p[1])||0;var d=parseKey(curDate);if(h<6)d.setDate(d.getDate()+1);d.setHours(h,mi,0,0);return Math.round((Date.now()-d.getTime())/60000);}
function buildTimeline(){
  var t=[];
  // 今：来店予定を15分超過（確定・未来店）→ 担当に来店確認（赤点滅）
  RSV.forEach(function(r){ if(r.status!=='確定')return; var late=rsvLateMin(r); if(late>=15) t.push({g:0,kind:'now-crit',blink:true,ic:'🕘',time:'今',min:-1000-late,title:r.cust+'様 来店'+late+'分超過',sub:(r.tantou?'担当 '+r.tantou+' に来店確認':'担当に来店確認')+'（'+rsvArrT(r)+'予約）',act:'editRsv('+r.id+')'}); });
  // 今：超過
  SEATS.forEach(function(s,idx){
    var st=seatStatus(s);
    if(st==='over') t.push({g:0,kind:'now-crit',ic:'🔴',time:'今',min:-overMins(s),title:s.floor+' '+shortNm(s.name)+' '+s.cust,sub:overMins(s)+'分超過',act:'openSeat('+idx+')'});
  });
  // 今：付け回し要
  ROT.forEach(function(c){if(!isMulti(c))return;var w=worstWait(c),iv=rotInterval(c);if(w&&(w.alert||(w.wait||0)>=iv))t.push({g:1,kind:'now-rot',ic:'🔄',time:'今',min:-(w.wait||0),title:c.cast+' → '+w.key+' '+w.cust,sub:'抜けて'+(w.wait||0)+'分・付け回し',act:'switchRight(\'rot\')'});});
  // まもなく：超過が近い席
  SEATS.forEach(function(s,idx){if(seatStatus(s)==='warn')t.push({g:2,kind:'soon',ic:'⏰',time:'まもなく',min:warnMin(s),title:s.floor+' '+shortNm(s.name)+' '+s.cust,sub:'あと'+warnMin(s)+'分で超過',act:'openSeat('+idx+')'});});
  // 予告：席未定の予約（時刻までに席決定）※30分超過は上の対応チケットへ
  RSV.forEach(function(r){if(r.status==='確定'&&r.table==='未定'&&rsvLateMin(r)<15)t.push({g:3,kind:'todo',ic:'📌',time:rsvArrT(r),min:tmin(rsvArrT(r)),title:r.cust+'様('+r.pax+'名)',sub:'席未定 → 席を決定',act:'editRsv('+r.id+')'});});
  // 予告：来店予定（📅）は要対応から撤去（クラッタ削減・ユーザー要望 2026-07-09）。15分超過すると上の来店確認チケットに出る。
  // 予告：キャスト早上がり（実シフトデータ由来）
  SHIFT.forEach(function(s){if(s.hayaagari)t.push({g:3,kind:'preview-cast',ic:'🚪',time:s.hayaagari,min:tmin(s.hayaagari),title:s.name+' 早上がり',sub:'担当の引き継ぎ準備を',act:'switchRight(\'shift\')'});});
  // 予告：送り予定チケットは撤去（送り管理ボード/LINE送りサマリで十分・要対応キューの水増し防止 2026-07-08）
  t.sort(function(a,b){return a.g!==b.g?a.g-b.g:(a.min||0)-(b.min||0);});
  return t;
}

function setViewMode(m){

function hvPhaseBar(cur){

   +'<div class="hv-auto">'+(homePhaseOverride?'手動表示中・<span style="color:var(--accent)" onclick="setHomePhase(\'\')">時刻の自動判定に戻す</span>':'⏱ 時刻から自動表示中（タブで切替できます）')+'</div>';

function renderHomeMid(){
  var tl=buildTimeline();
  var now=tl.filter(function(x){return x.g<=1;});
  var soon=tl.filter(function(x){return x.g>=2;});
  var q=(TASKS||[]);
  var h='', nowN=q.length+now.length;
  if(nowN){
    h+='<div class="hv-sec urgent"><span class="st">🚨 今すぐ</span><span class="cnt">'+nowN+'件</span></div>';
    h+=q.map(function(t){
      if(t.type==='admin')return hvCard({ic:t.icon||'📋',title:t.title,sub:'タップで詳細・完了',act:'showTaskDetail(\''+jsStr(t.id)+'\')'},'call',false);
      if(t.type==='feerenew')return hvCard({ic:t.icon||'💳',title:t.title,sub:'タップで反映／却下',act:'showFeeRenewDetail(\''+jsStr(t.id)+'\')'},'call',false);
      return hvCard({ic:t.icon||'🔔',title:t.title,sub:t.type==='call'?(t.sub||'席へ'):'タップで完了',act:'completeTask(\''+jsStr(t.id)+'\',event)'},'call',false);
    }).join('');
    h+=now.map(function(x){return hvCard(x,x.kind==='now-rot'?'rot':'crit',true);}).join('');
  }
  if(soon.length){
    h+='<div class="hv-sec soon"><span class="st">⏰ まもなく</span><span class="cnt">'+soon.length+'件</span></div>';
    h+=soon.map(function(x){return hvCard(x,'soon',true);}).join('');
  }
  if(!nowN&&!soon.length){
    h+='<div class="hv-clear"><div class="em">🍸</div><div class="t">対応待ちなし</div><div class="s">順調です。フロアを見ましょう</div></div>';
  }
  var rotN=ROT.filter(needsAction).length;
  var undecided=RSV.filter(function(r){return r.status==='確定'&&r.table==='未定';}).length;
  h+='<div class="hv-sec q"><span class="st">開く</span></div>';
  h+='<div class="hv-quick">'
    +'<div class="hv-qbtn hot" onclick="gotoDash(\'rot\')"><span class="em">🔄</span><div class="t">付け回し'+(rotN?'<span class="bg">'+rotN+'</span>':'')+'</div></div>'
    +'<div class="hv-qbtn" onclick="gotoDash(\'\')"><span class="em">🪑</span><div class="t">ホール</div></div>'
    +'<div class="hv-qbtn" onclick="gotoDash(\'rsv\')"><span class="em">📋</span><div class="t">予約'+(undecided?'<span class="bg">'+undecided+'</span>':'')+'</div></div>'
    +'</div>';
  var occ=SEATS.filter(function(s){var st=seatStatus(s);return st==='ok'||st==='warn'||st==='over'||st==='nocast';}).length;
  var emptyN=SEATS.filter(function(s){return seatStatus(s)==='empty';}).length;
  var working=(WORKCASTS!=null&&WORKCASTS.length!=null)?WORKCASTS.length:(SHIFT?SHIFT.length:0);
  h+='<div class="hv-mini">'
    +'<div class="hv-mstat"><div class="n">'+occ+'</div><div class="l">進行中の卓</div></div>'
    +'<div class="hv-mstat"><div class="n">'+emptyN+'</div><div class="l">空き卓</div></div>'
    +'<div class="hv-mstat"><div class="n">'+working+'</div><div class="l">出勤</div></div>'
    +'</div>';
  return h;
}
function renderHomeChecklist(phase){
  var list=(HOME_LISTS[phase]||[]).slice();
  if(phase==='post'&&CLOSING_TASKS==null&&IS_GAS)loadChecklistConfig();
  // 閉店の追加タスク（コンソール編集・設定から）＝チェックオフ式。システム機能4つの後ろに並べる
  if(phase==='post'&&CLOSING_TASKS&&CLOSING_TASKS.length){
    CLOSING_TASKS.forEach(function(t){ list.push({id:t.id,em:'🪧',t:t.label,s:t.sub||'',act:"toggleHomeCheck('"+t.id+"')"}); });
  }
  var doneN=list.filter(homeItemDone).length, total=list.length;
  var pct=total?Math.round(doneN/total*100):0;
  var label=phase==='pre'?'開店前の準備':'閉店の締め処理';
  var cd='';
  if(phase==='pre'){var left=PH_OPEN_MIN-nowBizMin();if(left>0&&left<=180)cd='開店まで '+left+'分';}
  var h='<div class="hv-prog"><div class="big">'+doneN+'<span style="font-size:14px;color:var(--dim)">/'+total+'</span></div>'
    +'<div style="flex:1"><div class="lbl">'+label+'</div><div class="hv-pbar" style="margin-top:6px"><i style="width:'+pct+'%"></i></div></div>'
    +(cd?'<div class="hv-cd">'+cd+'</div>':'')+'</div>';
  var todo=list.filter(function(it){return !homeItemDone(it);});
  var fin=list.filter(homeItemDone);
  if(todo.length){
    h+='<div class="hv-sec todo"><span class="st">'+(phase==='pre'?'🌅':'🌙')+' やること</span><span class="cnt">残り '+todo.length+'</span></div>';
    h+=todo.map(hvChk).join('');
  }else{
    h+='<div class="hv-clear"><div class="em">✅</div><div class="t">'+label+' 完了</div><div class="s">お疲れさまです</div></div>';
  }
  if(fin.length){
    h+='<div class="hv-sec done"><span class="st">✓ 完了</span><span class="cnt">'+fin.length+'</span></div>';
    h+=fin.map(hvChk).join('');
  }
  return h;
}

/* ===== ⏱ 出退勤の打刻 =====
   時刻はサーバが採る＝端末の時計ズレを持ち込まない（フロントから時刻を送ってはいけない）。
   未打刻のときだけ大きく出し、済んだら1行に畳む＝申し送りを押しのけない。 */
var PUNCH=null, _pnLoading=false, _pnBusy=false;
function loadPunch(){
  if(!IS_GAS){ PUNCH={bizDate:'(ローカル)',me:{name:LOGIN||'テスト',in:'',out:'',plan:'18:00～26:00'},list:[]}; if(viewMode==='home')renderHome(); return; }
  if(_pnLoading)return; _pnLoading=true;
  gsr('gunshiPunchStatus',LOGIN||'').then(function(r){
    _pnLoading=false; PUNCH=r||{error:true}; if(viewMode==='home')renderHome();
  }).catch(function(){
    // ⚠️エラーでもフラグとPUNCHを必ず埋める＝「読み込み中…」で永久に固まらせない
    _pnLoading=false; PUNCH={error:true}; if(viewMode==='home')renderHome();
  });
}
function pnKey_(s){ return String(s==null?'':s).replace(/[\s　]/g,''); }
function fmtStartDate_(s){ var m=String(s||'').match(/^(\d{4})-(\d{2})-(\d{2})/); return m?(parseInt(m[2],10)+'月'+parseInt(m[3],10)+'日'):(s||'8月1日'); }
function punchCardHtml(){
  if(!PUNCH) return '<div class="pn-card"><div class="pn-mini">⏱ 打刻を読み込み中…</div></div>';
  if(PUNCH.error) return '<div class="pn-card"><div class="pn-mini">⏱ 打刻の状態を取得できませんでした<button class="pn-re" onclick="loadPunch()">再試行</button></div></div>';
  var me=PUNCH.me;
  if(!me||me.exempt) return '';   // 管理者・テストは打刻対象外＝カードごと出さない
  // 制度開始前は予告カード＝打刻ボタンを出さない（サーバのbeforeStart判定＝端末時計に依存しない）
  if(PUNCH.beforeStart){
    var sd=fmtStartDate_(PUNCH.startDate);
    return '<div class="pn-card"><div class="pn-head"><span class="pn-t">🗓 出退勤の打刻は '+sd+' から</span></div>'
      +'<span class="pn-oth">'+sd+'より、このカードの出勤・退勤ボタンで打刻します。それまで操作は不要です。</span></div>';
  }
  var others=(PUNCH.list||[]).filter(function(s){ return pnKey_(s.name)!==pnKey_(me.name); });
  var yet=others.filter(function(s){ return !s.in; }).length;
  var sub=others.length?('<span class="pn-oth">他の黒服 '+(others.length-yet)+'/'+others.length+' 出勤済み</span>'):'';
  var plan=me.plan?'<span class="pn-plan">予定 '+esc(me.plan)+'</span>':'';
  if(!me.in){
    return '<div class="pn-card pn-in"><div class="pn-head"><span class="pn-t">⏱ 出勤の打刻</span>'+plan+'</div>'
      +'<button class="pn-btn go"'+(_pnBusy?' disabled':'')+' onclick="doPunch(\'出勤\')">🟢 出勤</button>'+sub+'</div>';
  }
  if(!me.out){
    return '<div class="pn-card"><div class="pn-mini"><span class="pn-dot">●</span>'+esc(me.in)+' 出勤中'+plan+'</div>'
      +'<button class="pn-btn out"'+(_pnBusy?' disabled':'')+' onclick="doPunch(\'退勤\')">🔴 退勤</button>'+sub+'</div>';
  }
  return '<div class="pn-card pn-done"><div class="pn-mini">⏱ 本日 '+esc(me.in)+' 〜 '+esc(me.out)+' 打刻済み</div></div>';
}
function doPunch(type){
  if(_pnBusy)return;
  if(!IS_GAS){ alert('ローカルでは打刻できません'); return; }
  if(type==='退勤'&&!confirm('退勤を打刻します。よろしいですか？'))return;
  _pnBusy=true; if(viewMode==='home')renderHome();
  gsr('gunshiPunch',LOGIN||'',type).then(function(r){
    _pnBusy=false;
    if(!r||!r.ok){ alert('⚠️ '+((r&&r.error)||'打刻できませんでした')); loadPunch(); return; }
    var msg='✅ '+r.type+'を記録しました（'+r.time+'）';
    if(r.lateMin>0) msg+='\n\n⚠️ 予定 '+r.plan+' に対して '+r.lateMin+'分の遅刻として記録されます。\nやむを得ない事情があった場合は責任者に申告してください。';
    if(r.earlyMin>0) msg+='\n\n⚠️ 予定 '+r.plan+' より '+r.earlyMin+'分早い退勤です。';
    alert(msg); loadPunch();
  }).catch(function(){ _pnBusy=false; alert('⚠️ 通信に失敗しました。もう一度お試しください'); loadPunch(); });
}

/* ===== 📋 黒服 日次申し送り（引き継ぎボード）===== */
var HANDOVER=null, _hoLoading=false;
function loadHandover(){
  if(!IS_GAS){ HANDOVER={memo:'（ローカル）申し送りは本番のみ',todos:[]}; if(viewMode==='home')renderHome(); return; }
  if(_hoLoading)return; _hoLoading=true;
  gsr('gunshiGetHandover').then(function(r){ _hoLoading=false; HANDOVER=r||{memo:'',todos:[]}; if(viewMode==='home')renderHome(); })
    .catch(function(){ _hoLoading=false; });
}
function handoverCardHtml(){
  if(!HANDOVER){ return '<div class="ho-card"><div class="ho-head">📋 今日の申し送り</div><div class="ho-loading">読み込み中…</div></div>'; }
  var memo=(HANDOVER.memo||'').trim();
  var todos=HANDOVER.todos||[];
  var open=todos.filter(function(t){return !t.done;}).length;
  var todoHtml=todos.map(function(t){
    return '<div class="ho-t'+(t.done?' done':'')+'" onclick="toggleHandoverTodo(\''+esc(String(t.id))+'\')">'
      +'<span class="ho-box">'+(t.done?'☑':'☐')+'</span><span class="ho-tx">'+esc(t.text)+'</span>'
      +(t.carried?'<span class="ho-carry">昨日から</span>':'')+'</div>';
  }).join('');
  var body='';
  if(memo) body+='<div class="ho-memo">'+esc(memo).replace(/\n/g,'<br>')+'</div>';
  if(todos.length) body+='<div class="ho-sec">今日やること<span class="ho-cnt">残り '+open+'</span></div>'+todoHtml;
  if(!memo && !todos.length) body='<div class="ho-empty">まだ申し送りはありません。<br>閉店時などに「✍️書く/編集」で残してください。</div>';
  return '<div class="ho-card"><div class="ho-head"><span>📋 今日の申し送り</span>'
    +'<button class="ho-edit" onclick="openHandoverEdit()">✍️ 書く/編集</button></div>'+body+'</div>';
}
function toggleHandoverTodo(id){
  if(!HANDOVER||!HANDOVER.todos)return;
  var hit=HANDOVER.todos.filter(function(t){return String(t.id)===String(id);})[0];
  if(!hit)return;
  hit.done=!hit.done;
  if(viewMode==='home')renderHome();
  saveHandoverNow_();
}
function saveHandoverNow_(){
  if(!IS_GAS||!HANDOVER)return;
  gsr('gunshiSaveHandover',{memo:HANDOVER.memo||'',todos:HANDOVER.todos||[],by:LOGIN||''})
    .then(function(r){ if(r&&r.todos){HANDOVER=r; if(viewMode==='home')renderHome();} }).catch(function(){});
}
function hoEditRow_(t){
  t=t||{}; var id=t.id||('t'+Date.now()+Math.floor(Math.random()*1000));
  return '<div class="ho-erow" data-id="'+esc(String(id))+'">'
    +'<input type="checkbox" class="ho-eck"'+(t.done?' checked':'')+'>'
    +'<input type="text" class="ho-etx" value="'+esc(t.text||'')+'" placeholder="やること">'
    +'<button class="ho-del" onclick="this.parentNode.remove()">×</button></div>';

function hoAddRow(){ var c=document.getElementById('ho-todos'); if(c)c.insertAdjacentHTML('beforeend',hoEditRow_({})); }
function openHandoverEdit(){
  var h=HANDOVER||{memo:'',todos:[]};

  var html='<div class="ho-ed">'
    +'<label class="ho-lbl">メモ（今日の出来事・注意点・共有）</label>'

function saveHandoverEdit(){
  var memo=((document.getElementById('ho-memo')||{}).value||'');
  var todos=[].slice.call(document.querySelectorAll('#ho-todos .ho-erow')).map(function(row){
    var tx=((row.querySelector('.ho-etx')||{}).value||'').trim();
    return {id:row.getAttribute('data-id'),text:tx,done:!!(row.querySelector('.ho-eck')||{}).checked,carried:false};
  }).filter(function(t){return t.text;});
  if(!IS_GAS){ HANDOVER={memo:memo,todos:todos}; closeSheet(); if(viewMode==='home')renderHome(); return; }
  gsr('gunshiSaveHandover',{memo:memo,todos:todos,by:LOGIN||''}).then(function(r){
    HANDOVER=r||{memo:memo,todos:todos}; closeSheet(); if(viewMode==='home')renderHome(); toast('申し送りを保存しました');
  }).catch(function(){ toast('保存に失敗しました',true); });
}

  // 開店前やること（2F/5F別・同期）
