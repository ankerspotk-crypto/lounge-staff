<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>シフト提出</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #0d0d14; color: #fff; min-height: 100vh; }

header { background: #16162a; padding: 14px 16px; border-bottom: 1px solid #2a2a40; position: sticky; top: 0; z-index: 10; }
header h1 { font-size: 17px; font-weight: 600; }
.sub { font-size: 12px; color: #888; margin-top: 3px; min-height: 16px; }

.month-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 8px; }
.month-label { font-size: 16px; font-weight: 600; }
.nav-btn { background: #2a2a40; border: none; color: #ccc; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

.calendar { padding: 0 12px 12px; }
.weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 4px; }
.weekday { font-size: 11px; color: #555; padding: 4px 0; }
.weekday.sun { color: #884444; }
.weekday.sat { color: #445588; }

.days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; border: 1px solid transparent; padding: 2px; }
.day .num { font-size: 14px; font-weight: 500; line-height: 1; }
.day .time-tag { font-size: 8px; color: #88ccff; margin-top: 2px; line-height: 1.1; text-align: center; overflow: hidden; max-width: 100%; }
.day.empty { pointer-events: none; }
.day.past { opacity: 0.25; pointer-events: none; }
.day.sun .num { color: #cc6666; }
.day.sat .num { color: #6688cc; }
.day.today .num { color: #ffdd44; font-weight: 700; }
.day.selected { background: #152a40; border-color: #3377bb; }
.day.selected .num { color: #88ccff; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 50; }
.overlay.show { display: flex; align-items: flex-end; }
.picker { background: #16162a; border-radius: 18px 18px 0 0; width: 100%; padding: 18px 16px 36px; border-top: 1px solid #2a2a40; }
.picker-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #aaccff; }
.time-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.time-opt { background: #1e1e30; border: 1px solid #2a2a44; color: #ccc; padding: 13px 8px; border-radius: 10px; font-size: 14px; text-align: center; cursor: pointer; -webkit-appearance: none; }
.time-opt:active { background: #252540; }
.time-opt.off { color: #cc6666; border-color: #3a2020; background: #1a1010; }
.picker-cancel { margin-top: 10px; width: 100%; background: none; border: 1px solid #2a2a3a; color: #666; padding: 12px; border-radius: 10px; font-size: 14px; cursor: pointer; -webkit-appearance: none; }

.submit-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #13131f; border-top: 1px solid #2a2a40; padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
.count-label { text-align: center; font-size: 12px; color: #666; margin-bottom: 8px; }
.submit-btn { width: 100%; background: #1a5a30; border: none; color: #88eebb; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; -webkit-appearance: none; }
.submit-btn:disabled { background: #1a1a2a; color: #444; cursor: default; }
.submit-btn:active:not(:disabled) { background: #1f6e3a; }
.bottom-space { height: 90px; }

.result { padding: 60px 24px; text-align: center; }
.result .icon { font-size: 52px; margin-bottom: 16px; }
.result h2 { font-size: 20px; margin-bottom: 10px; }
.result p { font-size: 13px; color: #888; line-height: 1.8; }

#loading { text-align: center; padding: 80px 20px; color: #666; font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>シフト提出</h1>
  <div class="sub" id="user-name"></div>
</header>

<div id="main"><div id="loading">読み込み中...</div></div>

<div class="overlay" id="overlay">
  <div class="picker">
    <div class="picker-title" id="picker-title"></div>
    <div class="time-grid" id="time-grid"></div>
    <button class="picker-cancel" onclick="closePicker()">キャンセル</button>
  </div>
</div>

<div class="submit-bar" id="submit-bar" style="display:none">
  <div class="count-label" id="count-label">0日選択中</div>
  <button class="submit-btn" id="submit-btn" disabled onclick="doSubmit()">シフトを提出する</button>
</div>

<script>
var LIFF_ID  = '2010376677-Y4qexCIH';
var GAS_URL  = 'https://script.google.com/macros/s/AKfycbxG4IdWtMdU-81wfQUvTg6nYqKboK9wWB-XcfFYI8w0KRUrSpZmwJyb9jBYuMUP5K1q4g/exec';

var userId   = '';
var selected = {};
var activeKey = null;
var viewYear, viewMonth;

var TIMES = [
  { label: '19:00〜24:00', val: '19:00~24:00' },
  { label: '20:00〜24:00', val: '20:00~24:00' },
  { label: '21:00〜24:00', val: '21:00~24:00' },
  { label: '19:00〜23:00', val: '19:00~23:00' },
  { label: '20:00〜23:00', val: '20:00~23:00' },
  { label: '22:00〜24:00', val: '22:00~24:00' },
  { label: '休み（削除）', val: 'OFF', off: true }
];

// LIFF初期化
liff.init({ liffId: LIFF_ID })
  .then(function() {
    if (!liff.isLoggedIn()) { liff.login(); return; }
    return liff.getProfile();
  })
  .then(function(p) {
    if (!p) return;
    userId = p.userId;
    document.getElementById('user-name').textContent = p.displayName;
    var now = new Date();
    viewYear = now.getFullYear();
    viewMonth = now.getMonth();
    render();
  })
  .catch(function(e) {
    document.getElementById('loading').innerHTML =
      '<p style="color:#cc5555">エラー: ' + (e && e.message || JSON.stringify(e)) + '</p>';
  });

function render() {
  document.getElementById('main').innerHTML = navHtml() + calHtml();
  document.getElementById('submit-bar').style.display = 'block';
  updateBar();
  document.querySelectorAll('.day[data-key]').forEach(function(el) {
    el.addEventListener('click', function() { openPicker(this.dataset.key); });
  });
}

function navHtml() {
  return '<div class="month-nav">'
    + '<button class="nav-btn" onclick="shiftM(-1)">‹</button>'
    + '<div class="month-label">' + viewYear + '年' + (viewMonth+1) + '月</div>'
    + '<button class="nav-btn" onclick="shiftM(1)">›</button>'
    + '</div>';
}

function calHtml() {
  var today = new Date(); today.setHours(0,0,0,0);
  var firstWday = new Date(viewYear, viewMonth, 1).getDay();
  var days = new Date(viewYear, viewMonth+1, 0).getDate();
  var WD = ['日','月','火','水','木','金','土'];

  var h = '<div class="calendar"><div class="weekdays">'
    + WD.map(function(d,i){ return '<div class="weekday'+(i===0?' sun':i===6?' sat':'')+'">'+d+'</div>'; }).join('')
    + '</div><div class="days">';

  for (var i=0; i<firstWday; i++) h += '<div class="day empty"></div>';
  for (var d=1; d<=days; d++) {
    var dt = new Date(viewYear, viewMonth, d); dt.setHours(0,0,0,0);
    var w = dt.getDay();
    var key = (viewMonth+1)+'/'+d;
    var past = dt < today, isToday = dt.getTime()===today.getTime(), sel = selected[key];
    var cls = 'day'+(past?' past':'')+(isToday?' today':'')+(w===0?' sun':w===6?' sat':'')+(sel?' selected':'');
    h += '<div class="'+cls+'" '+(past?'':'data-key="'+key+'"')+'>'
       + '<div class="num">'+d+'</div>'
       + (sel?'<div class="time-tag">'+sel+'</div>':'')
       + '</div>';
  }
  h += '</div></div><div class="bottom-space"></div>';
  return h;
}

function shiftM(d) {
  viewMonth += d;
  if (viewMonth>11){viewMonth=0;viewYear++;}
  if (viewMonth<0){viewMonth=11;viewYear--;}
  render();
}

function openPicker(key) {
  activeKey = key;
  document.getElementById('picker-title').textContent = key + ' の時間を選択';
  document.getElementById('time-grid').innerHTML = TIMES.map(function(t) {
    return '<button class="time-opt'+(t.off?' off':'')+'" onclick="pickTime(\''+t.val+'\')">'+t.label+'</button>';
  }).join('');
  document.getElementById('overlay').classList.add('show');
}

function pickTime(val) {
  if (val==='OFF') delete selected[activeKey]; else selected[activeKey] = val;
  closePicker(); render();
}

function closePicker() {
  document.getElementById('overlay').classList.remove('show');
  activeKey = null;
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target===this) closePicker();
});

function updateBar() {
  var n = Object.keys(selected).length;
  document.getElementById('count-label').textContent = n+'日選択中';
  document.getElementById('submit-btn').disabled = n===0;
}

function doSubmit() {
  var shifts = Object.keys(selected).sort().map(function(date) {
    return { date: date, time: selected[date] };
  });
  if (!shifts.length) return;

  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'submitShift', userId: userId, shifts: shifts })
  })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    if (res.ok) {
      document.getElementById('main').innerHTML =
        '<div class="result"><div class="icon">✅</div>'
        +'<h2>'+esc(res.name)+'さん</h2>'
        +'<p>シフトを提出しました</p>'
        +'<p style="margin-top:10px">'+res.written.join('　')+'</p>'
        +'</div>';
      document.getElementById('submit-bar').style.display = 'none';
    } else {
      alert('エラー: '+res.error);
      btn.disabled = false;
      btn.textContent = 'シフトを提出する';
    }
  })
  .catch(function(e) {
    alert('通信エラー。もう一度お試しください。');
    btn.disabled = false;
    btn.textContent = 'シフトを提出する';
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
