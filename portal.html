<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>マイページ</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #0d0d14; color: #fff; min-height: 100vh; }

header {
  background: #16162a; padding: 14px 16px 0;
  border-bottom: 1px solid #2a2a40; position: sticky; top: 0; z-index: 10;
}
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
header h1 { font-size: 17px; font-weight: 600; }
.user-name { font-size: 13px; color: #aaa; }

.tabs { display: flex; gap: 4px; }
.tab {
  flex: 1; padding: 10px 4px; text-align: center; font-size: 13px; font-weight: 500;
  border-bottom: 2px solid transparent; cursor: pointer; color: #666;
}
.tab.active { color: #88aaff; border-bottom-color: #88aaff; }

.content { padding: 16px; }

.loading { text-align: center; color: #666; padding: 60px 0; font-size: 14px; }
.err { text-align: center; color: #cc5555; padding: 40px 16px; font-size: 14px; line-height: 1.7; }
.err small { color: #777; font-size: 11px; }

/* month selector */
.month-bar {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 16px;
  scrollbar-width: none;
}
.month-bar::-webkit-scrollbar { display: none; }
.month-chip {
  flex-shrink: 0; padding: 5px 14px; border-radius: 20px; font-size: 13px;
  background: #1e1e30; border: 1px solid #2a2a40; color: #999; cursor: pointer;
}
.month-chip.active { background: #1a2a4a; border-color: #3366cc; color: #88aaff; }

/* card */
.card {
  background: #16162a; border: 1px solid #2a2a40; border-radius: 12px;
  padding: 16px; margin-bottom: 12px;
}
.card-title { font-size: 12px; color: #666; margin-bottom: 10px; letter-spacing: .5px; }
.row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #1e1e2a; }
.row:last-child { border-bottom: none; }
.row-label { font-size: 13px; color: #999; }
.row-val { font-size: 14px; font-weight: 500; }
.row-val.accent { color: #88ffcc; }
.row-val.sub { color: #cc8844; }
.row-val.minus { color: #cc5555; }

.total-card {
  background: #101828; border: 1px solid #2244aa; border-radius: 12px;
  padding: 18px; text-align: center; margin-bottom: 16px;
}
.total-label { font-size: 12px; color: #5588cc; margin-bottom: 6px; }
.total-val { font-size: 28px; font-weight: 700; color: #88aaff; }

/* シフトカレンダー */
.shift-month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.shift-month-label { font-size: 16px; font-weight: 600; }
.nav-btn {
  background: #2a2a40; border: none; color: #ccc;
  width: 36px; height: 36px; border-radius: 50%; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 4px; }
.weekday { font-size: 11px; color: #555; padding: 4px 0; }
.weekday.sun { color: #884444; }
.weekday.sat { color: #445588; }
.days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.day {
  aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; border-radius: 8px; cursor: pointer;
  border: 1px solid transparent; padding: 2px;
}
.day .num { font-size: 14px; font-weight: 500; line-height: 1; }
.day .shift-dot { width: 6px; height: 6px; border-radius: 50%; background: #88aaff; margin-top: 4px; }
.day.empty { pointer-events: none; }
.day.past { opacity: 0.3; pointer-events: none; }
.day.sun .num { color: #cc6666; }
.day.sat .num { color: #6688cc; }
.day.today .num { color: #ffdd44; font-weight: 700; }
.day.selected { background: #152a40; border-color: #3377bb; }
.day.selected .num { color: #88ccff; }
.day.selected .shift-dot { background: #88ffcc; }

/* picker overlay */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 50; }
.overlay.show { display: flex; align-items: flex-end; }
.picker { background: #16162a; border-radius: 18px 18px 0 0; width: 100%; padding: 18px 16px 36px; border-top: 1px solid #2a2a40; }
.picker-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #aaccff; }
.time-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.time-opt {
  background: #1e1e30; border: 1px solid #2a2a44; color: #ccc;
  padding: 13px 8px; border-radius: 10px; font-size: 14px; text-align: center;
  cursor: pointer;
}
.time-opt:active, .time-opt.chosen { background: #1a2a4a; border-color: #3366cc; color: #88aaff; }
.time-opt.off { color: #cc6666; border-color: #3a2020; background: #1a1010; }
.time-opt.full { grid-column: span 2; background: #1a3020; border-color: #336644; color: #88ffaa; font-weight: 600; }
.time-opt.full:active { background: #1e3a26; }
.picker-step { font-size: 11px; color: #666; margin-bottom: 10px; }
.picker-back {
  width: 100%; background: none; border: 1px solid #2a2a3a;
  color: #6688aa; padding: 10px; border-radius: 10px; font-size: 13px; cursor: pointer;
  margin-bottom: 10px;
}
.picker-cancel {
  margin-top: 10px; width: 100%; background: none; border: 1px solid #2a2a3a;
  color: #666; padding: 12px; border-radius: 10px; font-size: 14px; cursor: pointer;
}

.submit-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #16162a; border-top: 1px solid #2a2a40; padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
}
.submit-btn {
  width: 100%; background: #2244aa; border: none; color: #fff;
  padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600;
  cursor: pointer;
}
.submit-btn:active { background: #1a337f; }
.submit-btn:disabled { background: #2a2a3a; color: #555; }
.shift-spacer { height: 80px; }

/* 管理者キャスト選択 */
.admin-bar {
  background: #1a1a2e; border-bottom: 1px solid #2a2a40;
  padding: 10px 16px; display: flex; align-items: center; gap: 10px;
}
.admin-label { font-size: 12px; color: #888; white-space: nowrap; }
.cast-select {
  flex: 1; background: #2a2a40; border: 1px solid #3a3a55; color: #ccc;
  padding: 8px 12px; border-radius: 8px; font-size: 14px;
  -webkit-appearance: none; appearance: none;
}
.cast-select:focus { outline: none; border-color: #5566aa; }
.admin-badge { font-size: 10px; background: #553300; color: #ffaa44; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
.shift-count { text-align: center; font-size: 13px; color: #666; margin-top: 10px; }

/* 申請管理 */
.req-card { background: #16162a; border: 1px solid #2a2a40; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.req-card.approved { border-color: #336633; }
.req-card.rejected { border-color: #663333; opacity: .6; }
.req-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.req-name { font-size: 15px; font-weight: 600; }
.req-time { font-size: 12px; color: #666; }
.req-detail { font-size: 14px; color: #aac; margin-bottom: 10px; }
.req-actions { display: flex; gap: 8px; }
.req-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
.req-btn.approve { background: #1a3a22; color: #88ffaa; border: 1px solid #336633; }
.req-btn.reject  { background: #3a1a1a; color: #ffaa88; border: 1px solid #663333; }
.req-btn.approve:active { background: #1e4228; }
.req-btn.reject:active  { background: #421e1e; }
.req-status { text-align: center; font-size: 13px; padding: 6px 0; }
.req-status.ok  { color: #88ffaa; }
.req-status.off { color: #ff8866; }
.req-empty { text-align: center; color: #555; padding: 40px 0; font-size: 14px; }
.req-filter { display: flex; gap: 6px; margin-bottom: 14px; }
.req-filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid #2a2a40; background: #1e1e30; color: #888; font-size: 13px; cursor: pointer; }
.req-filter-btn.active { background: #1a2a4a; border-color: #3366cc; color: #88aaff; }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <h1>マイページ</h1>
    <span class="user-name" id="user-name">読み込み中...</span>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-sales" onclick="switchTab('sales')">売上明細</div>
    <div class="tab" id="tab-pay" onclick="switchTab('pay')">給与明細</div>
    <div class="tab" id="tab-shift" onclick="switchTab('shift')">シフト提出</div>
    <div class="tab" id="tab-requests" onclick="switchTab('requests')" style="display:none">申請管理</div>
  </div>
</header>

<div class="content" id="content">
  <div class="loading">読み込み中...</div>
</div>

<div class="overlay" id="picker-overlay" onclick="closePicker()">
  <div class="picker" onclick="event.stopPropagation()">
    <div class="picker-title" id="picker-title"></div>
    <div class="time-grid" id="picker-grid"></div>
    <button class="picker-cancel" onclick="closePicker()">キャンセル</button>
  </div>
</div>

<div class="submit-bar" id="submit-bar" style="display:none">
  <button class="submit-btn" id="submit-btn" onclick="doSubmit()">シフトを提出する</button>
  <div class="shift-count" id="shift-count"></div>
</div>

<script>
var LIFF_ID = '2010376677-EDF5MZuq';
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxG4IdWtMdU-81wfQUvTg6nYqKboK9wWB-XcfFYI8w0KRUrSpZmwJyb9jBYuMUP5K1q4g/exec';

var userId = '', userName = '', portalData = null;
var currentTab = 'sales', currentMonth = '';
var viewYear, viewMonth, shiftSelections = {};
var isAdmin = false, adminViewAs = '', adminCastList = [];

function fmt(n) {
  if (n === '' || n === null || n === undefined) return '—';
  var num = Number(String(n).replace(/,/g,''));
  if (isNaN(num)) return String(n);
  return num.toLocaleString('ja-JP') + '円';
}

// ---- LIFF init ----
var initTimer = setTimeout(function() {
  showErr('タイムアウト<br><small>LIFFが応答しませんでした</small>');
}, 12000);

try {
  liff.init({ liffId: LIFF_ID }).then(function() {
    clearTimeout(initTimer);
    if (!liff.isLoggedIn()) { liff.login(); return; }
    return liff.getProfile();
  }).then(function(p) {
    if (!p) return;
    userId   = p.userId;
    userName = p.displayName;
    document.getElementById('user-name').textContent = p.displayName;
    loadPortal();
  }).catch(function(e) {
    clearTimeout(initTimer);
    showErr('ログインエラー<br><small>' + (e && e.message || JSON.stringify(e)) + '</small>');
  });
} catch(e) {
  clearTimeout(initTimer);
  showErr('起動エラー: ' + e.message);
}

function loadPortal(month) {
  setContent('<div class="loading">データ取得中...</div>');
  var url = GAS_URL + '?action=portal&userId=' + encodeURIComponent(userId);
  if (month) url += '&month=' + encodeURIComponent(month);
  if (adminViewAs) url += '&viewAs=' + encodeURIComponent(adminViewAs);
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) {
        if (d.error === 'unregistered') {
          showErr('登録が見つかりません<br><small>グループLINEで #登録 名前 を送ってください</small>');
        } else {
          showErr('エラー: ' + d.error);
        }
        return;
      }
      // 管理者で castList が返ってきた場合 → キャスト選択画面を表示
      if (d.isAdmin && d.castList && !adminViewAs) {
        isAdmin = true;
        adminCastList = d.castList;
        showAdminPicker(d.castList);
        return;
      }
      isAdmin = d.isAdmin || false;
      if (isAdmin) showAdminTab();
      portalData = d;
      if (!currentMonth && d.months && d.months.length > 0) currentMonth = d.months[0];
      updateAdminBar(adminCastList);
      renderTab(currentTab);
    })
    .catch(function(e) {
      showErr('通信エラー<br><small>' + (e && e.message || '') + '</small>');
    });
}

function showAdminPicker(castList) {
  var sel = '<select class="cast-select" id="admin-cast-sel"><option value="">-- キャストを選択 --</option>';
  castList.forEach(function(n) { sel += '<option value="' + esc(n) + '">' + esc(n) + '</option>'; });
  sel += '</select>';
  setContent(
    '<div style="padding:24px 16px">'
    + '<div style="font-size:13px;color:#888;margin-bottom:14px">閲覧するキャストを選択</div>'
    + sel
    + '<button onclick="adminSelect()" style="margin-top:14px;width:100%;background:#2244aa;border:none;color:#fff;padding:14px;border-radius:10px;font-size:15px;cursor:pointer">表示</button>'
    + '</div>'
  );
}

function adminSelect() {
  var sel = document.getElementById('admin-cast-sel');
  if (!sel || !sel.value) return;
  adminViewAs = sel.value;
  currentMonth = '';
  // ヘッダーに管理者バーを追加
  if (!document.getElementById('admin-bar')) {
    var bar = document.createElement('div');
    bar.id = 'admin-bar';
    bar.className = 'admin-bar';
    bar.innerHTML = '<span class="admin-label">閲覧中:</span>'
      + '<select class="cast-select" id="admin-viewas-sel" onchange="adminChange(this.value)"></select>'
      + '<span class="admin-badge">管理者</span>';
    document.querySelector('header').insertAdjacentElement('afterend', bar);
    // ドロップダウンをキャスト一覧で埋める
    updateAdminBar(adminCastList);
  }
  loadPortal();
}

function adminChange(name) {
  if (!name) return;
  adminViewAs = name;
  currentMonth = '';
  portalData = null;
  loadPortal();
}

function updateAdminBar(castList) {
  var sel = document.getElementById('admin-viewas-sel');
  if (!sel || !castList) return;
  sel.innerHTML = '';
  castList.forEach(function(n) {
    var opt = document.createElement('option');
    opt.value = n; opt.textContent = n;
    if (n === adminViewAs) opt.selected = true;
    sel.appendChild(opt);
  });
}

function switchTab(tab) {
  currentTab = tab;
  ['sales','pay','shift','requests'].forEach(function(t) {
    var el = document.getElementById('tab-'+t);
    if (el) el.classList.toggle('active', t === tab);
  });
  document.getElementById('submit-bar').style.display = tab === 'shift' ? 'block' : 'none';
  if (tab === 'requests') { loadRequests(); return; }
  if (portalData) renderTab(tab);
}

function renderTab(tab) {
  if (tab === 'sales') renderSales();
  else if (tab === 'pay') renderPay();
  else if (tab === 'shift') renderShiftCal();
}

// 管理者タブを表示
function showAdminTab() {
  var el = document.getElementById('tab-requests');
  if (el) el.style.display = '';
}

// ---- 売上明細 ----
function renderSales() {
  if (!portalData) return;
  var months = portalData.months || [];
  var html = monthBar(months);

  if (months.length === 0) {
    html += '<div class="loading" style="color:#666">売上データがありません</div>';
    setContent(html);
    return;
  }

  var m = currentMonth;
  var d = (portalData.sales && portalData.sales[m]) ? portalData.sales[m] : null;

  if (!d) {
    html += '<div class="loading" style="color:#666">データがありません</div>';
    setContent(html);
    return;
  }

  var total = d['売上合計'] || d['担当小計'] || 0;
  html += '<div class="total-card">'
    + '<div class="total-label">売上合計</div>'
    + '<div class="total-val">' + fmt(total) + '</div>'
    + '</div>';

  html += '<div class="card"><div class="card-title">売上内訳</div>';
  var items = [
    ['担当売上', d['担当売上'] || d['担当小計']],
    ['同伴', d['同伴'] || d['同伴小計']],
    ['勤務日数', d['勤務日数'] ? d['勤務日数'] + '日' : '—'],
  ];
  items.forEach(function(it) {
    html += row(it[0], it[1] !== undefined ? (typeof it[1]==='string' ? it[1] : fmt(it[1])) : '—');
  });
  html += '</div>';

  html += '<div class="card"><div class="card-title">バック内訳</div>';
  var bkItems = [
    ['時間報酬', d['時間報酬']],
    ['担当バック', d['担当バック']],
    ['同伴バック', d['同伴バック']],
    ['ドリンクバック', d['ドリンクバック']],
    ['バック合計', d['バック合計'] || d['バック']],
  ];
  bkItems.forEach(function(it) {
    html += row(it[0], fmt(it[1]));
  });
  html += '</div>';

  if (d['ボーナス'] && Number(d['ボーナス']) > 0) {
    html += '<div class="card">' + row('ボーナス', fmt(d['ボーナス']), 'accent') + '</div>';
  }

  setContent(html);
}

// ---- 給与明細 ----
function renderPay() {
  if (!portalData) return;
  var months = portalData.months || [];
  var html = monthBar(months);

  if (months.length === 0) {
    html += '<div class="loading" style="color:#666">給与データがありません</div>';
    setContent(html);
    return;
  }

  var m = currentMonth;
  var d = (portalData.pay && portalData.pay[m]) ? portalData.pay[m] : null;

  if (!d) {
    html += '<div class="loading" style="color:#666">データがありません</div>';
    setContent(html);
    return;
  }

  var final = d['最終支給'] || 0;
  html += '<div class="total-card">'
    + '<div class="total-label">最終支給額</div>'
    + '<div class="total-val">' + fmt(final) + '</div>'
    + '</div>';

  html += '<div class="card"><div class="card-title">課税支給</div>';
  [
    ['時間報酬', d['時間報酬']],
    ['新バック', d['新バック'] || d['バック']],
    ['キャスト紹介料', d['キャスト紹介料'] || d['キャスト紹介料(手入力)']],
    ['課税支給計', d['課税支給']],
  ].forEach(function(it) {
    html += row(it[0], fmt(it[1]));
  });
  html += '</div>';

  html += '<div class="card"><div class="card-title">控除・加算</div>';
  [
    ['源泉徴収(10.21%)', d['源泉'] || d['源泉徴収'] || d['源泉徴収(10.21%)'], 'minus'],
    ['ヘアサロン立替', d['ヘアサロン立替'] || d['ヘアサロン立替(手入力)'], 'accent'],
  ].forEach(function(it) {
    var v = Number(String(it[1] || 0).replace(/,/g,''));
    if (v !== 0) html += row(it[0], fmt(it[1]), it[2]);
  });
  html += '</div>';

  setContent(html);
}

// ---- シフト提出 ----
function genTimes(startH, startM, endH, endM) {
  var list = [];
  for (var h = startH; h <= endH; h++) {
    for (var m = 0; m < 60; m += 30) {
      if (h === endH && m > endM) break;
      if (h === startH && m < startM) continue;
      list.push(h + ':' + (m === 0 ? '00' : '30'));
    }
  }
  return list;
}

function renderShiftCal() {
  var now = new Date();
  if (!viewYear) { viewYear = now.getFullYear(); viewMonth = now.getMonth(); }
  var html = calHtml();
  html += '<div class="shift-spacer"></div>';
  setContent(html);
  document.getElementById('submit-bar').style.display = 'block';
  updateSubmitBar();
}

function calHtml() {
  var today = new Date(); today.setHours(0,0,0,0);
  var firstWday = new Date(viewYear, viewMonth, 1).getDay();
  var daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  var WDAYS = ['日','月','火','水','木','金','土'];

  var h = '<div class="shift-month-nav">'
    + '<button class="nav-btn" onclick="shiftViewMonth(-1)">‹</button>'
    + '<div class="shift-month-label">' + viewYear + '年' + (viewMonth+1) + '月</div>'
    + '<button class="nav-btn" onclick="shiftViewMonth(1)">›</button>'
    + '</div>';
  h += '<div class="weekdays">'
    + WDAYS.map(function(d,i) {
        return '<div class="weekday'+(i===0?' sun':i===6?' sat':'')+'">'+d+'</div>';
      }).join('')
    + '</div><div class="days">';

  for (var i=0; i<firstWday; i++) h += '<div class="day empty"></div>';

  for (var d=1; d<=daysInMonth; d++) {
    var dt = new Date(viewYear, viewMonth, d); dt.setHours(0,0,0,0);
    var wday = dt.getDay();
    var key = (viewMonth+1)+'/'+d;
    var past = dt < today;
    var isToday = dt.getTime() === today.getTime();
    var sel = shiftSelections[key];
    var cls = 'day';
    if (wday===0) cls += ' sun';
    if (wday===6) cls += ' sat';
    if (past) cls += ' past';
    if (isToday) cls += ' today';
    if (sel) cls += ' selected';
    h += '<div class="'+cls+'" data-key="'+key+'" onclick="openPicker(\''+key+'\')">'
      + '<div class="num">'+d+'</div>'
      + (sel ? '<div class="shift-dot"></div>' : '')
      + '</div>';
  }
  h += '</div>';
  return h;
}

function shiftViewMonth(dir) {
  viewMonth += dir;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderShiftCal();
}

var pickerKey = '', pickerStart = '';

function openPicker(key) {
  pickerKey = key;
  pickerStart = '';
  showStartPicker();
  document.getElementById('picker-overlay').classList.add('show');
}

function showStartPicker() {
  document.getElementById('picker-title').textContent = pickerKey + ' のシフト';
  var g = document.getElementById('picker-grid');
  g.innerHTML = '<div class="picker-step">スタート時間を選択</div>';

  // フルボタン
  var full = document.createElement('button');
  full.className = 'time-opt full';
  full.textContent = 'フル　20:00 ～ 24:00';
  full.onclick = function() { pickTime(pickerKey, '20:00～24:00'); };
  g.appendChild(full);

  // スタート時間一覧
  genTimes(18, 0, 25, 30).forEach(function(t) {
    var btn = document.createElement('button');
    var cur = shiftSelections[pickerKey];
    btn.className = 'time-opt' + (cur && cur.indexOf(t + '～') === 0 ? ' chosen' : '');
    btn.textContent = t;
    btn.onclick = function() { selectStart(t); };
    g.appendChild(btn);
  });

  // クリアボタン
  if (shiftSelections[pickerKey]) {
    var off = document.createElement('button');
    off.className = 'time-opt off';
    off.style.gridColumn = 'span 2';
    off.textContent = 'クリア';
    off.onclick = function() { pickTime(pickerKey, null); };
    g.appendChild(off);
  }
}

function selectStart(t) {
  pickerStart = t;
  document.getElementById('picker-title').textContent = t + '〜 終了時間を選択';
  var g = document.getElementById('picker-grid');
  g.innerHTML = '<div class="picker-step">' + pickerKey + ' | スタート: ' + t + '</div>';

  // 戻るボタン
  var back = document.createElement('button');
  back.className = 'picker-back';
  back.textContent = '← スタートを変更';
  back.onclick = showStartPicker;
  g.appendChild(back);

  // 終了時間 (スタートの30分後〜26:00)
  var sh = parseInt(t.split(':')[0]);
  var sm = parseInt(t.split(':')[1]);
  var startMins = sh * 60 + sm;
  genTimes(18, 30, 26, 0).forEach(function(e) {
    var eh = parseInt(e.split(':')[0]);
    var em = parseInt(e.split(':')[1]);
    if (eh * 60 + em <= startMins) return;
    var btn = document.createElement('button');
    btn.className = 'time-opt';
    btn.textContent = e;
    btn.onclick = function() { pickTime(pickerKey, t + '～' + e); };
    g.appendChild(btn);
  });
}

function pickTime(key, t) {
  if (t) shiftSelections[key] = t;
  else delete shiftSelections[key];
  closePicker();
  renderShiftCal();
}

function closePicker() {
  document.getElementById('picker-overlay').classList.remove('show');
}

function updateSubmitBar() {
  var count = Object.keys(shiftSelections).length;
  document.getElementById('shift-count').textContent = count > 0 ? count + '日分選択中' : '';
  document.getElementById('submit-btn').disabled = count === 0;
}

function doSubmit() {
  var btn = document.getElementById('submit-btn');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.textContent = '提出中...';

  var shifts = [];
  var sortedKeys = Object.keys(shiftSelections).sort(function(a, b) {
    var ap = a.split('/'), bp = b.split('/');
    var am = parseInt(ap[0]), ad = parseInt(ap[1]);
    var bm = parseInt(bp[0]), bd = parseInt(bp[1]);
    return am !== bm ? am - bm : ad - bd;
  });
  sortedKeys.forEach(function(k) {
    shifts.push({ date: k, time: shiftSelections[k] });
  });

  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'submitShift', userId: userId, shifts: shifts })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.ok) {
      btn.textContent = '✓ 提出しました';
      btn.style.background = '#1a4422';
      shiftSelections = {};
      setTimeout(function() {
        btn.textContent = 'シフトを提出する';
        btn.style.background = '';
        btn.disabled = true;
        renderShiftCal();
      }, 2000);
    } else {
      alert('エラー: ' + (d.error || '不明'));
      btn.disabled = false;
      btn.textContent = 'シフトを提出する';
    }
  })
  .catch(function(e) {
    alert('通信エラー: ' + (e && e.message || ''));
    btn.disabled = false;
    btn.textContent = 'シフトを提出する';
  });
}

// ---- helpers ----
function monthBar(months) {
  if (!months || months.length === 0) return '';
  var h = '<div class="month-bar">';
  months.forEach(function(m) {
    h += '<div class="month-chip' + (m === currentMonth ? ' active' : '') + '" onclick="selectMonth(\'' + m + '\')">' + m + '</div>';
  });
  h += '</div>';
  return h;
}

function selectMonth(m) {
  currentMonth = m;
  renderTab(currentTab);
}

function row(label, val, cls) {
  return '<div class="row"><span class="row-label">' + esc(label) + '</span>'
    + '<span class="row-val' + (cls ? ' '+cls : '') + '">' + (val !== undefined && val !== null ? esc(String(val)) : '—') + '</span></div>';
}

// ---- 申請管理 ----
var reqFilter = 'pending';

function loadRequests() {
  setContent('<div class="loading">申請を読み込み中...</div>');
  var url = GAS_URL + '?action=portal&userId=' + encodeURIComponent(userId)
    + '&viewAs=' + encodeURIComponent(adminViewAs || '')
    + '&tab=requests';
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) { setContent('<div class="err">エラー: ' + esc(d.error||'') + '</div>'); return; }
      renderRequests(d.requests || []);
    })
    .catch(function(e) { setContent('<div class="err">通信エラー</div>'); });
}

function renderRequests(list) {
  var filters = [
    { key: 'pending', label: '未処理' },
    { key: 'all',     label: 'すべて' },
  ];
  var filterHtml = '<div class="req-filter">'
    + filters.map(function(f) {
        return '<button class="req-filter-btn' + (reqFilter === f.key ? ' active' : '')
          + '" onclick="setReqFilter(\'' + f.key + '\')">' + f.label + '</button>';
      }).join('')
    + '</div>';

  var filtered = list.filter(function(r) {
    return reqFilter === 'all' || r.status === 'pending';
  });

  if (filtered.length === 0) {
    setContent(filterHtml + '<div class="req-empty">'
      + (reqFilter === 'pending' ? '未処理の申請はありません' : '申請がありません') + '</div>');
    return;
  }

  var html = filterHtml;
  filtered.forEach(function(r) {
    var isDone = r.status !== 'pending';
    html += '<div class="req-card' + (r.status === '承諾' ? ' approved' : r.status === '休み' ? ' rejected' : '') + '">'
      + '<div class="req-head">'
      + '<span class="req-name">' + esc(r.name) + '</span>'
      + '<span class="req-time">' + esc(r.submittedAt) + '</span>'
      + '</div>'
      + '<div class="req-detail">📅 ' + esc(r.date) + '　⏰ ' + esc(r.time) + '</div>';

    if (isDone) {
      html += '<div class="req-status ' + (r.status === '承諾' ? 'ok' : 'off') + '">'
        + (r.status === '承諾' ? '✓ 承諾済み' : '✗ 休み決定') + '</div>';
    } else {
      html += '<div class="req-actions">'
        + '<button class="req-btn approve" onclick="processReq(' + r.rowIdx + ',\''
          + esc(r.name) + '\',\'' + esc(r.date) + '\',\'' + esc(r.time) + '\',\'承諾\')">✓ 承諾</button>'
        + '<button class="req-btn reject" onclick="processReq(' + r.rowIdx + ',\''
          + esc(r.name) + '\',\'' + esc(r.date) + '\',\'' + esc(r.time) + '\',\'休み\')">✗ 休み</button>'
        + '</div>';
    }
    html += '</div>';
  });
  setContent(html);
}

function setReqFilter(f) {
  reqFilter = f;
  loadRequests();
}

function processReq(rowIdx, name, date, time, decision) {
  var card = event.target.closest('.req-card');
  if (card) { card.style.opacity = '0.5'; card.style.pointerEvents = 'none'; }

  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'approveShift', userId: userId, rowIdx: rowIdx,
                           name: name, date: date, time: time, decision: decision })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.ok) { loadRequests(); }
    else {
      if (card) { card.style.opacity = ''; card.style.pointerEvents = ''; }
      alert('エラー: ' + (d.error || '不明'));
    }
  })
  .catch(function() {
    if (card) { card.style.opacity = ''; card.style.pointerEvents = ''; }
    alert('通信エラー');
  });
}

function setContent(html) {
  document.getElementById('content').innerHTML = html;
}

function showErr(msg) {
  document.getElementById('user-name').textContent = '';
  setContent('<div class="err">' + msg + '</div>');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
