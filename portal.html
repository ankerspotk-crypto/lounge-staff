<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>IEYASLOUNGE PORTAL</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #0d0d14; color: #fff; min-height: 100vh; }

header {
  background: #16162a; padding: 14px 16px 0;
  border-bottom: 1px solid #2a2a40; position: sticky; top: 0; z-index: 10;
}
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
header h1 { font-size: 17px; font-weight: 600; }
.user-name { font-size: 13px; color: #aaa; }

.tabs { display: flex; gap: 4px; }
.tab {
  flex: 1; padding: 10px 4px; text-align: center; font-size: 13px; font-weight: 500;
  border-bottom: 2px solid transparent; cursor: pointer; color: #666;
}
.tab.active { color: #88aaff; border-bottom-color: #88aaff; }
.tab.coming-soon { color: #44455a; cursor: default; position: relative; }
.tab.coming-soon::after { content: '近日公開'; font-size: 9px; display: block; color: #554; margin-top: 1px; }

.content { padding: 16px; }

.loading { text-align: center; color: #666; padding: 60px 0; font-size: 14px; }
.err { text-align: center; color: #cc5555; padding: 40px 16px; font-size: 14px; line-height: 1.7; }
.err small { color: #777; font-size: 11px; }

/* month selector */
.month-bar {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 16px;
  scrollbar-width: none;
}
.month-bar::-webkit-scrollbar { display: none; }
.month-chip {
  flex-shrink: 0; padding: 5px 14px; border-radius: 20px; font-size: 13px;
  background: #1e1e30; border: 1px solid #2a2a40; color: #999; cursor: pointer;
}
.month-chip.active { background: #1a2a4a; border-color: #3366cc; color: #88aaff; }

/* card */
.card {
  background: #16162a; border: 1px solid #2a2a40; border-radius: 12px;
  padding: 16px; margin-bottom: 12px;
}
.card-title { font-size: 12px; color: #666; margin-bottom: 10px; letter-spacing: .5px; }
.row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #1e1e2a; }
.row:last-child { border-bottom: none; }
.row-label { font-size: 13px; color: #999; }
.row-val { font-size: 14px; font-weight: 500; }
.row-val.accent { color: #88ffcc; }
.row-val.sub { color: #cc8844; }
.row-val.minus { color: #cc5555; }

.total-card {
  background: #101828; border: 1px solid #2244aa; border-radius: 12px;
  padding: 18px; text-align: center; margin-bottom: 16px;
}
.total-label { font-size: 12px; color: #5588cc; margin-bottom: 6px; }
.total-val { font-size: 28px; font-weight: 700; color: #88aaff; }

/* シフトカレンダー */
.shift-month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.shift-month-label { font-size: 16px; font-weight: 600; }
.nav-btn {
  background: #2a2a40; border: none; color: #ccc;
  width: 36px; height: 36px; border-radius: 50%; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 4px; }
.weekday { font-size: 11px; color: #555; padding: 4px 0; }
.weekday.sun { color: #884444; }
.weekday.sat { color: #445588; }
.days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.day {
  aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; border-radius: 8px; cursor: pointer;
  border: 1px solid transparent; padding: 2px;
}
.day .num { font-size: 14px; font-weight: 500; line-height: 1; }
.day .shift-dot { width: 6px; height: 6px; border-radius: 50%; background: #88aaff; margin-top: 4px; }
.day.empty { pointer-events: none; }
.day.past { opacity: 0.3; pointer-events: none; }
.day.sun .num { color: #cc6666; }
.day.sat .num { color: #6688cc; }
.day.today .num { color: #ffdd44; font-weight: 700; }
.day.selected { background: #152a40; border-color: #3377bb; }
.day.selected .num { color: #88ccff; }
.day.selected .shift-dot { background: #88ffcc; }
.day.kyukin { background: #2a1515; border-color: #bb4444; }
.day.kyukin .num { color: #ff8888; }
.day.kyukin .kyukin-label { font-size: 9px; color: #ff8888; margin-top: 2px; }
.day .shift-time { font-size: 8px; margin-top: 2px; line-height: 1.1; text-align: center; }
.day.scheduled { background: #152a1a; border-color: #336633; }
.day.scheduled .num { color: #88ffaa; }
.day.scheduled .shift-time { color: #66cc88; }
.day.selected .shift-time { color: #66aadd; }
.day.pending-shift { background: #2a1f0a; border-color: #886622; }
.day.pending-shift .num { color: #ffcc66; }
.day.pending-shift .shift-time { color: #ccaa44; }

/* picker overlay */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 50; }
.overlay.show { display: flex; align-items: flex-end; }
.picker { background: #16162a; border-radius: 18px 18px 0 0; width: 100%; padding: 18px 16px 36px; border-top: 1px solid #2a2a40; }
.picker-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #aaccff; }
.time-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.time-opt {
  background: #1e1e30; border: 1px solid #2a2a44; color: #ccc;
  padding: 13px 8px; border-radius: 10px; font-size: 14px; text-align: center;
  cursor: pointer;
}
.time-opt:active, .time-opt.chosen { background: #1a2a4a; border-color: #3366cc; color: #88aaff; }
.time-opt.off { color: #cc6666; border-color: #3a2020; background: #1a1010; }
.time-opt.full { grid-column: span 2; background: #1a3020; border-color: #336644; color: #88ffaa; font-weight: 600; }
.time-opt.full:active { background: #1e3a26; }
.picker-step { font-size: 11px; color: #666; margin-bottom: 10px; }
.picker-back {
  width: 100%; background: none; border: 1px solid #2a2a3a;
  color: #6688aa; padding: 10px; border-radius: 10px; font-size: 13px; cursor: pointer;
  margin-bottom: 10px;
}
.picker-cancel {
  margin-top: 10px; width: 100%; background: none; border: 1px solid #2a2a3a;
  color: #666; padding: 12px; border-radius: 10px; font-size: 14px; cursor: pointer;
}

.submit-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #16162a; border-top: 1px solid #2a2a40; padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
}
.submit-btn {
  width: 100%; background: #2244aa; border: none; color: #fff;
  padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600;
  cursor: pointer;
}
.submit-btn:active { background: #1a337f; }
.submit-btn:disabled { background: #2a2a3a; color: #555; }
.shift-spacer { height: 80px; }

/* ロール選択 */
.role-toggle { display: flex; gap: 6px; padding: 12px 0 4px; }
.role-btn {
  flex: 1; padding: 9px 4px; border-radius: 10px; border: 1px solid #2a2a40;
  background: #1e1e30; color: #777; font-size: 13px; font-weight: 500; cursor: pointer;
}
.role-btn.active { background: #1a2a4a; border-color: #4466bb; color: #88aaff; }

/* 管理者キャスト選択 */
.admin-bar {
  background: #1a1a2e; border-bottom: 1px solid #2a2a40;
  padding: 10px 16px; display: flex; align-items: center; gap: 10px;
}
.admin-label { font-size: 12px; color: #888; white-space: nowrap; }
.cast-select {
  flex: 1; background: #2a2a40; border: 1px solid #3a3a55; color: #ccc;
  padding: 8px 12px; border-radius: 8px; font-size: 14px;
  -webkit-appearance: none; appearance: none;
}
.cast-select:focus { outline: none; border-color: #5566aa; }
.admin-badge { font-size: 10px; background: #553300; color: #ffaa44; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
.shift-count { text-align: center; font-size: 13px; color: #666; margin-top: 10px; }

/* 申請管理 */
.req-card { background: #16162a; border: 1px solid #2a2a40; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.req-card.approved { border-color: #336633; }
.req-card.rejected { border-color: #663333; opacity: .6; }
.req-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.req-name { font-size: 15px; font-weight: 600; }
.req-time { font-size: 12px; color: #666; }
.req-detail { font-size: 14px; color: #aac; margin-bottom: 10px; }
.req-actions { display: flex; gap: 8px; }
.req-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
.req-btn.approve { background: #1a3a22; color: #88ffaa; border: 1px solid #336633; }
.req-btn.reject  { background: #3a1a1a; color: #ffaa88; border: 1px solid #663333; }
.req-btn.approve:active { background: #1e4228; }
.req-btn.reject:active  { background: #421e1e; }
.req-status { text-align: center; font-size: 13px; padding: 6px 0; }
.req-status.ok  { color: #88ffaa; }
.req-status.off { color: #ff8866; }
.req-empty { text-align: center; color: #555; padding: 40px 0; font-size: 14px; }
.req-filter { display: flex; gap: 6px; margin-bottom: 14px; }
.req-filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid #2a2a40; background: #1e1e30; color: #888; font-size: 13px; cursor: pointer; }
.req-filter-btn.active { background: #1a2a4a; border-color: #3366cc; color: #88aaff; }
.notif-list { display: flex; flex-direction: column; gap: 8px; }
.notif-card { background: #1a1a2e; border-radius: 10px; overflow: hidden; transition: opacity .2s; }
.notif-card-header { display: flex; align-items: center; gap: 10px; padding: 11px 12px; cursor: pointer; user-select: none; }
.notif-mid { flex: 1; min-width: 0; }
.notif-label { font-size: 13px; font-weight: 600; color: #dde; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.notif-group-tag { font-size: 11px; color: #556; margin-top: 1px; }
.notif-time { background: #0f0f1e; color: #aac; border: 1px solid #2a2a40; border-radius: 6px; padding: 5px 6px; font-size: 13px; width: 82px; flex-shrink: 0; }
.notif-chevron { color: #334; font-size: 18px; transition: transform .2s; flex-shrink: 0; line-height: 1; }
.notif-toggle { position: relative; display: inline-block; width: 42px; height: 24px; flex-shrink: 0; }
.notif-toggle input { opacity: 0; width: 0; height: 0; }
.notif-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #2a2a40; border-radius: 24px; transition: .3s; }
.notif-slider:before { position: absolute; content: ''; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #667; border-radius: 50%; transition: .3s; }
.notif-toggle input:checked + .notif-slider { background: #1a4a8a; }
.notif-toggle input:checked + .notif-slider:before { transform: translateX(18px); background: #88aaff; }
.notif-expand { padding: 0 12px 12px; border-top: 1px solid #1e1e3a; }
.notif-expand-label { font-size: 10px; color: #445; margin: 10px 0 4px; letter-spacing: .05em; text-transform: uppercase; }
.notif-days-row { display: flex; gap: 5px; }
.notif-day-box { position: relative; }
.notif-day-box input { position: absolute; opacity: 0; width: 0; height: 0; }
.notif-day-box span { display: inline-block; width: 30px; height: 30px; line-height: 30px; text-align: center; border-radius: 50%; background: #111128; color: #445; font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid #222238; transition: .15s; }
.notif-day-box input:checked + span { background: #1a3a6a; color: #88aaff; border-color: #3366cc; }
.notif-msg-area { width: 100%; box-sizing: border-box; background: #0c0c1e; color: #bbc; border: 1px solid #2a2a40; border-radius: 6px; padding: 8px; font-size: 11px; resize: vertical; font-family: monospace; line-height: 1.5; min-height: 60px; }
.notif-msg-auto { font-size: 11px; color: #334; padding: 4px 0; font-style: italic; }
.notif-group-sel { background: #0c0c1e; color: #aac; border: 1px solid #2a2a40; border-radius: 6px; padding: 6px 10px; font-size: 13px; width: 100%; }
.notif-del-btn { margin-top: 12px; padding: 7px 14px; background: #1e0f0f; color: #d66; border: 1px solid #3a1a1a; border-radius: 6px; font-size: 12px; cursor: pointer; }
.notif-add-btn { display: block; width: 100%; margin-top: 10px; margin-bottom: 6px; padding: 11px; background: transparent; color: #556; border: 1px dashed #2a2a40; border-radius: 10px; font-size: 13px; cursor: pointer; }
.notif-add-form { background: #111128; border: 1px solid #2a2a40; border-radius: 10px; padding: 14px; margin-top: 8px; margin-bottom: 8px; }
.notif-add-input { width: 100%; box-sizing: border-box; background: #0c0c1e; color: #ccd; border: 1px solid #2a2a40; border-radius: 6px; padding: 8px 10px; font-size: 13px; }
.notif-save-btn { display: block; width: 100%; margin-top: 12px; padding: 13px; background: #1a3a6a; color: #88aaff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: .05em; }
.notif-save-btn:active { background: #2a4a8a; }
.cashset-card { background: #1a1a2e; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
.cashset-floor { font-size: 13px; font-weight: 700; color: #dde; margin-bottom: 8px; }
.cashset-denom-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.cashset-denom-label { width: 52px; flex-shrink: 0; font-size: 12px; color: #889; }
.cashset-field { flex: 1; display: flex; align-items: center; gap: 4px; }
.cashset-field span { font-size: 10px; color: #556; flex-shrink: 0; }
.cashset-input { width: 100%; box-sizing: border-box; background: #0c0c1e; color: #ccd; border: 1px solid #2a2a40; border-radius: 6px; padding: 6px 8px; font-size: 13px; text-align: center; }

/* ---- 予約管理 ---- */
.yoyaku-date-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.yoyaku-date-nav button { background: #1a1a2e; border: 1px solid #2a2a40; color: #88aaff; border-radius: 7px; padding: 5px 10px; cursor: pointer; font-size: 14px; }
.yoyaku-date-text { font-size: 15px; font-weight: 700; color: #fff; flex: 1; text-align: center; }
.yoyaku-today-btn { font-size: 10px; background: #1a2a4a; color: #88aaff; border: 1px solid #2255aa; border-radius: 5px; padding: 3px 8px; cursor: pointer; }
.yoyaku-stats { display: flex; gap: 8px; margin-bottom: 12px; }
.yoyaku-stat { flex: 1; background: #1a1a2e; border: 1px solid #2a2a40; border-radius: 8px; padding: 9px; text-align: center; }
.yoyaku-stat .num { font-size: 22px; font-weight: 700; }
.yoyaku-stat .lbl { font-size: 9px; color: #556; margin-top: 2px; }
.yoyaku-card { background: #1a1a2e; border: 1px solid #2a2a40; border-radius: 10px; padding: 11px 13px; margin-bottom: 8px; }
.yoyaku-card .yc-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.yoyaku-card .yc-time { font-size: 14px; font-weight: 700; color: #88aaff; width: 46px; flex-shrink: 0; }
.yoyaku-card .yc-name { font-size: 14px; font-weight: 600; color: #fff; }
.yoyaku-card .yc-badges { display: flex; flex-wrap: wrap; gap: 4px; padding-left: 54px; margin-bottom: 3px; }
.yoyaku-card .yc-note { font-size: 11px; color: #445; padding-left: 54px; }
.yb { font-size: 10px; padding: 2px 8px; border-radius: 7px; font-weight: 600; }
.yb-seat { background: #0d1a2e; color: #88aaff; border: 1px solid #1e3a6a; }
.yb-pax  { background: #1a1a2e; color: #aaa; border: 1px solid #2a2a40; }
.yb-cast { background: #1a0d2e; color: #bb99ff; border: 1px solid #3a1a6a; }
.yb-ok   { background: #0d2010; color: #66cc88; border: 1px solid #1a4a22; }
.yb-pend { background: #2a2210; color: #ddaa44; border: 1px solid #5a4400; }
/* 顧客検索 */
.ycust-search { width: 100%; background: #111128; border: 1px solid #2a2a40; border-radius: 9px; padding: 10px 12px; color: #fff; font-size: 13px; outline: none; margin-bottom: 10px; }
.ycust-row { display: flex; align-items: flex-start; justify-content: space-between; padding: 10px 12px; background: #1a1a2e; border: 1px solid #2a2a40; border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: .15s; }
.ycust-row:hover { border-color: #3a3a6a; }
.ycust-row.selected { border-color: #88aaff; background: #0d1a2e; }
.ycust-name { font-size: 13px; font-weight: 600; color: #fff; }
.ycust-sub { font-size: 10px; color: #445; margin-top: 2px; }
.ycust-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.ycm { font-size: 9px; padding: 1px 6px; border-radius: 5px; }
.ycm-bottle { background: #1a2a10; color: #88cc55; border: 1px solid #336622; }
.ycm-bday   { background: #1a1040; color: #9988ee; border: 1px solid #4433aa; }
.ycm-note   { background: #141428; color: #667; border: 1px solid #2a2a44; }
/* 予約フォーム */
.yform-sec { background: #1a1a2e; border: 1px solid #2a2a40; border-radius: 10px; padding: 13px; margin-top: 10px; }
.yform-sec .selected-name { font-size: 14px; font-weight: 600; color: #88aaff; margin-bottom: 12px; }
.yform-label { font-size: 10px; color: #445; margin: 8px 0 4px; letter-spacing: .5px; text-transform: uppercase; }
.yform-input { width: 100%; box-sizing: border-box; background: #0c0c1e; border: 1px solid #2a2a40; border-radius: 8px; padding: 9px 11px; color: #fff; font-size: 13px; outline: none; }
.yform-row { display: flex; gap: 8px; }
.yform-row .yform-input { margin: 0; }
.yform-toggles { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
.ytbtn { padding: 7px 10px; border-radius: 7px; border: 1px solid #2a2a40; background: #0c0c1e; color: #556; font-size: 12px; cursor: pointer; }
.ytbtn.on { border-color: #88aaff; background: #0d1a2e; color: #88aaff; }
.yreq-card.cast { border-color: #2a1a3a; }
.yreq-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.yreq-from { font-size: 12px; font-weight: 600; color: #fff; }
.yreq-tag { font-size: 9px; padding: 2px 7px; border-radius: 5px; font-weight: 600; }
.yrt-cust { background: #2a2210; color: #ddaa44; border: 1px solid #5a4400; }
.yrt-cast { background: #1a0d2e; color: #bb99ff; border: 1px solid #3a1a6a; }
.yreq-body { font-size: 12px; color: #889; line-height: 1.5; }
.yreq-time { font-size: 10px; color: #334; margin-top: 3px; }
.yreq-acts { display: flex; gap: 6px; margin-top: 8px; }
.yra { flex: 1; padding: 7px; border-radius: 7px; font-size: 11px; cursor: pointer; text-align: center; }
.yra-ok { background: #0d2010; border: 1px solid #1a4a22; color: #66cc88; }
.yra-ng { background: #141428; border: 1px solid #2a2a40; color: #556; }
/* カレンダービュー */
.ycal-month-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.ycal-month-nav button { background: #1a1a2e; border: 1px solid #2a2a40; color: #88aaff; border-radius: 7px; padding: 5px 12px; cursor: pointer; font-size: 14px; }
.ycal-month-title { font-size: 15px; font-weight: 700; color: #fff; flex: 1; text-align: center; }
.ycal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.ycal-dow { text-align: center; font-size: 10px; font-weight: 700; padding: 6px 0; }
.ycal-dow.sun { color: #ee6666; }
.ycal-dow.sat { color: #6688ee; }
.ycal-day { display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; padding: 6px 2px; min-height: 50px; cursor: pointer; position: relative; }
.ycal-day:hover { background: #1a1a2e; }
.ycal-day.today { background: #1a2a4a; border: 1px solid #2255aa; }
.ycal-day.today .ycal-num { color: #88aaff; }
.ycal-day.other { opacity: 0.25; pointer-events: none; }
.ycal-day.sunday .ycal-num { color: #ee6666; }
.ycal-day.saturday .ycal-num { color: #6688ee; }
.ycal-num { font-size: 15px; font-weight: 600; color: #ddd; line-height: 1; }
.ycal-pax { font-size: 10px; color: #88aaff; font-weight: 700; margin-top: 3px; }
.ycal-dot { width: 6px; height: 6px; background: #ddaa44; border-radius: 50%; position: absolute; top: 5px; right: 5px; }
/* スケジュールグリッド */
.ysched-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.ysched-inner { display: flex; min-width: max-content; }
.ysched-left { flex-shrink: 0; width: 70px; position: sticky; left: 0; z-index: 2; background: #12122a; }

.ysched-hdr { display: flex; background: #1a1a2e; border-bottom: 1px solid #2a2a40; }
.ysched-tbl-hdr { width: 70px; padding: 7px 6px; font-size: 9px; color: #445; border-right: 1px solid #2a2a40; flex-shrink: 0; background: #1a1a2e; }
.ysched-time-hdr { display: flex; }
.ysched-time-cell { font-size: 10px; color: #88aaff; text-align: center; border-right: 1px solid #141426; padding: 7px 4px; }
.ysched-floor-div { height: 5px; background: #111128; border-bottom: 1px solid #2a2a40; }
.ysched-name-cell { height: 46px; padding: 4px 6px; border-bottom: 1px solid #1e1e38; border-right: 1px solid #2a2a40; display: flex; flex-direction: column; justify-content: center; }
.ysched-name-main { font-size: 11px; font-weight: 600; color: #bbb; }

.yrsv-blk:hover { filter: brightness(1.15); }
.yrsv-name { font-size: 10px; font-weight: 700; color: #aaccff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.yrsv-pax { font-size: 9px; color: #4466aa; }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <h1>IEYASLOUNGE PORTAL</h1>
    <span class="user-name" id="user-name">読み込み中...</span>
  </div>
  <div class="tabs">
    <div class="tab" id="tab-sales" onclick="switchTab('sales')">売上明細</div>
    <div class="tab" id="tab-pay" onclick="switchTab('pay')">給与明細</div>
    <div class="tab active" id="tab-shift" onclick="switchTab('shift')">シフト提出</div>
    <div class="tab" id="tab-ranking" onclick="switchTab('ranking')">ランキング</div>
    <div class="tab" id="tab-hair" onclick="switchTab('hair')">領収書提出</div>
    <div class="tab" id="tab-yoyaku" onclick="switchTab('yoyaku')">予約管理</div>
    <div class="tab" id="tab-requests" onclick="switchTab('requests')" style="display:none">申請管理</div>
    <div class="tab" id="tab-notif" onclick="switchTab('notif')" style="display:none">通知設定</div>
    <div class="tab" id="tab-cashset" onclick="switchTab('cashset')" style="display:none">現金設定</div>
  </div>
</header>

<div class="content" id="content">
  <div class="loading">読み込み中...</div>
</div>

<div class="overlay" id="picker-overlay" onclick="closePicker()">
  <div class="picker" onclick="event.stopPropagation()">
    <div class="picker-title" id="picker-title"></div>
    <div class="time-grid" id="picker-grid"></div>
    <button class="picker-cancel" onclick="closePicker()">キャンセル</button>
  </div>
</div>

<div class="submit-bar" id="submit-bar" style="display:none">
  <button class="submit-btn" id="submit-btn" onclick="doSubmit()">シフトを提出する</button>
  <div class="shift-count" id="shift-count"></div>
</div>

<script>
var LIFF_ID = '2010376677-EDF5MZuq';
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxG4IdWtMdU-81wfQUvTg6nYqKboK9wWB-XcfFYI8w0KRUrSpZmwJyb9jBYuMUP5K1q4g/exec';

var userId = '', userName = '', portalData = null;
var currentTab = 'shift', currentMonth = '';
var viewYear, viewMonth, shiftSelections = {}, shiftRoles = {};
var isAdmin = false, adminViewAs = '', adminCastList = [], adminCastRoles = {};
var staffRole = 'キャスト';
var pendingShifts = {};

function fmt(n) {
  if (n === '' || n === null || n === undefined) return '—';
  var num = Number(String(n).replace(/,/g,''));
  if (isNaN(num)) return String(n);
  return num.toLocaleString('ja-JP') + '円';
}

// ---- LIFF init ----
var _devUid = new URLSearchParams(location.hash.slice(1)).get('u');

var initTimer = setTimeout(function() {
  showErr('タイムアウト<br><small>LIFFが応答しませんでした</small>');
}, 12000);

if (_devUid) {
  // テスト用バイパス: ?u=TEST_TOKUKO
  clearTimeout(initTimer);
  userId = _devUid;
  document.getElementById('user-name').textContent = '読み込み中...';
  loadPortal();
} else {
  try {
    liff.init({ liffId: LIFF_ID }).then(function() {
      clearTimeout(initTimer);
      if (!liff.isLoggedIn()) { liff.login(); return; }
      return liff.getProfile();
    }).then(function(p) {
      if (!p) return;
      userId   = p.userId;
      userName = p.displayName;
      document.getElementById('user-name').textContent = p.displayName;
      loadPortal();
    }).catch(function(e) {
      clearTimeout(initTimer);
      showErr('ログインエラー<br><small>' + (e && e.message || JSON.stringify(e)) + '</small>');
    });
  } catch(e) {
    clearTimeout(initTimer);
    showErr('起動エラー: ' + e.message);
  }
}

function loadPortal(month) {
  setContent('<div class="loading">データ取得中...</div>');
  var url = GAS_URL + '?action=portal&userId=' + encodeURIComponent(userId);
  if (month) url += '&month=' + encodeURIComponent(month);
  if (adminViewAs) url += '&viewAs=' + encodeURIComponent(adminViewAs);
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) {
        if (d.error === 'unregistered') {
          showErr('登録が見つかりません<br><small>グループLINEで #登録 名前 を送ってください</small>');
        } else {
          showErr('エラー: ' + d.error);
        }
        return;
      }
      // 管理者で castList が返ってきた場合 → 申請管理タブをデフォルト表示
      if (d.isAdmin && d.castList && !adminViewAs) {
        isAdmin = true;
        adminCastList = d.castList;
        adminCastRoles = d.castRoles || {};
        initAdminUI(d.castList);
        return;
      }
      isAdmin = d.isAdmin || false;
      if (d.staffRole) staffRole = d.staffRole;
      if (isAdmin) showAdminTab();
      if (_devUid && d.name) document.getElementById('user-name').textContent = d.name;
      portalData = d;
      if (!currentMonth && d.months && d.months.length > 0) currentMonth = d.months[0];
      updateAdminBar(adminCastList);
      renderTab(currentTab);
    })
    .catch(function(e) {
      showErr('通信エラー<br><small>' + (e && e.message || '') + '</small>');
    });
}

function initAdminUI(castList) {
  showAdminTab();
  if (!document.getElementById('admin-bar')) {
    var bar = document.createElement('div');
    bar.id = 'admin-bar';
    bar.className = 'admin-bar';
    bar.innerHTML = '<span class="admin-label">キャスト:</span>'
      + '<select class="cast-select" id="admin-viewas-sel" onchange="adminChange(this.value)">'
      + '<option value="">-- 選択 --</option>'
      + '</select>'
      + '<button onclick="location.href=\'./staff.html?u=\'+userId" style="padding:4px 10px;background:#1a2a3a;color:#88aaff;border:1px solid #3355aa;border-radius:6px;font-size:12px;cursor:pointer">スタッフ管理</button>'
      + '<span class="admin-badge">管理者</span>';
    document.querySelector('header').insertAdjacentElement('afterend', bar);
  }
  updateAdminBar(castList);
  // 申請管理タブをデフォルト選択
  switchTabActive('requests');
  loadRequests();
}

function adminChange(name) {
  adminViewAs = name;
  currentMonth = '';
  portalData = null;
  if (name) staffRole = adminCastRoles[name] || 'キャスト';
  if (!name) {
    switchTabActive('requests');
    loadRequests();
    return;
  }
  currentTab = 'shift';
  switchTabActive('shift');
  loadPortal();
}


function switchTabActive(tab) {
  currentTab = tab;
  ['sales','pay','shift','ranking','hair','yoyaku','requests','notif','cashset'].forEach(function(t) {
    var el = document.getElementById('tab-'+t);
    if (el) el.classList.toggle('active', t === tab);
  });
  document.getElementById('submit-bar').style.display = tab === 'shift' ? 'block' : 'none';
}

function updateAdminBar(castList) {
  var sel = document.getElementById('admin-viewas-sel');
  if (!sel || !castList) return;
  sel.innerHTML = '<option value="">-- 選択 --</option>';
  castList.forEach(function(n) {
    var opt = document.createElement('option');
    opt.value = n; opt.textContent = n;
    if (n === adminViewAs) opt.selected = true;
    sel.appendChild(opt);
  });
}

function switchTab(tab) {
  switchTabActive(tab);
  if (tab === 'requests') { loadRequests(); return; }
  if (tab === 'notif') { loadNotifSettings(); return; }
  if (tab === 'cashset') { loadCashThresholds(); return; }
  if (tab === 'yoyaku') { yoyakuSubTab = 'list'; loadYoyaku(); return; }
  if (tab === 'ranking') { loadRanking(); return; }
  if (tab === 'hair') { loadHairReceipts(); return; }
  if (isAdmin && !adminViewAs) {
    setContent('<div style="text-align:center;color:#666;padding:60px 0;font-size:14px">上のドロップダウンからキャストを選択してください</div>');
    return;
  }
  if (portalData) renderTab(tab);
  else loadPortal();
}

function renderTab(tab) {
  if (isAdmin && !adminViewAs) {
    setContent('<div style="text-align:center;color:#666;padding:60px 0;font-size:14px">上のドロップダウンからキャストを選択してください</div>');
    return;
  }
  if (tab === 'sales') renderSales();
  else if (tab === 'pay') renderPay();
  else if (tab === 'shift') renderShiftCal();
  else if (tab === 'hair') loadHairReceipts();
}

// 管理者タブを表示
function showAdminTab() {
  var el = document.getElementById('tab-requests');
  if (el) el.style.display = '';
  var el2 = document.getElementById('tab-notif');
  if (el2) el2.style.display = '';
  var el3 = document.getElementById('tab-cashset');
  if (el3) el3.style.display = '';
}

// ---- 売上明細 ----
function renderSales() {
  var sales = portalData && portalData.sales;
  if (!sales || Object.keys(sales).length === 0) {
    setContent('<div style="text-align:center;padding:60px 20px">'
      + '<div style="font-size:30px;margin-bottom:12px">📊</div>'
      + '<div style="font-size:15px;font-weight:600;color:#88aaff;margin-bottom:8px">データなし</div>'
      + '<div style="font-size:12px;color:#556;line-height:1.7">今月の売上データはまだ取得されていません。<br>毎日深夜に自動更新されます。</div>'
      + '</div>');
    return;
  }

  var months = Object.keys(sales).sort().reverse();
  var sel = currentMonth && sales[currentMonth] ? currentMonth : months[0];
  var row = sales[sel];

  function yen(v) { var n = parseInt(v) || 0; return n ? '¥' + n.toLocaleString() : '--'; }
  function num(v) { return parseInt(v) || 0; }

  var backTotal = ['担当バック','予約バック','同伴バック','ドリンクバック','ボトルバック','フードバック']
    .reduce(function(s, k) { return s + num(row[k]); }, 0);

  var h = '<div style="padding:14px">';

  // 月タブ
  if (months.length > 1) {
    h += '<div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px">';
    months.forEach(function(m) {
      var act = m === sel;
      h += '<button onclick="switchSalesMonth(\'' + m + '\')" style="padding:5px 14px;border-radius:16px;border:1px solid '
        + (act ? '#5588ff' : '#252540') + ';background:' + (act ? '#1a2a4a' : 'transparent')
        + ';color:' + (act ? '#88aaff' : '#556') + ';font-size:12px;cursor:pointer;white-space:nowrap">' + m + '</button>';
    });
    h += '</div>';
  }

  // カード
  h += '<div style="background:#14142a;border:1px solid #1e1e3a;border-radius:12px;padding:14px">';
  h += '<div style="font-size:10px;color:#334;margin-bottom:10px;letter-spacing:0.5px">' + sel + ' TRUSTデータ</div>';

  function item(label, val, color, sub) {
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #181828">'
      + '<span style="font-size:13px;color:#778">' + label + (sub ? '<br><span style="font-size:10px;color:#445">' + sub + '</span>' : '') + '</span>'
      + '<span style="font-size:15px;font-weight:600;color:' + (color || '#bbb') + '">' + val + '</span>'
      + '</div>';
  }

  h += item('担当売上', yen(row['担当小計']), '#88aaff');
  if (num(row['同伴小計']) > 0) h += item('同伴売上', yen(row['同伴小計']), '#7799cc');
  h += item('勤務日数', num(row['勤務日数']) + '日', '#aaa');
  h += item('時間報酬', yen(row['時間報酬']));

  if (backTotal > 0) {
    var backLines = ['担当バック','予約バック','同伴バック','ドリンクバック','ボトルバック','フードバック']
      .filter(function(k) { return num(row[k]) > 0; })
      .map(function(k) { return k + ' ' + yen(row[k]); }).join(' / ');
    h += item('バック合計', yen(backTotal), '#66cc88', backLines);
  }

  if (num(row['ボーナス']) > 0) h += item('ボーナス', yen(row['ボーナス']), '#ffcc44');
  h += item('源泉徴収', '−' + yen(row['源泉徴収']), '#cc6666');
  if (num(row['日払']) > 0) h += item('日払控除', '−' + yen(row['日払']), '#cc6666');
  if (num(row['マイナス']) > 0) h += item('マイナス', '−' + yen(row['マイナス']), '#cc6666');

  h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0">'
    + '<span style="font-size:14px;font-weight:600;color:#ccc">残り支給額</span>'
    + '<span style="font-size:20px;font-weight:700;color:#88aaff">' + yen(row['残り支給額']) + '</span>'
    + '</div>';

  var hairTotals = portalData.hairTotals || {};
  var hairAmt = hairTotals[sel] || 0;
  if (hairAmt > 0) {
    h += '<div style="margin-top:4px;padding:10px 0;border-top:1px solid #252540">';
    h += item('ヘアサロン立替', '＋' + yen(hairAmt), '#66dd88', '領収書登録分・源泉対象外');
    h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;margin-top:2px;border-top:1px solid #252540">'
      + '<span style="font-size:14px;font-weight:600;color:#ccc">最終支給額</span>'
      + '<span style="font-size:20px;font-weight:700;color:#66dd88">' + yen(num(row['残り支給額']) + hairAmt) + '</span>'
      + '</div>';
    h += '</div>';
  }

  h += '</div>';

  h += '<div style="font-size:10px;color:#334;text-align:center;padding:10px 0">TRUSTシステムの集計値です</div>';
  h += '</div>';

  // ---- バック率メーター（煽りあり） ----
  var tantoK_s = num(row['担当小計']);
  var jikanH_s = num(row['時間報酬']);
  if (tantoK_s > 0 && jikanH_s > 0) {
    var bairitu_s  = tantoK_s / jikanH_s;
    var curRate_s  = bairitu_s < 2 ? 10 : (bairitu_s < 3 ? 15 : 20);
    var nextRate_s = bairitu_s < 2 ? 15 : (bairitu_s < 3 ? 20 : null);
    var nextThr_s  = bairitu_s < 2 ? 2  : (bairitu_s < 3 ? 3  : null);
    var barPct_s   = Math.min(bairitu_s / 3, 1) * 100;
    var barColor_s = curRate_s === 10 ? '#e08000' : (curRate_s === 15 ? '#c8a800' : '#44bb66');

    h += '<div style="background:#14142a;border:1px solid #1e1e3a;border-radius:12px;padding:14px 16px;margin-top:10px">';
    h += '<div style="font-size:11px;color:#445;margin-bottom:12px;letter-spacing:0.5px">担当バック率メーター</div>';

    // バー
    h += '<div style="position:relative;height:28px;margin-bottom:4px">';
    h += '<div style="position:absolute;top:10px;left:0;width:66.7%;height:8px;background:#2a1800;border-radius:4px 0 0 4px"></div>';
    h += '<div style="position:absolute;top:10px;left:66.7%;right:0;height:8px;background:#1a2a00;border-radius:0 4px 4px 0"></div>';
    h += '<div style="position:absolute;top:10px;left:0;width:' + barPct_s.toFixed(1) + '%;height:8px;background:' + barColor_s + ';border-radius:4px"></div>';
    h += '<div style="position:absolute;top:6px;left:66.7%;width:2px;height:16px;background:#444;transform:translateX(-1px)"></div>';
    h += '<div style="position:absolute;top:6px;right:0;width:2px;height:16px;background:#444"></div>';
    h += '<div style="position:absolute;top:8px;left:' + barPct_s.toFixed(1) + '%;width:12px;height:12px;background:' + barColor_s + ';border:2px solid #fff;border-radius:50%;transform:translateX(-6px)"></div>';
    h += '</div>';

    // 目盛り
    h += '<div style="position:relative;height:28px;font-size:10px;color:#445">';
    h += '<span style="position:absolute;left:0">0倍<br><span style="color:#cc6644">10%</span></span>';
    h += '<span style="position:absolute;left:66.7%;transform:translateX(-50%);text-align:center">2倍<br><span style="color:#bbaa00">15%</span></span>';
    h += '<span style="position:absolute;right:0;text-align:right">3倍<br><span style="color:#44bb66">20%</span></span>';
    h += '</div>';

    h += '<div style="margin-top:8px;padding-top:10px;border-top:1px solid #1e1e3a">';
    h += '<div style="font-size:13px;font-weight:600;color:#ccc">倍率 ' + bairitu_s.toFixed(2) + '倍 → <span style="color:' + barColor_s + '">バック率 ' + curRate_s + '%</span></div>';

    if (nextRate_s) {
      var needed_s = Math.ceil(nextThr_s * jikanH_s - tantoK_s);
      var neededW  = Math.ceil(needed_s / 10000);
      // 煽りメッセージ
      var cheers = curRate_s === 10
        ? ['あと', '担当売上 ', '¥' + needed_s.toLocaleString(), ' (' + neededW + '万円)で15%へ！', '勢いに乗っていこう🔥']
        : ['ラストスパート！あと', '担当売上 ', '¥' + needed_s.toLocaleString(), ' (' + neededW + '万円)で20%達成！', '今日が変わり目💪'];
      h += '<div style="font-size:12px;color:#667;margin-top:4px">' + cheers[0]
        + '<span style="color:#88aaff;font-weight:600">' + cheers[2] + '</span>'
        + cheers[3] + '</div>';
      h += '<div style="font-size:12px;color:' + barColor_s + ';margin-top:4px;font-weight:600">' + cheers[4] + '</div>';
    } else {
      h += '<div style="font-size:13px;color:#44bb66;margin-top:4px;font-weight:600">今月も最高バック率20%達成！さすが！🎉</div>';
    }
    h += '</div>';
    h += '</div>';
  }

  h += '</div>';
  setContent(h);
}

function switchSalesMonth(m) { currentMonth = m; renderSales(); }

// ---- 給与明細（TRUST明細書形式） ----
function renderPay() {
  var sales = (portalData && portalData.sales) || {};
  var hairTotals = (portalData && portalData.hairTotals) || {};
  var salesMonths = Object.keys(sales);
  var hairMonths  = Object.keys(hairTotals).filter(function(m) { return !salesMonths.includes(m); });
  var allMonths   = salesMonths.concat(hairMonths).sort().reverse();

  if (allMonths.length === 0) {
    setContent('<div style="text-align:center;padding:60px 20px">'
      + '<div style="font-size:15px;font-weight:600;color:#88aaff;margin-bottom:8px">データなし</div>'
      + '<div style="font-size:12px;color:#556;line-height:1.7">今月の給与データはまだ取得されていません。</div>'
      + '</div>');
    return;
  }

  var pay = portalData && portalData.pay;
  var months = allMonths;
  var sel = (currentMonth && (sales[currentMonth] || hairTotals[currentMonth])) ? currentMonth : months[0];

  // 公開チェック（非管理者は未公開月を表示しない）
  var payPublished = portalData.payPublished || {};

  function monthTabsHtml(selectedM) {
    if (months.length <= 1) return '';
    var t = '<div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px">';
    months.forEach(function(m) {
      var act = m === selectedM;
      var pub = payPublished[m];
      var label = m + (isAdmin && !pub ? ' 🔒' : '');
      t += '<button onclick="switchPayMonth(\'' + m + '\')" style="padding:5px 14px;border-radius:16px;border:1px solid '
        + (act ? '#5588ff' : '#252540') + ';background:' + (act ? '#1a2a4a' : 'transparent')
        + ';color:' + (act ? '#88aaff' : '#556') + ';font-size:12px;cursor:pointer;white-space:nowrap">' + label + '</button>';
    });
    t += '</div>';
    return t;
  }

  var isHairOnlyMonth = !sales[sel] || Object.keys(sales[sel] || {}).length === 0;
  if (!isAdmin && !payPublished[sel] && !isHairOnlyMonth) {
    var hLock = '<div style="padding:14px">' + monthTabsHtml(sel)
      + '<div style="text-align:center;padding:60px 20px">'
      + '<div style="font-size:36px;margin-bottom:14px">🔒</div>'
      + '<div style="font-size:15px;font-weight:600;color:#88aaff;margin-bottom:8px">まだ公開されていません</div>'
      + '<div style="font-size:12px;color:#556;line-height:1.8">' + esc(sel) + ' の給与明細は確認中です。<br>公開されるまでお待ちください。</div>'
      + '</div></div>';
    setContent(hLock);
    return;
  }

  var s = (sales && sales[sel]) ? sales[sel] : {};
  var p = pay && pay[sel] ? pay[sel] : {};

  function n(v) { return parseFloat(String(v).replace(/[¥,]/g, '')) || 0; }
  function yen(v) { return '¥' + (parseInt(v) || 0).toLocaleString(); }

  // 売上データなし・領収書のみの月
  var hairTotals = portalData.hairTotals || {};
  var hairOnly = Object.keys(s).length === 0;
  if (hairOnly && hairTotals[sel]) {
    var hairAmt = hairTotals[sel];
    var reiwaOnly = sel;
    var partsO = sel.split('/');
    if (partsO.length === 2) reiwaOnly = '令和' + (parseInt(partsO[0]) - 2018) + '年' + parseInt(partsO[1]) + '月分';
    var hOnly = '<div style="padding:14px">' + monthTabsHtml(sel);
    if (isAdmin) {
      var isPubO = !!payPublished[sel];
      hOnly += '<div style="background:#1a1a2e;border:1px solid #2a2a44;border-radius:10px;padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">';
      hOnly += '<div><div style="font-size:10px;color:#445;margin-bottom:4px">給与明細 公開状態</div>';
      hOnly += '<div style="font-size:13px;font-weight:600;color:' + (isPubO ? '#44bb66' : '#cc8844') + '">' + (isPubO ? '✅ 公開中' : '🔒 未公開') + '</div></div>';
      hOnly += '<button onclick="togglePayPublish(\'' + esc(sel) + '\',\'' + (isPubO ? 'unpublishPay' : 'publishPay') + '\')" style="padding:8px 16px;background:' + (isPubO ? '#2a1010' : '#102a10') + ';border:1px solid ' + (isPubO ? '#cc4444' : '#44aa44') + ';border-radius:8px;color:' + (isPubO ? '#ff8888' : '#66dd66') + ';font-size:13px;font-weight:700;cursor:pointer">' + (isPubO ? '非公開に戻す' : '公開する') + '</button>';
      hOnly += '</div>';
    }
    hOnly += '<div style="background:#fff;color:#111;border-radius:12px;padding:16px 14px">';
    hOnly += '<div style="text-align:center;border-bottom:2px solid #333;padding-bottom:10px;margin-bottom:12px">';
    hOnly += '<div style="font-size:15px;font-weight:700">支払報酬明細書</div>';
    hOnly += '<div style="font-size:11px;margin-top:3px">' + esc(reiwaOnly) + '</div>';
    hOnly += '<div style="font-size:11px">ラウンジ 家康</div>';
    hOnly += '<div style="font-size:17px;font-weight:700;margin-top:6px">' + esc(portalData.viewAs || portalData.name || '') + '</div>';
    hOnly += '</div>';
    hOnly += '<div style="margin-top:12px;border-top:1px solid #ccc;padding-top:10px">';
    hOnly += '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:#006600"><span>ヘアサロン立替代</span><span>＋¥' + hairAmt.toLocaleString() + '</span></div>';
    hOnly += '<div style="display:flex;justify-content:space-between;padding:8px 0;margin-top:6px;border-top:2px solid #333;font-size:15px;font-weight:700"><span>最終支給額</span><span style="color:#003399">¥' + hairAmt.toLocaleString() + '</span></div>';
    hOnly += '</div></div></div>';
    setContent(hOnly);
    return;
  }

  var jikanH  = n(s['時間報酬']);
  var tantoK  = n(s['担当小計']);
  var tantoB  = n(s['担当バック']);
  var yoyakuB = n(s['予約バック']);
  var dohanB  = n(s['同伴バック']);
  var drinkB  = n(s['ドリンクバック']);
  var bottleB = n(s['ボトルバック']);
  var foodB   = n(s['フードバック']);
  var bonus   = n(s['ボーナス']);
  var shikyu  = jikanH + tantoB + yoyakuB + dohanB + drinkB + bottleB + foodB + bonus;

  var gensen    = n(s['源泉徴収']);
  var nichibara = n(s['日払']);
  var minus     = n(s['マイナス']);
  var kojo      = gensen + nichibara + minus;

  var nokori    = n(s['残り支給額']);
  var hairTotals = portalData.hairTotals || {};
  var hairReceipt = hairTotals[sel] || 0;
  var hairManual  = n(p['ヘアサロン立替(手入力)']);
  var hair        = hairReceipt > 0 ? hairReceipt : hairManual;
  var finalPay    = nokori + hair;

  // 令和変換
  var parts = sel.split('/');
  var reiwaStr = sel;
  if (parts.length === 2) {
    var reiwa = parseInt(parts[0]) - 2018;
    reiwaStr = '令和' + reiwa + '年' + parseInt(parts[1]) + '月分';
  }

  var h = '<div style="padding:14px">';

  h += monthTabsHtml(sel);

  // 管理者用：公開管理バー
  if (isAdmin) {
    var isPub = !!payPublished[sel];
    h += '<div style="background:#1a1a2e;border:1px solid #2a2a44;border-radius:10px;padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">';
    h += '<div>';
    h += '<div style="font-size:10px;color:#445;letter-spacing:0.5px;margin-bottom:4px">給与明細 公開状態</div>';
    h += '<div style="font-size:13px;font-weight:600;color:' + (isPub ? '#44bb66' : '#cc8844') + '">'
      + (isPub ? '✅ 公開中 — キャストが閲覧可能' : '🔒 未公開 — キャストには表示されません') + '</div>';
    h += '</div>';
    h += '<button onclick="togglePayPublish(\'' + esc(sel) + '\',\'' + (isPub ? 'unpublishPay' : 'publishPay') + '\')" '
      + 'style="padding:8px 16px;background:' + (isPub ? '#2a1010' : '#102a10') + ';border:1px solid '
      + (isPub ? '#cc4444' : '#44aa44') + ';border-radius:8px;color:' + (isPub ? '#ff8888' : '#66dd66')
      + ';font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap">'
      + (isPub ? '非公開に戻す' : '公開する') + '</button>';
    h += '</div>';
  }

  // 明細書カード（白背景）
  h += '<div style="background:#fff;color:#111;border-radius:12px;padding:16px 14px;font-family:sans-serif">';

  // ヘッダー
  h += '<div style="text-align:center;border-bottom:2px solid #333;padding-bottom:10px;margin-bottom:12px">';
  h += '<div style="font-size:15px;font-weight:700">支払報酬明細書</div>';
  h += '<div style="font-size:11px;margin-top:3px">' + esc(reiwaStr) + '</div>';
  h += '<div style="font-size:11px">ラウンジ 家康</div>';
  h += '<div style="font-size:17px;font-weight:700;margin-top:6px">' + esc(portalData.name || '') + '</div>';
  h += '</div>';

  function tr(label, val, section) {
    var bg = section === 'shikyu' ? '#eef2ff' : section === 'kojo' ? '#fff0f0' : '';
    var fw = section === 'total' ? 'font-weight:700;' : '';
    return '<tr>'
      + '<td style="padding:5px 8px;border:1px solid #ccc;font-size:12px;' + fw + (bg?'background:'+bg+';':'') + '">' + label + '</td>'
      + '<td style="padding:5px 8px;border:1px solid #ccc;font-size:12px;text-align:right;' + fw + (bg?'background:'+bg+';':'') + '">' + val + '</td>'
      + '</tr>';
  }
  function trHead(label) {
    return '<tr><td colspan="2" style="padding:4px 8px;border:1px solid #ccc;font-size:11px;font-weight:700;background:#e8eaf6;color:#333">' + label + '</td></tr>';
  }

  h += '<table style="width:100%;border-collapse:collapse">';
  h += trHead('支給対象');
  h += tr('基本給（時給）', yen(jikanH), 'shikyu');
  if (tantoB  > 0) h += tr('担当小計バック', yen(tantoB),  'shikyu');
  if (yoyakuB > 0) h += tr('予約給',         yen(yoyakuB), 'shikyu');
  if (dohanB  > 0) h += tr('同伴給',          yen(dohanB),  'shikyu');
  if (drinkB  > 0) h += tr('ドリンクバック',  yen(drinkB),  'shikyu');
  if (bottleB > 0) h += tr('ボトルバック',    yen(bottleB), 'shikyu');
  if (foodB   > 0) h += tr('フードバック',    yen(foodB),   'shikyu');
  if (bonus   > 0) h += tr('運営手当',        yen(bonus),   'shikyu');
  h += tr('合計', yen(shikyu), 'total');

  h += trHead('控除対象');
  h += tr('源泉徴収', yen(gensen), 'kojo');
  if (nichibara > 0) h += tr('日払', yen(nichibara), 'kojo');
  if (minus     > 0) h += tr('マイナス', yen(minus), 'kojo');
  h += tr('合計', yen(kojo), 'total');
  h += '</table>';

  // フッター
  h += '<div style="margin-top:12px;border-top:1px solid #ccc;padding-top:10px">';
  h += '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px">'
    + '<span>差引支給額</span><span style="font-weight:700">' + yen(nokori) + '</span></div>';

  if (hair > 0) {
    h += '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:#005500">'
      + '<span>ヘアサロン立替代</span><span>＋' + yen(hair) + '</span></div>';
    h += '<div style="display:flex;justify-content:space-between;padding:8px 0;margin-top:6px;border-top:2px solid #333;font-size:15px;font-weight:700">'
      + '<span>最終支給額</span><span style="color:#003399">' + yen(finalPay) + '</span></div>';
  } else {
    h += '<div style="display:flex;justify-content:space-between;padding:8px 0;margin-top:6px;border-top:2px solid #333;font-size:15px;font-weight:700">'
      + '<span>最終支給額</span><span style="color:#003399">' + yen(nokori) + '</span></div>';
  }
  h += '</div>';

  h += '</div>';  // white card

  // ---- バック率メーター ----
  if (tantoK > 0 && jikanH > 0) {
    var bairitu = tantoK / jikanH;
    var curRate  = bairitu < 2 ? 10 : (bairitu < 3 ? 15 : 20);
    var nextRate = bairitu < 2 ? 15 : (bairitu < 3 ? 20 : null);
    var nextThr  = bairitu < 2 ? 2  : (bairitu < 3 ? 3  : null);
    // 0〜3倍スケールで位置を計算（3倍超えは100%）
    var barPct   = Math.min(bairitu / 3, 1) * 100;
    var barColor = curRate === 10 ? '#e08000' : (curRate === 15 ? '#c8a800' : '#44bb66');
    var bgZone1  = curRate === 10 ? '#2a1a00' : '#1a1a00';

    h += '<div style="background:#14142a;border:1px solid #1e1e3a;border-radius:12px;padding:14px 16px;margin-top:10px">';
    h += '<div style="font-size:11px;color:#445;margin-bottom:12px;letter-spacing:0.5px">バック率メーター</div>';

    // バー本体
    h += '<div style="position:relative;height:28px;margin-bottom:4px">';
    // 背景ゾーン（0〜2x: 10%帯、2〜3x: 15%帯）
    h += '<div style="position:absolute;top:10px;left:0;width:66.7%;height:8px;background:#2a1800;border-radius:4px 0 0 4px"></div>';
    h += '<div style="position:absolute;top:10px;left:66.7%;right:0;height:8px;background:#1a2a00;border-radius:0 4px 4px 0"></div>';
    // 進捗バー
    h += '<div style="position:absolute;top:10px;left:0;width:' + barPct.toFixed(1) + '%;height:8px;background:' + barColor + ';border-radius:4px;transition:width 0.5s"></div>';
    // 2x境界線
    h += '<div style="position:absolute;top:6px;left:66.7%;width:2px;height:16px;background:#444;transform:translateX(-1px)"></div>';
    // 3x境界線（右端）
    h += '<div style="position:absolute;top:6px;right:0;width:2px;height:16px;background:#444"></div>';
    // 現在地ドット
    h += '<div style="position:absolute;top:8px;left:' + barPct.toFixed(1) + '%;width:12px;height:12px;background:' + barColor + ';border:2px solid #fff;border-radius:50%;transform:translateX(-6px)"></div>';
    h += '</div>';

    // 目盛りラベル
    h += '<div style="position:relative;height:28px;font-size:10px;color:#445">';
    h += '<span style="position:absolute;left:0">0倍<br><span style="color:#cc6644">10%</span></span>';
    h += '<span style="position:absolute;left:66.7%;transform:translateX(-50%);text-align:center">2倍<br><span style="color:#bbaa00">15%</span></span>';
    h += '<span style="position:absolute;right:0;text-align:right">3倍<br><span style="color:#44bb66">20%</span></span>';
    h += '</div>';

    // 現在の状態テキスト
    h += '<div style="margin-top:8px;padding-top:10px;border-top:1px solid #1e1e3a">';
    h += '<div style="font-size:13px;font-weight:600;color:#ccc">倍率 ' + bairitu.toFixed(2) + '倍 → <span style="color:' + barColor + '">バック率 ' + curRate + '%</span></div>';
    if (nextRate) {
      var needed = Math.ceil(nextThr * jikanH - tantoK);
      h += '<div style="font-size:12px;color:#667;margin-top:4px">'
        + '<span style="color:#88aaff;font-weight:600">' + nextRate + '%</span> まであと担当売上 '
        + '<span style="color:#88aaff;font-weight:600">¥' + needed.toLocaleString() + '</span></div>';
    } else {
      h += '<div style="font-size:12px;color:#44bb66;margin-top:4px">最高バック率（20%）達成！</div>';
    }
    h += '</div>';
    h += '</div>';  // meter card
  }

  h += '</div>';
  setContent(h);
}

function switchPayMonth(m) { currentMonth = m; renderPay(); }

function togglePayPublish(month, action) {
  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: action, userId: userId, month: month })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.ok) {
      if (!portalData.payPublished) portalData.payPublished = {};
      portalData.payPublished[month] = (action === 'publishPay');
      renderPay();
    } else {
      alert('エラー: ' + (d.error || 'unknown'));
    }
  })
  .catch(function() { alert('通信エラーが発生しました'); });
}

var rankingMonths = [];

function loadRanking(m) {
  setContent('<div style="text-align:center;color:#555;padding:60px 0;font-size:14px">読み込み中...</div>');
  var url = GAS_URL + '?action=portal&tab=ranking&userId=' + encodeURIComponent(userId)
    + (m ? '&month=' + encodeURIComponent(m) : '');
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) { setContent('<div style="color:#f66;padding:20px">' + esc(d.error || 'エラー') + '</div>'); return; }
      rankingMonths = d.availMonths || [];
      renderRanking(d);
    })
    .catch(function() { setContent('<div style="color:#f66;padding:20px">通信エラーが発生しました</div>'); });
}

    if (!list || list.length === 0) {
      c += '<div style="text-align:center;color:#445;font-size:13px;padding:20px 0">データなし</div>';
    } else {
      list.forEach(function(item, idx) {

    h += '<div style="font-size:11px;color:#ccaa66;font-weight:600;margin-bottom:8px">💴 現金チェック用 日払い・経費を取得</div>';
    h += '<div style="font-size:11px;color:#889;line-height:1.7;margin-bottom:10px">'
       + '① 下のリンクをブックマークバーにドラッグ<br>'
       + '② 営業後、TRUSTを開いてそのブックマークをクリック<br>'
       + '③ 当日の日払い合計・経費合計を自動取得して記録'
       + '</div>';
    h += '<a id="trust-cash-bookmarklet" href="" style="display:block;text-align:center;padding:10px;background:#2a2210;border:1px solid #886622;border-radius:10px;color:#ddbb55;font-size:13px;font-weight:600;text-decoration:none;cursor:grab">📌 現金Sync ← ドラッグしてブックマーク登録</a>';
    h += '</div>';
  }

  h += '</div>';
  setContent(h);
  setupBookmarklet_();

function setupBookmarklet_() {
  var el = document.getElementById('trust-bookmarklet');
  if (!el) return;
  var secret = 'lounge-sync-2026';
  var gas = GAS_URL;

  // TRUSTの合計行(62列)から全データを抽出するヘルパーをブックマークレット内に埋め込む
  // 列マッピング (実測):

function previewPhoto(input) {
  var file = input.files && input.files[0];
  if (!file) return;
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d');
  var img = new Image();
  var reader = new FileReader();
  reader.onload = function(e) {
    img.onload = function() {
      var MAX = 1000;
      var w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
      var dataUrl = canvas.toDataURL('image/jpeg', 0.75);
      receiptPhotoBase64 = dataUrl.split(',')[1];
      receiptPhotoMime   = 'image/jpeg';
      // プレビュー表示
      var prev = document.getElementById('photo-preview');
      if (prev) {
        prev.innerHTML = '<img src="' + dataUrl + '" style="width:100%;height:100%;object-fit:cover;border-radius:8px">';
      }
      var hint = document.getElementById('photo-hint');
      if (hint) hint.style.display = 'none';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearPhoto() {
  receiptPhotoBase64 = '';
  receiptPhotoMime   = 'image/jpeg';
  var prev = document.getElementById('photo-preview');
  if (prev) prev.innerHTML = '<span id="photo-hint" style="font-size:12px;color:#445">タップして写真を選択</span>';
  var inp = document.getElementById('photo-input');

  if (!amount) { if (msg) msg.style.color = '#f88'; if (msg) msg.textContent = '金額を入力してください'; return; }
  var btn = document.querySelector('button[onclick="submitReceipt()"]');
  if (btn) { btn.disabled = true; btn.textContent = '送信中…'; }
  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({
      action: 'submitHairReceipt',
      userId: userId,
      date: date,
      amount: amount,
      photo: receiptPhotoBase64,
      mime: receiptPhotoMime
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (btn) { btn.disabled = false; btn.textContent = '登録する'; }

// ---- シフト提出 ----

function genTimes(startH, startM, endH, endM) {
  var list = [];
  for (var h = startH; h <= endH; h++) {
    for (var m = 0; m < 60; m += 30) {
      if (h === endH && m > endM) break;
      if (h === startH && m < startM) continue;
      list.push(h + ':' + (m === 0 ? '00' : '30'));
    }
  }
  return list;
}

function renderShiftCal() {
  var now = new Date();
  if (!viewYear) { viewYear = now.getFullYear(); viewMonth = now.getMonth(); }
  setContent(calHtml() + '<div class="shift-spacer"></div>');
  document.getElementById('submit-bar').style.display = 'block';
  updateSubmitBar();
}

function calHtml() {
  var today = new Date(); today.setHours(0,0,0,0);
  var firstWday = new Date(viewYear, viewMonth, 1).getDay();
  var daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  var WDAYS = ['日','月','火','水','木','金','土'];

  var h = '<div class="shift-month-nav">'
    + '<button class="nav-btn" onclick="shiftViewMonth(-1)">‹</button>'
    + '<div class="shift-month-label">' + viewYear + '年' + (viewMonth+1) + '月</div>'
    + '<button class="nav-btn" onclick="shiftViewMonth(1)">›</button>'
    + '</div>';
  h += '<div class="weekdays">'
    + WDAYS.map(function(d,i) {
        return '<div class="weekday'+(i===0?' sun':i===6?' sat':'')+'">'+d+'</div>';
      }).join('')
    + '</div><div class="days">';

  for (var i=0; i<firstWday; i++) h += '<div class="day empty"></div>';

  for (var d=1; d<=daysInMonth; d++) {
    var dt = new Date(viewYear, viewMonth, d); dt.setHours(0,0,0,0);
    var wday = dt.getDay();
    var key = (viewMonth+1)+'/'+d;
    var past = dt < today;
    var isToday = dt.getTime() === today.getTime();
    var sel = shiftSelections[key];
    var existShift = portalData && portalData.shifts && portalData.shifts[key];
    var isPending = pendingShifts[key];
    var isKyukin = sel === '欠勤' || (!sel && existShift === '休み');
    var cls = 'day';
    if (wday===0) cls += ' sun';
    if (wday===6) cls += ' sat';
    if (past) cls += ' past';
    if (isToday) cls += ' today';
    if (isKyukin) cls += ' kyukin';
    else if (sel) cls += ' selected';
    else if (isPending) cls += ' pending-shift';
    else if (existShift) cls += ' scheduled';
    var displayTime = sel || isPending || existShift || '';
    var timeLabel = '';
    if (!isKyukin && displayTime && displayTime !== '休み') {
      var tm = displayTime.match(/^(\d+):(\d+)/);
      if (tm) timeLabel = tm[1] + ':' + tm[2] + '~';
      else if (displayTime === '予約出勤') timeLabel = '予約';
    }
    h += '<div class="'+cls+'" data-key="'+key+'" onclick="openPicker(\''+key+'\')">'
      + '<div class="num">'+d+'</div>'
      + (timeLabel ? '<div class="shift-time">'+timeLabel+'</div>' : '')
      + (isKyukin ? '<div class="kyukin-label">欠勤</div>' : '')
      + '</div>';
  }
  h += '</div>';
  return h;
}

function shiftViewMonth(dir) {
  viewMonth += dir;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderShiftCal();
}

  var startSel = document.createElement('select');
  startSel.style.cssText = selStyle;
  genTimes(sr[0], sr[1], sr[2], sr[3]).forEach(function(t) {
    var opt = document.createElement('option'); opt.value = t; opt.textContent = t;
    startSel.appendChild(opt);
  });

  var sep = document.createElement('span');
  sep.textContent = '～'; sep.style.cssText = 'color:#888;flex-shrink:0';

  var endSel = document.createElement('select');
  endSel.style.cssText = selStyle;
  var allEndTimes = genTimes(er[0], er[1], er[2], er[3]);

  function updateEnds() {
    endSel.innerHTML = '';
    var sp = startSel.value.split(':');
    var startMins = parseInt(sp[0]) * 60 + parseInt(sp[1]);
    allEndTimes.forEach(function(t) {
      var ep = t.split(':');
      if (parseInt(ep[0]) * 60 + parseInt(ep[1]) <= startMins) return;
      var opt = document.createElement('option'); opt.value = t; opt.textContent = t;
      endSel.appendChild(opt);
    });
  }
  updateEnds();
  startSel.onchange = updateEnds;

  var r = role;
  var submitBtn = document.createElement('button');
  submitBtn.textContent = '提出';
  submitBtn.style.cssText = 'padding:9px 12px;background:#1a5c2a;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;flex-shrink:0';
  submitBtn.onclick = function() { pickTime(pickerKey, startSel.value + '～' + endSel.value, r); };

  row.appendChild(startSel); row.appendChild(sep); row.appendChild(endSel); row.appendChild(submitBtn);
  return row;
}

function showStartPicker() {
  document.getElementById('picker-title').textContent = pickerKey + ' のシフト';
  var g = document.getElementById('picker-grid');
  g.innerHTML = '';

  // 欠勤申請（既登録日のみ）
  var hasShift = portalData && portalData.shifts && portalData.shifts[pickerKey];

    var kyukinBtn = document.createElement('button');
    kyukinBtn.className = 'time-opt' + (shiftSelections[pickerKey] === '欠勤' ? ' chosen' : '');
    kyukinBtn.style.cssText = 'background:#2a1515;border-color:#bb4444;color:#ff8888;grid-column:span 2';
    kyukinBtn.textContent = '欠勤申請';
    kyukinBtn.onclick = function() { pickTime(pickerKey, '欠勤', 'キャスト'); };
    g.appendChild(kyukinBtn);
  }

  if (staffRole === 'キャスト') {
    var castTopRow = document.createElement('div');

    castFullBtn.className = 'time-opt full';
    castFullBtn.style.flex = '2';
    castFullBtn.textContent = 'キャストフル　20:00 ～ 24:00';
    castFullBtn.onclick = function() { pickTime(pickerKey, '20:00～24:00', 'キャスト'); };

    var yoyakuBtn = document.createElement('button');
    yoyakuBtn.className = 'time-opt';
    yoyakuBtn.style.cssText = 'flex:1;background:#1a2035;border-color:#886633;color:#ffcc66;font-weight:600;font-size:13px';
    yoyakuBtn.textContent = '予約出勤';
    yoyakuBtn.onclick = function() { pickTime(pickerKey, '予約出勤', 'キャスト'); };

    castTopRow.appendChild(castFullBtn);
    castTopRow.appendChild(yoyakuBtn);
    g.appendChild(castTopRow);
    g.appendChild(makePickerStep('時間指定の場合'));
    g.appendChild(makeTimeRow([20,0,23,30], [20,30,24,0], 'キャスト'));

  } else if (staffRole === '黒服社員') {
    var kuroEmpBtn = document.createElement('button');
    kuroEmpBtn.className = 'time-opt full';
    kuroEmpBtn.style.background = '#1a2a1a';
    kuroEmpBtn.style.borderColor = '#448844';
    kuroEmpBtn.style.color = '#88cc88';
    kuroEmpBtn.textContent = '黒服フル　18:00 ～ 翌2:00';
    kuroEmpBtn.onclick = function() { pickTime(pickerKey, '18:00～26:00', '黒服社員'); };
    g.appendChild(kuroEmpBtn);

  } else { // 黒服バイト
    var kuroPartBtn = document.createElement('button');
    kuroPartBtn.className = 'time-opt full';
    kuroPartBtn.style.background = '#1a2a1a';
    kuroPartBtn.style.borderColor = '#448844';
    kuroPartBtn.style.color = '#88cc88';
    kuroPartBtn.textContent = '黒服フル　18:00 ～ 翌2:00';
    kuroPartBtn.onclick = function() { pickTime(pickerKey, '18:00～26:00', '黒服バイト'); };
    g.appendChild(kuroPartBtn);
    g.appendChild(makePickerStep('時間指定の場合'));
    g.appendChild(makeTimeRow([18,0,25,30], [18,30,26,0], '黒服バイト'));
  }

  addClearBtn(g);
}

function addClearBtn(g) {
  if (!shiftSelections[pickerKey]) return;
  var off = document.createElement('button');
  off.className = 'time-opt off';
  off.style.gridColumn = 'span 2';
  off.textContent = 'クリア';
  off.onclick = function() { pickTime(pickerKey, null); };
  g.appendChild(off);
}

function selectStart(t) {
  pickerStart = t;
  document.getElementById('picker-title').textContent = t + '〜 終了時間を選択';
  var g = document.getElementById('picker-grid');
  g.innerHTML = '<div class="picker-step">' + pickerKey + ' | スタート: ' + t + '</div>';

  // 戻るボタン
  var back = document.createElement('button');
  back.className = 'picker-back';
  back.textContent = '← スタートを変更';
  back.onclick = showStartPicker;
  g.appendChild(back);

  // 終了時間 (スタートの30分後〜26:00)
  var sh = parseInt(t.split(':')[0]);
  var sm = parseInt(t.split(':')[1]);
  var startMins = sh * 60 + sm;
  genTimes(18, 30, 26, 0).forEach(function(e) {
    var eh = parseInt(e.split(':')[0]);
    var em = parseInt(e.split(':')[1]);
    if (eh * 60 + em <= startMins) return;
    var btn = document.createElement('button');
    btn.className = 'time-opt';
    btn.textContent = e;
    btn.onclick = function() { pickTime(pickerKey, t + '～' + e); };
    g.appendChild(btn);
  });
}

function pickTime(key, t, role) {
  if (t) {
    shiftSelections[key] = t;
    shiftRoles[key] = role || 'キャスト';
  } else {
    delete shiftSelections[key];
    delete shiftRoles[key];
  }
  closePicker();
  renderShiftCal();
}

function closePicker() {
  document.getElementById('picker-overlay').classList.remove('show');
}

function updateSubmitBar() {
  var count = Object.keys(shiftSelections).length;
  document.getElementById('shift-count').textContent = count > 0 ? count + '日分選択中' : '';
  document.getElementById('submit-btn').disabled = count === 0;
}

function doSubmit() {
  var btn = document.getElementById('submit-btn');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.textContent = '提出中...';

  var shifts = [];
  var sortedKeys = Object.keys(shiftSelections).sort(function(a, b) {
    var ap = a.split('/'), bp = b.split('/');
    var am = parseInt(ap[0]), ad = parseInt(ap[1]);
    var bm = parseInt(bp[0]), bd = parseInt(bp[1]);
    return am !== bm ? am - bm : ad - bd;
  });
  var submittedTimes = {};
  sortedKeys.forEach(function(k) {
    submittedTimes[k] = shiftSelections[k];
    shifts.push({ date: k, time: shiftSelections[k], role: shiftRoles[k] || 'キャスト' });
  });

  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'submitShift', userId: userId, shifts: shifts })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.ok) {
      btn.textContent = '✓ 提出しました';
      btn.style.background = '#1a4422';
      var autoSet = {};
      (d.autoApproved || []).forEach(function(date) { autoSet[date] = true; });
      Object.keys(submittedTimes).forEach(function(k) {
        var t = submittedTimes[k];
        if (autoSet[k]) {
          if (!portalData) portalData = {};
          if (!portalData.shifts) portalData.shifts = {};
          portalData.shifts[k] = (t === '欠勤') ? '休み' : t;
        } else {
          pendingShifts[k] = t;
        }
      });
      shiftSelections = {}; shiftRoles = {};
      renderShiftCal();
      setTimeout(function() {
        btn.textContent = 'シフトを提出する';
        btn.style.background = '';
        btn.disabled = true;
      }, 2000);
    } else {
      alert('エラー: ' + (d.error || '不明'));
      btn.disabled = false;
      btn.textContent = 'シフトを提出する';
    }
  })
  .catch(function(e) {
    alert('通信エラー: ' + (e && e.message || ''));
    btn.disabled = false;
    btn.textContent = 'シフトを提出する';
  });
}

function monthBar(months) {

function selectMonth(m) {
  currentMonth = m;
  renderTab(currentTab);
}

function row(label, val, cls) {
  return '<div class="row"><span class="row-label">' + esc(label) + '</span>'

// ---- 申請管理 ----
var reqFilter = 'pending';

function loadRequests() {
  setContent('<div class="loading">申請を読み込み中...</div>');
  var url = GAS_URL + '?action=portal&userId=' + encodeURIComponent(userId) + '&tab=requests';
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) { setContent('<div class="err">エラー: ' + esc(d.error||'') + '</div>'); return; }
      renderRequests(d.requests || []);
    })
    .catch(function(e) { setContent('<div class="err">通信エラー</div>'); });
}

function renderRequests(list) {
  var filters = [
    { key: 'pending', label: '未処理' },
    { key: 'all',     label: 'すべて' },
  ];
  var filterHtml = '<div class="req-filter">'
    + filters.map(function(f) {
        return '<button class="req-filter-btn' + (reqFilter === f.key ? ' active' : '')
          + '" onclick="setReqFilter(\'' + f.key + '\')">' + f.label + '</button>';
      }).join('')
    + '</div>';

  var filtered = list.filter(function(r) {
    return reqFilter === 'all' || r.status === 'pending';
  });

  if (filtered.length === 0) {
    setContent(filterHtml + '<div class="req-empty">'
      + (reqFilter === 'pending' ? '未処理の申請はありません' : '申請がありません') + '</div>');
    return;
  }

  var html = filterHtml;
  filtered.forEach(function(r) {
    var isDone = r.status !== 'pending';
    html += '<div class="req-card' + (r.status === '承諾' ? ' approved' : r.status === '休み' ? ' rejected' : '') + '">'
      + '<div class="req-head">'
      + '<span class="req-name">' + esc(r.name) + '</span>'
      + '<span class="req-time">' + esc(r.submittedAt) + '</span>'
      + '</div>'
      + '<div class="req-detail">📅 ' + esc(r.date) + '　⏰ ' + esc(r.time)
      + (r.role ? '　👤 ' + esc(r.role) : '') + '</div>';

    if (isDone) {
      html += '<div class="req-status ' + (r.status === '承諾' ? 'ok' : 'off') + '">'
        + (r.status === '承諾' ? '✓ 承諾済み' : '✗ 休み決定') + '</div>';
    } else {
      html += '<div class="req-actions">'
        + '<button class="req-btn approve" onclick="processReq(' + r.rowIdx + ',\''
          + esc(r.name) + '\',\'' + esc(r.date) + '\',\'' + esc(r.time) + '\',\'承諾\')">✓ 承諾</button>'
        + '<button class="req-btn reject" onclick="processReq(' + r.rowIdx + ',\''
          + esc(r.name) + '\',\'' + esc(r.date) + '\',\'' + esc(r.time) + '\',\'休み\')">✗ 休み</button>'
        + '</div>';
    }
    html += '</div>';
  });
  setContent(html);
}

function setReqFilter(f) {
  reqFilter = f;
  loadRequests();
}

function processReq(rowIdx, name, date, time, decision) {
  var card = event.target.closest('.req-card');
  if (card) { card.style.opacity = '0.5'; card.style.pointerEvents = 'none'; }

  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'approveShift', userId: userId, rowIdx: rowIdx,
                           name: name, date: date, time: time, decision: decision })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.ok) { loadRequests(); }
    else {
      if (card) { card.style.opacity = ''; card.style.pointerEvents = ''; }
      alert('エラー: ' + (d.error || '不明'));
    }
  })
  .catch(function() {
    if (card) { card.style.opacity = ''; card.style.pointerEvents = ''; }
    alert('通信エラー');
  });
}

function setContent(html) {
  document.getElementById('content').innerHTML = html;
}

function showErr(msg) {
  document.getElementById('user-name').textContent = '';
  setContent('<div class="err">' + msg + '</div>');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---- 通知設定タブ ----
var notifSettings = null;
var BUILTIN_NOTIF_KEYS = ['ieyas_url','kaiten_check','lineup','kinsen_mae','soganbansen','dohan_check','okuri_summary',
                           'okuri_confirm','seki_check','shoumei','kinsen_go','oshibori'];
var DAY_LABELS = ['月','火','水','木','金','土','日'];

function loadNotifSettings() {
  setContent('<div class="loading">通知設定を読み込み中...</div>');
  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'getNotifSettings', userId: userId })
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) { setContent('<div class="err">エラー: ' + esc(d.error||'') + '</div>'); return; }
      notifSettings = d.settings;
      renderNotif(notifSettings);
    })
    .catch(function() { setContent('<div class="err">通信エラー</div>'); });
}

function buildNotifRow(k, s) {
  var isCustom = k.startsWith('custom_');
  var days = s.days || [1,2,3,4,5,6];
  var enabled = s.enabled !== false;
  var time = s.time || '00:00';
  var msgEditable = isCustom || s.msgEditable;

  var dayBoxes = DAY_LABELS.map(function(d, i) {
    var dayNum = i + 1;
    var chk = days.indexOf(dayNum) >= 0 ? 'checked' : '';
    return '<label class="notif-day-box">'
      + '<input type="checkbox" ' + chk + ' onchange="notifDayChange(\'' + k + '\',' + dayNum + ',this.checked)">'
      + '<span>' + d + '</span></label>';
  }).join('');

  var msgVal = s.message != null ? s.message : (s.defaultMsg || '');
  var msgHtml = msgEditable
    ? '<textarea class="notif-msg-area" rows="4" placeholder="メッセージ（空欄=デフォルト）" onchange="notifMsgChange(\'' + k + '\',this.value)">' + esc(msgVal) + '</textarea>'
    : '<div class="notif-msg-auto">自動生成（編集不可）</div>';

  var groupSel = isCustom
    ? ('<div class="notif-expand-label">送信先</div><select class="notif-group-sel" onchange="notifGroupChange(\'' + k + '\',this.value)">'
       + ['staff','kurofuku','both'].map(function(v) {
           var lbl = v==='staff'?'スタッフ':v==='kurofuku'?'黒服':'両方';
           return '<option value="' + v + '"' + ((s.groupKey||'staff')===v?' selected':'') + '>' + lbl + '</option>';
         }).join('') + '</select>')
    : '';

  var delBtn = isCustom
    ? '<button class="notif-del-btn" onclick="deleteNotif(\'' + k + '\')">🗑 削除</button>'
    : '';

  return '<div class="notif-card" id="ncard-' + k + '" style="' + (enabled?'':'opacity:.45') + '">'
    + '<div class="notif-card-header" onclick="toggleNotifExpand(\'' + k + '\')">'
    +   '<label class="notif-toggle" onclick="event.stopPropagation()">'
    +     '<input type="checkbox" id="ntog-' + k + '" ' + (enabled?'checked':'') + ' onchange="notifToggle(\'' + k + '\')">'
    +     '<span class="notif-slider"></span></label>'
    +   '<div class="notif-mid">'
    +     '<div class="notif-label">' + esc(s.label || k) + '</div>'
    +     '<div class="notif-group-tag">' + esc(s.group || '') + '</div>'
    +   '</div>'
    +   '<input type="time" class="notif-time" id="ntime-' + k + '" value="' + esc(time) + '" '
    +     'onclick="event.stopPropagation()" onchange="notifTimeChange(\'' + k + '\')">'
    +   '<span class="notif-chevron" id="nchev-' + k + '">›</span>'
    + '</div>'
    + '<div class="notif-expand" id="nexp-' + k + '" style="display:none">'
    +   '<div class="notif-expand-label">曜日</div>'
    +   '<div class="notif-days-row">' + dayBoxes + '</div>'
    +   groupSel
    +   '<div class="notif-expand-label">メッセージ</div>'
    +   msgHtml
    +   delBtn
    + '</div>'
    + '</div>';
}

function buildAddForm() {
  var dayBoxes = DAY_LABELS.map(function(d, i) {
    return '<label class="notif-day-box"><input type="checkbox" checked id="nadd-day-' + (i+1) + '"><span>' + d + '</span></label>';
  }).join('');
  return '<div id="notif-add-area" style="display:none"><div class="notif-add-form">'
    + '<div class="notif-expand-label">通知名</div>'
    + '<input type="text" class="notif-add-input" id="nadd-label" placeholder="例: 発注確認">'
    + '<div class="notif-expand-label">時刻</div>'
    + '<input type="time" class="notif-time" id="nadd-time" value="12:00">'
    + '<div class="notif-expand-label">曜日</div>'
    + '<div class="notif-days-row">' + dayBoxes + '</div>'
    + '<div class="notif-expand-label">送信先</div>'
    + '<select class="notif-group-sel" id="nadd-group">'
    +   '<option value="staff">スタッフ</option>'
    +   '<option value="kurofuku">黒服</option>'
    +   '<option value="both">両方</option>'
    + '</select>'
    + '<div class="notif-expand-label">メッセージ</div>'
    + '<textarea class="notif-msg-area" rows="3" id="nadd-msg" placeholder="送信するメッセージ"></textarea>'
    + '<div style="display:flex;gap:8px;margin-top:12px">'
    +   '<button class="notif-save-btn" style="flex:1;margin-top:0" onclick="confirmAddNotif()">追加する</button>'
    +   '<button class="notif-save-btn" style="flex:0;width:80px;margin-top:0;background:#1e0f0f;color:#d66" onclick="cancelAddNotif()">キャンセル</button>'
    + '</div></div></div>';
}

function renderNotif(settings) {
  var customKeys = Object.keys(settings).filter(function(k) { return k.startsWith('custom_'); });
  var rows = BUILTIN_NOTIF_KEYS.concat(customKeys).map(function(k) {
    return settings[k] ? buildNotifRow(k, settings[k]) : '';
  }).join('');

  var html = '<div style="padding:14px">'
    + '<div style="font-size:13px;font-weight:700;color:#aac;margin-bottom:10px;letter-spacing:.05em">LINE通知設定</div>'
    + '<div class="notif-list">' + rows + '</div>'
    + buildAddForm()
    + '<button class="notif-add-btn" id="notif-add-btn" onclick="openAddNotifForm()">＋ 通知を追加</button>'
    + '<button class="notif-save-btn" onclick="saveNotifSettings()">保存する</button>'
    + '<div id="notif-save-msg" style="text-align:center;font-size:13px;color:#6f9;margin-top:10px;display:none">保存しました</div>'
    + '</div>';
  setContent(html);
}

function toggleNotifExpand(k) {
  var exp = document.getElementById('nexp-' + k);
  var chev = document.getElementById('nchev-' + k);
  if (!exp) return;
  var open = exp.style.display === 'none';
  exp.style.display = open ? 'block' : 'none';
  if (chev) chev.style.transform = open ? 'rotate(90deg)' : '';
}

function notifToggle(k) {
  if (!notifSettings || !notifSettings[k]) return;
  notifSettings[k].enabled = document.getElementById('ntog-' + k).checked;
  var card = document.getElementById('ncard-' + k);
  if (card) card.style.opacity = notifSettings[k].enabled ? '1' : '0.45';
}

function notifTimeChange(k) {
  if (!notifSettings || !notifSettings[k]) return;
  notifSettings[k].time = document.getElementById('ntime-' + k).value;
}

function notifDayChange(k, day, checked) {
  if (!notifSettings || !notifSettings[k]) return;
  var days = notifSettings[k].days || [];
  if (checked && days.indexOf(day) < 0) days.push(day);
  if (!checked) days = days.filter(function(d) { return d !== day; });
  notifSettings[k].days = days;
}

function notifMsgChange(k, val) {
  if (!notifSettings || !notifSettings[k]) return;
  notifSettings[k].message = val.trim() || null;
}

function notifGroupChange(k, val) {
  if (!notifSettings || !notifSettings[k]) return;
  notifSettings[k].groupKey = val;
  notifSettings[k].group = val === 'staff' ? 'スタッフ' : val === 'kurofuku' ? '黒服' : '両方';
}

function openAddNotifForm() {
  var area = document.getElementById('notif-add-area');
  var btn = document.getElementById('notif-add-btn');
  if (area) area.style.display = 'block';
  if (btn) btn.style.display = 'none';
}

function cancelAddNotif() {
  var area = document.getElementById('notif-add-area');
  var btn = document.getElementById('notif-add-btn');
  if (area) area.style.display = 'none';
  if (btn) btn.style.display = 'block';
}

function confirmAddNotif() {
  var label = (document.getElementById('nadd-label').value || '').trim();
  if (!label) { alert('通知名を入力してください'); return; }
  var time = document.getElementById('nadd-time').value || '12:00';
  var group = document.getElementById('nadd-group').value || 'staff';
  var msg = (document.getElementById('nadd-msg').value || '').trim();
  var days = [1,2,3,4,5,6,7].filter(function(d) {
    var el = document.getElementById('nadd-day-' + d);
    return el && el.checked;
  });
  var key = 'custom_' + Date.now();
  notifSettings[key] = {
    label: label, time: time, enabled: true,
    group: group==='staff'?'スタッフ':group==='kurofuku'?'黒服':'両方',
    groupKey: group, days: days, message: msg || null, custom: true
  };
  renderNotif(notifSettings);
  setTimeout(function() { toggleNotifExpand(key); }, 30);
}

function deleteNotif(k) {
  var name = notifSettings[k] && notifSettings[k].label || k;
  if (!confirm('「' + name + '」を削除しますか？')) return;
  delete notifSettings[k];
  renderNotif(notifSettings);

function cashsetFloorCard(floor, label) {
  var rows = CASHSET_DENOMS.map(function(pair) {
    var key = pair[0], denomLabel = pair[1];
    var t = cashThresholds.till[floor][key] || {};
    var s = cashThresholds.safe[floor][key] || {};
    return '<div class="cashset-denom-row">'
      + '<div class="cashset-denom-label">' + denomLabel + '</div>'
      + '<div class="cashset-field"><span>レジ最少</span><input type="number" inputmode="numeric" class="cashset-input" '
      +   'value="' + (t.min != null ? t.min : '') + '" onchange="cashsetTillChange(\'' + floor + '\',\'' + key + '\',\'min\',this.value)"></div>'
      + '<div class="cashset-field"><span>レジ最大</span><input type="number" inputmode="numeric" class="cashset-input" '
      +   'value="' + (t.max != null ? t.max : '') + '" onchange="cashsetTillChange(\'' + floor + '\',\'' + key + '\',\'max\',this.value)"></div>'
      + '<div class="cashset-field"><span>金庫最少</span><input type="number" inputmode="numeric" class="cashset-input" '
      +   'value="' + (s.min != null ? s.min : '') + '" onchange="cashsetSafeChange(\'' + floor + '\',\'' + key + '\',this.value)"></div>'
      + '</div>';
  }).join('');
  return '<div class="cashset-card"><div class="cashset-floor">' + label + '</div>' + rows + '</div>';
}

function renderCashThresholds(thresholds) {
  var html = '<div style="padding:14px">'

    + '<div style="font-size:11px;color:#556;margin-bottom:12px;line-height:1.6">レジの枚数が最少を下回る/最大を超える場合や、金庫の枚数が最少を下回る場合に、閉店チェック時に補充・移動の指示が自動表示されます。</div>'
    + cashsetFloorCard('f5', '5F')

    + '<button class="notif-save-btn" onclick="saveCashThresholds()">保存する</button>'
    + '<div id="cashset-save-msg" style="text-align:center;font-size:13px;color:#6f9;margin-top:10px;display:none">保存しました</div>'
    + '<div class="cashset-card" style="margin-top:18px">'
    +   '<div class="cashset-floor">本日の申請をリセット</div>'
    +   '<div style="font-size:11px;color:#669;margin-bottom:10px;line-height:1.6">提出済みの申請を削除し、未提出の状態に戻します。リセットすると黒服グループLINEに自動通知されます。</div>'
    +   '<button class="notif-del-btn" style="width:100%;margin-top:0;margin-bottom:8px" onclick="resetCashAction(\'resetOpeningCheck\',\'本日の開店チェック\')">🌅 開店チェックをリセット</button>'
