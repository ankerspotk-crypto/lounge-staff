<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>IEYASLOUNGE PORTAL</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #0a0e1a; color: #e8f0ff; min-height: 100vh; }

header {
  background: #111b2e; padding: 14px 16px 0;
  border-bottom: 1px solid #1e3050; position: sticky; top: 0; z-index: 10;
}
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
header h1 { font-size: 17px; font-weight: 600; }
.user-name { font-size: 13px; color: #a0c0e0; }

.tabs { display: flex; gap: 4px; }
.tab {
  flex: 1; padding: 10px 4px; text-align: center; font-size: 13px; font-weight: 500;
  border-bottom: 2px solid transparent; cursor: pointer; color: #6a8ab0;
}
.tab.active { color: #7ab0f0; border-bottom-color: #7ab0f0; }
.tab.coming-soon { color: #44455a; cursor: default; position: relative; }
.tab.coming-soon::after { content: '近日公開'; font-size: 9px; display: block; color: #554; margin-top: 1px; }

.content { padding: 16px; }

.loading { text-align: center; color: #6a8ab0; padding: 60px 0; font-size: 14px; }
.err { text-align: center; color: #cc5555; padding: 40px 16px; font-size: 14px; line-height: 1.7; }
.err small { color: #7a9cc8; font-size: 11px; }

/* month selector */
.month-bar {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 16px;
  scrollbar-width: none;
}
.month-bar::-webkit-scrollbar { display: none; }
.month-chip {
  flex-shrink: 0; padding: 5px 14px; border-radius: 20px; font-size: 13px;
  background: #141d30; border: 1px solid #1e3050; color: #8aabcc; cursor: pointer;
}
.month-chip.active { background: #0f2040; border-color: #2a5aaa; color: #7ab0f0; }

/* card */
.card {
  background: #111b2e; border: 1px solid #1e3050; border-radius: 12px;
  padding: 16px; margin-bottom: 12px;
}
.card-title { font-size: 12px; color: #6a8ab0; margin-bottom: 10px; letter-spacing: .5px; }
.row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #162848; }
.row:last-child { border-bottom: none; }
.row-label { font-size: 13px; color: #8aabcc; }
.row-val { font-size: 14px; font-weight: 500; }
.row-val.accent { color: #88ffcc; }
.row-val.sub { color: #cc8844; }
.row-val.minus { color: #cc5555; }

.total-card {
  background: #0a1020; border: 1px solid #1a4499; border-radius: 12px;
  padding: 18px; text-align: center; margin-bottom: 16px;
}
.total-label { font-size: 12px; color: #3a80cc; margin-bottom: 6px; }
.total-val { font-size: 28px; font-weight: 700; color: #7ab0f0; }

/* シフトカレンダー */
.shift-month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.shift-month-label { font-size: 16px; font-weight: 600; }
.nav-btn {
  background: #1e3050; border: none; color: #c0d4f0;
  width: 36px; height: 36px; border-radius: 50%; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 4px; }
.weekday { font-size: 11px; color: #6a8ab0; padding: 4px 0; }
.weekday.sun { color: #884444; }
.weekday.sat { color: #445588; }
.days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.day {
  aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; border-radius: 8px; cursor: pointer;
  border: 1px solid transparent; padding: 2px;
}
.day .num { font-size: 14px; font-weight: 500; line-height: 1; }
.day .shift-dot { width: 6px; height: 6px; border-radius: 50%; background: #7ab0f0; margin-top: 4px; }
.day.empty { pointer-events: none; }
.day.past { opacity: 0.3; pointer-events: none; }
.day.sun .num { color: #cc6666; }
.day.sat .num { color: #4a80cc; }
.day.today .num { color: #ffdd44; font-weight: 700; }
.day.selected { background: #0f2040; border-color: #2a60bb; }
.day.selected .num { color: #88ccff; }
.day.selected .shift-dot { background: #88ffcc; }
.day.kyukin { background: #2a1515; border-color: #bb4444; }
.day.kyukin .num { color: #ff8888; }
.day.kyukin .kyukin-label { font-size: 9px; color: #ff8888; margin-top: 2px; }
.day .shift-time { font-size: 8px; margin-top: 2px; line-height: 1.1; text-align: center; }
.day.scheduled { background: #152a1a; border-color: #336633; }
.day.scheduled .num { color: #88ffaa; }
.day.scheduled .shift-time { color: #66cc88; }
.day.selected .shift-time { color: #66aadd; }
.day.pending-shift { background: #2a1f0a; border-color: #886622; }
.day.pending-shift .num { color: #ffcc66; }
.day.pending-shift .shift-time { color: #ccaa44; }
.day .shift-status-label { font-size: 8px; margin-top: 1px; line-height: 1.1; text-align: center; }
.day.pending-shift .shift-status-label { color: #ccaa44; }
.day.scheduled .shift-status-label { color: #66cc88; }
.day.holiday { background: #241a2e; border-color: #7a5bb0; pointer-events: none; }
.day.holiday .num { color: #c9a8f0; }
.day.holiday .holiday-label { font-size: 9px; color: #c9a8f0; margin-top: 2px; text-align: center; line-height: 1.1; }
.seatreq-rsv-card { background: #141d30; border: 1px solid #1e3050; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer; }
.seatreq-rsv-card.sel { background: #0f2040; border-color: #2a60bb; }

/* picker overlay */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 50; }
.overlay.show { display: flex; align-items: flex-end; }
.picker { background: #111b2e; border-radius: 18px 18px 0 0; width: 100%; padding: 18px 16px 36px; border-top: 1px solid #1e3050; }
.picker-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #aaccff; }
.time-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.time-opt {
  background: #141d30; border: 1px solid #1e3050; color: #c0d4f0;
  padding: 13px 8px; border-radius: 10px; font-size: 14px; text-align: center;
  cursor: pointer;
}
.time-opt:active, .time-opt.chosen { background: #0f2040; border-color: #2a5aaa; color: #7ab0f0; }
.time-opt.off { color: #cc6666; border-color: #3a2020; background: #1a1010; }
.time-opt.full { grid-column: span 2; background: #1a3020; border-color: #336644; color: #88ffaa; font-weight: 600; }
.time-opt.full:active { background: #1e3a26; }
.picker-step { font-size: 11px; color: #6a8ab0; margin-bottom: 10px; }
.picker-back {
  width: 100%; background: none; border: 1px solid #1e3050;
  color: #5080aa; padding: 10px; border-radius: 10px; font-size: 13px; cursor: pointer;
  margin-bottom: 10px;
}
.picker-cancel {
  margin-top: 10px; width: 100%; background: none; border: 1px solid #1e3050;
  color: #6a8ab0; padding: 12px; border-radius: 10px; font-size: 14px; cursor: pointer;
}

.submit-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #111b2e; border-top: 1px solid #1e3050; padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
}
.submit-btn {
  width: 100%; background: #1a4499; border: none; color: #e8f0ff;
  padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600;
  cursor: pointer;
}
.submit-btn:active { background: #1a337f; }
.submit-btn:disabled { background: #1e3050; color: #6a8ab0; }
.shift-spacer { height: 80px; }

/* ロール選択 */
.role-toggle { display: flex; gap: 6px; padding: 12px 0 4px; }
.role-btn {
  flex: 1; padding: 9px 4px; border-radius: 10px; border: 1px solid #1e3050;
  background: #141d30; color: #7a9cc8; font-size: 13px; font-weight: 500; cursor: pointer;
}
.role-btn.active { background: #0f2040; border-color: #3a60bb; color: #7ab0f0; }

/* 管理者キャスト選択 */
.admin-bar {
  background: #141d30; border-bottom: 1px solid #1e3050;
  padding: 10px 16px; display: flex; align-items: center; gap: 10px;
}
.admin-label { font-size: 12px; color: #8aabcc; white-space: nowrap; }
.cast-select {
  flex: 1; background: #1e3050; border: 1px solid #3a3a55; color: #c0d4f0;
  padding: 8px 12px; border-radius: 8px; font-size: 14px;
  -webkit-appearance: none; appearance: none;
}
.cast-select:focus { outline: none; border-color: #3a6aaa; }
.admin-badge { font-size: 10px; background: #553300; color: #ffaa44; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
.shift-count { text-align: center; font-size: 13px; color: #6a8ab0; margin-top: 10px; }

/* 申請管理 */
.req-card { background: #111b2e; border: 1px solid #1e3050; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.req-card.approved { border-color: #336633; }
.req-card.rejected { border-color: #663333; opacity: .6; }
.req-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.req-name { font-size: 15px; font-weight: 600; }
.req-time { font-size: 12px; color: #6a8ab0; }
.req-detail { font-size: 14px; color: #a0c0e0; margin-bottom: 10px; }
.req-actions { display: flex; gap: 8px; }
.req-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
.req-btn.approve { background: #1a3a22; color: #88ffaa; border: 1px solid #336633; }
.req-btn.reject  { background: #3a1a1a; color: #ffaa88; border: 1px solid #663333; }
.req-btn.approve:active { background: #1e4228; }
.req-btn.reject:active  { background: #421e1e; }
.req-status { text-align: center; font-size: 13px; padding: 6px 0; }
.req-status.ok  { color: #88ffaa; }
.req-status.off { color: #ff8866; }
.req-empty { text-align: center; color: #6a8ab0; padding: 40px 0; font-size: 14px; }
.reqhist-date { font-size: 13px; font-weight: 700; color: #7ab0f0; margin: 18px 0 8px; padding-bottom: 5px; border-bottom: 1px solid #1e3050; }
.reqhist-date:first-of-type { margin-top: 4px; }
.req-filter { display: flex; gap: 6px; margin-bottom: 14px; }
.req-filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid #1e3050; background: #141d30; color: #8aabcc; font-size: 13px; cursor: pointer; }
.req-filter-btn.active { background: #0f2040; border-color: #2a5aaa; color: #7ab0f0; }
.req-confirm-btn { display: block; width: 100%; margin-bottom: 14px; padding: 13px; background: #0f3060; color: #7ab0f0; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: .03em; }
.req-confirm-btn:active { background: #2a4a8a; }
.req-confirm-btn:disabled { opacity: .5; }
.notif-list { display: flex; flex-direction: column; gap: 8px; }
.notif-card { background: #141d30; border-radius: 10px; overflow: hidden; transition: opacity .2s; }
.notif-card-header { display: flex; align-items: center; gap: 10px; padding: 11px 12px; cursor: pointer; user-select: none; }
.notif-mid { flex: 1; min-width: 0; }
.notif-label { font-size: 13px; font-weight: 600; color: #d0e4f8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.notif-group-tag { font-size: 11px; color: #7a9cc8; margin-top: 1px; }
.notif-time { background: #0d1828; color: #a0c0e0; border: 1px solid #1e3050; border-radius: 6px; padding: 5px 6px; font-size: 13px; width: 82px; flex-shrink: 0; }
.notif-chevron { color: #6a8ab0; font-size: 18px; transition: transform .2s; flex-shrink: 0; line-height: 1; }
.notif-toggle { position: relative; display: inline-block; width: 42px; height: 24px; flex-shrink: 0; }
.notif-toggle input { opacity: 0; width: 0; height: 0; }
.notif-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #1e3050; border-radius: 24px; transition: .3s; }
.notif-slider:before { position: absolute; content: ''; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #8aabcc; border-radius: 50%; transition: .3s; }
.notif-toggle input:checked + .notif-slider { background: #1a4a8a; }
.notif-toggle input:checked + .notif-slider:before { transform: translateX(18px); background: #7ab0f0; }
.notif-expand { padding: 0 12px 12px; border-top: 1px solid #162848; }
.notif-expand-label { font-size: 10px; color: #7a9cc8; margin: 10px 0 4px; letter-spacing: .05em; text-transform: uppercase; }
.notif-days-row { display: flex; gap: 5px; }
.notif-day-box { position: relative; }
.notif-day-box input { position: absolute; opacity: 0; width: 0; height: 0; }
.notif-day-box span { display: inline-block; width: 30px; height: 30px; line-height: 30px; text-align: center; border-radius: 50%; background: #0d1520; color: #7a9cc8; font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid #222238; transition: .15s; }
.notif-day-box input:checked + span { background: #0f3060; color: #7ab0f0; border-color: #2a5aaa; }
.notif-msg-area { width: 100%; box-sizing: border-box; background: #0d1828; color: #b0c8e8; border: 1px solid #1e3050; border-radius: 6px; padding: 8px; font-size: 11px; resize: vertical; font-family: monospace; line-height: 1.5; min-height: 60px; }
.notif-msg-auto { font-size: 11px; color: #6a8ab0; padding: 4px 0; font-style: italic; }
.notif-group-sel { background: #0d1828; color: #a0c0e0; border: 1px solid #1e3050; border-radius: 6px; padding: 6px 10px; font-size: 13px; width: 100%; }
.notif-del-btn { margin-top: 12px; padding: 7px 14px; background: #1e0f0f; color: #d66; border: 1px solid #3a1a1a; border-radius: 6px; font-size: 12px; cursor: pointer; }
.notif-add-btn { display: block; width: 100%; margin-top: 10px; margin-bottom: 6px; padding: 11px; background: transparent; color: #7a9cc8; border: 1px dashed #1e3050; border-radius: 10px; font-size: 13px; cursor: pointer; }
.notif-add-form { background: #0d1520; border: 1px solid #1e3050; border-radius: 10px; padding: 14px; margin-top: 8px; margin-bottom: 8px; }
.notif-add-input { width: 100%; box-sizing: border-box; background: #0d1828; color: #c0d4f0; border: 1px solid #1e3050; border-radius: 6px; padding: 8px 10px; font-size: 13px; }
.notif-save-btn { display: block; width: 100%; margin-top: 12px; padding: 13px; background: #0f3060; color: #7ab0f0; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: .05em; }
.notif-save-btn:active { background: #2a4a8a; }
.cashset-card { background: #141d30; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
.cashset-floor { font-size: 13px; font-weight: 700; color: #d0e4f8; margin-bottom: 8px; }
.cashset-denom-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.cashset-denom-label { width: 52px; flex-shrink: 0; font-size: 12px; color: #8aabcc; }
.cashset-field { flex: 1; display: flex; align-items: center; gap: 4px; }
.cashset-field span { font-size: 10px; color: #7a9cc8; flex-shrink: 0; }
.cashset-input { width: 100%; box-sizing: border-box; background: #0d1828; color: #c0d4f0; border: 1px solid #1e3050; border-radius: 6px; padding: 6px 8px; font-size: 13px; text-align: center; }

/* ---- 予約管理 ---- */
.yoyaku-date-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.yoyaku-date-nav button { background: #141d30; border: 1px solid #1e3050; color: #7ab0f0; border-radius: 7px; padding: 5px 10px; cursor: pointer; font-size: 14px; }
.yoyaku-date-text { font-size: 15px; font-weight: 700; color: #e8f0ff; flex: 1; text-align: center; }
.yoyaku-today-btn { font-size: 10px; background: #0f2040; color: #7ab0f0; border: 1px solid #1a50a0; border-radius: 5px; padding: 3px 8px; cursor: pointer; }
.yoyaku-stats { display: flex; gap: 8px; margin-bottom: 12px; }
.yoyaku-stat { flex: 1; background: #141d30; border: 1px solid #1e3050; border-radius: 8px; padding: 6px; text-align: center; }
.yoyaku-stat .num { font-size: 16px; font-weight: 700; }
.yoyaku-stat .lbl { font-size: 9px; color: #7a9cc8; margin-top: 1px; }
.yoyaku-card { background: #141d30; border: 1px solid #1e3050; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
.yoyaku-card .yc-row1 { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.yoyaku-card .yc-time { font-size: 14px; font-weight: 700; color: #7ab0f0; width: 44px; flex-shrink: 0; }
.yoyaku-card .yc-name { font-size: 14px; font-weight: 600; color: #e8f0ff; flex: 1; min-width: 0; }
.yoyaku-card .yc-cast-row { display: flex; flex-wrap: wrap; gap: 5px; padding-left: 50px; margin-bottom: 4px; }
.yc-cast { font-size: 11px; padding: 2px 7px; border-radius: 8px; white-space: nowrap; }
.yc-cast.dohan  { background: #281200; color: #ffaa44; border: 1px solid #553300; }
.yc-cast.tantou { background: #0a1e0a; color: #88cc44; border: 1px solid #2a5a1a; }
.yc-cast.yoyaku { background: #1a1500; color: #ffcc66; border: 1px solid #554400; }
.yoyaku-card .yc-badges { display: flex; flex-wrap: wrap; gap: 4px; padding-left: 50px; margin-bottom: 3px; }
.yoyaku-card .yc-note { font-size: 11px; color: #7a9cc8; padding-left: 50px; }
.yb { font-size: 10px; padding: 2px 8px; border-radius: 7px; font-weight: 600; }
.yb-seat { background: #0a1428; color: #7ab0f0; border: 1px solid #1e3a6a; }
.yb-pax  { background: #141d30; color: #a0c0e0; border: 1px solid #1e3050; }
.yb-cast { background: #1a0d2e; color: #bb99ff; border: 1px solid #3a1a6a; }
.tantou-chip { padding:5px 12px;background:#1c2a42;color:#8aabcc;border:1px solid #2a4068;border-radius:20px;font-size:12px;cursor:pointer;transition:background 0.15s,color 0.15s,border-color 0.15s; }
.tantou-chip.sel { background:#1a2a0a;color:#88cc44;border-color:#446622;font-weight:700; }
.dohan-chip { padding:5px 12px;background:#1c2a42;color:#8aabcc;border:1px solid #2a4068;border-radius:20px;font-size:12px;cursor:pointer;transition:background 0.15s,color 0.15s,border-color 0.15s; }
.dohan-chip.sel { background:#2a1800;color:#ffaa44;border-color:#884400;font-weight:700; }
.table-chip { padding:5px 10px;background:#1c2a42;color:#8aabcc;border:1px solid #2a4068;border-radius:8px;font-size:12px;cursor:pointer;transition:background 0.15s,color 0.15s,border-color 0.15s; }
.table-chip.sel { background:#0f2040;color:#7ab0f0;border-color:#1a50a0;font-weight:700; }
.yb-ok   { background: #0d2010; color: #66cc88; border: 1px solid #1a4a22; }
.yb-pend { background: #2a2210; color: #ddaa44; border: 1px solid #5a4400; }
/* 顧客検索 */
.ycust-search { width: 100%; background: #0d1520; border: 1px solid #1e3050; border-radius: 9px; padding: 10px 12px; color: #e8f0ff; font-size: 13px; outline: none; margin-bottom: 10px; }
.ycust-row { display: flex; align-items: flex-start; justify-content: space-between; padding: 10px 12px; background: #141d30; border: 1px solid #1e3050; border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: .15s; }
.ycust-row:hover { border-color: #1e3050; }
.ycust-row.selected { border-color: #7ab0f0; background: #0a1428; }
.ycust-name { font-size: 13px; font-weight: 600; color: #e8f0ff; }
.ycust-sub { font-size: 10px; color: #7a9cc8; margin-top: 2px; }
.ycust-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.ycm { font-size: 9px; padding: 1px 6px; border-radius: 5px; }
.ycm-bottle  { background: #1a2a10; color: #88cc55; border: 1px solid #336622; }
.ycm-bday    { background: #1a1040; color: #9988ee; border: 1px solid #4433aa; }
.ycm-note    { background: #141428; color: #8aabcc; border: 1px solid #1e3050; }
.ycm-fee-warn{ background: #2a1800; color: #ffaa44; border: 1px solid #885500; }
.ycm-fee-urg { background: #2a0a0a; color: #ff6666; border: 1px solid #882222; }
/* 顧客管理タブ */
.cust-filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.cust-filter-btn { padding: 5px 12px; border-radius: 14px; border: 1px solid #1e3050; background: #141d30; color: #7a9cc8; font-size: 12px; cursor: pointer; white-space: nowrap; transition: .15s; }
.cust-filter-btn.active { background: #0a1e40; border-color: #4488cc; color: #7ab0f0; font-weight: 700; }

<body>

<header>
  <div class="header-row">
    <h1>IEYASLOUNGE PORTAL</h1>
    <span class="user-name" id="user-name">読み込み中...</span>
  </div>
  <div class="navbar" id="navbar" style="display:none;align-items:center;justify-content:space-between;padding:4px 2px 12px"></div>
</header>

<div class="content" id="content">
  <div class="loading">読み込み中...</div>
</div>

<div class="overlay" id="picker-overlay" onclick="closePicker()">
  <div class="picker" onclick="event.stopPropagation()">
    <div class="picker-title" id="picker-title"></div>
    <div class="time-grid" id="picker-grid"></div>
    <button class="picker-cancel" onclick="closePicker()">キャンセル</button>
  </div>
</div>

<div class="submit-bar" id="submit-bar" style="display:none">
  <button class="submit-btn" id="submit-btn" onclick="doSubmit()">シフトを提出する</button>
  <div class="shift-count" id="shift-count"></div>
</div>

<script>
var LIFF_ID = '2010376677-EDF5MZuq';
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxG4IdWtMdU-81wfQUvTg6nYqKboK9wWB-XcfFYI8w0KRUrSpZmwJyb9jBYuMUP5K1q4g/exec';

var userId = '', userName = '', portalData = null;
var currentTab = 'home', currentMonth = '';
var viewYear, viewMonth, shiftSelections = {}, shiftRoles = {};
var isAdmin = false, adminViewAs = '', adminCastList = [], adminCastRoles = {};
var staffRole = 'キャスト';
var pendingShifts = {};

function fmt(n) {
  if (n === '' || n === null || n === undefined) return '—';
  var num = Number(String(n).replace(/,/g,''));
  if (isNaN(num)) return String(n);
  return num.toLocaleString('ja-JP') + '円';
}

// ---- タイムアウト付き fetch ヘルパー ----
function gasFetch(url, options, timeoutMs) {
  var fullMs = timeoutMs || 28000;
  var isGet = !options || !options.method || String(options.method).toUpperCase() === 'GET';
  function once(ms) {
    var ctrl = typeof AbortController !== 'undefined' ? new AbortController() : null;
    var timer = ctrl ? setTimeout(function() { ctrl.abort(); }, ms) : null;
    var opts = Object.assign({}, options || {});
    if (ctrl) opts.signal = ctrl.signal;
    return fetch(url, opts).then(function(r) {
      if (timer) clearTimeout(timer);
      return r;
    }, function(e) {
      if (timer) clearTimeout(timer);
      if (e && e.name === 'AbortError') { var te = new Error('タイムアウト（サーバー応答なし）'); te._timeout = true; throw te; }
      throw e;
    });
  }
  // POSTは二重送信を避けるため単発。GETはコールドスタート対策で「初回18sで見切り→ウォームになった状態で1回だけ再試行」
  if (!isGet) return once(fullMs);
  return once(Math.min(fullMs, 18000)).catch(function(e) {
    var retryable = e && (e._timeout || (e.message && /Failed to fetch|NetworkError|Load failed|network/i.test(e.message)));
    if (retryable) return once(fullMs);
    throw e;
  });
}

function retryBtn_(fn) {
  return '<br><button onclick="' + fn + '()" style="margin-top:14px;padding:10px 24px;background:#1a3a6a;color:#7ab0f0;border:1px solid #2a5aaa;border-radius:8px;font-size:14px;cursor:pointer">再試行</button>';
}

// ---- LIFF init ----
var _devUid = new URLSearchParams(location.hash.slice(1)).get('u');
var _kt = new URLSearchParams(location.search).get('kt'); // 軍師QRログインのトークン

// 軍師QRログイン: 本人のuserIdでトークンを認証
function doKioskAuth(uid, kt) {
  setContent('<div class="loading">軍師にログイン中...</div>');
  gasFetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'kioskAuthConfirm', userId: uid, token: kt }) })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        var _lbl = (d.scope === 'admin') ? '管理コンソール' : '軍師';
        setContent('<div style="text-align:center;padding:56px 20px"><div style="font-size:52px">✅</div><h2 style="color:#7be0a8;margin:10px 0 4px">' + (d.name || '') + ' さん</h2><p style="color:#9ab0c8">' + _lbl + 'にログインしました。<br>端末の画面が切り替わります。</p><p style="color:#5a7088;font-size:12px;margin-top:22px">この画面は閉じてOKです</p></div>');
      } else {
        setContent('<div style="text-align:center;padding:56px 20px"><div style="font-size:52px">🚫</div><h2 style="color:#e0a0b0;margin:10px 0 4px">ログインできません</h2><p style="color:#9ab0c8">' + (d.error || '') + '</p></div>');
      }
    })
    .catch(function(e) { showErr('通信エラー<br><small>' + (e && e.message || '') + '</small>'); });
}

var initTimer = setTimeout(function() {
  showErr('タイムアウト<br><small>LIFFが応答しませんでした</small>' + retryBtn_('location.reload'));
}, 15000);

if (_devUid) {
  clearTimeout(initTimer);
  userId = _devUid;
  if (_kt) { doKioskAuth(userId, _kt); }
  else { document.getElementById('user-name').textContent = '読み込み中...'; loadPortal(); }
} else {
  try {
    liff.init({ liffId: LIFF_ID }).then(function() {
      clearTimeout(initTimer);
      if (!liff.isLoggedIn()) {
        setContent('<div class="loading">LINEログイン中...</div>');
        liff.login();
        return null;
      }
      return liff.getProfile();
    }).then(function(p) {
      if (!p) return; // login redirect pending
      userId   = p.userId;
      userName = p.displayName;
      if (_kt) { doKioskAuth(userId, _kt); return; }
      document.getElementById('user-name').textContent = p.displayName;
      loadPortal();
    }).catch(function(e) {
      clearTimeout(initTimer);
      showErr('ログインエラー<br><small>' + (e && e.message || JSON.stringify(e)) + '</small>' + retryBtn_('location.reload'));
    });
  } catch(e) {
    clearTimeout(initTimer);
    showErr('起動エラー: ' + e.message + retryBtn_('location.reload'));
  }
}

function loadPortal(month) {
  setContent('<div class="loading">データ取得中...</div>');
  // ホーム軽量ペイロード（tab=home）: 売上/給与/領収書/月一覧を除外し、座席・今日の予約・空席を同梱。
  // 管理者でviewAs未指定のときはサーバ側で先にcastListを返すため tab=home は無視される（従来通り）。
  var url = GAS_URL + '?action=portal&tab=home&userId=' + encodeURIComponent(userId);
  if (month) url += '&month=' + encodeURIComponent(month);
  if (adminViewAs) url += '&viewAs=' + encodeURIComponent(adminViewAs);
  gasFetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) {
        if (d.error === 'unregistered') {
          showErr('登録が見つかりません<br><small>グループLINEで #登録 名前 を送ってください</small>');
        } else if (d.error === 'forbidden') {
          showErr('🚫 アクセスできません<br><small>' + (d.message || 'このアカウントではポータルをご利用いただけません。') + '</small>');
        } else {
          showErr('エラー: ' + d.error + retryBtn_('loadPortal'));
        }
        return;
      }
      // 管理者で castList が返ってきた場合 → 申請管理タブをデフォルト表示
      if (d.isAdmin && d.castList && !adminViewAs) {
        isAdmin = true;
        adminCastList = d.castList;
        adminCastRoles = d.castRoles || {};
        initAdminUI(d.castList);
        return;
      }
      isAdmin = d.isAdmin || false;
      if (d.staffRole) staffRole = d.staffRole;
      if (isAdmin) showAdminTab();
      // 横断リンクなし（軍師・管理コンソールへの導線は貼らない）
      if (_devUid && d.name) document.getElementById('user-name').textContent = d.name;
      portalData = d;
      // 黒服バイトの承認待ち(未確定)シフトをカレンダーに反映（リロードしても「申請中」が残る）
      pendingShifts = {};
      if (d.pendingShifts) Object.keys(d.pendingShifts).forEach(function(k){ pendingShifts[k] = d.pendingShifts[k]; });
      if (!currentMonth && d.months && d.months.length > 0) currentMonth = d.months[0];
      updateAdminBar(adminCastList);
      renderTab(currentTab);
    })
    .catch(function(e) {
      showErr('通信エラー<br><small>' + (e && e.message || '') + '</small>' + retryBtn_('loadPortal'));
    });
}

function initAdminUI(castList) {
  showAdminTab();
  if (!document.getElementById('admin-bar')) {
    var bar = document.createElement('div');
    bar.id = 'admin-bar';
    bar.className = 'admin-bar';
    bar.innerHTML = '<span class="admin-label">キャスト:</span>'
      + '<select class="cast-select" id="admin-viewas-sel" onchange="adminChange(this.value)">'
      + '<option value="">-- 選択 --</option>'
      + '</select>'
      + '<span class="admin-badge">管理者</span>';
    document.querySelector('header').insertAdjacentElement('afterend', bar);
  }
  updateAdminBar(castList);
  // ホーム（管理者メニュー）を表示
  currentTab = 'home';
  switchTabActive('home');
  renderHome();
}

function adminChange(name) {
  adminViewAs = name;
  currentMonth = '';
  portalData = null;
  if (name) staffRole = adminCastRoles[name] || 'キャスト';
  currentTab = 'home';
  switchTabActive('home');
  if (!name) { renderHome(); return; }
  loadPortal();
}


// セクション名（戻るバー・メニュー用）
var SECTIONS = {
  shift:    { t:'シフト提出',   i:'📅' },

function homePad2(n){ return (n<10?'0':'') + n; }
// 同伴予約は20:30来店として扱う（軍師と統一）
function homeRsvArr(r){ return /同伴/.test((r.customer||'')+' '+(r.time||'')) ? '20:30' : (r.time||''); }
function homeMyName(){ return (portalData && (portalData.viewAs || portalData.name)) || ''; }
function homeIsMine(r){
  var me = homeMyName(); if (!me) return false;
  return r.tantouCast === me || r.yoyakuCast === me || r.dohanCast === me;
}
// portalData.shifts {"7/6":"20:00"...} / confirmedShifts から直近の出勤を求める
function homeNextShift(){
  var shifts = (portalData && portalData.shifts) || {};
  var confirmed = (portalData && portalData.confirmedShifts) || [];
  var now = new Date();
  var today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var best = null;
  Object.keys(shifts).forEach(function(k){
    var t = shifts[k];
    if (!t || t === '休み' || t === '欠勤') return;
    var mm = String(k).split('/'); if (mm.length < 2) return;
    var mo = parseInt(mm[0],10), da = parseInt(mm[1],10);
    if (!mo || !da) return;
    var d = new Date(now.getFullYear(), mo-1, da);
    if (d < today0 && (today0 - d) > 180*86400000) d = new Date(now.getFullYear()+1, mo-1, da); // 年跨ぎ
    if (d < today0) return; // 過去は除外
    if (!best || d < best.date) best = { date:d, key:k, time:t, confirmed: confirmed.indexOf(k) >= 0 };
  });
  return best;
}
function homeRelLabel(d){
  var now = new Date();
  var today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var diff = Math.round((d - today0) / 86400000);
  if (diff <= 0) return '本日';
  if (diff === 1) return '明日';
  if (diff === 2) return '明後日';
  return 'あと' + diff + '日';
}

function renderHomeRsv(list){
  var listEl = document.getElementById('home-rsv-list');
  var cntEl  = document.getElementById('home-rsv-count');
  if (!listEl) return;
  list = (list || []).filter(function(r){ return r.status !== 'キャンセル'; });
  list.sort(function(a,b){ return homeRsvArr(a).localeCompare(homeRsvArr(b)); });
  var mine = list.filter(homeIsMine).length;
  if (cntEl) cntEl.textContent = list.length + '件' + (mine ? '（自分 ' + mine + '件）' : '');
  if (!list.length){
    listEl.innerHTML = '<div style="color:#6a8ab0;font-size:13px;padding:14px 0;text-align:center">本日の予約はまだありません</div>';
    return;
  }
  listEl.innerHTML = list.map(function(r){
    var mineFlag = homeIsMine(r);
    var arr = homeRsvArr(r);
    var visited = r.status === '来店済み' || r.checkInAt;
    var done = r.status === '退店済み';
    var stColor = done ? '#6a8ab0' : (visited ? '#88ffcc' : '#a0c0e0');
    var stTxt = done ? '退店' : (visited ? '来店済' : r.status);
    var tantou = r.tantouCast ? '担当 ' + r.tantouCast : '担当未定';
    return '<div style="display:flex;gap:11px;padding:10px 0;border-bottom:1px solid #162848;'
      + (mineFlag ? 'border-left:3px solid #7ab0f0;margin-left:-8px;padding-left:8px;' : '') + '">'
      + '<div style="font-size:16px;font-weight:700;color:#e8f0ff;min-width:44px">' + arr + '</div>'
      + '<div style="flex:1;min-width:0">'
      +   '<div style="font-size:14px;color:#e8f0ff">' + esc(r.customer) + '様 <span style="color:#8aabcc;font-size:12px">' + r.pax + '名</span>'
      +     (mineFlag ? ' <span style="font-size:10px;font-weight:700;color:#0a1f2e;background:#7ab0f0;padding:1px 6px;border-radius:10px">自分</span>' : '') + '</div>'
      +   '<div style="font-size:12px;color:#8aabcc;margin-top:2px">' + (r.table ? esc(r.table) + ' ・ ' : '') + tantou + '</div>'
      +   (r.youbou ? '<div style="font-size:12px;color:#d8b26a;margin-top:4px;line-height:1.45;background:#1a2438;border:1px solid #33406a;border-radius:8px;padding:6px 9px">📝 ' + esc(r.youbou) + '</div>' : '')
      + '</div>'
      + '<div style="font-size:11px;color:' + stColor + ';white-space:nowrap;align-self:center">' + stTxt + '</div>'
      + '</div>';
  }).join('');
}

  box.style.opacity = homeWorking ? '' : '.35';
  box.style.pointerEvents = homeWorking ? '' : 'none';
  box.style.filter = homeWorking ? '' : 'grayscale(1)';
  var seat = document.getElementById('home-myseat');
  if (!homeWorking && seat) seat.innerHTML = '<span style="color:#c8925a">🔒 本日シフトの方のみ呼び出しできます</span>';
}
function renderMySeat(){
  var el = document.getElementById('home-myseat');
  if (!el) return;
  if (!homeMySeats.length){
    homeSelSeat = '';
    el.innerHTML = '<span style="color:#7a90a8">現在の席：未設定 — 「席不明」で送信されます</span>';
    return;
  }
  if (homeMySeats.length === 1){
    homeSelSeat = homeMySeats[0].label;
    el.innerHTML = '📍 現在の席：<b style="color:#bcd6f0">' + esc(homeSelSeat) + '</b>';
    return;
  }
  // 掛け持ち → どの席からのリクエストか選択
  if (!homeSelSeat || !homeMySeats.some(function(s){ return s.label === homeSelSeat; })) homeSelSeat = homeMySeats[0].label;
  el.innerHTML = '📍 どの席から？：' + homeMySeats.map(function(s){
    var on = s.label === homeSelSeat;
    return '<span onclick="homePickSeat(this.dataset.l)" data-l="' + esc(s.label) + '" style="display:inline-block;margin:4px 6px 0 0;padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;'
      + (on ? 'background:#1a50a0;color:#fff;border:1px solid #2a5aaa' : 'background:#162848;color:#a0c0e0;border:1px solid #24406a') + '">' + esc(s.label) + '</span>';
  }).join('');
}
function homePickSeat(label){ homeSelSeat = label; renderMySeat(); }

// キャストが黒服を呼ぶ（help=抜き / soda=炭酸 / ice=アイス / other=その他）
function castCall(kind, btn){
  if (!homeWorking) { homeToast('本日シフトの方のみ利用できます', false); return; }
  var seatMsg = homeSelSeat ? '（' + homeSelSeat + '）' : '（席不明）';
  if (kind === 'help' && !confirm('黒服にヘルプを送りますか？' + seatMsg + '\n（声をかけて一旦抜いてもらいます）')) return;
  if (btn){ btn.disabled = true; btn.style.opacity = '.5'; setTimeout(function(){ btn.disabled = false; btn.style.opacity = ''; }, 4000); }
  gasFetch(GAS_URL, { method:'POST', body: JSON.stringify({ action:'castCall', userId: userId, kind: kind, table: homeSelSeat }) })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d && d.ok) homeToast('黒服に送信しました' + (d.table ? '（' + d.table + '）' : ''), true);
      else homeToast('送信に失敗しました' + (d && d.error ? '：' + d.error : ''), false);
    })
    .catch(function(){ homeToast('通信エラー', false); });
}
function homeToast(msg, ok){
  var t = document.getElementById('home-toast');
  if (!t){ t = document.createElement('div'); t.id = 'home-toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.cssText = 'position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:' + (ok === false ? '#5a1020' : '#0d2a1a')
    + ';color:#eafff2;border:1px solid ' + (ok === false ? '#b53040' : '#2a6a44')
    + ';padding:12px 22px;border-radius:12px;font-size:14px;font-weight:700;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,.5);opacity:0;transition:.2s;pointer-events:none;max-width:88vw;text-align:center;';
  requestAnimationFrame(function(){ t.style.opacity = '1'; });
  clearTimeout(t._h); t._h = setTimeout(function(){ t.style.opacity = '0'; }, 2200);
}

// ---- 成績（売上明細／給与明細／ランキングをまとめたタブ） ----
var statsSubTab = 'sales';

// 成績データ（売上/給与/月一覧/領収書合計/受領状況）を遅延ロードしてportalDataにマージ。
// ホームは tab=home の軽量ペイロードで先に描画し、成績タブを開いた時だけこれを叩く（初回ロード高速化）。
function loadStatsData(force, cb) {
  if (portalData && portalData.sales !== undefined && !force) { if (cb) cb(); return; }
  var url = GAS_URL + '?action=portal&tab=stats&userId=' + encodeURIComponent(userId);
  if (adminViewAs) url += '&viewAs=' + encodeURIComponent(adminViewAs);
  if (currentMonth) url += '&month=' + encodeURIComponent(currentMonth);
  gasFetch(url)
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (!d.ok) { showErr('エラー: ' + (d.error||'') + retryBtn_('renderStats')); return; }
      if (!portalData) portalData = {};
      portalData.sales = d.sales; portalData.pay = d.pay; portalData.months = d.months;
      portalData.hairTotals = d.hairTotals; portalData.payPublished = d.payPublished;
      portalData.salesDataDates = d.salesDataDates; portalData.payReceipt = d.payReceipt;
      if (!currentMonth && d.months && d.months.length > 0) currentMonth = d.months[0];
      if (cb) cb();
    })
    .catch(function(e){ showErr('通信エラー<br><small>'+(e&&e.message||'')+'</small>'+retryBtn_('renderStats')); });
}

function renderStats() {
  var labels = { sales: '売上明細', bills: '伝票', pay: '給与明細', ranking: 'ランキング' };
  var subtabs = '<div style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap">'
    + ['sales', 'bills', 'pay', 'ranking'].map(function(t) {
        return '<div style="flex:1;min-width:54px;padding:8px 4px;text-align:center;font-size:12px;cursor:pointer;border-radius:7px;'
          + (statsSubTab === t ? 'background:#0f2040;color:#7ab0f0;border:1px solid #1a50a0;' : 'background:#141d30;color:#7a9cc8;border:1px solid #1e3050;')
          + '" onclick="statsSubSwitch(\'' + t + '\')">' + labels[t] + '</div>';
      }).join('')
    + '</div>';

  contentTargetId = 'content';
  setContent('<div style="padding:14px">' + subtabs + '<div id="stats-body"><div class="loading">読み込み中...</div></div></div>');
  contentTargetId = 'stats-body';

  if (statsSubTab === 'ranking') { loadRanking(); return; }
  // 売上明細・給与明細は管理者がキャストを選んでいないと表示できない
  if (isAdmin && !adminViewAs) {
    setContent('<div style="text-align:center;color:#6a8ab0;padding:60px 0;font-size:14px">上のドロップダウンからキャストを選択してください</div>');
    return;
  }
  // 伝票は成績ペイロード非依存（専用APIをその場でfetch）
  if (statsSubTab === 'bills') { renderBills(); return; }
  // 成績データ未ロード（tab=homeでは含まれない）なら遅延ロードしてから再描画
  if (!portalData || portalData.sales === undefined) { loadStatsData(false, function(){ renderStats(); }); return; }
  if (statsSubTab === 'sales') renderSales();
  else if (statsSubTab === 'pay') renderPay();
}

// 金額整形（グローバル）。※renderBillItems等の内側関数には各自のyenがあり、そちらが優先される
function yen(v) { var n = parseInt(v) || 0; return n ? '¥' + n.toLocaleString() : '--'; }

// ---- 伝票（日別売上＋伝票明細ドリル） ----
function renderBills() {
  setContent('<div class="loading">読み込み中...</div>');
  var url = GAS_URL + '?action=portal&tab=bills&userId=' + encodeURIComponent(userId);
  if (adminViewAs) url += '&viewAs=' + encodeURIComponent(adminViewAs);
  if (currentMonth) url += '&month=' + encodeURIComponent(currentMonth);
  gasFetch(url).then(function(r){ return r.json(); }).then(function(d){
    if (!d.ok) { setContent('<div style="color:#e88;padding:24px 16px;font-size:13px">エラー: ' + esc(d.error||'') + '</div>'); return; }
    renderBillsBody(d);
  }).catch(function(e){ setContent('<div style="color:#e88;padding:24px 16px;font-size:13px">通信エラー<br><small>'+esc(e&&e.message||'')+'</small></div>'); });
}

function renderBillsBody(d) {
  var days = d.days || [];
  var h = '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">'
    + '<div style="font-size:13px;color:#7ab0f0;font-weight:700">' + esc(d.cast||'') + ' さんの伝票</div>'
    + '<div style="font-size:11px;color:#7a9cc8">' + esc(d.month||'') + '・前日まで</div></div>';
  h += '<div style="background:#0f2040;border:1px solid #1a50a0;border-radius:8px;padding:11px 13px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">'
    + '<span style="font-size:12px;color:#7a9cc8">今月の担当売上（前日まで）</span>'
    + '<span style="font-size:19px;font-weight:800;color:#7ab0f0">' + yen(d.monthTotal||0) + '</span></div>';
  if (days.length === 0) {
    h += '<div style="text-align:center;color:#6a8ab0;padding:44px 16px;font-size:13px;line-height:1.8">この月の伝票データはまだありません。<br><small>毎晩、自動で前日分が追加されます。</small></div>';
    setContent(h); return;
  }
  days.forEach(function(day){
    h += '<div style="border:1px solid #1e3050;border-radius:9px;margin-bottom:8px;overflow:hidden">'
      + '<div onclick="toggleBillDay(this)" style="padding:11px 13px;background:#141d30;cursor:pointer;display:flex;justify-content:space-between;align-items:center">'
      + '<span style="font-size:13px;color:#cfe0f5;font-weight:700">' + fmtBillDate(day.date)
      + ' <span style="color:#7a9cc8;font-weight:400;font-size:11px">(' + day.count + '件)</span></span>'
      + '<span style="font-size:14px;font-weight:700;color:#7ab0f0">' + yen(day.total) + '</span></div>'
      + '<div class="bill-slips" style="display:none">';
    (day.slips||[]).forEach(function(s){
      h += '<div onclick="openBillDetail(this,\'' + day.date + '\',\'' + s.uuid + '\')" style="padding:9px 13px;border-top:1px solid #1a2740;cursor:pointer">'
        + '<div style="display:flex;justify-content:space-between;align-items:baseline">'
        + '<span style="font-size:12px;color:#cfe0f5">' + esc(s.cust||'（無記名）')
        + ' <span style="color:#7a9cc8">卓' + esc(s.table||'-') + '・' + esc(s.guests||'-') + '名</span></span>'
        + '<span style="font-size:13px;font-weight:700;color:#9fd0a0">' + yen(s.tantoAmt) + '</span></div>'
        + (s.dohanCast ? '<div style="font-size:10px;color:#7799cc;margin-top:2px">同伴: ' + esc(s.dohanCast) + '</div>' : '')
        + '<div class="bill-detail" style="display:none;margin-top:8px"></div></div>';
    });
    h += '</div></div>';
  });
  setContent(h);
}

function toggleBillDay(el){ var b = el.nextElementSibling; b.style.display = (b.style.display === 'none' ? 'block' : 'none'); }

function fmtBillDate(s){
  var p = String(s).split('-'); if (p.length < 3) return s;
  var wd = ['日','月','火','水','木','金','土'];
  var dt = new Date(+p[0], +p[1]-1, +p[2]);
  return (+p[1]) + '/' + (+p[2]) + '(' + wd[dt.getDay()] + ')';
}

function openBillDetail(el, date, uuid){
  var box = el.querySelector('.bill-detail');
  if (!box) return;
  if (box.style.display === 'block') { box.style.display = 'none'; return; }
  box.style.display = 'block';
  box.innerHTML = '<div style="font-size:11px;color:#7a9cc8;padding:6px 2px">明細を取得中...</div>';
  var url = GAS_URL + '?action=portal&tab=billdetail&userId=' + encodeURIComponent(userId)
    + '&date=' + encodeURIComponent(date) + '&uuid=' + encodeURIComponent(uuid);
  if (adminViewAs) url += '&viewAs=' + encodeURIComponent(adminViewAs);
  gasFetch(url).then(function(r){ return r.json(); }).then(function(d){
    if (!d.ok) { box.innerHTML = '<div style="font-size:11px;color:#e88;padding:6px 2px">' + esc(d.error||'取得失敗') + '</div>'; return; }
    box.innerHTML = renderBillItems(d);
  }).catch(function(){ box.innerHTML = '<div style="font-size:11px;color:#e88;padding:6px 2px">通信エラー</div>'; });
}

function renderBillItems(d){
  if (d.pending) return '<div style="font-size:11px;color:#c9a066;padding:6px 2px">明細（内訳）はまだ取り込まれていません。<br><small>コンソールの「伝票を取得」で保存されます。</small></div>';
  var items = d.items || [];
  if (items.length === 0) return '<div style="font-size:11px;color:#7a9cc8;padding:6px 2px">明細なし</div>';
  var h = '<div style="background:#0b1424;border:1px solid #1a2740;border-radius:7px;padding:9px 11px">';
  if (d.bottleCount > 0) h += '<div style="font-size:11px;color:#e0b060;margin-bottom:7px;font-weight:600">🍾 ボトル ' + d.bottleCount + '本'
    + (d.bottles && d.bottles.length ? '：' + esc(d.bottles.join(' / ')) : '') + '</div>';
  items.forEach(function(it){
    h += '<div style="display:flex;justify-content:space-between;gap:8px;font-size:11px;padding:4px 0;border-bottom:1px solid #131f33">'
      + '<span style="color:#9fb4d0;min-width:0">' + (it.isBottle ? '🍾 ' : '')
      + '<span style="color:#6a8ab0">[' + esc(it.category) + ']</span> ' + esc(it.product || it.detail || '')
      + (it.qty > 1 ? ' ×' + it.qty : '') + '</span>'
      + '<span style="color:#cfe0f5;font-weight:600;white-space:nowrap">' + yen(it.amount) + '</span></div>';
  });
  h += '</div>';
  return h;
}

function statsSubSwitch(t) {

// ---- 売上明細 ----
function renderSales() {
  var sales = portalData && portalData.sales;
  if (!sales || Object.keys(sales).length === 0) {
    setContent('<div style="text-align:center;padding:60px 20px">'
      + '<div style="font-size:30px;margin-bottom:12px">📊</div>'
      + '<div style="font-size:15px;font-weight:600;color:#7ab0f0;margin-bottom:8px">データなし</div>'
      + '<div style="font-size:12px;color:#7a9cc8;line-height:1.7">今月の売上データはまだ取得されていません。<br>毎日深夜に自動更新されます。</div>'
      + '</div>');
    return;
  }

  var months = Object.keys(sales).sort().reverse();
  var sel = currentMonth && sales[currentMonth] ? currentMonth : months[0];
  var row = sales[sel];

  function yen(v) { var n = parseInt(v) || 0; return n ? '¥' + n.toLocaleString() : '--'; }
  function num(v) { return parseInt(v) || 0; }

  var backTotal = ['担当バック','予約バック','同伴バック','ドリンクバック','ボトルバック','年会費バック']
    .reduce(function(s, k) { return s + num(row[k]); }, 0);

  var h = '<div style="padding:14px">';

  // 月タブ
  if (months.length > 1) {
    h += '<div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px">';
    months.forEach(function(m) {
      var act = m === sel;
      h += '<button onclick="switchSalesMonth(\'' + m + '\')" style="padding:5px 14px;border-radius:16px;border:1px solid '
        + (act ? '#4488ee' : '#1a2e50') + ';background:' + (act ? '#0f2040' : 'transparent')
        + ';color:' + (act ? '#7ab0f0' : '#7a9cc8') + ';font-size:12px;cursor:pointer;white-space:nowrap">' + m + '</button>';
    });
    h += '</div>';
  }

  // カード
  h += '<div style="background:#111b2e;border:1px solid #162848;border-radius:12px;padding:14px">';
  var salesDates = (portalData && portalData.salesDataDates) || {};
  var asOf = salesDates[sel] || '';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  h += '<span style="font-size:10px;color:#6a8ab0;letter-spacing:0.5px">' + sel + ' TRUSTデータ'
    + (asOf ? '　<span style="color:#7ab0f0;font-weight:600">' + asOf + '時点</span>' : '<span style="color:#cc6666"> ※取込日未設定</span>') + '</span>';
  if (isAdmin) {
    h += '<span style="font-size:10px;color:#7a9cc8;cursor:pointer;text-decoration:underline" onclick="salesSetDate(\'' + sel + '\')">'
      + (asOf ? '変更' : '取込日を設定') + '</span>';
  }
  h += '</div>';

  function item(label, val, color, sub) {
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #181828">'
      + '<span style="font-size:13px;color:#778">' + label + (sub ? '<br><span style="font-size:10px;color:#7a9cc8">' + sub + '</span>' : '') + '</span>'
      + '<span style="font-size:15px;font-weight:600;color:' + (color || '#b0c8e8') + '">' + val + '</span>'
      + '</div>';
  }

  h += item('担当売上', yen(row['担当小計']), '#7ab0f0');
  if (num(row['同伴小計']) > 0) h += item('同伴売上', yen(row['同伴小計']), '#7799cc');
  h += item('勤務日数', num(row['勤務日数']) + '日', '#a0c0e0');
  h += item('時間報酬', yen(row['時間報酬']));

  if (backTotal > 0) {
    var backLines = ['担当バック','予約バック','同伴バック','ドリンクバック','ボトルバック','年会費バック']
      .filter(function(k) { return num(row[k]) > 0; })
      .map(function(k) { return k + ' ' + yen(row[k]); }).join(' / ');
    h += item('バック合計', yen(backTotal), '#66cc88', backLines);
  }

  if (num(row['ボーナス']) > 0) h += item('ボーナス', yen(row['ボーナス']), '#ffcc44');
  if (num(row['送迎手当']) > 0) h += item('送迎手当', yen(row['送迎手当']), '#ffcc44');
  if (num(row['入店祝い金']) > 0) h += item('入店祝い金', yen(row['入店祝い金']), '#ffcc44');
  h += item('源泉徴収', '−' + yen(row['源泉徴収']), '#cc6666');
  if (num(row['日払']) > 0) h += item('日払控除', '−' + yen(row['日払']), '#cc6666');
  if (num(row['マイナス']) > 0) h += item('マイナス', '−' + yen(row['マイナス']), '#cc6666');

  h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0">'
    + '<span style="font-size:14px;font-weight:600;color:#c0d4f0">残り支給額</span>'
    + '<span style="font-size:20px;font-weight:700;color:#7ab0f0">' + yen(row['残り支給額']) + '</span>'
    + '</div>';

  var hairTotals = portalData.hairTotals || {};
  var hairAmt = hairTotals[sel] || 0;
  if (hairAmt > 0) {
    h += '<div style="margin-top:4px;padding:10px 0;border-top:1px solid #1a2e50">';
    h += item('ヘアサロン立替', '＋' + yen(hairAmt), '#66dd88', '領収書登録分・源泉対象外');
    h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;margin-top:2px;border-top:1px solid #1a2e50">'
      + '<span style="font-size:14px;font-weight:600;color:#c0d4f0">最終支給額</span>'
      + '<span style="font-size:20px;font-weight:700;color:#66dd88">' + yen(num(row['残り支給額']) + hairAmt) + '</span>'
      + '</div>';
    h += '</div>';
  }

  h += '</div>';

  h += '<div style="font-size:10px;color:#6a8ab0;text-align:center;padding:10px 0">TRUSTシステムの集計値です</div>';
  h += '</div>';

  // ---- バック率メーター（煽りあり） ----
  var tantoK_s = num(row['担当小計']);
  var jikanH_s = num(row['時間報酬']);
  if (tantoK_s > 0 && jikanH_s > 0) {
    var bairitu_s  = tantoK_s / jikanH_s;
    var curRate_s  = bairitu_s < 2 ? 10 : (bairitu_s < 3 ? 15 : 20);
    var nextRate_s = bairitu_s < 2 ? 15 : (bairitu_s < 3 ? 20 : null);
    var nextThr_s  = bairitu_s < 2 ? 2  : (bairitu_s < 3 ? 3  : null);
    var barPct_s   = Math.min(bairitu_s / 3, 1) * 100;
    var barColor_s = curRate_s === 10 ? '#e08000' : (curRate_s === 15 ? '#c8a800' : '#44bb66');

    h += '<div style="background:#111b2e;border:1px solid #162848;border-radius:12px;padding:14px 16px;margin-top:10px">';
    h += '<div style="font-size:11px;color:#7a9cc8;margin-bottom:12px;letter-spacing:0.5px">担当バック率メーター</div>';

    // バー
    h += '<div style="position:relative;height:28px;margin-bottom:4px">';
    h += '<div style="position:absolute;top:10px;left:0;width:66.7%;height:8px;background:#2a1800;border-radius:4px 0 0 4px"></div>';
    h += '<div style="position:absolute;top:10px;left:66.7%;right:0;height:8px;background:#1a2a00;border-radius:0 4px 4px 0"></div>';
    h += '<div style="position:absolute;top:10px;left:0;width:' + barPct_s.toFixed(1) + '%;height:8px;background:' + barColor_s + ';border-radius:4px"></div>';
    h += '<div style="position:absolute;top:6px;left:66.7%;width:2px;height:16px;background:#444;transform:translateX(-1px)"></div>';
    h += '<div style="position:absolute;top:6px;right:0;width:2px;height:16px;background:#444"></div>';
    h += '<div style="position:absolute;top:8px;left:' + barPct_s.toFixed(1) + '%;width:12px;height:12px;background:' + barColor_s + ';border:2px solid #e8f0ff;border-radius:50%;transform:translateX(-6px)"></div>';
    h += '</div>';

    // 目盛り
    h += '<div style="position:relative;height:28px;font-size:10px;color:#7a9cc8">';
    h += '<span style="position:absolute;left:0">0倍<br><span style="color:#cc6644">10%</span></span>';
    h += '<span style="position:absolute;left:66.7%;transform:translateX(-50%);text-align:center">2倍<br><span style="color:#bbaa00">15%</span></span>';
    h += '<span style="position:absolute;right:0;text-align:right">3倍<br><span style="color:#44bb66">20%</span></span>';
    h += '</div>';

    h += '<div style="margin-top:8px;padding-top:10px;border-top:1px solid #162848">';
    h += '<div style="font-size:13px;font-weight:600;color:#c0d4f0">倍率 ' + bairitu_s.toFixed(2) + '倍 → <span style="color:' + barColor_s + '">バック率 ' + curRate_s + '%</span></div>';

    if (nextRate_s) {
      var needed_s = Math.ceil(nextThr_s * jikanH_s - tantoK_s);
      var neededW  = Math.ceil(needed_s / 10000);
      // 煽りメッセージ
      var cheers = curRate_s === 10
        ? ['あと', '担当売上 ', '¥' + needed_s.toLocaleString(), ' (' + neededW + '万円)で15%へ！', '勢いに乗っていこう🔥']
        : ['ラストスパート！あと', '担当売上 ', '¥' + needed_s.toLocaleString(), ' (' + neededW + '万円)で20%達成！', '今日が変わり目💪'];
      h += '<div style="font-size:12px;color:#8aabcc;margin-top:4px">' + cheers[0]
        + '<span style="color:#7ab0f0;font-weight:600">' + cheers[2] + '</span>'
        + cheers[3] + '</div>';
      h += '<div style="font-size:12px;color:' + barColor_s + ';margin-top:4px;font-weight:600">' + cheers[4] + '</div>';
    } else {
      h += '<div style="font-size:13px;color:#44bb66;margin-top:4px;font-weight:600">今月も最高バック率20%達成！さすが！🎉</div>';
    }
    h += '</div>';
    h += '</div>';
  }

  h += '</div>';
  setContent(h);
}

function switchSalesMonth(m) { currentMonth = m; renderSales(); }

function salesSetDate(month) {
  var cur = ((portalData && portalData.salesDataDates) || {})[month] || '';
  var d = prompt(month + ' の取込日を入力（例: 6月15日 または 2026-06-15）', cur);
  if (d === null) return;
  gasFetch(GAS_URL, { method:'POST', body: JSON.stringify({ action:'setSalesDataDate', userId:userId, month:month, date:d.trim() }) })
    .then(function(r){ return r.json(); })
    .then(function(res) {
      if (!res.ok) { alert('エラー: ' + (res.error||'')); return; }
      if (!portalData.salesDataDates) portalData.salesDataDates = {};
      portalData.salesDataDates[month] = d.trim();
      renderSales();
    });
}

// ---- 給与明細（TRUST明細書形式） ----
function renderPay() {
  var sales = (portalData && portalData.sales) || {};
  var hairTotals = (portalData && portalData.hairTotals) || {};
  var salesMonths = Object.keys(sales);
  var hairMonths  = Object.keys(hairTotals).filter(function(m) { return !salesMonths.includes(m); });
  var allMonths   = salesMonths.concat(hairMonths).sort().reverse();

  if (allMonths.length === 0) {
    setContent('<div style="text-align:center;padding:60px 20px">'
      + '<div style="font-size:15px;font-weight:600;color:#7ab0f0;margin-bottom:8px">データなし</div>'
      + '<div style="font-size:12px;color:#7a9cc8;line-height:1.7">今月の給与データはまだ取得されていません。</div>'
      + '</div>');
    return;
  }

  var pay = portalData && portalData.pay;
  var months = allMonths;
  var sel = (currentMonth && (sales[currentMonth] || hairTotals[currentMonth])) ? currentMonth : months[0];

  // 公開チェック（非管理者は未公開月を表示しない）
  var payPublished = portalData.payPublished || {};

  function monthTabsHtml(selectedM) {
    if (months.length <= 1) return '';
    var t = '<div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px">';
    months.forEach(function(m) {
      var act = m === selectedM;
      var pub = payPublished[m];
      var label = m + (isAdmin && !pub ? ' 🔒' : '');
      t += '<button onclick="switchPayMonth(\'' + m + '\')" style="padding:5px 14px;border-radius:16px;border:1px solid '
        + (act ? '#4488ee' : '#1a2e50') + ';background:' + (act ? '#0f2040' : 'transparent')
        + ';color:' + (act ? '#7ab0f0' : '#7a9cc8') + ';font-size:12px;cursor:pointer;white-space:nowrap">' + label + '</button>';
    });
    t += '</div>';
    return t;
  }

  var isHairOnlyMonth = !sales[sel] || Object.keys(sales[sel] || {}).length === 0;
  if (!isAdmin && !payPublished[sel] && !isHairOnlyMonth) {
    var hLock = '<div style="padding:14px">' + monthTabsHtml(sel)
      + '<div style="text-align:center;padding:60px 20px">'
      + '<div style="font-size:36px;margin-bottom:14px">🔒</div>'
      + '<div style="font-size:15px;font-weight:600;color:#7ab0f0;margin-bottom:8px">まだ公開されていません</div>'
      + '<div style="font-size:12px;color:#7a9cc8;line-height:1.8">' + esc(sel) + ' の給与明細は確認中です。<br>公開されるまでお待ちください。</div>'
      + '</div></div>';
    setContent(hLock);
    return;
  }

  var s = (sales && sales[sel]) ? sales[sel] : {};
  var p = pay && pay[sel] ? pay[sel] : {};

  function n(v) { return parseFloat(String(v).replace(/[¥,]/g, '')) || 0; }
  function yen(v) { return '¥' + (parseInt(v) || 0).toLocaleString(); }

  // 売上データなし・領収書のみの月
  var hairTotals = portalData.hairTotals || {};
  var hairOnly = Object.keys(s).length === 0;
  if (hairOnly && hairTotals[sel]) {
    var hairAmt = hairTotals[sel];
    var reiwaOnly = sel;
    var partsO = sel.split('/');
    if (partsO.length === 2) reiwaOnly = '令和' + (parseInt(partsO[0]) - 2018) + '年' + parseInt(partsO[1]) + '月分';
    var hOnly = '<div style="padding:14px">' + monthTabsHtml(sel);
    if (isAdmin) {
      var isPubO = !!payPublished[sel];
      hOnly += '<div style="background:#141d30;border:1px solid #1e3050;border-radius:10px;padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">';
      hOnly += '<div><div style="font-size:10px;color:#7a9cc8;margin-bottom:4px">給与明細 公開状態</div>';
      hOnly += '<div style="font-size:13px;font-weight:600;color:' + (isPubO ? '#44bb66' : '#cc8844') + '">' + (isPubO ? '✅ 公開中' : '🔒 未公開') + '</div></div>';
      hOnly += '<button onclick="togglePayPublish(\'' + esc(sel) + '\',\'' + (isPubO ? 'unpublishPay' : 'publishPay') + '\')" style="padding:8px 16px;background:' + (isPubO ? '#2a1010' : '#102a10') + ';border:1px solid ' + (isPubO ? '#cc4444' : '#44aa44') + ';border-radius:8px;color:' + (isPubO ? '#ff8888' : '#66dd66') + ';font-size:13px;font-weight:700;cursor:pointer">' + (isPubO ? '非公開に戻す' : '公開する') + '</button>';
      hOnly += '</div>';

      hOnly += '<div style="background:#141d30;border:1px solid #1e3050;border-radius:10px;padding:11px 14px;margin-bottom:14px">';
      hOnly += '<div style="font-size:10px;color:#7a9cc8;letter-spacing:0.5px;margin-bottom:8px">CSVから給与明細作成</div>';
      hOnly += '<div style="display:flex;gap:8px;align-items:center">';
      hOnly += '<input type="text" id="payroll-csv-month" value="' + esc(sel) + '" placeholder="2026/06" '
        + 'style="width:80px;background:#0d0d18;border:1px solid #2a2a40;color:#fff;padding:8px;border-radius:8px;font-size:13px;text-align:center">';
      hOnly += '<label style="flex:1;padding:8px 12px;background:#0a1428;border:1px solid #1e3a6a;border-radius:8px;color:#7ab0f0;font-size:13px;cursor:pointer;text-align:center" id="payroll-csv-label">';

    hOnly += '<div style="font-size:11px;margin-top:3px">' + esc(reiwaOnly) + '</div>';
    hOnly += '<div style="font-size:11px">ラウンジ 家康</div>';
    hOnly += '<div style="font-size:17px;font-weight:700;margin-top:6px">' + esc(portalData.viewAs || portalData.name || '') + '</div>';
    hOnly += '</div>';
    hOnly += '<div style="margin-top:12px;border-top:1px solid #c0d4f0;padding-top:10px">';
    hOnly += '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:#006600"><span>ヘアサロン立替代</span><span>＋¥' + hairAmt.toLocaleString() + '</span></div>';

    hOnly += '</div></div></div>';
    setContent(hOnly);
    return;
  }

  var jikanH  = n(s['時間報酬']);
  var tantoK  = n(s['担当小計']);
  var tantoB  = n(s['担当バック']);
  var yoyakuB = n(s['予約バック']);
  var dohanB  = n(s['同伴バック']);
  var drinkB  = n(s['ドリンクバック']);
  var bottleB = n(s['ボトルバック']);
  var foodB   = n(s['年会費バック']);
  var bonus   = n(s['ボーナス']);
  var sougei  = n(s['送迎手当']);
  var zangyo  = n(s['残業代']);
  var urihan  = n(s['売り半']);
  var nyutenB = n(s['入店祝い金']);
  var bdayInfo = s['__bday'] || null; // 誕生日バック週の内訳（未設定null）
  // 新バック方式では担当小計バック(s['担当バック']=新バック)が正。レガシー給与計算シート由来の小計バック(p['新バック'])は
  // 二重計上になるため、新バックがある月は抑制する（旧KYUYOのみの月はフォールバックで表示）。
  var shoBack = tantoB > 0 ? 0 : n(p['新バック']);
  var shikyu  = jikanH + shoBack + tantoB + yoyakuB + dohanB + drinkB + bottleB + foodB + bonus + sougei + zangyo + urihan + nyutenB;

  var gensen    = n(s['源泉徴収']);
  var nichibara = n(s['日払']);
  var minus     = n(s['マイナス']);
  var kojo      = gensen + nichibara + minus;

  var nokori    = n(s['残り支給額']);
  var hairTotals = portalData.hairTotals || {};
  var hairReceipt = hairTotals[sel] || 0;
  var hairManual  = n(p['ヘアサロン立替(手入力)']);
  var hair        = hairReceipt > 0 ? hairReceipt : hairManual;
  var finalPay    = nokori + hair;

  // 令和変換
  var parts = sel.split('/');
  var reiwaStr = sel;
  if (parts.length === 2) {
    var reiwa = parseInt(parts[0]) - 2018;
    reiwaStr = '令和' + reiwa + '年' + parseInt(parts[1]) + '月分';

  var h = '<div style="padding:14px">';

  h += monthTabsHtml(sel);

    h += '</label>';
    h += '</div>';
    h += '<div id="payroll-csv-status" style="font-size:11px;color:#7a9cc8;margin-top:6px"></div>';

  // 受領確認状況・送信ボタン（管理者・キャスト共通）

  h += '</div>';
  h += '<div style="display:flex;gap:8px">';
  h += '<button onclick="sendPayrollReceipt(\'' + esc(sel) + '\',\'現金\')" style="flex:1;padding:8px;background:#0a1428;border:1px solid #1e3a6a;border-radius:8px;color:#7ab0f0;font-size:12px;font-weight:700;cursor:pointer">現金で受領確認を送信</button>';
  h += '<button onclick="sendPayrollReceipt(\'' + esc(sel) + '\',\'銀行振込\')" style="flex:1;padding:8px;background:#0a1428;border:1px solid #1e3a6a;border-radius:8px;color:#7ab0f0;font-size:12px;font-weight:700;cursor:pointer">振込で受領確認を送信</button>';
  h += '</div></div>';

  h += tr('合計', yen(shikyu), 'total');

  h += trHead('控除対象');
  h += tr('源泉徴収', yen(gensen), 'kojo');
  if (nichibara > 0) h += tr('日払', yen(nichibara), 'kojo');
  if (minus     > 0) h += tr('マイナス', yen(minus), 'kojo');

  h += '</table>';

  // フッター
  h += '<div style="margin-top:12px;border-top:1px solid #c0d4f0;padding-top:10px">';

    h += '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:#005500">'

  h += '</div>';  // white card

  // ---- 🎂 誕生日バックのお祝いノート ----
  if (bdayInfo) {
    var bdayGain = bdayInfo.bdayBack - Math.round(bdayInfo.tantoBday * bdayInfo.normalRate / 100);
    h += '<div style="background:#1e1630;border:1px solid #3a2a5a;border-radius:12px;padding:13px 15px;margin-top:10px;color:#e0d4ff">';
    h += '<div style="font-size:13px;font-weight:700;margin-bottom:5px">🎂 誕生日バック適用中（' + esc(bdayInfo.start) + ' 〜 ' + esc(bdayInfo.end) + '）</div>';
    h += '<div style="font-size:12px;line-height:1.7;color:#c8b8f0">この週の担当売上 <b style="color:#e0d4ff">' + yen(bdayInfo.tantoBday) + '</b> は特別に <b style="color:#c9a0ff">' + bdayInfo.rate + '%</b> バック。'
      + '通常率なら' + yen(Math.round(bdayInfo.tantoBday * bdayInfo.normalRate / 100)) + 'のところ <b style="color:#7fd88f">+' + yen(bdayGain) + '</b> お得です。おめでとう！🎉</div>';
    h += '</div>';
  }

  // ---- バック率メーター ----
  if (tantoK > 0 && jikanH > 0) {
    var bairitu = tantoK / jikanH;
    var curRate  = bairitu < 2 ? 10 : (bairitu < 3 ? 15 : 20);
    var nextRate = bairitu < 2 ? 15 : (bairitu < 3 ? 20 : null);
    var nextThr  = bairitu < 2 ? 2  : (bairitu < 3 ? 3  : null);
    // 0〜3倍スケールで位置を計算（3倍超えは100%）
    var barPct   = Math.min(bairitu / 3, 1) * 100;
    var barColor = curRate === 10 ? '#e08000' : (curRate === 15 ? '#c8a800' : '#44bb66');
    var bgZone1  = curRate === 10 ? '#2a1a00' : '#1a1a00';

    h += '<div style="background:#111b2e;border:1px solid #162848;border-radius:12px;padding:14px 16px;margin-top:10px">';
    h += '<div style="font-size:11px;color:#7a9cc8;margin-bottom:12px;letter-spacing:0.5px">バック率メーター</div>';

    // バー本体
    h += '<div style="position:relative;height:28px;margin-bottom:4px">';
    // 背景ゾーン（0〜2x: 10%帯、2〜3x: 15%帯）
    h += '<div style="position:absolute;top:10px;left:0;width:66.7%;height:8px;background:#2a1800;border-radius:4px 0 0 4px"></div>';
    h += '<div style="position:absolute;top:10px;left:66.7%;right:0;height:8px;background:#1a2a00;border-radius:0 4px 4px 0"></div>';
    // 進捗バー
    h += '<div style="position:absolute;top:10px;left:0;width:' + barPct.toFixed(1) + '%;height:8px;background:' + barColor + ';border-radius:4px;transition:width 0.5s"></div>';
    // 2x境界線
    h += '<div style="position:absolute;top:6px;left:66.7%;width:2px;height:16px;background:#444;transform:translateX(-1px)"></div>';
    // 3x境界線（右端）
    h += '<div style="position:absolute;top:6px;right:0;width:2px;height:16px;background:#444"></div>';
    // 現在地ドット
    h += '<div style="position:absolute;top:8px;left:' + barPct.toFixed(1) + '%;width:12px;height:12px;background:' + barColor + ';border:2px solid #e8f0ff;border-radius:50%;transform:translateX(-6px)"></div>';
    h += '</div>';

    // 目盛りラベル
    h += '<div style="position:relative;height:28px;font-size:10px;color:#7a9cc8">';
    h += '<span style="position:absolute;left:0">0倍<br><span style="color:#cc6644">10%</span></span>';
    h += '<span style="position:absolute;left:66.7%;transform:translateX(-50%);text-align:center">2倍<br><span style="color:#bbaa00">15%</span></span>';
    h += '<span style="position:absolute;right:0;text-align:right">3倍<br><span style="color:#44bb66">20%</span></span>';
    h += '</div>';

    // 現在の状態テキスト
    h += '<div style="margin-top:8px;padding-top:10px;border-top:1px solid #162848">';
    h += '<div style="font-size:13px;font-weight:600;color:#c0d4f0">倍率 ' + bairitu.toFixed(2) + '倍 → <span style="color:' + barColor + '">バック率 ' + curRate + '%</span></div>';
    if (nextRate) {
      var needed = Math.ceil(nextThr * jikanH - tantoK);
      h += '<div style="font-size:12px;color:#8aabcc;margin-top:4px">'
        + '<span style="color:#7ab0f0;font-weight:600">' + nextRate + '%</span> まであと担当売上 '
        + '<span style="color:#7ab0f0;font-weight:600">¥' + needed.toLocaleString() + '</span></div>';
    } else {
      h += '<div style="font-size:12px;color:#44bb66;margin-top:4px">最高バック率（20%）達成！</div>';
    }
    h += '</div>';
    h += '</div>';  // meter card
  }

  h += '</div>';
  setContent(h);
}

function switchPayMonth(m) { currentMonth = m; renderPay(); }

function handlePayrollCsv(input) {
  var file = input.files && input.files[0];
  if (!file) return;
  var monthEl = document.getElementById('payroll-csv-month');
  var month = monthEl ? monthEl.value.trim() : '';
  var statusEl = document.getElementById('payroll-csv-status');
  if (!month) {
    if (statusEl) statusEl.textContent = '⚠️ 対象月を入力してください（例: 2026/06）';
    input.value = '';
    return;
  }
  if (statusEl) statusEl.textContent = '読み込み中...';
  var reader = new FileReader();
  reader.onload = function(e) {
    var csvText = e.target.result;
    gasFetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'importPayrollCsv', userId: userId, month: month, csvText: csvText })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      input.value = '';
      if (!d.ok) { if (statusEl) statusEl.textContent = '⚠️ ' + (d.error || 'エラー'); return; }
      if (statusEl) statusEl.textContent = '✅ ' + d.count + '名分を取り込みました';
      currentMonth = month;
      loadStatsData(true, function(){ renderStats(); });
    })
    .catch(function() {
      input.value = '';
      if (statusEl) statusEl.textContent = '⚠️ 通信エラーが発生しました';
    });
  };
  reader.readAsText(file, 'UTF-8');
}

function togglePayPublish(month, action) {
  gasFetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: action, userId: userId, month: month })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.ok) {
      if (!portalData.payPublished) portalData.payPublished = {};
      portalData.payPublished[month] = (action === 'publishPay');
      renderPay();
    } else {
      alert('エラー: ' + (d.error || 'unknown'));
    }
  })
  .catch(function() { alert('通信エラーが発生しました'); });
}

function sendPayrollReceipt(month, method) {
  var s = (portalData.sales && portalData.sales[month]) || {};
  var p = (portalData.pay && portalData.pay[month]) || {};
  var num = function(v) { return parseFloat(String(v).replace(/[¥,]/g, '')) || 0; };
  var nokori = num(s['残り支給額']);
  var hairTotals = portalData.hairTotals || {};
  var hair = (hairTotals[month] || 0) > 0 ? hairTotals[month] : num(p['ヘアサロン立替(手入力)']);
  var amount = nokori + hair;

  if (!confirm(method + 'で給与受領確認をLINEに送信します。よろしいですか？')) return;

  gasFetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'sendPayrollReceipt', userId: userId, month: month, targetName: portalData.viewAs || portalData.name, amount: amount, method: method })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.ok) { alert('送信しました'); loadStatsData(true, function(){ renderStats(); }); }
    else alert('エラー: ' + (d.error || 'unknown'));
  })
  .catch(function() { alert('通信エラーが発生しました'); });
}

  // 実測で確認済み:

  //  営業は深夜に及ぶため、当日午前6時より前にクリックした場合は前日を営業日とみなす
  var code = 'javascript:(function(){'
    + 'var G=' + JSON.stringify(gas) + ';'
    + 'var S=' + JSON.stringify(secret) + ';'
    + 'var now=new Date();var biz=new Date(now);if(now.getHours()<6)biz.setDate(biz.getDate()-1);'
    + 'var yr=biz.getFullYear();var mo=biz.getMonth()+1;var dy=biz.getDate();'

var receiptPhotoBase64 = '';

// ---- 顧客管理タブ ----
var custFilter = '';
var custQuery  = '';
var custList   = [];

function loadCustomers(filter, q) {
  if (filter !== undefined) custFilter = filter;
  if (q      !== undefined) custQuery  = q;
  renderCustomerShell_(); // シェル（入力欄・フィルタ）を描画。※検索(入力)中は呼ばない
  fetchCustomers_();
}
// 結果リストだけ取得・更新（入力欄は作り直さない＝IME・フォーカスを壊さない）
function fetchCustomers_() {
  var url = GAS_URL + '?action=portal&tab=customers&userId=' + encodeURIComponent(userId)
    + '&filter=' + encodeURIComponent(custFilter)
    + '&q='      + encodeURIComponent(custQuery);
  gasFetch(url).then(function(r){ return r.json(); }).then(function(d) {
    var el = document.getElementById('cust-list'); if (!el) return;
    if (!d.ok) { el.innerHTML = '<div class="err">エラー</div>'; return; }
    custList = d.customers || [];
    renderCustomerList_();

}

function renderCustomerShell_() {

  var filters = [

    { key: 'has_member',         label: '💳 会員登録あり' },
    { key: 'has_bottle',         label: '🍶 ボトルあり' },
    { key: 'birthday_this_month',label: '🎂 今月誕生日（' + thisMonth + '月）' }
  ];
  var filterBtns = filters.map(function(f) {
    return '<button class="cust-filter-btn' + (custFilter === f.key ? ' active' : '') + '" onclick="loadCustomers(\'' + f.key + '\', custQuery)">' + f.label + '</button>';

    + '<div class="cust-filter-bar">' + filterBtns + '</div>'

// 入力/変換確定/エンターのいずれでも検索する（結果だけ更新なのでIMEは壊れない）
function custSearchInput(ev, fn) {
  fn((ev && ev.target && ev.target.value) || '');
}
function custSearchKey(ev, fn) {

}

function renderCustomerList_() {
  var el = document.getElementById('cust-list');
  if (!el) return;
  if (!custList.length) {
    el.innerHTML = '<div style="text-align:center;color:#6a8ab0;padding:30px 0;font-size:13px">該当する顧客が見つかりませんでした</div>';
    return;
  }
  var today = new Date(); today.setHours(0,0,0,0);
  el.innerHTML = custList.map(function(c, i) {
    var badges = '';
    if (c.bottle) badges += '<span class="ycm ycm-bottle">🍶' + esc(c.bottle) + '</span>';
    if (c.bday)   badges += '<span class="ycm ycm-bday">🎂 ' + esc(c.bday) + '</span>';
    if (c.note)   badges += '<span class="ycm ycm-note">📝メモ</span>';
    if (c.annualFeeDate || c.memberYear) {
      var yearLabel = c.memberYear ? c.memberYear + '年目' : '';
      if (c.annualFeeDate) {
        var renewal = new Date(c.annualFeeDate); renewal.setFullYear(renewal.getFullYear() + 1);
        var daysLeft = Math.ceil((renewal - today) / 86400000);
        var cls = daysLeft <= 7 ? 'ycm-fee-urg' : daysLeft <= 30 ? 'ycm-fee-warn' : 'ycm-note';
        var countLabel = daysLeft <= 30 ? '（あと' + daysLeft + '日）' : '';
        badges += '<span class="ycm ' + cls + '">💳 ' + (yearLabel ? yearLabel + '　' : '') + '期限' + (renewal.getMonth()+1) + '月' + renewal.getDate() + '日' + countLabel + '</span>';
      } else if (yearLabel) {
        badges += '<span class="ycm ycm-note">💳 ' + yearLabel + '</span>';
      }
    }
    if (c.restricted) badges += '<span class="ycm ycm-note" style="opacity:.7">🔒 担当のみ詳細</span>';
    return '<div class="cust-card" onclick="openPortalCustDetail(' + i + ')" style="cursor:pointer">'
      + '<div class="cust-card-top">'
      + '<span class="cust-card-name">' + esc(c.name || c.card || '') + '様</span>'
      + (c.no ? '<span class="cust-card-no">会員 ' + esc(c.no) + '</span>' : '')
      + (c.tantou ? '<span class="cust-card-tantou">担当: ' + esc(c.tantou) + '</span>' : '')
      + '</div>'
      + (badges ? '<div class="cust-card-badges">' + badges + '</div>' : '')

          + (c.tabaco ? 'タバコ: ' + esc(c.tabaco) : '')

      + '</div>';
  }).join('');
}

// 来店日 'yyyy-MM-dd' → 'M/d'（今年以外は yyyy/M/d）
function fmtVisitDate(d) {
  var m = String(d || '').match(/^(\d{4})-(\d{2})-(\d{2})$/); if (!m) return String(d || '');
  var y = +m[1], mo = +m[2], da = +m[3];
  return (y === (new Date()).getFullYear()) ? (mo + '/' + da) : (y + '/' + mo + '/' + da);
}

function previewPhoto(input) {
  var file = input.files && input.files[0];
  if (!file) return;
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d');
  var img = new Image();
  var reader = new FileReader();
  reader.onload = function(e) {
    img.onload = function() {
      var MAX = 1000;
      var w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
      var dataUrl = canvas.toDataURL('image/jpeg', 0.75);
      receiptPhotoBase64 = dataUrl.split(',')[1];
      receiptPhotoMime   = 'image/jpeg';
      // プレビュー表示
      var prev = document.getElementById('photo-preview');
      if (prev) {
        prev.innerHTML = '<img src="' + dataUrl + '" style="width:100%;height:100%;object-fit:cover;border-radius:8px">';
      }
      var hint = document.getElementById('photo-hint');
      if (hint) hint.style.display = 'none';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearPhoto() {
  receiptPhotoBase64 = '';
  receiptPhotoMime   = 'image/jpeg';
  var prev = document.getElementById('photo-preview');
  if (prev) prev.innerHTML = '<span id="photo-hint" style="font-size:12px;color:#7a9cc8">タップして写真を選択</span>';

function submitReceipt() {
