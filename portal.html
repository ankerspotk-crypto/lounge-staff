    +   '<button class="notif-del-btn" style="width:100%;margin-top:0" onclick="resetCashAction(\'resetSafeWithdrawalLog\',\'本日の金庫出金ログ\')">🔓 金庫出金ログをリセット</button>'

function cashsetTillChange(floor, key, field, val) {
  if (!cashThresholds) return;
  var n = val === '' ? null : Number(val);
  cashThresholds.till[floor][key][field] = n;
}

function cashsetSafeChange(floor, key, val) {
  if (!cashThresholds) return;
  var n = val === '' ? null : Number(val);
  cashThresholds.safe[floor][key].min = n;
}

        + (yoyakuSubTab===t ? 'background:#1a2a4a;color:#88aaff;border:1px solid #2255aa;' : 'background:#1a1a2e;color:#445;border:1px solid #2a2a40;')

function yoyakuSubSwitch(t) {

function loadYoyakuCal(headerHtml) {
  if (!yoyakuCalMonth) {
    var d = new Date();
    yoyakuCalMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  }
  if (!headerHtml) {
    // subtabsだけ再生成
    var subtabs = '<div style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap">'
      + ['cal','list','sched','add'].map(function(t) {
        var labels = {cal:'カレンダー',list:'リスト',sched:'スケジュール',add:'予約追加'};
        return '<div style="flex:1;min-width:54px;padding:8px 4px;text-align:center;font-size:11px;cursor:pointer;border-radius:7px;'
          + (t==='cal'?'background:#1a2a4a;color:#88aaff;border:1px solid #2255aa;':'background:#1a1a2e;color:#445;border:1px solid #2a2a40;')
          + '" onclick="yoyakuSubSwitch(\''+t+'\')">' + labels[t] + '</div>';
      }).join('') + '</div>';
    headerHtml = '' + subtabs;
  }
  setContent('<div style="padding:14px">' + headerHtml + '<div class="loading">カレンダー読み込み中...</div></div>');
  fetch(GAS_URL + '?action=portal&tab=yoyakuMonth&userId=' + encodeURIComponent(userId) + '&month=' + yoyakuCalMonth)
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (!d.ok) { setContent('<div class="err">エラー: '+esc(d.error||'')+'</div>'); return; }
      setContent('<div style="padding:14px">' + headerHtml + renderYoyakuCal(d.summary || {}) + '</div>');
    })
    .catch(function(){ setContent('<div class="err">通信エラー</div>'); });
}

function renderYoyakuCal(summary) {
  var parts = yoyakuCalMonth.split('-');
  var year = parseInt(parts[0]), month = parseInt(parts[1]);
  var firstDay = new Date(year, month-1, 1).getDay(); // 0=日
  var daysInMonth = new Date(year, month, 0).getDate();
  var today = new Date();
  var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

  var monthNav = '<div class="ycal-month-nav">'
    + '<button onclick="yoyakuCalChangeMonth(-1)">‹</button>'
    + '<div class="ycal-month-title">'+year+'年'+month+'月</div>'
    + '<button onclick="yoyakuCalChangeMonth(1)">›</button>'
    + '</div>';

  var dows = ['日','月','火','水','木','金','土'];
  var dowHdr = '<div class="ycal-grid">' + dows.map(function(d,i){
    return '<div class="ycal-dow'+(i===0?' sun':i===6?' sat':'')+'">' + d + '</div>';
  }).join('') + '</div>';

  var cells = '<div class="ycal-grid">';
  // 月初の空白
  for (var b = 0; b < firstDay; b++) cells += '<div class="ycal-day other"><span class="ycal-num"></span></div>';

  for (var day = 1; day <= daysInMonth; day++) {
    var dateKey = year + '-' + String(month).padStart(2,'0') + '-' + String(day).padStart(2,'0');
    var dow = (firstDay + day - 1) % 7;
    var cls = 'ycal-day';
    if (dateKey === todayStr) cls += ' today';
    if (dow === 0) cls += ' sunday';
    if (dow === 6) cls += ' saturday';
    var s = summary[dateKey];
    var paxHtml = s ? '<div class="ycal-pax">'+s.pax+'名</div>' : '';
    var dotHtml = ''; // 将来：仮予約バッジ用
    cells += '<div class="'+cls+'" onclick="yoyakuCalGo(\''+dateKey+'\')">'
      + dotHtml
      + '<div class="ycal-num">'+day+'</div>'
      + paxHtml
      + '</div>';
  }
  cells += '</div>';

  return monthNav + dowHdr + cells;
}

function yoyakuCalChangeMonth(diff) {
  var parts = yoyakuCalMonth.split('-');
  var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1+diff, 1);
  yoyakuCalMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  loadYoyakuCal(null);
}

function yoyakuCalGo(dateKey) {
  var parts = dateKey.split('-');
  yoyakuDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  yoyakuSubTab = 'list';
  loadYoyaku();
}

function yoyakuChangeDate(d) {
  yoyakuDate = new Date(yoyakuDate.getTime() + d * 86400000);
  loadYoyaku();
}
function yoyakuToday() { yoyakuDate = new Date(); loadYoyaku(); }

      + '</div>';

function renderYoyakuSched() {
  var HW = 52, SH = 19, EH = 26, TW = (EH-SH)*HW;
  var prevF = '';
  var leftHtml = '<div class="ysched-tbl-hdr">テーブル</div>';
  var rightHtml = '<div class="ysched-hdr"><div style="width:'+TW+'px;display:flex">';
  for (var h = SH; h < EH; h++) rightHtml += '<div class="ysched-time-cell" style="width:'+HW+'px">'+(h<24?h:h-24)+':00</div>';
  rightHtml += '</div></div>';

  YOYAKU_TABLES.forEach(function(t, i) {
    if (t.f !== prevF && prevF !== '') {
      leftHtml += '<div class="ysched-floor-div"></div>';
      rightHtml += '<div class="ysched-floor-div" style="width:'+TW+'px"></div>';
    }
    prevF = t.f;
    leftHtml += '<div class="ysched-name-cell"><div class="ysched-name-main">'+t.f+' '+t.n.replace('カウンター','カウ').replace('ボックス','ボックス')+'</div></div>';
    // 1時間ごとのセル（内部に15分区切りの薄い縦線を入れる）
    var rowBg = '';
    for (var c = 0; c < (EH-SH); c++) {
      rowBg += '<div class="ysched-hour-cell" style="width:'+HW+'px;display:flex">'
        + '<div style="flex:1;border-right:1px solid #0f0f20"></div>'
        + '<div style="flex:1;border-right:1px solid #0f0f20"></div>'
        + '<div style="flex:1;border-right:1px solid #0f0f20"></div>'
        + '<div style="flex:1"></div>'
        + '</div>';
    }
    var blocks = '';
    yoyakuRsvs.forEach(function(r) {
      if ((r.table||'').replace(/\s/g,'') !== (t.f+t.n).replace(/\s/g,'')) return;
      var pts = (r.time||'20:00').split(':');
      var sm = (parseInt(pts[0])||20)*60+(parseInt(pts[1])||0);
      var em = sm + 120;
      var lx = ((sm-SH*60)/60)*HW, wx = ((em-sm)/60)*HW-3;
      if (lx < 0) { wx += lx; lx = 0; }
      var colors = ['background:#162848;border:1px solid #2a5090','background:#0d2820;border:1px solid #1a5038','background:#20163a;border:1px solid #402870','background:#281800;border:1px solid #503010'];
      blocks += '<div class="yrsv-blk" style="left:'+lx+'px;width:'+wx+'px;'+colors[i%4]+'" onclick="event.stopPropagation()">'
        + '<div class="yrsv-pax">'+r.pax+'名</div><div class="yrsv-name">'+esc(r.customer)+'様</div></div>';
    });
    rightHtml += '<div class="ysched-row" style="width:'+TW+'px;cursor:crosshair" data-tidx="'+i+'" onclick="yoyakuGridClick('+i+',event,'+SH+','+HW+')">'
      + '<div class="ysched-row-bg">'+rowBg+'</div>'+blocks+'</div>';
  });

  return '<div class="ysched-wrap"><div class="ysched-inner"><div class="ysched-left">'+leftHtml+'</div><div class="ysched-right">'+rightHtml+'</div></div></div>';
}

function renderYoyakuAdd() {
  var preset = yoyakuGridPreset || {};
  var presetTime  = preset.time  || '20:00';
  if (!yoyakuRsvDate) yoyakuRsvDate = yoyakuDateStr(yoyakuDate);
  if (!yoyakuRsvCalMonth) yoyakuRsvCalMonth = yoyakuRsvDate.slice(0, 7);
  if (!yoyakuRsvTime) yoyakuRsvTime = presetTime;
  var presetTable = yoyakuRsvTable || preset.table || '未定';
  // 選択日時と被る予約済み席を取得（リスト日付と一致する場合のみ）
  var bookedTables = {};
  if (yoyakuRsvDate === yoyakuDateStr(yoyakuDate) && yoyakuRsvTime) {
    var selMin = (function(t){ var p=t.split(':'),h=parseInt(p[0]),m=parseInt(p[1])||0; if(h<6)h+=24; return h*60+m; })(yoyakuRsvTime);
    yoyakuRsvs.forEach(function(r) {
      if (!r.table || r.table === '未定') return;
      var eMin = (function(t){ var p=(t||'20:00').split(':'),h=parseInt(p[0]),m=parseInt(p[1])||0; if(h<6)h+=24; return h*60+m; })(r.time);
      if (Math.abs(selMin - eMin) < 120) bookedTables[r.table.replace(/\s/g,'')] = r.customer;
    });
  }
  var tableOpts = '<option value="未定">未定</option>' + YOYAKU_TABLES.map(function(t){
    var val = t.f+' '+t.n;
    var booked = bookedTables[(t.f+t.n).replace(/\s/g,'')];
    return '<option value="'+val+'"'+(val===presetTable?' selected':'')+'>'+val+(booked?' ●予約済':'')+'</option>';
  }).join('');
  var presetBanner = preset.table
    ? '<div style="font-size:12px;background:#1a2a1a;border:1px solid #1a4a22;border-radius:7px;padding:8px 11px;color:#66cc88;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">'
      + '<span>📅 <b>'+esc(presetTable)+'</b>　'+esc(presetTime)+'〜（デフォルト2時間）を選択中</span>'
      + '<span style="font-size:11px;color:#445;cursor:pointer" onclick="yoyakuGridPreset=null;renderYoyaku()">✕ クリア</span></div>'
    : '';

  var tantouCast = (yoyakuSelectedCust && yoyakuSelectedCust.tantou) ? yoyakuSelectedCust.tantou : '';
  var custSection;
  if (yoyakuEditRsv) {
    custSection = '<div style="background:#1a1400;border:1px solid #554400;border-radius:8px;padding:9px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">'
      + '<div><span style="font-size:11px;color:#ddaa44">✏️ 編集中</span><span style="font-size:13px;font-weight:600;color:#fff;margin-left:8px">'+esc(yoyakuEditRsv.customer)+'様</span></div>'
      + '<span style="font-size:11px;color:#556;cursor:pointer" onclick="yoyakuCancelEdit()">← キャンセル</span>'
      + '</div>';
  } else if (yoyakuSelectedCust) {
    custSection = '<div style="background:#0d1a2e;border:1px solid #88aaff;border-radius:8px;padding:9px 11px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">'
      + '<div><div style="font-size:13px;font-weight:600;color:#88aaff">'+esc(yoyakuSelectedCust.card||yoyakuSelectedCust.name||'')+'様</div>'
      + (tantouCast ? '<div style="font-size:11px;color:#bb99ff;margin-top:3px">担当: '+esc(tantouCast)+'</div>' : '')
      + '</div>'
      + '<span style="font-size:11px;color:#556;cursor:pointer;white-space:nowrap;margin-left:8px" onclick="yoyakuClearCust()">変更</span>'
      + '</div>';
  } else if (yoyakuCustMode === 'search') {
    custSection = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
      + '<span style="font-size:12px;color:#556;cursor:pointer" onclick="yoyakuCustMode=\'\';renderYoyaku()">← 戻る</span>'
      + '<span style="font-size:12px;color:#88aaff">既存のお客様を検索</span>'
      + '</div>'
      + '<input type="text" class="ycust-search" id="ycust-q" placeholder="顧客名・会員番号で検索" oninput="yoyakuSearch(this.value)" style="margin-bottom:6px">'
      + '<div id="ycust-results"></div>';
  } else if (yoyakuCustMode === 'new') {
    custSection = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
      + '<span style="font-size:12px;color:#556;cursor:pointer" onclick="yoyakuRsvCustManual=\'\';yoyakuCustMode=\'\';renderYoyaku()">← 戻る</span>'
      + '<span style="font-size:12px;color:#66cc88">✨ 新規のお客様</span>'
      + '</div>';
  } else {
    custSection = '<div style="display:flex;gap:8px;margin-bottom:12px">'
      + '<div style="flex:1;padding:11px 8px;text-align:center;background:#0d1a2e;border:1px solid #1e3a6a;border-radius:8px;cursor:pointer;font-size:12px;color:#88aaff" onclick="yoyakuCustMode=\'search\';renderYoyaku()">🔍 既存のお客様</div>'
      + '<div style="flex:1;padding:11px 8px;text-align:center;background:#0d2010;border:1px solid #1a4a22;border-radius:8px;cursor:pointer;font-size:12px;color:#66cc88" onclick="yoyakuCustMode=\'new\';renderYoyaku()">＋ 新規のお客様</div>'
      + '</div>';
  }

  return presetBanner + custSection
    + '<div class="yform-sec" id="yform">'
    + '<div style="font-size:11px;color:#445;margin-bottom:10px">予約担当者: <span style="color:#88aaff">'+esc(staffName||'')+'</span></div>'
    + (yoyakuEditRsv || (!yoyakuSelectedCust && yoyakuCustMode === 'new') ?
        '<div class="yform-label">お客様名</div>'
        + '<input type="text" class="yform-input" id="yrsv-cust-manual" placeholder="山田 貴志 様" value="'+esc(yoyakuRsvCustManual)+'" style="margin-bottom:8px">'
      : '')
    + '<div class="yform-label">来店日</div>'
    + renderRsvCal()
    + '<div class="yform-label">時間</div>'
    + renderRsvTimeSel()
    + '<div class="yform-label">人数</div>'
    + (function(){
        var curPax = yoyakuRsvPax || 3;
        var opts = [1,2,3,4,5].map(function(n){ return '<option'+(n===curPax?' selected':'')+'>'+n+'名</option>'; }).join('');
        opts += '<option'+(curPax>5?' selected':'')+'>6名+</option>';
        return '<select class="yform-input" id="yrsv-pax" style="margin-bottom:8px">'+opts+'</select>';
      })()
    + '<div class="yform-label">席</div>'
    + '<select class="yform-input" id="yrsv-table" style="margin-bottom:8px">'+tableOpts+'</select>'
    + '<div class="yform-label">要望・備考</div>'
    + '<textarea class="yform-input" id="yrsv-youbou" rows="3" placeholder="VIP対応・誕生日・ボトル・アレルギー・席希望など..." style="resize:none;margin-bottom:8px">'+esc(yoyakuRsvYoubou)+'</textarea>'
    + '<div class="notif-save-btn" onclick="yoyakuSubmitRsv()" style="cursor:pointer">'+(yoyakuEditRsv ? '変更を保存' : '予約を確定する')+'</div>'
    + '<div id="yrsv-status" style="font-size:12px;color:#999;text-align:center;margin-top:6px"></div>'
    + '</div>';
}


function afterYoyakuRender() {}

function saveFormInputs() {
  var el;
  el = document.getElementById('yrsv-cust-manual'); if (el) yoyakuRsvCustManual = el.value;
  el = document.getElementById('yrsv-youbou');      if (el) yoyakuRsvYoubou = el.value;
  el = document.getElementById('yrsv-pax');         if (el) yoyakuRsvPax = parseInt(el.value) || 3;
  el = document.getElementById('yrsv-table');       if (el) yoyakuRsvTable = el.value;
}
function yoyakuRsvCalNav(diff) {
  saveFormInputs();
  var p = yoyakuRsvCalMonth.split('-');
  var d = new Date(parseInt(p[0]), parseInt(p[1]) - 1 + diff, 1);
  yoyakuRsvCalMonth = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
  renderYoyaku();
}
function yoyakuRsvSelectDate(ds) {
  saveFormInputs();
  yoyakuRsvDate = ds;
  renderYoyaku();
}
function yoyakuRsvSelectTime(t) {
  saveFormInputs();
  yoyakuRsvTime = t;
  renderYoyaku();
}

function renderRsvCal() {
  var p = yoyakuRsvCalMonth.split('-');
  var year = parseInt(p[0]), month = parseInt(p[1]);
  var firstDow = new Date(year, month - 1, 1).getDay();
  var daysInMonth = new Date(year, month, 0).getDate();
  var today = yoyakuDateStr(new Date());
  var h = '<div style="background:#13132a;border:1px solid #2a2a40;border-radius:8px;overflow:hidden;margin-bottom:10px">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid #2a2a40">'
    + '<div onclick="yoyakuRsvCalNav(-1)" style="cursor:pointer;padding:2px 10px;font-size:18px;color:#88aaff;line-height:1">‹</div>'
    + '<div style="font-size:13px;font-weight:600;color:#ccc">' + year + '年' + month + '月</div>'
    + '<div onclick="yoyakuRsvCalNav(1)" style="cursor:pointer;padding:2px 10px;font-size:18px;color:#88aaff;line-height:1">›</div>'
    + '</div>';
  h += '<div style="display:grid;grid-template-columns:repeat(7,1fr);padding:6px 6px 2px">';
  ['日','月','火','水','木','金','土'].forEach(function(d, i) {
    h += '<div style="text-align:center;font-size:10px;font-weight:600;color:' + (i===0?'#ff7766':i===6?'#7799ff':'#445') + '">' + d + '</div>';
  });
  h += '</div>';
  h += '<div style="display:grid;grid-template-columns:repeat(7,1fr);padding:2px 6px 8px;gap:2px">';
  for (var i = 0; i < firstDow; i++) h += '<div></div>';
  for (var d = 1; d <= daysInMonth; d++) {
    var ds = year + '-' + String(month).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var dow = new Date(year, month - 1, d).getDay();
    var isSel = ds === yoyakuRsvDate, isToday = ds === today;
    h += '<div onclick="yoyakuRsvSelectDate(\'' + ds + '\')" style="text-align:center;padding:5px 2px;border-radius:5px;cursor:pointer;font-size:12px;'
      + (isSel ? 'background:#2255bb;color:#fff;font-weight:700'
               : isToday ? 'background:#1a2a4a;color:#88aaff;font-weight:700'
               : dow===0 ? 'color:#ff8877' : dow===6 ? 'color:#8899ff' : 'color:#aaa')
      + '">' + d + '</div>';
  }
  h += '</div></div>';
  return h;
}

function renderRsvTimeSel() {
  var times = ['20:00','20:30','21:00','21:30','22:00','22:30','23:00','23:30','00:00'];
  var h = '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">';
  times.forEach(function(t) {
    var sel = t === yoyakuRsvTime;
    h += '<div onclick="yoyakuRsvSelectTime(\'' + t + '\')" style="padding:7px 11px;border-radius:6px;font-size:13px;cursor:pointer;min-width:60px;text-align:center;'
      + (sel ? 'background:#2255bb;color:#fff;border:1px solid #4488cc;font-weight:700'
             : 'background:#1a1a2e;color:#667;border:1px solid #2a2a40')
      + '">' + t + '</div>';
  });
  h += '</div>';
  return h;
}

function yoyakuGridClick(tableIdx, e, SH, HW) {
  var row = e.currentTarget;
  var rect = row.getBoundingClientRect();
  var clickX = e.clientX - rect.left;
  var minutesFromStart = (clickX / HW) * 60;
  var startMins = SH * 60 + Math.floor(minutesFromStart / 15) * 15; // 15分単位に丸める
  var hour = Math.floor(startMins / 60);
  var min = startMins % 60;
  var timeStr = String(hour).padStart(2,'0') + ':' + String(min).padStart(2,'0');
  var t = YOYAKU_TABLES[tableIdx];
  if (!t) return;
  yoyakuGridPreset = { table: t.f + ' ' + t.n, time: timeStr };
  yoyakuRsvTime = timeStr;
  yoyakuRsvTable = t.f + ' ' + t.n;
  yoyakuSelectedCust = null;
  yoyakuSubTab = 'add';
  renderYoyaku();
}

function yoyakuSearch(q) {
  q = (q||'').trim();
  var res = document.getElementById('ycust-results');
  if (!res) return;
  if (q.length < 1) { res.innerHTML = ''; return; }
  res.innerHTML = '<div style="font-size:11px;color:#445;padding:4px 0">検索中...</div>';
  fetch(GAS_URL + '?action=portal&tab=yoyakuCustomers&userId=' + encodeURIComponent(userId) + '&q=' + encodeURIComponent(q))
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (!d.ok || !d.customers || !d.customers.length) { res.innerHTML = '<div style="font-size:11px;color:#334;padding:4px 0">見つかりませんでした</div>'; return; }
      yoyakuCustResults = d.customers;
      res.innerHTML = d.customers.map(function(c, i) {
        var badges = '';
        if (c.bottle) badges += '<span class="ycm ycm-bottle">🍶ボトルあり</span>';
        if (c.bday && String(c.bday).trim()) badges += '<span class="ycm ycm-bday">🎂'+esc(c.bday)+'</span>';
        if (c.note) badges += '<span class="ycm ycm-note">📝メモあり</span>';
        return '<div class="ycust-row" data-cidx="'+i+'" onclick="yoyakuSelectCust('+i+')">'
          + '<div><div class="ycust-name">'+esc(c.card||c.name||'')+'様</div>'
          + '<div class="ycust-sub">'+(c.no?'会員'+c.no:'')+' '+(c.tantou?'担当:'+c.tantou:'')+'</div>'
          + (badges?'<div class="ycust-badges">'+badges+'</div>':'')+'</div></div>';
      }).join('');
    }).catch(function(){ res.innerHTML = '<div style="font-size:11px;color:#445">通信エラー</div>'; });
}

function yoyakuSelectCust(i) {
  yoyakuSelectedCust = yoyakuCustResults[i];
  yoyakuSubTab = 'add';
  renderYoyaku();
}


function yoyakuClearCust() {
  yoyakuSelectedCust = null;
  yoyakuCustMode = '';
  renderYoyaku();
}

function yoyakuOpenEdit(rowIdx) {
  var rsv = yoyakuRsvs.find(function(r) { return r.rowIdx === rowIdx; });
  if (!rsv) return;
  yoyakuEditRsv = rsv;
  yoyakuSelectedCust = null;
  yoyakuCustMode = '';
  yoyakuRsvDate = rsv.date;
  yoyakuRsvCalMonth = rsv.date.slice(0, 7);
  yoyakuRsvTime = rsv.time || '20:00';
  yoyakuRsvCustManual = rsv.customer || '';
  yoyakuRsvYoubou = rsv.youbou || '';
  yoyakuRsvPax = rsv.pax || 3;
  yoyakuRsvTable = rsv.table || '未定';
  yoyakuSubTab = 'add';
  renderYoyaku();
}

function yoyakuCancelEdit() {
  yoyakuEditRsv = null;
  yoyakuRsvDate = '';
  yoyakuRsvCalMonth = '';
  yoyakuRsvTime = '';
  yoyakuRsvCustManual = '';
  yoyakuRsvYoubou = '';
  yoyakuRsvPax = 0;
  yoyakuRsvTable = '';
  yoyakuSubTab = 'list';
  renderYoyaku();
}

function yoyakuSubmitRsv() {
  var stat = document.getElementById('yrsv-status');
  var manualEl = document.getElementById('yrsv-cust-manual');
  var custName = yoyakuSelectedCust
    ? (yoyakuSelectedCust.card || yoyakuSelectedCust.name || '')
    : (manualEl ? manualEl.value.trim() : '');
  if (!custName) {
    if (stat) stat.textContent = '⚠️ お客様を選択または名前を入力してください';
    return;
  }
  var paxEl = document.getElementById('yrsv-pax');
  var payload = {
    action: yoyakuEditRsv ? 'updateReservation' : 'addReservation',
    userId: userId,
    date: yoyakuRsvDate,
    time: yoyakuRsvTime,
    customer: custName,
    memberId: yoyakuSelectedCust ? (yoyakuSelectedCust.no || '') : (yoyakuEditRsv ? (yoyakuEditRsv.memberId || '') : ''),
    pax: parseInt(paxEl ? paxEl.value : '1') || 1,
    table: document.getElementById('yrsv-table').value,
    tantouCast: yoyakuSelectedCust ? (yoyakuSelectedCust.tantou || '') : (yoyakuEditRsv ? (yoyakuEditRsv.tantouCast || '') : ''),
    youbou: document.getElementById('yrsv-youbou').value,
    rowIdx: yoyakuEditRsv ? yoyakuEditRsv.rowIdx : undefined
  };
  if (stat) stat.textContent = '送信中...';
  fetch(GAS_URL, { method:'POST', body: JSON.stringify(payload) })
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (!d.ok) { if (stat) stat.textContent = '⚠️ ' + (d.error||'エラー'); return; }
      yoyakuSelectedCust = null;
      yoyakuCustMode = '';
      yoyakuRsvDate = ''; yoyakuRsvCalMonth = ''; yoyakuRsvTime = '';
      yoyakuRsvCustManual = ''; yoyakuRsvYoubou = ''; yoyakuRsvPax = 0; yoyakuRsvTable = '';
      yoyakuEditRsv = null;
      yoyakuSubTab = 'list';
      loadYoyaku();
    }).catch(function(){ if (stat) stat.textContent = '⚠️ 通信エラー'; });
}


function resetCashAction(action, label) {
  if (!confirm(label + 'を削除し、未提出の状態に戻します。よろしいですか？')) return;
  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: action, userId: userId })
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) { alert('エラー: ' + (d.error||'')); return; }
      alert(label + 'をリセットしました');
    })
    .catch(function() { alert('通信エラー'); });
}
</script>
</body>
</html>
