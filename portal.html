// ---- シフト提出 ----

function genTimes(startH, startM, endH, endM) {
  var list = [];
  for (var h = startH; h <= endH; h++) {
    for (var m = 0; m < 60; m += 30) {
      if (h === endH && m > endM) break;
      if (h === startH && m < startM) continue;
      list.push(h + ':' + (m === 0 ? '00' : '30'));
    }
  }
  return list;
}

function renderShiftCal() {
  var now = new Date();
  if (!viewYear) { viewYear = now.getFullYear(); viewMonth = now.getMonth(); }
  setContent(calHtml() + '<div class="shift-spacer"></div>');
  document.getElementById('submit-bar').style.display = 'block';
  updateSubmitBar();
}

function calHtml() {
  var today = new Date(); today.setHours(0,0,0,0);
  var firstWday = new Date(viewYear, viewMonth, 1).getDay();
  var daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  var WDAYS = ['日','月','火','水','木','金','土'];

  var h = '<div class="shift-month-nav">'
    + '<button class="nav-btn" onclick="shiftViewMonth(-1)">‹</button>'
    + '<div class="shift-month-label">' + viewYear + '年' + (viewMonth+1) + '月</div>'
    + '<button class="nav-btn" onclick="shiftViewMonth(1)">›</button>'
    + '</div>';
  h += '<div class="weekdays">'
    + WDAYS.map(function(d,i) {
        return '<div class="weekday'+(i===0?' sun':i===6?' sat':'')+'">'+d+'</div>';
      }).join('')
    + '</div><div class="days">';

  for (var i=0; i<firstWday; i++) h += '<div class="day empty"></div>';

  for (var d=1; d<=daysInMonth; d++) {
    var dt = new Date(viewYear, viewMonth, d); dt.setHours(0,0,0,0);
    var wday = dt.getDay();
    var key = (viewMonth+1)+'/'+d;
    var past = dt < today;
    var isToday = dt.getTime() === today.getTime();
    var sel = shiftSelections[key];
    var existShift = portalData && portalData.shifts && portalData.shifts[key];
    var isPending = pendingShifts[key];
    var isKyukin = sel === '欠勤' || (!sel && existShift === '休み') || (!sel && !existShift && isPending === '欠勤');
    var role = portalData && portalData.staffRole;
    var isKurofukuRole = role === '黒服社員' || role === '黒服バイト';
    // 黒服はシフト表/承諾済みに載っている(=existShift)時点で確定＝ピッカーの「欠勤申請」表示条件と一致させる。
    // 承認待ち(申請中)は existShift ではなく pendingShifts 側に入るので、両者は綺麗に分離される。
    // （旧: confirmedShifts[SHIFT_CONFIRMED_] は「シフト確定通知」を押した日のみ＝押し忘れると確定日も申請中表示になっていた）
    var isConfirmed = (isKurofukuRole && existShift && !isKyukin)
      || (portalData && portalData.confirmedShifts && portalData.confirmedShifts.indexOf(key) !== -1);
    // 黒服のみ「申請中(未確定)」と「確定済み」を区別する。それ以外の役職は従来通りscheduled扱い
    var notYetConfirmed = isKurofukuRole && existShift && !isKyukin && !isConfirmed;
    var dkey = viewYear+'-'+('0'+(viewMonth+1)).slice(-2)+'-'+('0'+d).slice(-2);
    var closedLabel = portalData && portalData.closedDays && portalData.closedDays[dkey];
    var isClosed = !!closedLabel;
    var cls = 'day';
    if (wday===0) cls += ' sun';
    if (wday===6) cls += ' sat';
    if (past) cls += ' past';
    if (isToday) cls += ' today';
    if (isClosed) cls += ' holiday';
    if (isKyukin) cls += ' kyukin';
    else if (sel) cls += ' selected';
    else if (isPending || notYetConfirmed) cls += ' pending-shift';
    else if (existShift) cls += ' scheduled';
    var displayTime = sel || isPending || existShift || '';
    var timeLabel = '';
    if (!isKyukin && displayTime && displayTime !== '休み') {
      var tm = displayTime.match(/^(\d+):(\d+)/);
      if (tm) timeLabel = tm[1] + ':' + tm[2] + '~';
      else if (displayTime === '予約出勤') timeLabel = '予約';
    }
    var statusLabel = '';
    if (isKurofukuRole && existShift && !isKyukin && !sel) {
      statusLabel = isConfirmed ? '確定' : '申請中';
    } else if (isPending && !existShift && !sel && !isKyukin) {
      statusLabel = '申請中'; // 黒服バイトの承認待ち（シフト表未反映）
    }
    var clickAttr = isClosed ? '' : ' onclick="openPicker(\''+key+'\')"';
    var titleAttr = isClosed ? ' title="'+String(closedLabel).replace(/"/g,'')+'"' : '';
    h += '<div class="'+cls+'" data-key="'+key+'"'+clickAttr+titleAttr+'>'
      + '<div class="num">'+d+'</div>'
      + (isClosed ? '<div class="holiday-label">🏖休</div>'
          : (timeLabel ? '<div class="shift-time">'+timeLabel+'</div>' : ''))
      + (!isClosed && isKyukin ? '<div class="kyukin-label">欠勤</div>' : '')
      + (!isClosed && statusLabel ? '<div class="shift-status-label">'+statusLabel+'</div>' : '')
      + '</div>';
  }
  h += '</div>';
  return h;
}

function shiftViewMonth(dir) {
  viewMonth += dir;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderShiftCal();
}

var pickerKey = '', pickerStart = '';

function openPicker(key) {
  pickerKey = key;
  pickerStart = '';
  showStartPicker();
  document.getElementById('picker-overlay').classList.add('show');
}

function makePickerStep(text) {
  var d = document.createElement('div');
  d.className = 'picker-step';
  d.style.gridColumn = 'span 2';
  d.textContent = text;
  return d;
}

function makeTimeRow(sr, er, role) {
  // sr=[startH,startM,maxStartH,maxStartM] er=[minEndH,minEndM,endH,endM]
  var row = document.createElement('div');
  row.style.cssText = 'grid-column:span 2;display:flex;gap:6px;align-items:center';
  var selStyle = 'flex:1;padding:9px 4px;background:#1a2a3a;color:#e8f0ff;border:1px solid #6a8ab0;border-radius:8px;font-size:13px';

  var startSel = document.createElement('select');
  startSel.style.cssText = selStyle;
  genTimes(sr[0], sr[1], sr[2], sr[3]).forEach(function(t) {
    var opt = document.createElement('option'); opt.value = t; opt.textContent = t;
    startSel.appendChild(opt);
  });

  var sep = document.createElement('span');
  sep.textContent = '～'; sep.style.cssText = 'color:#8aabcc;flex-shrink:0';

  var endSel = document.createElement('select');
  endSel.style.cssText = selStyle;
  var allEndTimes = genTimes(er[0], er[1], er[2], er[3]);

  function updateEnds() {
    endSel.innerHTML = '';
    var sp = startSel.value.split(':');
    var startMins = parseInt(sp[0]) * 60 + parseInt(sp[1]);
    allEndTimes.forEach(function(t) {
      var ep = t.split(':');
      if (parseInt(ep[0]) * 60 + parseInt(ep[1]) <= startMins) return;
      var opt = document.createElement('option'); opt.value = t; opt.textContent = t;
      endSel.appendChild(opt);
    });
  }
  updateEnds();
  startSel.onchange = updateEnds;

  var r = role;
  var submitBtn = document.createElement('button');
  submitBtn.textContent = '提出';
  submitBtn.style.cssText = 'padding:9px 12px;background:#1a5c2a;color:#e8f0ff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;flex-shrink:0';
  submitBtn.onclick = function() { pickTime(pickerKey, startSel.value + '～' + endSel.value, r); };

  row.appendChild(startSel); row.appendChild(sep); row.appendChild(endSel); row.appendChild(submitBtn);
  return row;
}

function showStartPicker() {
  document.getElementById('picker-title').textContent = pickerKey + ' のシフト';
  var g = document.getElementById('picker-grid');
  g.innerHTML = '';

  // 欠勤申請（既登録日のみ）
  var hasShift = portalData && portalData.shifts && portalData.shifts[pickerKey];
  if (hasShift) {
    var kyukinBtn = document.createElement('button');
    kyukinBtn.className = 'time-opt' + (shiftSelections[pickerKey] === '欠勤' ? ' chosen' : '');
    kyukinBtn.style.cssText = 'background:#2a1515;border-color:#bb4444;color:#ff8888;grid-column:span 2';
    kyukinBtn.textContent = '欠勤申請';
    kyukinBtn.onclick = function() { pickTime(pickerKey, '欠勤', 'キャスト'); };
    g.appendChild(kyukinBtn);
  }

  if (staffRole === 'キャスト') {
    var castTopRow = document.createElement('div');
    castTopRow.style.cssText = 'grid-column:span 2;display:flex;gap:8px';

    var castFullBtn = document.createElement('button');
    castFullBtn.className = 'time-opt full';
    castFullBtn.style.flex = '2';
    castFullBtn.textContent = 'キャストフル　20:00 ～ 24:00';
    castFullBtn.onclick = function() { pickTime(pickerKey, '20:00～24:00', 'キャスト'); };

    var yoyakuBtn = document.createElement('button');
    yoyakuBtn.className = 'time-opt';
    yoyakuBtn.style.cssText = 'flex:1;background:#1a2035;border-color:#886633;color:#ffcc66;font-weight:600;font-size:13px';
    yoyakuBtn.textContent = '予約出勤';
    yoyakuBtn.onclick = function() { pickTime(pickerKey, '予約出勤', 'キャスト'); };

    castTopRow.appendChild(castFullBtn);
    castTopRow.appendChild(yoyakuBtn);
    g.appendChild(castTopRow);
    g.appendChild(makePickerStep('時間指定の場合'));
    g.appendChild(makeTimeRow([20,0,23,30], [20,30,24,0], 'キャスト'));

  } else if (staffRole === '黒服社員') {
    var kuroEmpBtn = document.createElement('button');
    kuroEmpBtn.className = 'time-opt full';
    kuroEmpBtn.style.background = '#0f201a';
    kuroEmpBtn.style.borderColor = '#448844';
    kuroEmpBtn.style.color = '#88cc88';
    kuroEmpBtn.textContent = '黒服フル　18:00 ～ 翌2:00';
    kuroEmpBtn.onclick = function() { pickTime(pickerKey, '18:00～26:00', '黒服社員'); };
    g.appendChild(kuroEmpBtn);

  } else { // 黒服バイト
    var kuroPartBtn = document.createElement('button');
    kuroPartBtn.className = 'time-opt full';
    kuroPartBtn.style.background = '#0f201a';
    kuroPartBtn.style.borderColor = '#448844';
    kuroPartBtn.style.color = '#88cc88';
    kuroPartBtn.textContent = '黒服フル　18:00 ～ 翌2:00';
    kuroPartBtn.onclick = function() { pickTime(pickerKey, '18:00～26:00', '黒服バイト'); };
    g.appendChild(kuroPartBtn);
    g.appendChild(makePickerStep('時間指定の場合'));
    g.appendChild(makeTimeRow([18,0,25,30], [18,30,26,0], '黒服バイト'));
  }

  addClearBtn(g);
}

function addClearBtn(g) {
  if (!shiftSelections[pickerKey]) return;
  var off = document.createElement('button');
  off.className = 'time-opt off';
  off.style.gridColumn = 'span 2';
  off.textContent = 'クリア';
  off.onclick = function() { pickTime(pickerKey, null); };
  g.appendChild(off);
}

function selectStart(t) {
  pickerStart = t;
  document.getElementById('picker-title').textContent = t + '〜 終了時間を選択';
  var g = document.getElementById('picker-grid');
  g.innerHTML = '<div class="picker-step">' + pickerKey + ' | スタート: ' + t + '</div>';

  // 戻るボタン
  var back = document.createElement('button');
  back.className = 'picker-back';
  back.textContent = '← スタートを変更';
  back.onclick = showStartPicker;
  g.appendChild(back);

  // 終了時間 (スタートの30分後〜26:00)
  var sh = parseInt(t.split(':')[0]);
  var sm = parseInt(t.split(':')[1]);
  var startMins = sh * 60 + sm;
  genTimes(18, 30, 26, 0).forEach(function(e) {
    var eh = parseInt(e.split(':')[0]);
    var em = parseInt(e.split(':')[1]);
    if (eh * 60 + em <= startMins) return;
    var btn = document.createElement('button');
    btn.className = 'time-opt';
    btn.textContent = e;
    btn.onclick = function() { pickTime(pickerKey, t + '～' + e); };
    g.appendChild(btn);
  });
}

function pickTime(key, t, role) {
  if (t) {
    shiftSelections[key] = t;
    shiftRoles[key] = role || 'キャスト';
  } else {
    delete shiftSelections[key];
    delete shiftRoles[key];
  }
  closePicker();
  renderShiftCal();
}

function closePicker() {
  document.getElementById('picker-overlay').classList.remove('show');
}

function updateSubmitBar() {
  var count = Object.keys(shiftSelections).length;
  document.getElementById('shift-count').textContent = count > 0 ? count + '日分選択中' : '';
  document.getElementById('submit-btn').disabled = count === 0;
}

function doSubmit() {
  var btn = document.getElementById('submit-btn');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.textContent = '提出中...';

  var shifts = [];
  var sortedKeys = Object.keys(shiftSelections).sort(function(a, b) {
    var ap = a.split('/'), bp = b.split('/');
    var am = parseInt(ap[0]), ad = parseInt(ap[1]);
    var bm = parseInt(bp[0]), bd = parseInt(bp[1]);
    return am !== bm ? am - bm : ad - bd;
  });
  var submittedTimes = {};
  sortedKeys.forEach(function(k) {
    submittedTimes[k] = shiftSelections[k];
    shifts.push({ date: k, time: shiftSelections[k], role: shiftRoles[k] || 'キャスト' });
  });

  gasFetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'submitShift', userId: userId, targetName: (portalData && (portalData.viewAs || portalData.name)) || '', shifts: shifts })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.ok) {
      btn.textContent = '✓ 提出しました';
      btn.style.background = '#1a4422';
      var autoSet = {};
      (d.autoApproved || []).forEach(function(date) { autoSet[date] = true; });
      Object.keys(submittedTimes).forEach(function(k) {
        var t = submittedTimes[k];
        if (autoSet[k]) {
          if (!portalData) portalData = {};
          if (!portalData.shifts) portalData.shifts = {};
          portalData.shifts[k] = (t === '欠勤') ? '休み' : t;
        } else {
          pendingShifts[k] = t;
        }
      });
      shiftSelections = {}; shiftRoles = {};
      renderShiftCal();
      setTimeout(function() {
        btn.textContent = 'シフトを提出する';
        btn.style.background = '';
        btn.disabled = true;
      }, 2000);
    } else {
      alert('エラー: ' + (d.error || '不明'));
      btn.disabled = false;
      btn.textContent = 'シフトを提出する';
    }
  })
  .catch(function(e) {
    alert('通信エラー: ' + (e && e.message || ''));
    btn.disabled = false;
    btn.textContent = 'シフトを提出する';
  });
}

// ---- 申請管理 ----
var reqFilter = 'pending';

function loadRequests() {
  setContent('<div class="loading">申請を読み込み中...</div>');
  var url = GAS_URL + '?action=portal&userId=' + encodeURIComponent(userId) + '&tab=requests';
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) { setContent('<div class="err">エラー: ' + esc(d.error||'') + '</div>'); return; }
      renderRequests(d.requests || []);
    })
    .catch(function(e) { setContent('<div class="err">通信エラー</div>'); });
}

function renderRequests(list) {
  var filters = [
    { key: 'pending', label: '未処理' },
    { key: 'all',     label: 'すべて（履歴）' },
  ];
  var filterHtml = '<select id="shift-confirm-week" class="notif-group-sel" style="margin-bottom:8px">'
    + buildWeekOptionsHtml_() + '</select>'
    + '<button class="req-confirm-btn" id="shift-confirm-btn" onclick="confirmKurofukuShift(event)">'
    + '📅 シフト確定→黒服に通知</button>'
    + '<div class="req-filter">'
    + filters.map(function(f) {
        return '<button class="req-filter-btn' + (reqFilter === f.key ? ' active' : '')
          + '" onclick="setReqFilter(\'' + f.key + '\')">' + f.label + '</button>';
      }).join('')
    + '</div>';

  if (reqFilter !== 'all') {
    // 未処理（承認待ち）＝アクションキュー。承諾/休みを即決する
    var pend = list.filter(function(r) { return r.status === 'pending'; });
    if (pend.length === 0) {
      setContent(filterHtml + '<div class="req-empty">未処理の申請はありません</div>');
      return;
    }
    var ph = filterHtml;
    pend.forEach(function(r) { ph += reqCardHtml_(r, false); });
    setContent(ph);
    return;
  }

  // すべて（履歴）＝黒服の出勤希望を日付ごとにまとめて表示。
  // 一旦確定したあとの欠員・シフト変更時に「元々出勤希望を出していた子」を確認して再調整するため。
  if (list.length === 0) {
    setContent(filterHtml + '<div class="req-empty">申請履歴はありません</div>');
    return;
  }
  var groups = {}, order = [];
  list.forEach(function(r) {
    var p = mdParse_(r.date);
    var gkey = p ? p.key : 99999999;
    if (!groups[gkey]) { groups[gkey] = { label: (p ? p.label : r.date), items: [] }; order.push(gkey); }
    groups[gkey].items.push(r);
  });
  order.sort(function(a, b) { return a - b; });
  var hh = filterHtml
    + '<div style="font-size:12px;color:#7a9cc8;margin:2px 0 6px;line-height:1.6">'
    + '黒服の出勤希望を日付ごとに表示。確定後の欠員・変更時に「元々出したい子」を確認して調整できます。</div>';
  order.forEach(function(gkey) {
    var g = groups[gkey];
    hh += '<div class="reqhist-date">📅 ' + esc(g.label) + '</div>';
    g.items.forEach(function(r) { hh += reqCardHtml_(r, true); });
  });
  setContent(hh);
}

// "M/d" を並べ替え用キー＋曜日付きラベルに変換（年は現在基準で推定、半年以上前の月は翌年扱い＝年跨ぎ対応）
function mdParse_(md) {
  var m = String(md).match(/^(\d{1,2})\/(\d{1,2})/);
  if (!m) return null;
  var mo = parseInt(m[1], 10), da = parseInt(m[2], 10);
  var now = new Date();
  var yr = now.getFullYear();
  if (mo < (now.getMonth() + 1) - 6) yr += 1;
  var dt = new Date(yr, mo - 1, da);
  var wd = ['日','月','火','水','木','金','土'][dt.getDay()];
  return { key: yr * 10000 + mo * 100 + da, label: mo + '/' + da + '（' + wd + '）' };
}

function reqStatusInfo_(s) {
  if (s === '承諾') return { cls: 'ok',  txt: '✓ 承諾済み（出勤）' };
  if (s === '休み' || s === '却下') return { cls: 'off', txt: '✗ 休み決定' };
  if (s === 'クリア') return { cls: 'off', txt: '— クリア済み' };
  return { cls: '', txt: '⏳ 未処理' };
}

  return h + '</div>';

// 履歴からの再調整（確定後のシフト変更）。誤操作防止で確認を挟んでから承諾/休みを反映
function readjustReq(ev, rowIdx, name, date, time, decision) {
  var label = decision === '承諾' ? '出勤（承諾）' : '休み';
  if (!confirm(name + 'さんの ' + date + ' を「' + label + '」に変更します。よろしいですか？')) return;
  processReq(ev, rowIdx, name, date, time, decision);
}

function pad2_(n) { return n < 10 ? '0' + n : '' + n; }

// 今週を含む直近6週分の「月曜始まり」週リストをoptionタグとして返す
function buildWeekOptionsHtml_() {
  var today = new Date();
  var dow = today.getDay(); // 0=日...6=土
  var diffToMon = (dow === 0) ? -6 : (1 - dow);
  var monday = new Date(today);
  monday.setDate(today.getDate() + diffToMon);
  monday.setHours(0, 0, 0, 0);

  var opts = '';
  for (var i = 0; i < 6; i++) {
    var start = new Date(monday);
    start.setDate(monday.getDate() + i * 7);
    var end = new Date(start);
    end.setDate(start.getDate() + 6);
    var val = start.getFullYear() + '-' + pad2_(start.getMonth() + 1) + '-' + pad2_(start.getDate());
    var label = (start.getMonth() + 1) + '/' + start.getDate() + '〜' + (end.getMonth() + 1) + '/' + end.getDate() + '週';
    opts += '<option value="' + val + '">' + label + '</option>';
  }
  return opts;
}

// ---- 席リクエスト（NG／着席希望、本日限りで黒服LINEに即時通知） ----
var seatReqType = 'NG';
var seatReqMode = 'rsv';   // 'rsv' = 本日の予約から選ぶ / 'store' = 店全体へのリクエスト
var seatReqRsvs = null;    // 本日の予約一覧（タブを開くたびに再取得）
var seatReqSelected = [];  // 選択中の予約 rowIdx 配列

function renderSeatRequest() {
  if (seatReqRsvs === null) {
    setContent('<div class="loading">本日の予約を読み込み中...</div>');
    gasFetch(GAS_URL + '?action=portal&tab=yoyaku&userId=' + encodeURIComponent(userId) + '&date=' + yoyakuDateStr(yoyakuDate))
      .then(function(r) { return r.json(); })
      .then(function(d) {
        seatReqRsvs = (d.ok && d.reservations) ? d.reservations.filter(function(r) { return r.status !== 'キャンセル'; }) : [];
        renderSeatRequest();
      })
      .catch(function() { seatReqRsvs = []; renderSeatRequest(); });
    return;
  }

  var html = '<div style="font-size:13px;color:#8aabcc;margin-bottom:14px">本日限りのリクエストです。送信すると黒服LINEグループに即時通知されます。</div>';

  html += '<div class="req-filter">'
    + '<button class="req-filter-btn' + (seatReqType === 'NG' ? ' active' : '') + '" onclick="setSeatReqType(\'NG\')">🚫 NG</button>'
    + '<button class="req-filter-btn' + (seatReqType === '希望' ? ' active' : '') + '" onclick="setSeatReqType(\'希望\')">🙋 着席希望</button>'
    + '<button class="req-filter-btn' + (seatReqType === 'キャスト希望' ? ' active' : '') + '" onclick="setSeatReqType(\'キャスト希望\')">✋ キャスト希望</button>'
    + '</div>';

  if (seatReqType === 'キャスト希望') {
    html += '<div style="font-size:12px;color:#7a9cc8;margin:8px 0">この子（自分）を担当につけてほしい予約を選んでください</div>';
  } else {
    html += '<div class="req-filter" style="margin-top:8px">'
      + '<button class="req-filter-btn' + (seatReqMode === 'rsv' ? ' active' : '') + '" onclick="setSeatReqMode(\'rsv\')">予約から選ぶ</button>'
      + '<button class="req-filter-btn' + (seatReqMode === 'store' ? ' active' : '') + '" onclick="setSeatReqMode(\'store\')">店全体へ</button>'
      + '</div>';
  }

  if (seatReqMode === 'rsv' || seatReqType === 'キャスト希望') {
    html += '<div style="font-size:12px;color:#7a9cc8;margin:14px 0 6px">対象の予約を選択（複数可）</div>';
    if (seatReqRsvs.length === 0) {
      html += '<div style="text-align:center;color:#6a8ab0;padding:20px 0;font-size:13px">本日の予約はありません</div>';
    } else {
      var sorted = seatReqRsvs.slice().sort(function(a, b) { return (a.time || '').localeCompare(b.time || ''); });
      html += sorted.map(function(r) {
        var sel = seatReqSelected.indexOf(r.rowIdx) >= 0;
        return '<div class="seatreq-rsv-card' + (sel ? ' sel' : '') + '" onclick="toggleSeatReqRsv(' + r.rowIdx + ')">'
          + '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px">'
          + '<span style="font-weight:700;color:#d0e4f8">' + esc(r.time) + '　' + esc(r.customer) + '様</span>'
          + '<span style="font-size:16px;flex-shrink:0">' + (sel ? '✅' : '⬜') + '</span>'
          + '</div>'
          + '<div style="font-size:12px;color:#8aabcc;margin-top:4px">' + esc(r.table || '未定') + '　' + r.pax + '名</div>'
          + '</div>';
      }).join('');
    }
  }

  html += '<div style="font-size:12px;color:#7a9cc8;margin:16px 0 6px">コメント（任意）</div>'
    + '<textarea id="seatreq-comment" class="notif-msg-area" style="min-height:50px;width:100%;box-sizing:border-box" placeholder="例：今日は体調が悪いので…"></textarea>';

  html += '<button class="req-confirm-btn" style="margin-top:16px" onclick="submitSeatRequest()">📣 黒服に送信</button>';

  setContent(html);
}

function setSeatReqMode(m) { seatReqMode = m; renderSeatRequest(); }

function toggleSeatReqRsv(rowIdx) {
  var idx = seatReqSelected.indexOf(rowIdx);
  if (idx >= 0) seatReqSelected.splice(idx, 1);
  else seatReqSelected.push(rowIdx);
  renderSeatRequest();
}

function setSeatReqType(t) {
  seatReqType = t;
  if (t === 'キャスト希望') seatReqMode = 'rsv';
  renderSeatRequest();
}

function submitSeatRequest() {
  var commentEl = document.getElementById('seatreq-comment');
  var comment = commentEl ? commentEl.value.trim() : '';
  var typeLabel = seatReqType === 'NG' ? '🚫 NG' : seatReqType === 'キャスト希望' ? '✋ キャスト希望' : '🙋 着席希望';
  var storeWide = seatReqType !== 'キャスト希望' && seatReqMode === 'store';
  var targets = [];
  var confirmLines = [];

  if (!storeWide) {
    if (seatReqSelected.length === 0) { alert('対象の予約を選択するか、「店全体へ」を選んでください'); return; }
    var picked = seatReqRsvs.filter(function(r) { return seatReqSelected.indexOf(r.rowIdx) >= 0; });
    targets = picked.map(function(r) { return { rowIdx: r.rowIdx, time: r.time, customer: r.customer, table: r.table || '未定' }; });
    confirmLines = picked.map(function(r) { return r.time + ' ' + r.customer + '様（' + (r.table || '未定') + '）'; });
  }

  var confirmMsg = storeWide
    ? (typeLabel + '：店全体へのリクエストを黒服に送信します。よろしいですか？')
    : (typeLabel + '：\n' + confirmLines.join('\n') + '\nを黒服に送信します。よろしいですか？');
  if (!confirm(confirmMsg)) return;

  gasFetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'sendCastSeatRequest', userId: userId, type: seatReqType, targets: targets, storeWide: storeWide, comment: comment })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.ok) {
      alert('送信しました');
      seatReqSelected = [];
      renderSeatRequest();
    } else {
      alert('エラー: ' + (d.error || '不明'));
    }
  })
  .catch(function() { alert('通信エラー'); });
}

function processReq(ev, rowIdx, name, date, time, decision) {
  var card = ev && ev.target ? ev.target.closest('.req-card') : null;
  if (card) { card.style.opacity = '0.5'; card.style.pointerEvents = 'none'; }

  gasFetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'approveShift', userId: userId, rowIdx: rowIdx,
                           name: name, date: date, time: time, decision: decision })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.ok) { loadRequests(); }
    else {
      if (card) { card.style.opacity = ''; card.style.pointerEvents = ''; }
      alert('エラー: ' + (d.error || '不明'));
    }
  })
  .catch(function() {
    if (card) { card.style.opacity = ''; card.style.pointerEvents = ''; }
    alert('通信エラー');
  });
}

// 誕生日の月/日セレクトを生成。cur='M/d'（例 8/15）を初期選択
function bdayMonthDaySelects(cur) {
  var mo = '', da = '';
  var p = String(cur || '').split(/[^\d]+/).filter(Boolean);
  if (p.length >= 2) { mo = String(+p[0] || ''); da = String(+p[1] || ''); }
  var selSt = 'padding:11px;background:#0d1626;border:1px solid #24365a;border-radius:9px;color:#e8f0ff;font-size:15px';
  function opts(n, sel) {
    var o = '<option value="">—</option>';
    for (var i = 1; i <= n; i++) o += '<option value="' + i + '"' + (String(i) === sel ? ' selected' : '') + '>' + i + '</option>';
    return o;
  }
  return '<select id="bday-mo" style="' + selSt + '">' + opts(12, mo) + '</select>'
    + '<span style="color:#8aabcc;font-size:14px">月</span>'
    + '<select id="bday-da" style="' + selSt + '">' + opts(31, da) + '</select>'
    + '<span style="color:#8aabcc;font-size:14px">日</span>';
}

function saveBirthdayMd() {

  var md = (mo && da) ? (mo + '/' + da) : ''; // 両方空＝誕生日を消去
  gasFetch(GAS_URL, { method:'POST', body: JSON.stringify({ action:'castSetBirthday', userId: userId, targetName: bdayTargetName(), mmdd: md }) })
    .then(function(r){ return r.json(); })
    .then(function(d){ if (!d.ok) { alert(d.error || '保存に失敗しました'); return; } alert('誕生日を保存しました'); loadBirthday(); })
    .catch(function(){ alert('通信エラーが発生しました'); });
}

// 開始日→終了日を自動計算（2週間＝開始+13日）。表示用。実際の確定はサーバー側。
function bwSyncEnd() {
  var el = document.getElementById('bw-start'), out = document.getElementById('bw-end');
  if (!el || !out) return;
  var s = (el.value || '').trim();
  if (!/^\d{4}-\d{2}-\d{2}$/.test(s)) { out.value = ''; return; }
  var d = new Date(s + 'T00:00:00'); d.setDate(d.getDate() + 13);
  out.value = d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);
}

function applyBirthdayWeek() {
  bwSyncEnd();
  var s = (document.getElementById('bw-start').value || '').trim();
  if (!s) { alert('開始日を選んでください'); return; }
  gasFetch(GAS_URL, { method:'POST', body: JSON.stringify({ action:'castApplyBirthdayWeek', userId: userId, targetName: bdayTargetName(), start: s }) })
    .then(function(r){ return r.json(); })

}

function setContent(html) {

function showErr(msg) {

function esc(s) {

var DAY_LABELS = ['月','火','水','木','金','土','日'];

function loadNotifSettings() {
  setContent('<div class="loading">通知設定を読み込み中...</div>');
  gasFetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'getNotifSettings', userId: userId })
  })
    .then(function(r) { return r.json(); })

function buildNotifRow(k, s) {
  var isCustom = k.startsWith('custom_');
  var days = s.days || [1,2,3,4,5,6];
  var enabled = s.enabled !== false;
  var time = s.time || '00:00';
  var msgEditable = isCustom || s.msgEditable;

  var dayBoxes = DAY_LABELS.map(function(d, i) {
    var dayNum = i + 1;
    var chk = days.indexOf(dayNum) >= 0 ? 'checked' : '';
    return '<label class="notif-day-box">'
      + '<input type="checkbox" ' + chk + ' onchange="notifDayChange(\'' + k + '\',' + dayNum + ',this.checked)">'
      + '<span>' + d + '</span></label>';
  }).join('');

  var msgVal = s.message != null ? s.message : (s.defaultMsg || '');
  var msgHtml = msgEditable
    ? '<textarea class="notif-msg-area" rows="4" placeholder="メッセージ（空欄=デフォルト）" onchange="notifMsgChange(\'' + k + '\',this.value)">' + esc(msgVal) + '</textarea>'
    : '<div class="notif-msg-auto">自動生成（編集不可）</div>';

  var staffMsgHtml = '';
  if (s.staffMsgEditable) {
    var staffMsgVal = s.staffMessage != null ? s.staffMessage : (s.defaultStaffMsg || '');
    staffMsgHtml = '<div class="notif-expand-label">スタッフへのメッセージ（同時送信）</div>'
      + '<textarea class="notif-msg-area" rows="4" placeholder="メッセージ（空欄=デフォルト）" onchange="notifStaffMsgChange(\'' + k + '\',this.value)">' + esc(staffMsgVal) + '</textarea>';
  }

  var groupSel = isCustom
    ? ('<div class="notif-expand-label">送信先</div><select class="notif-group-sel" onchange="notifGroupChange(\'' + k + '\',this.value)">'
       + ['staff','kurofuku','both'].map(function(v) {
           var lbl = v==='staff'?'スタッフ':v==='kurofuku'?'黒服':'両方';
           return '<option value="' + v + '"' + ((s.groupKey||'staff')===v?' selected':'') + '>' + lbl + '</option>';
         }).join('') + '</select>')
    : '';

  var delBtn = isCustom
    ? '<button class="notif-del-btn" onclick="deleteNotif(\'' + k + '\')">🗑 削除</button>'
    : '';

  return '<div class="notif-card" id="ncard-' + k + '" style="' + (enabled?'':'opacity:.45') + '">'
    + '<div class="notif-card-header" onclick="toggleNotifExpand(\'' + k + '\')">'
    +   '<label class="notif-toggle" onclick="event.stopPropagation()">'
    +     '<input type="checkbox" id="ntog-' + k + '" ' + (enabled?'checked':'') + ' onchange="notifToggle(\'' + k + '\')">'
    +     '<span class="notif-slider"></span></label>'
    +   '<div class="notif-mid">'
    +     '<div class="notif-label">' + esc(s.label || k) + '</div>'
    +     '<div class="notif-group-tag">' + esc(s.group || '') + '</div>'
    +   '</div>'
    +   '<input type="time" class="notif-time" id="ntime-' + k + '" value="' + esc(time) + '" '
    +     'onclick="event.stopPropagation()" onchange="notifTimeChange(\'' + k + '\')">'
    +   '<span class="notif-chevron" id="nchev-' + k + '">›</span>'
    + '</div>'
    + '<div class="notif-expand" id="nexp-' + k + '" style="display:none">'
    +   '<div class="notif-expand-label">曜日</div>'
    +   '<div class="notif-days-row">' + dayBoxes + '</div>'
    +   groupSel
    +   '<div class="notif-expand-label">メッセージ</div>'
    +   msgHtml
    +   staffMsgHtml
    +   delBtn
    + '</div>'
    + '</div>';
}

function buildAddForm() {
  var dayBoxes = DAY_LABELS.map(function(d, i) {
    return '<label class="notif-day-box"><input type="checkbox" checked id="nadd-day-' + (i+1) + '"><span>' + d + '</span></label>';
  }).join('');
  return '<div id="notif-add-area" style="display:none"><div class="notif-add-form">'
    + '<div class="notif-expand-label">通知名</div>'
    + '<input type="text" class="notif-add-input" id="nadd-label" placeholder="例: 発注確認">'
    + '<div class="notif-expand-label">時刻</div>'
    + '<input type="time" class="notif-time" id="nadd-time" value="12:00">'
    + '<div class="notif-expand-label">曜日</div>'
    + '<div class="notif-days-row">' + dayBoxes + '</div>'
    + '<div class="notif-expand-label">送信先</div>'
    + '<select class="notif-group-sel" id="nadd-group">'
    +   '<option value="staff">スタッフ</option>'
    +   '<option value="kurofuku">黒服</option>'
    +   '<option value="both">両方</option>'
    + '</select>'
    + '<div class="notif-expand-label">メッセージ</div>'
    + '<textarea class="notif-msg-area" rows="3" id="nadd-msg" placeholder="送信するメッセージ"></textarea>'
    + '<div style="display:flex;gap:8px;margin-top:12px">'
    +   '<button class="notif-save-btn" style="flex:1;margin-top:0" onclick="confirmAddNotif()">追加する</button>'
    +   '<button class="notif-save-btn" style="flex:0;width:80px;margin-top:0;background:#1e0f0f;color:#d66" onclick="cancelAddNotif()">キャンセル</button>'
    + '</div></div></div>';
}

function buildAutoRow(k, s) {
  var enabled = s.enabled !== false;
  return '<div class="notif-card auto-card" id="ncard-' + k + '" style="' + (enabled ? '' : 'opacity:.45') + '">'
    + '<div class="notif-card-header" style="cursor:default">'
    +   '<label class="notif-toggle" onclick="event.stopPropagation()">'
    +     '<input type="checkbox" id="ntog-' + k + '" ' + (enabled ? 'checked' : '') + ' onchange="notifToggle(\'' + k + '\')">'
    +     '<span class="notif-slider"></span></label>'
    +   '<div class="notif-mid">'
    +     '<div class="notif-label">' + esc(s.label || k) + '</div>'
    +     '<div class="notif-group-tag" style="font-size:10px;color:#7a9">' + esc(s.group || '') + '</div>'
    +   '</div>'
    +   '<div style="font-size:10px;color:#556;text-align:right;max-width:120px;line-height:1.4">' + esc(s.desc || '') + '</div>'
    + '</div>'
    + '</div>';
}

function renderNotif(settings) {
  var customKeys = Object.keys(settings).filter(function(k) { return k.startsWith('custom_'); });
  var scheduledRows = BUILTIN_NOTIF_KEYS.concat(customKeys).map(function(k) {
    return settings[k] ? buildNotifRow(k, settings[k]) : '';
  }).join('');
  var autoRows = BUILTIN_AUTO_KEYS.map(function(k) {
    var s = settings[k] || AUTO_DEFAULTS[k];
    if (s && !notifSettings[k]) { notifSettings[k] = s; }
    return s ? buildAutoRow(k, s) : '';
  }).join('');

  var html = '<div style="padding:14px">'
    + '<div style="font-size:13px;font-weight:700;color:#a0c0e0;margin-bottom:10px;letter-spacing:.05em">⏰ 定時通知</div>'
    + '<div class="notif-list">' + scheduledRows + '</div>'
    + buildAddForm()
    + '<button class="notif-add-btn" id="notif-add-btn" onclick="openAddNotifForm()">＋ 通知を追加</button>'
    + '<div style="font-size:13px;font-weight:700;color:#a0c0e0;margin:18px 0 10px;letter-spacing:.05em">🤖 自動応答・トリガー</div>'
    + '<div style="font-size:11px;color:#567;margin-bottom:10px">LINEメッセージの内容や時刻を条件に自動で動く機能です。OFFにすると完全に停止します。</div>'
    + '<div class="notif-list">' + autoRows + '</div>'
    + '<button class="notif-save-btn" onclick="saveNotifSettings()">保存する</button>'
    + '<div id="notif-save-msg" style="text-align:center;font-size:13px;color:#6f9;margin-top:10px;display:none">保存しました</div>'
    + '</div>';
  setContent(html);
}

function toggleNotifExpand(k) {
  var exp = document.getElementById('nexp-' + k);
  var chev = document.getElementById('nchev-' + k);
  if (!exp) return;
  var open = exp.style.display === 'none';
  exp.style.display = open ? 'block' : 'none';
  if (chev) chev.style.transform = open ? 'rotate(90deg)' : '';
}

function notifToggle(k) {
  if (!notifSettings || !notifSettings[k]) return;
  notifSettings[k].enabled = document.getElementById('ntog-' + k).checked;
  var card = document.getElementById('ncard-' + k);
  if (card) card.style.opacity = notifSettings[k].enabled ? '1' : '0.45';
}

function notifTimeChange(k) {
  if (!notifSettings || !notifSettings[k]) return;
  notifSettings[k].time = document.getElementById('ntime-' + k).value;
}

function notifDayChange(k, day, checked) {
  if (!notifSettings || !notifSettings[k]) return;
  var days = notifSettings[k].days || [];
  if (checked && days.indexOf(day) < 0) days.push(day);
  if (!checked) days = days.filter(function(d) { return d !== day; });
  notifSettings[k].days = days;
}

function notifMsgChange(k, val) {
  if (!notifSettings || !notifSettings[k]) return;
  notifSettings[k].message = val.trim() || null;
}

function notifStaffMsgChange(k, val) {
  if (!notifSettings || !notifSettings[k]) return;
  notifSettings[k].staffMessage = val.trim() || null;
}

function notifGroupChange(k, val) {
  if (!notifSettings || !notifSettings[k]) return;
  notifSettings[k].groupKey = val;
  notifSettings[k].group = val === 'staff' ? 'スタッフ' : val === 'kurofuku' ? '黒服' : '両方';
}

function openAddNotifForm() {
  var area = document.getElementById('notif-add-area');
  var btn = document.getElementById('notif-add-btn');
  if (area) area.style.display = 'block';
  if (btn) btn.style.display = 'none';
}

function cancelAddNotif() {
  var area = document.getElementById('notif-add-area');
  var btn = document.getElementById('notif-add-btn');
  if (area) area.style.display = 'none';
  if (btn) btn.style.display = 'block';
}

function confirmAddNotif() {
  var label = (document.getElementById('nadd-label').value || '').trim();
  if (!label) { alert('通知名を入力してください'); return; }
  var time = document.getElementById('nadd-time').value || '12:00';
  var group = document.getElementById('nadd-group').value || 'staff';
  var msg = (document.getElementById('nadd-msg').value || '').trim();
  var days = [1,2,3,4,5,6,7].filter(function(d) {
    var el = document.getElementById('nadd-day-' + d);
    return el && el.checked;
  });
  var key = 'custom_' + Date.now();
  notifSettings[key] = {
    label: label, time: time, enabled: true,
    group: group==='staff'?'スタッフ':group==='kurofuku'?'黒服':'両方',
    groupKey: group, days: days, message: msg || null, custom: true
  };
  renderNotif(notifSettings);
  setTimeout(function() { toggleNotifExpand(key); }, 30);
}

function deleteNotif(k) {
  var name = notifSettings[k] && notifSettings[k].label || k;
  if (!confirm('「' + name + '」を削除しますか？')) return;
  delete notifSettings[k];
  renderNotif(notifSettings);
}

function saveNotifSettings() {
  var btn = document.querySelector('.notif-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }
  gasFetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'saveNotifSettings', userId: userId, settings: notifSettings })
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (btn) { btn.disabled = false; btn.textContent = '保存する'; }
      if (!d.ok) { alert('エラー: ' + (d.error||'')); return; }
      var msg = document.getElementById('notif-save-msg');
      if (msg) { msg.style.display = 'block'; setTimeout(function(){ msg.style.display='none'; }, 2500); }
    })
    .catch(function() {
      if (btn) { btn.disabled = false; btn.textContent = '保存する'; }
      alert('通信エラー');
    });
}

function loadYoyakuCal(headerHtml) {
  if (!yoyakuCalMonth) {
    var d = new Date();
    yoyakuCalMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  }
  if (!headerHtml) {

        return '<div style="flex:1;min-width:54px;padding:8px 4px;text-align:center;font-size:11px;cursor:pointer;border-radius:7px;'
          + (t==='cal'?'background:#0f2040;color:#7ab0f0;border:1px solid #1a50a0;':'background:#141d30;color:#7a9cc8;border:1px solid #1e3050;')
          + '" onclick="yoyakuSubSwitch(\''+t+'\')">' + labels[t] + '</div>';
      }).join('') + '</div>';
    headerHtml = '' + subtabs;
  }
  setContent('<div style="padding:14px">' + yoyakuAddCta() + headerHtml + '<div class="loading">カレンダー読み込み中...</div></div>');
  gasFetch(GAS_URL + '?action=portal&tab=yoyakuMonth&userId=' + encodeURIComponent(userId) + '&month=' + yoyakuCalMonth)
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (!d.ok) { setContent('<div class="err">エラー: '+esc(d.error||'')+'</div>'); return; }
      setContent('<div style="padding:14px">' + yoyakuAddCta() + headerHtml + renderYoyakuCal(d.summary || {}) + '</div>');
    })
    .catch(function(){ setContent('<div class="err">通信エラー</div>'); });
}

function renderYoyakuCal(summary) {
  var parts = yoyakuCalMonth.split('-');
  var year = parseInt(parts[0]), month = parseInt(parts[1]);
  var firstDay = new Date(year, month-1, 1).getDay(); // 0=日
  var daysInMonth = new Date(year, month, 0).getDate();
  var today = new Date();
  var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

  var monthNav = '<div class="ycal-month-nav">'
    + '<button onclick="yoyakuCalChangeMonth(-1)">‹</button>'
    + '<div class="ycal-month-title">'+year+'年'+month+'月</div>'
    + '<button onclick="yoyakuCalChangeMonth(1)">›</button>'
    + '</div>';

  var dows = ['日','月','火','水','木','金','土'];
  var dowHdr = '<div class="ycal-grid">' + dows.map(function(d,i){
    return '<div class="ycal-dow'+(i===0?' sun':i===6?' sat':'')+'">' + d + '</div>';
  }).join('') + '</div>';

  var cells = '<div class="ycal-grid">';
  // 月初の空白
  for (var b = 0; b < firstDay; b++) cells += '<div class="ycal-day other"><span class="ycal-num"></span></div>';

  for (var day = 1; day <= daysInMonth; day++) {
    var dateKey = year + '-' + String(month).padStart(2,'0') + '-' + String(day).padStart(2,'0');
    var dow = (firstDay + day - 1) % 7;
    var cls = 'ycal-day';
    if (dateKey === todayStr) cls += ' today';
    if (dow === 0) cls += ' sunday';
    if (dow === 6) cls += ' saturday';
    var closedL = portalData && portalData.closedDays && portalData.closedDays[dateKey];
    if (closedL) cls += ' holiday';
    var s = summary[dateKey];
    var paxHtml = s ? '<div class="ycal-pax">'+s.pax+'名</div>' : (closedL ? '<div class="ycal-pax" style="color:#a888d0">🏖休</div>' : '');
    var dotHtml = ''; // 将来：仮予約バッジ用
    var clickY = closedL ? '' : ' onclick="yoyakuCalGo(\''+dateKey+'\')"';
    var titleY = closedL ? ' title="'+String(closedL).replace(/"/g,'')+'"' : '';
    cells += '<div class="'+cls+'"'+clickY+titleY+'>'
      + dotHtml
      + '<div class="ycal-num">'+day+'</div>'
      + paxHtml
      + '</div>';
  }
  cells += '</div>';

  return monthNav + dowHdr + cells;
}

function yoyakuCalChangeMonth(diff) {
  var parts = yoyakuCalMonth.split('-');
  var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1+diff, 1);
  yoyakuCalMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');

            + '">'+btn.k+'</button>';
        }).join('')
        + '</span>'
      : '<span style="margin-left:auto;font-size:10px;color:#6a8ab0">'
        + (r.status === '来店済み' ? '来店済' : r.status === '退店済み' ? '退店済' : '来店前')
        + '</span>';
    var castTags = '';
    if (r.dohanCast)  castTags += '<span class="yc-cast dohan">同伴 '+esc(r.dohanCast)+'</span>';
    if (r.tantouCast) castTags += '<span class="yc-cast tantou">担当 '+esc(r.tantouCast)+'</span>';
    if (r.yoyakuCast) castTags += '<span class="yc-cast yoyaku">予約 '+esc(r.yoyakuCast)+'</span>';
    var castRow = castTags ? '<div class="yc-cast-row">'+castTags+'</div>' : '';
    var memberInfo = '';
    if (r.memberId && yoyakuMemberFeeMap[r.memberId]) {
      var mfi = yoyakuMemberFeeMap[r.memberId];
      var mfParts = [];
      if (mfi.memberYear) mfParts.push(mfi.memberYear + '年目');
      if (mfi.annualFeeDate) {
        var mfRenewal = new Date(mfi.annualFeeDate); mfRenewal.setFullYear(mfRenewal.getFullYear() + 1);
        mfParts.push('期限' + (mfRenewal.getMonth()+1) + '月' + mfRenewal.getDate() + '日');
      }
      if (mfParts.length) memberInfo = ' <span style="font-size:9px;color:#bb9944;background:#1e1600;border:1px solid #443a00;border-radius:4px;padding:1px 5px">💳'+mfParts.join('　')+'</span>';
    }
    return '<div class="yoyaku-card"'+(canEdit?' onclick="yoyakuOpenEdit('+r.rowIdx+')" style="cursor:pointer"':'')+' >'
      + '<div class="yc-row1"><span class="yc-time">'+esc(r.time)+'</span><span class="yc-name">'+esc(r.customer)+'様'+(r.memberId?' <span style="font-size:10px;color:#7a9cc8">'+esc(r.memberId)+'</span>'+memberInfo:'')+'</span>'+statusBtns+'</div>'
      + castRow
      + '<div class="yc-badges"><span class="yb yb-pax">'+r.pax+'名</span><span class="yb yb-seat">'+esc(r.table||'未定')+'</span></div>'
      + (r.youbou ? '<div class="yc-note">📝 '+esc(r.youbou)+'</div>' : '')
      + (r.regBy && r.regBy !== 'インポート' ? '<div class="yc-note" style="color:#6a8ab0">予約担当: '+esc(r.regBy)+'</div>' : '')
      + '</div>';
  }).join('');
  return stats + cards;
}

function renderAvailability_(all) {
  var minToTime = function(m) {
    var h = Math.floor(m / 60) % 24, mm = m % 60;
    return h + ':' + (mm < 10 ? '0' : '') + mm;
  };

  // 退店済み以外の予約だけをテーブルにマッピング
  var tableRsvMap = {};
  all.forEach(function(r) {
    if (r.status === '退店済み') return;
    (r.table || '').split('、').forEach(function(tbl) {
      var key = tbl.trim();
      if (!key || key === '未定') return;
      if (!tableRsvMap[key]) tableRsvMap[key] = [];
      tableRsvMap[key].push(r);
    });
  });

  var getInfo = function(key) {
    var rsvs = tableRsvMap[key] || [];
    if (rsvs.length === 0) return { isFree: true, label: '空き', color: '#66cc88' };
    var latestEnd = 0;
    rsvs.forEach(function(r) {
      var pts = (r.time || '20:00').split(':');
      var sh = parseInt(pts[0]) || 20;
      if (sh < 6) sh += 24;
      var em = sh * 60 + (parseInt(pts[1]) || 0) + 120;
      if (em > latestEnd) latestEnd = em;
    });
    var isIn = rsvs.some(function(r){ return r.status === '来店済み'; });
    return { isFree: false, label: isIn ? '来店中' : '来店前', color: isIn ? '#ff8866' : '#ffcc44' };
  };

  var sections = {};
  YOYAKU_TABLES.forEach(function(t) {
    var key = t.f + ' ' + t.n;
    if (!sections[t.f]) sections[t.f] = { counters: [], boxes: [] };
    var info = getInfo(key);
    if (t.n.indexOf('カウンター') >= 0) {
      sections[t.f].counters.push({ n: t.n, cap: t.cap, info: info });
    } else {
      sections[t.f].boxes.push({ n: t.n, cap: t.cap, info: info });
    }
  });

  var rows = '';
  Object.keys(sections).sort().forEach(function(f) {
    var sec = sections[f];
    var freeC = sec.counters.filter(function(c){ return c.info.isFree; });
    var freeB = sec.boxes.filter(function(b){ return b.info.isFree; });
    if (freeC.length === 0 && freeB.length === 0) return;
    rows += '<div style="font-size:10px;color:#5a7a9a;font-weight:700;margin:6px 0 3px">'+f+'</div>';
    if (freeC.length > 0) {
      rows += '<div style="display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid #0f1828">'
        + '<span style="font-size:11px;color:#8aabcc;flex:1">カウンター</span>'
        + '<span style="font-size:11px;font-weight:700;color:#66cc88">'+freeC.length+'席空き</span>'
        + '</div>';
    }
    freeB.forEach(function(b) {
      rows += '<div style="display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid #0f1828">'
        + '<span style="font-size:11px;color:#8aabcc;flex:1">'+b.n+'</span>'
        + '<span style="font-size:11px;font-weight:700;color:#66cc88">空き</span>'
        + '<span style="font-size:10px;color:#5a7a9a">定員'+b.cap+'名</span>'
        + '</div>';
    });
  });

  if (!rows) rows = '<div style="font-size:11px;color:#6a8ab0;padding:4px 0">現在空き席はありません</div>';

  return '<div style="background:#0e1624;border:1px solid #1a2a40;border-radius:8px;padding:10px;margin-bottom:12px">'
    + '<div style="font-size:11px;color:#6a8ab0;font-weight:700;margin-bottom:4px">📋 空き席</div>'
    + rows
    + '</div>';
}

function renderYoyakuSched() {
  var HW = 52, SH = 19, EH = 26, TW = (EH-SH)*HW, RH = 52, FD = 5;
  var prevF = '';

  // テーブルキー → インデックス、行Y座標マップを事前計算
  var tblIdxMap = {}, rowYMap = {};
  var yOff = 0, lastFloor = '';
  YOYAKU_TABLES.forEach(function(tt, idx) {
    tblIdxMap[(tt.f+tt.n).replace(/\s/g,'')] = idx;
    if (lastFloor && tt.f !== lastFloor) yOff += FD;
    rowYMap[idx] = yOff;
    yOff += RH;
    lastFloor = tt.f;
  });

  var leftHtml = '<div class="ysched-tbl-hdr">テーブル</div>';
  var rightHdr = '<div class="ysched-hdr"><div style="width:'+TW+'px;display:flex">';
  for (var h = SH; h < EH; h++) rightHdr += '<div class="ysched-time-cell" style="width:'+HW+'px">'+(h<24?h:h-24)+':00</div>';
  rightHdr += '</div></div>';
  var rowsHtml = ''; // 背景グリッドのみ
  var overlayHtml = ''; // 全予約ブロック（背景の上に重ねる）

  YOYAKU_TABLES.forEach(function(t, i) {
    if (t.f !== prevF && prevF !== '') {
      leftHtml += '<div class="ysched-floor-div"></div>';
      rowsHtml  += '<div class="ysched-floor-div" style="width:'+TW+'px"></div>';
    }
    prevF = t.f;
    leftHtml += '<div class="ysched-name-cell"><div class="ysched-name-main">'+t.f+' '+t.n.replace('カウンター','カウ').replace('ボックス','ボックス')+'</div></div>';
    var rowBg = '';
    for (var c = 0; c < (EH-SH); c++) {
      rowBg += '<div class="ysched-hour-cell" style="width:'+HW+'px;display:flex">'
        + '<div style="flex:1;border-right:1px solid #0f0f20"></div>'
        + '<div style="flex:1;border-right:1px solid #0f0f20"></div>'
        + '<div style="flex:1;border-right:1px solid #0f0f20"></div>'
        + '<div style="flex:1"></div>'
        + '</div>';
    }
    rowsHtml += '<div class="ysched-row" style="width:'+TW+'px;cursor:crosshair" data-tidx="'+i+'" onclick="yoyakuGridClick('+i+',event,'+SH+','+HW+')">'
      + '<div class="ysched-row-bg">'+rowBg+'</div></div>';

    // 予約ブロックはオーバーレイ層に描画（行をまたぐバー対応）
    var curKey = (t.f+t.n).replace(/\s/g,'');
    yoyakuRsvs.forEach(function(r) {
      var tables = (r.table||'').split('、').map(function(s){ return s.trim(); });
      if (tables[0].replace(/\s/g,'') !== curKey) return;
      var span = 1;
      for (var k = 1; k < tables.length; k++) {
        if (tblIdxMap[tables[k].replace(/\s/g,'')] === i + k) span++; else break;
      }
      var pts = (r.time||'20:00').split(':');
      var sh = parseInt(pts[0]); if (isNaN(sh)) sh = 20;
      var sm = sh * 60 + (parseInt(pts[1]) || 0);
      var lx = ((sm - SH*60) / 60) * HW, wx = ((120) / 60) * HW - 3;
      if (lx < 0) { wx += lx; lx = 0; }
      var topY = rowYMap[i] + 5, bh = span * RH - 10;
      var colors = ['background:#162848;border:1px solid #1a4080','background:#0d2820;border:1px solid #1a5038','background:#20163a;border:1px solid #402870','background:#281800;border:1px solid #503010'];
      overlayHtml += '<div class="yrsv-blk" style="position:absolute;left:'+lx+'px;top:'+topY+'px;width:'+wx+'px;height:'+bh+'px;'+colors[i%4]+'" onclick="event.stopPropagation()">'
        + '<div class="yrsv-pax">'+r.pax+'名</div><div class="yrsv-name">'+esc(r.customer)+'様</div></div>';
    });
  });

  var rowsWrapper = '<div style="position:relative">'
    + rowsHtml
    + '<div style="position:absolute;top:0;left:0;pointer-events:none;z-index:10">'
    + overlayHtml
    + '</div></div>';
  return '<div class="ysched-wrap"><div class="ysched-inner"><div class="ysched-left">'+leftHtml+'</div><div class="ysched-right">'+rightHdr+rowsWrapper+'</div></div></div>';
}

function renderRsvCal() {
  var p = yoyakuRsvCalMonth.split('-');
  var year = parseInt(p[0]), month = parseInt(p[1]);
  var firstDow = new Date(year, month - 1, 1).getDay();
  var daysInMonth = new Date(year, month, 0).getDate();
  var today = yoyakuDateStr(new Date());
  var h = '<div style="background:#13132a;border:1px solid #1e3050;border-radius:8px;overflow:hidden;margin-bottom:10px">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid #1e3050">'
    + '<div onclick="yoyakuRsvCalNav(-1)" style="cursor:pointer;padding:2px 10px;font-size:18px;color:#7ab0f0;line-height:1">‹</div>'
    + '<div style="font-size:13px;font-weight:600;color:#c0d4f0">' + year + '年' + month + '月</div>'
    + '<div onclick="yoyakuRsvCalNav(1)" style="cursor:pointer;padding:2px 10px;font-size:18px;color:#7ab0f0;line-height:1">›</div>'
    + '</div>';
  h += '<div style="display:grid;grid-template-columns:repeat(7,1fr);padding:6px 6px 2px">';
  ['日','月','火','水','木','金','土'].forEach(function(d, i) {
    h += '<div style="text-align:center;font-size:10px;font-weight:600;color:' + (i===0?'#ff7766':i===6?'#7799ff':'#7a9cc8') + '">' + d + '</div>';
  });
  h += '</div>';
  h += '<div style="display:grid;grid-template-columns:repeat(7,1fr);padding:2px 6px 8px;gap:2px">';
  for (var i = 0; i < firstDow; i++) h += '<div></div>';
  for (var d = 1; d <= daysInMonth; d++) {
    var ds = year + '-' + String(month).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var dow = new Date(year, month - 1, d).getDay();
    var isSel = ds === yoyakuRsvDate, isToday = ds === today;
    var closedL = portalData && portalData.closedDays && portalData.closedDays[ds];
    if (closedL) {
      h += '<div title="' + String(closedL).replace(/"/g,'') + '" style="text-align:center;padding:5px 2px;border-radius:5px;font-size:12px;color:#a888d0;background:#241a2e">' + d + '<div style="font-size:7px;line-height:1;margin-top:1px">休</div></div>';
      continue;
    }
    h += '<div onclick="yoyakuRsvSelectDate(\'' + ds + '\')" style="text-align:center;padding:5px 2px;border-radius:5px;cursor:pointer;font-size:12px;'
      + (isSel ? 'background:#1a55bb;color:#e8f0ff;font-weight:700'
               : isToday ? 'background:#0f2040;color:#7ab0f0;font-weight:700'
               : dow===0 ? 'color:#ff8877' : dow===6 ? 'color:#8899ff' : 'color:#a0c0e0')
      + '">' + d + '</div>';
  }
  h += '</div></div>';
  return h;
}

function yoyakuGridClick(tableIdx, e, SH, HW) {
  var row = e.currentTarget;
  var rect = row.getBoundingClientRect();
  var clickX = e.clientX - rect.left;
  var minutesFromStart = (clickX / HW) * 60;
  var startMins = SH * 60 + Math.floor(minutesFromStart / 15) * 15; // 15分単位に丸める
  var hour = Math.floor(startMins / 60);
  var min = startMins % 60;
  var timeStr = String(hour).padStart(2,'0') + ':' + String(min).padStart(2,'0');
  var t = YOYAKU_TABLES[tableIdx];
  if (!t) return;
  yoyakuGridPreset = { table: t.f + ' ' + t.n, time: timeStr };
  yoyakuRsvTime = timeStr;
  yoyakuRsvTable = t.f + ' ' + t.n;
  yoyakuSelectedCust = null;
  yoyakuSubTab = 'add';
  renderYoyaku();
}

var _searchTimer;
function yoyakuSearch(q) {
  q = (q||'').trim();
  var res = document.getElementById('ycust-results');
  if (!res) return;
  if (q.length < 1) { res.innerHTML = ''; clearTimeout(_searchTimer); return; }
  res.innerHTML = '<div style="font-size:11px;color:#7a9cc8;padding:4px 0">検索中...</div>';
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(function() {
  gasFetch(GAS_URL + '?action=portal&tab=yoyakuCustomers&userId=' + encodeURIComponent(userId) + '&q=' + encodeURIComponent(q))
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (!d.ok || !d.customers || !d.customers.length) { res.innerHTML = '<div style="font-size:11px;color:#6a8ab0;padding:4px 0">見つかりませんでした</div>'; return; }
      yoyakuCustResults = d.customers;
      res.innerHTML = d.customers.map(function(c, i) {
        var badges = '';
        if (c.bottle) badges += '<span class="ycm ycm-bottle">🍶ボトルあり</span>';
        if (c.bday && String(c.bday).trim()) badges += '<span class="ycm ycm-bday">🎂'+esc(c.bday)+'</span>';
        if (c.note) badges += '<span class="ycm ycm-note">📝メモあり</span>';
        if (c.annualFeeDate || c.memberYear) {
          var yearLabel = c.memberYear ? c.memberYear + '年目' : '';
          if (c.annualFeeDate) {
            var feeD = new Date(c.annualFeeDate);
            var renewal = new Date(feeD); renewal.setFullYear(renewal.getFullYear() + 1);
            var today = new Date(); today.setHours(0,0,0,0);
            var daysLeft = Math.ceil((renewal - today) / 86400000);
            var cls = daysLeft <= 7 ? 'ycm-fee-urg' : daysLeft <= 30 ? 'ycm-fee-warn' : 'ycm-note';
            var dateLabel = '期限'+(renewal.getMonth()+1)+'月'+renewal.getDate()+'日';
            var countLabel = daysLeft <= 30 ? '（あと'+daysLeft+'日）' : '';
            badges += '<span class="ycm '+cls+'">💳'+(yearLabel?yearLabel+'　':'')+dateLabel+countLabel+'</span>';
          } else if (yearLabel) {
            badges += '<span class="ycm ycm-note">💳'+yearLabel+'</span>';
          }
        }
        return '<div class="ycust-row" data-cidx="'+i+'" onclick="yoyakuSelectCust('+i+')">'
          + '<div><div class="ycust-name">'+esc(c.name||c.card||'')+'様</div>'
          + '<div class="ycust-sub">'+(c.no?'会員'+c.no:'')+' '+(c.tantou?'担当:'+c.tantou:'')+'</div>'
          + (badges?'<div class="ycust-badges">'+badges+'</div>':'')+'</div></div>';
      }).join('');
    }).catch(function(){ res.innerHTML = '<div style="font-size:11px;color:#7a9cc8">通信エラー</div>'; });
  }, 400);
}

function yoyakuStatusOptimistic_(rowIdx, newStatus, payload) {
  var rsv = yoyakuRsvs.find(function(r) { return r.rowIdx === rowIdx; });
  var prev = rsv ? rsv.status : '';
  if (rsv) rsv.status = newStatus;
  renderYoyaku();
  gasFetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) { if (rsv) { rsv.status = prev; renderYoyaku(); } alert('エラー: ' + (d.error || '')); }
    })
    .catch(function() { if (rsv) { rsv.status = prev; renderYoyaku(); } alert('通信エラー'); });
}

function yoyakuSubmitRsv() {
  if (yoyakuSubmitBusy) return; // 二重送信防止（連打・通信が遅い時の多重タップ対策）
  var stat = document.getElementById('yrsv-status');
  var manualEl = document.getElementById('yrsv-cust-manual');
  var custName = yoyakuSelectedCust
    ? (yoyakuSelectedCust.name || yoyakuSelectedCust.card || '')
    : (manualEl ? manualEl.value.trim() : '');

    if (stat) stat.textContent = '⚠️ お客様を選択または名前を入力してください';
    return;
  }
  var paxEl = document.getElementById('yrsv-pax');
  var payload = {
    action: yoyakuEditRsv ? 'updateReservation' : 'addReservation',
    userId: userId,
    date: yoyakuRsvDate,
    time: yoyakuRsvTime,
    customer: custName,
    memberId: yoyakuSelectedCust ? (yoyakuSelectedCust.no || '') : (yoyakuEditRsv ? (yoyakuEditRsv.memberId || '') : ''),
    pax: parseInt(paxEl ? paxEl.value : '1') || 1,
    table: yoyakuRsvMode === '仮予約' ? '未定' : (function(){ var w = document.getElementById('yrsv-table-wrap'); if (w) { var s = w.querySelectorAll('.table-chip.sel'); return Array.prototype.map.call(s, function(c){ return c.getAttribute('data-val'); }).join('、') || '未定'; } return yoyakuRsvTable || '未定'; })(),
    tantouCast: (function(){ var w = document.getElementById('yrsv-tantou-wrap'); if (w) { var s = w.querySelectorAll('.tantou-chip.sel'); return Array.prototype.map.call(s, function(c){ return c.getAttribute('data-val'); }).join('、'); } return yoyakuRsvTantou || (yoyakuSelectedCust ? (yoyakuSelectedCust.tantou || '') : (yoyakuEditRsv ? (yoyakuEditRsv.tantouCast || '') : '')); })(),
    yoyakuCast: yoyakuRsvTime === '同伴' ? '' : (document.getElementById('yrsv-yoyaku-cast') ? document.getElementById('yrsv-yoyaku-cast').value : ''),
    dohanCast: (function(){ var w = document.getElementById('yrsv-dohan-wrap'); if (w) { var s = w.querySelectorAll('.dohan-chip.sel'); return Array.prototype.map.call(s, function(c){ return c.getAttribute('data-val'); }).join('、'); } return yoyakuRsvDohan || (yoyakuEditRsv ? yoyakuEditRsv.dohanCast||'' : ''); })(),
    youbou: document.getElementById('yrsv-youbou').value,
    status: yoyakuEditRsv
      ? (yoyakuRsvMode === '仮予約' ? '仮予約' : (yoyakuEditRsv.status === '仮予約' ? '確定' : (yoyakuEditRsv.status || '確定')))
      : (yoyakuRsvMode === '仮予約' ? '仮予約' : '確定'),
    rowIdx: yoyakuEditRsv ? yoyakuEditRsv.rowIdx : undefined
  };
  yoyakuSubmitBusy = true;
  var btn = document.getElementById('yrsv-submit-btn');
  if (btn) { btn.style.opacity = '0.5'; btn.style.pointerEvents = 'none'; }
  if (stat) stat.textContent = '送信中...';
  gasFetch(GAS_URL, { method:'POST', body: JSON.stringify(payload) })
    .then(function(r){ return r.json(); })
    .then(function(d) {
      yoyakuSubmitBusy = false;
      if (!d.ok) {
        if (stat) stat.textContent = '⚠️ ' + (d.error||'エラー');
        if (btn) { btn.style.opacity = ''; btn.style.pointerEvents = ''; }
        return;
      }
      yoyakuSelectedCust = null;
      yoyakuCustMode = '';
      yoyakuRsvDate = ''; yoyakuRsvCalMonth = ''; yoyakuRsvTime = '';
      yoyakuRsvCustManual = ''; yoyakuRsvYoubou = ''; yoyakuRsvPax = 0; yoyakuRsvTable = ''; yoyakuRsvTantou = ''; yoyakuRsvYoyakuCast = ''; yoyakuRsvDohan = '';
      yoyakuRsvMode = '本予約';
      yoyakuEditRsv = null;
      yoyakuSubTab = 'list';
      loadYoyaku();
    }).catch(function(){
      yoyakuSubmitBusy = false;
      if (stat) stat.textContent = '⚠️ 通信エラー';
      if (btn) { btn.style.opacity = ''; btn.style.pointerEvents = ''; }
    });
}

var smgmtData = null;
var smgmtEditTarget = null; // {name, date, curVal}
var smgmtAddRole = '';
var smgmtViewStart = -1; // -1=未初期化（初回は今日から）
var DOW_JA = ['日','月','火','水','木','金','土'];
var ROLE_ORDER = ['キャスト','体験','派遣','黒服社員','黒服バイト','黒服'];

function loadShiftMgmt() {
  smgmtViewStart = -1;

      if (!d.shiftData) { setContent('<div class="err">Code.gsを最新版にデプロイしてください<br><small>getShiftMgmtData_が未定義</small></div>'); return; }
      smgmtData = d.shiftData;
      renderShiftMgmt();
    })
    .catch(function(e) { setContent('<div class="err">通信エラー</div>'); });
}

function smgmtNavWeek(delta) {
  var headers = smgmtData ? smgmtData.headers : [];
  smgmtViewStart = Math.max(0, Math.min(headers.length - 1, smgmtViewStart + delta * 7));
  renderShiftMgmt();
}

function smgmtGoToday() {
  var headers = smgmtData ? smgmtData.headers : [];
  var today = new Date();
  var ts = (today.getMonth()+1) + '/' + today.getDate();
  var idx = headers.indexOf(ts);
  smgmtViewStart = idx >= 0 ? idx : 0;
  renderShiftMgmt();
}

function renderShiftMgmt() {
  if (!smgmtData) { loadShiftMgmt(); return; }
  var headers = smgmtData.headers || []; // ['6/1','6/2',...]
  var rows = smgmtData.rows || [];
  var today = new Date();
  var todayStr = (today.getMonth()+1) + '/' + today.getDate();

  // 初回: 今日のインデックスから開始
  if (smgmtViewStart < 0) {
    var tidx = headers.indexOf(todayStr);
    smgmtViewStart = tidx >= 0 ? tidx : 0;
  }

  // 週表示: 7日分スライス
  var viewHeaders = headers.slice(smgmtViewStart, smgmtViewStart + 7);

  // 日付範囲ラベル
  var fmtH = function(h) {
    var p = h.split('/'), m = parseInt(p[0]), d = parseInt(p[1]);
    return m + '月' + d + '日（' + DOW_JA[new Date(today.getFullYear(), m-1, d).getDay()] + '）';
  };
  var rangeLabel = viewHeaders.length
    ? fmtH(viewHeaders[0]) + ' 〜 ' + fmtH(viewHeaders[viewHeaders.length-1])
    : '';

  var todayIdx = headers.indexOf(todayStr);
  var todayStart = todayIdx >= 0 ? todayIdx : 0;
  var canPrev = smgmtViewStart > 0;
  var canNext = smgmtViewStart + 7 < headers.length;
  var atToday = smgmtViewStart === todayStart;

  // ロール別にグループ化（表示順: キャスト→体験→派遣→黒服系）
  var groups = {};
  ROLE_ORDER.forEach(function(r) { groups[r] = []; });
  rows.forEach(function(row) {
    var r = row.role || 'キャスト';
    if (!groups[r]) groups[r] = [];
    groups[r].push(row);
  });
  var displayGroups = [
    { label: 'キャスト', members: groups['キャスト'] },
    { label: '体験',    members: groups['体験'],    scheduleOnly: true },
    { label: '派遣',    members: groups['派遣'],    scheduleOnly: true },
    { label: '黒服',    members: (groups['黒服社員']||[]).concat(groups['黒服バイト']||[]).concat(groups['黒服']||[]) }
  ].filter(function(g) {
    if (!g.members.length) return false;
    if (g.scheduleOnly) return g.members.some(function(r) { return Object.keys(r.cells).length > 0; });
    return true;
  });

  var thead = '<tr><th class="smgmt-name-col head">氏名</th>';
  viewHeaders.forEach(function(h) {
    var parts = h.split('/');
    var d = parts.length === 2 ? parseInt(parts[1]) : 0;
    var m = parts.length === 2 ? parseInt(parts[0]) : 0;
    var isToday = h === todayStr;
    var dow = d && m ? new Date(today.getFullYear(), m-1, d).getDay() : -1;
    var cls = isToday ? 'today' : (dow === 0 ? 'sun' : dow === 6 ? 'sat' : '');
    thead += '<th class="smgmt-day-head ' + cls + '">' + d + '<br><span style="font-size:9px">' + (dow >= 0 ? DOW_JA[dow] : '') + '</span></th>';
  });
  thead += '</tr>';

  // 日別の出勤人数トータル（確定＋申請中）。「1日で何人でれるか」を承認待ち込みで把握
  var tbody = '<tr class="smgmt-total-row"><td class="smgmt-name-col">👥人数</td>';
  viewHeaders.forEach(function(h) {
    var cf = 0, pd = 0;
    rows.forEach(function(row) { var v = row.cells[h]; if (v && v !== '休み') cf++; else if (row.pending && row.pending[h]) pd++; });
    var todayCls = h === todayStr ? ' today-col' : '';
    tbody += '<td class="smgmt-cell' + todayCls + '" style="cursor:default">' + cf + (pd ? '<span class="tp">+' + pd + '</span>' : '') + '</td>';
  });
  tbody += '</tr>';
  displayGroups.forEach(function(g) {
    tbody += '<tr class="smgmt-role-row"><td colspan="' + (viewHeaders.length+1) + '">' + g.label + '</td></tr>';
    g.members.forEach(function(row) {
      tbody += '<tr><td class="smgmt-name-col" title="' + esc(row.name) + '">' + esc(row.name) + '</td>';
      viewHeaders.forEach(function(h) {
        var val = row.cells[h] || '';
        var pend = (!val && row.pending && row.pending[h]) || '';
        var cls = val ? smgmtCellClass(val) : (pend ? 'c-pending' : '');
        var todayCls = h === todayStr ? ' today-col' : '';
        var txt = val ? smgmtCellText(val) : (pend ? '<span class="smgmt-pd">申</span>' + smgmtCellText(pend) : '');
        tbody += '<td class="smgmt-cell ' + cls + todayCls + '" onclick="openShiftEdit(\'' + esc(row.name) + '\',\'' + h + '\',\'' + esc(val) + '\')">' + txt + '</td>';
      });
      tbody += '</tr>';
    });
  });

  var html = '<div class="smgmt-wrap">'
    + '<div class="smgmt-nav">'
    + '<button class="smgmt-nav-btn" onclick="smgmtNavWeek(-1)"' + (canPrev ? '' : ' disabled style="opacity:.3"') + '>◀</button>'
    + '<div style="text-align:center;flex:1">'
    + '<div class="smgmt-month-label" style="font-size:13px">' + rangeLabel + '</div>'
    + (!atToday ? '<button onclick="smgmtGoToday()" style="margin-top:4px;font-size:11px;background:none;border:1px solid #2a5aaa;color:#7ab0f0;border-radius:6px;padding:2px 10px;cursor:pointer">今週</button>' : '')
    + '</div>'
    + '<button class="smgmt-nav-btn" onclick="smgmtNavWeek(1)"' + (canNext ? '' : ' disabled style="opacity:.3"') + '>▶</button>'
    + '</div>'
    + '<div class="smgmt-grid-outer" id="smgmt-grid-outer">'
    + '<table class="smgmt-table"><thead>' + thead + '</thead><tbody>' + tbody + '</tbody></table>'
    + '</div>'
    + '<div class="smgmt-actions">'
    + '<button class="primary" onclick="openAddStaff(\'派遣\')">＋ 派遣追加</button>'
    + '<button onclick="openAddStaff(\'体験\')">＋ 体験追加</button>'
    + '</div>'
    + '</div>'
    + '<div class="smgmt-sheet-backdrop" id="smgmt-backdrop" onclick="closeShiftEdit()"></div>'
    + '<div class="smgmt-sheet" id="smgmt-sheet">'
    + '<div class="smgmt-sheet-title" id="smgmt-sheet-title"></div>'
    + '<div class="smgmt-opts" id="smgmt-opts"></div>'
    + '<div class="smgmt-time-row" id="smgmt-time-row" style="display:none">'
    + '<label>勤務時間</label>'
    + '<input type="text" id="smgmt-time-input" placeholder="例: 20:00-24:00">'
    + '</div>'
    + '<div class="smgmt-sheet-btns">'
    + '<button class="cancel" onclick="closeShiftEdit()">キャンセル</button>'
    + '<button class="save" onclick="saveShiftCell()">保存</button>'
    + '</div>'
    + '</div>';

  setContent(html);
}

function smgmtCellClass(val) {
  if (!val) return '';
  if (val === '休み' || val === '休') return 'c-rest';
  var m = val.match(/(\d+):(\d+)-(\d+)/);
  if (m) {
    var h1 = parseInt(m[1]), h2 = parseInt(m[3]);
    var dur = h2 > h1 ? h2 - h1 : h2 + 24 - h1;
    return dur < 5 ? 'c-partial' : 'c-de';
  }
  return 'c-de';
}

function smgmtCellText(val) {
  if (!val) return '';
  if (val === '休み') return '休';
  var m = val.match(/(\d+):(\d+)-(\d+)/);
  if (m) return m[1] + '-' + m[3];
  return val.length > 5 ? val.slice(0,5) : val;
}

function openShiftEdit(name, date, curVal) {
  smgmtEditTarget = { name: name, date: date, curVal: curVal };
  var titleEl = document.getElementById('smgmt-sheet-title');
  if (titleEl) titleEl.innerHTML = '<span>' + esc(name) + '</span>　' + date;
  var opts = [
    { label: '出勤', val: 'de' },
    { label: '時間指定', val: 'time' },
    { label: '休み', val: 'rest' },
    { label: '空白（未定）', val: 'empty' }
  ];
  var selVal = curVal === '休み' || curVal === '休' ? 'rest'
    : !curVal ? 'empty'
    : curVal.indexOf(':') >= 0 ? 'time'
    : 'de';
  var optsHtml = opts.map(function(o) {
    return '<div class="smgmt-opt' + (selVal === o.val ? ' sel' : '') + '" onclick="smgmtSelectOpt(this,\'' + o.val + '\')">' + o.label + '</div>';
  }).join('');
  var optsEl = document.getElementById('smgmt-opts');
  if (optsEl) optsEl.innerHTML = optsHtml;
  var timeRow = document.getElementById('smgmt-time-row');
  if (timeRow) timeRow.style.display = selVal === 'time' ? '' : 'none';
  var timeInput = document.getElementById('smgmt-time-input');
  if (timeInput) timeInput.value = (selVal === 'time' && curVal) ? curVal : '20:00-24:00';
  var sheet = document.getElementById('smgmt-sheet');
  var backdrop = document.getElementById('smgmt-backdrop');
  if (sheet) sheet.classList.add('open');
  if (backdrop) backdrop.classList.add('open');
}

function smgmtSelectOpt(el, val) {
  document.querySelectorAll('.smgmt-opt').forEach(function(o) { o.classList.remove('sel'); });
  el.classList.add('sel');
  var timeRow = document.getElementById('smgmt-time-row');
  if (timeRow) timeRow.style.display = val === 'time' ? '' : 'none';
}

function closeShiftEdit() {
  var sheet = document.getElementById('smgmt-sheet');
  var backdrop = document.getElementById('smgmt-backdrop');
  if (sheet) sheet.classList.remove('open');
  if (backdrop) backdrop.classList.remove('open');
  smgmtEditTarget = null;
}

function saveShiftCell() {
  if (!smgmtEditTarget) return;
  var selEl = document.querySelector('.smgmt-opt.sel');
  if (!selEl) return;
  var optText = selEl.textContent.trim();
  var writeVal = '';
  if (optText === '出勤') writeVal = '20:00-24:00';
  else if (optText === '休み') writeVal = '休み';
  else if (optText === '時間指定') {
    var inp = document.getElementById('smgmt-time-input');
    writeVal = inp ? inp.value.trim() : '';
    if (!writeVal) { alert('時間を入力してください'); return; }
  }
  // empty → writeVal = '' (空白)

  var payload = { action: 'writeShiftCellPortal', userId: userId, name: smgmtEditTarget.name, date: smgmtEditTarget.date, value: writeVal };
  closeShiftEdit();
  gasFetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) { alert('エラー: ' + (d.error||'')); return; }
      // ローカルデータを更新してグリッドを再描画
      if (smgmtData) {
        smgmtData.rows.forEach(function(row) {
          if (row.name === smgmtEditTarget.name) {
            if (writeVal) row.cells[smgmtEditTarget.date] = writeVal;
            else delete row.cells[smgmtEditTarget.date];
          }
        });
        smgmtEditTarget = null;
        renderShiftMgmt();
      }
    })
    .catch(function() { alert('通信エラー'); });
}

function openAddStaff(role) {
  smgmtAddRole = role;
  var today = new Date();
  var todayMD = (today.getMonth()+1) + '/' + today.getDate();
  var html = '<div class="smgmt-add-form">'
    + '<div style="font-size:15px;font-weight:600;color:#e8f0ff;margin-bottom:12px">' + role + 'スタッフ追加</div>'
    + '<label>名前</label>'
    + '<input type="text" id="smgmt-add-name" placeholder="例: 田中（ルーア）">'
    + '<label>日付（M/D形式）</label>'
    + '<input type="text" id="smgmt-add-date" value="' + todayMD + '">'
    + '<label>勤務時間</label>'
    + '<input type="text" id="smgmt-add-time" value="20:00-24:00">'
    + '<div style="display:flex;gap:8px;margin-top:14px">'
    + '<button style="flex:1;padding:10px;border-radius:8px;border:1px solid #1e3050;background:none;color:#6a8ab0;font-size:13px;cursor:pointer" onclick="renderShiftMgmt()">キャンセル</button>'
    + '<button style="flex:1;padding:10px;border-radius:8px;background:#1a50a0;color:#fff;border:none;font-size:13px;cursor:pointer" onclick="submitAddStaff()">追加</button>'
    + '</div>'
    + '</div>';
  setContent(html);
}

function submitAddStaff() {
  var name = (document.getElementById('smgmt-add-name')||{}).value || '';
  var date = (document.getElementById('smgmt-add-date')||{}).value || '';
  var time = (document.getElementById('smgmt-add-time')||{}).value || '';
  name = name.trim(); date = date.trim(); time = time.trim();
  if (!name) { alert('名前を入力してください'); return; }
  var payload = { action: 'addShiftStaff', userId: userId, staffName: name, role: smgmtAddRole, date: date, timeVal: time };
  gasFetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) { alert('エラー: ' + (d.error||'')); return; }
      smgmtData = null; // キャッシュ無効化して再読み込み
      loadShiftMgmt();
    })
    .catch(function() { alert('通信エラー'); });
}

function resetCashAction(action, label) {
  if (!confirm(label + 'を削除し、未提出の状態に戻します。よろしいですか？')) return;
  gasFetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: action, userId: userId })
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) { alert('エラー: ' + (d.error||'')); return; }
      alert(label + 'をリセットしました');
    })
    .catch(function() { alert('通信エラー'); });
}
</script>
