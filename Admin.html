<meta charset="utf-8">
<style>
:root{
  --bg:#0a0a12; --panel:#12121f; --panel2:#16162a; --line:#22223a; --line2:#2e2e4a;
  --txt:#e8ecf6; --sub:#9aa6c4; --dim:#5a6688;
  --accent:#7aa2ff; --accent-bg:#12233f; --accent-line:#2a5590;
  --ok:#7be0a8; --okbg:#0d2618; --okline:#2a6a44;
  --warn:#ffbf6a; --warnbg:#241800; --warnline:#7a5010;
  --danger:#e79ad6; --dangerbg:#241014; --dangerline:#5a2430;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;font-size:14px;}
.wrap{min-height:100vh;display:flex;flex-direction:column;}
.hd{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#12101c,#0c0b14);flex-wrap:wrap;}
.hd .brand{font-size:16px;font-weight:800;letter-spacing:.4px;}
.hd .brand .z{color:var(--accent);}
.hd .who{font-size:12px;color:var(--sub);font-weight:700;}
.hd .sp{flex:1;}
.tabs{display:flex;gap:5px;padding:10px 14px 0;border-bottom:1px solid var(--line);background:var(--panel);flex-wrap:wrap;}
.tab{padding:9px 13px;border-radius:9px 9px 0 0;border:1px solid transparent;background:transparent;color:var(--sub);font-size:14px;font-weight:700;cursor:pointer;}
.tab.on{background:var(--panel2);border-color:var(--line2);border-bottom-color:var(--panel2);color:var(--accent);}
.body{flex:1;padding:16px;overflow-y:auto;}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.finput{background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:9px 12px;color:var(--txt);font-size:14px;outline:none;}
.finput.grow{min-width:200px;flex:1;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:7px 12px;border-radius:9px;border:1px solid var(--line2);background:var(--panel2);color:var(--sub);font-size:13px;font-weight:700;cursor:pointer;}
.chip.on{background:var(--accent-bg);border-color:var(--accent-line);color:var(--accent);}
.cnt{font-size:12px;color:var(--dim);font-weight:700;}
.sec{background:var(--panel2);border:1px solid var(--line2);border-radius:12px;padding:14px 16px;margin-bottom:16px;}
.sec-t{font-size:14px;font-weight:800;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
.sec-t .sub{font-size:11px;color:var(--dim);font-weight:600;}
.btn{padding:9px 14px;border-radius:9px;border:1px solid var(--line2);background:var(--panel);color:var(--txt);font-size:13px;font-weight:800;cursor:pointer;}
.btn.pri{background:linear-gradient(180deg,#153a72,#0f2040);border-color:var(--accent-line);color:#dcecff;}
.btn.ok{background:var(--okbg);border-color:var(--okline);color:var(--ok);}
.btn.warn{background:var(--warnbg);border-color:var(--warnline);color:var(--warn);}
.btn.dng{background:var(--dangerbg);border-color:var(--dangerline);color:#f0a0b0;}
.btn.sm{padding:6px 10px;font-size:12px;}
.btn:disabled{opacity:.45;cursor:default;}

/* staff grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.card{background:var(--panel2);border:1px solid var(--line2);border-radius:12px;padding:13px 14px;}
.card-top{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
.card-nm{font-size:16px;font-weight:800;flex:1;}
.badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;white-space:nowrap;}
.badge.line-on{background:var(--okbg);border:1px solid var(--okline);color:var(--ok);}
.badge.line-off{background:#1a1013;border:1px solid #5a2430;color:#e0a0b0;}
.badge.kiosk{background:var(--accent-bg);border:1px solid var(--accent-line);color:var(--accent);}
.badge.lock{background:#1c1830;border:1px solid #3a3560;color:#b9a6ff;}
.row{display:flex;align-items:center;gap:8px;margin-top:10px;}
.row .lbl{font-size:12px;color:var(--sub);font-weight:700;width:72px;flex-shrink:0;}
.rolesel{flex:1;background:var(--panel);border:1px solid var(--line2);border-radius:8px;color:var(--txt);padding:8px 10px;font-size:14px;font-weight:700;outline:none;}
.perms{display:flex;gap:8px;margin-top:11px;}
.toggle{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:9px;border:1px solid var(--line2);background:var(--panel);color:var(--sub);font-size:13px;font-weight:800;cursor:pointer;}
.toggle.on.admin{background:#241028;border-color:#7a3a6a;color:#f0a0e0;}
.toggle.on.safe{background:var(--warnbg);border-color:var(--warnline);color:var(--warn);}
.toggle.on.gunshi{background:#0d2233;border-color:#2a6a9a;color:#7ac8ff;}
.toggle.locked{opacity:.5;cursor:not-allowed;}

/* matrix / tables */
.mtx-wrap{overflow-x:auto;}
table.mtx{border-collapse:collapse;width:100%;min-width:640px;font-size:13px;}
table.mtx th,table.mtx td{border:1px solid var(--line);padding:8px 10px;text-align:center;}
table.mtx th{background:#14142a;color:var(--sub);font-weight:800;}
table.mtx td.nm{text-align:left;font-weight:800;color:#eef;white-space:nowrap;}
table.mtx td.role{text-align:left;color:var(--sub);font-weight:700;}
table.mtx td.cell{cursor:pointer;min-width:52px;}
table.mtx td.cell:hover{background:var(--accent-bg);}
.yes{color:var(--ok);font-weight:900;} .no{color:#44506a;}
.mtx tr:nth-child(even) td{background:#101020;}
.mtx.sm th,.mtx.sm td{padding:5px 8px;font-size:12px;}
.mtx-scroll{overflow:auto;max-height:56vh;border:1px solid var(--line);border-radius:8px;}
table.mtx td.cell.pending{background:#2a1f0a;color:#e0b84a;}
table.mtx td.cell .pd{font-size:9px;background:#8a6d20;color:#fff;border-radius:3px;padding:0 3px;margin-right:2px;vertical-align:middle;}
table.mtx tr.total-row td{background:#101a2e !important;color:#8fd0ff;font-weight:900;border-bottom:2px solid #2a5aaa;}
table.mtx tr.total-row td .tp{color:#e0b84a;font-size:10px;font-weight:800;}
#scm-wrap .scm-back{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:80;}
#scm-wrap .scm{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:81;background:#141428;border:1px solid var(--line);border-radius:14px;padding:18px;width:min(340px,92vw);display:flex;flex-direction:column;gap:9px;box-shadow:0 12px 44px rgba(0,0,0,.55);}
#scm-wrap .scm-t{font-weight:800;font-size:16px;color:#eef;}
#scm-wrap .scm-sub{font-size:12px;color:var(--sub);margin:-4px 0 4px;}
#scm-wrap .scm .btn{width:100%;padding:12px;font-size:14px;}
.mtx-scroll table.mtx{min-width:520px;}
.mtx-scroll .mtx th{position:sticky;top:0;z-index:1;}
/* еҗҚеүҚеҲ—гӮ’е·Ұеӣәе®ҡпјҲжЁӘгӮ№гӮҜгғӯгғјгғ«гҒ—гҒҰгӮӮеҗҚеүҚгҒҢиҰӢгҒҲгӮӢпјү */
.mtx-scroll .mtx td.nm{position:sticky;left:0;z-index:2;background:#0d0d1a;box-shadow:1px 0 0 var(--line);}
.mtx-scroll .mtx tr:nth-child(even) td.nm{background:#111124;}
.mtx-scroll .mtx th:first-child{left:0;z-index:3;}
/* еҪ№еүІгҒ”гҒЁгҒ®иЎҢгҒ®иүІеҲҶгҒ‘пјҲгӮӯгғЈгӮ№гғҲ=йқ’ / дҪ“йЁ“=з·‘ / жҙҫйҒЈ=зҙ« / й»’жңҚ=зҗҘзҸҖпјүгҖӮеҗҚеүҚеӣәе®ҡеҲ—гӮӮеҗҢиүІгҒ«дёҠжӣёгҒҚ */
table.mtx tbody tr.rc-cast   td{background:#0e1c30;}
table.mtx tbody tr.rc-taiken td{background:#0d2117;}
table.mtx tbody tr.rc-haken  td{background:#1c1136;}
table.mtx tbody tr.rc-kuro   td{background:#2a1e08;}
.mtx-scroll .mtx tr.rc-cast   td.nm{background:#0e1c30;}
.mtx-scroll .mtx tr.rc-taiken td.nm{background:#0d2117;}
.mtx-scroll .mtx tr.rc-haken  td.nm{background:#1c1136;}
.mtx-scroll .mtx tr.rc-kuro   td.nm{background:#2a1e08;}
.shift-filter{margin:0 0 10px;}
/* shift tab 2-col top */
.shift-top{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
.shift-top>.sec{flex:1;min-width:290px;margin-bottom:0;}
.sec.compact{margin-bottom:0;}
.addbar{display:flex;gap:8px;flex-wrap:wrap;}
.addbar .finput{flex:1;min-width:96px;}

/* reference */
.ref{display:flex;flex-direction:column;gap:10px;max-width:760px;}
.ref-item{background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:12px 14px;}
.ref-item h4{margin:0 0 4px;font-size:15px;} .ref-item p{margin:0;font-size:13px;color:var(--sub);line-height:1.6;}
.ref-perm h4{color:var(--warn);}

/* generic list rows */
.lrow{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:10px 12px;margin-bottom:8px;flex-wrap:wrap;}
.lrow .main{flex:1;min-width:160px;}
.lrow .nm{font-size:14px;font-weight:800;}
.lrow .meta{font-size:11px;color:var(--dim);margin-top:2px;}
.sw{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:8px;border:1px solid var(--line2);background:var(--panel2);color:var(--sub);font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;}
.sw.on{background:var(--okbg);border-color:var(--okline);color:var(--ok);}
.ta{width:100%;background:var(--panel2);border:1px solid var(--line2);border-radius:8px;color:var(--txt);padding:8px 10px;font-size:13px;resize:vertical;outline:none;margin-top:6px;font-family:inherit;}
.tin{width:76px;background:var(--panel2);border:1px solid var(--line2);border-radius:7px;color:var(--txt);padding:6px 8px;font-size:13px;text-align:center;outline:none;}

.empty{text-align:center;color:var(--dim);padding:40px 12px;font-size:14px;}
.gate{max-width:420px;margin:80px auto;text-align:center;background:var(--panel2);border:1px solid var(--line2);border-radius:14px;padding:36px 24px;}
.gate .ic{font-size:44px;} .gate h2{margin:12px 0 6px;} .gate p{color:var(--sub);font-size:13px;}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#0d2618;border:1px solid #2a6a44;color:#9fe8c0;font-size:13px;font-weight:700;padding:11px 20px;border-radius:12px;z-index:70;opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center;}
.toast.show{opacity:1;} .toast.err{background:#241014;border-color:#5a2430;color:#e0a0b0;}
.hint{font-size:12px;color:var(--dim);margin:-4px 0 10px;}
.who .logout{color:var(--accent);cursor:pointer;margin-left:10px;font-weight:800;}
/* QRгғӯгӮ°гӮӨгғігӮІгғјгғҲ */
.qrgate{max-width:400px;margin:60px auto;text-align:center;display:flex;flex-direction:column;align-items:center;}
.qrgate h2{margin:0 0 6px;font-size:22px;}
.qrsub{font-size:14px;color:var(--sub);font-weight:700;margin-bottom:20px;}
.qrbox{width:240px;height:240px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:12px;overflow:hidden;}
.qrbox img{display:block;width:240px;height:240px;}
.qrload{color:#8a9ac0;font-size:13px;font-weight:700;padding:20px;}
.qrhint{font-size:12px;color:var(--sub);margin-top:18px;line-height:1.6;}
/* PIN */
.pinrow{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);}
.pinrow .pinlbl{font-size:12px;color:var(--sub);font-weight:800;}
.pinrow .pinstat{font-size:11px;color:var(--dim);font-weight:700;flex:1;}
.pinrow .pinstat.set{color:var(--warn);}
</style>

}
/* ===== QRгғӯгӮ°гӮӨгғіпјҲжң¬дәәиӘҚиЁјгғ»з®ЎзҗҶиҖ…гҒ®гҒҝпјү ===== */
function admSessKey(){return 'adminsess_v1';}
function loadAdminSession(){try{var r=localStorage.getItem(admSessKey());if(!r)return null;var s=JSON.parse(r);if(s&&s.exp&&Date.now()<s.exp&&s.userId)return s;localStorage.removeItem(admSessKey());return null;}catch(e){return null;}}
function saveAdminSession(userId,name){try{localStorage.setItem(admSessKey(),JSON.stringify({userId:userId,name:name,exp:Date.now()+12*60*60*1000}));}catch(_){}}
function adminLogout(){try{localStorage.removeItem(admSessKey());}catch(_){} location.reload();}
var _aAuthToken=null,_aAuthTimer=null;
function stopAAuth(){ if(_aAuthTimer){clearInterval(_aAuthTimer);_aAuthTimer=null;} }
function boot(){
  if(!IS_GAS){ load(); return; }
  if(USER_ID){ load(); return; }                 // URLгҒ«userId(еҫҢж–№дә’жҸӣ/dev)гҒҢгҒӮгӮҢгҒ°еҫ“жқҘйҖҡгӮҠ
  var sess=loadAdminSession();
  if(sess){ USER_ID=sess.userId; load(); return; }
  showAdminGate();
}
// PINгҒҢиЁӯе®ҡжёҲгҒҝгҒӘгӮүPINз”»йқўгҖҒжңӘиЁӯе®ҡгҒӘгӮүQRпјҲеҲқеӣһгҒҜQRгҒ§гғӯгӮ°гӮӨгғівҶ’йҒӢе–¶гӮҝгғ–гҒ§PINиЁӯе®ҡпјү
function showAdminGate(){
  gsr('adminConsolePinSet').then(function(r){ if(r&&r.pinSet)showAdminPin(); else showAdminQr(); }).catch(function(){ showAdminQr(); });
}
function showAdminPin(){
  stopAAuth();
  document.getElementById('tabs').style.display='none';
  document.getElementById('who').textContent='';
  document.getElementById('body').innerHTML='<div class="qrgate"><h2>вҡҷпёҸ з®ЎзҗҶгӮігғігӮҪгғјгғ«</h2>'
    +'<div class="qrsub">рҹ”җ PINгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„</div>'
    +'<div style="margin:18px auto 0;max-width:220px">'
    +'<input id="admPin" type="password" inputmode="numeric" maxlength="6" autocomplete="off" style="width:100%;box-sizing:border-box;text-align:center;font-size:28px;letter-spacing:10px;padding:12px;border-radius:12px;border:1px solid var(--line2);background:var(--panel);color:var(--txt)" placeholder="вҖўвҖўвҖўвҖў">'
    +'<div id="admPinErr" style="color:#e08794;font-size:13px;min-height:18px;margin-top:8px"></div>'
    +'<button class="btn pri" style="width:100%;padding:13px;font-size:16px;margin-top:2px" onclick="submitAdminPin()">й–ӢгҒҸ</button>'
    +'</div>'
    +'<div class="qrhint" style="margin-top:14px"><span onclick="showAdminQr()" style="color:var(--accent);cursor:pointer;text-decoration:underline">QRгҒ§гғӯгӮ°гӮӨгғі</span></div></div>';
  var el=document.getElementById('admPin'); if(el){ el.focus(); el.addEventListener('keydown',function(e){ if(e.key==='Enter')submitAdminPin(); }); }
}
function submitAdminPin(){
  var el=document.getElementById('admPin'), err=document.getElementById('admPinErr');
  var p=(el&&el.value||'').trim();
  if(!p){ if(err)err.textContent='PINгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„'; return; }
  gsr('adminPinLogin',p).then(function(r){
    if(r&&r.ok&&r.userId){ USER_ID=r.userId; saveAdminSession(r.userId,r.name); load(); }
    else { if(err)err.textContent=(r&&r.error)||'PINгҒҢйҒ•гҒ„гҒҫгҒҷ'; if(el){el.value='';el.focus();} }
  }).catch(function(){ if(err)err.textContent='йҖҡдҝЎгӮЁгғ©гғј'; });
}
function showAdminQr(){
  stopAAuth();
  document.getElementById('tabs').style.display='none';
  document.getElementById('who').textContent='';
  document.getElementById('body').innerHTML='<div class="qrgate"><h2>вҡҷпёҸ з®ЎзҗҶгӮігғігӮҪгғјгғ«</h2><div class="qrsub">рҹ“ұ LINEгҒ§QRгӮ’иӘӯгҒҝеҸ–гҒЈгҒҰжң¬дәәиӘҚиЁјпјҲз®ЎзҗҶиҖ…гҒ®гҒҝпјү</div><div class="qrbox" id="admQr"><div class="qrload">QRгӮ’з”ҹжҲҗдёӯвҖҰ</div></div><div class="qrhint">гӮ№гғһгғӣгҒ®LINEгҒ§гӮ№гӮӯгғЈгғі вҶ’ жң¬дәәзўәиӘҚ вҶ’ гӮігғігӮҪгғјгғ«гҒҢй–ӢгҒҚгҒҫгҒҷ</div></div>';
  gsr('adminAuthStart').then(function(r){
    if(!r||!r.ok){ var e=document.getElementById('admQr'); if(e)e.innerHTML='<div class="qrload">QRз”ҹжҲҗгӮЁгғ©гғј</div>'; return; }
    _aAuthToken=r.token;
    var q='https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=8&data='+encodeURIComponent(r.url);
    var box=document.getElementById('admQr'); if(box)box.innerHTML='<img src="'+q+'" width="240" height="240" alt="QR">';
    pollAdminAuth(r.token);
  }).catch(function(){ var e=document.getElementById('admQr'); if(e)e.innerHTML='<div class="qrload">йҖҡдҝЎгӮЁгғ©гғј</div>'; });
}
function pollAdminAuth(token){
  stopAAuth();
  _aAuthTimer=setInterval(function(){
    if(_aAuthToken!==token){ stopAAuth(); return; }
    gsr('kioskAuthStatus',token).then(function(r){
      if(!r)return;
      if(r.status==='ok'){ stopAAuth(); if(r.userId){ USER_ID=r.userId; saveAdminSession(r.userId,r.name); load(); } }
      else if(r.status==='expired'){ stopAAuth(); showAdminQr(); }
    }).catch(function(){});
  },2500);
}

    +'<div id="rn-result"></div></details>';
  setBody('<div class="toolbar"><input class="finput grow" id="q" placeholder="рҹ”Қ еҗҚеүҚгҒ§жӨңзҙў" oninput="onSearch()" value="'+esc(q)+'"><div class="chips">'+fchips+'</div><span class="cnt">'+list.length+'еҗҚ</span></div>'+renameTool+(list.length?'<div class="grid">'+list.map(cardHtml).join('')+'</div>':'<div class="empty">и©ІеҪ“гӮ№гӮҝгғғгғ•гҒӘгҒ—</div>'));

function renameGetIn(){ return {o:(document.getElementById('rn-old').value||'').trim(), n:(document.getElementById('rn-new').value||'').trim()}; }
function renamePreview(){
  var v=renameGetIn(); if(!v.o||!v.n){ toast('ж—§еҗҚгҒЁж–°еҗҚгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„',true); return; }
  if(v.o===v.n){ toast('ж—§еҗҚгҒЁж–°еҗҚгҒҢеҗҢгҒҳгҒ§гҒҷ',true); return; }
  if(!IS_GAS){ document.getElementById('rn-result').innerHTML='<div class="empty">пјҲгғӯгғјгӮ«гғ«гҒ§гҒҜгғ—гғ¬гғ“гғҘгғјдёҚеҸҜпјү</div>'; return; }
  document.getElementById('rn-result').innerHTML='<div class="empty" style="padding:12px">зўәиӘҚдёӯвҖҰ</div>';
  gsr('adminRenameStaff',USER_ID,v.o,v.n,false).then(function(r){
    if(r&&r.ok===false){ document.getElementById('rn-result').innerHTML='<div class="empty" style="color:#e88;padding:12px">'+esc(r.error||'еӨұж•—')+'</div>'; return; }
    renameRenderResult(r,false);
  }).catch(function(){ document.getElementById('rn-result').innerHTML='<div class="empty">йҖҡдҝЎгӮЁгғ©гғј</div>'; });
}
function renameRenderResult(r,done){
  var rows=Object.keys(r.report).map(function(k){ var val=r.report[k],pos=Number(val)>0; return '<tr><td style="padding:3px 10px 3px 0;color:var(--sub)">'+esc(k)+'</td><td style="padding:3px 0;text-align:right;font-weight:800;color:'+(pos?'var(--accent)':'var(--dim)')+'">'+esc(val)+'</td></tr>'; }).join('');
  var head='<div class="hint" style="margin:10px 0 4px"><b>'+esc(r.oldName)+'</b> вҶ’ <b>'+esc(r.newName)+'</b>гҖҖиЁҲ '+r.total+' д»¶'+(done?'гҖҖ<span style="color:#7fd88f">вң… е®ҹиЎҢжёҲгҒҝ</span>':'гҖҖ<span style="color:var(--dim)">пјҲгғ—гғ¬гғ“гғҘгғјгғ»жңӘе®ҹиЎҢпјү</span>')+'</div>';
  var btn=done?'':'<div class="toolbar" style="margin-top:10px"><button class="btn ok" onclick="renameCommit()">вң… гҒ“гҒ®еҶ…е®№гҒ§ж”№еҗҚгӮ’е®ҹиЎҢпјҲ'+r.total+'д»¶пјү</button></div>';
  document.getElementById('rn-result').innerHTML=head+'<table style="border-collapse:collapse;font-size:12px">'+rows+'</table>'+btn;
}
function renameCommit(){
  var v=renameGetIn(); if(!v.o||!v.n)return;
  if(!confirm(v.o+' гӮ’ '+v.n+' гҒ«гҖҒеҗҚеүҚгҒ§зҙҗгҒҘгҒҸе…ЁгӮ·гғјгғҲгҒ§зөұдёҖгҒ—гҒҫгҒҷгҖӮгӮҲгӮҚгҒ—гҒ„гҒ§гҒҷгҒӢпјҹ'))return;
  gsr('adminRenameStaff',USER_ID,v.o,v.n,true).then(function(r){
    if(res(r,'ж”№еҗҚгҒ—гҒҫгҒ—гҒҹпјҲиЁҲ'+r.total+'д»¶пјү')){ renameRenderResult(r,true); }
  }).catch(function(){ toast('е®ҹиЎҢгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ',true); });
}

  var safeBtn=s.hardSafe?'<div class="toggle on safe locked" title="гӮігғјгғүдҝқиӯ·">рҹ”‘ йҮ‘еә«з®ЎзҗҶ рҹ”’</div>':'<div class="toggle'+(s.safeFlag?' on safe':'')+'" onclick="toggleSafe(\''+jstr(s.name)+'\','+(!s.safeFlag)+')">рҹ”‘ йҮ‘еә«з®ЎзҗҶ</div>';

  var backRuleHtml='';

      +'</select>'

      +'<span id="brp'+i+'" style="font-size:12px;opacity:.7;display:'+(showR?'inline':'none')+'">%</span>'
      +'<button class="btn pri sm" id="brsave'+i+'" onclick="saveBackRule('+i+',\''+jstr(s.name)+'\')" style="display:'+(showR?'inline-block':'none')+'">дҝқеӯҳ</button>'
      +'</div>';
  }
  var bdayInfoHtml='';
  if(isTermRole(s.role)){
    var bd=((s.terms&&s.terms['иӘ•з”ҹж—Ҙ'])||'').trim();
    var w=s.bdayWeek||{status:'none'};

      var jp={pending:'з”іи«Ӣдёӯ',approved:'жүҝиӘҚжёҲ',sentback:'е·®жҲ»'}[w.status]||w.status;

/* гғҗгғғгӮҜж–№ејҸпјҲж–°гғ«гғјгғ«/еӣәе®ҡзҺҮпјүпјқгӮӯгғЈгӮ№гғҲж°ёз¶ҡиЁӯе®ҡгғ»зөҰдёҺиЁҲз®—гҒ«зӣҙзөҗ */
function onBackModeChange(i,name){
  var mode=document.getElementById('bm'+i).value, show=(mode==='fixed');
  var br=document.getElementById('br'+i), brp=document.getElementById('brp'+i), bs=document.getElementById('brsave'+i);
  if(br)br.style.display=show?'inline-block':'none';

  function _hasShift(row,day){ var v=row.cells&&row.cells[day]; if(v&&v!=='дј‘гҒҝ')return true; if(row.pending&&row.pending[day])return true; return false; }

  function _roleRank(role){ role=String(role||''); if(role==='гӮӯгғЈгӮ№гғҲ')return 0; if(role==='дҪ“йЁ“')return 1; if(role==='жҙҫйҒЈ')return 2; if(role.indexOf('й»’жңҚ')>=0)return 3; return 4; }

/* дјқзҘЁеҸ–еҫ—гғ–гғғгӮҜгғһгғјгӮҜгғ¬гғғгғҲгҒ®ж—ўе®ҡй–Ӣе§Ӣж—ҘпјқжңҖж–°дјқзҘЁж—ҘгҒ®зҝҢж—ҘпјҲз„ЎгҒ‘гӮҢгҒ°еүҚж—ҘпјүгҖӮжңҖеӨ§14ж—ҘеүҚгҒҫгҒ§ */
function trustDefaultBillStart_(){
  function fmt(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
  var yst=new Date();yst.setDate(yst.getDate()-1);
  var cap=new Date();cap.setDate(cap.getDate()-14);
  var start=yst;
  var lb=trustInfo&&trustInfo.status&&trustInfo.status.latestBillDate;
  if(lb&&/^\d{4}-\d{2}-\d{2}$/.test(lb)){var d=new Date(lb+'T00:00:00');d.setDate(d.getDate()+1);start=d;}
  if(start>yst)start=yst;
  if(start<cap)start=cap;
  return fmt(start);
}

function trustCoverageSection(){
  var cov=(trustInfo&&trustInfo.coverage)||[];
  if(!cov.length) return '';
  var wd=['','жңҲ','зҒ«','ж°ҙ','жңЁ','йҮ‘','еңҹ','ж—Ҙ'];
  var cells=cov.map(function(c){
    var md=String(c.date).slice(5).replace('-','/');
    var bg,bd,fg,mark;
    if(c.closed){ bg='#1a1f27';bd='#2a3340';fg='#7a8aa0';mark='дј‘'; }
    else if(c.count>0){ bg='#0f2a18';bd='#1f5a34';fg='#7ee0a0';mark='вң“'+c.count; }
    else { bg='#2a1214';bd='#5a2226';fg='#ff9aa0';mark='вң•'; }
    var title=c.date+'пјҲ'+wd[c.dow]+'пјү'+(c.closed?(' дј‘гҒҝ'+(c.holiday?'пјҡ'+c.holiday:'')):(c.count>0?(' еҸ–еҫ—жёҲ '+c.count+'д»¶'):' жңӘеҸ–еҫ—'));
    return '<div title="'+esc(title)+'" style="flex:none;width:56px;padding:6px 0;text-align:center;background:'+bg+';border:1px solid '+bd+';border-radius:8px">'+
      '<div style="font-size:11px;color:'+fg+'">'+esc(md)+'</div><div style="font-size:12px;font-weight:700;color:'+fg+'">'+esc(mark)+'</div></div>';
  }).join('');
  var legend='<div class="hint" style="margin-top:8px"><span style="color:#7ee0a0">вң“д»¶ж•°=еҸ–еҫ—жёҲ</span>гҖҖ<span style="color:#ff9aa0">вң•=жңӘеҸ–еҫ—</span>гҖҖ<span style="color:#7a8aa0">дј‘=еә—дј‘/е®ҡдј‘</span>гҖҖвҶҗ ж–°гҒ—гҒ„й ҶпјҲеүҚж—ҘгҒӢгӮү35ж—Ҙпјү</div>';
  return '<div class="sec"><div class="sec-t">рҹ—“ дјқзҘЁгӮ«гғҗгғ¬гғғгӮё</div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:6px">'+cells+'</div>'+legend+'</div>';

function prefillBday(name,mk,mmdd){
  document.getElementById('bd_name').value=name;

  if(p.length>=3&&p[0].length===4){mo=+p[1];da=+p[2];}else{mo=+p[0];da=+p[1];}
  if(mo>=1&&da>=1){
    var bd=new Date(y,mo-1,da);
    var f=function(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);};

var denpyoSub='slip', denpyoDate='', receiptMonth='';

function dpCell(c){ var s=String(c==null?'':c); if(/^https?:\/\//.test(s)) return '<a href="'+esc(s)+'" target="_blank" rel="noopener" style="color:var(--accent)">рҹ–ј й–ӢгҒҸ</a>'; return esc(s); }
function dpAddDays(ds,n){ var p=(ds||'').split('-'); var dt=(p.length===3)?new Date(+p[0],+p[1]-1,+p[2]):new Date(); dt.setDate(dt.getDate()+n); return dt.getFullYear()+'-'+('0'+(dt.getMonth()+1)).slice(-2)+'-'+('0'+dt.getDate()).slice(-2); }
function dpSubToggle(which){
  function chip(k,label){ return '<div class="chip'+(which===k?' on':'')+'" onclick="dpSwitch(\''+k+'\')">'+label+'</div>'; }
  return '<div class="chips" style="margin-bottom:12px">'+chip('slip','рҹ§ҫ дјқзҘЁпјҲж—Ҙд»ҳеҲҘпјү')+chip('receipt','рҹ’Ү й ҳеҸҺжӣёпјҲжңҲеҲҘпјү')+'</div>';

function drawSlips(r){
  var nav='<div class="toolbar"><button class="btn" onclick="slipDay(-1)">вҖ№ еүҚж—Ҙ</button>'

}
function dpTable(g){
  var d=g.data||{headers:[],rows:[],total:0};
  var meta=d.rows.length+'д»¶'+(d.total?' гғ» иЁҲ'+fmtYen(d.total):'');
  var h='<div class="sec"><div class="sec-t">'+g.title+' <span style="color:var(--dim);font-weight:600;font-size:12px">'+meta+'</span></div>';
  if(!d.rows.length){ return h+'<div class="empty" style="padding:12px 0">вҖ”</div></div>'; }
  h+='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="border-collapse:collapse;min-width:100%;font-size:12px;white-space:nowrap">';
  h+='<tr>'+d.headers.map(function(hd){return '<th style="text-align:left;padding:6px 9px;border-bottom:1px solid var(--line2);color:var(--dim);font-weight:700">'+esc(hd)+'</th>';}).join('')+'</tr>';
  h+=d.rows.map(function(row){ return '<tr>'+row.cells.map(function(c){return '<td style="padding:6px 9px;border-bottom:1px solid var(--line2)">'+dpCell(c)+'</td>';}).join('')+'</tr>'; }).join('');
  return h+'</table></div></div>';
}

    body='<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;font-size:13px">'

      +r.receipts.map(function(x){ return '<tr>'

        +'<td style="padding:7px 10px;border-bottom:1px solid var(--line2)">'+(x.photoUrl?'<a href="'+esc(x.photoUrl)+'" target="_blank" rel="noopener" style="color:var(--accent)">рҹ–ј й ҳеҸҺжӣёгӮ’й–ӢгҒҸ</a>':'<span style="color:var(--dim)">з”»еғҸгҒӘгҒ—</span>')+'</td>'
        +'</tr>'; }).join('')

function renderOps(){
  loading();
  Promise.all([api('getOkuriMode'),api('getCashThresholds'),api('getSeatList'),api('listKurofukuTasks'),api('getCashCheckStatus').catch(function(){return null;})]).then(function(r){
    okuriMode=(r[0]&&r[0].mode)||'driver'; thresholds=(r[1]&&r[1].thresholds)||null; seatList=(r[2]&&r[2].seats)||[]; kfTasks=(r[3]&&r[3].tasks)||[]; cashStatus=(r[4]&&r[4].cash)||null;
    drawOps();
  }).catch(function(){setBody('<div class="empty">иӘӯгҒҝиҫјгҒҝгӮЁгғ©гғј</div>');});
}
function drawOps(){
  var drv=okuriMode!=='jisha';
  // рҹ“Ӣ й»’жңҚгҒёгӮҝгӮ№гӮҜгӮ’йҖҒгӮӢпјҲ18жҷӮгҒ«гҒҫгҒЁгӮҒгҒҰLINEйҖҒдҝЎпјҸ18жҷӮд»ҘйҷҚгҒҜеҚійҖҒдҝЎгҖӮе®ҢдәҶгҒҜи»Қеё«гҒ®гҖҢиҰҒеҜҫеҝңгҖҚгҒ§пјү
  var kfList=(kfTasks||[]).map(function(t){
    return '<div class="lrow"><div class="main"><div class="nm">'+esc(t.title)+'</div><div class="meta">'+(t.sent?'вң… LINEйҖҒдҝЎжёҲгҒҝ':'вҸі 18жҷӮгҒ«гҒҫгҒЁгӮҒгҒҰйҖҒдҝЎ')+(t.by?' гғ»'+esc(t.by):'')+(t.at?' гғ»'+esc(t.at):'')+(t.memo?' гғ»'+esc(t.memo):'')+'</div></div><button class="btn dng sm" onclick="delKfTask(\''+jstr(t.id)+'\')">еүҠйҷӨ</button></div>';
  }).join('')||'<div class="empty" style="padding:14px">жңӘе®ҢдәҶгҒ®гӮҝгӮ№гӮҜгҒҜгҒӮгӮҠгҒҫгҒӣгӮ“</div>';
  var kfSec='<div class="sec"><div class="sec-t">рҹ“Ӣ й»’жңҚгҒёгӮҝгӮ№гӮҜгӮ’йҖҒгӮӢ <span class="sub">18жҷӮгҒ«гҒҫгҒЁгӮҒгҒҰLINEйҖҒдҝЎгғ»18жҷӮд»ҘйҷҚгҒ®иҝҪеҠ гҒҜеҚійҖҒдҝЎгҖӮе®ҢдәҶгҒҜи»Қеё«гҒ®гҖҢиҰҒеҜҫеҝңгҖҚгҒ§гғҒгӮұгғғгғҲгӮ’жҠјгҒҷ</span></div>'
    +'<div class="toolbar"><input class="finput grow" id="kf-title" placeholder="дҫӢпјҡгҒҠеңҹз”ЈгҒ®еңЁеә«гӮ’е…ҘеҠӣгҒҷгӮӢгҒ“гҒЁ" onkeydown="if(event.key===\'Enter\')addKfTask()"><button class="btn pri" onclick="addKfTask()">иҝҪеҠ </button></div>'
    +'<div style="margin-top:10px">'+kfList+'</div></div>';
  var okuri='<div class="sec"><div class="sec-t">рҹҡ— йҖҒгӮҠгғўгғјгғү</div><div class="chips"><div class="chip'+(drv?' on':'')+'" onclick="setOkuri(\'driver\')">рҹҡ— гғүгғ©гӮӨгғҗгғјжүӢй…Қ</div><div class="chip'+(!drv?' on':'')+'" onclick="setOkuri(\'jisha\')">рҹҸ  иҮӘзӨҫйҖҒгӮҠ</div></div><div class="hint">иҮӘзӨҫйҖҒгӮҠгғўгғјгғүдёӯгҒҜгғүгғ©гӮӨгғҗгғјгҒёгҒ®йҖҡзҹҘгӮ’жӯўгӮҒгҒҫгҒҷгҖӮ</div></div>';

  var seatCards=(seatList||[]).map(function(s){
    var st=s.occupied?('рҹҹў '+(s.cust?esc(s.cust)+'ж§ҳ':'зЁјеғҚ')+(s.casts&&s.casts.length?' / '+s.casts.map(esc).join('гҖҒ'):'')):'з©әеёӯ';
    return '<div class="lrow"><div class="main"><div class="nm">'+esc(s.label)+'</div><div class="meta">'+st+'</div></div><button class="btn dng sm" onclick="resetSeat(\''+jstr(s.code)+'\',\''+jstr(s.label)+'\')">еј·еҲ¶гғӘгӮ»гғғгғҲ</button></div>';
  }).join('')||'<div class="empty" style="padding:14px">еёӯгғҮгғјгӮҝгҒӘгҒ—</div>';
  var seats='<div class="sec"><div class="sec-t">рҹӘ‘ еёӯеҚҳдҪҚгҒ®еј·еҲ¶гғӘгӮ»гғғгғҲ <span class="sub">гҒқгҒ®еёӯгҒ®еңЁеёӯгғ»дәҲзҙ„гғ»гӮҝгӮ°зӯүгӮ’гӮҜгғӘгӮў</span></div>'+seatCards+'</div>';

  var resets='<div class="sec"><div class="sec-t">вҷ»пёҸ еҗ„зЁ®гғӘгӮ»гғғгғҲ <span class="sub">еҪ“ж—ҘеҲҶгғ»з ҙеЈҠзҡ„ж“ҚдҪңпјҲзўәиӘҚгҒӮгӮҠпјү</span></div><div class="chips">'+
    '<button class="btn warn" onclick="doReset(\'resetOpeningCheck\',\'й–Ӣеә—гғҒгӮ§гғғгӮҜ\')">й–Ӣеә—гғҒгӮ§гғғгӮҜ</button>'+
    '<button class="btn warn" onclick="doReset(\'resetCashCheck\',\'й–үеә—гғҒгӮ§гғғгӮҜ\')">й–үеә—гғҒгӮ§гғғгӮҜ</button>'+
    '<button class="btn warn" onclick="doReset(\'resetSafeWithdrawalLog\',\'йҮ‘еә«еҮәйҮ‘гғӯгӮ°\')">йҮ‘еә«еҮәйҮ‘гғӯгӮ°</button>'+
    '<button class="btn dng" onclick="doReset(\'resetGunshiSettings\',\'и»Қеё«иЁӯе®ҡ\')">и»Қеё«иЁӯе®ҡ</button>'+
    '<button class="btn dng" onclick="doReset(\'resetGunshiSeating\',\'е…ЁеёӯпјҲи»Қеё«еә§еёӯпјү\')">е…ЁеёӯгғӘгӮ»гғғгғҲ</button>'+
    '</div></div>';

  var other='<div class="sec"><div class="sec-t">рҹ”§ гҒқгҒ®д»–</div><div class="chips">'+
    '<button class="btn" onclick="doAction(\'syncRsrvWithReservations\',\'дәҲзҙ„гӮ’еҗҢжңҹгҒ—гҒҫгҒ—гҒҹ\')">рҹ”„ дәҲзҙ„еҗҢжңҹ</button>'+
    '<button class="btn warn" onclick="doForceLogout()">рҹҡӘ и»Қеё«з«Ҝжң«гӮ’еј·еҲ¶гғӯгӮ°гӮўгӮҰгғҲ</button>'+
    '</div></div>';

  var th=thresholds||{till:{f5:{},f2:{}},safe:{f5:{},f2:{}}};
  function tRow(kind,floor){
    return '<tr><td class="nm">'+(kind==='till'?'гғ¬гӮё':'йҮ‘еә«')+' '+floor.toUpperCase().replace('F','F')+'</td>'+DENOMS.map(function(d){
      var o=((th[kind]||{})[floor]||{})[d.k]||{};
      var minI='<input class="tin" id="ct-'+kind+'-'+floor+'-'+d.k+'-min" value="'+(o.min!=null?o.min:'')+'" placeholder="дёӢйҷҗ">';
      var maxI=kind==='till'?'<input class="tin" id="ct-'+kind+'-'+floor+'-'+d.k+'-max" value="'+(o.max!=null?o.max:'')+'" placeholder="дёҠйҷҗ">':'<span class="no">вҲ’</span>';
      return '<td>'+minI+(kind==='till'?' гҖң '+maxI:'')+'</td>';
    }).join('')+'</tr>';
  }
  var thresholdsSec='<div class="sec"><div class="sec-t">рҹ’° зҸҫйҮ‘гҒ—гҒҚгҒ„еҖӨ <span class="sub">жһҡж•°гҒ®дёӢйҷҗгҖңдёҠйҷҗпјҲзҸҫйҮ‘гғҒгӮ§гғғгӮҜгҒ®иӯҰе‘ҠеҲӨе®ҡпјү</span></div><div class="mtx-wrap"><table class="mtx"><tr><th style="text-align:left">еҢәеҲҶ</th>'+DENOMS.map(function(d){return '<th>'+d.t+'</th>';}).join('')+'</tr>'+tRow('till','f5')+tRow('till','f2')+tRow('safe','f5')+tRow('safe','f2')+'</table></div><button class="btn pri" style="margin-top:10px" onclick="saveThresholds()">рҹ’ҫ гҒ—гҒҚгҒ„еҖӨгӮ’дҝқеӯҳ</button></div>';

  var pinSec='<div class="sec"><div class="sec-t">рҹ”ў и»Қеё« гғһгӮ№гӮҝгғјPIN <span class="sub">еҖӢеҲҘPINжңӘиЁӯе®ҡгҒ®дәәгҒҢдҪҝгҒҶе…ұйҖҡPINпјҲ4жЎҒпјү</span></div><div class="toolbar"><input class="finput" id="mpin" value="'+esc(ST.masterPin||'')+'" maxlength="4" inputmode="numeric" style="width:120px" placeholder="4жЎҒж•°еӯ—"><button class="btn pri" onclick="saveMasterPin()">дҝқеӯҳ</button></div><div class="hint">еҖӢеҲҘPINгҒҜгӮ№гӮҝгғғгғ•гӮҝгғ–гҒ®еҗ„гӮ«гғјгғүгҒ§иЁӯе®ҡгҒ§гҒҚгҒҫгҒҷгҖӮ</div></div>';
  var cpSet=!!(ST&&ST.consolePinSet);
  var consolePinSec='<div class="sec"><div class="sec-t">рҹ”җ з®ЎзҗҶгӮігғігӮҪгғјгғ«PIN <span class="sub">гҒ“гҒ®гӮігғігӮҪгғјгғ«гӮ’й–ӢгҒҸгҒЁгҒҚгҒ®PINпјҲ4гҖң6жЎҒпјү</span></div>'
    +'<div class="toolbar"><input class="finput" id="cpin" maxlength="6" inputmode="numeric" style="width:150px" placeholder="'+(cpSet?'еӨүжӣҙгҒҷгӮӢ4гҖң6жЎҒ':'ж–°иҰҸ4гҖң6жЎҒ')+'"><button class="btn pri" onclick="saveConsolePin()">'+(cpSet?'еӨүжӣҙ':'иЁӯе®ҡ')+'</button>'+(cpSet?'<button class="btn dng" onclick="clearConsolePin()">и§ЈйҷӨ</button>':'')+'</div>'
    +'<div class="hint">'+(cpSet?'вң… иЁӯе®ҡжёҲгҒҝгҖӮж¬ЎеӣһгҒӢгӮүQRгҒ®д»ЈгӮҸгӮҠгҒ«гҒ“гҒ®PINгҒ§гӮігғігӮҪгғјгғ«гӮ’й–ӢгҒ‘гҒҫгҒҷгҖӮ':'жңӘиЁӯе®ҡпјҲд»ҠгҒҜQRгғӯгӮ°гӮӨгғіпјүгҖӮиЁӯе®ҡгҒҷгӮӢгҒЁQRгҒ®д»ЈгӮҸгӮҠгҒ«PINгҒ§й–ӢгҒ‘гӮӢгӮҲгҒҶгҒ«гҒӘгӮҠгҒҫгҒҷгҖӮ')+'</div></div>';
  var cashApproveSec=(function(){
    var c=cashStatus;
    var head='<div class="sec"><div class="sec-t">рҹҢҷ й–үеә—гғҒгӮ§гғғгӮҜгҒ®жүҝиӘҚ <span class="sub">й»’жңҚгҒҢжҸҗеҮәгҒ—гҒҹзҸҫйҮ‘з…§еҗҲгӮ’з®ЎзҗҶиҖ…гҒҢжүҝиӘҚпјҲжүҝиӘҚгҒ§йҖҖеӢӨгӮІгғјгғҲи§ЈйҷӨпјү</span></div>';
    if(!c||!c.reportSubmitted){
      return head+'<div class="empty" style="padding:14px">жң¬ж—Ҙ'+(c&&c.dateKey?'пјҲ'+esc(c.dateKey)+'пјү':'')+'гҒ®й–үеә—гғҒгӮ§гғғгӮҜгҒҜгҒҫгҒ й»’жңҚгҒӢгӮүжҸҗеҮәгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“гҖӮ</div></div>';
    }
    var yen=function(n){return 'ВҘ'+Number(n||0).toLocaleString();};
    function row(l,v,col){ return '<div class="lrow" style="padding:6px 2px"><div class="main"><div class="meta">'+l+'</div></div><div style="font-weight:800;color:'+(col||'var(--txt)')+'">'+v+'</div></div>'; }
    var rows='';
    if(c.openingSubmitted){
      rows+=row('рҹҢ… гӮ№гӮҝгғјгғҲ',yen(c.openingTotal));
      rows+=row('пјӢ зҸҫйҮ‘еЈІдёҠ',yen(c.cashSalesInput),'#7be0a8');
      rows+=row('пјҚ дјқзҘЁ еҮәйҮ‘',yen(c.slipTotal),'#e0a060');
      rows+=row('пјқ ж®ӢгӮӢгҒҜгҒҡ',yen(c.expectedRemain));
      rows+=row('е®ҹжё¬пјҲ4иўӢпјү',yen(c.actualTotal));
      var d=Number(c.diff||0), ok=!!c.within;
      rows+=row('е·®йЎҚ',(ok?'вң… ':'вҡ пёҸ ')+yen(Math.abs(d))+(ok?'пјҲиЁұе®№еҶ…пјү':(d>0?' и¶ігӮҠгҒӘгҒ„':' еӨҡгҒ„')),ok?'#66cc88':'#e06666');
    } else {
      rows+='<div class="empty" style="padding:10px;color:#e0a060">вҡ пёҸ й–Ӣеә—гҒ®зҸҫйҮ‘гҒҢжңӘжҸҗеҮәгҒ®гҒҹгӮҒз…§еҗҲгҒ§гҒҚгҒҰгҒ„гҒҫгҒӣгӮ“пјҲжүҝиӘҚеүҚгҒ«й–Ӣеә—гғҒгӮ§гғғгӮҜгҒ®жҸҗеҮәгҒҢеҝ…иҰҒпјү</div>';
    }
    var slips=(c.slipDetails||[]);
    var slipHtml=slips.length?('<div class="meta" style="margin-top:8px;line-height:1.6">дјқзҘЁ '+slips.length+'жһҡпјҡ'+slips.map(function(x){return esc((x.category||'гҒқгҒ®д»–')+(x.payee?'/'+x.payee:'')+' ')+yen(x.amount);}).join('гҖҒ')+'</div>'):'';
    var body='<div class="lrow" style="padding:6px 2px"><div class="main"><div class="nm">е ұе‘ҠиҖ… '+esc(c.reporterName)+'</div><div class="meta">еҜҫиұЎж—Ҙ '+esc(c.dateKey)+'</div></div></div>'+rows+slipHtml;
    if(c.approved){
      return head+body+'<div style="margin-top:12px;padding:11px 13px;border-radius:10px;background:rgba(102,204,136,.14);color:#8fe0ab;font-weight:800">вң… жүҝиӘҚжёҲгҒҝгҖҖжүҝиӘҚиҖ… '+esc(c.approver)+'пјҲ'+esc(c.approvedAt)+'пјүпјҸй»’жңҚгҒ®йҖҖеӢӨOK</div></div>';
    }
    var btn=c.openingSubmitted
      ?'<button class="btn ok" style="width:100%;margin-top:12px;padding:12px;font-size:15px" onclick="approveCashFromConsole()">вң… гҒ“гҒ®еҶ…е®№гҒ§жүҝиӘҚгҒҷгӮӢ</button>'
      :'<div class="hint" style="margin-top:10px">й–Ӣеә—гғҒгӮ§гғғгӮҜгҒҢжҸҗеҮәгҒ•гӮҢгӮӢгҒЁжүҝиӘҚгҒ§гҒҚгӮӢгӮҲгҒҶгҒ«гҒӘгӮҠгҒҫгҒҷгҖӮ</div>';
    return head+body+btn+'</div>';
  })();
  setBody(cashApproveSec+kfSec+okuri+pinSec+consolePinSec+seats+resets+thresholdsSec+other);
}
function approveCashFromConsole(){
  var c=cashStatus; if(!c){toast('гғҮгғјгӮҝгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“',true);return;}
  if(!confirm('жң¬ж—ҘпјҲ'+c.dateKey+'пјүгҒ®й–үеә—гғҒгӮ§гғғгӮҜгӮ’жүҝиӘҚгҒ—гҒҫгҒҷгҖӮ\nй»’жңҚгҒ®йҖҖеӢӨгӮІгғјгғҲгҒҢи§ЈйҷӨгҒ•гӮҢгҖҒ10еҲҶеҫҢгҒ«и»Қеё«з«Ҝжң«гҒҢиҮӘеӢ•гғӯгӮ°гӮўгӮҰгғҲгҒ—гҒҫгҒҷгҖӮ\nгӮҲгӮҚгҒ—гҒ„гҒ§гҒҷгҒӢпјҹ'))return;
  api('approveCashCheck',{dateKey:c.dateKey}).then(function(r){ if(res(r,'жүҝиӘҚгҒ—гҒҫгҒ—гҒҹпјҲй»’жңҚгҒ®йҖҖеӢӨOKпјү'))renderOps(); }).catch(function(){toast('йҖҡдҝЎгӮЁгғ©гғј',true);});
}
function addKfTask(){
  var el=document.getElementById('kf-title'); var t=(el&&el.value||'').trim();
  if(!t){toast('гӮҝгӮ№гӮҜеҶ…е®№гӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„',true);return;}
  api('addKurofukuTask',{title:t}).then(function(r){ if(res(r,(r&&r.sent)?'иҝҪеҠ пјӢй»’жңҚLINEгҒ«йҖҒдҝЎгҒ—гҒҫгҒ—гҒҹ':'иҝҪеҠ гҒ—гҒҫгҒ—гҒҹпјҲ18жҷӮгҒ«гҒҫгҒЁгӮҒгҒҰйҖҒдҝЎпјү')){ if(el)el.value=''; renderOps(); } }).catch(function(){toast('йҖҡдҝЎгӮЁгғ©гғј',true);});
}
function delKfTask(id){
  if(!confirm('гҒ“гҒ®гӮҝгӮ№гӮҜгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹпјҲи»Қеё«гҒ®гҖҢиҰҒеҜҫеҝңгҖҚгҒӢгӮүгӮӮж¶ҲгҒҲгҒҫгҒҷпјү'))return;
  api('deleteKurofukuTask',{id:id}).then(function(r){ if(res(r,'еүҠйҷӨгҒ—гҒҫгҒ—гҒҹ'))renderOps(); }).catch(function(){toast('йҖҡдҝЎгӮЁгғ©гғј',true);});
}
function setOkuri(mode){ if(okuriMode===mode)return; if(!confirm(mode==='jisha'?'иҮӘзӨҫйҖҒгӮҠгғўгғјгғүгҒ«еҲҮжӣҝпјҲгғүгғ©гӮӨгғҗгғјйҖҡзҹҘгӮ’жӯўгӮҒгҒҫгҒҷпјү':'гғүгғ©гӮӨгғҗгғјжүӢй…ҚгғўгғјгғүгҒ«еҲҮжӣҝ'))return; api('setOkuriMode',{mode:mode}).then(function(r){ if(res(r,'йҖҒгӮҠгғўгғјгғүгӮ’еӨүжӣҙгҒ—гҒҫгҒ—гҒҹ')){okuriMode=(r&&r.mode)||mode;drawOps();} }); }
function resetSeat(code,label){ if(!confirm(label+' гӮ’еј·еҲ¶гғӘгӮ»гғғгғҲгҒ—гҒҫгҒҷгҖӮгҒ“гҒ®еёӯгҒ®еңЁеёӯгғ»дәҲзҙ„гғ»гӮҝгӮ°зӯүгҒҢгӮҜгғӘгӮўгҒ•гӮҢгҒҫгҒҷгҖӮгӮҲгӮҚгҒ—гҒ„гҒ§гҒҷгҒӢпјҹ'))return; api('resetSeat',{seatCode:code}).then(function(r){ if(res(r,label+' гӮ’гғӘгӮ»гғғгғҲгҒ—гҒҫгҒ—гҒҹ'))renderOps(); }); }
function doReset(action,label){ if(!confirm('гҖҗ'+label+'гҖ‘гӮ’жң¬ж—ҘеҲҶгғӘгӮ»гғғгғҲгҒ—гҒҫгҒҷгҖӮе…ғгҒ«жҲ»гҒӣгҒҫгҒӣгӮ“гҖӮе®ҹиЎҢгҒ—гҒҫгҒҷгҒӢпјҹ'))return; api(action).then(function(r){ res(r,label+' гӮ’гғӘгӮ»гғғгғҲгҒ—гҒҫгҒ—гҒҹ'); }); }
function doAction(action,okmsg){ api(action).then(function(r){ res(r,okmsg); }); }

function addHoliday(){
  var f=((document.getElementById('hd-from')||{}).value||'');

  if(t<f){ toast('зөӮдәҶж—ҘгҒҜй–Ӣе§Ӣж—Ҙд»ҘйҷҚгҒ«гҒ—гҒҰгҒҸгҒ гҒ•гҒ„',true); return; }
  var add=[], cur=new Date(f+'T00:00:00'), end=new Date(t+'T00:00:00'), guard=0;
  while(cur<=end && guard++<400){ add.push({date:hdFmt(cur), label:label}); cur.setDate(cur.getDate()+1); }
  var map={}; (holidays||[]).forEach(function(h){map[h.date]=h;}); add.forEach(function(h){map[h.date]=h;});
  var merged=Object.keys(map).map(function(k){return map[k];});
  api('saveHolidays',{holidays:merged}).then(function(r){ if(res(r,add.length>1?add.length+'ж—ҘгҒ¶гӮ“гҒ®еә—дј‘ж—ҘгӮ’зҷ»йҢІгҒ—гҒҫгҒ—гҒҹ':'еә—дј‘ж—ҘгӮ’зҷ»йҢІгҒ—гҒҫгҒ—гҒҹ')){ holidays=(r&&r.holidays)||merged; var lb=document.getElementById('hd-label'); if(lb)lb.value=''; drawHolidays(); } }).catch(function(){toast('йҖҡдҝЎгӮЁгғ©гғј',true);});

function delHoliday(date){
