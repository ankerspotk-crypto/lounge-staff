/* --- 🎂 誕生日バック（キャスト×月：指定した来店日レンジだけ小計バック率を上書き） --- */
var bdayCasts=[];
function renderBday(){
  if(!IS_GAS){ setBody(paySubToggle('bday')+'<div class="empty">（ローカルではプレビュー不可・本番でご確認ください）</div>'); return; }
  loading();
  gsr('adminGetBirthdayBackRange',USER_ID).then(function(r){ if(!res(r))return; drawBday(r); }).catch(function(){setBody(paySubToggle('bday')+'<div class="empty">読み込みエラー</div>');});
}
function drawBday(r){
  bdayCasts=r.casts||[];
  var nameSet={},bdNames=[];
  function addName(n){ n=String(n||'').trim(); if(n&&!nameSet[n]){nameSet[n]=1;bdNames.push(n);} }
  (r.casts||[]).forEach(addName);
  (r.months||[]).forEach(function(m){ m.settings.forEach(function(x){addName(x.name);}); m.bdayCasts.forEach(function(c){addName(c.name);}); });
  bdNames.sort();
  var castOpts='<option value="">— キャストを選択 —</option>'+bdNames.map(function(n){return '<option value="'+esc(n)+'">'+esc(n)+'</option>';}).join('');
  var fld='display:flex;flex-direction:column;gap:5px;font-size:11px;color:var(--dim);font-weight:700';
  var remBar='<div class="toolbar" style="margin-bottom:10px"><span class="cnt">今月誕生日で未設定のキャストを黒服の要対応へ</span><button class="btn" onclick="runBdayReminder()">🔔 今すぐリマインド</button></div>';
  var form='<div class="sec"><div class="sec-t">🎂 誕生日バック週を追加 / 変更</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end">'
    +'<label style="'+fld+'">キャスト<select class="finput" id="bd_name" style="width:170px">'+castOpts+'</select></label>'
    +'<label style="'+fld+'">開始日<input class="finput" id="bd_s" type="date" style="width:180px"></label>'
    +'<label style="'+fld+'">終了日<input class="finput" id="bd_e" type="date" style="width:180px"></label>'
    +'<label style="'+fld+'">率(%)<input class="finput" id="bd_r" type="number" value="30" min="0" max="100" inputmode="numeric" style="width:90px"></label>'
    +'<button class="btn pri" onclick="saveBday()" style="align-self:flex-end">保存</button></div>'
    +'<div class="hint">対象月内の<b>来店日</b>がこのレンジに入る担当売上ぶんだけ小計バック率を上書き（通常は倍率10/15/20%）。合計は必ずTRUST担当小計に一致。<b>月またぎは自動で月ごとに分割</b>（月末で一旦締め→翌月は続き）。下の🎂候補の「設定」を押すと誕生日週が自動入力されます。</div></div>';
  var sections=(r.months||[]).filter(function(m){return m.settings.length||m.bdayCasts.length;}).map(function(m){
    var moLabel=esc(m.mk)+(m.isCurrent?' <span style="background:#2a1a4a;color:#d8b8ff;border:1px solid #7a5ac0;border-radius:10px;padding:1px 8px;font-size:11px;margin-left:6px">今月</span>':'');
    var nudge='';
    if(m.bdayCasts.length){
      nudge='<div style="font-size:12px;color:var(--sub);margin:2px 0 10px;line-height:2.1">🎂 誕生日: '+m.bdayCasts.map(function(c){
        if(c.hasBack) return '<span style="background:#0f1a14;border:1px solid #2a6a44;color:#8fe0b0;border-radius:12px;padding:3px 9px;font-size:12px">'+esc(c.name)+'('+esc(c.mmdd)+') 設定済</span>';
        return '<span style="background:#241428;border:1px solid #5a2a5a;color:#e6b0d6;border-radius:12px;padding:3px 6px 3px 9px;font-size:12px">'+esc(c.name)+'('+esc(c.mmdd)+') 未設定 <button class="btn sm" style="padding:1px 7px;font-size:11px" onclick=\'prefillBday('+JSON.stringify(c.name)+','+JSON.stringify(m.mk)+','+JSON.stringify(c.mmdd)+')\'>設定</button></span>';
      }).join(' ')+'</div>';
    }
    var rows=m.settings.map(function(x){
      var cl=x.contPrev?'<span style="color:#c9a0ff" title="前月から続く（月またぎ）">◀続</span> ':'';
      var cr=x.contNext?' <span style="color:#c9a0ff" title="翌月へ続く（月またぎ）">続▶</span>':'';
      var st=x.status||'承認済';
      var badge=bdayStatusBadge(st);
      var reasonLine=(st==='差戻'&&x.reason)?'<div style="font-size:11px;color:#ff9aa0;margin-top:3px">差戻理由: '+esc(x.reason)+'</div>':'';
      var appLine=(st==='申請中'&&x.applied)?'<div style="font-size:11px;color:#8aabcc;margin-top:3px">申請: '+esc(x.applied)+'</div>':'';
      var actions;
      if(st==='申請中'){
        actions='<button class="btn sm pri" style="padding:2px 9px;font-size:11px" onclick=\'approveBday('+JSON.stringify(x.name)+')\'>✅承認</button> '
          +'<button class="btn sm" style="padding:2px 9px;font-size:11px" onclick=\'sendbackBday('+JSON.stringify(x.name)+')\'>↩差し戻し</button>';
      } else {
        actions='<button class="btn sm" style="padding:2px 8px;font-size:11px" onclick=\'editBday('+JSON.stringify(x.name)+','+JSON.stringify(x.start)+','+JSON.stringify(x.end)+','+(x.rate||30)+')\'>✎</button> '
          +'<button class="btn sm dng" style="padding:2px 8px;font-size:11px" onclick=\'clearBday('+JSON.stringify(x.name)+','+JSON.stringify(m.mk)+')\'>解除</button>';
      }
      return '<tr><td class="nm">'+esc(x.name)+' '+badge+appLine+reasonLine+'</td>'
        +'<td style="text-align:center">'+cl+esc(x.start)+' 〜 '+esc(x.end)+cr+'</td>'
        +'<td style="text-align:center;color:#c9a0ff;font-weight:800">'+(x.rate||0)+'%</td>'
        +'<td style="text-align:center;white-space:nowrap">'+actions+'</td></tr>';
    }).join('');
    var pendCnt=m.settings.filter(function(x){return (x.status||'承認済')==='申請中';}).length;
    var pendNote=pendCnt?'<div style="font-size:11px;color:#e0d07e;margin:0 0 8px">⏳ 承認待ち '+pendCnt+'件（承認するまで給与バックには反映されません）</div>':'';
    var tbl=m.settings.length?pendNote+'<div class="mtx-wrap" style="overflow-x:auto"><table class="mtx" style="font-size:12px"><thead><tr><th style="text-align:left">キャスト</th><th>期間</th><th>率</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>':'';
    return '<div class="sec"><div class="sec-t">'+moLabel+'</div>'+nudge+tbl+'</div>';
  }).join('')||'<div class="empty">前後6ヶ月に誕生日バック設定・誕生日キャストはありません（スタッフの誕生日は👥スタッフの「✎個別条件」で登録）</div>';
  setBody(paySubToggle('bday')+remBar+form+sections);
}
function bdayStatusBadge(st){
  var m={
    '承認済':{t:'承認済',bg:'#0f2a18',bd:'#1f5a34',c:'#7ee0a0'},
    '申請中':{t:'承認待ち',bg:'#2a2410',bd:'#5a4e1f',c:'#e0d07e'},
    '差戻':{t:'差戻',bg:'#2a1214',bd:'#5a2226',c:'#ff9aa0'}
  }[st]||{t:esc(st),bg:'#141b2a',bd:'#2a3a55',c:'#8aabcc'};
  return '<span style="display:inline-block;font-size:10px;font-weight:700;padding:1px 8px;border-radius:999px;background:'+m.bg+';border:1px solid '+m.bd+';color:'+m.c+'">'+m.t+'</span>';
}
function approveBday(name){
  if(!confirm('【'+name+'】の誕生日週間を承認しますか？\n承認するとこの期間の担当売上に誕生日バック率が適用されます。')) return;

  gsr('adminApproveBirthdayWeek',USER_ID,name).then(function(r){
    if(!r||r.ok===false){ toast((r&&r.error)||'承認に失敗しました',true); renderBday(); return; }
    toast(name+' の誕生日週間を承認しました（'+esc(r.start)+'〜'+esc(r.end)+'）');
    renderBday();
  }).catch(function(){ toast('承認に失敗しました',true); renderBday(); });
}
function sendbackBday(name){
  var reason=prompt('【'+name+'】の誕生日週間を差し戻します。\n差し戻し理由（本人に通知されます）:','');
  if(reason===null) return;
  loading();
  gsr('adminSendbackBirthdayWeek',USER_ID,name,String(reason||'').trim()).then(function(r){
    if(!r||r.ok===false){ toast((r&&r.error)||'差し戻しに失敗しました',true); renderBday(); return; }
    toast(name+' の誕生日週間を差し戻しました');
    renderBday();
  }).catch(function(){ toast('差し戻しに失敗しました',true); renderBday(); });

function prefillBday(name,mk,mmdd){
  document.getElementById('bd_name').value=name;
  var y=parseInt(String(mk).slice(0,4),10);
  var p=String(mmdd).split(/[^\d]+/).filter(Boolean),mo,da;
  if(p.length>=3&&p[0].length===4){mo=+p[1];da=+p[2];}else{mo=+p[0];da=+p[1];}
  if(mo>=1&&da>=1){
    var bd=new Date(y,mo-1,da);
    var f=function(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);};
    var s=new Date(bd);s.setDate(s.getDate()-3); var e=new Date(bd);e.setDate(e.getDate()+3);
    document.getElementById('bd_s').value=f(s); document.getElementById('bd_e').value=f(e);
  }
  document.getElementById('bd_r').value=30;
  document.getElementById('bd_name').scrollIntoView({behavior:'smooth',block:'center'});
}
function editBday(name,s,e,rate){
  document.getElementById('bd_name').value=name;
  document.getElementById('bd_s').value=s;
  document.getElementById('bd_e').value=e;
  document.getElementById('bd_r').value=rate;
  document.getElementById('bd_name').scrollIntoView({behavior:'smooth',block:'center'});
}
function saveBday(){
  var name=(document.getElementById('bd_name').value||'').trim();

  if(s>e){ toast('開始日が終了日より後です',true); return; }
  loading();

    if(!rr||rr.ok===false){ toast((rr&&rr.error)||'保存に失敗しました',true); renderBday(); return; }
    toast(rr.spans ? (name+' の誕生日バックを保存（月またぎ→'+rr.months.join(' / ')+'に自動分割）') : (name+' の誕生日バックを保存しました'));
    renderBday();
  }).catch(function(){ toast('保存に失敗しました',true); renderBday(); });
}
function clearBday(name,mk){
  if(!confirm('【'+name+'】'+mk+' の誕生日バック設定を解除しますか？')) return;

}

/* ===== 🧾 伝票・領収書 ===== */
var denpyoSub='slip', denpyoDate='', receiptMonth='';
function fmtYen(n){ return '¥'+(Number(n)||0).toLocaleString('ja-JP'); }
function dpCell(c){ var s=String(c==null?'':c); if(/^https?:\/\//.test(s)) return '<a href="'+esc(s)+'" target="_blank" rel="noopener" style="color:var(--accent)">🖼 開く</a>'; return esc(s); }
function dpAddDays(ds,n){ var p=(ds||'').split('-'); var dt=(p.length===3)?new Date(+p[0],+p[1]-1,+p[2]):new Date(); dt.setDate(dt.getDate()+n); return dt.getFullYear()+'-'+('0'+(dt.getMonth()+1)).slice(-2)+'-'+('0'+dt.getDate()).slice(-2); }
function dpSubToggle(which){
  function chip(k,label){ return '<div class="chip'+(which===k?' on':'')+'" onclick="dpSwitch(\''+k+'\')">'+label+'</div>'; }
  return '<div class="chips" style="margin-bottom:12px">'+chip('slip','🧾 伝票（日付別）')+chip('receipt','💇 領収書（月別）')+'</div>';
}
function renderDenpyo(){ if(!IS_GAS){ setBody(dpSubToggle(denpyoSub)+'<div class="empty">（ローカルではプレビュー不可・本番でご確認ください）</div>'); return; } if(denpyoSub==='receipt') loadReceipts(); else loadSlips(); }
function dpSwitch(k){ denpyoSub=k; renderDenpyo(); }
/* --- 伝票（日付別） --- */
function loadSlips(){ loading(); gsr('adminGetDenpyoDay',USER_ID,denpyoDate).then(function(r){ if(!res(r))return; denpyoDate=r.date; drawSlips(r); }).catch(function(){setBody(dpSubToggle('slip')+'<div class="empty">読み込みエラー</div>');}); }
function drawSlips(r){
  var nav='<div class="toolbar"><button class="btn" onclick="slipDay(-1)">‹ 前日</button>'
    +'<input class="finput" id="dpd" type="date" value="'+esc(r.date)+'" onchange="slipPick()" style="width:150px">'
    +'<button class="btn" onclick="slipDay(1)">翌日 ›</button><button class="btn" onclick="slipToday()">今日</button></div>';
  var any=r.groups.some(function(g){return g.data.rows.length;});
  var body=r.groups.map(dpTable).join('');
  setBody(dpSubToggle('slip')+nav+(any?'':'<div class="hint" style="margin:2px 0 12px">この営業日に登録された伝票はありません。日付を変えてご確認ください。</div>')+body);
}
function dpTable(g){
  var d=g.data||{headers:[],rows:[],total:0};
  var meta=d.rows.length+'件'+(d.total?' ・ 計'+fmtYen(d.total):'');
  var h='<div class="sec"><div class="sec-t">'+g.title+' <span style="color:var(--dim);font-weight:600;font-size:12px">'+meta+'</span></div>';
  if(!d.rows.length){ return h+'<div class="empty" style="padding:12px 0">—</div></div>'; }
  h+='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="border-collapse:collapse;min-width:100%;font-size:12px;white-space:nowrap">';
  h+='<tr>'+d.headers.map(function(hd){return '<th style="text-align:left;padding:6px 9px;border-bottom:1px solid var(--line2);color:var(--dim);font-weight:700">'+esc(hd)+'</th>';}).join('')+'</tr>';
  h+=d.rows.map(function(row){ return '<tr>'+row.cells.map(function(c){return '<td style="padding:6px 9px;border-bottom:1px solid var(--line2)">'+dpCell(c)+'</td>';}).join('')+'</tr>'; }).join('');
  return h+'</table></div></div>';
}
function slipDay(n){ denpyoDate=dpAddDays(denpyoDate,n); renderDenpyo(); }
function slipPick(){ var v=document.getElementById('dpd').value; if(v){denpyoDate=v;renderDenpyo();} }
function slipToday(){ denpyoDate=''; renderDenpyo(); }
/* --- 領収書（月別・全キャスト） --- */
function loadReceipts(){ loading(); gsr('adminGetHairReceiptsMonth',USER_ID,receiptMonth).then(function(r){ if(!res(r))return; receiptMonth=r.month; drawReceipts(r); }).catch(function(){setBody(dpSubToggle('receipt')+'<div class="empty">読み込みエラー</div>');}); }

        +'<td style="padding:7px 10px;border-bottom:1px solid var(--line2)">'+(x.photoUrl?'<a href="'+esc(x.photoUrl)+'" target="_blank" rel="noopener" style="color:var(--accent)">🖼 領収書を開く</a>':'<span style="color:var(--dim)">画像なし</span>')+'</td>'
        +'</tr>'; }).join('')

/* ===== ⚙️ 運営 ===== */
var okuriMode=null, thresholds=null, seatList=null, kfTasks=[], cashStatus=null;
function renderOps(){

  Promise.all([api('getOkuriMode'),api('getCashThresholds'),api('getSeatList'),api('listKurofukuTasks'),api('getCashCheckStatus').catch(function(){return null;})]).then(function(r){
    okuriMode=(r[0]&&r[0].mode)||'driver'; thresholds=(r[1]&&r[1].thresholds)||null; seatList=(r[2]&&r[2].seats)||[]; kfTasks=(r[3]&&r[3].tasks)||[]; cashStatus=(r[4]&&r[4].cash)||null;

    // メモは軍師のタスクカードで改行を保ったまま出る＋LINEにも同じ文面が乗る＝手順はここに書けばいい

  var seatCards=(seatList||[]).map(function(s){

    return '<div class="lrow"><div class="main"><div class="nm">'+esc(s.label)+'</div><div class="meta">'+st+'</div></div><button class="btn dng sm" onclick="resetSeat(\''+jstr(s.code)+'\',\''+jstr(s.label)+'\')">強制リセット</button></div>';
  }).join('')||'<div class="empty" style="padding:14px">席データなし</div>';
  var seats='<div class="sec"><div class="sec-t">🪑 席単位の強制リセット <span class="sub">その席の在席・予約・タグ等をクリア</span></div>'+seatCards+'</div>';

  var resets='<div class="sec"><div class="sec-t">♻️ 各種リセット <span class="sub">当日分・破壊的操作（確認あり）</span></div><div class="chips">'+
    '<button class="btn warn" onclick="doReset(\'resetOpeningCheck\',\'開店チェック\')">開店チェック</button>'+
    '<button class="btn warn" onclick="doReset(\'resetCashCheck\',\'閉店チェック\')">閉店チェック</button>'+
    '<button class="btn warn" onclick="doReset(\'resetSafeWithdrawalLog\',\'金庫出金ログ\')">金庫出金ログ</button>'+
    '<button class="btn dng" onclick="doReset(\'resetGunshiSettings\',\'軍師設定\')">軍師設定</button>'+
    '<button class="btn dng" onclick="doReset(\'resetGunshiSeating\',\'全席（軍師座席）\')">全席リセット</button>'+

    '</div></div>';

  var th=thresholds||{till:{f5:{},f2:{}},safe:{f5:{},f2:{}}};
  function tRow(kind,floor){

      var o=((th[kind]||{})[floor]||{})[d.k]||{};
      var minI='<input class="tin" id="ct-'+kind+'-'+floor+'-'+d.k+'-min" value="'+(o.min!=null?o.min:'')+'" placeholder="下限">';
      var maxI=kind==='till'?'<input class="tin" id="ct-'+kind+'-'+floor+'-'+d.k+'-max" value="'+(o.max!=null?o.max:'')+'" placeholder="上限">':'<span class="no">−</span>';

  }
  var thresholdsSec='<div class="sec"><div class="sec-t">💰 現金しきい値 <span class="sub">枚数の下限〜上限（現金チェックの警告判定）</span></div><div class="mtx-wrap"><table class="mtx"><tr><th style="text-align:left">区分</th>'+DENOMS.map(function(d){return '<th>'+d.t+'</th>';}).join('')+'</tr>'+tRow('till','f5')+tRow('till','f2')+tRow('safe','f5')+tRow('safe','f2')+'</table></div><button class="btn pri" style="margin-top:10px" onclick="saveThresholds()">💾 しきい値を保存</button></div>';

  var pinSec='<div class="sec"><div class="sec-t">🔢 軍師 マスターPIN <span class="sub">個別PIN未設定の人が使う共通PIN（4桁）</span></div><div class="toolbar"><input class="finput" id="mpin" value="'+esc(ST.masterPin||'')+'" maxlength="4" inputmode="numeric" style="width:120px" placeholder="4桁数字"><button class="btn pri" onclick="saveMasterPin()">保存</button></div><div class="hint">個別PINはスタッフタブの各カードで設定できます。</div></div>';
  var cpSet=!!(ST&&ST.consolePinSet);
  var consolePinSec='<div class="sec"><div class="sec-t">🔐 管理コンソールPIN <span class="sub">このコンソールを開くときのPIN（4〜6桁）</span></div>'
    +'<div class="toolbar"><input class="finput" id="cpin" maxlength="6" inputmode="numeric" style="width:150px" placeholder="'+(cpSet?'変更する4〜6桁':'新規4〜6桁')+'"><button class="btn pri" onclick="saveConsolePin()">'+(cpSet?'変更':'設定')+'</button>'+(cpSet?'<button class="btn dng" onclick="clearConsolePin()">解除</button>':'')+'</div>'
    +'<div class="hint">'+(cpSet?'✅ 設定済み。次回からQRの代わりにこのPINでコンソールを開けます。':'未設定（今はQRログイン）。設定するとQRの代わりにPINで開けるようになります。')+'</div></div>';
  var cashApproveSec=(function(){
    var c=cashStatus;
    var head='<div class="sec"><div class="sec-t">🌙 閉店チェックの承認 <span class="sub">黒服が提出した現金照合を管理者が承認（承認で退勤ゲート解除）</span></div>';
    if(!c||!c.reportSubmitted){
      return head+'<div class="empty" style="padding:14px">本日'+(c&&c.dateKey?'（'+esc(c.dateKey)+'）':'')+'の閉店チェックはまだ黒服から提出されていません。</div></div>';
    }
    var yen=function(n){return '¥'+Number(n||0).toLocaleString();};
    function row(l,v,col){ return '<div class="lrow" style="padding:6px 2px"><div class="main"><div class="meta">'+l+'</div></div><div style="font-weight:800;color:'+(col||'var(--txt)')+'">'+v+'</div></div>'; }
    var rows='';
    if(c.openingSubmitted){
      rows+=row('🌅 スタート',yen(c.openingTotal));
      rows+=row('＋ 現金売上',yen(c.cashSalesInput),'#7be0a8');
      rows+=row('－ 伝票 出金',yen(c.slipTotal),'#e0a060');
      rows+=row('＝ 残るはず',yen(c.expectedRemain));
      rows+=row('実測（4袋）',yen(c.actualTotal));
      var d=Number(c.diff||0), ok=!!c.within;
      rows+=row('差額',(ok?'✅ ':'⚠️ ')+yen(Math.abs(d))+(ok?'（許容内）':(d>0?' 足りない':' 多い')),ok?'#66cc88':'#e06666');
    } else {
      rows+='<div class="empty" style="padding:10px;color:#e0a060">⚠️ 開店の現金が未提出のため照合できていません（承認前に開店チェックの提出が必要）</div>';
    }
    var slips=(c.slipDetails||[]);
    var slipHtml=slips.length?('<div class="meta" style="margin-top:8px;line-height:1.6">伝票 '+slips.length+'枚：'+slips.map(function(x){return esc((x.category||'その他')+(x.payee?'/'+x.payee:'')+' ')+yen(x.amount);}).join('、')+'</div>'):'';
    var body='<div class="lrow" style="padding:6px 2px"><div class="main"><div class="nm">報告者 '+esc(c.reporterName)+'</div><div class="meta">対象日 '+esc(c.dateKey)+'</div></div></div>'+rows+slipHtml;
    if(c.approved){
      return head+body+'<div style="margin-top:12px;padding:11px 13px;border-radius:10px;background:rgba(102,204,136,.14);color:#8fe0ab;font-weight:800">✅ 承認済み　承認者 '+esc(c.approver)+'（'+esc(c.approvedAt)+'）／黒服の退勤OK</div></div>';
    }
    var btn=c.openingSubmitted
      ?'<button class="btn ok" style="width:100%;margin-top:12px;padding:12px;font-size:15px" onclick="approveCashFromConsole()">✅ この内容で承認する</button>'
      :'<div class="hint" style="margin-top:10px">開店チェックが提出されると承認できるようになります。</div>';
    return head+body+btn+'</div>';
  })();
  setBody(cashApproveSec+kfSec+okuri+pinSec+consolePinSec+seats+resets+thresholdsSec+other);
}
function approveCashFromConsole(){
  var c=cashStatus; if(!c){toast('データがありません',true);return;}
  if(!confirm('本日（'+c.dateKey+'）の閉店チェックを承認します。\n黒服の退勤ゲートが解除され、10分後に軍師端末が自動ログアウトします。\nよろしいですか？'))return;
  api('approveCashCheck',{dateKey:c.dateKey}).then(function(r){ if(res(r,'承認しました（黒服の退勤OK）'))renderOps(); }).catch(function(){toast('通信エラー',true);});
}
function addKfTask(){
  var el=document.getElementById('kf-title'); var t=(el&&el.value||'').trim();
  var me=document.getElementById('kf-memo'); var m=(me&&me.value||'').trim();
  if(!t){toast('タスク内容を入力してください',true);return;}
  api('addKurofukuTask',{title:t,memo:m}).then(function(r){ if(res(r,(r&&r.sent)?'追加＋黒服LINEに送信しました':'追加しました（18時にまとめて送信）')){ if(el)el.value=''; if(me)me.value=''; renderOps(); } }).catch(function(){toast('通信エラー',true);});
}
function delKfTask(id){
  if(!confirm('このタスクを削除しますか？（軍師の「要対応」からも消えます）'))return;
  api('deleteKurofukuTask',{id:id}).then(function(r){ if(res(r,'削除しました'))renderOps(); }).catch(function(){toast('通信エラー',true);});
}
function setOkuri(mode){ if(okuriMode===mode)return; if(!confirm(mode==='jisha'?'自社送りモードに切替（ドライバー通知を止めます）':'ドライバー手配モードに切替'))return; api('setOkuriMode',{mode:mode}).then(function(r){ if(res(r,'送りモードを変更しました')){okuriMode=(r&&r.mode)||mode;drawOps();} }); }
function resetSeat(code,label){ if(!confirm(label+' を強制リセットします。この席の在席・予約・タグ等がクリアされます。よろしいですか？'))return; api('resetSeat',{seatCode:code}).then(function(r){ if(res(r,label+' をリセットしました'))renderOps(); }); }
function doReset(action,label){ if(!confirm('【'+label+'】を本日分リセットします。元に戻せません。実行しますか？'))return; api(action).then(function(r){ res(r,label+' をリセットしました'); }); }
function doAction(action,okmsg){ api(action).then(function(r){ res(r,okmsg); }); }
function doForceLogout(){ if(!confirm('全ての軍師端末を強制ログアウトします。よろしいですか？'))return; api('kioskForceLogout').then(function(r){ res(r,'強制ログアウトしました'); }); }
function saveThresholds(){
  var out={till:{f5:{},f2:{}},safe:{f5:{},f2:{}}};
  ['till','safe'].forEach(function(kind){ ['f5','f2'].forEach(function(fl){ DENOMS.forEach(function(d){
    var mn=document.getElementById('ct-'+kind+'-'+fl+'-'+d.k+'-min'); var o={};
    if(mn&&mn.value!=='')o.min=Number(mn.value);
    if(kind==='till'){ var mx=document.getElementById('ct-'+kind+'-'+fl+'-'+d.k+'-max'); if(mx&&mx.value!=='')o.max=Number(mx.value); }
    out[kind][fl][d.k]=o;
  }); }); });
  api('saveCashThresholds',{thresholds:out}).then(function(r){ res(r,'しきい値を保存しました'); });
}

/* ===== 📅 予約（キャスト別の予約一覧・過去/未来）=====
   帰属＝予約キャスト優先／空なら担当キャストで補完（「本日の出勤」通知と同じ規則）＋同伴キャストも拾う（ボス指定 2026-07-16）。
   判定はサーバの castRolesInRsv_ が唯一の持ち主＝ここでは絶対に数え直さない（2箇所に規則があると必ず割れる）。 */
var rsvCast='', rsvData=null, rsvShowPast=false;
var rsvMx=null, rsvMxFrom='', rsvMxDays=14, rsvMxBusy=false;
function rsvCastList(){ return (ST.staff||[]).filter(function(s){ var r=String(s.role||''); return r.indexOf('キャスト')>=0||r.indexOf('体験')>=0; }); }
function rsvBizToday(){ var n=new Date(); if(n.getHours()<6)n.setDate(n.getDate()-1); return hdFmt(n); } // 営業日(6時境界)＝シフト表と同じ基準
function renderRsv(){
  var all=rsvCastList();
  var active=all.filter(function(s){return !s.retired;});
  var retired=all.filter(function(s){return s.retired;});
  if(!all.length){ setBody('<div class="empty">キャストが登録されていません</div>'); return; }
  var chip=function(s){ return '<div class="chip'+(rsvCast===s.name?' on':'')+'" onclick="rsvPick(\''+jstr(s.name)+'\')">'+esc(s.name)+(s.retired?' <span style="opacity:.6">(退職)</span>':'')+'</div>'; };
  var picker='<div class="sec compact"><div class="hint">キャストを選ぶと、その子の予約が過去・未来まとめて出ます。'
    +'<b>予約キャスト</b>／（予約キャストが空なら）<b>担当キャスト</b>／<b>同伴キャスト</b>のどれかに名前が入っていれば、その子の予約として数えます。</div>'
    +'<div class="chips" style="margin-top:10px">'+active.map(chip).join('')+'</div>'
    +(retired.length?'<details style="margin-top:10px"><summary style="cursor:pointer;color:var(--dim);font-weight:800;font-size:12px">🗄 退職済み（'+retired.length+'名）の履歴を見る</summary><div class="chips" style="margin-top:8px">'+retired.map(chip).join('')+'</div></details>':'')
    +'</div>';
  setBody('<div id="rsv-mx"></div>'+picker+'<div id="rsv-body">'+(rsvCast?'<div class="empty">読み込み中…</div>':'<div class="empty">キャストを選んでください</div>')+'</div>');
  drawRsvMx();
  if(!rsvMx && !rsvMxBusy) loadRsvMx();
  if(rsvCast) drawRsv();
}

/* ===== 店全体の日別マトリクス（縦=キャスト・横=日付・マス=予約件数）＝シフト表と同じ見せ方（ボス指定 2026-07-16） ===== */
function loadRsvMx(){
  if(rsvMxBusy) return;
  if(!rsvMxFrom) rsvMxFrom=rsvBizToday();
  rsvMxBusy=true;
  var want=rsvMxFrom+'/'+rsvMxDays;
  // ⚠️窓が動いていたら「捨てて終わり」にせず必ず取り直す。捨てるだけだと、
  //   飛んでいた要求は古いと判定され・新しい要求は busy で弾かれ＝誰も取りに行かず「読み込み中…」で固まる（連打で踏む）。
  var done=function(fn){ return function(a){ rsvMxBusy=false; if(rsvMxFrom+'/'+rsvMxDays!==want){ loadRsvMx(); return; } fn(a); drawRsvMx(); }; };
  api('getRsvMatrix',{from:rsvMxFrom,days:rsvMxDays})
    .then(done(function(r){ rsvMx=(r&&r.ok===false)?{error:r.error||'読み込みエラー'}:r; }))
    .catch(done(function(e){ rsvMx={error:(e&&e.message)||'通信エラー'}; }));   // 握り潰さない＝原因をボスが報告できるように
}
function rsvMxNav(diff){
  var d=new Date(rsvMxFrom+'T00:00:00'); d.setDate(d.getDate()+diff*rsvMxDays);
  rsvMxFrom=hdFmt(d); rsvMx=null; drawRsvMx(); loadRsvMx();
}
function rsvMxToday(){ rsvMxFrom=rsvBizToday(); rsvMx=null; drawRsvMx(); loadRsvMx(); }
function rsvMxSetDays(n){ rsvMxDays=parseInt(n,10)||14; rsvMx=null; drawRsvMx(); loadRsvMx(); }
function rsvMxMd(ds){ var p=ds.split('-'); return parseInt(p[1],10)+'/'+parseInt(p[2],10); }
function drawRsvMx(){
  var el=document.getElementById('rsv-mx'); if(!el) return;
  var navBar='<div class="toolbar" style="margin-bottom:8px">'
    +'<button class="btn sm" onclick="rsvMxNav(-1)">‹ 前</button>'
    +'<button class="btn sm" onclick="rsvMxToday()">今日</button>'
    +'<button class="btn sm" onclick="rsvMxNav(1)">次 ›</button>'
    +'<select class="finput" style="width:auto" onchange="rsvMxSetDays(this.value)">'
    +[7,14,31].map(function(n){return '<option value="'+n+'"'+(rsvMxDays===n?' selected':'')+'>'+n+'日</option>';}).join('')
    +'</select><span class="hint" style="margin:0">'+esc(rsvMxFrom||'')+' から'+rsvMxDays+'日</span></div>';
  var head='<div class="sec-t">📅 店全体の予約（日別）</div>';
  if(!rsvMx){ el.innerHTML='<div class="sec compact">'+head+navBar+'<div class="empty" style="padding:18px">読み込み中…</div></div>'; return; }
  if(rsvMx.error){ el.innerHTML='<div class="sec compact">'+head+navBar+'<div class="empty" style="padding:18px">'+esc(rsvMx.error)+'</div></div>'; return; }
  var D=rsvMx.dates||[], C=rsvMx.casts||[], today=rsvMx.today||'';
  var thead='<tr><th style="text-align:left">名前</th>'+D.map(function(ds){
    var cl=(rsvMx.closedDays||{})[ds], wd=hdWeekday(ds), isT=(ds===today);
    var wc=cl?'#c9a8f0':(wd==='日')?'#ee6666':(wd==='土')?'#6688ee':'inherit';
    return '<th style="color:'+wc+(isT?';box-shadow:inset 0 -2px 0 var(--accent)':'')+'"'+(cl?' title="'+esc(String(cl))+'"':'')+'>'+esc(rsvMxMd(ds))
      +'<br><span style="font-size:9px;font-weight:400;opacity:.85">'+wd+'</span>'+(cl?'<br><span style="font-size:8px;color:#c9a8f0">🏖休</span>':'')+'</th>';
  }).join('')+'<th>計</th></tr>';
  // ⚠️店全体＝予約そのものの数。キャスト列を足しても一致しない（1予約が予約キャスト＋同伴で2列に立つ／誰も紐づかない予約もある）
  var grand=0; D.forEach(function(ds){ grand+=(rsvMx.totals||{})[ds]||0; });
  var totalRow='<tr class="total-row"><td class="nm">🏯 店全体</td>'+D.map(function(ds){
    var n=(rsvMx.totals||{})[ds]||0, p=(rsvMx.pax||{})[ds]||0;
    return '<td>'+(n?n+'<span style="font-size:9px;opacity:.7;font-weight:400"> '+p+'名</span>':'<span style="opacity:.25">0</span>')+'</td>';
  }).join('')+'<td>'+grand+'</td></tr>';
  var body=C.map(function(c){
    return '<tr'+(c.offRoster?' style="opacity:.7"':'')+'><td class="nm" style="cursor:pointer" onclick="rsvPickFromMx(\''+jstr(c.name)+'\')">'+esc(c.name)
      +(c.offRoster?' <span class="badge" style="background:#3a2a10;color:#ddaa44">名簿外</span>':'')+'</td>'
      +D.map(function(ds){
        var n=(c.counts||{})[ds]||0;
        return '<td class="cell" onclick="rsvPickFromMx(\''+jstr(c.name)+'\')">'+(n?n:'<span style="opacity:.2">·</span>')+'</td>';
      }).join('')+'<td style="font-weight:800">'+(c.total||0)+'</td></tr>';
  }).join('');
  el.innerHTML='<div class="sec compact">'+head+navBar
    +'<div class="mtx-scroll"><table class="mtx sm">'+thead+totalRow+body+'</table></div>'
    +'<div class="hint" style="margin-top:8px">🏯店全体＝その日の予約そのものの件数（小さい数字＝のべ人数）。<b>キャストの行を足しても店全体には一致しません</b>：1つの予約が予約キャストと同伴キャストの2人に立つことがあり、誰も紐づいていない予約（直接来店など）はどの行にも立たないためです。名前かマスを押すと、その子の一覧が下に出ます。</div>'
    +'</div>';
}
function rsvPickFromMx(name){ rsvPick(name); var el=document.getElementById('rsv-body'); if(el) el.scrollIntoView({block:'start',behavior:'smooth'}); }
/* ⚠️「読み込み中なら無視」にしない：読み込みの最中に別の子を押したタップが黙って消える（押しても何も起きない画面になる）。
 *   常に受け付けて、古い結果は下の rsvCast!==name で捨てる＝最後に押した子が必ず勝つ。 */
function rsvPick(name){
  if(rsvCast===name){ rsvCast=''; rsvData=null; renderRsv(); return; } // もう一度押したら選択解除
  rsvCast=name; rsvData=null; rsvShowPast=false;
  renderRsv();
  var done=function(fn){ return function(a){ if(rsvCast!==name) return; fn(a); drawRsv(); }; };  // 古い子の結果は捨てる
  api('getCastReservations',{cast:name})
    .then(done(function(r){ rsvData=(!r||r.ok===false)?{error:(r&&r.error)||'読み込みエラー'}:r; }))
    .catch(done(function(e){ rsvData={error:(e&&e.message)||'通信エラー'}; }));   // 握り潰さない＝原因をボスが報告できるように
}
function rsvRoleBadges(roles){
  var col={'予約':'background:#0e2440;color:#7ab0f0','担当':'background:#2a1030;color:#bb99ff','同伴':'background:#2a1800;color:#ffaa44','同席':'background:#0d2418;color:#66cc88'};
  return (roles||[]).map(function(x){ return '<span class="badge" style="'+(col[x]||'')+'">'+esc(x)+'</span>'; }).join(' ');
}
function rsvRowHtml(x,past){
  var st=x.status&&x.status!=='確定'?'<span class="badge" style="background:#2a2210;color:#ddaa44">'+esc(x.status)+'</span>':'';
  return '<div class="lrow"'+(past?' style="opacity:.55"':'')+'>'
    +'<div class="main"><div class="nm">'+esc(x.date)+'（'+hdWeekday(x.date)+'）'+esc(x.time||'')+'　'+esc(x.customer)+'様</div>'
    +'<div class="meta">'+esc(x.table||'席未定')+'　'+(x.pax||1)+'名'
    +(x.tantouCast?'　担当: '+esc(x.tantouCast):'')+(x.dohanCast?'　同伴: '+esc(x.dohanCast):'')+'</div></div>'
    +'<div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">'+rsvRoleBadges(x.roles)+st+'</div></div>';
}
function drawRsv(){
  var el=document.getElementById('rsv-body'); if(!el) return;
  if(!rsvData){ el.innerHTML='<div class="empty">読み込み中…</div>'; return; }
  if(rsvData.error){ el.innerHTML='<div class="empty">'+esc(rsvData.error)+'</div>'; return; }
  var list=rsvData.reservations||[];
  var future=list.filter(function(x){return x.future;});
  var past=list.filter(function(x){return !x.future;});
  var head='<div class="toolbar"><span class="cnt">'+esc(rsvCast)+'　これから '+future.length+'件 / 過去 '+past.length+'件</span></div>';
  var futureHtml='<div class="sec compact"><div style="font-weight:800;color:var(--accent);margin-bottom:8px">これから（'+future.length+'件）</div>'
    +(future.length?future.map(function(x){return rsvRowHtml(x,false);}).join(''):'<div class="empty" style="padding:14px">これからの予約はありません</div>')+'</div>';
  // 過去は畳んでおく＝在籍が長い子ほど数百件になり、これからの予約が埋もれるため
  var pastHtml=past.length
    ? '<details class="sec compact"'+(rsvShowPast?' open':'')+' ontoggle="rsvShowPast=this.open"><summary style="cursor:pointer;font-weight:800;color:var(--dim)">🗄 過去（'+past.length+'件）</summary><div style="margin-top:10px">'+past.map(function(x){return rsvRowHtml(x,true);}).join('')+'</div></details>'
    : '<div class="sec compact"><div style="color:var(--dim);font-weight:800">過去の予約はありません</div></div>';
  el.innerHTML=head+futureHtml+pastHtml;
}

/* ===== 🏖 店休日（お盆休み・臨時休業など）===== */
var holidays=[];
function hdFmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function hdToday(){ var n=new Date(); if(n.getHours()<6)n.setDate(n.getDate()-1); return hdFmt(n); } // 営業日基準(6時境界)
function hdWeekday(dateStr){ return ['日','月','火','水','木','金','土'][new Date(dateStr+'T00:00:00').getDay()]; }
function renderHolidays(){
  loading();
  api('getHolidays').then(function(r){
    if(r&&r.ok===false){ setBody('<div class="empty">'+esc(r.error||'読み込みエラー')+'</div>'); return; }
    holidays=(r&&r.holidays)||[]; drawHolidays();
  }).catch(function(){ setBody('<div class="empty">読み込みエラー</div>'); });
}
function drawHolidays(){
  var tk=hdToday();
  var rows=(holidays||[]).map(function(h){
    var past=h.date<tk;
    return '<div class="lrow"'+(past?' style="opacity:.45"':'')+'><div class="main"><div class="nm">'+esc(h.date)+'（'+hdWeekday(h.date)+'）'+(past?' <span class="sub">済</span>':(h.date===tk?' <span class="sub">本日</span>':''))+'</div><div class="meta">'+(h.label?esc(h.label):'店休日')+'</div></div><button class="btn dng sm" onclick="delHoliday(\''+jstr(h.date)+'\')">削除</button></div>';
  }).join('')||'<div class="empty" style="padding:14px">店休日は登録されていません</div>';
  var form='<div class="sec"><div class="sec-t">➕ 店休日を追加 <span class="sub">単発は開始日だけ／お盆など連続は終了日まで指定</span></div>'
    +'<div class="toolbar" style="flex-wrap:wrap;gap:8px;align-items:center">'
    +'<label style="display:flex;align-items:center;gap:6px;font-size:13px">開始 <input class="finput" type="date" id="hd-from"></label>'
    +'<label style="display:flex;align-items:center;gap:6px;font-size:13px">終了 <input class="finput" type="date" id="hd-to"></label>'
    +'<input class="finput grow" id="hd-label" placeholder="例：お盆休み（任意）" style="min-width:150px" onkeydown="if(event.key===\'Enter\')addHoliday()">'
    +'<button class="btn pri" onclick="addHoliday()">追加</button>'
    +'</div><div class="hint">終了日を空にすると開始日のみ登録。深夜営業のため店休日は「営業日（朝6時境界）」で扱います。</div></div>';
  var listSec='<div class="sec"><div class="sec-t">📅 登録済みの店休日 <span class="sub">キャストのシフトカレンダーに表示・その日は予約受付を停止・夜間の定時通知も自動停止</span></div>'+rows+'</div>';
  setBody(form+listSec);
}
function addHoliday(){
  var f=((document.getElementById('hd-from')||{}).value||'');
  var t=((document.getElementById('hd-to')||{}).value||f)||f;
  var label=((document.getElementById('hd-label')||{}).value||'').trim();
  if(!f){ toast('開始日を選んでください',true); return; }
  if(t<f){ toast('終了日は開始日以降にしてください',true); return; }
  var add=[], cur=new Date(f+'T00:00:00'), end=new Date(t+'T00:00:00'), guard=0;
  while(cur<=end && guard++<400){ add.push({date:hdFmt(cur), label:label}); cur.setDate(cur.getDate()+1); }
  var map={}; (holidays||[]).forEach(function(h){map[h.date]=h;}); add.forEach(function(h){map[h.date]=h;});
  var merged=Object.keys(map).map(function(k){return map[k];});
  api('saveHolidays',{holidays:merged}).then(function(r){ if(res(r,add.length>1?add.length+'日ぶんの店休日を登録しました':'店休日を登録しました')){ holidays=(r&&r.holidays)||merged; var lb=document.getElementById('hd-label'); if(lb)lb.value=''; drawHolidays(); } }).catch(function(){toast('通信エラー',true);});
}
function delHoliday(date){
  if(!confirm(date+' の店休日を削除しますか？'))return;
  var merged=(holidays||[]).filter(function(h){return h.date!==date;});
  api('saveHolidays',{holidays:merged}).then(function(r){ if(res(r,'削除しました')){ holidays=(r&&r.holidays)||merged; drawHolidays(); } }).catch(function(){toast('通信エラー',true);});
}

/* ===== 🗣 現場の声（AI家康くんに届いた要望）===== */
var voiceFilter='all', voiceList=[];
var VOICE_STATUSES=['新規','対応中','反映済','却下'];
function voiceStatusColor(s){ return {'新規':'#3b82f6','対応中':'#d97706','反映済':'#16a34a','却下':'#6b7280'}[s]||'#6b7280'; }
function voicePrioColor(p){ return {'高':'#dc2626','中':'#d97706','低':'#6b7280'}[p]||'#6b7280'; }
function renderVoice(){
  loading();
  api('getIeyasuRequests').then(function(r){
    if(r&&r.ok===false){ setBody('<div class="empty">'+esc(r.error||'読み込みエラー')+'</div>'); return; }
    voiceList=(r&&r.list)||[]; drawVoice();
  }).catch(function(){ setBody('<div class="empty">読み込みエラー</div>'); });
}
function drawVoice(){
  var counts={all:voiceList.length}; VOICE_STATUSES.forEach(function(s){counts[s]=0;});

    +'<div class="chip'+(voiceFilter==='all'?' on':'')+'" onclick="setVoiceFilter(\'all\')">すべて '+counts.all+'</div>'
    +VOICE_STATUSES.map(function(s){return '<div class="chip'+(voiceFilter===s?' on':'')+'" onclick="setVoiceFilter(\''+s+'\')">'+s+' '+counts[s]+'</div>';}).join('')
    +'</div>';
  var list=voiceList.filter(function(v){ return voiceFilter==='all'||v.status===voiceFilter; });
  var cards=list.map(function(v){
    var stColor=voiceStatusColor(v.status);
    var badges='';
    if(v.category) badges+='<span style="display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:var(--panel2,#2a2a2a);border:1px solid var(--line2);margin-right:6px">'+esc(v.category)+'</span>';
    if(v.priority) badges+='<span style="display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;color:#fff;background:'+voicePrioColor(v.priority)+';margin-right:6px">優先度 '+esc(v.priority)+'</span>';
    var stBadge='<span style="display:inline-block;font-size:11px;padding:3px 9px;border-radius:10px;color:#fff;white-space:nowrap;background:'+stColor+'">'+esc(v.status)+'</span>';
    var title=v.summary||v.text||'（内容なし）';
    var quote=(v.summary&&v.text&&v.text!==v.summary)?'<div class="meta" style="margin-top:8px;padding:8px 10px;background:var(--panel2,#242424);border-radius:8px;border-left:3px solid '+stColor+'">「'+esc(v.text)+'」</div>':'';
    var btns=VOICE_STATUSES.map(function(s){ return '<button class="btn sm'+(v.status===s?' pri':'')+'" onclick="setVoiceStatus('+v.row+',\''+s+'\')"'+(v.status===s?' disabled style="opacity:.6"':'')+'>'+s+'</button>'; }).join('');
    return '<div class="sec" style="margin-bottom:10px">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">'
      +'<div class="nm" style="font-size:15px;font-weight:700;line-height:1.4">'+esc(title)+'</div>'+stBadge+'</div>'
      +(badges?'<div style="margin-top:8px">'+badges+'</div>':'')
      +quote
      +'<div class="meta" style="margin-top:8px;opacity:.75">'+esc(v.name||'（不明）')+' ・ '+esc(v.ts)+(v.type&&v.type!=='request'?' ・ '+esc(v.type):'')+'</div>'
      +'<div class="chips" style="margin-top:10px">'+btns+'</div>'
      +'</div>';
  }).join('')||'<div class="empty" style="padding:30px">'+(voiceFilter==='all'?'まだ現場の声は届いていません。<br><span style="font-size:13px;opacity:.7">キャストがLINEでAI家康くんに要望を送ると、ここに溜まります。</span>':'この状態の項目はありません')+'</div>';
  setBody('<div class="sec-t" style="margin-bottom:8px">🗣 現場の声 <span class="sub">AI家康くんに届いた改善要望・機能要求。状態を管理して反映につなげる</span></div>'+chips+cards);
}
function setVoiceFilter(f){ voiceFilter=f; drawVoice(); }
function setVoiceStatus(row,status){
  api('setIeyasuRequestStatus',{row:row,status:status}).then(function(r){
    if(res(r,'「'+status+'」に更新しました')){
      for(var i=0;i<voiceList.length;i++){ if(voiceList[i].row===row){voiceList[i].status=status;break;} }
      drawVoice();
    }

}

/* ===== 汎用カレンダー日付ピッカー =====
   GASの管理コンソールはクロスオリジンiframe内で動くため input[type=date] の showPicker() が
   SecurityErrorで使えない（タップしてもカレンダーが開かない）。そこで自前のカレンダーUIで代替。
   使い方: HTMLに calFieldHtml('id','placeholder') を差し込む → 値は calVal('id') で 'yyyy-MM-dd' or '' を取得。
   初期値を入れるときは描画後に calSet('id','yyyy-MM-dd')。 */
var _cal={id:null,y:0,m:0};
function _calP2(n){return (n<10?'0':'')+n;}
function calFieldHtml(id,ph){
  return '<span style="position:relative;display:inline-block">'
    +'<input type="hidden" id="'+id+'">'
    +'<button type="button" id="'+id+'-btn" onclick="calOpen(\''+id+'\')" style="min-width:170px;text-align:left;background:var(--panel2,#1a2438);border:1px solid var(--line2,#33406a);border-radius:9px;padding:9px 12px;color:var(--txt,#e8f0ff);font-size:14px;cursor:pointer">'
    +'📅 <span id="'+id+'-lbl" style="color:#8aabcc">'+(ph||'日付を選択')+'</span></button>'
    +'<div id="'+id+'-pop" style="display:none;position:fixed;z-index:9999;background:#0e1726;border:1px solid #2a4a7a;border-radius:12px;padding:12px;box-shadow:0 12px 34px rgba(0,0,0,.55);width:252px"></div>'
    +'</span>';
}
function calVal(id){var i=document.getElementById(id);return i?(i.value||''):'';}
function calSet(id,ymd){var i=document.getElementById(id);if(!i)return;i.value=ymd||'';var l=document.getElementById(id+'-lbl');if(!l)return;if(ymd){l.textContent=ymd;l.style.color='#e8f0ff';}else{l.textContent=(l.getAttribute('data-ph')||'日付を選択');l.style.color='#8aabcc';}}
function calOpen(id){
  if(_cal.id&&_cal.id!==id)calClose();
  var pop=document.getElementById(id+'-pop');
  if(pop.style.display==='block'){calClose();return;}
  // placeholderを保持（クリア時に戻すため）
  var l=document.getElementById(id+'-lbl'); if(l&&!l.getAttribute('data-ph')&&!calVal(id))l.setAttribute('data-ph',l.textContent);
  var v=calVal(id),d=v?new Date(v+'T00:00:00'):new Date();
  _cal={id:id,y:d.getFullYear(),m:d.getMonth()};
  var r=document.getElementById(id+'-btn').getBoundingClientRect();
  pop.style.top=(r.bottom+6)+'px';
  pop.style.left=Math.max(8,Math.min(r.left,window.innerWidth-260))+'px';
  pop.style.display='block';calDraw();
  setTimeout(function(){document.addEventListener('click',calOutside);},0);
}
// innerHTML再構築でクリック対象がDOMから外れても誤判定しないよう、座標でポップアップ内外を判定
function calOutside(e){if(!_cal.id)return;var pop=document.getElementById(_cal.id+'-pop'),btn=document.getElementById(_cal.id+'-btn');var inBtn=btn&&btn.contains(e.target);var inPop=false;if(pop){var r=pop.getBoundingClientRect();inPop=e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom;}if(!inBtn&&!inPop)calClose();}
function calClose(){if(!_cal.id)return;var pop=document.getElementById(_cal.id+'-pop');if(pop)pop.style.display='none';document.removeEventListener('click',calOutside);_cal.id=null;}
function calNav(delta){_cal.m+=delta;if(_cal.m<0){_cal.m=11;_cal.y--;}if(_cal.m>11){_cal.m=0;_cal.y++;}calDraw();}
function calPick(ymd){calSet(_cal.id,ymd);calClose();}
function calClearCur(){calSet(_cal.id,'');calClose();}
function calDraw(){
  var id=_cal.id,y=_cal.y,m=_cal.m,pop=document.getElementById(id+'-pop');
  var startDow=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),sel=calVal(id);
  var wd=['日','月','火','水','木','金','土'];
  var nav='background:#162848;border:1px solid #2a5aaa;border-radius:8px;color:#bcd6f0;width:34px;height:30px;cursor:pointer;font-size:16px';
  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
    +'<button type="button" onclick="calNav(-1)" style="'+nav+'">‹</button>'
    +'<span style="font-weight:700;color:#e8f0ff;font-size:14px">'+y+'年 '+(m+1)+'月</span>'
    +'<button type="button" onclick="calNav(1)" style="'+nav+'">›</button></div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
  wd.forEach(function(w,i){h+='<div style="text-align:center;font-size:11px;padding:2px 0;color:'+(i===0?'#e08794':i===6?'#7ab0f0':'#8aabcc')+'">'+w+'</div>';});
  for(var i=0;i<startDow;i++)h+='<div></div>';
  for(var day=1;day<=days;day++){var ymd=y+'-'+_calP2(m+1)+'-'+_calP2(day),isSel=ymd===sel;
    h+='<button type="button" onclick="calPick(\''+ymd+'\')" style="padding:8px 0;border:none;border-radius:7px;cursor:pointer;font-size:13px;'+(isSel?'background:#1a50a0;color:#fff;font-weight:700':'background:transparent;color:#cdd8e8')+'">'+day+'</button>';}
  h+='</div><button type="button" onclick="calClearCur()" style="width:100%;margin-top:8px;padding:8px;background:transparent;border:1px solid #33406a;border-radius:8px;color:#8aabcc;font-size:12px;cursor:pointer">クリア（無期限にする）</button>';
  pop.innerHTML=h;
}

/* ===== 📢 お知らせ（作成＋配信＋既読マップ）===== */

/* 貼り付けTSVのパース。⚠️本番は parseMenuBulk_(コード.js)。ここはローカル確認用の写しでしかない */
function mnParse(text){
  var rows=[],errors=[],seen={};
  String(text||'').split(/\r?\n/).forEach(function(line,i){
    var raw=line.trim(); if(!raw||/^#/.test(raw))return;
    var c=raw.split('\t');
    if(c.length<2){errors.push((i+1)+'行目: 列が足りません（カテゴリ⇥品名⇥価格）: '+raw);return;}
    var name=String(c[1]||'').trim();
    if(!name){errors.push((i+1)+'行目: 品名が空です: '+raw);return;}
    if(seen[name]){errors.push('貼り付けた中で品名が重複: '+name);return;}
    seen[name]=1;
    rows.push({category:String(c[0]||'').trim(),name:name,price:Number(String(c[2]||'').replace(/[¥￥,\s　]/g,''))||0});
  });
  return {rows:rows,errors:errors};
}
function mnNorm(s){return String(s||'').normalize('NFKC').toLowerCase().replace(/[\s　・,、。･･()（）「」【】\-ー・_/／\\]/g,'');}
/* 紐づけは**完全一致のみ**。本番は menuLinkCandidate_(コード.js) ＝ここはローカル確認用の写し。
   ⚠️あいまい照合はこのドメインでは使えない。酒の品名は「ベース＋バリエーション」で埋まっていて、
      包含ボーナスが 山崎→山崎12年 / ドンペリニヨン ロゼ→ドンペリニヨン を軒並み92%と言う。
      年数が無いものはノンビンテージとして別に存在する（ボス談）＝どれも別の酒。 */
function mnKey(name,cat){ var s=String(name||'').trim(); if(String(cat||'').trim()==='焼酎')s=s.replace(/^[麦米芋]\s+/,''); return mnNorm(s); }
function mnCandidate(name,cat,stockNames){
  var key=mnKey(name,cat); if(!key)return {name:'',score:0,exact:false};
  var ex=stockNames.filter(function(n){return mnNorm(n)===key;});
  return ex.length===1?{name:ex[0],score:100,exact:true}:{name:'',score:0,exact:false};
}
function mnFind(rowIdx){ return mnMock().menu.filter(function(x){return x.rowIdx===Number(rowIdx);})[0]; }
function mnSetSupply(nm,st){ mnMock().stock.forEach(function(s){ if(s.name===nm)s.stopped=(st==='メニュー落ち'); }); }
function mnBoard(){
  var S=mnMock(), by={}, linked={};
  S.stock.forEach(function(s){by[s.name]=s;});
  S.menu.forEach(function(m){ if(m.stockName)linked[m.stockName]=m; });
  return {

      return {rowIdx:m.rowIdx,name:m.name,category:m.category,price:m.price,stockName:m.stockName,status:m.status,
              qty:g?g.qty:null,stopped:g?g.stopped:false,linkBroken:!!m.stockName&&!g}; }),
    offMenu:S.stock.filter(function(s){return !linked[s.name];}).map(function(s){return {name:s.name,qty:s.qty,stopped:s.stopped};}),
    stockNames:S.stock.map(function(s){return s.name;})
  };
}
