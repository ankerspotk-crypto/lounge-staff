<meta charset="utf-8">
<style>
:root{
  --bg:#0a0a12; --panel:#12121f; --panel2:#16162a; --line:#22223a; --line2:#2e2e4a;
  --txt:#e8ecf6; --sub:#9aa6c4; --dim:#5a6688;
  --accent:#7aa2ff; --accent-bg:#12233f; --accent-line:#2a5590;
  --ok:#7be0a8; --okbg:#0d2618; --okline:#2a6a44;
  --warn:#ffbf6a; --warnbg:#241800; --warnline:#7a5010;
  --danger:#e79ad6; --dangerbg:#241014; --dangerline:#5a2430;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;font-size:14px;}
.wrap{min-height:100vh;display:flex;flex-direction:column;}
.hd{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#12101c,#0c0b14);flex-wrap:wrap;}
.hd .brand{font-size:16px;font-weight:800;letter-spacing:.4px;}
.hd .brand .z{color:var(--accent);}
.hd .who{font-size:12px;color:var(--sub);font-weight:700;}
.hd .sp{flex:1;}
.tabs{display:flex;gap:5px;padding:10px 14px 0;border-bottom:1px solid var(--line);background:var(--panel);flex-wrap:wrap;}
.tab{padding:9px 13px;border-radius:9px 9px 0 0;border:1px solid transparent;background:transparent;color:var(--sub);font-size:14px;font-weight:700;cursor:pointer;}
.tab.on{background:var(--panel2);border-color:var(--line2);border-bottom-color:var(--panel2);color:var(--accent);}
/* グループ行（14タブを5グループに束ねた第1階層）＝塗りpillで主役。サブタブ(.tab)は従来の下線タブのまま第2階層 */
.groups{display:flex;gap:7px;padding:12px 14px 6px;background:var(--panel);flex-wrap:wrap;align-items:center;}
.grp{padding:9px 17px;border-radius:11px;border:1px solid var(--line2);background:var(--panel2);color:var(--sub);font-size:14px;font-weight:800;cursor:pointer;transition:border-color .12s,background .12s;}
.grp:hover{border-color:var(--accent);}
.grp.on{background:var(--accent);border-color:var(--accent);color:#0b0b12;}
.tabs{padding-top:2px;}
.body{flex:1;padding:16px;overflow-y:auto;}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.finput{background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:9px 12px;color:var(--txt);font-size:14px;outline:none;}
.finput.grow{min-width:200px;flex:1;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:7px 12px;border-radius:9px;border:1px solid var(--line2);background:var(--panel2);color:var(--sub);font-size:13px;font-weight:700;cursor:pointer;}
.chip.on{background:var(--accent-bg);border-color:var(--accent-line);color:var(--accent);}
.cnt{font-size:12px;color:var(--dim);font-weight:700;}
.sec{background:var(--panel2);border:1px solid var(--line2);border-radius:12px;padding:14px 16px;margin-bottom:16px;}
.sec-t{font-size:14px;font-weight:800;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
.sec-t .sub{font-size:11px;color:var(--dim);font-weight:600;}
.btn{padding:9px 14px;border-radius:9px;border:1px solid var(--line2);background:var(--panel);color:var(--txt);font-size:13px;font-weight:800;cursor:pointer;}
.btn.pri{background:linear-gradient(180deg,#153a72,#0f2040);border-color:var(--accent-line);color:#dcecff;}
.btn.ok{background:var(--okbg);border-color:var(--okline);color:var(--ok);}
.btn.warn{background:var(--warnbg);border-color:var(--warnline);color:var(--warn);}
.btn.dng{background:var(--dangerbg);border-color:var(--dangerline);color:#f0a0b0;}
.btn.sm{padding:6px 10px;font-size:12px;}
.btn:disabled{opacity:.45;cursor:default;}

/* staff grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.card{background:var(--panel2);border:1px solid var(--line2);border-radius:12px;padding:13px 14px;}
.card-top{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
.card-nm{font-size:16px;font-weight:800;flex:1;}
.badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;white-space:nowrap;}
.badge.line-on{background:var(--okbg);border:1px solid var(--okline);color:var(--ok);}
.badge.line-off{background:#1a1013;border:1px solid #5a2430;color:#e0a0b0;}
.badge.kiosk{background:var(--accent-bg);border:1px solid var(--accent-line);color:var(--accent);}
.badge.lock{background:#1c1830;border:1px solid #3a3560;color:#b9a6ff;}
.row{display:flex;align-items:center;gap:8px;margin-top:10px;}
.row .lbl{font-size:12px;color:var(--sub);font-weight:700;width:72px;flex-shrink:0;}
.rolesel{flex:1;background:var(--panel);border:1px solid var(--line2);border-radius:8px;color:var(--txt);padding:8px 10px;font-size:14px;font-weight:700;outline:none;}
.perms{display:flex;gap:8px;margin-top:11px;}
.toggle{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:9px;border:1px solid var(--line2);background:var(--panel);color:var(--sub);font-size:13px;font-weight:800;cursor:pointer;}
.toggle.on.admin{background:#241028;border-color:#7a3a6a;color:#f0a0e0;}
.toggle.on.safe{background:var(--warnbg);border-color:var(--warnline);color:var(--warn);}
.toggle.on.gunshi{background:#0d2233;border-color:#2a6a9a;color:#7ac8ff;}
.toggle.on.notice{background:#0d2a1a;border-color:#2a7a4a;color:#6ee0a0;}
.toggle.off.notice{background:#2a1414;border-color:#6b3a3a;color:#ff9aa0;}
.toggle.locked{opacity:.5;cursor:not-allowed;}

/* matrix / tables */
.mtx-wrap{overflow-x:auto;}
table.mtx{border-collapse:collapse;width:100%;min-width:640px;font-size:13px;}
table.mtx th,table.mtx td{border:1px solid var(--line);padding:8px 10px;text-align:center;}
table.mtx th{background:#14142a;color:var(--sub);font-weight:800;}
table.mtx td.nm{text-align:left;font-weight:800;color:#eef;white-space:nowrap;}
table.mtx td.role{text-align:left;color:var(--sub);font-weight:700;}
table.mtx td.cell{cursor:pointer;min-width:52px;}
table.mtx td.cell:hover{background:var(--accent-bg);}
.yes{color:var(--ok);font-weight:900;} .no{color:#44506a;}
.mtx tr:nth-child(even) td{background:#101020;}
.mtx.sm th,.mtx.sm td{padding:5px 8px;font-size:12px;}
.mtx-scroll{overflow:auto;max-height:56vh;border:1px solid var(--line);border-radius:8px;}
table.mtx td.cell.pending{background:#2a1f0a;color:#e0b84a;}
table.mtx td.cell .pd{font-size:9px;background:#8a6d20;color:#fff;border-radius:3px;padding:0 3px;margin-right:2px;vertical-align:middle;}
table.mtx tr.total-row td{background:#101a2e !important;color:#8fd0ff;font-weight:900;border-bottom:2px solid #2a5aaa;}
table.mtx tr.total-row td .tp{color:#e0b84a;font-size:10px;font-weight:800;}
#scm-wrap .scm-back{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:80;}
#scm-wrap .scm{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:81;background:#141428;border:1px solid var(--line);border-radius:14px;padding:18px;width:min(340px,92vw);display:flex;flex-direction:column;gap:9px;box-shadow:0 12px 44px rgba(0,0,0,.55);}
#scm-wrap .scm-t{font-weight:800;font-size:16px;color:#eef;}
#scm-wrap .scm-sub{font-size:12px;color:var(--sub);margin:-4px 0 4px;}
#scm-wrap .scm .btn{width:100%;padding:12px;font-size:14px;}
.mtx-scroll table.mtx{min-width:520px;}
.mtx-scroll .mtx th{position:sticky;top:0;z-index:1;}
/* 名前列を左固定（横スクロールしても名前が見える） */
.mtx-scroll .mtx td.nm{position:sticky;left:0;z-index:2;background:#0d0d1a;box-shadow:1px 0 0 var(--line);}
.mtx-scroll .mtx tr:nth-child(even) td.nm{background:#111124;}
.mtx-scroll .mtx th:first-child{left:0;z-index:3;}
/* 🧾売上伝票: 日別アコーディオン > 伝票 > 明細。色は既存のCSS変数に寄せる（portal.htmlの青系ハードコードを
   持ち込むとこの画面だけ浮くため移植時に置換した）。 */
.bill-day{border:1px solid var(--line2);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.bd-head{padding:11px 13px;background:var(--panel2);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.bd-head:hover{background:#1b1b33;}
.bd-date{font-size:13px;color:var(--txt);font-weight:700;}
.bd-cnt{color:var(--sub);font-weight:400;font-size:11px;}
.bd-pend{font-size:10px;font-weight:800;color:#e0b060;border:1px solid #6a5320;background:#2a2108;border-radius:4px;padding:1px 5px;}
.bd-total{font-size:14px;font-weight:800;color:var(--accent);white-space:nowrap;}
.bill-castrow{cursor:pointer;}
.bill-castrow:hover td{background:var(--accent-bg);}
.bill-slip{padding:9px 13px;border-top:1px solid var(--line);cursor:pointer;}
.bill-slip:hover{background:var(--panel);}
.bs-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.bs-cust{font-size:12px;color:var(--txt);min-width:0;}
.bs-meta{color:var(--sub);}
.bs-amt{font-size:13px;font-weight:700;color:#9fd0a0;white-space:nowrap;}
.bs-sub{font-size:10px;color:var(--sub);margin-top:2px;}
.bi-box{background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:9px 11px;margin-top:8px;}
.bi-bottle{font-size:11px;color:#e0b060;margin-bottom:7px;font-weight:600;}
.bi-row{display:flex;justify-content:space-between;gap:8px;font-size:11px;padding:4px 0;border-bottom:1px solid var(--line);}
.bi-row:last-child{border-bottom:0;}
.bi-nm{color:var(--sub);min-width:0;}
.bi-cat{color:var(--dim);}
.bi-amt{color:var(--txt);font-weight:600;white-space:nowrap;}
.bi-msg{font-size:11px;color:var(--sub);padding:6px 2px;}
.bi-msg.err{color:#e88;}
.bi-msg.warn{color:#c9a066;}
/* 🧮給与明細の✎列を右固定。表が15列で横スクロールする＝固定しないと初期表示に✎が1つも映らず
   「機能が無い」と読める（実際に迷わせた）。⚠️sticky セルは背景が透けると下の数字と重なる＝
   行の背景を明示する必要があり、偶数行・合計行はそれぞれ別に上書きしないと1行だけ透ける。 */
table.mtx td.kyu-act{position:sticky;right:0;z-index:2;background:var(--bg);box-shadow:-1px 0 0 var(--line);}
table.mtx th.kyu-act{position:sticky;right:0;z-index:3;background:#14142a;box-shadow:-1px 0 0 var(--line);}
.mtx tr:nth-child(even) td.kyu-act{background:#101020;}
table.mtx tr.total-row td.kyu-act{background:#101a2e !important;}
/* 役割ごとの行の色分け（キャスト=青 / 体験=緑 / 派遣=紫 / 黒服=琥珀）。名前固定列も同色に上書き */
table.mtx tbody tr.rc-cast   td{background:#0e1c30;}
table.mtx tbody tr.rc-taiken td{background:#0d2117;}
table.mtx tbody tr.rc-haken  td{background:#1c1136;}
table.mtx tbody tr.rc-kuro   td{background:#2a1e08;}
.mtx-scroll .mtx tr.rc-cast   td.nm{background:#0e1c30;}
.mtx-scroll .mtx tr.rc-taiken td.nm{background:#0d2117;}
.mtx-scroll .mtx tr.rc-haken  td.nm{background:#1c1136;}
.mtx-scroll .mtx tr.rc-kuro   td.nm{background:#2a1e08;}
.shift-filter{margin:0 0 10px;}
/* shift tab 2-col top */
.shift-top{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
.shift-top>.sec{flex:1;min-width:290px;margin-bottom:0;}
.sec.compact{margin-bottom:0;}
.addbar{display:flex;gap:8px;flex-wrap:wrap;}
.addbar .finput{flex:1;min-width:96px;}

/* reference */
.ref{display:flex;flex-direction:column;gap:10px;max-width:760px;}
.ref-item{background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:12px 14px;}
.ref-item h4{margin:0 0 4px;font-size:15px;} .ref-item p{margin:0;font-size:13px;color:var(--sub);line-height:1.6;}
.ref-perm h4{color:var(--warn);}

/* generic list rows */
.lrow{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:10px 12px;margin-bottom:8px;flex-wrap:wrap;}
.lrow .main{flex:1;min-width:160px;}
.lrow .nm{font-size:14px;font-weight:800;}
.lrow .meta{font-size:11px;color:var(--dim);margin-top:2px;}
.sw{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:8px;border:1px solid var(--line2);background:var(--panel2);color:var(--sub);font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;}
.sw.on{background:var(--okbg);border-color:var(--okline);color:var(--ok);}
.ta{width:100%;background:var(--panel2);border:1px solid var(--line2);border-radius:8px;color:var(--txt);padding:8px 10px;font-size:13px;resize:vertical;outline:none;margin-top:6px;font-family:inherit;}
.tin{width:76px;background:var(--panel2);border:1px solid var(--line2);border-radius:7px;color:var(--txt);padding:6px 8px;font-size:13px;text-align:center;outline:none;}

.empty{text-align:center;color:var(--dim);padding:40px 12px;font-size:14px;}
.gate{max-width:420px;margin:80px auto;text-align:center;background:var(--panel2);border:1px solid var(--line2);border-radius:14px;padding:36px 24px;}
.gate .ic{font-size:44px;} .gate h2{margin:12px 0 6px;} .gate p{color:var(--sub);font-size:13px;}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#0d2618;border:1px solid #2a6a44;color:#9fe8c0;font-size:13px;font-weight:700;padding:11px 20px;border-radius:12px;z-index:70;opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center;}
.toast.show{opacity:1;} .toast.err{background:#241014;border-color:#5a2430;color:#e0a0b0;}
.hint{font-size:12px;color:var(--dim);margin:-4px 0 10px;}
.sss-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.sss-chip{font-size:12px;font-weight:800;color:#fff;padding:5px 12px;border-radius:20px;}
.sss-block{margin-top:8px;}
.sss-h{font-size:11px;color:var(--dim);font-weight:700;margin-bottom:5px;}
.sss-names{display:flex;gap:6px;flex-wrap:wrap;}
.sss-n{font-size:12px;background:#2a3550;color:#cdd8ee;padding:3px 9px;border-radius:8px;}
.sss-n.ok{background:#1e3a2a;color:#a8d8b8;}
.sss-n.unreg{background:#4a2a2a;color:#e0b0b0;}
.sss-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid var(--line,#2a3550);}
.who .logout{color:var(--accent);cursor:pointer;margin-left:10px;font-weight:800;}
/* QRログインゲート */
.qrgate{max-width:400px;margin:60px auto;text-align:center;display:flex;flex-direction:column;align-items:center;}
.qrgate h2{margin:0 0 6px;font-size:22px;}
.qrsub{font-size:14px;color:var(--sub);font-weight:700;margin-bottom:20px;}
.qrbox{width:240px;height:240px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:12px;overflow:hidden;}
.qrbox img{display:block;width:240px;height:240px;}
.qrload{color:#8a9ac0;font-size:13px;font-weight:700;padding:20px;}
.qrhint{font-size:12px;color:var(--sub);margin-top:18px;line-height:1.6;}
/* PIN */
.pinrow{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);}
.pinrow .pinlbl{font-size:12px;color:var(--sub);font-weight:800;}
.pinrow .pinstat{font-size:11px;color:var(--dim);font-weight:700;flex:1;}
.pinrow .pinstat.set{color:var(--warn);}
/* 🍶 メニュー。メニュー落ちのカードは沈めるが消さない＝現物は残っており数えて売り切る対象のまま */
.mn-grid{margin-top:10px;}
.mn-card{display:flex;flex-direction:column;gap:9px;}
.mn-card.off{opacity:.72;border-color:#4a3340;}
.mn-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.mn-lbl{font-size:11px;font-weight:800;color:var(--dim);white-space:nowrap;}
.mn-qty{font-size:12px;color:var(--sub);font-weight:700;margin-right:auto;}
.mn-qty b{color:var(--txt);font-size:14px;}
.mn-nolink{font-size:11px;color:var(--dim);font-weight:700;margin-right:auto;}
.mn-broken{font-size:11px;color:#ff9db4;font-weight:800;margin-right:auto;}
.mn-b-off{background:#4a3340;color:#ffb0c4;margin-left:7px;}
.mn-stop{border-color:#6a4456;color:#ffb0c4;}
.mn-del{padding:2px 9px;color:var(--dim);}
/* 価格は参照専用（会計はTRUSTが正）＝主張させない */
.mn-price{font-size:12px;font-weight:700;color:var(--dim);white-space:nowrap;margin-left:8px;}
.mn-cat{margin-bottom:14px;}
.mn-cat>summary{cursor:pointer;font-size:13px;font-weight:800;color:var(--accent);padding:6px 0;display:flex;align-items:center;gap:8px;}
.mn-cnt{font-size:11px;font-weight:700;color:var(--dim);}
.mn-cnt.off{color:#ffb0c4;}
.mn-warn{font-size:11px;font-weight:800;color:var(--warn);}
.mn-go{border-color:var(--okline);color:var(--ok);}
.mn-bulk-ok{margin:10px 0 6px;padding:8px 10px;border-radius:8px;background:var(--okbg);border:1px solid var(--okline);color:var(--ok);font-size:12px;font-weight:700;}
.mn-bulk-err{margin:10px 0;padding:8px 10px;border-radius:8px;background:#2a1016;border:1px solid #6a4456;color:#ffb0c4;font-size:12px;font-weight:700;line-height:1.7;}
.mn-pv{display:flex;align-items:center;gap:10px;padding:5px 8px;border-bottom:1px solid var(--line);font-size:12px;}
.mn-pv-c{color:var(--accent);font-weight:800;min-width:80px;font-size:11px;}
.mn-pv-n{flex:1;color:var(--txt);font-weight:700;}
/* 🔧 重複品名。統合は不可逆なので、どちらへ寄せるかを本数とフロアを見せた上で選ばせる */
.dup-card{display:flex;flex-direction:column;gap:9px;border-color:#4a4030;}
.dup-card.sure{border-color:#6a5a2a;}
.dup-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.dup-b-sure{background:#3a2f10;color:var(--warn);}
.dup-b-may{background:#1a2436;color:var(--accent);}
.dup-why{font-size:10px;color:var(--dim);font-weight:700;}
.dup-row{display:flex;align-items:stretch;gap:8px;}
.dup-side{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:8px 9px;}
.dup-nm{font-size:12px;font-weight:800;color:var(--txt);word-break:break-word;}
.dup-meta{font-size:10px;color:var(--sub);font-weight:700;}
.dup-meta b{color:var(--txt);font-size:12px;}
.dup-btn{margin-top:auto;padding:5px 8px;font-size:10px;}
.dup-arrow{align-self:center;color:var(--dim);font-size:14px;}
/* 黒服タスクのメモ＝軍師のカードとLINEに同じ文面が出る。ここでも改行を保って確認できるようにする */
.kf-memo{margin-top:6px;font-size:12px;line-height:1.65;color:var(--sub);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 10px;white-space:normal;word-break:break-word;}
.mn-sug{font-size:11px;color:var(--warn);font-weight:700;white-space:nowrap;}
.mn-sug b{color:var(--warn);}
.mn-sug.ex{color:var(--ok);}
</style>

<div class="wrap">
  <div class="hd">
    <div class="brand">⚙️ IEYAS <span class="z">軍師</span> 管理コンソール</div>
    <div class="sp"></div>
    <div class="who" id="who"></div>
  </div>
  <div class="groups" id="groups" style="display:none"></div>
  <div class="tabs" id="tabs" style="display:none"></div>
  <div class="body" id="body"><div class="empty">読み込み中…</div></div>
</div>
<div class="toast" id="toast"></div>

function gsr(fn){var a=[].slice.call(arguments,1);return new Promise(function(res,rej){google.script.run.withSuccessHandler(res).withFailureHandler(rej)[fn].apply(google.script.run,a);});}
function api(action,extra){var body={action:action,userId:USER_ID};if(extra)for(var k in extra)body[k]=extra[k];if(!IS_GAS)return Promise.resolve(MOCKAPI(action,body));return gsr('adminConsoleApi',body);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function jstr(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function toast(m,err){var t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(err?' err':'');setTimeout(function(){t.className='toast';},2100);}
function res(r,okmsg){ if(r&&r.ok===false){toast(r.error||'失敗',true);return false;} if(okmsg)toast(okmsg); return true; }

function load(){
  if(!IS_GAS){ ST=MOCK(); document.getElementById('who').textContent='管理者: りく（ローカル）'; render(); return; }

    if(!r||r.ok===false){ gate(r&&r.error); return; }
    ST=r; document.getElementById('who').innerHTML=(r.caller?'管理者: '+esc(r.caller):'')+' <span class="logout" onclick="adminLogout()">ログアウト</span>'; render();
  }).catch(function(){ gate('通信エラー'); });
}
function gate(msg){
  document.getElementById('tabs').style.display='none';
  document.getElementById('body').innerHTML='<div class="gate"><div class="ic">🔒</div><h2>アクセスできません</h2><p>'+esc(msg||'管理者権限が必要です')+'</p><p style="margin-top:10px"><span onclick="adminLogout()" style="color:var(--accent);cursor:pointer;text-decoration:underline">別のアカウントでQRログイン</span></p></div>';
}
/* ===== QRログイン（本人認証・管理者のみ） ===== */
function admSessKey(){return 'adminsess_v1';}
function loadAdminSession(){try{var r=localStorage.getItem(admSessKey());if(!r)return null;var s=JSON.parse(r);if(s&&s.exp&&Date.now()<s.exp&&s.userId)return s;localStorage.removeItem(admSessKey());return null;}catch(e){return null;}}
function saveAdminSession(userId,name){try{localStorage.setItem(admSessKey(),JSON.stringify({userId:userId,name:name,exp:Date.now()+12*60*60*1000}));}catch(_){}}
function adminLogout(){try{localStorage.removeItem(admSessKey());}catch(_){} location.reload();}
var _aAuthToken=null,_aAuthTimer=null;
function stopAAuth(){ if(_aAuthTimer){clearInterval(_aAuthTimer);_aAuthTimer=null;} }
function boot(){
  if(!IS_GAS){ load(); return; }
  if(USER_ID){ load(); return; }                 // URLにuserId(後方互換/dev)があれば従来通り
  var sess=loadAdminSession();
  if(sess){ USER_ID=sess.userId; load(); return; }
  showAdminGate();
}
// PINが設定済みならPIN画面、未設定ならQR（初回はQRでログイン→運営タブでPIN設定）
function showAdminGate(){
  gsr('adminConsolePinSet').then(function(r){ if(r&&r.pinSet)showAdminPin(); else showAdminQr(); }).catch(function(){ showAdminQr(); });
}
function showAdminPin(){
  stopAAuth();
  document.getElementById('tabs').style.display='none';
  document.getElementById('who').textContent='';
  document.getElementById('body').innerHTML='<div class="qrgate"><h2>⚙️ 管理コンソール</h2>'
    +'<div class="qrsub">🔐 PINを入力してください</div>'
    +'<div style="margin:18px auto 0;max-width:220px">'
    +'<input id="admPin" type="password" inputmode="numeric" maxlength="6" autocomplete="off" style="width:100%;box-sizing:border-box;text-align:center;font-size:28px;letter-spacing:10px;padding:12px;border-radius:12px;border:1px solid var(--line2);background:var(--panel);color:var(--txt)" placeholder="••••">'
    +'<div id="admPinErr" style="color:#e08794;font-size:13px;min-height:18px;margin-top:8px"></div>'
    +'<button class="btn pri" style="width:100%;padding:13px;font-size:16px;margin-top:2px" onclick="submitAdminPin()">開く</button>'
    +'</div>'
    +'<div class="qrhint" style="margin-top:14px"><span onclick="showAdminQr()" style="color:var(--accent);cursor:pointer;text-decoration:underline">QRでログイン</span></div></div>';
  var el=document.getElementById('admPin'); if(el){ el.focus(); el.addEventListener('keydown',function(e){ if(e.key==='Enter')submitAdminPin(); }); }
}
function submitAdminPin(){
  var el=document.getElementById('admPin'), err=document.getElementById('admPinErr');
  var p=(el&&el.value||'').trim();
  if(!p){ if(err)err.textContent='PINを入力してください'; return; }
  gsr('adminPinLogin',p).then(function(r){
    if(r&&r.ok&&r.userId){ USER_ID=r.userId; saveAdminSession(r.userId,r.name); load(); }
    else { if(err)err.textContent=(r&&r.error)||'PINが違います'; if(el){el.value='';el.focus();} }
  }).catch(function(){ if(err)err.textContent='通信エラー'; });
}
function showAdminQr(){
  stopAAuth();
  document.getElementById('tabs').style.display='none';
  document.getElementById('who').textContent='';
  document.getElementById('body').innerHTML='<div class="qrgate"><h2>⚙️ 管理コンソール</h2><div class="qrsub">📱 LINEでQRを読み取って本人認証（管理者のみ）</div><div class="qrbox" id="admQr"><div class="qrload">QRを生成中…</div></div><div class="qrhint">スマホのLINEでスキャン → 本人確認 → コンソールが開きます</div></div>';
  gsr('adminAuthStart').then(function(r){
    if(!r||!r.ok){ var e=document.getElementById('admQr'); if(e)e.innerHTML='<div class="qrload">QR生成エラー</div>'; return; }
    _aAuthToken=r.token;
    var q='https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=8&data='+encodeURIComponent(r.url);
    var box=document.getElementById('admQr'); if(box)box.innerHTML='<img src="'+q+'" width="240" height="240" alt="QR">';
    pollAdminAuth(r.token);
  }).catch(function(){ var e=document.getElementById('admQr'); if(e)e.innerHTML='<div class="qrload">通信エラー</div>'; });
}
function pollAdminAuth(token){
  stopAAuth();
  _aAuthTimer=setInterval(function(){
    if(_aAuthToken!==token){ stopAAuth(); return; }
    gsr('kioskAuthStatus',token).then(function(r){
      if(!r)return;
      if(r.status==='ok'){ stopAAuth(); if(r.userId){ USER_ID=r.userId; saveAdminSession(r.userId,r.name); load(); } }
      else if(r.status==='expired'){ stopAAuth(); showAdminQr(); }
    }).catch(function(){});
  },2500);
}
/* ===== ナビ: 14タブを5グループの2階層に束ねる（各画面のrender関数は無変更・入口の見せ方だけ） =====
 * グループ(第1階層)→サブタブ(第2階層)。switchTab/TAB/render のディスパッチ規約は従来のまま。 */
var TAB_GROUPS=[
  {g:'hr',    label:'👥 人事', tabs:[['staff','👥 スタッフ'],['matrix','🔐 権限'],['shift','🗓 シフト'],['ref','📖 説明']]},
  {g:'rsv',   label:'📅 予約', tabs:[['rsv','📅 予約'],['holiday','🏖 店休日']]},
  {g:'money', label:'💰 会計', tabs:[['pay','💰 売上給与'],['denpyo','🧾 伝票・領収書']]},
  {g:'comm',  label:'📢 連絡', tabs:[['notif','🔔 通知'],['notice','📢 お知らせ'],['voice','🗣 現場の声']]},
  {g:'shop',  label:'🏪 店舗', tabs:[['menu','🍶 メニュー'],['checklist','✅ チェック'],['ops','⚙️ 運営']]}
];
var GROUP='hr';
function groupOf_(t){ for(var i=0;i<TAB_GROUPS.length;i++){ if(TAB_GROUPS[i].tabs.some(function(x){return x[0]===t;})) return TAB_GROUPS[i].g; } return TAB_GROUPS[0].g; }
function curGroup_(){ return TAB_GROUPS.filter(function(G){return G.g===GROUP;})[0]||TAB_GROUPS[0]; }
function renderNav(){
  var gEl=document.getElementById('groups'), tEl=document.getElementById('tabs'); if(!gEl||!tEl) return;
  gEl.style.display='flex'; tEl.style.display='flex';
  gEl.innerHTML=TAB_GROUPS.map(function(G){ return '<button class="grp'+(G.g===GROUP?' on':'')+'" onclick="switchGroup(\''+G.g+'\')">'+G.label+'</button>'; }).join('');
  tEl.innerHTML=curGroup_().tabs.map(function(x){ return '<button class="tab'+(x[0]===TAB?' on':'')+'" data-t="'+x[0]+'" onclick="switchTab(\''+x[0]+'\')">'+x[1]+'</button>'; }).join('');
}
function switchGroup(g){ GROUP=g; TAB=curGroup_().tabs[0][0]; renderNav(); render(); }
function switchTab(t){ TAB=t; GROUP=groupOf_(t); renderNav(); render(); }
function render(){
  GROUP=groupOf_(TAB);   // TABを直接セットしてrender()を呼ぶ既存経路でもグループ表示を追従させる
  renderNav();
  ({staff:renderStaff,matrix:renderMatrix,shift:renderShift,rsv:renderRsv,notif:renderNotif,checklist:renderChecklist,menu:renderMenu,pay:renderPay,denpyo:renderDenpyo,ops:renderOps,holiday:renderHolidays,notice:renderNotice,voice:renderVoice,ref:renderRef}[TAB]||renderStaff)();
}

function renameGetIn(){ return {o:(document.getElementById('rn-old').value||'').trim(), n:(document.getElementById('rn-new').value||'').trim()}; }
function renamePreview(){
  var v=renameGetIn(); if(!v.o||!v.n){ toast('旧名と新名を入力してください',true); return; }
  if(v.o===v.n){ toast('旧名と新名が同じです',true); return; }
  if(!IS_GAS){ document.getElementById('rn-result').innerHTML='<div class="empty">（ローカルではプレビュー不可）</div>'; return; }
  document.getElementById('rn-result').innerHTML='<div class="empty" style="padding:12px">確認中…</div>';
  gsr('adminRenameStaff',USER_ID,v.o,v.n,false).then(function(r){
    if(r&&r.ok===false){ document.getElementById('rn-result').innerHTML='<div class="empty" style="color:#e88;padding:12px">'+esc(r.error||'失敗')+'</div>'; return; }
    renameRenderResult(r,false);
  }).catch(function(){ document.getElementById('rn-result').innerHTML='<div class="empty">通信エラー</div>'; });
}
function renameRenderResult(r,done){
  var rows=Object.keys(r.report).map(function(k){ var val=r.report[k],pos=Number(val)>0; return '<tr><td style="padding:3px 10px 3px 0;color:var(--sub)">'+esc(k)+'</td><td style="padding:3px 0;text-align:right;font-weight:800;color:'+(pos?'var(--accent)':'var(--dim)')+'">'+esc(val)+'</td></tr>'; }).join('');
  var head='<div class="hint" style="margin:10px 0 4px"><b>'+esc(r.oldName)+'</b> → <b>'+esc(r.newName)+'</b>　計 '+r.total+' 件'+(done?'　<span style="color:#7fd88f">✅ 実行済み</span>':'　<span style="color:var(--dim)">（プレビュー・未実行）</span>')+'</div>';
  var btn=done?'':'<div class="toolbar" style="margin-top:10px"><button class="btn ok" onclick="renameCommit()">✅ この内容で改名を実行（'+r.total+'件）</button></div>';
  document.getElementById('rn-result').innerHTML=head+'<table style="border-collapse:collapse;font-size:12px">'+rows+'</table>'+btn;
}
function renameCommit(){
  var v=renameGetIn(); if(!v.o||!v.n)return;
  if(!confirm(v.o+' を '+v.n+' に、名前で紐づく全シートで統一します。よろしいですか？'))return;
  gsr('adminRenameStaff',USER_ID,v.o,v.n,true).then(function(r){
    if(res(r,'改名しました（計'+r.total+'件）')){ renameRenderResult(r,true); }
  }).catch(function(){ toast('実行に失敗しました',true); });
}

      +'<span id="brp'+i+'" style="font-size:12px;opacity:.7;display:'+(showR?'inline':'none')+'">%</span>'
      +'<button class="btn pri sm" id="brsave'+i+'" onclick="saveBackRule('+i+',\''+jstr(s.name)+'\')" style="display:'+(showR?'inline-block':'none')+'">保存</button>'
      +'</div>';
  }
  var bdayInfoHtml='';
  if(isTermRole(s.role)){

    else {

      +'<span class="lbl" style="margin-left:8px">🗓 週間</span>'+wk+'</div>';
  }
  var termHtml='';
  if(isTermRole(s.role)){

      '<div onclick="toggleTerms('+i+')" style="font-size:12px;color:var(--accent);cursor:pointer;font-weight:600;user-select:none">✎ 個別条件'+(hasVal?' <span style="color:#5cc98a">●</span>':'')+' <span id="tmar'+i+'">▾</span></div>'+
      '<div id="tmp'+i+'" style="display:none">'+fh+

      var opts=ONBOARD_STATES.map(function(o){return '<option value="'+esc(o.v)+'"'+(cur===o.v?' selected':'')+'>'+esc(o.t)+'</option>';}).join('');
      return '<div class="row" style="justify-content:space-between;gap:8px;margin-top:6px;align-items:center"><span style="font-size:13px">'+esc(it)+'</span>'
        +'<select class="rolesel" style="min-width:96px;border-color:'+st.c+';color:'+st.c+';font-weight:700" onchange="setOnboard('+i+',\''+jstr(s.name)+'\',\''+jstr(it)+'\',this.value)">'+opts+'</select></div>';

    onboardHtml='<div style="margin-top:8px;border-top:1px solid var(--line2);padding-top:8px">'+
      '<div onclick="toggleOnboard('+i+')" style="font-size:12px;color:var(--accent);cursor:pointer;font-weight:600;user-select:none">🆕 入店チェック '+badge+' <span id="obar'+i+'">'+(allDone?'▾':'▴')+'</span></div>'+
      '<div id="obp'+i+'" style="display:'+(allDone?'none':'block')+'">'+obRows+'</div></div>';

  var retiredBadge=s.retired?'<span class="badge" style="background:#4a2b2b;color:#ff9aa0;border:1px solid #6b3a3a">退職'+(s.retiredAt?' '+esc(s.retiredAt):'')+'</span>':'';
  // 休職中バッジ（在籍のまま＝属性は変わらない。ポータルはシフト提出/お知らせ/給与明細のみになる）
  var leaveBadge=(!s.retired&&s.onLeave)?'<span class="badge" style="background:#2e2440;color:#c9a0ee;border:1px solid #5a3a7a">🌙 休職中'+(s.onLeaveAt?' '+esc(s.onLeaveAt):'')+'</span>':'';
  // 退職者には休職トグルを出さない（退職が上位＝ログイン自体不可）。ハードコード管理者は両方とも保護。
  var leaveBtn=(s.hardAdmin||s.retired)?'' :
    (s.onLeave
      ? '<button class="btn ok sm" onclick="unleaveStaff(\''+jstr(s.name)+'\')">↩ 休職を解除</button>'
      : '<button class="btn sm" style="color:#c9a0ee;border-color:#5a3a7a" onclick="leaveStaff(\''+jstr(s.name)+'\')">🌙 休職中にする</button>');
  var retireBtn=s.hardAdmin?'' :
    (s.retired
      ? '<button class="btn ok sm" onclick="unretireStaff(\''+jstr(s.name)+'\')">↩ 復帰させる</button>'
      : '<button class="btn sm" style="color:#ff9aa0;border-color:#6b3a3a" onclick="retireStaff(\''+jstr(s.name)+'\')">🚪 退職にする</button>');
  var retireRow=(leaveBtn||retireBtn)
    ? '<div class="row" style="margin-top:8px;border-top:1px solid var(--line2);padding-top:8px;gap:6px">'+leaveBtn+retireBtn+'</div>' : '';
  return '<div class="card"'+(s.retired?' style="opacity:.72"':(s.onLeave?' style="opacity:.85"':''))+'><div class="card-top"><span class="card-nm">'+esc(s.name)+'</span>'+line+retiredBadge+leaveBadge+(s.hardAdmin?'<span class="badge lock">保護</span>':'')+'</div>'+
    '<div class="row"><span class="lbl">属性</span><select class="rolesel" onchange="setRole(\''+jstr(s.name)+'\',this.value)">'+roleOpts+'</select></div>'+
    '<div class="perms">'+gunshiBtn+adminBtn+safeBtn+noticeBtn+'</div>'+pinRow+bdayInfoHtml+backRuleHtml+onboardHtml+termHtml+retireRow+'</div>';
}
/* バック方式（新ルール/固定率）＝キャスト永続設定・給与計算に直結 */
function onBackModeChange(i,name){
  var mode=document.getElementById('bm'+i).value, show=(mode==='fixed');
  var br=document.getElementById('br'+i), brp=document.getElementById('brp'+i), bs=document.getElementById('brsave'+i);
  if(br)br.style.display=show?'inline-block':'none';
  if(brp)brp.style.display=show?'inline':'none';
  if(bs)bs.style.display=show?'inline-block':'none';
  if(mode==='rule') saveBackRuleValue(name,'rule',0,i); // 新ルールは率不要＝即保存
  else if(br) br.focus();
}
function saveBackRule(i,name){
  var rate=parseFloat(document.getElementById('br'+i).value)||0;
  if(rate<=0||rate>100){ toast('固定率は1〜100%で入力してください',true); return; }
  saveBackRuleValue(name,'fixed',rate,i);
}
function saveBackRuleValue(name,mode,rate,i){
  var s=findStaff(name); if(s){s.backMode=mode;s.backRate=rate;}
  if(!IS_GAS){ toast(name+' バック方式='+(mode==='fixed'?('固定'+rate+'%'):'新ルール')+'（ローカル）'); return; }
  gsr('adminSetCastBackRule',USER_ID,name,mode,rate).then(function(r){ res(r,name+' のバック方式を保存しました')||load(); }).catch(function(){ toast('通信エラー',true); load(); });
}
/* ===== キャスト個別条件（参照メモ。給与計算には非連動。対象=キャスト・黒服・ドライバー） ===== */
var TERM_FIELDS=[
  {h:'基本時給',label:'基本時給',ph:'例: 3000（円/時）'},
  {h:'基本バック',label:'基本バック',ph:'例: 担当10〜20%'},
  {h:'入店日',label:'入店日',ph:'例: 2026-05-01'},
  {h:'誕生日',label:'誕生日',ph:'例: 8/15（月/日）'},
  {h:'入店時条件',label:'入店時の条件',ta:true,ph:'入店時に約束した条件'},
  {h:'設定条件',label:'設定条件',ta:true,ph:'設定・待遇などの条件'},
  {h:'個別メモ',label:'自由メモ',ta:true,ph:'その他メモ（自由記述）'}
];
function isTermRole(role){ role=String(role||''); return role.indexOf('キャスト')>=0||role.indexOf('体験')>=0||role.indexOf('黒服')>=0||role.indexOf('ドライバー')>=0; }
/* ===== 入店チェック（新人オンボーディング）＝キャスト・体験。3段階 未/対応中/完了 ===== */
var ONBOARD_DEFAULT_ITEMS=['名刺発注','ポケパラ登録','身分証（登録・控え）','その他登録'];
var ONBOARD_STATES=[{v:'',t:'未',c:'#7a8aa0'},{v:'対応中',t:'対応中',c:'#e0b060'},{v:'完了',t:'完了',c:'#5cc98a'}];
function isNewbieRole(role){ role=String(role||''); return role.indexOf('キャスト')>=0||role.indexOf('体験')>=0; }
function onboardItems(){ return (ST&&ST.onboardItems&&ST.onboardItems.length)?ST.onboardItems:ONBOARD_DEFAULT_ITEMS; }
function toggleOnboard(i){ var p=document.getElementById('obp'+i),a=document.getElementById('obar'+i); if(!p)return; var open=p.style.display==='none'; p.style.display=open?'block':'none'; if(a)a.textContent=open?'▴':'▾'; }
function setOnboard(i,name,item,status){
  var s=findStaff(name); if(s){ s.onboard=s.onboard||{}; if(status)s.onboard[item]=status; else delete s.onboard[item]; }
  render();
  if(!IS_GAS){ toast(name+'：'+item+' → '+(status||'未')+'（ローカル）'); return; }
  gsr('adminSetOnboardStatus',USER_ID,name,item,status).then(function(r){ res(r,name+'：'+item+' → '+(status||'未')); }).catch(function(){ toast('通信エラー',true); load(); });
}
function saveOnboardConfig(){
  var el=document.getElementById('ob-cfg'); if(!el)return;
  var items=(el.value||'').split('\n').map(function(x){return x.trim();}).filter(function(x){return x;});
  if(!IS_GAS){ ST.onboardItems=items; toast('入店チェック項目を保存（ローカル）'); renderStaff(); return; }
  gsr('adminSaveOnboardConfig',USER_ID,items).then(function(r){ if(res(r,'入店チェック項目を保存しました')){ ST.onboardItems=(r&&r.items)||items; renderStaff(); } }).catch(function(){ toast('通信エラー',true); });
}
function toggleTerms(i){ var p=document.getElementById('tmp'+i),a=document.getElementById('tmar'+i); if(!p)return; var open=p.style.display==='none'; p.style.display=open?'block':'none'; if(a)a.textContent=open?'▴':'▾'; }
function saveTerms(i,name){

}
function toggleGunshi(name,on){ var s=findStaff(name); if(s){s.gunshiFlag=on?'○':'×';s.kioskLogin=on;} render(); if(!IS_GAS){toast(name+' 軍師'+(on?'ON':'OFF'));return;} gsr('adminSetGunshi',USER_ID,name,on).then(function(r){res(r,name+' 軍師ログイン '+(on?'ON':'OFF'))||load();}).catch(function(){toast('通信エラー',true);load();}); }
function setPin(name){ var p=prompt(name+' の個別PIN（4桁数字。空欄でクリア＝マスターPINに戻す）',''); if(p===null)return; p=p.trim(); if(p&&!/^\d{4}$/.test(p)){toast('PINは4桁の数字で入力してください',true);return;} var s=findStaff(name); if(s)s.hasPin=!!p; render(); if(!IS_GAS){toast(name+' PIN'+(p?'設定':'クリア'));return;} gsr('adminSetKioskPin',USER_ID,name,p).then(function(r){res(r,name+' の個別PINを'+(p?'設定':'クリア')+'しました')||load();}).catch(function(){toast('通信エラー',true);load();}); }
function clearPin(name){ if(!confirm(name+' の個別PINをクリアしますか？（マスターPIN使用に戻ります）'))return; var s=findStaff(name); if(s)s.hasPin=false; render(); if(!IS_GAS){toast(name+' PINクリア');return;} gsr('adminSetKioskPin',USER_ID,name,'').then(function(r){res(r,name+' の個別PINをクリアしました')||load();}).catch(function(){toast('通信エラー',true);load();}); }
function saveMasterPin(){ var p=(document.getElementById('mpin').value||'').trim(); if(!/^\d{4}$/.test(p)){toast('PINは4桁の数字で入力してください',true);return;} if(!IS_GAS){ST.masterPin=p;toast('マスターPIN保存');return;} gsr('adminSetMasterPin',USER_ID,p).then(function(r){ if(res(r,'マスターPINを保存しました'))ST.masterPin=p; }).catch(function(){toast('通信エラー',true);}); }
function saveConsolePin(){ var el=document.getElementById('cpin'); var p=(el&&el.value||'').trim(); if(!/^\d{4,6}$/.test(p)){toast('PINは4〜6桁の数字で入力してください',true);return;} if(!IS_GAS){ST.consolePinSet=true;toast('コンソールPIN設定（ローカル）');drawOps();return;} gsr('adminSetConsolePin',USER_ID,p).then(function(r){ if(res(r,'管理コンソールPINを設定しました')){ST.consolePinSet=true;drawOps();} }).catch(function(){toast('通信エラー',true);}); }
function clearConsolePin(){ if(!confirm('管理コンソールPINを解除しますか？（次回からQRログインに戻ります）'))return; if(!IS_GAS){ST.consolePinSet=false;toast('解除（ローカル）');drawOps();return;} gsr('adminSetConsolePin',USER_ID,'').then(function(r){ if(res(r,'PINを解除しました')){ST.consolePinSet=false;drawOps();} }).catch(function(){toast('通信エラー',true);}); }
function retireStaff(name){
  if(!confirm(name+' を退職にします。\n\n・ポータル / 軍師 / 管理コンソールにログインできなくなります\n・給与・来店などの履歴は名前で保持されます\n・あとで「復帰」で在籍に戻せます\n\nよろしいですか？'))return;

// 休職中＝在籍のまま参照を絞る（属性は変えない）。退職と違いログインは通り、シフト提出/お知らせ/給与明細だけ見える。

  var s=findStaff(name); if(s){s.onLeave=true;} render();
  if(!IS_GAS){toast(name+' を休職中にしました');return;}
  gsr('adminSetOnLeave',USER_ID,name,true).then(function(r){res(r,name+' を休職中にしました')||load();}).catch(function(){toast('通信エラー',true);load();});
}
function unleaveStaff(name){
  if(!confirm(name+' の休職を解除します（通常の在籍に戻ります）。よろしいですか？'))return;
  var s=findStaff(name); if(s){s.onLeave=false;s.onLeaveAt='';} render();
  if(!IS_GAS){toast(name+' の休職を解除しました');return;}
  gsr('adminSetOnLeave',USER_ID,name,false).then(function(r){res(r,name+' の休職を解除しました')||load();}).catch(function(){toast('通信エラー',true);load();});
}

function toggleSafe(name,on){ var s=findStaff(name); if(s){s.safeFlag=on;s.isSafeAdmin=on||s.hardSafe;} render(); if(!IS_GAS){toast(name+' 金庫'+(on?'ON':'OFF'));return;} gsr('adminSetSafeAdmin',USER_ID,name,on).then(function(r){res(r,name+' 金庫管理 '+(on?'ON':'OFF'))||load();}).catch(function(){toast('通信エラー',true);load();}); }
/* お知らせ配信対象のON/OFF。OFF=配信されず既読/未読名簿にも出ない（退職とは別軸の一時停止） */

/* ===== 🔐 権限 ===== */

/* ===== 🗓 シフト ===== */
var shiftReq=null, shiftMgmt=null, shiftRoleFilter='all', shiftSubmitStat=null;
function shiftRoleMatch(role){ var f=shiftRoleFilter; if(f==='all')return true; if(f==='黒服')return String(role||'').indexOf('黒服')>=0; return role===f; }
function setShiftRole(f){ shiftRoleFilter=f; drawShift(); }
function renderShift(){
  loading();
  Promise.all([api('getShiftRequests'),api('getShiftMgmt'),api('getShiftSubmitStatus')]).then(function(r){
    shiftReq=(r[0]&&r[0].requests)||[]; shiftMgmt=(r[1]&&r[1].data)||{headers:[],rows:[]};
    shiftSubmitStat=(r[2]&&r[2].ok)?r[2]:null;
    drawShift();
  }).catch(function(){setBody('<div class="empty">読み込みエラー</div>');});
}
// 来週シフト提出状況パネル（提出済/未提出/来週なし）。木金の自動リマインドと同じ集計。
function admShiftSubmitStatusHtml(){
  var st=shiftSubmitStat; if(!st)return '';
  var miss=(st.missing||[]).map(function(m){return typeof m==='string'?{name:m,registered:true}:m;});
  var chip=function(t,n,c){return '<span class="sss-chip" style="background:'+c+'">'+t+' '+n+'</span>';};
  var body='<div class="sss-chips">'+chip('提出済',(st.submitted||[]).length,'#1e4429')+chip('未提出',miss.length,miss.length?'#5a2a2a':'#2a3550')+chip('来週なし',(st.declined||[]).length,'#3a3050')+'</div>';
  if(miss.length)body+='<div class="sss-block"><div class="sss-h">未提出（木19:00/金19:00に個別DM）</div><div class="sss-names">'+miss.map(function(m){return '<span class="sss-n'+(m.registered?'':' unreg')+'">'+esc(m.name)+(m.registered?'':'（LINE未登録）')+'</span>';}).join('')+'</div></div>';
  if((st.declined||[]).length)body+='<div class="sss-block"><div class="sss-h">来週なし報告済</div><div class="sss-names">'+st.declined.map(function(n){return '<span class="sss-n ok">'+esc(n)+'</span>';}).join('')+'</div></div>';
  if((st.submitted||[]).length)body+='<div class="sss-block"><div class="sss-h">提出済</div><div class="sss-names">'+st.submitted.map(function(n){return '<span class="sss-n ok">'+esc(n)+'</span>';}).join('')+'</div></div>';
  body+='<div class="sss-actions"><button class="btn pri sm" onclick="admRunShiftOpenNow()">📣 今すぐ号令を送る</button><span class="hint" style="margin:0">対象者全員へ来週('+esc(st.weekLabel||'')+')分の提出依頼を個別LINE送信</span></div>';
  return '<div class="sec compact"><div class="sec-t">🗒 来週シフト提出状況 <span class="sub">'+esc(st.weekLabel||'')+' ・ 締切 木曜</span></div>'+body+'</div>';
}
function admRunShiftOpenNow(){
  var st=shiftSubmitStat, label=st?st.weekLabel:'';
  if(!confirm('来週('+label+')のシフト提出依頼を、対象者（キャスト/体験/黒服）全員へ今すぐ個別LINE送信します。\nよろしいですか？'))return;
  api('runShiftOpenNow').then(function(r){
    if(res(r, r&&r.sent!=null?(r.sent+'名へ号令を送信しました'+(r.total-r.sent>0?'（LINE未登録'+(r.total-r.sent)+'名スキップ）':'')):'送信しました')) renderShift();
  });
}
function drawShift(){
  var reqPend=shiftReq.filter(function(x){return (x.status||'pending')==='pending'||!x.status;});
  var reqHtml=reqPend.length?reqPend.map(function(x){
    return '<div class="lrow"><div class="main"><div class="nm">'+esc(x.name)+'</div><div class="meta">'+esc(x.date||'')+' '+esc(x.time||'')+(x.role?' ・'+esc(x.role):'')+(x.submittedAt?' ・申請 '+esc(x.submittedAt):'')+'</div></div><button class="btn ok sm" onclick="approveShift('+x.rowIdx+',\''+jstr(x.name)+'\',\''+jstr(x.date||'')+'\',\''+jstr(x.time||'')+'\',\'承諾\')">承諾</button><button class="btn dng sm" onclick="approveShift('+x.rowIdx+',\''+jstr(x.name)+'\',\''+jstr(x.date||'')+'\',\''+jstr(x.time||'')+'\',\'却下\')">却下</button></div>';
  }).join(''):'<div class="empty" style="padding:18px">承認待ちのリクエストはありません</div>';

  var H=shiftMgmt.headers||[], R=(shiftMgmt.rows||[]).filter(function(row){return shiftRoleMatch(row.role);});
  // 並び順: ①当日(参照日=先頭列)に出勤の人 → ②翌日以降にシフトが入ってる人 → ③シフト無し。各段の中で 役割順(キャスト→体験→派遣→黒服)→勤務日数が多い順→氏名
  function _hasShift(row,day){ var v=row.cells&&row.cells[day]; if(v&&v!=='休み')return true; if(row.pending&&row.pending[day])return true; return false; }
  function _scnt(row){ var c=0; H.forEach(function(d){ if(_hasShift(row,d))c++; }); return c; }
  function _roleRank(role){ role=String(role||''); if(role==='キャスト')return 0; if(role==='体験')return 1; if(role==='派遣')return 2; if(role.indexOf('黒服')>=0)return 3; return 4; }
  var _todayStr=(function(){var d=new Date();if(d.getHours()<6)d.setDate(d.getDate()-1);return (d.getMonth()+1)+'/'+d.getDate();})();
  var _todayKey=(H.indexOf(_todayStr)>=0)?_todayStr:(H[0]||''); // 当日列（無ければ先頭＝最も手前の日）
  function _tier(row){ if(_todayKey&&_hasShift(row,_todayKey))return 0; return _scnt(row)>0?1:2; }
  R.sort(function(a,b){ return _tier(a)-_tier(b) || _roleRank(a.role)-_roleRank(b.role) || _scnt(b)-_scnt(a) || String(a.name).localeCompare(String(b.name)); });
  var RFILT=['all','キャスト','黒服','派遣','体験'];
  var rchips=RFILT.map(function(f){return '<div class="chip'+(shiftRoleFilter===f?' on':'')+'" onclick="setShiftRole(\''+f+'\')">'+(f==='all'?'全て':f)+'</div>';}).join('');
  var _DOW_SH=['日','月','火','水','木','金','土'], _shYear=new Date().getFullYear();
  var _closedSh=(shiftMgmt&&shiftMgmt.closedDays)||{};
  function _shMdToYmd(mm,dd){ var now=new Date(),y=now.getFullYear(),cand=new Date(y,mm-1,dd),cut=new Date(now);cut.setHours(0,0,0,0);cut.setDate(cut.getDate()-15); if(cand<cut)y+=1; return y+'-'+('0'+mm).slice(-2)+'-'+('0'+dd).slice(-2); }
  var thead='<tr><th style="text-align:left">名前</th><th>属性</th>'+H.map(function(d){
    var pp=String(d).split('/'), mm=parseInt(pp[0],10), dd=parseInt(pp[1],10);
    var wd=(mm&&dd)?_DOW_SH[new Date(_shYear,mm-1,dd).getDay()]:'';
    var cl=(mm&&dd)?_closedSh[_shMdToYmd(mm,dd)]:'';
    var wc=cl?'#c9a8f0':(wd==='日')?'#ee6666':(wd==='土')?'#6688ee':'inherit';
    var mark=cl?'<br><span style="font-size:8px;color:#c9a8f0">🏖休</span>':'';
    return '<th style="color:'+wc+'"'+(cl?' title="'+String(cl).replace(/"/g,'')+'"':'')+'>'+esc(d)+'<br><span style="font-size:9px;font-weight:400;opacity:.85">'+wd+'</span>'+mark+'</th>';
  }).join('')+'</tr>';
  // 日付ごとの出勤人数トータル（確定＋申請中）。キャスト・体験・派遣のみ（黒服は除外）
  var totalRow='<tr class="total-row"><td class="nm">👥 合計</td><td>キャスト系</td>'+H.map(function(d){
    var cf=0,pd=0;
    R.forEach(function(row){ if(String(row.role||'').indexOf('黒服')>=0)return; var v=row.cells&&row.cells[d]; if(v&&v!=='休み')cf++; else if(row.pending&&row.pending[d])pd++; });
    return '<td>'+cf+(pd?'<span class="tp"> +'+pd+'申</span>':'')+'</td>';
  }).join('')+'</tr>';
  function _roleClass(role){ role=String(role||''); if(role==='キャスト')return 'rc-cast'; if(role==='体験')return 'rc-taiken'; if(role==='派遣')return 'rc-haken'; if(role.indexOf('黒服')>=0)return 'rc-kuro'; return ''; }
  var tbody=totalRow+R.map(function(row){
    return '<tr class="'+_roleClass(row.role)+'"><td class="nm">'+esc(row.name)+'</td><td class="role">'+esc(row.role||'')+'</td>'+H.map(function(d){
      var v=(row.cells&&row.cells[d])||'';
      var p=(!v&&row.pending&&row.pending[d])||'';
      var pr=(p&&row.pendingRow&&row.pendingRow[d])||0;
      var disp=v?esc(v):(p?'<span class="pd">申</span>'+esc(p):'');
      var oc=p?('shiftCellMenu('+pr+',\''+jstr(row.name)+'\',\''+jstr(d)+'\',\''+jstr(p)+'\')'):('editCell(\''+jstr(row.name)+'\',\''+jstr(d)+'\')');
      return '<td class="cell'+(p?' pending':'')+'" onclick="'+oc+'">'+disp+'</td>';
    }).join('')+'</tr>';
  }).join('');
  var dateOpts=H.map(function(d){return '<option value="'+esc(d)+'">'+esc(d)+'</option>';}).join('');

  var confirmBar='<div class="sec compact"><div class="sec-t">📅 シフト確定 → 黒服へLINE通知</div><div class="addbar"><select class="finput" id="sh-confirm-week">'+admWeekOpts()+'</select><button class="btn pri" onclick="admConfirmShift()">確定通知を送信</button></div><div class="hint" style="margin-top:6px">選んだ週の確定シフト（シフト表に入っている分）を黒服全員に個別LINEで通知します。</div></div>';
  setBody(
    '<div class="shift-top">'+
      admShiftSubmitStatusHtml()+
      '<div class="sec compact"><div class="sec-t">📩 承認リクエスト <span class="cnt">'+reqPend.length+'件</span><span class="sp" style="flex:1"></span>'+(reqPend.length?'<button class="btn dng sm" onclick="clearAllReq('+reqPend.length+')">🗑 全てクリア</button>':'')+'</div>'+reqHtml+'</div>'+
      confirmBar+
      '<div class="sec compact"><div class="sec-t">➕ 派遣/体験を追加</div><div class="addbar"><input class="finput" id="as-name" placeholder="氏名"><select class="finput" id="as-role"><option value="派遣">派遣</option><option value="体験">体験</option></select><select class="finput" id="as-date">'+dateOpts+'</select><input class="finput" id="as-time" placeholder="時刻 例20:00"><button class="btn pri" onclick="addShiftStaff()">追加</button></div></div>'+
    '</div>'+
    admShiftHistoryHtml()+
    '<div class="sec"><div class="sec-t">🗓 シフト表 <span class="sub">今日以降・セルをタップで編集</span></div><div class="chips shift-filter">'+rchips+'</div><div class="mtx-scroll"><table class="mtx sm">'+thead+tbody+'</table></div></div>'
  );
}
function clearAllReq(n){ if(!confirm('承認待ちのシフトリクエスト '+n+'件を全てクリアします。（副作用・通知なし）よろしいですか？'))return; api('clearShiftRequests').then(function(r){ if(res(r,(r&&r.cleared!=null?r.cleared+'件':'')+'クリアしました'))renderShift(); }); }
function approveShift(rowIdx,name,date,time,decision){
  if(!confirm(name+' '+date+' '+time+' を「'+decision+'」しますか？'))return;
  api('approveShift',{rowIdx:rowIdx,name:name,date:date,time:time,decision:decision}).then(function(r){ if(res(r,decision+'しました'))renderShift(); });
}
function editCell(name,date){
  var row=(shiftMgmt.rows||[]).find(function(x){return x.name===name;}); var cur=(row&&row.cells&&row.cells[date])||'';
  var v=prompt(name+' の '+date+'（時刻 / 休み / 空欄で消去）', cur); if(v===null)return;
  api('writeShiftCellPortal',{name:name,date:date,value:v.trim()}).then(function(r){ if(res(r,'更新しました'))renderShift(); });
}
/* 申請中セルのアクションメニュー：承諾 / 時間変更で承諾 / 却下 */

function closeScm(){ var e=document.getElementById('scm-wrap'); if(e)e.remove(); }
function scmDo(rowIdx,name,date,time,decision){
  closeScm();
  api('approveShift',{rowIdx:rowIdx,name:name,date:date,time:time,decision:decision}).then(function(r){ if(res(r,decision+'しました'))renderShift(); });
}
function scmChangeTime(rowIdx,name,date,time){
  var nv=prompt(name+' '+date+' の時間を変更して承諾（例 20:00～24:00）', time);
  if(nv===null)return; nv=nv.trim(); if(!nv){toast('時間を入力してください',true);return;}
  closeScm();
  api('approveShift',{rowIdx:rowIdx,name:name,date:date,time:time,decision:'承諾',newTime:nv}).then(function(r){ if(res(r,'時間変更で承諾しました'))renderShift(); });
}
function addShiftStaff(){
  var name=(document.getElementById('as-name').value||'').trim(); var role=document.getElementById('as-role').value;
  var date=document.getElementById('as-date').value; var time=(document.getElementById('as-time').value||'').trim();
  if(!name){toast('氏名を入力',true);return;}
  api('addShiftStaff',{staffName:name,role:role,date:date,timeVal:time}).then(function(r){ if(res(r,'追加しました'))renderShift(); });
}
/* 📅 シフト確定→黒服へLINE通知（ポータルから集約） */
function admWeekOpts(){
  var today=new Date(),dow=today.getDay(),diff=(dow===0)?-6:(1-dow);
  var mon=new Date(today); mon.setDate(today.getDate()+diff); mon.setHours(0,0,0,0);
  var p2=function(n){return n<10?'0'+n:''+n;},o='';
  for(var i=0;i<6;i++){
    var s=new Date(mon); s.setDate(mon.getDate()+i*7); var e=new Date(s); e.setDate(s.getDate()+6);
    var val=s.getFullYear()+'-'+p2(s.getMonth()+1)+'-'+p2(s.getDate());
    var lab=(s.getMonth()+1)+'/'+s.getDate()+'〜'+(e.getMonth()+1)+'/'+e.getDate()+'週';
    o+='<option value="'+val+'">'+lab+'</option>';
  }
  return o;
}
function admConfirmShift(){
  var sel=document.getElementById('sh-confirm-week'); if(!sel)return;
  var ws=sel.value, lab=sel.options[sel.selectedIndex].textContent;
  if(!confirm(lab+'の確定シフトを黒服全員にLINEで個別通知します。よろしいですか？'))return;
  api('notifyKurofukuShiftConfirmed',{weekStart:ws}).then(function(r){
    if(r&&r.ok){ var m=(r.sent||0)+'名に通知しました。'; if(r.skipped&&r.skipped.length)m+='（スキップ '+r.skipped.length+'名）'; toast(m); }
    else toast((r&&r.error)||'失敗',true);
  }).catch(function(){toast('通信エラー',true);});
}
/* 🕓 出勤希望の履歴（確定後の再調整で「元々出したい子」を確認。全ステータスの申請を日付ごとに表示） */
function admReqStatus(s){
  if(s==='承諾')return{c:'#7ee0a0',t:'✓承諾済（出勤）'};
  if(s==='休み'||s==='却下')return{c:'#ff9aa0',t:'✗休み'};
  if(s==='クリア')return{c:'#8aabcc',t:'—クリア'};
  return{c:'#e0d07e',t:'⏳未処理'};
}
function admMdKey(md){
  var m=String(md||'').match(/^(\d{1,2})\/(\d{1,2})/); if(!m)return null;
  var mo=+m[1],da=+m[2],now=new Date(),y=now.getFullYear();
  if(mo<(now.getMonth()+1)-6)y+=1;
  var wd=['日','月','火','水','木','金','土'][new Date(y,mo-1,da).getDay()];
  return{key:y*10000+mo*100+da,label:mo+'/'+da+'（'+wd+'）'};
}
function admShiftHistoryHtml(){
  var list=shiftReq||[]; if(!list.length)return '';
  var groups={},order=[];
  list.forEach(function(r){ var p=admMdKey(r.date),k=p?p.key:99999999;
    if(!groups[k]){groups[k]={label:(p?p.label:(r.date||'?')),items:[]};order.push(k);} groups[k].items.push(r); });
  order.sort(function(a,b){return a-b;});
  var inner=order.map(function(k){
    var g=groups[k];
    var rows=g.items.map(function(x){
      var st=admReqStatus(x.status);
      return '<div class="lrow"><div class="main"><div class="nm">'+esc(x.name)+' <span style="font-size:11px;color:'+st.c+'">'+st.t+'</span></div>'
        +'<div class="meta">'+esc(x.time||'')+(x.role?' ・'+esc(x.role):'')+(x.submittedAt?' ・申請'+esc(x.submittedAt):'')+'</div></div>'
        +'<button class="btn ok sm" onclick="approveShift('+x.rowIdx+',\''+jstr(x.name)+'\',\''+jstr(x.date||'')+'\',\''+jstr(x.time||'')+'\',\'承諾\')">出勤に</button>'
        +'<button class="btn dng sm" onclick="approveShift('+x.rowIdx+',\''+jstr(x.name)+'\',\''+jstr(x.date||'')+'\',\''+jstr(x.time||'')+'\',\'却下\')">休みに</button></div>';
    }).join('');
    return '<div style="font-size:12px;font-weight:700;color:#7ab0f0;margin:14px 0 6px;border-bottom:1px solid #2a3a55;padding-bottom:4px">📅 '+esc(g.label)+'</div>'+rows;
  }).join('');
  return '<details class="sec"><summary class="sec-t" style="cursor:pointer;list-style:revert">🕓 出勤希望の履歴 <span class="sub">確定後の欠員・変更で「元々出したい子」を確認して再調整</span></summary><div style="margin-top:8px">'+inner+'</div></details>';
}

/* ===== 🔔 通知設定 ===== */
var notif=null, notifFilter='all';
function renderNotif(){
  loading();
  api('getNotifSettings').then(function(r){ notif=(r&&r.settings)||{}; drawNotif(); }).catch(function(){setBody('<div class="empty">読み込みエラー</div>');});
}
/* 営業日の時系列キー（0〜5時台は翌日ぶん＝27時制で末尾に回す）。時刻なし/自動は最後 */
function notifBizMin_(t){ var p=String(t||'').split(':'); var h=parseInt(p[0],10); if(isNaN(h))return 999999; if(h<6)h+=24; return h*60+(parseInt(p[1],10)||0); }
/* フィルタ切替や保存の前に、編集中の入力値をnotifへ退避（フィルタで消える行のロスト防止） */
function syncNotifInputs(){
  if(!notif)return;
  Object.keys(notif).forEach(function(k){
    var s=notif[k];
    var ti=document.getElementById('nt-'+k); if(ti)s.time=ti.value.trim();
    var mi=document.getElementById('nm-'+k); if(mi)s.message=mi.value;
    var si=document.getElementById('nsm-'+k); if(si){ var dv=String(s.defaultStaffMsg||''); s.staffMessage=(si.value.trim()===dv.trim()?'':si.value); }
    if(s.partsDef&&s.partsDef.length){
      s.parts=s.parts||{};
      s.partsDef.forEach(function(d){
        var pe=document.getElementById('np-'+k+'-'+d.part);
        if(pe){ s.parts[d.part]=(pe.value.trim()===String(d.def||'').trim()?'':pe.value); }
      });
    }
  });
}
function setNotifFilter(f){ syncNotifInputs(); notifFilter=f; drawNotif(); }
/* 編集ブロック1つ分（見出し＋差し込みヒント＋テキストエリア）。空欄で既定に戻る */
function notifBlk_(id,label,ph,val){
  var hint=(ph&&ph.length)?'<div style="font-size:10px;color:#8a8f98;margin:1px 0 4px">差し込み: '+ph.map(function(p){return '<code>{'+p.t+'}</code>'+(p.d?'＝'+esc(p.d):'');}).join(' ／ ')+'</div>':'';
  return '<div style="margin-top:9px"><div style="font-size:11px;font-weight:800;color:var(--accent);margin-bottom:2px">'+esc(label)+'</div>'+hint+'<textarea class="ta" id="'+id+'" rows="3" placeholder="（空欄で既定文に戻す）">'+esc(val)+'</textarea></div>';
}
function notifRow_(k){
  var s=notif[k]; var auto=(s.type==='auto'); var on=(s.enabled!==false);
  var tprefix=auto?'':'<span style="color:var(--accent);font-weight:800;font-variant-numeric:tabular-nums;margin-right:9px">'+esc(s.time||'--:--')+'</span>';
  var timeInput=auto?'<span class="badge kiosk">自動</span>':'<input class="tin" id="nt-'+k+'" value="'+esc(s.time||'')+'" style="width:64px">';
  var ed='';
  if(s.msgEditable) ed+='<textarea class="ta" id="nm-'+k+'" rows="2" placeholder="（既定文）">'+esc(s.message||'')+'</textarea>';
  if(s.staffMsgEditable){ var sv=(s.staffMessage!=null&&s.staffMessage!=='')?s.staffMessage:String(s.defaultStaffMsg||''); ed+=notifBlk_('nsm-'+k,'スタッフ向け文面',null,sv); }
  if(s.partsDef&&s.partsDef.length){ s.partsDef.forEach(function(d){ var ov=(s.parts&&s.parts[d.part]!=null&&s.parts[d.part]!=='')?s.parts[d.part]:String(d.def||''); ed+=notifBlk_('np-'+k+'-'+d.part,d.label||d.part,d.ph,ov); }); }
  return '<div class="lrow" style="align-items:flex-start"><div class="main"><div class="nm">'+tprefix+esc(s.label||k)+'</div><div class="meta">'+esc(s.group||'')+(s.desc?' ・'+esc(s.desc):'')+'</div>'+ed+'</div>'+timeInput+'<span class="sw'+(on?' on':'')+'" id="ne-'+k+'" onclick="toggleNotif(\''+jstr(k)+'\')">'+(on?'ON':'OFF')+'</span></div>';
}
function drawNotif(){
  var keys=Object.keys(notif);
  var onCount=keys.filter(function(k){return notif[k].enabled!==false;}).length, offCount=keys.length-onCount;
  function pass(k){ var en=notif[k].enabled!==false; return notifFilter==='all'||(notifFilter==='on'&&en)||(notifFilter==='off'&&!en); }
  var timed=keys.filter(function(k){return notif[k].type!=='auto'&&pass(k);}).sort(function(a,b){return notifBizMin_(notif[a].time)-notifBizMin_(notif[b].time);});
  var autos=keys.filter(function(k){return notif[k].type==='auto'&&pass(k);}).sort(function(a,b){return String(notif[a].label||a).localeCompare(String(notif[b].label||b));});
  function chip(f,label){ return '<div class="chip'+(notifFilter===f?' on':'')+'" onclick="setNotifFilter(\''+f+'\')">'+label+'</div>'; }
  var filters='<div class="chips" style="margin-bottom:12px">'+chip('all','すべて '+keys.length)+chip('on','🟢 ON '+onCount)+chip('off','⚪️ OFF '+offCount)+'</div>';
  var gh=function(t){return '<div style="font-size:12px;font-weight:800;color:var(--accent);letter-spacing:.3px;margin:16px 2px 9px">'+t+'</div>';};
  var html='';
  if(timed.length) html+=gh('⏰ 定時通知（営業日の時系列）')+timed.map(notifRow_).join('');
  if(autos.length) html+=gh('⚙️ 自動トリガー（条件で発火）')+autos.map(notifRow_).join('');
  if(!html) html='<div class="empty">該当する通知はありません</div>';
  setBody('<div class="toolbar"><span class="cnt">定時・自動通知の設定（変更後は「保存」）</span><span class="sp" style="flex:1"></span><button class="btn pri" onclick="saveNotif()">💾 保存</button></div>'+filters+html);
}
function toggleNotif(k){ notif[k].enabled=!(notif[k].enabled!==false); var el=document.getElementById('ne-'+k); if(el){el.classList.toggle('on',notif[k].enabled); el.textContent=notif[k].enabled?'ON':'OFF';} if(notifFilter!=='all')drawNotif(); }
function saveNotif(){
  syncNotifInputs();
  api('saveNotifSettings',{settings:notif}).then(function(r){ res(r,'通知設定を保存しました'); });
}

/* ===== ✅ チェックリスト（開店前・閉店後のやること編集） ===== */
var chk=null;
function newChkId(){ return 'c'+Date.now().toString(36)+Math.floor(Math.random()*1000); }
function renderChecklist(){
  loading();
  api('getChecklistConfig').then(function(r){ chk=(r&&r.config)||{opening:[],closing:[]}; chk.opening=chk.opening||[]; chk.closing=chk.closing||[]; drawChecklist(); }).catch(function(){setBody('<div class="empty">読み込みエラー</div>');});
}
function chkMoveBtns(list,i,n){
  var b='padding:6px 10px;min-width:0;font-size:13px';
  return '<div style="display:flex;gap:4px;flex:none">'
    +'<button class="btn" style="'+b+'" '+(i===0?'disabled':'')+' onclick="chkMove(\''+list+'\','+i+',-1)">↑</button>'
    +'<button class="btn" style="'+b+'" '+(i===n-1?'disabled':'')+' onclick="chkMove(\''+list+'\','+i+',1)">↓</button>'
    +'<button class="btn" style="'+b+';color:#ff9a9a;border-color:#5a2226" onclick="chkRemove(\''+list+'\','+i+')">✕</button></div>';
}
function chkOpenRow(it,i,n){
  return '<div class="lrow" style="align-items:center;gap:8px">'
    +'<div class="main"><input class="finput" style="width:100%" value="'+esc(it.label)+'" placeholder="項目名" oninput="chk.opening['+i+'].label=this.value"></div>'
    +'<span class="chip'+(it.common?'':' on')+'" style="cursor:pointer;flex:none;white-space:nowrap" onclick="chkToggleFloor('+i+')">'+(it.common?'共通':'2F/5F別')+'</span>'
    +chkMoveBtns('opening',i,n)+'</div>';
}
function chkCloseRow(it,i,n){
  return '<div class="lrow" style="align-items:flex-start;gap:8px">'
    +'<div class="main"><input class="finput" style="width:100%;margin-bottom:5px" value="'+esc(it.label)+'" placeholder="タスク名" oninput="chk.closing['+i+'].label=this.value">'
    +'<input class="finput" style="width:100%;font-size:12px" value="'+esc(it.sub||'')+'" placeholder="補足（任意・例: 24:30までに）" oninput="chk.closing['+i+'].sub=this.value"></div>'
    +chkMoveBtns('closing',i,n)+'</div>';
}
function chkToggleFloor(i){ chk.opening[i].common=!chk.opening[i].common; drawChecklist(); }
function chkMove(list,i,dir){ var a=chk[list]; var j=i+dir; if(j<0||j>=a.length)return; var t=a[i];a[i]=a[j];a[j]=t; drawChecklist(); }
function chkRemove(list,i){ chk[list].splice(i,1); drawChecklist(); }
function chkAddOpen(){ chk.opening.push({id:newChkId(),label:'',common:false}); drawChecklist(); }
function chkAddClose(){ chk.closing.push({id:newChkId(),label:'',sub:''}); drawChecklist(); }
function drawChecklist(){
  var op=chk.opening.map(function(it,i){return chkOpenRow(it,i,chk.opening.length);}).join('')||'<div class="empty" style="padding:10px">項目なし</div>';
  var cl=chk.closing.map(function(it,i){return chkCloseRow(it,i,chk.closing.length);}).join('')||'<div class="empty" style="padding:10px">追加タスクなし</div>';
  setBody(
    '<div class="toolbar"><span class="cnt">開店前・閉店後の「やること」を編集（変更後は「保存」）</span><span class="sp" style="flex:1"></span><button class="btn pri" onclick="saveChecklist()">💾 保存</button></div>'
    +'<div class="sec"><div class="sec-t">🌅 開店前やること <span style="font-weight:400;color:var(--dim);font-size:12px">2F/5F別 or 共通・全端末同期</span></div>'
      +op+'<button class="btn" style="margin-top:8px" onclick="chkAddOpen()">＋ 項目を追加</button></div>'
    +'<div class="sec"><div class="sec-t">🌙 閉店後の追加タスク <span style="font-weight:400;color:var(--dim);font-size:12px">店全体で1つ・チェックオフ</span></div>'
      +cl+'<button class="btn" style="margin-top:8px" onclick="chkAddClose()">＋ タスクを追加</button>'
      +'<div class="hint" style="margin-top:8px">「現金締め・送り・金庫・伝票」は軍師のシステム機能なので固定です（ここには出ません）。</div></div>'
  );
}
function saveChecklist(){
  var op=chk.opening.filter(function(x){return String(x.label||'').trim();});
  var cl=chk.closing.filter(function(x){return String(x.label||'').trim();});
  api('saveChecklistConfig',{config:{opening:op,closing:cl}}).then(function(r){ res(r,'チェックリストを保存しました'); });
}

/* ===== 🍶 メニュー（店舗メニューの登録／メニュー落ち→在庫の仕入れ区分へ伝播） =====
   対象はボトルのみ。割り物/チャーム/果物/消耗品/名刺はメニューに一生載らないが仕入れは止められない＝巻き込まない。
   ⚠️「メニューに無いボトル」は炙り出すだけで自動では止めない。登録が終わる前に自動適用すると全ボトルが一斉に停止する。
      止めるのは管理者が押したときだけ。 */
var MENU_OFF='メニュー落ち', MENU_ON='掲載中';
var menuBoard=null;
function renderMenu(){
  if(!menuBoard){ loading(); api('getMenuBoard').then(function(r){ if(!res(r))return; menuBoard=r.board; renderMenu(); }).catch(function(e){ setBody('<div class="empty">読み込みに失敗: '+esc(e&&e.message||e)+'</div>'); }); return; }
  var b=menuBoard;
  var opts=function(sel){ return '<option value="">（紐づけなし）</option>'+b.stockNames.map(function(n){return '<option'+(n===sel?' selected':'')+'>'+esc(n)+'</option>';}).join(''); };

  // --- メニュー本体（カテゴリ別に折る。50品をフラットに並べると探せない）---
  var mnCard=function(m){
    var off=m.status===MENU_OFF;
    var qty=m.linkBroken?'<span class="mn-broken">⚠️ 在庫に「'+esc(m.stockName)+'」がありません</span>'
           :(m.stockName?'<span class="mn-qty">在庫 <b>'+(m.qty||0)+'</b> 本</span>':'<span class="mn-nolink">未紐づけ＝仕入れ判定なし</span>');
    // 価格は参照専用（会計はTRUSTが正）＝そう分かる出し方にする
    var price=m.price?'<span class="mn-price" title="参照用。会計はTRUSTが正です">¥'+Number(m.price).toLocaleString()+'</span>':'';
    return '<div class="card mn-card'+(off?' off':'')+'">'
      +'<div class="card-top"><div class="card-nm">'+esc(m.name)+(off?'<span class="badge mn-b-off">'+MENU_OFF+'</span>':'')+'</div>'
      +price+'<button class="btn mn-del" onclick="menuDelete('+m.rowIdx+',\''+jstr(m.name)+'\')">×</button></div>'
      +'<div class="mn-row"><span class="mn-lbl">在庫品名</span><select class="finput grow" onchange="menuLink('+m.rowIdx+',this.value)">'+opts(m.stockName)+'</select></div>'
      +'<div class="mn-row">'+qty
      +'<button class="btn '+(off?'':'mn-stop')+'" onclick="menuStatus('+m.rowIdx+',\''+(off?MENU_ON:MENU_OFF)+'\',\''+jstr(m.name)+'\')">'
      +(off?'↩︎ メニューに戻す':'⏸ メニュー落ちにする')+'</button></div>'
      +'</div>';
  };
  var byCat={},catOrder=[];
  b.menu.forEach(function(m){ var c=m.category||'（カテゴリなし）'; if(!byCat[c]){byCat[c]=[];catOrder.push(c);} byCat[c].push(m); });
  var rows=b.menu.length? catOrder.map(function(c){
    var items=byCat[c], nOff=items.filter(function(m){return m.status===MENU_OFF;}).length;
    var noLink=items.filter(function(m){return !m.stockName;}).length;
    return '<details class="mn-cat" open><summary>'+esc(c)+' <span class="mn-cnt">'+items.length+'品</span>'
      +(noLink?'<span class="mn-warn">未紐づけ '+noLink+'</span>':'')
      +(nOff?'<span class="mn-cnt off">メニュー落ち '+nOff+'</span>':'')
      +'</summary><div class="grid mn-grid">'+items.map(mnCard).join('')+'</div></details>';
  }).join('') : '<div class="empty">まだメニューが登録されていません。上の「一括登録」からPDFの内容を入れられます。</div>';

  // --- メニュー外の炙り出し＝この機能の目玉 ---
  var off=b.offMenu;
  var offHtml=off.length? off.map(function(o){
    return '<div class="card mn-card'+(o.stopped?' off':'')+'">'
      +'<div class="card-top"><div class="card-nm">'+esc(o.name)+(o.stopped?'<span class="badge mn-b-off">'+MENU_OFF+'</span>':'')+'</div>'
      +'<span class="mn-qty">在庫 <b>'+o.qty+'</b> 本</span></div>'
      +'<div class="mn-row">'
      +'<button class="btn" onclick="menuAddFromStock(\''+jstr(o.name)+'\')">＋ メニューに追加</button>'
      +'<button class="btn '+(o.stopped?'':'mn-stop')+'" onclick="menuStockSupply(\''+jstr(o.name)+'\',\''+(o.stopped?'':MENU_OFF)+'\')">'
      +(o.stopped?'↩︎ 仕入れを戻す':'⏸ 今後仕入れない')+'</button></div>'
      +'</div>';
  }).join('') : '<div class="empty">メニュー外のボトル在庫はありません（全部メニューに載っています）</div>';

  var total=b.menu.length, noLinkAll=b.menu.filter(function(m){return !m.stockName;}).length;
  setBody(
    '<div class="sec" id="mn-dup-sec"><div class="sec-t">🔧 同じ酒が別名で入っていないか <button class="btn" style="margin-left:auto" onclick="dupScan()">🔍 探す</button></div>'
    +'<div class="hint">同じ酒が2つの品名で登録されていると、<b>紐づけは1つにしか付かない</b>ので'
    +'「メニュー落ちにしたのにもう片方の仕入れが止まらない」が起きます。合算の本数も割れて見えます。'
    +'<b>紐づけ作業の前にここを潰してください。</b></div>'
    +'<div id="mn-dup"></div></div>'
    +'<details class="sec" id="mn-bulk-sec"'+(total?'':' open')+'><summary class="sec-t" style="cursor:pointer">📋 一括登録（メニュー改定のたびにここ）</summary>'
    +'<div class="hint">1行1品の <b>カテゴリ⇥メニュー品名⇥価格</b> を貼り付けます（⇥＝タブ）。'
    +'<b>追加のみ</b>＝既にある品名は飛ばします。既存行は書き換えません。<br>'
    +'在庫と<b>品名が完全に一致するものだけ自動で紐づけ</b>ます。残りは未紐づけで作るので、下のカードで選んでください。</div>'
    +'<div class="addbar" style="margin-bottom:8px"><button class="btn" onclick="menuLoadSeed()">📄 ボトルメニュー20260302改 を読み込む（50品）</button>'
    +'<button class="btn" onclick="menuBulkPreview()">🔍 プレビュー</button>'
    +'<button class="btn mn-go" onclick="menuBulkImport()">⬆️ 登録する</button></div>'
    +'<textarea class="finput" id="mn-bulk" rows="8" style="width:100%;font-family:ui-monospace,monospace;font-size:12px" placeholder="CHAMPAGNE&#9;サロン&#9;¥500,000"></textarea>'
    +'<div id="mn-bulk-res"></div></details>'
    +'<div class="sec"><div class="sec-t">🍶 店舗メニュー（ボトル） <span class="mn-cnt">'+total+'品</span>'
    +(noLinkAll?'<span class="mn-warn">未紐づけ '+noLinkAll+'</span>':'')+'</div>'
    +'<div class="hint">メニュー落ちにすると、紐づく在庫の<b>2F/5F両方</b>が「今後仕入れない」になります。'
    +'在庫カードは消えません＝<b>現物は数え続けて売り切れます</b>。黒服が発注しようとすると警告が出ますが、禁止はしません。<br>'
    +'価格は<b>参照専用</b>です。会計はTRUSTが正＝ここの数字で請求はしません。</div>'
    +'<div class="addbar"><input class="finput grow" id="mn-new" placeholder="メニュー品名（例: 獺祭 純米大吟醸45）"><button class="btn" onclick="menuAdd()">＋ 1件追加</button></div>'
    +rows+'</div>'
    +'<div class="sec"><div class="sec-t">⚠️ メニューに載っていないボトル在庫（'+off.length+'件）</div>'
    +'<div class="hint">メニューに紐づいていないボトルです。<b>自動では止めません</b>（登録が終わる前に自動で止めると全部のボトルが一斉に停止するため）。'
    +'メニューに載せるか、今後仕入れないかを選んでください。</div>'
    +'<div class="grid mn-grid">'+offHtml+'</div></div>'
  );
}
function menuReload(){ menuBoard=null; renderMenu(); }
/* 🔧 重複品名の検出と統合。
   ⚠️統合は不可逆（行を消して数量を寄せる）＝どちらへ寄せるかは必ず人に選ばせる。機械に決めさせない。
   ⚠️②「似ている」はしきい値で切れない（ヴーヴ イエロー/ヴーヴクリコ イエロー=55% と 赤霧島/黒霧島=50%が5pt差）
      ＝候補を出すだけで、別の酒なら無視してもらう。 */
function dupCard(d,sure){
  var pair=function(nm,qty,fl,other){
    return '<div class="dup-side"><div class="dup-nm">'+esc(nm)+'</div><div class="dup-meta">'+esc(fl)+' ／ 合計 <b>'+qty+'</b>本</div>'
      +'<button class="btn dup-btn" onclick="dupMerge(\''+jstr(other)+'\',\''+jstr(nm)+'\')">この名前に寄せる</button></div>';
  };
  return '<div class="card dup-card'+(sure?' sure':'')+'">'
    +'<div class="dup-top">'+(sure?'<span class="badge dup-b-sure">ほぼ確実</span>':'<span class="badge dup-b-may">略称違い？</span>')
    +(sure?'<span class="dup-why">記号・長音・スペースの違いだけ＝同じ酒のはず</span>':'<span class="dup-why">片方が略した名前に見えます。別の酒なら無視してください</span>')+'</div>'
    +'<div class="dup-row">'+pair(d.a,d.aQty,d.aFloors,d.b)+'<span class="dup-arrow">⇄</span>'+pair(d.b,d.bQty,d.bFloors,d.a)+'</div></div>';
}
function dupScan(){
  var box=document.getElementById('mn-dup'); box.innerHTML='<div class="empty">探しています…</div>';
  api('findDupStockNames').then(function(r){
    if(!res(r))return;
    var n=r.sure.length+r.maybe.length;
    if(!n){ box.innerHTML='<div class="mn-bulk-ok">✅ 重複していそうな品名は見つかりませんでした</div>'; return; }
    box.innerHTML='<div class="mn-bulk-ok">'+r.sure.length+'組が「ほぼ確実」／'+r.maybe.length+'組が「略称違い？」</div>'
      +'<div class="hint" style="margin:6px 0">呼び方がまるごと違う同じ酒（例：イルボンジンロ と JINRO）は機械には見つけられません。現物を知っている黒服の報告が頼りです。</div>'
      +'<div class="grid mn-grid">'+r.sure.map(function(d){return dupCard(d,true);}).join('')+r.maybe.map(function(d){return dupCard(d,false);}).join('')+'</div>';
  }).catch(function(e){ box.innerHTML='<div class="mn-bulk-err">失敗: '+esc(e&&e.message||e)+'</div>'; });
}
function dupMerge(from,to){
  if(!confirm('「'+from+'」を「'+to+'」に寄せます。\n\n・同じフロアに両方あれば本数を足します\n・無ければ品名を変えるだけです（本数は消えません）\n・メニューの紐づけも新しい品名に付け替えます\n\n⚠️これは取り消せません。「'+from+'」という品名は無くなります。\n\nよろしいですか？'))return;
  api('mergeStockNames',{from:from,to:to}).then(function(r){
    if(!res(r))return;
    var d=[];
    if(r.renamed.length)d.push('改名 '+r.renamed.join('、'));
    if(r.mergedQty.length)d.push('本数を合算 '+r.mergedQty.join('、'));
    if(r.relinked)d.push('「'+r.relinked+'」の紐づけを付け替え');
    toast('統合しました：'+(d.join(' / ')||'変更なし'));
    menuBoard=null; renderMenu(); setTimeout(dupScan,300);   // 残りの重複を続けて潰せるように再スキャン
  }).catch(function(e){toast('統合に失敗: '+(e&&e.message||e),true);});
}
/* 一括登録。⚠️プレビューを挟むのは、50品まとめて間違えると目視では捕まらないため。 */
function menuLoadSeed(){
  var s=document.getElementById('mn-seed');
  if(!s){toast('シードが見つかりません',true);return;}
  document.getElementById('mn-bulk').value=String(s.textContent||'').replace(/^\n/,'');
  menuBulkPreview();
}
function menuBulkPreview(){
  var t=(document.getElementById('mn-bulk')||{}).value||'';
  if(!t.trim()){toast('貼り付けてください',true);return;}
  api('previewMenuBulk',{text:t}).then(function(r){
    var box=document.getElementById('mn-bulk-res');
    if(!r||r.ok===false){ box.innerHTML='<div class="mn-bulk-err">'+esc(r&&r.error||'失敗')+'</div>'; return; }

/* --- 🧾 売上明細 / 👤 個人売上明細（TRUSTから取り込んだ伝票を見る） ---
   データは伝票シート＝取込済みのものを表示するだけ（TRUSTへ取りに行かない＝403でも見える）。
   画面は1つで billMode('all'|'cast')で振る舞いを変える＝日別アコーディオンの描画が完全に同じため。
   個人側はキャスト未選択のとき一覧(売上順)を出し、それ自体を入口にする＝プルダウンを開かせるより
   「誰がいくらか」が先に見える。 */
var billMonth=null, billCast='', billSeq=0, billMode='all';
/* ⚠️世代カウンタで「古い結果を捨てる」だけにする＝busyガード(読み込み中は無視)は付けないこと。
   両方を同居させると連打・高速切替で永久に読み込み中から抜けなくなる（既知の罠）。
   これが無いと、月を素早く切り替えた時に遅れて届いた前の月が最後に描画されて居座る。 */
function renderBillsAdmin(mode){
  if(mode&&mode!==billMode){ billMode=mode; billCast=''; }  // モードを跨いだら絞りは持ち越さない
  if(billMode==='all') billCast='';                          // 店全体は常に絞らない
  var my=++billSeq;
  loading();
  api('adminGetBills',{month:billMonth||nowMonth(), cast:billCast}).then(function(r){
    if(my!==billSeq)return;
    if(!res(r))return; drawBillsAdmin(r);
  }).catch(function(){
    if(my!==billSeq)return;
    setBody(paySubToggle('bills')+'<div class="empty">読み込みエラー</div>');
  });
}
function onBillMonth(){ billMonth=document.getElementById('bm').value; renderBillsAdmin(); }
function onBillCast(){ billCast=document.getElementById('bc').value; renderBillsAdmin(); }
function pickBillCast(n){ billCast=n; renderBillsAdmin(); }
function drawBillsAdmin(r){
  billMonth=r.month; billCast=r.cast||'';
  var isAll=(billMode==='all');
  var mo=(r.months||[]).map(function(m){return '<option value="'+esc(m)+'"'+(m===r.month?' selected':'')+'>'+esc(m)+'</option>';}).join('')||'<option>'+esc(r.month||'—')+'</option>';
  var head='<div class="toolbar"><span class="cnt">対象月</span><select class="finput" id="bm" onchange="onBillMonth()" style="width:120px">'+mo+'</select>';
  if(!isAll){
    // 件数と金額をプルダウンにも出す＝選び直す時に一覧へ戻らなくて済む
    head+='<span class="cnt">キャスト</span><select class="finput" id="bc" onchange="onBillCast()" style="max-width:260px">'
      +'<option value=""'+(!billCast?' selected':'')+'>（一覧から選ぶ）</option>'
      +(r.casts||[]).map(function(c){
        return '<option value="'+esc(c.name)+'"'+(c.name===billCast?' selected':'')+'>'+esc(c.name)+'（'+c.count+'件・'+fmtYen(c.total)+'）</option>';
      }).join('')+'</select>';
  }
  head+='<span class="cnt">'+(isAll?'店全体 ':'')+(r.slipCount||0)+'件 ・ 担当売上計'+fmtYen(r.monthTotal||0)+'</span></div>';
  var body;
  if(!isAll && !billCast){
    // 個人モードの入口＝キャスト一覧（売上順）。これ自体が「誰がいくら稼いだか」の表になる。
    body=(r.casts||[]).length
      ? '<div class="mtx-wrap"><table class="mtx" style="font-size:12px"><thead><tr>'
        +'<th style="text-align:left">キャスト</th><th>伝票</th><th>担当売上</th></tr></thead><tbody>'
        +(r.casts||[]).map(function(c){
          return '<tr class="bill-castrow" onclick=\'pickBillCast('+JSON.stringify(c.name)+')\'>'
            +'<td class="nm">'+esc(c.name)+'</td><td style="text-align:center;color:var(--sub)">'+c.count+'件</td>'
            +'<td style="text-align:right;font-weight:700;color:var(--accent)">'+fmtYen(c.total)+'</td></tr>';
        }).join('')
        +'</tbody></table></div><div class="hint" style="margin-top:8px">キャストをタップすると、その子の伝票が日別で開きます。'
        +'<b>(未設定)</b>＝TRUSTの担当セルから主担当を推定できなかった伝票。<br>'
        +'⚠️ここに出るのは<b>主担当ぶんだけ</b>です。ヘルプで付いた伝票はその子の売上には出ません。</div>'
      : '<div class="empty">この月の伝票データがありません。<br><small>取り込みは「📥 TRUST取込」から。</small></div>';
    setBody(paySubToggle('mybills')+head+body); return;
  }
  if(!(r.days||[]).length){
    body='<div class="empty">'+(billCast?esc(billCast)+' の伝票がこの月にありません。':'この月の伝票データがありません。')
      +'<br><small>取り込みは「📥 TRUST取込」から。</small></div>';
  } else {
    body=(r.days||[]).map(function(day){
      var slips=(day.slips||[]).map(function(s){
        return '<div class="bill-slip" onclick=\'billDetail(this,'+JSON.stringify(day.date)+','+JSON.stringify(s.uuid)+')\'>'
          +'<div class="bs-top"><span class="bs-cust">'+esc(s.cust||'（無記名）')
          +' <span class="bs-meta">卓'+esc(s.table||'-')+'・'+esc(s.guests||'-')+'名'+(s.inTime?'・'+esc(s.inTime):'')+'</span></span>'
          +'<span class="bs-amt">'+fmtYen(s.tantoAmt)+'</span></div>'
          // 主担当は「売上明細(店全体)」の時だけ出す＝個人で絞っている時は全行に同じ名前が並ぶだけで邪魔
          +(isAll?'<div class="bs-sub">主担当: '+esc(s.primary||'(未設定)')+(s.dohanCast?'　同伴: '+esc(s.dohanCast):'')+'</div>'
                 :(s.dohanCast?'<div class="bs-sub">同伴: '+esc(s.dohanCast)+'</div>':''))
          +'<div class="bill-detail" style="display:none"></div></div>';
      }).join('');
      return '<div class="bill-day"><div class="bd-head" onclick="toggleBillDay(this)">'
        +'<span class="bd-date">'+fmtBillDate(day.date)+' <span class="bd-cnt">('+day.count+'件)</span>'
        +(day.pending?' <span class="bd-pend" title="まだ営業中／締め前＝TRUST側で増える可能性があります">未確定</span>':'')+'</span>'
        +'<span class="bd-total">'+fmtYen(day.total)+'</span></div>'
        +'<div class="bill-slips" style="display:none">'+slips+'</div></div>';
    }).join('');
  }
  setBody(paySubToggle(isAll?'bills':'mybills')+head+body);
}
function toggleBillDay(el){ var b=el.nextElementSibling; b.style.display=(b.style.display==='none'?'block':'none'); }
function fmtBillDate(s){
  var p=String(s).split('-'); if(p.length<3)return s;
  var wd=['日','月','火','水','木','金','土'];
  return (+p[1])+'/'+(+p[2])+'('+wd[new Date(+p[0],+p[1]-1,+p[2]).getDay()]+')';
}
/* 明細は開いた時に取りに行く（全伝票ぶん先読みすると重い）。2回目以降は再取得せず開閉するだけ。 */
function billDetail(el,date,uuid){
  var box=el.querySelector('.bill-detail'); if(!box)return;
  if(box.style.display==='block'){ box.style.display='none'; return; }
  box.style.display='block';
  if(box.getAttribute('data-loaded')==='1') return;
  box.innerHTML='<div class="bi-msg">明細を取得中…</div>';
  api('adminGetBillDetail',{date:date,uuid:uuid}).then(function(d){
    if(!d||d.ok===false){ box.innerHTML='<div class="bi-msg err">'+esc((d&&d.error)||'取得失敗')+'</div>'; return; }
    box.innerHTML=renderBillItems(d); box.setAttribute('data-loaded','1');
  }).catch(function(){ box.innerHTML='<div class="bi-msg err">通信エラー</div>'; });
}
function renderBillItems(d){
  if(d.pending) return '<div class="bi-msg warn">明細（内訳）はまだ取り込まれていません。<br><small>「📥 TRUST取込」の「伝票を取得」で保存されます。</small></div>';
  var items=d.items||[];
  if(!items.length) return '<div class="bi-msg">明細なし</div>';
  var h='<div class="bi-box">';
  if(d.bottleCount>0) h+='<div class="bi-bottle">🍾 ボトル '+d.bottleCount+'本'+(d.bottles&&d.bottles.length?'：'+esc(d.bottles.join(' / ')):'')+'</div>';
  h+=items.map(function(it){
    return '<div class="bi-row"><span class="bi-nm">'+(it.isBottle?'🍾 ':'')
      +'<span class="bi-cat">['+esc(it.category)+']</span> '+esc(it.product||it.detail||'')
      +(it.qty>1?' ×'+it.qty:'')+'</span><span class="bi-amt">'+fmtYen(it.amount)+'</span></div>';
  }).join('');
  return h+'</div>';
}

async function xlsxInflateRaw_(bytes){

  var ab=await new Response(new Blob([bytes]).stream().pipeThrough(ds)).arrayBuffer();
  return new Uint8Array(ab);

async function xlsxUnzip_(u8, wanted){
  var dv=new DataView(u8.buffer,u8.byteOffset,u8.byteLength), eocd=-1;
  for(var i=u8.length-22;i>=0;i--){ if(dv.getUint32(i,true)===0x06054b50){eocd=i;break;} }
  if(eocd<0) throw new Error('ZIP終端が見つかりません');
  var cdCount=dv.getUint16(eocd+10,true), off=dv.getUint32(eocd+16,true), td=new TextDecoder(), out={};
  for(var n=0;n<cdCount;n++){
    if(dv.getUint32(off,true)!==0x02014b50) break;
    var method=dv.getUint16(off+10,true), compSize=dv.getUint32(off+20,true);
    var nameLen=dv.getUint16(off+28,true), extraLen=dv.getUint16(off+30,true), commentLen=dv.getUint16(off+32,true);
    var lho=dv.getUint32(off+42,true);
    var name=td.decode(u8.subarray(off+46,off+46+nameLen));
    if(wanted(name)){
      var lNameLen=dv.getUint16(lho+26,true), lExtraLen=dv.getUint16(lho+28,true);
      var start=lho+30+lNameLen+lExtraLen, comp=u8.subarray(start,start+compSize);
      out[name]= method===0 ? comp.slice() : await xlsxInflateRaw_(comp);
    }
    off+=46+nameLen+extraLen+commentLen;
  }
  return out;
}
function xlsxUnesc_(s){return String(s).replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&#x([0-9a-fA-F]+);/g,function(_,h){return String.fromCodePoint(parseInt(h,16));}).replace(/&#(\d+);/g,function(_,d){return String.fromCodePoint(+d);}).replace(/&amp;/g,'&');}

  var rows=[],rowRe=/<row\b[^>]*>([\s\S]*?)<\/row>/g,rm;
  while(rm=rowRe.exec(xml)){
    var body=rm[1],cells={},mx=0,cRe=/<c\b([^>]*?)(?:\/>|>([\s\S]*?)<\/c>)/g,cm;
    while(cm=cRe.exec(body)){

async function xlsxBestSheetRows_(file){
