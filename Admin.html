function pollAdminAuth(token){
  stopAAuth();
  _aAuthTimer=setInterval(function(){
    if(_aAuthToken!==token){ stopAAuth(); return; }
    gsr('kioskAuthStatus',token).then(function(r){
      if(!r)return;
      if(r.status==='ok'){ stopAAuth(); if(r.userId){ USER_ID=r.userId; saveAdminSession(r.userId,r.name); load(); } }
      else if(r.status==='expired'){ stopAAuth(); showAdminQr(); }
    }).catch(function(){});
  },2500);
}

/* гГЦгГ©гВ¶гВґеЖЕ xlsx иІ£жЮРпЉИгГ©гВ§гГЦгГ©гГ™дЄНи¶БгГїDecompressionStream/ж≠£и¶Пи°®зПЊгБЃгБњпЉЙ */
async function xlsxInflateRaw_(bytes){
  var ds=new DecompressionStream('deflate-raw');
  var ab=await new Response(new Blob([bytes]).stream().pipeThrough(ds)).arrayBuffer();
  return new Uint8Array(ab);
}
async function xlsxUnzip_(u8, wanted){
  var dv=new DataView(u8.buffer,u8.byteOffset,u8.byteLength), eocd=-1;
  for(var i=u8.length-22;i>=0;i--){ if(dv.getUint32(i,true)===0x06054b50){eocd=i;break;} }
  if(eocd<0) throw new Error('ZIPзµВзЂѓгБМи¶ЛгБ§гБЛгВКгБЊгБЫгВУ');
  var cdCount=dv.getUint16(eocd+10,true), off=dv.getUint32(eocd+16,true), td=new TextDecoder(), out={};
  for(var n=0;n<cdCount;n++){
    if(dv.getUint32(off,true)!==0x02014b50) break;
    var method=dv.getUint16(off+10,true), compSize=dv.getUint32(off+20,true);
    var nameLen=dv.getUint16(off+28,true), extraLen=dv.getUint16(off+30,true), commentLen=dv.getUint16(off+32,true);
    var lho=dv.getUint32(off+42,true);
    var name=td.decode(u8.subarray(off+46,off+46+nameLen));
    if(wanted(name)){
      var lNameLen=dv.getUint16(lho+26,true), lExtraLen=dv.getUint16(lho+28,true);
      var start=lho+30+lNameLen+lExtraLen, comp=u8.subarray(start,start+compSize);
      out[name]= method===0 ? comp.slice() : await xlsxInflateRaw_(comp);
    }
    off+=46+nameLen+extraLen+commentLen;
  }
  return out;
}
function xlsxUnesc_(s){return String(s).replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&#x([0-9a-fA-F]+);/g,function(_,h){return String.fromCodePoint(parseInt(h,16));}).replace(/&#(\d+);/g,function(_,d){return String.fromCodePoint(+d);}).replace(/&amp;/g,'&');}
function xlsxParseSST_(xml){var out=[],re=/<si>([\s\S]*?)<\/si>/g,m;while(m=re.exec(xml)){var s='',tre=/<t[^>]*>([\s\S]*?)<\/t>/g,tm;while(tm=tre.exec(m[1]))s+=xlsxUnesc_(tm[1]);out.push(s);}return out;}
function xlsxColNum_(ref){var m=ref.match(/[A-Z]+/)[0],n=0;for(var i=0;i<m.length;i++)n=n*26+(m.charCodeAt(i)-64);return n;}
function xlsxParseSheet_(xml,sst){
  var rows=[],rowRe=/<row\b[^>]*>([\s\S]*?)<\/row>/g,rm;
  while(rm=rowRe.exec(xml)){
    var body=rm[1],cells={},mx=0,cRe=/<c\b([^>]*?)(?:\/>|>([\s\S]*?)<\/c>)/g,cm;
    while(cm=cRe.exec(body)){
      var attrs=cm[1]||'',inner=cm[2]||'',rM=attrs.match(/r="([A-Z]+\d+)"/); if(!rM)continue;
      var ci=xlsxColNum_(rM[1]),tM=attrs.match(/t="([^"]+)"/),t=tM?tM[1]:null,val='',vM=inner.match(/<v>([\s\S]*?)<\/v>/);
      if(t==='inlineStr'){var iM=inner.match(/<t[^>]*>([\s\S]*?)<\/t>/);val=iM?xlsxUnesc_(iM[1]):'';}
      else if(vM){val=t==='s'?(sst[parseInt(vM[1])]||''):xlsxUnesc_(vM[1]);}
      cells[ci]=val; if(ci>mx)mx=ci;
    }
    var arr=[]; for(var k=1;k<=mx;k++)arr.push(cells[k]==null?'':String(cells[k]).replace(/[\t\r\n]/g,' '));
    rows.push(arr);
  }
  return rows;
}
function xlsxDataRows_(rows){var c=0;for(var i=0;i<rows.length;i++){var no=(rows[i][0]||'').trim(),nm=(rows[i][1]||'').trim();if(/^\d+$/.test(no)&&nm&&nm!=='еРИи®И')c++;}return c;}
async function xlsxBestSheetRows_(file){
  var u8=new Uint8Array(await file.arrayBuffer());
  var files=await xlsxUnzip_(u8,function(n){return n==='xl/sharedStrings.xml'||/^xl\/worksheets\/sheet\d+\.xml$/.test(n);});
  var td=new TextDecoder();
  var sst=files['xl/sharedStrings.xml']?xlsxParseSST_(td.decode(files['xl/sharedStrings.xml'])):[];
  var best=null,score=-1;
  Object.keys(files).filter(function(n){return /worksheets/.test(n);}).sort().forEach(function(n){
    var rows=xlsxParseSheet_(td.decode(files[n]),sst),sc=xlsxDataRows_(rows);
    if(sc>score){score=sc;best=rows;}
  });
  return best||[];
}

function dpTable(g){
  var d=g.data||{headers:[],rows:[],total:0};
  var meta=d.rows.length+'дїґ'+(d.total?' гГї и®И'+fmtYen(d.total):'');
  var h='<div class="sec"><div class="sec-t">'+g.title+' <span style="color:var(--dim);font-weight:600;font-size:12px">'+meta+'</span></div>';
  if(!d.rows.length){ return h+'<div class="empty" style="padding:12px 0">вАФ</div></div>'; }
  h+='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="border-collapse:collapse;min-width:100%;font-size:12px;white-space:nowrap">';
  h+='<tr>'+d.headers.map(function(hd){return '<th style="text-align:left;padding:6px 9px;border-bottom:1px solid var(--line2);color:var(--dim);font-weight:700">'+esc(hd)+'</th>';}).join('')+'</tr>';
  h+=d.rows.map(function(row){ return '<tr>'+row.cells.map(function(c){return '<td style="padding:6px 9px;border-bottom:1px solid var(--line2)">'+dpCell(c)+'</td>';}).join('')+'</tr>'; }).join('');

function addHoliday(){
